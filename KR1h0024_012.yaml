body:
  text: 欽定四庫全書論語集編卷七宋真徳秀撰子路第十三凡十三章子路問政子曰先之勞之蘇氏曰凡民之行以身先之則不令而行凡民之事以身勞之則雖勤不怨請益曰無倦無古本作母吳氏曰勇者喜於有為而不能持久故以此告之程子曰子路問政孔子既告之矣及請益則曰無倦而已未嘗復有所告姑使之深思也仲弓為季氏宰問政子曰先有司赦小過舉賢才有司衆職也宰兼衆職然事必先之於彼而後考其成功則已不勞而事畢舉矣過失誤也大者於事或有所害不得不懲小者赦之則刑不濫而人心悦矣賢有德者才有能者舉而用之則有司皆得其人而政益修矣曰焉知賢才而舉之曰舉爾所知爾所不知人其舍諸仲弓慮無以盡知一時之賢才故孔子告之以此程子曰人各親其親然後不獨親其親仲弓曰焉知賢才而舉之子曰舉爾所知爾所不知人其舍諸便見仲弓與聖人用心之大小推此義則一心可以興邦一心可以喪邦只在公私之間爾范氏曰不先有司則君行臣職矣不赦小過則下無全人矣不舉賢才則百職廢矣失此三者不可以為季氏宰况天下乎子路曰衛君待子而為政子將奚先衛君謂出公輒也是時魯哀公之十年孔子自楚反乎衛子曰必也正名乎是時出公不父其父而禰其祖名實紊矣故夫子以正名為先謝氏曰正名雖為衛君而言然為政之道皆當以此為先子路曰有是哉子之迂也奚其正迂謂逺於事情言非今日之急務也子曰野哉由也君子於其所不知葢闕如也野謂鄙俗責其不能闕疑而率爾妄對也名不正則言不順言不順則事不成楊氏曰名不當其實則言不順言不順則無以考實而事不成事不成則禮樂不興禮樂不興則刑罰不中刑罰不中則民無所措手足中去聲范氏曰事得其序之謂禮物得其和之謂樂事不成則無序而不和故禮樂不興禮樂不興則施之政事皆失其道故刑罰不中故君子名之必可言也言之必可行也君子於其言無所苟而已矣程子曰名實相湏一事苟則其餘皆苟矣胡氏曰衞世子蒯聵恥其母南子之淫亂欲殺之不果而出奔靈公欲立公子郢郢辭公卒夫人五之又辭乃立蒯聵之子輒以拒蒯聵夫蒯聵欲殺母得罪於父而輒據國以拒父皆無父之人也其不可有國也明矣夫子為政而以正名為先必將具其事之本末告諸天王請於方伯命公子郢而立之則人倫正天理得名正言順而事成矣夫子告之之詳如此而子路終不喻也故事輒不去卒死其難徒知食焉不避其難之為義而不知食輒之食為非義也樊遲請學稼子曰吾不如老農請學為圃子曰吾不如老圃種五穀曰稼種蔬菜曰圃樊遲出子曰小人哉樊須也小人謂細民孟子所謂小人之事者也上好禮則民莫敢不敬上好義則民莫敢不服上好信則民莫敢不用情夫如是則四方之民襁負其子而至矣焉用稼好去聲夫音扶禮義信大人之事也好義則事合宜情誠實也敬服用情葢各以其類而應也襁纎縷為之以約小兒於背者楊氏曰樊須遊聖人之門而問稼圃志則陋矣辭而闢之可也待其出而後言其非何也盖於其問也自謂農圃之不如則拒之者至矣須之學疑不及此而不能問不能以三隅反矣故不復及其既出則懼其終不喻也求老農老圃而學焉則其失愈逺矣故復言之使知前所言者意有在也南軒曰小人云者為其所見者小人之事耳夫上之所好下之所從也上好禮則篤於恭讓故民視之而莫不尊敬焉上好義則勁而得其宜故民心為之厭服焉上好信則誠意交孚故民亦用其情而無敢數焉感應之機固不逺也盖好德者人之公心視遲之欲下從農圃之事以得民者其亦逺矣子曰誦詩三百授之以政不達使於四方不能專對雖多亦奚以為使去聲專獨也詩本人情該物理可以驗風俗之盛衰見政冶之得失其言温厚和平長於風諭故誦之者必達於政而能言也程子曰窮經將以致用也世之誦詩者果能從政而專對乎然則其所學者章句之末耳此學者之大患也集義程子曰今人不㑹讀書如誦詩三百云云須是未讀詩時授之以政不達使於四方不能專對旣讀詩時便達於政能專對四方始是讀詩未讀周南召南時一似面牆到讀後便不面牆方是有驗大抵讀書只此便是法子曰其身正不令而行其身不正雖令不從子曰魯衞之政兄弟也魯周公之後衞康叔之後本兄弟之國而是時衰亂政亦相似故孔子歎之子謂衞公子荆善居室始有曰茍合矣少有曰茍完矣富有曰茍美矣公子荆衞大夫茍聊且粗略之意合聚也完備也言其循序而有節不以欲速盡美累其心楊氏曰務為全美則累物而驕吝之心生公子荆皆曰茍而已則不以外物為心其欲易足故也或問八章之說曰胡氏之說為備胡氏曰自合進而完自完進而美非善乎其事不猶彌光於前而公子荆知此非所存心者直謂之茍且而已既見其不以殖産自能又見其不以多財自累富而無驕滿而弗溢非賢而能之乎此可為居室之法子適衞冉有僕僕御車也子曰庶矣哉庶衆也冉有曰既庶矣又何加焉曰富之庶而不富則民生不遂故制田里薄賦斂以富之曰既富矣又何加焉曰教之富而不教則近於禽獸故必立學校明禮義以教之胡氏曰天生斯民立之司牧而寄以三事然自三代之後能舉此職者百無一二漢之文明唐之太宗亦云庶且富矣西京之教無聞焉明帝尊師重傅臨雍拜老宗戚子弟莫不受學唐太宗大召名儒增廣生貟教亦至矣然而未知所以教也三代之教天子公卿躬行於上言行政事皆可師法彼二君者其能然乎子曰茍有用我者朞月而已可也三年有成朞月謂周一歳之月也可者僅辭言綱紀布也有成治功成也尹氏曰孔子歎當時莫能用已也故云然愚案史記此盖為衞靈公不能用而發子曰善人為邦百年亦可以勝殘去殺矣誠哉是言也勝平聲去上聲為邦百年言相繼而乆也勝殘化殘暴之人使不為惡也去殺謂民化於善可以不用刑殺也盖古有是言而夫子稱之程子曰漢自髙惠至於文景黎民醇厚幾致刑措庶乎其近之矣尹氏曰勝殘去殺不為惡而已善人之功如是若夫聖人則不待百年其化亦不止此子曰如有王者必世而後仁三十年為一世仁謂教化浹治也程子曰所謂仁者風移俗易民歸於仁天下變化之時此非積乆何以能致其曰必世理則然也欲民皆仁非必世不可又曰所謂仁者以天理流行融液洞徹而無一物之不體也舉一世而言固無一人之不然即一人而言又無一事之不然求之詩書惟成康之世庶足以當之南軒曰使民皆由於仁非仁心涵養之深仁政薰陶之乆莫能然也己子曰茍正其身矣於從政乎何有不能正其身如正人何冉有退朝子曰何晏也對曰有政子曰其事也如有政雖不吾以吾其與聞之朝音潮與去聲冉有時為季氏宰朝季氏之私朝也晏晚也政國政事家事以用也禮大夫雖不治事猶得與聞國政是時季氏專魯其於國政盖有不與同列議於公朝而獨與家臣謀於私室者故夫子為不知者而言此必季氏之家事耳若是國政我嘗為大夫雖不見用猶當與聞今既不聞則是非國政也語意與魏徴獻陵之對略相似其所以正名分抑季氏而教冉有之意深矣定公問一言而可以興邦有諸孔子對曰言不可以若是其幾也幾期也詩曰如幾如式言一言之閒未可以如此而必期其效人之言曰為君難為臣不易易去聲當時有此言也如知為君之難也不幾乎一言而興邦乎因此言而知為君之難則必戰戰兢兢臨深履薄而無一事之敢忽然則此言也豈不可以必期於興邦乎為定公言故不及臣也曰一言而喪邦有諸孔子對曰言不可以若是其幾也人之言曰予無樂乎為君唯其言而莫予違也喪去聲下同樂音洛言他無所樂唯樂此耳如其善而莫之違也不亦善乎如不善而莫之違也不幾乎一言而喪邦乎范氏曰言不善而莫之違則忠言不至於耳君日驕而臣日諂未有不喪邦者也謝氏曰知為君之難則必敬謹以持之唯其言而莫予違則讒諂面諛之人至矣邦未必遽興䘮也而興喪之源分於此然茍非識微之君子何足以知之葉公問政音義並見第七篇子曰近者説逺者來説音悦被其澤則悦聞其風則來然必近者悦而後逺者來也子夏為莒父宰問政子曰無欲速無見小利欲速則不達見小利則大事不成父音甫莒父魯邑名欲事之速成則急遽無序而反不達見小者之為利則所就者小而所失者大矣程子曰子張問政子曰居之無倦行之以忠子夏問政子曰無欲速無見小利子張常過髙而未仁子夏之病常在近小故各以切已之事告之葉公語孔子曰吾黨有直躬者其父攘羊而子證之語去聲直躬直身而行者有因而盜曰攘孔子曰吾黨之直者異於是父為子隠子為父隠直在其中矣為去聲父子相隠天理人情之至也故不求為直而直在其中謝氏曰順理則直父不為子隠子不為父隠於理順邪瞽瞍殺人舜竊負而逃遵海濵而處當是時愛親之心勝其於直不直何暇計哉樊遲問仁子曰居處恭執事敬與人忠雖之夷狄不可棄也聖門教人多以數語能使人自存其心如居處恭之類是也纔恭則心自不放恭主容敬主事恭見乎外敬主手中之夷狄不可棄勉其固守而勿失也黄氏曰此章言極平易學者欲體仁以此思之可也居處指幽獨而言未有事者也執事指應事而言未涉乎人者也與人指接物而言則涉乎人矣能恭敬而忠則天理常存而人慾不萌又能無適而不然則流行而無所閒斷仁之為道孰外於此胡氏曰樊遲問仁者三此最先先難次之愛人其最後乎子貢問曰何如斯可謂之士矣子曰行已有恥使於四方不辱君命可謂士矣使去聲此其志有所不為而其材足以有為者也子貢能言故以使事告之蓋為使之難不獨貴於能言而已曰敢問其次曰宗族稱孝焉鄉黨稱弟焉弟去聲此本立而材不足者故為其次曰敢問其次曰言必信行必果硜硜然小人哉抑亦可以為次矣行去聲硜苦耕反果必行也硜小石之堅確者小人言其識量之淺狹也此其本末皆無足觀然亦不害其為自守也故聖人猶有取焉下此則市井之人不復可為士矣曰今之從政者何如子曰噫斗筲之人何足算也筲所交反算亦作筭悉亂反今之從政者盖如魯三家之屬噫心不平聲斗量名容十升筲竹器容斗二升斗筲之人言鄙細也算數也子貢之問每下故夫子以是警之程子曰子貢之意盖欲為皎皎之行聞於人者夫子告之皆篤實自得之事晁氏曰尊義於已不窮於外士之上也僅能有義於已而未能不窮於外士之次也孝弟稱於宗族鄉黨特行已有恥之事或問行已有恥為使不辱亦何足為髙而夫子以為士之上何邪曰是二者泛而觀之雖若僅免於羞辱然嘗反諸身而度之則能充其實者正不易得程子所謂篤實自得者正謂此也曰硜硜小人而亦可以為士何也曰彼其識量雖淺而非惡也至其所守雖規規於信果之小節然與夫誕謾茍賤之人則不可同年而語矣此與不得中行而取狂狷同意故下章言之子曰不得中行而與之必也狂狷乎狂者進取狷者有所不為也狷音絹行道也狂者志極髙而行不掩狷者知未及而守有餘盖聖人本欲得中道之人而教之然既不可得而徒得謹厚之人則未必能自振拔而有為也故不若得此狂狷之人猶可因其志節而激厲裁抑之以進於道非與其終於此而已也孟子曰孔子豈不欲中道哉不可必得故思其次也如琴張曾晳牧皮者孔子之所謂狂也其志嘐嘐然曰古之人古之人夷考其行而不掩焉者也狂者又不可得欲得不屑不潔之士而與之是狷也是又其次也南軒曰中行謂中道上行狂者所見髙明而行有未及乎其見狷者所守堅確而見有未得乎其理不得中行則斯二者亦可以與之進而裁之於中也蓋狂者力行以踐之則其見不差狷者致知以明之則其守不失其中可得矣子曰南人有言曰人而無恒不可以作巫醫善夫恒胡登反夫音扶南人南國之人恒常乆也巫所以交鬼神醫所以寄死生故雖賤役而尤不可以無常孔子稱其言而善之不恒其德或承之羞此易恒卦九三爻辭承進也子曰不占而已矣復加子曰以别易文也其義未詳楊氏曰君子於易茍玩其占則知無常之取羞矣其為無常也葢亦不占而已矣意亦略通子曰君子和而不同小人同而不和和者無乖戾之心同者有阿比之意尹氏曰君子尚義故有不同小人尚利安得而和或問云云曰諸説皆祖晏子之意然晏子之言乃就事而言而此章之意則直指君子小人之情狀而言似不可引以為證也若此所論君子之和者乃以其同寅協恭而無乖爭忌克之意其不同者乃以其守正循理而無阿黨朋比之風若小人則反是焉此二者外雖相似而内實相反乃君子小人情狀之隠微自古及今如出一轍非聖人不能究極而發明之也且以本朝諸公論之韓富范公上前議論不同或至失色而本未嘗失和氣王吕章曾蔡氏父子同惡相濟而其隙也無所不至焉亦足以驗聖言之不可易也如此説則君子之心無可否同異之和而惟欲必歸於是若晏子之説則是必於立異然後可以為和而不同也是非矯枉過直之論哉然其為齊景公梁邱據而發則切中其病耳子貢問曰鄉人皆好之何如子曰未可也鄉人皆惡之何如子曰未可也不如鄉人之善者好之其不善者惡之好惡並去聲一鄉之人宜有公論矣然其閒亦各以類自為好惡也故善者好之而惡者不惡則必其有茍合之行惡者惡之而善者不好則必其無可好之實子曰君子易事而難説也説之不以道不説也及其使人也器之小人難事而易説也説之雖不以道説也及其使人也求備焉易去聲説音悦器之謂隨其材器而使之也君子之心公而恕小人之心私而刻天理人欲之閒毎相反而已矣南軒曰易事者平恕之心難説者正大之情子曰君子泰而不驕小人驕而不泰君子循理故安舒而不矜肆小人逞欲故反是南軒曰泰者心廣而體胖驕者意盈而氣盛曰驕則何由泰泰則奚驕之有然而能不驕矣而未之泰者則亦有之葢雖能制其私而涵養未至未免拘迫也子曰剛毅木訥近仁程子曰木者質樸訥者遲鈍四者質之近乎仁者也楊氏曰剛毅則不屈於物欲木訥則不至於外馳故近仁朱氏跂蘇氏剛説曰剛之所以近仁為其不詘於欲而能有以全其本心之德不待見於治人然後可知也子路問曰何如斯可謂之士矣子曰切切偲偲怡怡如也可謂士矣朋友切切偲偲兄弟怡怡胡氏曰切切懇到也偲偲詳勉也怡怡和悦也皆子路所不足故告之又恐其混於所施則兄弟有賊恩之禍朋友有善柔之損故又别而言之子曰善人教民七年亦可以即戎矣教民者教之孝悌忠信之行務農講武之法即就也戎兵也民知親其上死其長故可以即戎程子曰七年云者聖人度其時可矣如云朞月三年百年一世大國五年小國七年之類皆當思其作為如何乃有益子曰以不教民戰是謂棄之以用也言用不教之民以戰必有敗亡之禍是棄其民也憲問第十四胡氏曰此篇疑原憲所記凡四十七章憲問恥子曰邦有道穀邦無道榖恥也憲原思名榖禄也邦有道不能有為邦無道不能獨善而但知食禄皆可恥也憲之狷介其於邦無道榖之可恥固知之矣至於邦有道榖之可恥則未必知也故夫子因其問而并言之以廣其志使知所以自勉而進於有為也克伐怨欲不行焉可以為仁矣子曰可以為難矣仁則吾不知也此原憲以其所能而問也克好勝伐自矜怨忿恨欲貪欲有是四者而能制之使不得行可謂難矣仁則天理渾然自無四者之累不行不足以言之也程子曰人而無克伐怨欲惟仁者能之有之而能制其情使不行斯亦難能也謂之仁則未也此聖人開示之深惜乎憲之不能再問也或曰四者不行固不得為仁矣然亦豈非所謂克已之事求仁之方乎曰克去已私以復乎禮則私欲不留而天理之本然者得矣若但制而不行則是未有拔去病根之意而容其濳藏隱伏於胷中也豈克已求仁之謂哉學者察於二者之閒則其所以求仁之功益親切而無滲漏矣或問程子以為聖人開示之深而原憲不能再問使憲也再問夫子告之宜奈何曰聖人未發之旨夫孰能測之然以程子之意而言則四者之不行亦制其末而不行於外爾若其本則固著之於心而不能去也譬之木焉不去其根則萌蘖之生自不能已制而不行日力亦不給矣且雖或能制之終身不見於外而其鬰屈不平之意反鬬進於胷中則夫所謂仁者亦且殫殘蔽害而不能以自存矣必也絶其萌芽蹙其根本不使少有豪髪留於心念之閒則於仁也其庶幾乎嗚呼非程子之學之至何足以及此然以為學者苟不能深省而力行之則亦徒為無當之大言而已故雖發之而有所不敢盡其言者其旨深矣問克伐與克復不同先生曰只是箇出入意克已是入來勝已克伐是出去勝人問克伐怨欲不行如何曰此譬如停賊在家豈不為害若便趕將出去則禍根絶矣今人非特不能克去此害却有與他打做一片者問學者用工且能於此不行亦可先生曰須是克已涵養以敬於其方萌即絶之若止於克伐怨欲不行只是遏得住一旦決裂較大可憂克已者是從根源上一刀兩㫁便斬絶了更不復萌不行底只是禁制他不要出求他那欲為之心未嘗忘問原憲是合下見得如此已足還是氣昏力弱没奈何曰是他從來把這箇做好只要得不行便了所以學者須要窮理縁他見得道理未盡便把這箇做仁較之世人沈迷私欲他一切不行已是多少好惟是聖道廣大只恁地不濟事須著進向上去將克伐怨欲都無始得若藏蓄在這裏只是故病南軒曰克伐怨欲不行可謂能制其私欲矣然克伐怨欲之根猶在也若夫仁者之心則四者之病無自而萌焉故制之於流未若澄之於源欲進於是其惟克己乎原憲問克伐怨欲不行可以為仁矣子曰可以為難矣仁則吾不知也克伐怨欲四者皆私意也原憲但欲制之而不行便以為仁夫子所以不許之若克己則奮然決去之辭而非抑遏不行之謂如去惡木不但翦其枝條必𤼵掘其本根非顔子大勇聖人肯輕許之哉衍義子曰士而懷居不足以為士矣居謂意所便安處也南軒曰懷居者志不立其何以為士乎愚案懷居與小人懷土之義同子曰邦有道危言危行邦無道危行言孫行孫並去聲危髙峻也孫卑順也尹氏曰君子之持身不可變也至於言則有時而不敢盡以避禍也然則為國者使士言孫豈不殆哉洪氏曰危非矯激也直道而已孫非阿諛也逺害而已呉氏曰言孫者亦非失其正也特少致其委曲如夫子之對陽貨耳子曰有德者必有言有言者不必有德仁者必有勇勇者不必有仁有德者和順積中英華發外能言者或便佞口給而已仁者心無私累見義必為勇者或血氣之强而已尹氏曰有德者必有言徒能言者未必有徳也仁者志必勇徒能勇者未必有仁也南宫适問於孔子曰羿善射奡盪舟俱不得其死然禹稷躬稼而有天下夫子不荅南宫适出子曰君子哉若人尚德哉若人适古活反羿音詣奡五報反盪土浪反南宫适即南容也羿有窮之君善射滅夏后相而簒其位其臣寒浞又殺羿而代之奡春秋傳作澆浞之子也力能陸地行舟後為夏后少康所誅禹平水土暨稷播種身親稼穡之事禹受舜禪而有天下稷之後至周武王亦有天下适之意盖以羿奡比當世之有權力者而以禹稷比孔子也故孔子不荅然适之言如此可謂君子之人而有尚德之心矣不可以不與故俟其出而贊美之子曰君子而不仁者有矣夫未有小人而仁者也夫音扶謝氏曰君子志於仁矣然豪忽之閒心不在焉則未免為不仁也南軒曰斯須之閒心不在焉則為不仁是故君子戰兢固持而惟恐失之也若小人則戕賊陷弱雖秉彝之端不容盡泯而亦不能以自達也子曰愛之能勿勞乎忠焉能勿誨乎蘇氏曰愛而勿勞禽犢之愛也忠而勿誨婦寺之忠也愛而知勞之則其為愛也深矣忠而知誨之則其為忠也大矣子曰為命禆諶草創之世叔討論之行人子羽脩飾之東里子産潤色之禆婢之反諶時林反禆諶以下四人皆鄭大夫草略也創造也謂造為草囊也世叔游吉也春秋傳作子太叔討尋究也論講議也行人掌使之官子羽公孫揮也脩飾謂増損之東里地名子産所居也潤色謂加以文采也鄭國之為辭命必更此四賢之手而成詳審精宻各盡所長是以應對諸侯鮮有敗事孔子言此盖善之也或問子産子曰惠人也子産之政不專於寛然其心則一以愛人為主故孔子以為惠人盖舉其重而言也問子西曰彼哉彼哉子西楚公子申能遜楚國立昭王而改紀其政亦賢大夫也然不能革其僭王之號昭王欲用孔子又沮止之其後卒召白公以致禍亂則其為人可知矣彼哉者外之之辭問管仲曰人也奪伯氏駢邑三百飯䟽食沒齒無怨言人也猶言此人也伯氏齊大夫駢邑地名齒年也盖桓公奪伯氏之邑以與管仲伯氏自知己罪而心服管仲之功故窮約以終身而無怨言荀卿所謂與之書社三百而富人莫之敢拒者即此事也或問管仲子産孰優曰管仲之德不勝其才子産之才不勝其德然於聖人之學則槩乎其未有聞也或問十章之説曰胡氏之説為詳胡氏曰鄭小國也介乎晉楚子産為政黜汰侈崇恭儉作封洫鑄刑書惜幣爭承皆以豐財足用禁姦保民其用法雖深為政雖嚴而卒歸於愛是故夫子以惠人蔽之及其卒也聞之出涕而曰古之遺愛也然孟子以為惠而不知為政禮記以為能食民而不知教者盖先王之政之教子産誠有所未及也諸家皆不論子西為何人獨呉氏為能攷之呉氏曰當時有三子西鄭駟夏楚冝申公子申也駟夏未嘗當國無大可稱宜申謀亂被誅相去又逺宜皆所不論者獨公子申與孔子同時又讓國昭王欲用孔子而子西止之其後又召白公以致楚亂則其為人可知矣問管仲人也范楊皆以為盡人道如何曰恐未然古注謂猶詩言所謂伊人莊子所謂之人也若作盡人道説除管仲是真箇人他人便不是人管仲也未盡得人道在愚案古注范楊之説皆似未安意人字之上猶有一字若子産惠人之類而逸之歟子曰貧而無怨難富而無驕易易去聲處貧難處富易人之常情然人當勉其難而不可忽其易也子曰孟公綽為趙魏老則優不可以為滕薛大夫公綽魯大夫趙魏晉卿之家老家臣之長大家勢重而無諸侯之事家老望尊而無官守之責優有餘也滕薛二國名大夫任國政者滕薛國小政繁大夫位髙責重然則公綽盖廉靜寡欲而短於才者也楊氏曰知之弗豫枉其才而用之則為棄人矣此君子所以患不知人也言此則孔子之用人可知矣南軒曰老者行義為人所尊之稱趙魏老號為家事治者公綽之不欲其德可取也故以為趙魏老則優若夫滕薛則小國也大夫之職煩勞意者以綽之才有所不足故不可為耳大抵用人之方貴在處之得其當而已黄氏曰君子不器則無施而不可也未至於不器則各有所長而不能相通世之議論人物者但見其長厚則曰此賢也然賢而不能任事則亦未足為全徳夫子之於公綽云云其言可謂公且平矣子路問成人子曰若臧武仲之知公綽之不欲卞莊子之勇冉求之藝文之以禮樂亦可以為成人矣知去聲成人猶言全人武仲魯大夫名紇莊子魯卞邑大夫言兼此四子之長則知足以窮理廉足以養心勇足以力行藝足以泛應而又節之以禮和之以樂使德成於内而文見乎外則材全徳備渾然不見一善成名之迹中正和樂粹然無復偏倚駁雜之蔽而其為人也亦成矣然亦之為言非其至者盖就子路之所可及而語之也若論其至則非聖人之盡人道不足以語此曰今之成人者何必然見利思義見危授命乆要不忘平生之言亦可以為成人矣復加曰字者既荅而復言也授命言不愛其生持以與人也乆要舊約也平生平日也有是忠信之實則雖其才知禮樂有所未備亦可以為成人之次也程子曰知之明信之篤行之果天下之達德也若孔子所謂成人亦不出此三者武仲知也公綽仁也卞莊子勇也冉求藝也須是合此四人之能文之以禮樂亦可以為成人矣然而論其大成則不止於此若今之成人有忠信而不及於禮樂則又其次者也又曰臧武仲之知非正也若文之以禮樂則無不正矣又曰語成人之名非聖人孰能之孟子曰惟聖人然後可以踐形如此方可以稱成人之名胡氏曰今之成人以下乃子路之言盖不復聞斯行之之勇而有終身誦之之固矣未詳是否或問四子之事曰武仲則春秋傳詳矣孟公綽他無所見而前章所稱亦可以得其為人卞莊子事見新序曰莊子養母戰而三北及母死齊伐魯莊子赴鬬三獲甲首以獻曰此塞三北遂赴齊師殺千人而死冉求之藝則夫子固嘗稱之矣曰必兼四子之長而又必文之以禮樂然後可以為成人何也曰四子各有所長而不能相兼又無禮樂以文之故知者至於要君勇者至於輕死藝者至於聚斂而不欲者又或不能於小國之大夫也亦難以為成人矣故孔子言必兼此四人之能而又文之以禮樂則集其所長去其所短而後可以為成人矣洪氏以為特以四人為言者四人皆魯人而莊子與子路皆卞人冉求又朋友也舉其近而易知者胡氏以為言卞莊子盖以况子路耳言有是一能而不能兼衆之長與成於禮樂焉則亦不足為成人矣恐亦有此意也曰今之成人以下或以為子路之言何如曰未可知也然姑存之以備參攷可也胡氏曰此子路之所已能也夫子方進子路於成人之域豈又取其己能者而重奬之哉葢子路晚節末路不復聞斯行之之勇而有終身誦之之固是以自名其善而為此辭與未見其止者異矣文之以禮樂此一句最重上面四人所長且把做箇様素子唯文之以禮樂始得南軒曰文之以禮樂道問學之事也又言其次者聖人所以引而進也見利思義無茍得也見危授命無茍避也乆要不忘不食其言也是雖未有過人之才而亦篤實忠信之士也故在今日亦可為成人此亦思狂狷之意子問公叔文子於公明賈曰信乎夫子不言不笑不取乎公叔文子衞大夫公孫枝也公明姓賈名亦衞人文子為人其詳不可知然必廉靜之士故當時以三者稱之公明賈對曰以告者過也夫子時然後言人不厭其言樂然後笑人不厭其笑義然後取人不厭其取子曰其然豈其然乎厭者苦其多而惡之之辭事適其可則人不厭而不覺其有是矣是以稱之或過而以為不言不笑不取也然此言也非禮義充溢於中得時措之宜者不能文子雖賢疑未及此但君子與人為善不欲正言其非也故曰其然豈其然乎葢疑之也或問公叔文子得不言不笑不取之名而公明賈以為時然後言笑取何也曰蘇氏曰凡事之因物而中理者人不知其有是也飲食未嘗無五味也而人不知者以其適宜而中度也飲食而知其有五味必其過者也此文子得不言不笑不取之名也而公明賈以是稱之也夫子疑之何也曰呉氏曰文子請享靈公也史鰌曰子富君貧禍必及矣觀此則文子之言豈能皆當而其取豈能皆善乎南軒曰公叔文子意者簡黙厚重之士故人稱之如此聖人質之於其門人將以察其然也公明賈之言善矣然非文子之所及也盖如所言非和順積中發而中節者莫能不直謂不然而為之疑辭曰其然豈其然乎聖人之亂氣含洪忠厚如此子曰臧武仲以防求為後於魯雖曰不要君吾不信也要平聲防地名武仲所封邑也要有挾而求也武仲得罪奔邾自邾如防使請立後而避邑以示若不得請則將據邑以叛是要君也范氏曰要君者無上罪之大者也武仲之邑受之於君得罪出奔則立後在君非已所得專也而據邑以請由其好智而不好學也楊氏曰武仲卑辭請後其跡非要君者而意實要之夫子之言亦春秋誅意之法也南軒曰尹氏云據邑以請非要君而何不知義者將以武仲之存先祀為賢也故夫子正之子曰晉文公譎而不正齊桓公正而不譎譎古穴反晉文公名重耳齊桓公名小白譎詭也二公皆諸侯盟主攘夷狄以尊周室者也雖其以力假仁心皆不正然桓公伐楚仗義執言不由詭道猶為彼善於此文公則伐衞以致楚而隂謀以取勝其譎甚矣二公他事亦多類此故夫子言此以𤼵其隠晉文用兵便是戰國孫呉氣習南軒曰詳觀召陵討罪之舉城濮怒楚之戰則可見矣二君皆以功利為心為三王之罪人則同然就其中行事之迹又有譎正之異子路曰桓公殺公子糾召忽死之管仲不死曰未仁乎糾居黝反召音邵案春秋傳齊襄公無道鮑叔牙奉公子小白奔莒及無知弑襄公管夷吾召忽奉公子糾奔魯魯人納之未克而小白入是為桓公使魯殺子糾而請管召召忽死之管仲請囚鮑叔牙言於桓公以為相子路疑管仲忘君事讎忍心害理不得為仁也子曰桓公九合諸侯不以兵車管仲之力也如其仁如其仁九春秋傳作糾督也古字通用不以兵車言不假威力也如其仁言誰如其仁者又再言以深許之盖管仲雖未得為仁人而其利澤及人則有仁之功矣或問管仲不死之説曰程子至矣但以薄昭之言證桓公之為兄則荀卿嘗謂桓公殺兄以爭國而其言固出於薄昭之前矣盖未可以證其必然但以公穀春秋所書之文為據而參以此章之言㫁之可也盖聖人之於人有功則稱其功有罪則數其罪不以功掩罪亦不以罪掩功今於管仲但稱其功不言其罪則可見不死之無害於義而桓公子糾之長少亦從以明矣又况匹夫匹婦之為諒者正指召忽之於子糾猶石乞於白公耳至於程子又謂若使管仲所事者正而不死其難則後雖有大功聖人豈復稱之愚恐記之失也盖曰不與其事桓公則可曰不稱其功則不可記者豈因彼言以為此而遂失之也與曰管仲生死之事非決於一時之義耳程子又謂若使管仲不死而無功則是貪生惜死而不若匹夫匹婦之為諒未免於先功而後義且管仲又何以自必其後之有功邪曰召忽之失在於輔子糾以爭國而不在於死管仲之得在於九合之功而不在於不死後功固不可期而其在我者固可必但其得就此功而免於匹夫匹婦之諒則亦幸而已矣後之君子有不幸而處此者茍自度其無管仲之才是殆不若為召忽之不失其正也此又程子言外之意讀者不可以不察也范氏以九合為仁之大以死節為義之小是謀利計功之言其害理甚矣若聖人之心果出於此則行一不義殺一不辜而得天下亦何憚而不為之乎謝氏以管仲於子糾君臣之義未正故可以不死亦非也夫仲之可以不死者正以小白兄而子糾弟耳若使糾兄而當立則齊國之士君臣之義無所逃矣如管仲䇿名委質親北面而君之安得幸其未得入國而死乃託於君臣之義未正而不死其難哉以忽死為傷勇仲之不死為徙義而夫子予仲之不死恐亦非聖人之意也夫子特以忽之功無足稱而其死不為過管仲之不死亦未害義而其功有足褒耳固非予仲之生而貶忽之死也問管仲之心既已不仁何以有仁者之功曰如漢髙祖唐太宗未可謂之仁人然秦隋殘虐之極二君一旦出而平定天下拯救生民豈非仁者之功邪管仲之功亦猶是也南軒曰夫子所以稱管仲者仁之功也問其仁而獨稱仁之功則其淺深亦可知矣其告子貢亦然若二子問管仲仁乎則所以告之者異矣聖人荅問抑揚之意學者當味之愚案如其仁如其仁朱子以為誰如其仁或者以為夫子之意盖謂如其九合不以兵車之事是亦仁也盖指此一事而許其仁此説近矣子貢曰管仲非仁者與桓公殺公子糾不能死又相之與平聲相去聲子貢意不死猶可相之則已甚矣子曰管仲相桓公霸諸侯一匡天下民到于今受其賜微管仲吾其被髪左衽矣被皮寄反衽而審反霸與伯同長也匡正也尊周室攘夷狄皆所以正天下也微無也衽衣衿也被髪左衽夷狄之俗也豈若匹夫匹婦之為諒也自經於溝瀆而莫之知也諒小信也經縊也莫之知人不知也後漢書引此又莫字上有人字程子曰桓公兄也子糾弟也仲私於所事輔之以爭國非義也桓公殺之雖過而糾之死實當仲始與之同謀遂與之同死可也知輔之爭為不義將自免以圖後功亦可也故聖人不責其死而稱其功若使桓弟而糾兄管仲所輔者正桓奪其國而殺之則管仲之與桓不可同世之讎矣若計其後功而與其事桓聖人之言無乃害義之甚啓萬世反覆不忠之亂乎如唐之王珪魏徵不死建成之難而從太宗可謂害於義矣後雖有功何足贖哉愚謂管仲有功而無罪故聖人獨稱其功王魏先有罪而後有功則不以相掩可也公叔文子之臣大夫僎與文子同升諸公僎士免反臣家臣公公朝謂薦之與己同進為公朝之臣也子聞之曰可以為文矣文者順理而成章之謂諡法亦有所謂錫民爵位曰文者洪氏曰家臣之賤而引之使與已並有三善焉知人一也忘己二也事君三也南軒曰志在上賢而無媢嫉之心以斯一善其諡以文可也子言衞靈公之無道也康子曰夫如是奚而不喪夫音扶喪去聲丧失位也孔子曰仲叔圉治賔客祝鮀治宗廟王孫賈治軍旅夫如是奚其喪仲叔圉即孔文子也三人皆衞臣雖未必賢而其才可用靈公用之又各當其才尹氏曰衞靈公之無道宜喪也而能用此三人猶足以保其國而况有道之君能用天下之賢才者乎詩曰無競維人四方其訓之南軒曰以衞靈公無道然所用得其才猶足以無䘮雖然但能維持使之勿喪而已若身正於上而用得其人則孰禦焉子曰其言之不怍則為之也難大言不慙則無必為之志而不自度其能否矣欲踐其言豈不難哉南軒曰易其言者實必不至若聽其言而不怍則知其為之也難矣故古者言之不出恥躬之不逮而仁者之言必訒也陳成子弑簡公成子齊大夫名恒簡公齊君名壬事在春秋哀公十四年孔子沐浴而朝告於哀公曰陳恒弑其君請討之朝音潮是時孔子致仕居魯沐浴齊戒以告君重其事而不敢忽也臣弑其君人倫之大變天理所不容人人得而誅之况鄰國乎故夫子雖已告老而猶請哀公討之公曰告夫三子夫音扶下告夫同三子三家也時政在三家哀公不得自專故使孔子告之孔子曰以吾從大夫之後不敢不告也君曰告夫三子者孔子出而自言如此意謂弑君之賊法所必討大夫謀國義所當告君乃不能自命三子而使我告之也之三子告不可孔子曰以吾從大夫之後不敢不告也以君命往告而三子魯之强臣素有無君之心實與陳氏聲勢相倚故沮其謀而夫子復以此應之其所以警之者深矣程子曰左氏記孔子之言曰陳恒弑其君民之不予者半以魯之衆加齊之半可克也此非孔子之言誠若此言是以力不以義也若孔子之志必將正名其罪上告天子下告方伯而率與國以討之至於所以勝齊者孔子之餘事也豈計魯人之衆寡哉當是時天下之亂極矣因是足以正之周室其復興乎魯之君臣終不從之可勝惜哉胡氏曰春秋之法弑君之賊人人得而討之仲尼此舉先發後聞可也子路問事君子曰勿欺也而犯之犯謂犯顔諫爭范氏曰犯非子路之所難也而以不欺為難故夫子教以先勿欺而後犯也南軒曰盡誠而不欺犯顔而納忠事君之義大要盡是矣然勿欺其本也勿欺矣則誠信充積一不得已有時而犯之則有以感動也以子路之剛強懼其果於犯也故告之以勿欺為主黄氏曰偽言不直謂之欺直言無隱謂之犯欺與犯正相反夫子之告子路乃是一戒一勸兩面平説之辭若反覆以觀則能勿欺而不能犯則未免有回䕶之失能犯矣而不能勿欺則未免有矯飾之病此文不可以不戒也子曰君子上達小人下達君子循天理故日進乎髙明小人狥人欲故日究乎汙下案張子曰上達循天理下達狥人欲朱子之説本此南軒曰上達反本下逹趨末皆云達者如喻義喻利同言喻子曰古之學者為己今之學者為人為去聲謝氏曰君子無不反求諸己小人反是此君子小人所以分也楊氏曰君子雖不病人之不已知然亦反諸己而已小人求諸人故違道干譽無所不至二者文不相縈而意實相足亦記言者之意此章在病人不已知與疾沒世名不稱之次故楊氏云云朱子有曰程子曰為己欲得之於己也為人欲見知於人也程子曰占之學者為己其終至於成物今之學者為人其終至於喪已朱子曰聖賢論學者用心得失之際其説多矣然未有如此言之切而要者於此明辨而日省之則庶乎其不昧於所從矣若不為己看做甚事都只是為别人雖做得好亦不關已問曰這須要自看如一日之間小事大事只是道我合當做便如此做這便是無所為且如讀書只是自家合如此讀合如此理會身已才説要人知便是有所為大學或問云大抵以學者而視天下之事以為已事之當然而為之雖甲兵金榖籩豆有司之事皆為己也以其可以求知於世而為之則雖割股廬墓弊車羸馬亦為人耳善乎張子敬夫之言曰為己無所為而然也此其語意之深切盖有前賢所未發者云云學者齋箴相古先民學以為已今也不然為人而已為己之學先成其身君臣之義父子之仁聚辨居行無怠無忽至足之餘澤及萬物為人之學燁然春華誦數是力纂組是夸結駟懷金煌煌煒煒世俗之榮君子之鄙惟是二者其端則微𦕈緜弗察胡趣其歸蘧伯玉使人於孔子使去聲下同蘧伯玉衛大夫名瑗孔子居衞嘗主於其家既而反魯故伯玉使人來也孔子與之坐而問焉曰夫子何為對曰夫子欲寡其過而未能也使者出子曰使乎使乎與之坐敬其主以及其使也夫子指伯玉也言其但欲寡過而猶未能則其省身克己常若不及之意可見矣使者之言愈自卑約而其主之賢益彰亦可謂深知君子之心而善於辭令者矣故夫子再言使乎以重美之案莊周稱伯玉行年五十而知四十九年之非又曰伯玉行年六十而六十化盖其進徳之功老而不倦是以踐履篤實光輝宣著不唯使者知之而夫子亦信之也或問二十六章之説曰蘧伯玉使者之言極有味學者所宜熟玩而深省焉胡氏説亦可觀也胡氏曰未能寡過乃伯玉心事而使者知之雖伯玉克己日新之業著見於外而使者亦可謂知德而能言矣南軒曰夫欲寡過而未能非篤於進德修業者莫知此味也則伯玉之賢可知子曰不在其位不謀其政重出曽子曰君子思不出其位此艮卦之象辭也曽子盖嘗稱之記者因上章之語而類記之也范氏曰物各止其所而天下之理得矣故君子所思不出其位而君臣上下大小皆得其職也子曰君子恥其言而過其行行去聲恥者不敢盡之意過者欲有餘之辭子曰君子道者三我無能焉仁者不憂知者不惑勇者不懼知去聲自責以勉人也子貢曰夫子自道也道言也自道猶云謙辭尹氏曰成德以仁為先進學以知為先故夫子之言其序有不同者以此王彦霖問心一也有曰云云何也程子曰此只是名其德耳其理一也得此道而不憂者仁之事也因其不憂故曰此仁也智勇亦然凡名其德千百皆然但此三者達道之大者也仁者不憂知者不惑勇者不懼德之序也知者不惑仁者不憂勇者不懼學之序也知以知之仁以守之勇以行之子貢方人子曰賜也賢乎哉夫我則不暇夫音拱方比也乎哉疑辭比方人物而較其短長雖窮理之事然專務為此則心馳於外而所以自治者踈矣故襃之而疑其辭復自貶以深抑之謝氏曰聖人責人辭不迫切而意已獨至如此南軒曰擬議人之優劣非知者其能之乎故亦可謂之賢而曰夫我則不暇求之他人不若篤其在已也聖人抑揚之閒所以長善救失者宜深味也以上皆聖人稱許之辭然所以勉其不及者亦甚至矣子曰不患人之不已知患其不能也凡章指同而文不異者一言而重出也文小異者屢言而各出也此章凡四見而文皆有異則聖人於此一事盖屢言之其丁寜之意亦可見矣子曰不逆詐不億不信抑亦先覺者是賢乎逆未至而迎之也億未見而意之也詐謂人欺己不信謂人疑己抑反語辭言雖不逆不億而於人之情偽自然先覺乃為賢也楊氏曰君子一於誠而已然未有誠而不明者故雖不逆詐不億不信而常先覺也若夫不逆不億而卒為小人所㒺焉斯亦不足觀也已微生畝謂孔子曰丘何為是栖栖者與無乃為佞乎與平聲微生姓畝名也畝名呼夫子而辭甚倨盖有齒德而隠者栖栖依依也為佞言其務為口給以悦人也孔子曰非敢為佞也疾固也疾惡也固執一而不通也聖人之於達尊禮恭而言直如此其警之亦深矣子曰驥不稱其力稱其德也驥善馬之名德謂調良也尹氏曰驥雖有力其稱在德人有才而無德則亦奚足尚哉或問才受乎天德係乎習乃重才而輕德者何也曰人受天地之中以生是德也固已根於其性之所冇特人不能皆生知而安行故賴學以成之耳非因學而後有也豈可以其係乎習而不受乎天哉若以氣稟而言則才之與德皆有自然勉強之差又不得專以才為天賦德為人為也司馬公論智伯以金與竹為才以鎔範矯揉為德其失正與此同至於蘇氏之言又以才難強而德易勉其失之端不過如此而其末流遂至於貴才而賤德則其實益甚而其為天下後世之禍也益深矣南軒日驥之得稱為其德不為其力也而况於君子乎豈不以尚德為貴乎苟無其德雖曰有才其得謂之君子乎又南宮适曰禹稷躬稼而有天下羿善射奡盪舟皆不得其死然夫子不荅南宫适出子曰君子哉若人尚德哉若人亦與此章同指云或曰以德報怨何如或人所稱今見老子書德謂恩惠也子曰何以報德言於其所怨既以德報之矣則人之有德於我者又將何以報之乎以直報怨以德報徳於其所怨者愛憎取舍一以至公而無私所謂直也於其所德者則必以德報之不可忘也或人之言可謂厚矣然以聖人之言觀之則見其出於有意之私而怨德之報皆不得其平也必如夫子之言然後二者之報各得其所然怨有不讎而德無不報則又未嘗不厚也此章之言明白簡約而其指意曲折反復如造化之簡易易知而微妙無窮學者所宜詳玩也子曰莫我知也夫夫音扶夫子自歎以發子貢之問也子貢曰何為其莫知子也子曰不怨天不尤人下學而上達知我者其天乎不得於天而不怨天不合於人而不尤人但知下學而自然上逹此但自言其反已自修循序漸進耳無以甚異於人而致其知也然深味其語意則見其中自有人不及知而天獨知之之妙盖在孔門唯子貢之智幾足以及此故特語以發之惜乎其猶有所未達也程子曰不怨天不尤人在理當如此又曰下學上達意在言表又曰學者須守下學上達之語乃學之要葢凡下學人事便是上達天理然習而不察則亦不能以上達矣朱子語録下學者事也上達者理也理只在事中若真能盡得下學之事則上達之理便在此釋氏只説上達更不理會下學然既無下學如何上達問聖人亦有下學否曰聖人雖是生知何嘗不學如入大廟每事問吾十有五而志于學便是學也一物之中皆具一理就那物中見得箇理便是上達如大而化之之謂聖聖而不可知之謂神然亦不離乎人倫日用之中但人不能盡所謂學者果能學安有不達者下學是立脚只在這裏上達是見識自然超詣到得上逹便只是這下學原不相離或問云云曰學者學夫人之事形而下者也而其事之理則固天之理也形而上者也釋曰窮通榮辱天也用舍予奪人也常人之情不得其所欲則怨天尢人盖揚已之善而歸過於天人也下學者所學日用常行之事也上達者道德性命之理也常人之情置事於淺近索理於渺茫是以惑人之耳目而以為能此所以人知之也聖人渾然天理窮通荣辱用舍予奪皆理之不能無者順而受之文何怨尤之有人事之中便是天理文何必舎人事而求之於渺茫哉如是則慊然若不見其所長者然天理流行而聖人與之無閒如此所以人不知而天知之也公伯寮愬子路於季孫子服景伯以告曰夫子固有惑志於公伯寮吾力猶能肆諸市朝朝音潮公伯寮魯人子服氏景諡伯字魯大夫子服何也夫子指季孫言其有疑於寮之言也肆陳尸也言欲誅寮子曰道之將行也與命也道之將廢也與命也公伯寮其如命何與平聲謝氏曰雖寮之愬行亦命也其實寮無如之何愚謂言此以曉景伯安子路而警伯寮耳聖人於利害之際則不待決於命而後泰然也或問公伯寮學於孔子而所為若是何也曰胡氏以為寮非孔子之弟子特季氏之黨耳若遊於孔門則豈至於陷其朋友哉曰子路非王佐之才家臣非師相之任其為用舍無足言矣而孔子以道之興廢係焉何也曰此墮三都出藏甲之時也道之興廢固於是乎在耳曰或以命為天理何也曰命者天理流行付與萬物之謂也然其形而上者謂之理形而下者謂之氣自其理之體而言之則元亨利貞之德具於一時而萬古不易自其氣之運而言則消息盈虚之變如循環之無端而不可窮也萬物受命於天以生而得其理之體故仁義禮智之體根於心而為性其既生也則隨其氣之運故廢興厚薄之變唯所命而莫逃此章之所謂命盖指氣之所運為言以天理釋之則於二者之分亦不察矣南軒曰莫之致而至者命也道之興廢一㫁以命公伯寮何所預於其閒哉不曰已而直曰道之將行與廢較之孟子予不遇魯侯之命亦可以見聖賢氣象之分子曰賢者辟世辟去聲下同天下無道而隠若伯夷太公是也其次辟地去亂國適治邦其次辟色禮貎衰而去其次辟言有違言而後去也程子曰四者固非冇優劣然賢者之處世豈不能超然髙舉見幾而作乃至發見於言色而後辟之邪曰出處之義自非一端隨其所居之位而量其所處之宜可也衞靈公顧蜚則辟色矣問陳則辟言矣豈夫子於此為劣乎此所以不可以優劣言也子曰作者七人矣李氏曰作起也言起而隠去者今七人矣不可知其誰何必求其人以實之則鑿矣子路宿於石門晨門曰奚自子路曰自孔氏曰是知其不可而為之者與與平聲石門地名晨門掌晨啓門葢賢人隠於抱關者也自從也問其何所從來也胡氏曰晨門知世之不可而不為故以是譏孔子然不知聖人之視天下無不可為之時也黄氏曰晨門見已而不見聖人故以是為言然無孔子之聖則寧為晨門而自處於抱關擊柝也其言聖人則非而自處其身則是亦可謂賢也已南軒曰聖人非不知道之不可行而皇皇於斯世者天地生物之心也彼雖知世之不可以為而未知道之不可以已子擊磬於衞有荷蕢而過孔氏之門者曰有心哉擊磬乎荷去聲磬樂器荷擔也蕢草器也此荷蕢者亦隠士也聖人之心未嘗忘天下此人聞其磬聲而知之則亦非常人矣既而曰鄙哉硜硜乎莫已知也斯已而已矣深則厲淺則揭硜苦耕反莫已之已音紀餘音以揭起例反硜硜石聲亦專確之意以衣涉水曰厲攝衣涉水曰揭此兩句衛風匏有苦葉之詩也譏孔子人不知已而不正不能適淺深之冝子曰果哉末之難矣果哉歎其果於忘世也末無也聖人心同天地視天下猶一家中國猶一人不能一日忘也故聞荷蕢之言而歎其果於忘世且言人之出處若但如此則亦無所難矣南軒難作去聲謂其言之果無得與辨論矣子張曰書云髙宗諒隂三年不言何謂也髙宗商王武丁也諒隂天子居喪之名未詳其義子曰何必髙宗古之人皆然君薨百官緫已以聽於冢宰三年言君薨則諸侯亦然緫已謂緫攝已職冢宰大宰也百官聼於冢宰故君得以三年不言也胡氏曰位有貴賤而生於父母無以異者故三年之䘮自天子達於庻人子張非疑此也殆以為人君三年不言則臣下無所稟令禍亂或由以起也孔子告以聽於冢宰則禍亂非所憂矣子曰上好禮則民易使也好易皆去聲謝氏曰禮達而分定故民易使子路問君子子曰脩已以敬曰如斯而已乎曰脩己以安人曰如斯而已乎曰脩已以安百姓脩已以安百姓堯舜其猶病諸脩已以敬夫子之言至矣盡矣而子路少之故再以其充積之盛自然及物者告之無他道也程子曰君子脩已以安百姓篤恭而天下平唯上下一於恭敬則天地自位萬物自育氣無不和而四靈畢至矣此體信達順之道聰明睿知皆由是出以此事天饗帝致堂胡氏曰可願莫如善敬立則百善從宜逺莫如邪敬立則百邪息故敬也者存心之要法檢身之切務也欲持敬者奈何曰君子有言主一之謂敬無適之謂一如執大圭如奉槃水如震霆之在上也淵谷之在下也師保之在前也鬼神之在左右也是則特敬之道問聦明睿知皆由此出莫是自敬出否朱子曰心常恭敬則常光明問程子云云曰敬則自是聦明人之所以不聦不明者止緣身心惰嫚便昬塞了敬則虚靜自然通達因問周子云靜虚則明明則通是此意否曰意亦相似又問云云曰聦明睿智如何不由敬出且以一國之君觀之此心才不虚靜則姦聲佞辭雜進而不察何以為聦冶容亂色交蔽而不辨何以為明睿智皆出於心心既無主則應事接物何由思慮得冝所以此心常要肅然虚明然後物不能惑南軒曰修己之道不越乎敬敬之道盡則所為修己者亦無不盡而所以安人安百姓者皆在其中矣葢一於篤敬則推之家以及於天下者皆其理也極其至也天地位焉萬物育焉兆民雖衆其有不得其所安者乎是則修己以敬一語理無不盡者原壤夷俟子曰幼而不孫弟長而無述焉老而不死是為賊以杖叩其脛孫弟並去聲長上聲叩音口脛其定反原壤孔子之故人母死而歌葢老氏之流自放於禮法之外者夷蹲踞也俟待也言見孔子來而蹲踞以待之也述猶稱也賊者害人之名以其自幼至長無一普狀而乆生於世徒足以敗常亂俗則是賊而已矣脛足骨也孔子既責之而因以所曳之杖徵擊其脛若使勿蹲踞然闕黨童子將命或問之曰益者與與平聲闕黨黨名童子未冠者之稱將命謂傳賔主之言或人疑此童子學有進益故孔子使之傳命以寵異之也子曰吾見其居於位也見其與先生並行也非求益者也欲速成者也禮童子當隅坐隨行孔子言吾見此童子不循此禮非能求益但欲速成爾故使之給使令之役觀少長之序習揖遜之容盖所以抑而教之非寵而異之也南軒曰夫子之意以為童子當為童子之事而已童子坐則隅不敢居於位也行則左右不敢與先生並行也今居位而並行是不安乎童子之所為而自進於成人之列有躐等之意無自卑之心焉能以求益乎故以為欲速成者而已如物之生循其序而生理達焉若欲速成則反害其生矣故聖門之學失之以洒埽應對進退之事所以長愛敬之端而防傲惰之萌使之循循而有進也其可忽諸論語集編卷七
