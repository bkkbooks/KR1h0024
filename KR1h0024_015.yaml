body:
  text: 欽定四庫全書論語集編卷十宋真德秀撰子張第十九此篇皆記弟子之言而子夏為多子貢次之蓋孔門自顔子以下頴悟莫若子貢自曽子以下篤實無若子夏故恃記之詳焉凡二十五章子張曰士見危致命見得思義祭思敬喪思哀其可已矣致命謂委致其命猶言授命也四者立身之大節一有不至則餘無足觀故言士能如此則庶乎其可矣南軒曰見危得致命見得則思義能次擇於義利之際也祭則思敬喪則思哀篤於本也愚案見危致命獨不言思蓋臨難而死士節之常有所不必思也子張曰執德不𢎞信道不篤焉能為有焉能為亡焉於虔反亡讀作無下同有所得而守之太狹則德孤有所聞而信之不篤則道廢焉能為有亡猶言不足為輕重或問𢎞之為寬廣奈何曰此以人之量而言也蓋人之所以體道者存乎德而其所以執德者存乎墾量有大小之不同故人之所以執德有𢎞而有不𢎞也夫總羣言該衆理而不自以為博兼至善具衆美而不自以為得知足以周萬物而於天下之事有不深察才足以濟衆務而於天下之事有所不屑為恢恢乎胸中常若冇餘地焉此非其量之大則其所以執德者孰能如是之寬廣而不迫哉易所謂寬以居之而曽子所謂可以任天下之重者正謂此耳其量之小者一善之得則先為主而若不可以有所容一事之當則必自負而若不可以有所加小有知則必欲用其知小有才則必欲試其才所謂執德不𢎞者蓋如此雖其所守之固若不可奪然亦安能為有亡哉黃氏曰或問以寬廣為𢎞乃集注未改之前之説與今集注之意實相通而有所發明故不得不兩存也篤堅確也易所謂確乎其不可拔而曽子所謂死而後已者正謂此耳觀子張之一言則為學之道信非褊心狹量質薄氣弱者之所可及也執道須𢎞不可道已得此道理不信更有此道理須是既下工夫又下工夫已理會又理會若只理會得二三分便謂只消恁地也如此者非是無只是不𢎞故子張云焉能為冇焉能為亡𢎞便知道理儘有自家心下儘有地步寬潤著得他在問執德不𢎞先生曰言其不廣也才狹益則容受不得不特是不能容人自家亦自不能容故才有許善必自矜見人之善必不好人告之以過亦不受從狹隘上生萬端病痛南軒曰執德𢎞則進德有地信道篤則志道不回茍為不然雖有為善之心亦若存若亡不能為有亡也程子曰信道不篤則執德無由𢎞子夏之門人問交於子張子張曰子夏云何對曰子夏曰可者與之其不可者拒之子張曰異乎吾所聞君子尊賢而容衆嘉善而矜不能我之大賢與於人何所不容我之不賢與人將拒我如之何其拒人也賢與之與平聲子夏之言迫狹子張譏之是也但其所言亦有過髙之病蓋大賢雖無所不容然大故亦所當絶不賢固不可以拒人然損友亦所當逺學者不可不察或問三章之説曰二子之言各有所偏斷以聖人之中道則初學大略當如子夏之言然於不可者亦疏之而已拒之則害乎交際之道成德大略當如子張之説然於其大故者亦不得而不絶也以是處之其庶幾乎南軒曰包注友交當如子夏泛交當如子張之説是蓋其交有淺深二子論交各為一義不可廢也若但與之泛然交際而已則固當尊賢而容衆嘉善而矜不能若與之為朋友之交則當與其可者拒其不可者但拒之之説微過耳然而在學者之分則子張之言未若子夏之嚴也而遽非子夏之説且曰我之大賢與於人何所不容其言若以成德自居者此亦其堂堂氣象也與子夏曰雖小道必有可觀者焉致逺恐泥是以君子不為也泥去聲小道如農圃醫卜之屬泥不通也楊氏曰百家衆猶耳目鼻口皆有所用而不能相通非無可觀也致逺則泥矣故君子不為也或問何以言小道之為農圃之屬曰小者對大之名正心修身以治人道之大者也專一家之業以治於人道之小者也然皆用於世而不可無者其始固皆聖人之作而各有一物之理焉是必有可觀也然能於此者或不能於彼而皆不可以達於君子之大道是以致逺恐泥而君子不為黃氏曰小道之不可以致逺者聖人之道自修身而齊家治國而平天下與夫參天地贊化育無適而不通也農圃醫卜之屬施之目前淺近不為無益然求其如聖人之道無所不通則不可也許行欲以並耕而治天下此孟子所以議其相率而為偽也或曰安知所謂小道者不指楊墨佛老之類而言邪曰小道合聖人之道而小者也異端違聖人之道而異者也小者猶可以施之近異者則不可頃刻而施也楊墨佛老之無父無君又何致遠而後不通哉所謂正牆面而立跬步不可行者也子夏曰日知其所亡月無忘其所能可謂好學也巳矣亡讀作無好去聲亡無也謂巳之所未有尹氏曰好學者日新而不失南軒曰致其知而不舍故其知日新保其冇而不違故其有常存日知其所亡謂日知其所未有也子夏曰博學而篤志切問而近思仁在其中矣四者皆學問思辨之事耳未及乎力行而為仁也然從事於此則心不外馳而所存自熟故曰仁在其中矣程子曰博學而篤志切問而近思何以言仁在其中矣學者要思得之了此便是徹上徹下之道又曰學不博則不能守約志不篤則不能力行切問近思在已者則仁在其中矣又曰近思者以類而推蘇氏曰博學而志不篤則大而無成泛問逺思則勞而無功問云云曰此全未是説仁處方是尋討箇求仁門路當從此去漸見效在其中謂有此理耳問云云如何謂之仁曰非是便為仁如言行寡尤悔非所以干祿而祿在其中博學篤志切問近思未便是仁然學者用力於此仁亦在其中矣問博學與近思亦不相妨否先生曰博學是都要理會過近思是注心著力處博學是箇大規模近思是漸進工夫如大學明明德於天下是大規模其中格物致知誠意正心修身齊家等便是次第處如博學亦豈一日都便要都學得了亦是漸漸學去曰篤志未説到行處否曰篤志只是至誠懇切以求之若只管泛濫外面博學更不懇切其志便成放而不知求底心便是頑麻不仁底人惟篤志又切問近思便有歸宿處此心不泛濫走作只在這窠坎裏仁便在其中問程子云云便是先生所謂從事於此則心不外馳而所存自熟之意乎曰然於是四者中見得箇仁底道理便是徹上徹下之道問以類而推曰節節推將去今人不曽以類而推蓋不曾先理會一件却理會一件若理會得一件逐件推將去相次亦不難問何謂類推曰此語道得好不要驀越不要陡頓只是就近傍那饒得處挨將去如這一件理會得透了又因這件推去做那一件如讀書讀第一段了便推第一段之類去讀第二段自此以往只管恁地去次第都理會得若開卷便要獵一過如何得直卿曰是理會得來便推去理會否曰只是傍易曉底挨將去如理會得親親即推類去仁民仁民是親親之類理會得仁民便推類去愛物愛物是仁民之類如刑于寡妻便推類去至于兄弟便推類去御家邦如修身便推類去齊家齊家便推類去治國只是一步了又一步南軒曰博學篤志切問近思不可便以此為仁而仁不外是也學者從事於此而不計其獲則循序而有至蓋不可以欲速而臆度也聖門論人大抵如此黃氏曰云云或曰何以知四者之專主於心之所存而言曰人惟無所用其心則其心泛濫而不一志之篤則此心常有所定向而不泛濫矣問不切思不近則其所用心皆在吾身之外切問而近思則皆求其在已者而無復外馳之患矣人能盡此四者則雖學問思辨之事而自有以得夫操存涵養之效所謂仁在其中矣子夏曰百工居肆以成其事君子學以致其道肆謂官府造作之處致極也工不居肆則遷於異物而業不精君子不學則奪於外誘而志不篤尹氏曰學所以致其道也百工居肆必務成其事君子之於學可不知所務哉愚案二説相須其義始備子夏曰小人之過也必文文去聲文飾之也小人憚於改過而不憚於自欺故必文以重其過子夏曰君子有三變望之儼然即之也溫聽其言也厲儼然者貌之莊溫者色之和厲者辭之確程子曰它人儼然則不溫溫則不厲惟孔子全之謝氏曰此非有意於變蓋並行而不相悖也如良玉溫潤而栗然南軒曰其為三變豈君子之強為哉禮樂無斯須而去身故其成就發見如此子夏曰君子信而後勞其民未信則以為厲已也信而後諫未信則以為謗己也信謂誠意惻怛而人信之也厲猶病也事上使下皆必誠意交孚而後可以有為子夏曰大德不踰間小德出入可也大德小德猶言大節小節間闌也所以止物之出入言人能先立乎其大者則小節距或未盡合理亦無害也吳氏曰此章不能無弊學者正不可以此自恕一以小差為無害則於大節必將有枉尺直尋者矣問伊川謂小德如援溺之事如何曰援溺事却是大處嫂溺不援是豺狼這處是當做更有甚麼出入子夏之説自有病只是他力量有行不及處然既是有力不及處則不免有些子小小事放過者已是不足豈可謂之可也蓋子夏為人不及其質亦弱夫子亦每提他如女為君子儒毋為小人儒無欲速無見小利之類南軒曰大德大體也小德節目也君子所存大體固有定至其酬酢之際用權以取中初無一定之執然未嘗不同歸焉如可以取可以無取可以與可以無與之類是也然而斯言以大德不踰間為本必大德不踰間而後小德可以出入蓋未嘗不在其間之中故曰可也不然本之不立而謂出入為可是小人之無忌憚而已南軒説甚善然非子夏本意姑存之子遊曰子夏之門人小子當灑掃應對進退則可矣抑末也本之則無如之何灑色賣反掃素報反子遊譏子夏弟子於威儀容節之間則可矣然此小學之末耳推其本如大學正心誠意之事則無有子夏聞之曰噫言遊過矣君子之道孰先傳焉孰後倦焉譬諸草木區以别矣君子之道焉可誣也有始有卒者其惟聖人乎别彼列反焉於虔反倦如誨不倦之倦區猶類也言君子之道非以其末為先而傳之非以其本為後而倦教但學者所至自有淺深如草木之有大小其類固有别矣若不量其淺深不問其生熟而概以髙且逺者強而語之則是誣之而已君子之道豈可如此若夫始終本末一以貫之則惟聖人為然豈可責之門人小子乎程子曰君子教人有序先傳以小者近者而後教以大者逺者非先傳以近小而後不教以逺大也又曰灑掃應對便是形而上者理無大小故也故君子只在謹獨又曰聖人之道更無精粗從灑掃應對與精義入神貫通只一理雖灑掃應對只看所以然如何又曰凡物有本末不可分本末為兩段事灑掃應對是其然必有所以然又曰自灑掃應對上便可到聖人事愚案程子第一條説此章文意最為詳盡其後四條皆以明精粗本末其分雖殊而理則一學者當循序而漸進不可厭末而求本蓋與第一條之意實相表裏非謂末即是本但學其末而本便在此也或問既曰理無大小又以為教人有序何也曰無大小者理也有序者事也正以理無大小而無不在以教人者不可不由其序而有所遺也蓋由其序則事之本末巨細無不各得其理而理之無大小者莫不隨其所在而無所遺不由其序而舍近求逺處下窺髙則不惟其所妄意者不可得而理之全體固已虧於切近細微之中矣此所以理無大小而教人者尤欲由其序也集義程子曰性命孝弟只是一統事就孝弟中便可盡性至命灑掃應對進退與盡性命亦是一事無有本末無有精粗謝氏曰古人須要就灑掃應對進退上養取誠意出來楊氏曰聖人所謂性與天道者豈嘗進夫灑掃應對進退之間哉故其始也即此以為學其卒也非離此而為道呂氏曰古之童子未冠為長者役而其心安焉蓋古之教養之道必本諸孝弟孝弟之心雖主於惻隱恭敬之端孝弟之行常在於灑掃應對執事走趨之際蓋有血氣者未有安於事人者也今使之知長之可敬甘於僕役而不辭是所以存其良心折其敖慢之氣然後可與進於德矣南軒曰小子習於灑掃應對進退之事是之謂小學由是而致夫知則存乎其人是之謂大學至於充之而盡亦初不離乎灑掃應對進退之間若以此為末而别求所謂本則是析本末為二體形而上者與形而下者不相管屬其為弊蓋有不可勝言者矣黃氏曰程子之言精矣然初學讀之莫有知其説者以易考之其曰形而上者蓋對形而下者言形非有象之可見特因下文形而下者而為文言器乃形而下而道則形而上也形而上則超乎事物之表專指事物之理而言也灑掃應對事雖至粗然其所以然者便是至精之理其曰理無大小者非以灑掃應對為小形而上者為大也蓋不但至大之事方有形而上之理雖至小之事亦有之故曰理無大小也其曰精義入神者蓋言精究事理極其微妙以至入神神者理之妙而不可測者今其所精之義至於入神則義之至精者也如夫子之言性與天道之類是也程子引此與灑掃應對之言蓋以至粗之事對至精之義也至精之義與至粗之義固不同然至粗之事其所以然者即至精之事也其曰是其然必有所以然者然之為言猶曰如此其如此者謂灑掃應對之節文也所以如此者謂有此理而後其節文之著見者如此者其曰使可列聖人事者蓋灑掃應對雖至小亦不過由天理之全體而著見於事物之節文聖人之所以為聖人者初不外乎此理特其事事物物皆由此理而不勉不思從容自中耳然嘗以集注所引程子四段細推之則首言理無大小以見事有大小而理則一也次言道無精粗以見學有精粗而道則一也又次言是其然必有所以然所以發明十二段所以無小大無精粗之意又次言便可至聖人事則亦以其所以然而無小大精粗者為之也亦足以見編次之意至精而不苟矣或曰集注又以程子第一條説本章文義為詳盡者然乎曰此亦取其所擇傳與倦之義為詳盡耳然以先後二字考之則程子先後以教者所施之次第而言集注先後以義理之精粗而言則程子之説又不若集注之説為當也子夏曰仕而優則學學而優則仕優有餘力也仕與學理同而事異故當其事者必先有以盡其事而後可及其餘然仕而學則所以資其仕者益深學而仕則所以驗其學者益廣或問云云曰仕優而學為己仕而言也蓋時必有仕而不學如原伯魯者故有是言學優而仕為未仕者言也蓋未有以明乎修已治人之道則未可以仕耳子産於子皮有製錦之譏而夫子亦説漆雕之對惡子路之佞程子以少年登科席勢為美官為不幸其意亦猶是耳子夏以此章以先後之次推之其本意蓋如此而推其餘意則又以明夫仕優而學則不免有背公徇私之失學已優而不仕則亦未免有愛身忘物之纍當時恐或兼有此意也南軒曰大學之道在明明德在新民成已成物無二致也古之人學以終其身故仕優則學學優則仕終始於學而無窮也愚案或問引原伯魯事出左氏傳昭十八年葬曹平公往者見周原伯魯焉與語不説學以語閔子馬閔子馬曰周其亂乎夫必多有是説而後及其大人大人患失而惑又曰可以無學無學則苟而可於是乎下陵上替能無亂乎夫學殖也不學將落原氏其亡乎子遊曰喪致乎哀而止致極其哀不尚文飾也楊氏曰喪與其易寧戚不若禮不足而哀有餘之意愚案而止二字亦微有過於髙逺而簡略細微之弊學者詳之子遊曰吾友張也為難能也然而未仁子張行過髙而少誠實惻怛之意曽子曰堂堂乎張也難與並為仁矣堂堂容貌之盛言其務外自髙不可輔而為仁亦不能有以輔人之仁也范氏曰子張外有餘而內不足故門人皆不與其為仁子曰剛毅木訥近仁寧外不足而內有餘庶可以為仁矣南軒曰雖有髙明之見卓絶之行謂之難能則可不害其為未仁也堂堂氣象所以為難與並仁也歟蓋是道也須深濳縝密親切篤志而後可以進故如愚之顔子聖人許其不違仁而堂堂之張曽子以為難與並為仁也曽子曰吾聞諸夫子人未有自致者也必也親喪乎致盡其極也蓋人之真情所不能自已者尹氏曰親喪固所自盡也於此不用其誠惡乎用其誠曽子曰吾聞諸夫子孟莊子之孝也其他可能也其不改父之臣與父之政是難能也孟莊子魯大夫名速其父獻子名蔑獻子有賢德而莊子能用其臣守其政故其他孝行雖有可稱而皆不若此事之為難或問鄧氏之説如何曰鄧氏之言曰獻子厯相三君五十年魯人謂之社稷之臣則其臣必賢其政必善矣莊子年少嗣立又與季孫宿同朝宿父文子忠於公室宿皆不能守而改之莊子乃獨能不改其父之臣與父之政而終身焉是孔子之所謂難也若父之臣與父之政有不善則是成其父之惡耳焉得為孝哉孟氏使陽膚為士師問於曽子曽子曰上失其道民散久矣如得其情則哀矜而勿喜陽膚曽子弟子民散謂情義乖離不相維繫謝氏曰民之散也以使之無道教之無素故其犯法也非迫於不得已則陷於不知也故得其情則哀矜而勿喜子貢曰紂之不善不如是之甚也是以君子惡居下流天下之惡皆歸焉惡居之惡去聲下流地形卑下之處衆流之所歸喻人身有汙賤之實亦惡名之所聚也子貢言此欲人常自警省不可一置其身於不善之地非謂紂本無罪而虛被惡名也子貢曰君子之過也如日月之食焉過也人皆見之更也人皆仰之更平聲衛公孫朝問於子貢曰仲尼焉學朝音潮焉於虔反公孫朝衛大夫子貢曰文武之道未墜於地在人賢者識其大者不賢者識其小者莫不有文武之道焉夫子焉不學而亦何常師之有識音下焉字於虔反文武之道謂文王武王之謨訓功烈與凡周之禮樂文章皆是也在人言人有能記之者識記也又曰此言未墜落於地而猶在人耳賢者則能記其道之大者不賢者則能記其道之小者皆有文武之道夫子皆師之也或問何以言文武之道為周之禮樂也曰此固好髙者之所不樂聞然其文意不過如此以未墜在人之云者考之則可見矣若曰道無適而非唯所取而得則又何時墜地且何必賢者識其大者不賢者識其小者而後得師邪此所謂人正謂老聃萇𢎞郯子師襄之儔耳若入大廟而每事問焉則廟之祀史亦一師也大率近世學者習於老佛佛言皆有厭薄事實貪騖髙逺之意故其説常如此不可以不戒也然彼所謂無適而非者亦豈離於文章禮樂之間哉但子貢本意則正指其事實而言不如是之空虛恍惚而無所據也南軒曰文武之道謂國家之制度典章在當時猶有存者未至盡泯也在人所識何如賢者則識其大者不賢者則識其小者至如鄉黨之間其冠昏喪祭日用飲飲亦習乎其教而不自知也然則夫子焉往而非學惟善之主而初無常師也此其所以能集文武之道而極其大全與叔孫武叔語大夫於朝曰子貢賢於仲尼語去聲朝音潮武叔魯大夫名州仇子服景伯以告子貢子貢曰譬之宫牆賜之牆也及肩窺見室家之好牆卑室淺夫子之牆數仞不得其門而入不見宗廟之美百官之富八尺曰仞不入其門則不見其中之所有言牆髙而宫廣也得其門者或寡矣夫子之云不亦宜乎此夫子指武叔黃氏曰叔孫武叔以子貢賢於仲尼子禽亦以仲尼豈賢於子貢自今觀之則三人之識見固謬矣然其敢於為此論者亦豈無説且其所謂子貢之賢者何也物之廣博者其藏蓄也必髙厚其中狹小則其外必卑薄此理之自然非其故為是髙厚卑薄之殊也人之常情有如是之力量然後有如是之見識故處下者不足以窺髙而淺近易見則人情之所共喜也豈惟宫牆為然哉雨露之澤物人皆知其為功而元氣之密運則人莫得而窺其際也子貢三稱夫子一稱宫牆一稱日月一以天喻其論愈精此子貢之所以為達也叔孫武叔毁仲尼子貢曰無以為也仲尼不可毁也他人之賢者丘陵也猶可踰也仲尼日月也無得而踰焉人雖欲自絶其何傷於日月乎多見其不知量也量去聲無以為猶言無用為此土髙曰丘大阜曰陵日月喻其至髙自絶謂以謗毁自絶於孔子多與祗同適也不知量謂不自知其分量南軒曰子貢善喻如宫牆日月之類皆可謂切矣丘陵固可踰泰山雖髙然猶有可踰之理至於日月之行天則孰得而踰之哉人之議日月者初無損於日月之明徒自絶於日月而已矣陳子禽謂子貢曰子為恭也仲尼豈賢於子乎為恭謂為恭敬推遜其師也子貢曰君子一言以為知一言以為不知言不可不愼也知去聲責子禽不謹言夫子之不可及也猶天之不可階而升也階梯也大可為也化不可為也故曰不可階而升夫子之得邦家者所謂立之斯立道之斯行綏之斯來動之斯和其生也榮其死也哀如之何其可及也道去聲立之謂植其生也道引也謂教之也行從也綏安也來歸附也動謂鼓舞之也和所謂於變時雍言其感應之妙神速如此榮謂莫不尊親哀則如喪考妣程子曰此聖人之神化上下與天地同流者也謝氏曰觀子貢稱聖人語乃知晚年進德蓋極於髙逺也夫子之得邦家者其鼓舞羣動捷於桴鼓影響人雖見其變化而莫窺其所以變化也蓋不離於聖而有不可知者存焉此殆難以思勉及也南軒曰子貢以日月喻聖人之不可踰矣復以天之不可階升喻聖人之不可及尤為切至也蓋大而化之非復思勉所及學者至此無所用其力是豈不猶天之不可階而升乎所謂立之斯立道之斯行綏之斯來動之斯和不疾而速不行而至惟天下至誠感無不通也其生也榮其死也哀民心戴之如天親之如父母也子貢知足知此其所造抑深矣黃氏曰子禽之問見於論語者凡三於夫子聞政則疑其有所求於伯魚則疑夫子之私其子於此章則又疑子貢之賢於仲尼其為人粗率而淺陋可知一言之善則可以為知一言之不善則遂為不知知與不知係於一言之間此言之不可不謹也由志學而立由立而不惑由可欲而有諸已由有諸已而充實皆可以階而升至於知天命有光輝已非有階級可漸次而進若夫耳順不踰矩化而不可知則德盛仁熟莫知其所以然而然但見仰之髙鑽之堅瞻之在前忽焉在後是豈得而階升也哉立之道之綏之動之皆聖人政化之施斯立斯行斯來斯和皆天下感動之速榮謂賴之以生故以為榮哀謂失其所依故為之哀戚子貢之稱夫子者如此或曰子貢知足以知聖人今乃不言其德而稱其得邦家之效何也曰天之德不可形容即其感人而見其神化之速天下之理實大則聲宏本深而木茂感動之淺深遲速未有不視其德之所至者也聖人道全德備髙明博厚則其感於物者如此因其感於物以反觀聖人之道豈不曉然而易見也哉此子貢之所以為善言聖人也堯曰第二十凡三章堯曰咨爾舜天之厯數在爾躬允執其中四海困窮天祿永終此堯命舜而禪以帝位之辭咨嗟歎聲厯數帝王相繼之次第猶歲時氣節之先後也允信也中者無過不及之名四海之人困窮則君祿亦永絶矣戒之也舜亦以命禹舜後遜位於禹亦以此辭命之今見於虞書大禹謨比此加詳曰豫小子履敢用玄牡敢昭告於皇皇后帝有罪不敢赦帝臣不蔽簡在帝心朕躬有罪無以萬方萬方有罪罪在朕躬此引商書湯誥之辭蓋湯既放桀而告諸侯也與書文大同小異曰上當有湯字履蓋湯名用玄牡夏尚黑未變其禮也簡閲也言桀有罪已不敢赦而天下賢人皆上帝之臣已不敢蔽簡在帝心惟帝所命此述其初請命而伐桀之辭也又言君有罪非民所致民有罪實君所為見其厚於責已薄於責人之意此其告諸侯之辭也周有大賚善人是富賚來代反此以下述武王事賚豫也武王克商大賚于四海見周書武成篇此言其所富者皆善人也詩序云賚所以鍚豫善人蓋本於此雖有周親不如仁人百姓有過在豫一人此周書泰誓之辭孔氏曰周至也言紂至親雖多不如周家之多仁人謹權量審法度修廢官四方之政行焉權稱錘也量斗斛也法度禮樂制度皆是也興滅國繼絶世舉逸民天下之民歸心焉興滅繼絶謂封黃帝堯舜夏商之後舉逸民謂釋箕子之囚復商容之位三者皆人心之所欲也所重民食喪祭武成曰重民五教惟食喪祭寬則得衆信則民任焉敏則有功公則説説音悅此於武王之事無所見恐或泛言帝王之道也楊氏曰論語之書皆聖人微言而其徒傳守之以明斯道者也故於終篇具載堯舜咨命之言湯武誓師之意與夫施諸政事者以明聖學之所傳者一於是而已所以著明二十篇之大旨也孟子於終篇亦厯序堯舜湯文孔子相承之次皆此意也南軒曰此篇所載帝王之事孔子之所常言門人列於末章所以示後世之大法也黃氏曰論語末篇厯序堯舜禹湯武王相傳之道而先之以執中可謂得其要矣至其下乃泛及於賞善罰惡責已恕人大綱小紀末數末度無不具舉者蓋帝王之道初無精粗惟其合於天理當於人心者是其所以為道也所謂執中者正以其事事物物無適而非中也是豈空虛無據而可謂之中乎知此然後知聖賢相傳之道無非實理非若老釋空無之謂也子張問於孔子曰何如斯可以從政矣子曰尊五美屏四惡斯可以從政矣子張曰何謂五美子曰君子惠而不費勞而不怨欲而不貪泰而不驕威而不猛費芳味反子張曰何謂惠而不費子曰因民之所利而利之斯不亦惠而不費乎擇可勞而勞之又誰怨欲仁而得仁又焉貪君子無衆寡無小大無敢慢斯不亦泰而不驕乎君子正其衣冠尊其瞻視儼然人望而畏之斯不亦威而不猛乎焉於虔反子張曰何謂四惡子曰不教而殺謂之虐不戒視成謂之暴慢令致期謂之賊猶之與人也出納之吝謂之有司出去聲虐謂殘酷不仁暴謂卒遽無序致期刻期也賊者切害之意緩於前而急於後以誤其民而必刑之是賊害之也猶之猶言均之也均之以物與人而於其出納之際乃或吝而不果則是有司之事而非為政之體所與雖多人亦不懷其惠矣項羽使人有功當封刻印刓忍弗能豫卒以取敗亦其驗也尹氏曰告問政者多矣未有如此之備者也故記之以繼帝王之治則夫子之為政可知也子曰不知命無以為君子也程子曰知命者知有命而信之也人不知命則見害必避見利必趨何以為君子胡氏曰一定而不易者命也人不知命常求其所不可得避其所不可免所以徒喪所守而為小人也南軒曰此所謂命謂窮達得喪之有定也不知命則將徼幸而苟且何以為君子乎知命則志定然後其所當為者可得而為矣不知禮無以立也不知禮則耳目無所加手足無所措不知言無以知人也言之得失可以知人之邪正尹氏曰知斯三者則君子之事備矣弟子記此以終篇得無意乎學者少而讀之老而不知一言為可用不幾於侮聖言者乎夫子之罪人也可不念哉論語集編卷十
