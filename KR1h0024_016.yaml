body:
  text: 欽定四庫全書孟子集編卷一朱子集注孟子序說史記列傳曰孟軻趙氏曰孟子魯公族孟孫之後漢書注云字子車一說字子輿騶人也騶亦作鄒本邾國也受業子思之門人子思孔子之孫名伋索隐云王劭以人為衍字而趙氏注及孔叢子等書亦皆云孟子親受業於子思未知是否道既通趙氏曰孟子通五經尤長扵詩書程子曰孟子曰可以仕則仕可以止則止可以久則处可以速則速孔子聖之時者也故知易者莫如孟子孟子又曰王者之迹熄而詩亡詩亡然後春秋作又曰春秋無義戰又曰春秋天子之事故知春秋莫如孟子尹氏曰以此而言則趙氏謂孟子長扵詩書而已豈知孟子哉㳺事齊宣王宣王不能用適梁梁恵王不果所言則見以為迂逺而闊扵事情按史記梁恵王之三十五年乙酉孟子始至梁其後二十三年當齊湣王之十年丁未齊人伐燕而孟子在齊故古史謂孟子先事齊宣王後乃見梁恵王襄王齊湣王獨孟子以伐燕為宣王時事與史記荀子等書皆不合而通鑑以伐燕之嵗為宣王十九年則是孟子先㳺梁而後至齊見宣王矣然考異亦無他據又未知孰是也當是之時秦用商鞅楚魏用吴起齊用孫子田忌天下方務扵合從連衡以攻伐為賢而孟軻乃述唐虞三代之徳是以所如者不合退而與萬章之徒序詩書述仲尼之意作孟子七篇趙氏曰凡二百六十一章三萬四千六百八十五字韓子曰孟軻之書非軻自著軻既沒其徒萬章公孫丑相與記軻所言焉耳愚按二說不同史記近是韓子曰堯以是傳之舜舜以是傳之禹禹以是傳之湯湯以是傳之文武周公文武周公傳之孔子孔子傳之孟軻軻之死不得其傳焉荀與揚也擇焉而不精語焉而不詳程子曰韓子此語非是蹈襲前人又非鑿空撰出必有所見若無所見不知言所傳者何事又曰孟氏醇乎醇者也荀與揚大醇而小疵程子曰韓子論孟子甚善非見得孟子意亦道不到其論荀揚則非也荀子極偏駁只一句性悪大本已失揚子雖少過然亦不識性更說甚道又曰孔子之道大而能博門弟子不能徧觀而盡識也故學焉而皆得其性之所近其後離散分處諸侯之國又各以其所能授弟子源逺而末益分惟孟軻師子思而子思之學出扵曽子自孔子沒獨孟軻氏之傳得其宗故求觀聖人之道者必自孟子始程子曰孔子言参也魯然顔子沒後終得聖人之道者曽子也觀其啓手足時之言可以見矣所傳者子思孟子皆其學也又曰揚子雲曰古者楊墨塞路孟子辭而闢之廓如也夫楊墨行正道廢孟子雖賢聖不得位空言無施雖切何補然賴其言而今之學者尚知宗孔氏崇仁義貴王賤霸而已其大經大法皆亡滅而不救壞爛而不收所謂存十一扵千百安在其能廓如也然向無孟氏則皆服左衽而言侏離矣故愈嘗推尊孟氏以為功不在禹下者為此也或問扵程子曰孟子還可謂聖人否程子曰未敢便道他是聖人然學已到至處愚案至字恐當作聖字程子又曰孟子有功扵聖門不可勝言仲尼只說一箇仁孟子開口便說仁義仲尼只說一箇志孟子便說許多養氣出来只此二字其功甚多又曰孟子有大功扵世以其言性善也又曰孟子性善養氣之論皆前聖所未𤼵又曰學者全要識時若不識時不足以言學顔子陋巷自樂以有孔子在焉若孟子之時世既無人安可不以道自任又曰孟子有些英氣才有英氣便有圭角英氣甚害事如顔子便渾厚不同顔子去聖人只豪髮間孟子大賢亞聖之次也或曰英氣見扵甚處曰但以孔子之言比之便可見且如冰與水晶非不光比之玉自是有温潤含蓄氣象無許多光耀也楊氏曰孟子一書只是要正人心教人存心養性收其放心至論仁義禮智則以惻隠羞悪辭讓是非之心為之端論邪說之害則曰生扵其心害扵其政論事君則曰格君心之非一正君而國定千變萬化只說從心上来人能正心則事無足為者矣大學之修身齊家治國平天下其本只是正心誠意而已心得其正然後知性之善故孟子遇人便道性善歐陽永叔却言聖人之教人性非所先可謂誤矣人性上不可添一物堯舜所以為萬世法亦是率性而已所謂率性循天理是也外邊用計用數假饒立得功業只是人欲之私與聖賢作處天地懸隔
