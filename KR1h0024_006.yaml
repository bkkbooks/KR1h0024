body:
  text: 欽定四庫全書論語集編卷一宋真德秀撰學而第一朱子曰此為書之首篇故所記多務本之意乃入道之門積德之基學者之先務也凡十六章子曰學而時習之不亦説乎而學之為言效也人性皆善而覺有先後後覺者必效先覺之所為乃可以明善而復其初也習鳥數飛也學之不已如鳥數飛也説喜意也既學而又時時習之則所學者熟而中心喜説其進自不能己矣程子曰習重習也時復思繹浹洽於中則説也又曰學者將以行之也時習之則所學者在我故説謝氏曰時習者無時而不習坐如尸坐時習也立如齊立時習也有朋自逺方來不亦樂乎朋同類也自逺方來則近者可知程子曰以善及人而信從者衆故可樂又曰説在心樂主發散在外人不知而不愠不亦君子乎愠紆問反愠含怒意君子成德之名尹氏曰學在已知不知在人何愠之有程子曰雖樂於及人不見是而無悶乃所謂君子愚謂及人而樂者順而易不知而不愠者逆而難故惟成德者能之然德之所以成亦曰學之正習之熟説之深而不已焉耳程子曰樂由説而後得非樂不足以語君子或問學之為效何也曰所謂學者有所效於彼而求其成於我之謂也以已之未知而效夫知者以求其知以已之未能而效夫能者以求其能皆學之事也曰學而時習何以説也曰人而不學則無以知其所以為人之理無以能某所以為人之事固不足以謂之人矣然學矣而不習則表裏扞格而無以致其學之之道習矣而不時則工夫間斷而無以成其習之之功是以雖曰知之而枯燥生澀無可嗜之味雖曰能之而危殆杌隉無可即之安如是而求有以勝夫氣稟物欲之私亦何自而能得哉是以聖人之教使人既學矣而於其所學又必時時習之則其心與理相涵而所知者益精身與事相安而所能者益熟此其中心油然恱懌之味雖芻豢之甘於口亦不足以喻其美此學之始也曰以善及人而信從者衆若何而可樂邪曰聞之張子曰性者萬物之一原非有我之所得私也惟夫人為能盡其道故立必俱立知必周知愛必兼愛成不獨成彼自蔽塞而不能順我理者則亦末如之何矣嘗以是觀之而朋來之樂其指可知然吾之善未充而無以取信於彼雖欲求以告之亦將不吾顧矣惟其有以充諸身而形諸外則彼之望風覿德者自將敬信服從之不暇蓋近者既至而逺者畢來以學於吾之所學而求以復其初凡吾之所得而恱諸心者彼亦將有以得而恱之而無物我之間是其歡欣交通融怡和樂之意所以盈於內而逹於外者又豈手舞足蹈之可言哉是學之中也曰人不知而不愠何以為君子也曰常人之情人不知而不能不愠者有待於外也若聖門之學則其本心正以為己而已初非為是以求人之知也人知之人不知之亦何加損於我哉然人雖或聞此矣而信之有不篤飬之有不厚守之有不固則居之不安而臨事未必果能真不動也今也人不見知而處之泰然略無纎介含怒不平之意非成德之士信之篤而飬之厚守之固而居之安其孰能之故必如是而得夫君子之名苟自是日進而不已焉則不怨不尤下學上逹以馴致於聖人亦不難矣此學之終也或曰學有大小此所為學其大學邪曰不然也學而習習而恱凡學皆然不以大小而有間也且灑掃應對之事正門人小子之所冝先者而大學之基也聖人豈略之哉曰程子之於習有兩義焉何也曰重復思繹者以知者言也所學在我者以能者言也學之為道不越乎兩端矣曰時習之所以説諸説孰近夫習而熟熟而説脈絡貫通最為親切程子所謂浹洽者是也曰朋來之樂奈何曰惟以程子之言求之然後見夫樂之實且其以善及人而信從者衆之云才九字耳而無一字之虗設也非見之明而驗之實其孰能與於此曰説樂皆出於心而程子有內外之辨何也曰程子非以樂為在外也以為積滿於中而發越乎外耳説則方得於內而未能逹於外也不愠之説孰為得曰程子得之至論其所以然者則尹氏為尤切使人之始學即知是説以立其心則庶乎其無慕於外矣南軒曰人有所當知有所當能皆天理也惟夫人未之知能也則貴於學焉學之為言效也效夫善而勉之於已也學貴於時習者重復溫繹其所已知己能者也蓋不習不時則其趣不熟其守不固荒疏危殆雖暫得之亦且失之矣惟夫學焉而時習之則浹洽貫通其説有不可既焉有朋自逺方來志同者應講習相資其樂孰尚樂之義比於説為發舒也雖然朋來固可樂而人之不知亦不愠也蓋為仁由已亦豈與於知不知乎案二先生釋朋來而樂之義不同嘗參之詳説曰學既有得同類之人自逺而至已之所得有以及於人者廣人之所得有以裕於已者多則不但中心自説而已則朱子初説亦取人已相資之意而卒從程説者蓋已之學僅有得焉能使同類之逺至必其善可以及人然後從之者多也有子曰其為人也孝弟而好犯上者鮮矣不好犯上而好作亂者未之有也弟好皆去聲鮮上聲下同有子孔子弟子名若善事父母為孝善事兄長為弟犯上謂干犯在上之人鮮少也作亂則為悖逆爭鬬之事矣此言人能孝弟則其心和順少好犯上必不好作亂也君子務本本立而道生孝弟也者其為仁之本與務專力也本猶根也仁者愛之理心之德也為仁猶曰行仁與者疑辭謙退不敢質言也言君子凡事專用力於根本根本既立則其道自生若上文所謂孝弟乃是為仁之本學者務此則仁道自此而生也程子曰孝弟順德也故不好犯上豈復有逆理亂常之事德有本本立則其道充大孝弟行於家而後仁愛及於物所謂親親而仁民也故為仁以孝弟為本論性則以仁為孝弟之本或問孝弟為仁之本此是由孝弟可以至仁否曰非也謂行仁自孝弟始孝弟是仁之一事謂之行仁之本則可謂是仁之本則不可蓋仁是性也孝弟是用也性中只有箇仁義禮智四者而已曷嘗有孝弟來然仁主於愛而愛莫大於愛親故曰孝弟也者其為仁之本與集義明道先生曰孝弟本其所以生乃為仁之本或問為仁先從愛物推如何伊川先生曰不愛其親而愛他人者謂之悖德不敬其親而敬他人者謂之悖禮故君子親親而仁民仁民而愛物能親親豈不能仁民能仁民豈不能愛物仁民而推親親墨子也或問仁何以為愛之理曰人稟五行之秀以生故其為心也未發則具仁義禮智信之性以為之體已發則有惻隱羞惡恭敬是非誠實之情以為之用蓋木神曰仁則愛之理也而其發為惻隱火神曰禮則敬之理也而其發為恭讓金神曰義則冝之理也而其發為羞惡水神曰智則别之理也而其發為是非土神曰信則實冇之理也而其發為忠信是皆天理之固然人心之所以為妙也仁之所以為愛之理於此其可推矣或曰仁為愛之理矣又以為心之德何哉曰仁之道大不可以一言盡程子論乾四德之元猶五常之仁偏言則一事專言則包四者推此而言則可見矣蓋仁者五常之首也而包四者惻隱之體也而貫四端故仁之為義偏言之則曰愛之理此章孝弟為仁之本是也其實愛之理所以為心之德是以聖門之學必以求仁為要而語其所以行之者則必以孝弟為先論其所以賊之者則惟以巧言令色為甚記語者所以列二章於首章之次欲學者以知仁為急而識其所當務與其所當戒也曰程子以孝弟為行仁之本而又曰論性則以仁為孝弟之本何也曰仁之為性愛之理也其見於用則事親從兄仁民愛物皆其為之之事也此論性而以仁為孝弟之本者然也但親者我之所自出兄者同出而先我故事親而孝從兄而弟乃愛之先見而尤切若君子以此為務而力行之至於行成而德立則自親親而仁民自仁民而愛物其愛有等差其施有漸次而為仁之道生生而不窮矣此孝弟所以為行仁之本也曰然則所謂性中但有仁與義禮智而無孝弟者又何邪曰此亦以為自性而言則始有四者之名而未有孝弟之目耳非謂孝弟之理不夲於性而生於外也曰然則禮義智信為之亦有本邪曰有請問之曰亦孝弟而已矣但以愛親而言則為仁之本其順乎親則為義之本敬乎親則為禮之本其知乎此者則為智之本其誠乎此者則為信之本蓋人之所以為五常百行之本無不在此孟子之論仁義智禮樂之實者正在是耳此其所以為至德要道也歟引程子云云譬如一粒粟生出為苖仁是粟孝弟是苖便是仁為孝弟之本又如木有根有幹有枝有葉親親是根仁民是幹愛物是枝葉便是行仁以孝弟為本性中只有仁義禮智四者仁便包攝孝弟在其中但未發出來未有孝弟之名耳非孝弟與仁各是一物性中只有仁而無孝弟也仁所包攝不止孝弟几慈愛之屬皆所包也伊川云為仁以孝弟為本事之本守之本之類是也論性以仁為孝弟之本天下之大本之類是也黃氏曰先師嘗言二程子之解釋經義非諸儒所能及程伯子曰孝弟本其所以生乃為仁之本此語最深切蓋推原孝弟之理本於父母之所以生所以為行仁之本也或曰仁者愛之理心之德先師言之詳矣而學者未之能曉也曰仁性也既曰愛又曰心何也天地之大德曰生天地之所以為德語其全體而極其大用不過曰生而已生之外無他道也天地以是為心而人得天地之心以為心故其所以為仁者愛是也仁固主於愛然人之一心有仁有義有禮有智其所以為德者非一然仁包四德而貫四端則凡吾心之全德莫非仁也論仁之所專主而至切者則曰愛論仁之所兼統而至廣者則曰心不若是不足以盡其羲也曰愛矣而又曰愛之理曰心矣而又曰心之德何也曰愛自是情仁自是性程子言之矣愛非所以言仁也曰愛之理則是仁者乃愛之理而非愛也蓋指性而言也合性與知覺有心之名張子言之矣言心則合性知覺而言曰心之德則專指此心所得之理所謂性也而凡所具之理皆在其中矣既曰愛之理心之德則釐而為二矣又曰其實愛之理所以為心之德何也曰論其專主而至切者固曰愛之理然其兼統而至廣者亦豈離乎愛之理哉故春者生意之生也夏者生意之長也秋者生意之斂也冬者生意之藏也蓋無適而非生意也方其靜也則一生意足以包四德及其動也則一生意足以貫四端則愛之理心之德豈有二事哉但别而言之庶其部分位置截然不亂又合而言之使其倫理脈絡渾然無間是則先師之意也孔門教人莫切於求仁歷代諸儒推明其義卒無至當之論自程子一為主一事包四者之言而先師立愛之理心之德六字以斷之而又一離一合以極其指歸使天命人心之奧聖賢典訓之微一旦燦然大明其功豈可量哉子曰巧言令色鮮矣仁巧好令善也好其言善其色致飾於外務以恱人則人欲肆而本心之德亡矣聖人辭不迫切專言鮮則絶無可知學者所當深戒也程子曰知巧言令色之非仁則知仁矣或問辭欲巧令儀令色何以異於此章所謂巧言令色乎曰為已為人之不同而已意誠在於為已則容貌辭氣之間無非持飬用力之地一有意於為人而求其恱巳則心失其正而鮮仁矣只馳心於外便是不仁南軒曰此所謂巧言令色欲以恱人之觀聼者其心如之何故為鮮矣仁或曰君子之於言色未嘗有所苟也則如何曰君子之修身謹於言辭容色之間乃所以體當在已之實事是求仁之要也曽子曰吾日三省吾身為人謀而不忠乎與朋友交而不信子傳不習乎省悉井反為去聲傳平聲曽子孔子弟子名參字子輿盡已之謂忠以實之謂信傳謂受之於師習謂熟之於已曽子以此三者曰省其身有則改之無則加勉其自治誠切如此可謂得為學之本矣而三者之序則又以忠信為傳習之本也尹氏曰曽子守約故動必求諸身謝氏曰諸子之學皆出於聖人其後愈逺而愈失其真獨曽子之學專用心於內故傳之無弊觀於子思孟子可見矣惜乎其嘉言善行不盡傳於世也其幸存而未泯者學者其可不盡心乎或問程子所謂盡已之謂忠以實之謂信何也曰盡已之心而無隱所謂忠也以其出乎內者而言也以事之實而無違所謂信也以其發乎外者而言也然未有忠而不信未有信而不出於忠者故又曰發已自盡為忠循物無違謂信表裏之謂也亦此之謂而加密焉耳曰程子又謂忠信者以人言之要之則實理何也曰信之為信實冇之理也凡性之所謂仁義禮智皆實有而無妄者也所謂實理者是也其見於用則出於心而自盡者謂之忠以其物而無違者謂之信而凡四端之發必以是為主焉所謂以人言之者是也蓋五行之氣各居一方而王一時惟土無不在故居中央而分王於四季是則天理之本然而人之所稟以生者莫不象之此人之所以克肖天地而為萬物之靈也忠信一也但發於心而自盡則為忠驗於理而不違則為信忠是信之本信是忠之發忠信只是一事而相為內外始終本末存於已為忠見於物為信發已自盡謂凡出於已者必自竭盡而不使其冇苟簡不盡之意循物無違謂信謂言語之發循其物之本實而無所背戾如大則言大小則言小循於物而無所違耳荀子曰君子博學而日參省乎已則智明而行無過矣問未為人謀未交友朋時所謂忠信如何做工夫朱子引程子雞鳴為善只是主敬之説曰只是存飬此心在這裏照管勿差失此便是不動而敬不言而信處南軒曰曽子以此三者自省可謂為已篤實之功矣子曰道千乘之國敬事而信節用而愛人使民以時道乘皆去聲道治也千乘諸侯之國其地可出兵車千乘者也敬者主一無適之謂敬事而信者敬其事而信於民也時謂農隙之時言治國之要在此五者亦務本之意也程子曰此言至淺然當時諸侯果能此亦足以治其國矣聖人言雖至近上下皆通此三言者若推其極堯舜之治亦不過此若常人之言近則淺近而已矣楊氏曰上不敬則下慢不信則下疑下慢而疑事不立矣敬事而信以身先之也易曰節以制度不傷財不害民蓋侈用則傷財傷財必至於害民故愛民必先於節用然使之不以其時則力本者不獲自盡雖有愛人之心而人不被其澤矣然此特論其所存而已未及為政也苟無是心則雖有政不行焉胡氏曰凡此數者又皆以敬為主愚謂五者反復相因各有次第讀者宜細推之子曰弟子入則孝出則弟謹而信泛愛衆而親仁行有餘力則以學文弟子之弟上聲則弟之弟去聲謹者行之有常也信者言之有實也泛廣也衆謂衆人親近也仁謂仁者餘力猶言暇日以用也文謂詩書六藝之文程子曰為弟子之職力有餘則學文不修其職而先文非為已之學也尹氏曰德行本也文藝末也窮其本末知所先後可以入德矣洪氏曰未有餘力而學文則文滅其質有餘力而不學文則質勝而野愚謂力行而不學文則無以考聖賢之成法識事理之當然而所行或出於私意非但失之於野而已南軒曰聖人之言貫徹上下此章雖言為弟為子之職始學者之事然充而極之為賢為聖蓋不外是也子夏曰賢賢易色事父母能竭其力事君能致其身與朋友交言而有信雖曰未學吾必謂之學矣子夏孔子弟子姓卜名商賢人之賢而易其好色之心好善有誠也致猶委也委致其身謂不有其身也四者皆人倫之大者而行之必盡其誠學求如是而已故子夏言有能如是之人苟非生質之美必其務學之至雖或以為未嘗為學我必謂之已學也遊氏曰三代之學皆所以明人倫也能是四者則於人倫厚矣學之為道何以加此子夏以文學名而其言如此則古人之所謂學者可知矣故學而一篇太抵皆在於務本吳氏曰子夏之言其意善矣然辭氣之間抑揚太過其流之弊將或至於廢學必若上章夫子之言然後為無弊也或問賢賢而言易色何也曰孔子兩言未見好德如好色而中庸亦以逺色為勸賢之事則古人之言其以德色相為消長者舊矣南軒曰子夏之意非謂能如是則不待夫學也蓋所以貴乎學者在此而不在彼欲學者務其本也首言賢賢易色夫能親賢固學之先務也不曰不學而曰未學辭蓋涵蓄矣子曰君子不重則不威學則不固重厚重威威嚴固堅固也輕乎外者必不能堅乎內故不厚重則無威嚴而所學亦不堅固也主忠信人不忠信則事皆無實為惡則易為善則難故學者必以是為主焉程子曰人道唯在忠信不誠則無物且出入無時莫知其鄉者人心也若無忠信豈復冇物乎遊氏曰忠信所以進德也如甘之受和白之受采故善學者其心以忠信為主不言則已言則必忠信也故其言為德言不行則已行則必忠信也故其行為德行止而思動而為無時不在是焉則安往而非進德哉故為仁不主於忠信則仁出於姑息為義不出於忠信則義必出於矯亢操是心以往則禮必出於足恭智必出於行險安往而非敗德哉而何進德之有焉譬之欲立數仞之牆而浮埃積沫以為之基亦沒世不能立矣故主忠信者學者之要言也愚案論語止言忠信不言誠至子思孟子然後言誠蓋誠指全體而言忠信指用功處而言忠是盡於中者信是形於外者有忠方有信不信則非所以為忠二者表裏體用之謂如形之有影也心無不盡之謂忠言與行無不實之謂信盡得忠與信即是誠故孔子雖不言誠但欲人於忠信上著力忠信無不盡則誠在其中矣孔子教人大抵只就行處説行到盡處自然識得本源子思孟子則併本源發出以示人其義一也無友不如已者無毋通禁止辭也友所以輔仁不如已則無益而有損過則勿憚改勿亦禁止之辭憚畏難也自治不勇則惡日長故有過則當速改不可畏難而苟安也程子曰學問之道無他也知其不善則速改以從善而已程子曰君子自修之道當如是也遊氏曰君子之道以威重為質而學以成之學之道必以忠信為主而以勝已者輔之然或吝於改過則終無以人德而賢者亦未必樂告以善道故以過勿憚改終焉南軒曰學以重為先重者視聽言動之際不敢以易也夫然則暴慢逺而德性充其思必謹其行必果其守必篤學之所以固也不然則無以持其外而非心易以入雖得之必失之主忠信主字有力蓋斯須不忠信則思慮言行皆無所據依同於無物主乎忠信則立於實地德所以進也取友當求勝已者曽已之不如則惰志而害德矣過勿憚改見過則速改也人所以不能改過者以憚之之故耳夫重者嚴於外者也忠信者存乎中者也存中以制外嚴於外所以保其中也而資友以輔之改過以成之君子之學不越於是矣愚案成湯之聖猶改過不吝顔子之賢猶曰不二過以此可見雖聖賢必以改過為貴若知其為過而不肯改則是文過遂非而流於惡矣蓋無心而誤謂之過有心而為謂之惡不待别為不善方謂之惡只知過不改是有心便謂之惡曽子曰愼終追逺民德歸厚矣謹終者喪盡其禮追逺者祭盡其誠民德歸厚謂下民化之其德亦歸於厚蓋終者人之所易忽也而能謹之逺者人之所易忘也而能追之厚之道也故以此自為則已之德厚下民化之則其德亦歸於厚也子禽問於子貢曰夫子至於是邦也必聞其政求之與抑與之與子禽姓陳名亢子貢姓端木名賜皆孔子弟子或曰亢子貢弟子未知孰是抑反語辭子貢曰夫子溫良恭儉讓以得之夫子之求之也其諸異乎人之求之與溫和厚也良易直也恭莊敬也儉節制也讓謙遜也五者夫子之盛德光輝接於人者也其諸語辭也人他人也言夫子未嘗求之但其德容如是故時君敬信自以其政就而問之耳非若他人必求之而後得也聖人過化存神之妙未易窺測然即此而觀則其德盛禮恭而不願乎外亦可見矣學者所當濳心而勉學也謝氏曰學者觀於聖人威儀之間亦可以進德矣若子貢亦可謂善觀聖人矣亦可謂善言德行矣今去聖人千五百年以此五者想見其形容尚能使人興起而況於親炙之者乎張敬夫曰夫子至是邦必聞其政而未有能委國而授之以政者蓋見聖人之儀形而樂告之者秉彞好德之良心也而私欲害之是以終不能用耳愚謂溫和厚也只和一字不足盡溫之義只厚一字亦不足以盡溫之義必兼二字者和如春風和氣之和厚如坤厚載物之厚和不慘暴也厚不刻薄也良易直也亦如前義易者平易也不艱險也直正直也不邪曲也恭莊敬也莊主容貌而言敬主心內而言自中而發外故曰恭儉節制也節制二字相似而實不同節乃自然之節限且如一年冇八節四立二分二至是也四十五日而一換乃天地自然之界限故曰節制乃用力裁制之意義以制事禮以制心謂如事理合當如此即是義裁制之若以刀裁物也一念慮之非即以禮裁制之亦如刀之裁物也讓謙遜也謙謂不矜已之善遜謂推善以及人子曰父在觀其志父沒觀其行三年無改於父之道可謂孝矣行去聲父在子不得自專而志則可知父沒然後其行可見故觀此足以知其人之善惡然又必能三年無改於父之道乃見其孝不然則所行雖善亦不得為孝矣尹氏曰如其道雖終身無改可也如其非道何待三年然則三年無改者孝子之心有所不忍故也遊氏曰三年無改亦謂在所當改而可以未改者耳或問此章之指猶有可取者乎曰朝氏洪氏之説亦善朝氏曰三年無改於父之道此觀行之一節也洪氏曰父沒雖可以行其志然改父之道於三年之中則無愛親之心而其行亦不足觀矣曰所取尹遊之説何也曰尹氏得其用心之本遊氏得其制事之宜二説相須為不可易矣曰必若尹遊之説則夫子之言得無有不盡者乎曰為人子者本以守父之道不忍冇改為之心至其所遇之不同則隨其輕重而以義制之耳三年而改者意其有為而言也其不可改則終身不改固不待言其不可以待三年者則又非常之變亦不可以預言矣善讀者推類而求之或終身不改或三年而改或甚不得已則不待三年而改顧其所遇之如何但不忍之心則不可無耳或曰昔謝方明承前代人不易其政其必宜改則漸變之使無迹可尋為人子者不幸而父之道冇當必改者以是為法而隱忍遷就於理義之中不亦可乎曰吾常聞之師曰以為此其意則固善矣然用心每每如此則駸駸然所失多矣若不得已但當至誠哀痛以改之而已何以隱忍遷就之云乎此言足以警學者用心之微矣南軒曰舊説為父在能觀其志而承順之父沒觀其行而擬述之此説文理為順案二先生之説不同姑兩存之案書蔡仲之命爾尚蓋前人之愆惟忠惟孝父子不幸如大禹之承鯀蔡仲之承蔡叔又當思所以蓋之故治水成功而鯀配夏郊率德改行而蔡叔世祀豈非孝之大乎後世如沈充叛臣也其子徑以死節著李義府姦臣也其子湛以忠義聞若徑與湛可謂能蓋其父之愆矣又穀梁傳孝子成父之美不成父之惡故魏顆從治命君子是之魯隱與桓春秋弗取是亦不可不知也有子曰禮之用和為貴先王之道斯為美小大由之禮者天理之節文人事之儀則也和者從容不迫之意蓋禮之為體雖嚴而皆出於自然之理故其為用必從容而不迫乃為可貴先王之道此其所以為美而小事大事無不由之也有所不行知和而和不以禮節之亦不可行也承上文而言如此而復有所不行者以其徒知和之為貴而一於和不復以禮節之則亦非復禮之本然矣所以流蕩忘反而亦不可行也程子曰禮勝則離故禮之用和為貴先王之道以斯為美而小大由之樂勝則流故有所不行者知和而和不以禮節之亦不可行范氏曰凡禮之體主於敬而其用則以和為貴敬者禮之所以立也和者樂之所由生也若有子可謂逹禮樂之本矣愚謂嚴而泰和而節此理之自然禮之全體也毫釐有差則失其中正而各倚於一偏其不可行均矣或問禮之有和何也曰禮之所以有是品節之詳者皆出於人心自然之節非以人之所不欲者強之也故行之雖或甚苦而自有不失其和者若不本於此而徒勉強於儀貌之間則是徒禮而無和矣黃直卿云內則一篇子事父母之禮亦嚴矣然下氣怡色則和可知也玉藻鄉黨所載臣之事君禮亦嚴矣然二爵言言三爵油油君在與與則和可知也先生曰如此則和與禮成二物矣須是見得禮便是和方可如入公門鞠躬如不容可謂至嚴矣然甘心為之而無厭倦之意者乃所以為和也至嚴之中便是至和處不可分作兩截看禮之用和是禮中之和知和而和已離却禮禮中自有和須是知得當如此則行之自然到和處因舉龜山與薛宗博説會職事茶事薛曰禮起聖人之偽今日會茶莫不須得如此龜山曰只此打不過處便見得禮非聖人之偽禮之用和為貴只為不如此則心有不安故行之自和耳禮之和處便是禮之樂樂之有節處便是樂之禮禮主於敬而其用以和為貴然如何得他敬而和著意做不得才著意嚴敬便拘迫而不安要放寬些又流蕩而無節須是真箇識得禮之自然處則事事物物上都有自然之節文雖欲不如此不可得故雖嚴而未嘗不和雖和而未嘗不嚴也南軒曰禮主乎敬而其用則以和然有敬而後有和和者樂也禮樂相須而成故禮必以和為貴禮樂分而言之則為體為用相須而成合而言之本一而已也有子曰信近於義言可復也恭近於禮逺恥辱也因不失其親亦可宗也近逺皆去聲信約信也義者事之宜也復踐言也恭致敬也禮節文也因猶依也宗猶主也言約信而合其宜則言必可踐矣致恭而中其節則能逺恥辱矣所依者不失其可親之人則亦可以宗而主之矣此言人之言行交際皆當謹之於始而慮其所終不然則因仍苟且之間將有不勝其自失之悔者矣或問約信而合其宜則言必可踐何也曰人之約信固欲其言之必可踐然其始也或不度其冝焉則所言將有不可踐者矣以為義有不可而遂不踐則失其信以為信之所在而必踐焉則害於義二者無一可也若約信之始而必求近於義焉則其言無不可踐而無二者之失矣或曰然則葉公所謂復言非信者何邪曰此特為人之不顧義理輕言而必復者發以開其自新之路耳若信之名則正以復言而得之也今不察其言不近義之差於前而責其必復其言之失於後顧與信之所以得名者而亂之則是矯枉過其直矣或者乃引之以釋此句以為信不近義則言有不可復者是乃使人不度於義而輕發其言以開誕慢欺偽之萌其弊且將無所不至非聖賢所以垂世立教之旨也曰為恭而中節則能逺恥辱何也曰致敬於人固欲逺其恥辱然不合於節文則或過或不及皆所以自取恥辱若非禮之恭則寧身被困辱而不為也其説何如曰此其意善矣然亦非有子之意也有子之意本為謹其言行以防後患於未萌之前所謂言必慮其所終行必稽其所敝者也豈使不戒於初而徐計之於已然之後﨑嶇反側如或者之言也哉曰因不失其所親則為可宗何也曰此章前有孝弟謹信而親仁之説厚重忠信而友勝已之説後又有不求安飽敏行謹言而就正冇道之説其與此章之意亦相表裏也因猶依也宗猶主也言人欲有所從必度其人之賢而後依之則在我不失其所親而後亦可以為宗主也問云云曰須是合下要約時便審令近義要去致敬那人合當拜却長揖則為不及於禮禮數不及人必怒之豈不為辱合當與那人相揖却去拜他便是過於禮禮數過當被人不答豈不可恥所依者不失其可親之人亦可宗而主之一般人求薦我合下須知得他如何便當謹所擇若失其可親之人而宗之將來必生出悔吝陳了翁曽受蔡卞之薦後來擺脫不得乃是所因失其所當親者也與人交際當謹之於始若其人下來不可宗主則今日便莫要親他宗主也所宗者可以久而宗主之如夫子於衛主顔讎由則是可親之人若主癰疽瘠環則是不可親之人愚案因不失其親如擇師友結昏姻之屬皆是子曰君子食無求飽居無求安敏於事而慎於言就有道而正焉可謂好學也已不求安飽者志有在而不暇及也敏於事者勉其所不足謹於言者不敢盡其所有餘也然猶不敢自是而必就有道之人以正其是非則可謂好學矣凡言道者皆謂事物當然之理人之所共由者也尹氏曰君子之學能是四者可謂篤志立行者矣然不取正於有道未免有差如楊墨學仁義而差者也其流至於無父無君謂之好學可乎學者先須有根本方有可求正者須是自去講學得七八分一就有道求正只一二語言便可剖判臨時旋學也難南軒曰於食與居則不求飽與安於言行則敬而謹是人也物欲不行而惟理之是趨斯不謂之好學乎然必終之以就正有道者蓋世固有不徇物欲而勉於言行者然其所學毫釐之差則其弊有不可勝言者故必就夫冇道而正然後謂之好學也正者正吾之偏也同世而親其人異世而求之書其為就正一也子貢曰貧而無諂富而無驕何如子曰可也未若貧而樂富而好禮者也諂卑屈也驕矜肆也常人溺於貧富之中而不知所以自守故必有二者之病無諂無驕則知自守矣而未能超乎貧富之外也凡曰可者僅可而有所未盡之辭也樂則心廣體胖而忘其貧好禮則安處善樂循理亦不自知其富矣子貢貨殖蓋先貧後富而嘗用力於自守者故以此為問而夫子答之如此蓋許其所已能而勉其所未至也子貢曰詩云如切如磋如琢如磨其斯之謂與磋七多反與平聲詩衛風淇澳之篇言治骨角者既切之而復磋之治玉石者既琢之而復磨之治之已精而益求其精也子貢自以無諂無驕為至矣聞夫子之言又知義理之無窮雖有得焉而未可遽自足也故引是詩以明之子曰賜也始可與言詩已矣告諸往而知來者往者其所巳言者來者其所未言者愚案此章問答其淺深髙下固不待辨説而明矣然不切則磋無所施不琢則磨無所措故學者雖不可安於小成而不求造道之極致亦不可騖於虗逺而不察切已之實病也南軒曰諂驕皆惡也無諂無驕則免於惡矣然質美者能之若夫樂與好禮則非致知力行所造日深者無此味也子曰不患人之不已知患不知人也尹氏曰君子求在我者故不患人之不已知不知人則是非邪正或不能辨故以為患也為政第二凡二十四章子曰為政以德譬如北辰居其所而衆星共之共音拱亦作拱政之為言正也所以正人之不正也德之為言得也得於心而不失也北辰北極天之樞也居其所不動也共向也言衆星四面旋繞而歸向之也為政以德則無為而天下歸之其象如此程子曰為政以德然後無為范氏曰為政以德則不動而化不言而信無為而成所守者至簡而能御煩所處者至靜而能制動所務者至寡而能服衆子曰詩三百一言以蔽之曰思無邪詩三百十一篇言三百者舉大數也蔽猶蓋也思無邪魯頌駉篇之辭凡詩之言善者可以感發人之善心惡者可以懲創人之逸志其用歸於使人得其情性之正而已然其言微婉且或各因一事而發求其直指全體則未冇若此之明且盡者故夫子言詩三百篇而惟此一言足以盡蓋其義其示人之意亦深切矣程子曰思無邪者誠也范氏曰學者必務知要知要則能守約守約則足以盡博矣經禮三百曲禮三千亦可以一言蔽之曰毋不敬朱子曰程子云云蓋行無邪未是誠思無邪乃可為誠也又曰思無邪是表裏皆無毫髮之不正世人固有修飾於外而其中未必能純一惟至於思亦無邪斯可謂之誠子曰道之以政齊之以刑民免而無恥道猶引𨗳謂先之也政謂法制禁令也齊所以一之也道之而不從者冇刑以一之也免而無恥謂苟免刑罰而無所羞愧蓋雖不敢為惡而為惡之心未嘗忘也道之以德齊之以禮有恥且格禮謂制度品節也格至也言躬行以率之則民固有所觀感而興起矣而其淺深厚薄之不一者又有禮以一之則民恥於不善而又有以至於善也一説格正也書曰格其非心愚謂政者為治之具刑者輔治之法德禮則所以出治之本而德又禮之本也此其相為終始雖不可以偏廢然政刑能使民逺罪而已德禮之效則有以使民日遷善而不自知故治民者不可徒恃其末又當深探其本也子曰吾十有五而志于學古者十五而入大學心之所之謂之志此所謂學即大學之道也志乎此則念念在此而為之不厭矣三十而立冇以自立則守之固而無所事志矣四十而不惑於事物之所當然皆無所疑則知之明而無所事守矣五十而知天命天命即天道之流行而賦於物者乃事物所以當然之故也知此則知極其精而不惑又不足言矣程子曰知天命窮理盡性也或問所謂知天命者何也曰天道運行賦與萬物莫非至善無妄之理而不已焉是則所謂天命者也物之所得是之謂性性之所具是之謂理其名雖殊其實則一而已程子直以窮理盡性言之何也曰程子之意蓋以禮也性也命也即非二物而有是言耳夫二者固非二物然隨其所在而言則亦不能無小分别蓋理以事别性以人殊命則天道之全而性之所以為性理之所以為理者也自天命者而觀之則性理云者小德之川流自性理者而觀之則天命云者大德之敦化也故自窮理盡性而知天命雖非有漸次階級之可言然其為先後亦不能無眇忽之間也然或者又以天命為窮逹之命則所知云者又若别有所屬者然則命有二乎曰命一也但聖賢之言有以其理而言者有以其氣而言者以理言者此章之云是也以氣言者窮逹有命云者是也讀者各隨其語意而推之則各得其當而不亂矣問云云先生曰上蔡云性之所自來理之所自出此兩句甚好子貢謂夫子言性與天道便性是自家底天道便是上面腦子上面有箇腦子下面便有許多物事太極圖便是發明此理箕子為武王陳洪範先言五行次言五事蓋在天則為五行在人則為五事知之者須是知得箇模樣形體如何舊見李先生云且靜坐體認作何形象此箇道理大則包於乾坤挈提造化細則入毫釐絲忽裏去無逺不周無微不到但須是見得這周到底是何物問知天命與不知命之命為如何曰不同知天命則知其理之所自來譬之於水人知其為水聖人則知其發源處知命却是説死生壽夭貧冨貴賤之命六十而耳順聲入心通無所違逆知之之至不思而得也七十而從心所欲不踰矩從如字從隨也矩法度之器所以為方者也隨其心之所欲而自不過於法度安而行之不勉而中也程子曰孔子生而知之也言亦由學而至所以勉進後人也立能自立於斯道也不惑則無所疑矣知天命窮理盡性也耳順所聞皆通也從心所欲不踰矩則不勉而中矣又曰孔子自言其進德之序如此者聖人未必然但為學者立法使之盈科而後進成章而後逹耳胡氏曰聖人之教亦多術然其要使人不失其本心而已欲得此心者惟志乎聖人所示之學循其序而進焉至於一疵不存萬理明盡之後則其日用之間本心瑩然隨其意欲莫非至理蓋心即體欲即用體即道用即義聲為律而身為度矣又曰聖人言此一以示學者當優遊涵泳不可躐等而進一以示學者當日就月將不可半途而廢也愚謂聖人生知安行固無積纍之漸然其心未嘗自謂已至此也是其日用之間必有獨覺其進而人不及知者故因其近似以自名欲學者以是為則而自勉非心實自聖而姑為是退託也後凡言謙辭之屬意皆放此志是心之深處如今學者誰不為學只是不可謂之志學如果能志于學自住不得孟懿子問孝子曰無違孟懿子魯大夫仲孫氏名何忌無違謂不背於禮樊遲御子告之曰孟孫問孝於我我對曰無違樊遲孔子弟子名須御為孔子御車也孟孫即仲孫也夫子以懿子未逹而不能問恐其失指而以從親之令為孝故語樊遲以發之樊遲曰何謂也子曰生事之以禮死葬之以禮祭之以禮生事葬祭事親之始終具矣禮即理之節文也人之事親自始至終一於禮而不苟其尊親也至矣是時三家僭禮故夫子以是警之然語意渾然又若不專為三家發者所以為聖人之言也胡氏曰人子欲孝其親心雖無窮而分則有限得為而不為與不得為而為之均於不孝所謂以禮者為其所得為者而已矣孟武伯問孝子曰父母惟其疾之憂武伯懿子之子名彘言父母愛子之心無所不至惟恐其有疾病常以為憂也人子體此而以父母之心為心則凡所以守其身者自不容於不謹矣豈不可以為孝乎舊説人子能使父母不以其陷於不義為憂而獨以其疾為憂乃可謂孝亦通子遊問孝子曰今之孝者是謂能養至於犬馬皆能有養不敬何以别乎養去聲别彼列反子遊孔子弟子姓言名偃養謂飲食供奉也犬馬待人而食亦若養然言人畜犬馬皆能有以養之若能養其親而敬不至則與養犬馬者何異甚言不敬之罪所以深警之也或問父母至尊親犬馬至卑賤聖人之言豈若是其不倫乎曰此設戒之言也故特以其尊卑懸絶之甚者明之所以深警夫能養而不敬者之罪也坊記子云小人皆能養其親君子不敬何以辨子夏問孝子曰色難有事弟子服其勞有酒食先生饌曽是以為孝乎食音嗣色難謂事親之際惟色為難也食飯也先生父兄也饌飲食之也曽猶嘗也蓋孝子之有深愛者必有和氣有和氣者必有愈色有愈色者必有婉容故事親之際惟色為難耳服勞奉養未足為孝也舊説承順父母之色為難亦通程子曰告懿子告衆人者也對武伯者以其人多可憂之事子遊能養而或失於敬子夏能直義而或少溫潤之色各因其材之髙下與其所失而告之故不同也子曰吾與回言終日不違如愚退而省其私亦足以發回也不愚回孔子弟子姓顔字子淵不違者意不相背有聽受而無問難也私謂燕居獨處非進見請問之時發謂發明所言之理愚聞之師曰顔子深濳純粹其於聖人體段已具其聞夫子之言默識心融觸處洞然自有條理故終日言但見其不違如愚人而已及退省其私則見其日用動靜語默之間皆足以發明夫子之道坦然由之而無疑然後知其不愚也或問先儒之説曰曽氏胡氏張敬夫之説亦然曽氏曰入乎耳著乎心默而識之故不違如愚退而察其踐履則布乎四體形乎動靜故足以發胡氏曰顔子之質鄰於生知聞夫子之言心通默識不復問辨反如愚蒙之未逹者及侍坐而退夫子察其燕私則其視聼言動皆能以聖人所教隨用發見然後知向之所謂愚者乃所謂上智也然聖人久已知顔子之不愚矣而必曰退而省其私之云者所以見其非無證之空言且以明進德之功必內外相符隱顯一致欲學者之謹其獨也烏乎夫子與回言終日則言多矣而今存者無幾可勝惜哉張敬夫曰夫子之言顔子皆能體之於日用問所以夫子退而省其私知其足以發明斯道乃其請事斯語之驗也問顔子省其私不必指燕私只是他自作用處曰便是這意思但恐沒著落只得説燕私謂如人相對坐心意默有趨向亦是私如謹獨之獨亦非特在幽隱人所不見處只他人之所不知雖在衆中便是獨也問亦足以發莫是亦足以發明夫子所言之旨否曰然且如夫子告以非禮勿視聽言動顔子受用不復更問如何是禮與非禮但是退而省察顔子之所為則直是視聽言動無非禮也此則足以發明夫子之言也問李先生謂顔子聖人體段已具莫只是言箇模樣否曰言觸其機乃能通曉耳問默識心融如何曰融如消融相似融如雪之在湯若不融一句只是一句在胸中如何發得出來如人飲食不消化如何能滋益體膚如孔子告曽子一貫之辭他人聞之只是箇一貫曽子聞之便能融化發得忠恕之説出來子曰視其所以以為也為善者為君子為惡者為小人觀其所由觀比視為詳矣由從也事雖為善而意之所從來者有未善焉則亦不得為君子矣或曰由行也謂所以行其所為者也察其所安察則又加詳矣安所樂也所由雖善而心之所樂者不在於是則亦偽耳豈能久而不變哉人焉廋哉人焉廋哉焉於虔反廋所由反焉何也廋匿也重言以深明之程子曰在已者能知言窮理則能以此察人如聖人也子曰溫故而知新可以為師矣溫尋繹也故者舊所聞新者今所得言學能時習舊聞而每有新得則所學在我而其應不窮故可以為人師若夫記問之學則無得於心而所知有限故學記譏其不足以為人師正與此意互相發也或問云云曰故者昔之所以得者也新者今之所始得者也昔之所得雖曰既為吾有然不時加反覆尋繹之功則亦未免廢怠荒落之患而無所據以知新矣然徒能溫故而不能有以得夫前日之未得者到見聞雖富誦説雖勤亦若無源之水而已其積雖多終有窮盡亦將何以授業解惑而待學者無已之求哉學記曰記問之學不足以為人師者正謂此耳唯能尋繹其所已得者而每有得於其所未得者焉則譬諸觀人昨日識其靣而今日識其心矣於以為師其庶矣乎夫子之言所謂可云者正所以明夫未至此者不足以為師非以為能如是而為師冇餘也思昔程子晚而自言吾年二十時解釋經義與今無異然其意味則今之視昔為不同矣此溫故知新之大者學者以是為的而深求之則足以見夫義理之無窮也矣南軒曰程子有云如此處極要理會若只認溫故知新可以為人師則氣象窄狹矣學者推之一端庶幾可以味聖賢之辭意子曰君子不器器者各適其用而不能相通成德之士體無不具故用無不周非特為一才一藝而已南軒曰器者拘於一物凡人事以器言者皆以其才而論之也器雖有小大然其拘於才而有限則一也若君子則進於德進於德則器質變化而才有勿器者矣不亦君子乎子貢問君子子曰先行其言而後從之周氏曰先行其言者行之於未言之前而後從之者言之於既行之後范氏曰子貢之患非言之艱而行之艱故告之以此南軒曰君子主於行而非以言為先故其言之所發乃其力行之所至言隨之也夫主於行而發言者為君子則夫易於言而行不踐者是小人之歸矣子貢非不能踐言者然未免於多言夫子恐其有時而或以言為主而行有未精也是以深警焉夫未之能踐而言與夫力行所至而言者其意味有間矣學者冝體察子曰君子周而不比小人比而不周周普遍也比偏黨也皆與人親厚之意但周公而比私耳君子小人所為不同如隂陽晝夜每每相反然究其所以分則在公私之際毫釐之差耳故聖人於周此和同驕泰之屬常對舉而互言之欲學者察乎兩間而審其取舍之幾也南軒曰君子小人之分公私之間而已周則不比比則不周天理人欲不並立也君子內恕以及人其於親疏逺近賢愚處之無不得其分蓋其心無不溥焉所謂周也故小人則有所偏係而失其正其所親昵皆私情耳所謂比也子曰學而不思則罔思而不學則殆不求諸心故昏而無得不習其事故危而不安程子曰博學審問謹思明辨篤行五者廢其一非學也南軒曰自灑掃應對進退而往無非學也然徒學而不能思則無所發明罔然而已思者研窮其理之所以然徒思而不務學則無可據之地危殆不安矣二者不可不兩進也學而思則德益崇思而學則業益廣蓋其所學乃其思之所形而其所思即其學之所存也用工若此內外進矣問云云曰學是學其事如讀書便是學須緩緩精思其中義理方得且如做此事亦是學須思量此事道理是如何只恁下頭做不思這事道理則昧而無得若只空思索又不倚所做事上體察則心總是不安穩須是事與思互相發明子曰攻乎異端斯害也已范氏曰攻專治也故治木石金玉之工曰攻異端非聖人之道而别為一端如楊墨是也其率天下至於無父無君專治而欲精之為害甚矣程子曰佛氏之言比之楊墨尤為近理所以其害為尤甚學者當如淫聲美色以逺之不爾則駸駸然入於其中矣或問冇以攻為攻擊之攻言異端不必深推但當反經而已者如何朱子曰不務反經而徒與之角其無涯之辨固所以自蔽然熟視異端之害而不言以正之則亦何以祛習俗之蔽而反之於經哉蓋正道異端如水火之相勝彼盛則此衰此強則彼弱反經固所當務而不可以徒反異端固不必辨然亦不可不辨觀孟子答公都子好辨之問則可知矣或問諸説如何張子謂孔子不闢異端其考之亦不詳矣當時所謂異端未有以見其為誰氏如以楊墨論之如墨氏之無父則悖德悖禮之訓固以深闢之楊氏之無君則潔身亂倫之戒又以深闢之矣愚案孔子之言必非為楊墨發然此兩言實深中二氏之病此義明則楊墨之禍自息矣子曰由誨女知之乎知之為知之不知為不知是知也由孔子弟子姓仲字子路子路好勇蓋有強其所不知以為知者故夫子告之曰吾教女以知之之道乎但所知者則以為知所不知者則以為不知如此則雖或不能盡知而無自欺之蔽亦不害其為知矣况由此而求之又有可知之理乎南軒曰子路勇於進於知與不知之間容有察之未精者故夫子語之以知之之道蓋於其所已知與其所未知者皆能察其實而無自欺非心平氣和守約務實者莫之能也於此而博學審問謹思明辨則不知者亦將終之知矣故曰是知也言是乃知之道也不然強以不知為知是則終身不知而已黃氏曰不知為不知是知也其亦冇説乎曰是非之心智之端也是是非非見得分明便是智之發見而人之所以為知也若以是為非以非為是則是愚暗無識之人也今有人焉所知之事則以為知所不知之事則以為不知乃是非之心自然發見如此智孰大焉心之虗明是非昭著故夫子以為是知也子張學干祿子張孔子弟子姓顓孫名師干求也祿仕者之奉也子曰多聞闕疑愼言其餘則寡尤多見闕殆愼行其餘則寡悔言寡尤行寡悔祿在其中矣呂氏曰疑者所未信殆者所未安程子曰尤罪自外至者也悔理自內出者也愚謂多聞見者學之博闕疑殆者擇之精謹言行者守之約凡言在其中者皆不求而自至之辭言此以救子張之失而進之也程子曰修天爵則人爵至君子言行能謹得祿之道也子張學干祿故告之以此使定其心而不為利祿動若閔顔則無此問矣子張學干祿一章是教人不以干祿為意蓋言行所當謹非欲為干祿而然也若真能著實用功則惟患言行之有悔尤何暇有干祿之心邪南軒曰夫謹言行者非期於得祿亦非必得祿也曰祿在其中辭氣不迫而義則完矣若告之以士不可以求祿則理有所未盡亦非長善救失之方也哀公問曰何為則民服孔子對曰舉直錯諸枉則民服舉枉錯諸直則民不服哀公魯君名蔣凡君問皆稱孔子對曰者尊君也錯捨置也諸衆也程子曰舉錯得義則人心服謝氏曰好直而惡枉天下之至情也順之則服逆之則去必然之理也然或無道以臨之則以直為枉以枉為直者多矣是以君子大居敬而貴窮理也季康子問使民敬忠以勸如之何子曰臨之以莊則敬孝慈則忠舉善而教不能則勸季康子魯大夫季孫氏名肥莊謂容貌端嚴也臨民以莊則民敬於已孝於親慈於衆則民忠於已善者舉之而不能者教之則民有所勸而樂於為善南軒曰此皆在我所當為非為欲使民敬忠以勸而為之也然能如是則其應蓋有不期然而然者矣或謂孔子曰子奚不為政定公初年孔子不仕故或人疑其不為政也子曰書云孝乎惟孝友于兄弟施於有政是亦為政奚其為為政書周書君陳篇書云孝乎者言書之言孝如此也善兄弟曰友書言君陳能孝於親友於兄弟又能推廣此心以為一家之政孔子引之言如此則是亦為政矣何必居位乃為為政乎蓋孔子之不仕有難以語或人者故託此以告之要之至理亦不外是子曰人而無信不知其可也大車無輗小車無軏其何以行之哉輗五兮反軏音月大車謂平地任載之車輗轅端橫木縛軛以駕牛者小車謂田車兵車乘車軏轅端上曲鉤衡以駕馬者車無此二者則不可以行人而無信亦猶是也子張問十世可知也王者易姓受命為一世子張問自此以後十世之事可前知乎子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也其或繼周者雖百世可知也馬氏曰所因謂三綱五常所損益謂文質三統愚案三綱謂君為臣綱父為子綱夫為妻綱五常謂仁義禮智信文質謂夏尚忠商尚質周尚文三統謂夏正建寅為人統商正建丒為地統周正建子為天統三綱五常禮之大體三代相繼皆因之而不能變其所損益不過文章制度小過不及之間而其已然之迹今皆可見則自今以往或有繼周而王者雖百世之逺所因所革亦不過此豈但十世而已乎聖人所以知來者蓋如此非若後世讖緯術數之學也胡氏曰子張之問蓋欲知來而聖人言其既往者以明之也夫自修身以至於為天下不可一日而無禮天敘天秩人所共由禮之本也商不能改乎夏周不能改乎商所謂天地之常經也若乃制度文為或太過則當損或不足則當益益之損之與時宜之而所因者不壞是古今之通義也因往推來雖百世之逺不過如此而已矣子曰非其鬼而祭之諂也非其鬼謂非其所當祭之鬼諂求媚也南軒曰祀典自天子至庶人各有其分而不可踰蓋天理也有是理則有鬼神若於非當祭而祭既無其理何享之有原其心之所萌不過為諂而已見義不為無勇也知而不為是無勇也問見義不為無勇這亦不為無所見但為之不力所以為無勇曰固是見得是義而為之不力亦是見得未明若已見得分明則行之自有力這般處著兩下並看問云云莫是連上句否曰不須連上句説凡事見得是義便著做不獨説祭祀也有問非鬼而祭章答曰鬼神之理雖非始學者所易窮然亦須識其名義若以神示鬼三字言之則天之神曰神地之神曰示古祗字也人之神曰鬼若以鬼神二字言之則神者氣之伸鬼者氣之屈氣之方伸者屬陽故為神氣之屈者屬隂故為鬼神者伸也鬼者歸也且以人之身論之生則曰人死則曰鬼此生死之大分也然自生而言之則自幼而壯氣之伸也自壯而老自老而死此又伸而屈也自其死言之則魂遊魄降寂無形兆此氣之屈也及子孫享祀以誠感之則又能來格此又屈而伸也文集論語集編卷一
