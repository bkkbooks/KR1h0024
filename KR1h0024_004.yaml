body:
  text: 欽定四庫全書中庸集編卷中宋真德秀撰君子之道費而隱費符味反費用之廣也隱體之微也夫婦之愚可以與知焉及其至也雖聖人亦有所不知焉夫婦之不肖可以能行焉及其至也雖聖人亦有所不能焉天地之大也人猶有所憾故君子語大天下莫能載焉語小天下莫能破焉與去聲君子之道近自夫婦居室之間逺而至於聖人天地之所不能盡其大無外其小無内可謂費矣然其理之所以然則隱而莫之見也蓋可知可能者道中之一事及其至而聖人不知不能則舉全體而言聖人固有所不能盡也侯氏曰聖人所不知如孔子問禮問官之類所不能如孔子不得位堯舜病博施之類愚謂人所憾於天地如覆載生成之偏及寒暑災祥之不得其正者詩云鳶飛戾天魚躍于淵言其上下察也鳶余專反詩大雅旱麓之篇鳶鴟類戾至也察著也子思引此詩以明化育流行上下昭著莫非此理之用所謂費也然其所以然者則非見聞所及所謂隱也故程子曰此一節子思喫𦂳為人處活潑潑地讀者其致思焉君子之道造端乎夫婦及其至也察乎天地結上文或問十二章之説曰道之用廣而其體則微密而不可見所謂費而隱也即其近而言之男女居室人道之常雖愚不肖亦能知而行之極其逺而言之則天下之大事物之多聖人亦容有不盡知盡能者也然非獨聖人有所不知不能也天能生覆而不能形載地能形載而不能生覆至於氣化流行則隂陽寒暑吉凶災祥不能盡得其正者尤多此所以雖以天地之大而人猶有憾也夫自夫婦之愚不肖所能知行至於聖人天地之所不能盡道蓋無所不在也故君子之語道也其大至於天地聖人所不能盡而道無不包則天下莫能載矣其小至於愚夫愚婦之所能知能行而道無不體則天下莫能破矣道之在天下其用之廣如此可謂費矣而其所用之體則不離乎此而有非視聽之所及者此所以為費而隱也子思之言至此極矣然猶以為不足以盡其意也故又引詩以明之曰鳶飛戾天魚躍於淵所以言道之體用上下昭著而無所不在也造端乎夫婦極其近小而言也察乎天地極其逺大而言也蓋夫婦之際隱微之間尤見道之不可離處知其造端乎此則其所以戒謹恐懼之實無不至矣易首乾坤而重咸恒詩首關雎而戒滛泆書記釐降禮謹大昬皆此意也曰諸說如何曰程子至矣曰諸家皆以夫婦之能知能行者為道之費聖人之所不知不能而天地有憾者為道之隱其於文義協矣若從程子之説則使章内專言費而不及隱恐其有未安也曰謂不知不能為隱似矣若天地有憾鳶飛魚躍察乎天地而欲亦謂之隱則恐未然且隱之為言正以其非言語指陳之可及耳故獨舉費而隱常黙具乎其中若於費外别有隱而可言則已不得為隱矣程子之云又何疑邪曰然則程子所謂鳶飛魚躍子思喫𦂳為人處與必有事焉而勿正心之意同活潑潑地者何也曰道之流行發見於天地之間無所不在在上則鳶之飛而戾于天者此也在下則魚之躍而出於淵者此也其在人則日用之間人倫之際夫婦之所知所能而聖人之所不知不能者亦此也此其流行發見於上下之間者可謂著矣子思於此指而言之惟欲學者於此黙而識之則為有以洞見道體之妙而無疑而程子以為子思喫𦂳為人處者正以示人之意為莫切於此也其曰與必有事焉而勿正心之意同活潑潑地則又以明道之體用流行發見充塞天地亘古亘今雖未嘗有一毫之空闕一息之間斷然其在人而見諸日用之間者則初不外乎此心故必此心之存而後有以自覺也必有事焉而勿正心活潑潑地亦曰此心之存而全體呈露妙用顯行無所滯礙云爾非必仰而視乎鳶之飛俯而觀乎魚之躍然後可以得之也抑孟子此言固為精密然但為學者集義養氣而發耳至於程子借以為言則又以發明學者洞見道體之妙非但如孟子之意而已也蓋此一言雖若二事然其實則必有事焉半辭之間己盡其意善用力者苟能於此超然黙會則道體之妙已躍如矣何待下句而後足於言邪聖賢特恐學者用力之過而反為所累故更以下句解之欲其雖有所事而不為所累耳非謂必有事焉之外又當别設此念以為正心之防也曰然則其所謂活潑潑地者毋乃釋氏之遺意邪曰此但俚俗之常談釋氏蓋嘗言之而吾亦言之耳彼固不得而專之也况吾之所言雖與彼同而所形容實與彼異若出於吾之所謂則夫道之體用固無不在然鳶而必戾于天魚而必躍于淵是君君臣臣父父子子各止其所而不可亂也若如釋氏之云則鳶可以躍淵而魚可以戾天矣是安可同日而語哉且子思以夫婦言之所以明人事之至近而天理在焉釋氏則舉此而絶之矣又安可同年而語哉謝氏既曰非是極其上下而言矣又曰非指鳶魚而言蓋曰子思之引此詩姑借二物以明道體無所不在之實非以是為窮其上下之極而形其無所不包之量也又非以是二物專為形其無所不在之體而欲學者之必觀乎此也此其發明程子之意蓋有非一時同門之士所得聞者而又别以夫子與㸃之意明之則其為説益以精矣但所謂察見天理者恐非本文之訓而於程子之意亦未免小失之耳問形而上下與費而隱如何先生曰形而上者就物上説費而隱者就道上説夫婦之愚可以與知焉若據先儒解當切何不道行道之人何不道衆人之愚何為説夫婦是必有意至盡也論道而至於盡處若有小小閑慢亦不必知不必能亦可至者非極至之至蓋道無不包若盡論之聖人豈能纎悉盡知伊川之説是聖人也只知得大綱到不可知處亦無可奈何但此等𤨏碎不知亦無害耳問語小天下莫能破是極其小者而言之今以一髪之微尚有可破而為二者所謂莫能破則足見其小注中謂其小無内亦是説其至小無去處了先生曰然問其大無外其小無内二句是古語是自做先生曰楚辭云其小無内其大無垠鳶飛可見魚躍可見而所以飛所以躍果何物也中庸言許多費而不言隱者隱在費之中鳶飛魚躍之説盡是分明見得道體隨事發見處察者著也非察察之察詩中之意本不為此中庸只是借此兩句形容道體鳶飛魚躍費也必有一箇什麽物使得他如此此便是隱問鳶飛魚躍如何與他勿忘勿助長之意同曰孟子言勿忘勿助長本言得粗程子却説得細只是用其語句耳如程子之説却不曽下勿字蓋謂都沒耳其曰正當處者謂天理流行處故謝氏亦以此論曽㸃事其所謂勿正勿助長者亦非立此在四邊故防檢不得犯著蓋謂俱無此而皆天理之流行耳問中庸語鳶飛魚躍處伊川云會得活潑潑地不㑹得只是弄精神惟上蔡看破先生引君臣父子為言此吾儒之所以異於佛者如何先生曰鳶飛魚躍只是言其發見耳釋氏亦言發見但渠言發見却一切混亂至吾儒須辨其定分君臣父子皆定分也鳶必戾于天魚必躍于淵問鳶有鳶之性魚有魚之性其飛其躍天機自完便是天理流行發見之妙處故子思姑舉此一二明道之無所不在否曰是活潑潑地所謂活者只是不滯於一隅又問上下察是此理流行上下昭著下面察乎天地是察見天地之理或是與上句察字同意先生曰與上句察字同意言其昭著徧滿於天地之間問中庸言造端乎夫婦何也先生曰夫婦者人倫中之至親且密者夫人所為蓋有不可告其父兄而悉以告其妻子者或問中庸説道之費隱如是其大且妙後面却只歸在造端乎夫婦上此中庸之道所以異於佛老之謂道也曰須更看所謂優優大哉禮儀三百威儀三千處聖人之道彌滿充塞無少空闕處若於此有一毫之差便於道體有虧欠也若佛則只説道無不在無適而非道政使於禮儀有錯差處亦不妨故他於此都理會不得問君子之道費而隱云許多章都是説費處却不説隱處莫所謂隱者只在費中否曰惟是不説乃所以見得隱在其中舊人都分畫將聖人不知不能處做隱覺得下面多説不去且如鳶飛于天魚躍于淵亦何嘗隱來輯略程子曰費日用處問聖人亦何有不能不知也曰天下之理聖人豈有不盡者蓋於事有所不徧知不徧能也至纎悉委曲處如農圃百工之事孔子亦豈能知哉又曰鳶飛魚躍言其上下察也此一叚子思喫𦂳為人處與必有事焉而勿正之意同活潑潑地會得時活潑潑地㑹不得只是弄精神又曰鳶飛戾天向上更有天在魚躍于淵向下更有地在謝氏曰鳶飛戾天魚躍于淵非是極其上下而言蓋真箇見得如此此正是子思喫緊道與人處若從此解悟便可入堯舜氣象又曰鳶飛戾天魚躍于淵無些私意上下察以明道體無所不在非指鳶魚而言也若指鳶魚言則上靣更有天下靣更有地在知勿忘勿助長則知此知此則知夫子與㸃之意又曰詩云鳶飛戾天魚躍于淵猶韓愈所謂魚川泳而鳥雲飛上下自然各得其所也詩人之意言如此氣象周王之作人似之子思之意言上下察也猶孟子所謂必有事焉而勿正察見天理不用私意也故結上文云君子語大天下莫能載語小天下莫能破今人學詩將章句横在肚裏怎生得脱洒去楊氏曰道者人之所日用也故費雖曰日用而至賾存焉故隱右第十二章子思之言蓋以申明首章道不可離之意也其下八章雜引孔子之言以明之子曰道不逺人人之為道而逺人不可以為道道者率性而已固衆人之所能知能行者也故常不逺於人若為道者厭其卑近以為不足為而反務為髙逺難行之事則非所以為道矣詩云伐柯伐柯其則不逺執柯以伐柯睨而視之猶以為逺故君子以人治人改而止睨研計反詩豳風伐柯之篇柯斧柄則法也睨邪視也言人執柯伐木以為柯者彼柯長短之法在此柯耳然猶有彼此之别故伐者視之猶以為逺也若以人治人則所以為人之道各在當人之身初無彼此之别故君子之治人也即以其人之道還治其人之身其人能改即止不治蓋責之以其所能知能行非欲其逺人以為道也張子所謂以衆人望人則易從是也忠恕違道不逺施諸己而不願亦勿施於人盡已之心為忠推己及人為恕違去也如春秋傳齊師違穀七里之違言自此至彼相去不逺非背而去之之謂也道即其不逺人者是也施諸己而不願亦勿施於人忠恕之事也以己之心度人之心未嘗不同則道之不逺於人者可見故己之所不欲則勿以施之於人亦不逺人以為道之事張子所謂以愛己之心愛人則盡仁是也君子之道四丘未能一焉所求乎子以事父未能也所求乎臣以事君未能也所求乎弟以事兄未能也所求乎朋友先施之未能也庸徳之行庸言之謹有所不足不敢不勉有餘不敢盡言顧行行顧言君子胡不慥慥爾子臣弟友四字絶句求猶責也道不逺人凡己之所以責人者皆道之所當然也故反之以自責而自脩焉庸平常也行者踐其實謹者擇其可徳不足而勉則行益力言有餘而訒則謹益至謹之至則言顧行矣行之力則行顧言矣慥慥篤實貌言君子之言行如此豈不慥慥乎賛美之也凡此皆不逺人以為道之事張子所謂以責人之心責己則盡道是也或問十三章之説子以為以人治人為以彼人之道還治彼人善矣又謂責其所能知能行而引張子之説以實之則無乃流於姑息之論而所謂人之道者不得為道之全也邪曰上章固言之矣夫婦之所能知能行者道也聖人之所不知不能而天地猶有憾者亦道也然自人而言則夫婦之所能知能行者人之所切於身而不可須臾離者也至於天地聖人所不能及則其求之當有漸次而或非日用之所急矣然則責人而先其切於身之不可離者後其有漸而不急者是乃行逺自邇升髙自卑之序使其由是而不己焉則人道之全亦將可以馴致今必以是為姑息而遽欲盡道以責於人吾見其失先後之序違緩急之宜人之受責者將至於有所不堪而道之無窮則終非一人一日之所能盡也是亦兩失之而已焉耳曰子臣弟友之絶句何也曰夫子之意蓋曰我之所責乎子之事已者如此而反求乎已之所以事父則未能如此也所責乎臣之事己者如此而反求乎已之所以事君則未能如此也所責乎弟之事已者如此而反求乎已之所以事兄則未能如此也所責乎朋友之施己者如此而反求乎已之所以先施於彼者則未能如此也於是以其所以責彼者自責於庸言庸行之間蓋不待求之於他而吾之所以自脩之則具於此矣今或不得其讀而以父君兄友四字為絶句則於文意皆有所不通而其義亦何所當哉曰諸説如何曰諸家説論語者多引此章以明一以貫之之義説此章者又引論語以釋違道不逺之意一矛一盾終不相謀而牽合不置學者蓋深病之及深攷乎程子之言有所謂動以天者然後知二者之為忠恕其迹雖同而所以為忠恕者其心實異非其知徳之深知言之至其孰能判然如此而無疑哉然盡已推己乃忠恕之所以名而正為此章違道不逺之事若動以天而一以貫之則不待盡已而至誠者自無息不待推己而萬物已各得其所矣曽子之言蓋指其不可名之妙而借其可名之粗以明之學者黙識於言意之表則亦足以互相發明而不害其為同也餘説雖多大槪放此推此意以觀之則其為得失自可見矣違道不逺如齊師違穀七里之違蓋曰自此而去以至于穀纔七里耳孟子所謂夜氣不足以存則其違禽獸不逺矣非謂昔本禽獸而今始違之也亦曰自此而去入於禽獸不逺耳蓋所謂道者當然之理而已根於人心而見諸行事不待勉而能也然惟盡已之心而推以及人可以得其當然之實而施無不當不然則求之愈逺而愈不近矣此所以自是忠恕而徃以至於道獨為不逺其曰違者非背而去之之謂也程子又謂事上之道莫若忠待下之道莫若恕此則不可曉者若姑以所重言之則似亦不為無理若究其極則忠之與恕初不相離張子所謂要除一箇除不得而謝氏以為猶形影者意可見矣今析為二事而兩用之則是果有無恕之忠無忠之恕而所以事上接下者皆出於强為而不由乎中矣豈忠恕之謂哉是於程子他説殊不相似意其記録之或誤不然則一時有為言之而非正為忠恕發也張子二説皆深得之吕氏改本太略不盡經意舊本乃推張子之言而精詳實有味但柯猶在外以下為未盡善若易之曰所謂則者猶在所執之柯而不在所伐之柯故執柯者必有睨視之勞而猶以為逺也若夫以人治人則異於是蓋衆人之道止在衆人之身若以其所及知者責其知以其所能行者責其行人改即止不厚望焉則不必睨視之勞而所以治之之則不逺於彼而得之矣忠者誠有是心而不自欺也恕者推待己之心以及人也推其誠心以及於人則其所以愛人之道不逺於我而得之矣至於事父事君事兄交友皆以所求乎人者責乎己之所未能則其所以治己之道亦不逺於心而得之矣夫四者固皆衆人之所能而聖人乃自謂未能者亦曰未能如其所以責人者耳此見聖人之心純亦不已而道之體用其大天下莫能載其小天下莫能破舜之所以盡事親之道必至於瞽瞍底豫者蓋為此也如此然後屬乎庸者常道之云則庶乎其無病奚且其曰有餘而盡之則道難繼而不行又不若游氏所引恥躬不逮為得其文意也謝氏侯氏所論論語之忠恕獨得程子之意但程子所謂天地之不恕亦曰天地之化生生不窮特以氣機闔闢有通有塞故當其通也天地變化草木蕃則冇似於恕當其塞也天地閉而賢人隱則有似於不恕耳其曰不恕非若人之蔽於私欲而實有忮害之心也謝氏推明其説乃謂天地之有不恕乃因乆而然則其説有未究者蓋若以為人不致中則天地有時而不位人不致和則萬物有時而不育是謂天地之氣因人之不恕而有似於不恕則可若曰天地因人之不恕而實有不恕之心則是彼為人者既以忮心失恕而自絶於天矣為天地者反效其所為以自已其於穆之命也豈不誤哉游氏之説其病尤多至謂道無物我之間而忠恕將以至於忘己忘物則為已違道而猶未逺也是則老荘之遺意而逺人甚矣豈中庸之㫖哉楊氏又謂以人為道則與道二而逺於道故戒人不可以為道如執柯以伐柯則與柯二故睨而視之猶以為逺則其違經背理又有甚焉使經而曰人而為道則逺人故君子不可以為道則其説信矣今經文如此而其説乃如彼於文義有所不通而推其意又將使道為無用之物人無入道之門而聖人之教人以為道者反為誤人而有害於道是安有此理哉至四者未能之説獨以為若止謂恕己以及人則是聖人將使天下皆無父子君臣矣此則諸家皆所不及蓋近世果有不得其讀而輒為之説曰此君子以一己之難克而知天下皆可恕之人也嗚呼此非所謂將使天下皆無父子君臣者矣侯氏之言於是乎驗矣未改以前却是失人道既改則便是復得人道了更何用治他能改即是善矣更何待别求善邪天下只是一箇善惡不善即惡不惡即善如何説既能改其惡更用别討箇善只改底便是善所求乎子以事父未能也須要如舜之事父方盡得子之道若有一毫不盡便是道理有所欠闕便非子之道矣所求乎臣以事君未能也須要如舜周公之事君若有一毫不盡便非臣之道矣無不是如此只縁道理當然自是住不得論著忠恕名義自合依子思忠恕違道不逺是也曾子所説却是移上一階説聖人之忠恕到程子又移上一階説天地之忠恕其實只一箇忠恕須自看教有許多等級分明或謂到得忠恕己是道如何云違道不逺曰仁是道忠恕正是學者著力下工夫處維天之命於穆不已乾道變化各正性命便是天之忠恕純亦不已萬物各得其所便是聖人之忠恕施諸己而不願亦勿施於人便是學者之忠恕問忠恕即道也而曰違道不逺何邪曰道是自然底人能忠恕則去道不逺輯略程子曰執柯伐柯其則不逺人猶以為逺君子之道本諸身發諸心豈逺乎哉以已及物忠也推己及物恕也違道不逺是也忠恕一以貫之忠者天道恕者人道忠者無妄恕者所以行乎忠也忠者體恕者用大本達道也此與違道不逺異者動以天耳又曰忠恕兩字要除一箇除不得又曰盡己之謂忠推己之謂恕忠體也恕用也又曰盡己為忠如心為恕或問恕字學者可用功否曰恕字甚大然恕不可獨用須得忠以為體不忠何以能恕看忠恕兩字自見相為用處又曰忠恕所以公平造徳則自忠恕其致則公平又曰人謂盡己之謂忠盡物之謂恕盡己之謂忠固是盡物之謂恕則未盡推己之謂恕盡物之謂信又曰有餘便是過慥慥篤實貌張子曰所求乎君子之道四是實未能道何嘗有盡聖人人也人則有限是誠不能盡道也聖人之心則直欲盡道事則安能盡如博施濟衆堯舜實病諸堯舜之心其施直欲至於無窮方為博施然安能若是修己以安百姓是亦堯舜實病之欲得人人如此然安得如此又曰以責人之心責己則盡道所謂君子之道四丘未能一焉者也以愛己之心愛人則盡仁所謂施諸己而不願亦勿施於人者也以衆人望人則易從所謂以人治人改而止者也此君子所以責己責人愛人之三術也吕氏曰妙道精義常存乎君臣父子夫婦朋友之間不離乎交際酬酢應對之末皆人心之所同然未有不出於天者也若絶乎人倫外乎世務窮其所不可知議其所不可及則有天人之分内外之别非所謂大而無外一以貫之安在其為道也歟柯斧之柄也執斧之柯而求柯於木其尺度之則固不逺矣然在柯猶在外睨而視之始得其則若夫治己治人之道於己取之不必睨視之勞而自得於此矣故君子推是心也其治衆人也以衆人之道而已以衆人之所及知責其所知以衆人之所能行責其所行改而後止不厚望也其愛人也以忠恕而已忠者誠有是心而不自欺恕者推待己之心以及人者也忠恕不可謂之道而道非忠恕不行此所以言違道不逺者其治己也以求乎人者反於吾身事父事君事兄先施之朋友皆衆人之所能盡人倫之至則雖聖人亦自謂未能此舜所以盡事親之道必至瞽瞍底豫者也庸者常道也事父孝事君忠事兄弟交朋友信庸徳也必行而已有問有答有唱有和不越乎此者庸言也無易而已不足而不勉則徳有止而不進有餘而盡之則道難繼而不行無是行也不敢苟言以自欺故言顧行有是言也不敢不行而自棄故行顧言問忠恕謝氏曰猶形影也無忠做恕不出來己所不欲勿施於人施諸己而不願亦勿施諸人説得自分明恕如心而已游氏曰有所不足不敢不勉將以踐言也則其行顧言矣有餘不敢盡恥躬之不逮也則其言顧行矣言行相顧則於心無餒故曰胡不慥慥爾慥慥心之實也楊氏曰孟子言舜之怨慕非深知舜之心不能及此據舜惟患不順於父母不謂其盡孝也凱風之詩曰母氏聖善我無令人孝子之事親如此此孔子所以取之也孔子曰君子之道四丘未能一焉若乃自以為能則失之矣或曰曽子説出忠恕二字子思所以只發明恕字者何故侯氏曰無恕不見得忠無忠做恕不出來誠有是心之謂忠見於功用之謂恕曰明道言忠恕二字要除一箇除不得正謂此歟曰然曰父子君臣兄弟朋友之常孔子自謂皆未能何也只謂恕己以及人則將使天下皆無父子無君臣乎蓋以責人之心責己則盡道也今人有君親而不盡其心以事焉曰聖人猶未能盡而曰恕己以及人是禍天下君臣父子也右第十三章道不逺人者夫婦所能丘未能一者聖人所不能皆費也而其所以然者則至隱存焉下章倣此君子素其位而行不願乎其外素猶見在也言君子但因見在所居之位而為其所當為無慕乎其外之心也素富貴行乎富貴素貧賤行乎貧賤素夷狄行乎夷狄素患難行乎患難君子無入而不自得焉難去聲此言素其位而行也在上位不陵下在下位不援上正己而不求於人則無怨上不怨天下不尤人援平聲此言不願乎其外也故君子居易以俟命小人行險以徼幸易去聲易平地也居易素位而行也俟命不願乎外也徼求也幸謂所不當得而得者子曰射有似乎君子失諸正鵠反求諸其身正音征鵠工毒反畫布曰正棲皮曰鵠皆侯之中射之的也子思引此孔子之言以結上文之意或問十四章之説曰此章文義無可疑者而張子所謂當知無天下國家皆非之理者尤為切至吕氏説雖不免時有小失然其大體則皆平正慤實而有餘味也游氏説亦條暢而存亡得喪窮通好醜之説尤善侯氏所辨常緫黙識自得之説甚當近世佛者妄以吾言傳著其説而指意乖刺如此類者多矣甚可笑也輯略張子曰責己者當知無天下國家皆非之理故學至於不尤人學之至也吕氏曰達則兼善天下得志則澤加於民素富貴行乎富貴者也不驕不滛不足以道之也窮則獨善其身不得志則修身見於世素貧賤行乎貧賤者也不諂不懾不足以道之也言忠信行篤敬雖蠻貊之邦行矣素夷狄行乎夷狄者也文王内文明而外柔順以蒙大難箕子内難而能正其志素患難行乎患難者也又曰愛人不親反其仁治人不治反其智此在上位所以不陵下也彼以其富我以吾仁彼以其爵我以吾義吾何慊乎哉此在下位所以不援上也陵下不從則罪其下援上不得則非其上是所謂尤人者也庸徳之行庸言之謹居易者也國有道不變塞焉國無道至死不變心逸日休行其所無事如子從父命無所徃而不受俟命者也若夫行險以徼一旦之幸得之則貪為己力不得則不能反躬是所謂怨天者也故君子正己而不求於人如射而已射之不中由我巧之不至也故失諸正鵠者未有不反求諸身如君子之治己行有不得亦反求諸身則徳之不進豈吾憂哉游氏曰素其位而行者即其位而道行乎其中若其素然也舜之飯糗茹草若將終身此非素貧賤而道行乎貧賤不能然也及其為天子被袗衣鼓琴若固有之此非素富貴而道行乎富貴不能然也飯糗袗衣其位雖不同而此道之行一也至於夷狄患難亦若此而已道無不行則無入而不自得矣蓋道之在天下不以易世而有存亡故無古今則君子之行道不以易地而有加損故無得喪至於在上位不陵下知富貴之非泰也在下位不援上知貧賤之非約也此惟正己而不求於人者能之故能上不怨天下不尤人蓋君子為能循理故居易以俟命居易未嘗不得也故窮通皆好小人反是故行險以徼幸行險未必常得也故窮通皆醜學者要當篤信而已射有似乎君子者射者發而不中則必反而求其不中之故意者志未正邪體未直邪持弓矢而未審固邪然而不中者寡矣君子之正身亦若此也愛人不親反其仁治人不治反其智禮人不荅反其敬行有不得者皆反求諸己而已而何怨天尤人之有哉失諸正鵠者行有不得之况也楊氏曰君子居其位若固有之不出位之思素其位也侯氏曰緫老嘗問一士人曰論語云黙而識之識是識箇甚子思言君子無入不自得得是得箇甚或者無以為對此是不識吾儒之道猶以吾儒語為釋氏用在吾儒為不成説話既曰黙識與無入不自得更理會甚識甚得之事是不成説話也今人見筆墨須謂之筆墨見人須謂之人不須問黙而識之是黙識也聖賢於道猶是也庸言之信庸行之謹是自得也豈可名其所識所得之事乎右第十四章子思之言也凡章首無子曰字者放此君子之道辟如行逺必自邇辟如登髙必自卑辟譬同詩曰妻子好合如鼓瑟琴兄弟既翕和樂且耽宜爾室家樂爾妻帑好去聲耽詩作湛亦音耽樂音洛詩小雅常棣之篇鼓瑟琴和也翕亦合也耽亦樂也帑子孫也子曰父母其順矣乎夫子誦此詩而賛之曰人能和於妻子宜於兄弟如此則父母其安樂之矣子思引詩及此語以明行逺自邇登髙自卑之意輯略吕氏曰不得乎親不可以為人不順乎親不可以為子故君子之道莫大乎孝孝之本莫大乎順父母故仁人孝子欲順乎親必先乎妻子不失其好兄弟不失其和室家宜之妻帑樂之致家道成然後可以養父母之志而無違行逺登髙者謂孝莫大乎順其親者也自邇自卑者謂本乎妻子兄弟者也故身不行道不行於妻子文王刑于寡妻至于兄弟則治家之道必自妻子始右第十五章子曰鬼神之為徳其盛矣乎程子曰鬼神天地之功用而造化之迹也張子曰鬼神者二氣之良能也愚謂以二氣言則鬼者隂之靈也神者陽之靈也以一氣言則至而伸者為神反而歸者為鬼其實一物而已為徳猶言性情功效視之而弗見聽之而弗聞體物而不可遺鬼神無形與聲然物之終始莫非隂陽合散之所為是其為物之體而物所不能遺也其言體物猶易所謂幹事使天下之人齊明盛服以承祭祀洋洋乎如在其上如在其左右齊側皆反齊之為言齊也所以齊不齊而致其齊也明猶潔也洋洋流動充滿之意能使人畏敬奉承而發見昭著如此乃其體物而不可遺之驗也孔子曰其氣發揚于上為昭明焄蒿悽愴此百物之精也神之著也正謂此爾詩曰神之格思不可度思矧可射思度待落反射音亦詩作斁詩大雅抑之篇格來也矧况也射厭也言厭怠而不敬也思語辭也夫微之顯誠之不可揜如此夫夫音扶誠者真實無妄之謂隂陽合散無非實者故其發見之不可揜如此或問鬼神之説其詳奈何曰鬼神之義孔子所以告宰予者見於祭義之篇其説己詳而鄭氏釋之亦己明矣其以口鼻之噓吸者為魂耳目之精明者為魄蓋指血氣之類以明之程子張子更以隂陽造化為説則其意又廣而天地萬物之屈伸徃來皆在其中矣蓋陽魂為神隂魄為鬼是以其在人也隂陽合則魂凝魄聚而冇生隂陽判則魂升為神魄降為鬼易大傳所謂精氣為物遊魂為變故知鬼神之情状者正以明此而書所謂殂落者亦以其升降為言耳若又以其徃來者言之則來者方伸而為神徃者既屈而為鬼蓋二氣之分實一氣之運故陽主伸隂主屈而錯綜以言亦各得其義焉學者熟玩而精察之如謝氏所謂做題目入思議者則庶乎有以識之矣曰諸説何如曰吕氏推本張子之説尤為詳備但改本有所屈者不忘一句乃形潰反原之意張子他書亦有是説而程子數辨其非東見録中所謂不必以既反之氣復為方伸之氣者其類可攷也謝氏説則善矣但歸根之云似亦微有反原之累耳游楊之説皆有不可曉者唯妙萬物而無不在一語近是而以其他語攷之不知其於是理之説果如何也侯氏曰鬼神形而下者非誠也鬼神之徳則誠也案經文本賛鬼神之徳之盛如下文所云而結之曰誠之不可揜如此則是以為鬼神之徳所以盛者蓋以其誠耳非以誠自為一物而别為鬼神之徳也今侯氏乃折鬼神與其徳為二物而以形而上下言之乍讀如可喜者而細以經文事理求之則失之逺矣程子所謂只好隔壁聽者其謂此類也夫曰子之以幹事明體物何也曰天下之物莫非鬼神之所為也故鬼神為物之體而物無不待是而有者然曰為物之體則物先乎氣必曰體物然後見其氣先乎物而言順耳幹猶木之有幹必先有此而後枝葉有所附而生焉貞之幹事亦猶是也侯師聖解中庸鬼神之為徳謂鬼神為形而下者鬼神之徳為形而上者且如中庸之為徳不成説中庸為形而下者中庸之徳為形而上者問體物而不可遺是有此物便有鬼神凡天下萬物萬事皆不能外夫鬼神否曰不是有此物時便有此鬼神説倒了乃是有這鬼神了方有此物及至有此物了又不能違夫鬼神也體物而不可遺用拽轉看將鬼神做主將物做賔方看得出是鬼神去體那物鬼神却是主也問或問中謂循其説而體驗之若有以使人神識飛揚眩瞀迷惑無所底止所謂其説者莫是指楊先生非體物不遺者其孰能察之之説否曰然不知前輩讀書如何也恁鹵莾據體物而不遺一句乃是論鬼神之徳為萬物之體幹耳今乃以為體察之體其可邪微之顯誠之不可揜如此夫皆實理也問中庸十六章初説鬼神體物而不可遺只是就隂陽上説末後又却以祭祀言之是如何曰此是就其親切著見者言之也若不如此説則人必將風雷山澤做一般鬼神看將廟中祭享者又做一般鬼神看故即其親切著見者言之欲人會之為一也問鬼神之徳其至矣乎此止説噓吸聦明之鬼神末後却歸向齊明盛服以承祭祀洋洋乎如在其上是如何曰惟是齊戒祭祀之時鬼神之理著若是他人亦是卒未曉得他須道風雷山澤之鬼神是一般鬼神廟中泥塑底又是一般鬼神只道有兩樣鬼神所以如此説起又歸向親切明著處去庶㡬人知得不是二事也問鬼神之徳如何是良能功用處曰論來只是隂陽屈伸之氣只謂之隂陽亦可也然必謂之鬼神者以其良能功用而言也今又須從良能功用上求見鬼神之徳始得問中庸鬼神章首尾皆主二氣屈伸徃來而言而中間洋洋如在其上引其氣發揚於上為昭明焄蒿悽愴此乃人物之死氣似與前後意不合何也曰死便是屈感召得來便是伸曰昭明焄蒿悽愴這是人之死氣也此氣會消了曰是問伸底只是這既死之氣復來伸否曰這裏便難恁地説這伸底又是别新生了問如何會别生曰祖宗氣只存在子孫身上祭祀時只是這氣便自然又伸自家極其誠敬肅然如在其上是甚物得不是伸此便是神之著也所以古人燎以求諸陽灌以求諸隂謝氏謂祖考精神便是自家精神已説得是問章句云猶言性情功效云爾性情乃鬼神之情状不審所謂功效者何謂曰能使天下之人齊明盛服以承祭祀便是功效問魂魄守體有所知否曰耳目聦明為魄安得謂無知問然則人之死也魂升魄降是兩處有知覺也曰孔子分明言合鬼與神教之至也當祭之時求諸陽及求諸隂正謂此况祭亦有報魄之説問五廟七廟逓遷之制恐是世代浸逺精爽消亡故廟有遷毁曰雖是如此然祭者求諸隂求諸陽此氣依舊在若不如此則是知死而致死之也蓋其子孫未絶此氣接續亦未絶又曰天神地祇山川之神有此物在其氣自在此故不難曉惟人已死其事杳茫所以難説問鬼神造化之迹曰鬼神是天地間造化只是箇二氣屈伸徃來神是陽鬼是隂徃者屈來者伸便有箇迹恁地人死時這知覺便散否曰不是散是盡了氣盡則知覺亦盡曰世俗所謂物怪神姦之説則如何斷曰世俗大抵十分有八分是胡説二分亦有此理多有是非命死者是他氣未盡故憑依如此然終乆亦必消了又有是乍死後氣未消盡是他當初稟得氣盛故如此終乆亦消了蓋精與氣合便生人物游魂為變便無了如人説神仙古來神仙皆不見只是説後來神仙曰謝氏謂祖考精神便是自家精神如何曰此句已是説得好祖孫只是一氣極其誠敬自然相感如這大樹有種子下地生出又成樹便即是那大樹也問明則有禮樂幽則有鬼神何也程子曰鬼神只是一箇造化天尊地卑乾坤定矣鼓之以雷霆潤之以風雨是也又曰夫天專言之則道也分而言之則以形體謂之天以主宰謂之帝以功用謂之鬼神以妙用謂之神以性情謂之乾伊川又曰鬼神者造化之迹也又曰鬼神是徃而不反之義又曰言清虛一大為萬物之源恐未安須兼清濁虛實乃可言神道體物不遺不應有方所明道又曰上天之載無聲無臭其體則謂之易其理則謂之道其用則謂之神故説神如在其上如在其左右大小事而只曰誠之不可揜如此夫從上徹下不過如此問世言鬼神之事雖知其無然不能無疑如何可以曉悟其理曰理會得精氣為物游魂為變與原始要終之説便能知也鬼神之道只恁説與賢雖會得亦信不過須是自得也張子曰鬼神者二氣之良能也又曰天道不窮寒暑已衆動不窮屈伸已鬼神之實不越二端而已矣又曰鬼神徃來屈伸之義故天曰神地曰祇人曰鬼神來者歸之始鬼徃者來之終又曰天體物不遺猶仁體事而無不在也禮儀三百威儀三千無一物之非仁也昊天曰明及爾出王昊天曰旦及爾游衍無一物之不體也又曰凡可状皆有也凡有皆象也凡象皆氣也氣之性本虚而神則神與性乃氣所固有此鬼神所以體物而不可遺也吕氏曰鬼神者無形故視之不見無聲故聽之不聞然萬物之生莫不有氣氣也者神之盛也莫不有魄魄也者鬼之盛也故人亦鬼神之會耳此體物而不可遺者也鬼神者周流天地之間無所不在雖寂然不動而有感必通雖無形無聲而有所謂昭昭不可欺者故如在其上如在其左右也弗見弗聞可謂微矣然體物而不可遺此謂之顯周流天地之間昭昭而不可欺可謂誠矣然因感而必通此之謂不可揜又曰鬼神者二氣之徃來耳物感雖微無不通於二氣故人有是心雖自謂隱微心未嘗不動動則固己感於氣矣鬼神安有不見乎其心之動又必見於聲色舉動之間人乗見以知之則感之著者也謝氏曰動而不己其神乎滯而有迹其鬼乎徃來不息神也摧仆歸根鬼也致生之故其鬼神致死之故其鬼不神何也人以為神則神以為不神則不神矣知死而致生之不智知生而致死之不仁聖人所謂神明之也或問死生之説謝曰死時氣盡也曰有鬼神否謝曰余當時亦曽問明道先生明道曰待向你道無來你怎生信得及待向你道有來你但去尋討看謝曰此便是荅底語又曰横渠説得來别這箇便是天地間妙用須是將來做箇題目入思議始得講説不濟事曰沈魂滯魄影響底事如何曰須是自家看得破始得張亢郡君化去嘗來附語亢所知事皆能言之亢一日方與道士圍碁又自外來道士封一把碁子令將去問之張不知數便道不得又如紫姑神不識字底把著寫不得不信底把著寫不得推此可以見矣曰先生祭享鬼神則甚曰是他意思别三日齊五日戒求諸隂陽四方上下蓋是要集自家精神所以格有廟必於萃與渙言之雖然如是以為有亦不可以為無亦不可這裏有妙用於若有若無之間須斷置得去始得曰如此却是鶻突也謝氏不是鶻突自家要有便有自家要無便無始得鬼神在虛空中辟塞滿觸目皆是為他是天地妙用祖考精神便是自家精神楊氏曰鬼神體物而不可遺蓋其妙萬物而無不在故也右第十六章不見不聞隱也體物如在則亦費矣此前三章以其費之小者而言此後三章以其費之大者而言此一章兼費隱包小大而言子曰舜其大孝也與徳為聖人尊為天子富有四海之内宗廟饗之子孫保之與平聲子孫謂虞思陳胡公之屬故大徳必得其位必得其禄必得其名必得其壽舜年百有十嵗故天之生物必因其材而篤焉故栽者培之傾者覆之材質也篤厚也栽植也氣至而滋息為培氣反而逰散則覆詩曰嘉樂君子憲憲令徳冝民冝人受禄于天保佑命之自天申之詩大雅假樂之篇假當依此作嘉憲當依詩作顯申重也故大徳者必受命受命者受天命為天子也或問十七章之説曰程子張子吕氏之説備矣楊氏所辨孔子不受命之意則亦程子所謂非常理者盡之而侯氏所推以謂舜得其常而孔子不得其常者尤明白也至於顔跖壽天之不齊則亦不得其常而已楊氏乃忘其所以論孔子之意而更援老聃之言以為顔子雖夭而不亡者存則反為衍説而非吾儒之所冝言矣且其所謂不亡者果何物哉若曰天命之性則是古今聖愚公共之物而非顔子所能專若曰氣散而其精神魂魄猶有存者則是物而不化之意猶有滯於冥漢之間尤非所以語顔子也侯氏所謂孔子不得其常者善矣然又以為天於孔子固己培之則不免有自相矛盾處蓋徳為聖人者固孔子所以為栽者也至於禄也位也壽也則天之所當以培乎孔子者而以適丁氣數之衰是以雖欲培之而有所不能及耳是亦所謂不得其常者何假復為異説以汨之哉問舜之大徳受命止是為善得福而已中庸却言天之生物栽培傾覆何也曰只是一理此亦非是有物使之然但物之生時自節節長將去恰似有物扶持他及其衰也則自節節消磨將去恰似有箇物推倒他理自如此唯我有是受福之理故天既佑之又申之輯略程子曰知天命是達天理也必受命是得其應也命者是天之付與如命令之命天之報應皆如影響得其報者是常理也不得其報者非常理也然而細推之則須有報應但人以淺狹之見求之便為差誤天命不可易也然有可易者唯有徳者能之如修養之引年世祚之祈天永命常人之至於聖賢皆此道也伊川張子曰徳不勝氣性命於氣徳勝其氣性命於徳窮理盡性則性天命命天徳氣之不可變者獨死生脩天而已故論死生則曰有命以言其氣也語富貴則曰在天以言其理也此大徳所以必受命吕氏曰中庸之行孝悌而已如舜之徳位皆極流澤之逺始可謂盡孝故禄位名壽之必得非大徳其孰能致之一本云天之於萬物其所以為吉凶之報莫非因其所自取也植之固者加雨露之養則其未必盛茂植之不固者震風淩雨則其本先撥至於人事則得道者多助失道者寡助是皆因其材而篤焉栽者培之傾者覆之者也古之君子既有憲憲之令徳而又有冝民冝人之大功此冝受天禄矣故天保佑之申之以受天命此大徳所以必受命是亦栽者培之之義歟又曰命雖不易惟至誠不息亦足以移之此大徳所以必受命君子所以有性焉不謂命也侯氏曰舜匹夫也而有天下尊為天子富有四海之内以天下養宗廟饗之子孫保之孝之大也禄位名壽必得者理之常也不得者非常也得其常者舜也不得其常者孔子也舜自匹夫而有天下栽者培之也桀自天子而為匹夫傾者覆之也天非為舜桀存亡之也理固然也故曰大徳必受命必言其可必也右第十七章此由庸行之常推之以極其至見道之用廣也而其所以然者則為體微矣後二章亦此意子曰無憂者其惟文王乎以王季為父以武王為子父作之子述之此言文王之事書言王季其勤王家蓋其所作亦積功累仁之事也武王纉大王王季文王之緒壹戎衣而有天下身不失天下之顯名尊為天子富有四海之内宗廟饗之子孫保之大音泰下同此言武王之事纉繼也大王王季之父也書云大王肇基王迹詩云至于大王實始翦商緒業也戎衣甲胄之屬壹戎衣武成文言一著戎衣以伐紂也武王末受命周公成文武之徳追王大王王季上祀先公以天子之禮斯禮也達乎諸侯大夫及士庶人父為大夫子為士葬以大夫祭以士父為士子為大夫葬以士祭以大夫期之喪達乎大夫三年之喪達乎天子父母之喪無貴賤一也追王之王去聲此言周公之事末猶老也追王蓋推文武之意以及乎王迹之所起也先公組紺以上至后稷也上祀先公以天子之禮又推大王王季之意以及於無窮也制為禮法以及天下使葬用死者之爵祭用生者之禄喪服自朞以下諸侯絶大夫降而父母之喪上下同之推己以及人也右第十八章子曰武王周公其達孝矣乎達通也承上章而言武王周公之孝乃天下之人通謂之孝猶孟子之言達尊也夫孝者善繼人之志善述人之事者也上章言武王纉大王王季文王之緒以有天下而周公成文武之徳以追崇其先祖此繼志述事之大者也下文又以其所制祭祀之禮通於上下者言之春秋脩其祖廟陳其宗器設其裳衣薦其時食祖廟天子七諸侯五大夫三適士二官師一宗器先世所藏之重器若周之赤刀大訓天球河圖之屬也裳衣先祖之遺衣服祭則設之以授尸也時食四時之食各有其物如春行羔豚膳膏香之類是也宗廟之禮所以序昭穆也序爵所以辨貴賤也序事所以辨賢也旅酬下為上所以逮賤也燕毛所以序齒也昭如字為去聲宗廟之次左為昭右為穆而子孫亦以為序有事於太廟則子姓兄弟羣昭羣穆咸在而不失其倫焉爵公侯卿大夫也事宗祝有司之職事也旅衆也酬導飲也旅酬之禮賔弟子兄弟之子各舉觶於其長而衆相酬蓋宗廟之中以有事為榮故逮及賤者使亦得以申其敬也燕毛祭畢而燕則以毛髪之色别長幼為坐次也齒年數也踐其位行其禮奏其樂敬其所尊愛其所親事死如事生事亡如事存孝之至也踐猶履也其指先王也所尊所親先王之祖考子孫臣庶也始死謂之死既葬則曰反而亡焉皆指先王也此結上文兩節皆繼志述事之意也郊社之禮所以事上帝也宗廟之禮所以祀乎其先也明乎郊社之禮禘嘗之義治國其如示諸掌乎郊祭天社祭地不言后土者省文也禘天子宗廟之大祭追祭太祖之所自出於太廟而以太祖配之也嘗秋祭也四時皆祭舉其一耳禮必冇義對舉之互文也示與視同視諸掌言易見也此與論語文意大同小異記有詳略耳右第十九章哀公問政哀公魯君名蔣子曰文武之政布在方策其人存則其政舉其人亡則其政息方版也策簡也息猶滅也有是君有是臣則有是政矣人道敏政地道敏樹夫政也者蒲蘆也夫音扶敏速也蒲蘆沈括以為蒲葦是也以人立政猶以地種樹其成速矣而蒲葦又易生之物其成尤速也言人存政舉其易知此故為政在人取人以身脩身以道脩道以仁此承上文人道敏政而言也為政在人家語作為政在於得人語意尤備人謂賢臣身指君身道者天下之達道仁者天地生物之心而人得以生者所謂元者善之長也言人君為政在於得人而取人之則又在脩身能仁其身則有君有臣而政無不舉矣仁者人也親親為大義者冝也尊賢為大親親之殺尊賢之等禮所生也殺去聲人指人身而言具此生理自然便有惻怛慈愛之意深體味之可見冝者分别事理各有所冝也禮則節文斯二者而已在下位不獲乎上民不可得而治矣鄭氏曰此句在下誤重在此故君子不可以不脩身思脩身不可以不事親思事親不可以不知人思知人不可以不知天為政在人取人以身故不可以不脩身脩身以道脩道以仁故思脩身不可以不事親欲盡親親之仁必由尊賢之義故又當知人親親之殺尊賢之等皆天理也故又當知天天下之達道五所以行之者三曰君臣也父子也夫婦也昆弟也朋友之交也五者天下之達道也知仁勇三者天下之達徳也所以行之者一也知去聲達道者天下古今所共由之路即書所謂五典孟子所謂父子有親君臣有義夫婦有别長幼有序朋友有信是也知所以知此也仁所以體此也勇所以强此也謂之達徳者天下古今所同得之理也一則誠而已矣達道雖人所共由然無是三徳則無以行之達徳雖人所同得然一有不誠則人欲間之而徳非其徳矣程子曰所謂誠者止是誠實此三者三者之外更别無誠或生而知之或學而知之或困而知之及其知之一也或安而行之或利而行之或勉强而行之及其成功一也强上聲知之者之所知行之者之所行謂達道也以其分而言則所以知者知也所以行者仁也所以至於知之成功而一者勇也以其等而言則生知安行者知也學知利行者仁也困知勉行者勇也蓋人性雖無不善而氣稟有不同者故聞道有蚤莫行道有難易然能自强不息則其至一也吕氏曰所入之塗雖異而所至之域則同此所以為中庸若乃企生知安行之資為不可㡬及輕困知勉行為不能有成此道之所以不明不行也子曰好學近乎知力行近乎仁知恥近乎勇子曰二字衍文好近乎知之知並去聲此言未及乎達徳而求以入徳之事通上文三知為知三行為仁則此三近者勇之次也吕氏曰愚者自是而不求自私者狥人欲而忘反懦者甘為人下而不辭故好學非知然足以破愚力行非仁然足以忘私知恥非勇然足以起懦知斯三者則知所以脩身知所以脩身則知所以治人知所以治人則知所以治天下國家矣斯三者指三近而言人者對己之稱天下國家則盡乎人矣言此以結上文脩身之意起下文九經之端也凡為天下國家有九經曰脩身也尊賢也親親也敬大臣也體羣臣也子庶民也來百工也柔逺人也懐諸侯也經常也體謂設以身處其地而察其心也子如父母之愛其子也柔逺人所謂無忘賔旅者也此列九經之目也吕氏曰天下國家之本在身故脩身為九經之本然必親師取友然後脩身之道進故尊賢次之道之所進莫先其家故親親次之由家以及朝廷故敬大臣體羣臣次之由朝廷以及其國故子庶民來百工次之由其國以及天下故柔逺人懷諸侯次之此九經之序也視羣臣猶吾四體視百姓猶吾子此視臣視民之别也脩身則道立尊賢則不惑親親則諸父昆弟不怨敬大臣則不眩體羣臣則士之報禮重子庶民則百姓勸來百工則財用足柔逺人則四方歸之懷諸侯則天下畏之此言九經之效也道立謂道成於己而可為民表所謂皇建其有極是也不惑謂不疑於理不眩謂不迷於事敬大臣則信任專而小臣不得以間之故臨事而不眩也來百工則通工易事農末相資故財用足柔逺人則天下之旅皆悦而願出於其塗故四方歸懷諸侯則徳之所施者博而威之所制者廣矣故曰天下畏之齊明盛服非禮不動所以脩身也去讒逺色賤貨而貴徳所以勸賢也尊其位重其禄同其好惡所以勸親親也官盛任使所以勸大臣也忠信重禄所以勸士也時使薄斂所以勸百姓也日省月試旣稟稱事所以勸百工也送徃迎來嘉善而矜不能所以柔逺人也繼絶世舉廢國治亂持危朝聘以時厚徃而薄來所以懷諸侯也齊側皆反去上聲逺好惡斂並去聲旣許氣反稟彼錦力錦二反稱去聲朝音潮此言九經之事也官盛任使謂官屬衆盛足任使令也蓋大臣不當親細事故所以優之者如此忠信重禄謂待之誠而養之厚蓋以身體之而知其所賴乎上者如此也旣讀曰餼餼稟稍食也稱事如周禮槀人職曰考其弓弩以上下其食是也徃則為之授節以送之來則豐其委積以迎之朝謂諸侯見於天子聘謂諸侯使大夫來獻王制比年一小聘三年一大聘五年一朝厚徃薄來謂燕賜厚而納貢薄凡為天下國家有九經所以行之者一也一者誠也一有不誠則是九者皆為虛文矣此九經之實也凡事豫則立不豫則廢言前定則不跲事前定則不困行前定則不疚道前定則不窮跲其刼反行去聲凡事指達道達徳九經之屬豫素定也跲躓也疚病也此承上文言凡事皆欲先立乎誠如下文所推是也在下位不獲乎上民不可得而治矣獲乎上有道不信乎朋友不獲乎上矣信乎朋友有道不順乎親不信乎朋友矣順乎親有道反諸身不誠不順乎親矣誠身有道不明乎善不誠乎身矣此又以在下位者推言素定之意反諸身不誠謂反求諸身而所存所發未能真實而無妄也不明乎善謂未能察於人心天命之本然而真知至善之所在也誠者天之道也誠之者人之道也誠者不勉而中不思而得從容中道聖人也誠之者擇善而固執之者也中並去聲從七容反此承上文誠身而言誠者真實無妄之謂天理之本然也誠之者未能真實無妄而欲其真實無妄之謂人事之當然也聖人之徳渾然天理真實無妄不待思勉而從容中道則亦天之道也未至於聖則不能無人欲之私而其為徳不能皆實故未能不思而得則必擇善然後可以明善未能不勉而中則必固執然後可以誠身此則所謂人之道也不思而得生知也不勉而中安行也擇善學知以下之事固執利行以下之事也博學之審問之慎思之明辨之篤行之此誠之之目也學問思辨所以擇善而為知學而知也篤行所以固執而為仁利而行也程子曰五者廢其一非學也有弗學學之弗能弗措也有弗問問之弗知弗措也有弗思思之弗得弗措也有弗辨辨之弗明弗措也有弗行行之弗篤弗措也人一能之已百之人十能之已千之君子之學不為則已為則必要其成故常百倍其功此困而知勉而行者也勇之事也果能此道矣雖愚必明雖柔必強明者擇善之功強者固執之效吕氏曰君子所以學者為能變化氣質而已徳勝氣質則愚者可進於明柔者可進於強不能勝之則雖有志於學亦愚不能明柔不能立而已矣蓋均善而無惡者性也人所同也昬明強弱之稟不齊者才也人所異也誠之者所以反其同而變其異也夫以不美之質求變而美非百倍其功不足以致之今以鹵莾滅裂之學或作或輟以變其不美之質及不能變則曰天質不美非學所能變是果於自棄其為不仁甚矣或問蒲蘆之説何以廢舊説而從沈氏也曰蒲蘆之為果臝他無所攷且於上下文義亦不甚通唯沈氏之説乃與地道敏樹之云者相應故不得而不從耳曰達道達徳有三知三行之不同而其致則一何也曰此氣質之異而性則同也生而知者生而神靈不待教而於此無不知也安而行者安於義理不待習而於此無所咈也此人之稟氣清明賦質純粹天理渾然無所虧喪者也學而知者有所不知則學以知之雖非生知而不待困也利而行者真知其利而必行之雖有未安而不待勉也此得清之多而未能無蔽得粹之多而未能無雜天理小失而能亟反之者也困而知者生而不明學而未達困心衡慮而後知之者也勉強而行者不獲所安未知其利勉力矯強而行之者也此則昬蔽駁雜天理㡬亡乆而後能反之者也此三等者其氣質之稟亦不同矣然其性之本則善而已故及其知之而成功也則其所知所至無少異焉亦復其初而已矣曰張子吕楊侯氏皆以生知安行為仁學知利行為知困知勉行為勇其説善矣子之不從何也曰安行可以為仁矣然生而知之則知之大而非仁之屬也利行可以為知矣然學而知之則知之次而非知之大也且上文三者之目固有次序而篇首諸章以舜明知以回明仁以子路明勇其語知也不卑矣夫豈專以學知利行者為足以當之乎故今以其分而言則三知為智三行為仁所以勉而不息以至於知之成功之一為勇以其等而言則以生知安行者主於知而為智學知利行者主於行而為仁困知勉行者主於强而為勇又通三近而言則又以三知為智三行為仁而三近為勇之次則亦庶乎其曲盡歟曰九經之説奈何曰不一其内則無以制其外不齊其外則無以養其内靜而不存則無以立其本動而不察則無以勝其私故齊明盛服非禮不動則内外交養而動靜不違所以為修身之要也信讒邪則任賢不專狥貨色則好賢不篤賈捐之所謂後宫盛色則賢者隱微佞人用事則諍臣杜口蓋持衡之勢此重則彼輕理固然矣故去讒逺色賤貨而一於貴徳所以為勸賢之道也親之欲其貴愛之欲其富兄弟㛰姻欲其無相逺故尊位重禄同其好惡所以為勸親親之道也大臣不親細事則以道事君者得以自盡故官屬衆盛足任使令所以為勸大臣之道也盡其誠而恤其私則士無仰事俯育之累而樂趨事功故忠信重禄所以為勸士之道也人情莫不欲逸亦莫不欲富故時使薄斂所以為勸百姓之道也日省月試以程其能旣稟稱事以償其勞則不信度作淫巧者無所容惰者勉而能者勸矣為之授節以送其徃待以委積以迎其來因能授任以嘉其善不強其所不欲以矜其不能則天下之旅皆恱而願出於其塗矣無後者續之己滅者封之治其亂使上下相安持其危使大小相恤朝聘有節而不勞其力貢賜有度而不匱其財則天下諸侯皆竭其忠力以蕃衛王室而無倍畔之心矣凡此九經其事不同然緫其實不出乎脩身尊賢親親三者而已敬大臣體羣臣則自尊賢之等而推之也子庶民來百工柔逺人懷諸侯則自親親之殺而推之也至於所以尊賢而親親則又豈無所自而推之哉亦曰脩身之至然後有以各當其理而無所悖耳曰親親而不言任之以事者何也曰此親親尊賢並行不悖之道也苟以親親之故不問賢否而輕屬任之不幸而或不勝焉治之則傷恩不治則廢法是以富之貴之親之厚之而不曰任之以事是乃所以親愛而保全之也若親而賢則自當置之大臣之位而尊之敬之矣豈但富貴之而已哉觀於管蔡監商而周公不免於有過及其致辟之後則惟康叔聃季相與夾輔王室而五叔者有土而無官焉則聖人之意亦可見矣曰子謂信任大臣而無以間之故臨事而不眩使大臣而賢也則可其或不幸而有趙髙朱异虞世基李林甫之徒焉則鄒陽所謂偏聽生姦獨任成亂范雎所謂妬賢嫉能御下蔽上以成其私而主不覺悟者亦安得而不慮邪曰不然也彼其所以至此正坐不知九經之義而然耳使其明於此義而能以修身為本則固視明聽聦而不可欺以賢否矣能以尊賢為先則其所置以為大臣者必不雜以如是之人矣不幸而或失之則亦亟求其人以易之而已豈有知其必能為姦以敗國顧猶置之大臣之位使之姑以奉行文書為職業而又恃小臣之察以防之哉夫勞於求賢而逸於得人任則不疑而疑則不任此古之聖君賢相所以誠意交孚兩盡其道而有以共成正大光明之業也如其不然吾恐上之所以猜防畏備者愈密而其為眩愈甚下之所以欺罔蒙蔽者愈巧而其為害愈深不幸而臣之姦遂則其禍固有不可勝言者幸而主之威勝則夫所謂偏聽獨任御下蔽上之姦將不在於大臣而移於左右其為國家之禍尤有不可勝言者矣嗚呼危哉曰所謂前定何也曰先立乎誠也先立乎誠則言有物而不躓矣事有實而不困矣行有常而不疚矣道有本而不窮矣諸說惟游氏誠定之云得其要張子以精義入神為言是則所謂明善者也曰在下獲上明善誠身之說奈何曰夫在下位而不獲乎上則無以安其位而行其志故民不可治然欲獲乎上又不可以諛說取容也其道在信乎友而已蓋不信乎友則志行不孚而名譽不聞故上不見知然欲信乎友又不可以便佞苟合也其道在恱乎親而已蓋不恱乎親則所厚者薄而無所不薄故友不見信然欲順乎親又不可以阿意曲從也其道在誠乎身而已蓋反身不誠則外有事親之禮而内無愛敬之實故親不見恱然欲誠乎身又不可以襲取強為也其道在明乎善而已蓋不能格物致知以真知至善之所在則好善必不能如好好色惡惡必不能如惡惡臭雖欲勉焉以誠其身而身不可得而誠矣此必然之理也故夫子言此而其下文即以天道人道擇善固執者繼之蓋擇善所以明善固執所以誠身擇之之明則大學所謂物格而知至也執之之固則大學所謂意誠而心正身脩也知至則反諸身者將無一毫之不實意誠心正而身脩則順親信友獲上治民將無所施而不利而達道達徳九經凡事亦一以貫之而無遺矣曰誠之為義其詳可得而聞乎曰難言也姑以其名義言之則真實無妄之云也若事理之得此名則亦隨其所指之大小而皆有取乎真實無妄之意耳蓋以自然之理言之則天地之間惟天理為至實而無妄故天理得誠之名若所謂天之道鬼神之徳是也以徳言之則有生之類惟聖人之心為至實而無妄故聖人得誠之名若所謂不勉而中不思而得者是也至於隨事而言則一念之實亦誠也一言之實亦誠也一行之實亦誠也是其大小雖有不同然其義之所歸則未始不在於實也曰然則天理聖人之所以若是其實者何也曰一則純二則雜純則誠雜則妄此常物之大情也夫天之所以為天也沖漠無朕而萬理兼該無所不具然其為體則一而已矣未始有物以雜之也是以無聲無臭無思無為而一元之氣春秋冬夏晝夜昬明百千萬年未嘗有一息之繆天下之物洪纎巨細飛潛動植亦莫不各得其性命之正以生而未嘗有一毫之差此天理之所以為實而不妄者也若夫人物之生性命之正固亦莫非天理之實但以氣質之偏口鼻耳目四支之好得以蔽之而私欲生焉是以當其惻隱之發而忮害雜之則所以為仁者有不實矣當其羞惡之發而貪昧雜之則所以為義者有不實矣此常人之心所以雖欲勉於為善而内外隱顯常不免於二致其甚至於詐偽欺罔而卒墮於小人之歸則以其二者雜之故也惟聖人氣質清純渾然天理初無人欲之私以病之是以仁則表裏皆仁而無一毫之不仁義則表裏皆義而無一毫之不義其為徳也固舉天下之善而無一事之或遺而其為善也又極天下之實而無一毫之不滿此其所以不勉不思從容中道而動容周旋莫不中禮也曰然則常人未免於私欲而無以實其徳者奈何曰聖人固己言之亦曰擇善而固執之耳夫於天下之事皆有以知其如是為善而不能不為知其如是為惡而不能不去則其為善去惡之心固己篤矣於是而又加以固執之功雖其不睹不聞之間亦必戒謹恐懼而不敢懈則凡所謂私欲者出而無所施於外入而無所藏於中自將消磨泯滅不得以為吾之病而吾之徳又何患於不實哉是則所謂誠之者也曰然則大學論小人之隂惡陽善而以誠於中者目之何也曰若是者自其天理之大體觀之則其為善也誠虚矣自其人欲之私分觀之則其為惡也何實如之而安得不謂之誠哉但非天理真實無妄之本然則其誠也適所以虛其本然之善而反為不誠耳曰學問思辨亦有序乎曰學之博然後有以備事物之理故能參伍之以得其所疑而有所問問之審然後有以盡師友之情故能反復之以發其端而可思思之謹則精而不雜故能有所自得而可以施其辨辨之明則斷而不差故能無所疑惑而可以見於行行之篤則凡所學問思辨而得之者又皆必踐其實而不為空言矣此五者之序也曰何以言誠為此篇之樞紐也曰誠者實而已矣天命云者實理之原也性其在物之實體道其當然之實用而教也者又因其體用之實而品節之也不可離者此理之實也隱之見微之顯實之存亡而不可掩者也戒謹恐懼而謹其獨焉所以實乎此理之實也中和云者所以状此實理之體用也天地位萬物育則所以極此實理之功效也中庸云者實理之適可而平常者也過與不及不見實理而妄行者也費而隱者言實理之用廣而體微也鳶飛魚躍流動充滿夫豈無實而有是哉道不逺人以下至於大舜文武周公之事孔子之言皆實理應用之當然而鬼神之不可揜則又其發見之所以然也聖人於此固以其無一毫之不實而至於如此之盛其示人也亦欲其必以其實而無一毫之偽也蓋自然而實者天也必期於實者人而天也誠明以下累章之意皆所以反復乎此而語其所以至於正大經而立大本參天地而賛化育則亦真實無妄之極功也卒章尚絅之云又本其務實之初心而言也内省者謹獨克己之功不愧屋漏者戒謹恐懼而無己可克之事皆所以實乎此之序也時靡有爭變也百辟刑之化也無聲無臭又極乎天命之性實理之原而言也蓋此篇大指專以發明實理之本然欲人之實此理而無妄故其言雖多而其樞紐不越乎誠之一言也嗚呼深哉聖賢言仁字處便有箇温厚慈祥之意帶箇愛底道理下文便言親親為大問修道以仁繼之以仁者人也何為下靣又添説義禮曰仁便有義如陽便有隂親親尊賢皆仁之事親之尊之其中自有箇差等這便是義與禮親親在父子如此在宗族如彼所謂殺也尊賢有當事之者有當友之者所謂等也問仁亦是道如何却說脩道以仁荅曰道是汎說仁是切要底思脩身不可以不事親思事親不可以不知人思知人不可以不知天知天起頭處能知天則知人事親脩身皆得其理矣聞見之知與徳性之知皆知也只是要知得到信得及如君之仁子之孝之類人所共知而多不能盡者非真知故也知恥如舜人也我亦人也舜為法於天下可傳於後世我猶未免為鄉人也是則可憂也旣恥為鄉人進學安得不勇豫先知也事未至而先知其理之謂豫凡事豫則立不豫則廢横渠曰豫吾内求利吾外也又曰精義入神者豫而已矣皆一義也誠是天理之實然更無纎毫作為聖人之生其稟受渾然氣質清明純粹全是此理更不待脩為而自然與天為一若其餘則須是博學審問謹思明辨篤行如此不已直待得仁義禮知與夫忠孝之道日用本分事無非實理然後為誠有一毫見得與天理不相合便於誠有一毫未至誠者天之道天無不實寒便是寒暑便是暑更不待使他恁地聖人仁便真箇是仁義便真箇是義更無不實處在常人說仁時恐猶冇不仁處説義時恐猶有不義處便須著思有以實之始得問博學之至明辨之是致知之事篤行則力行之事否曰然問哀公問政章舊只零碎解某自讀時只覺首叚尾與次叚首意相接如云政也者蒲盧也故為政在人取人以身脩身以道脩道以仁便説仁者人也親親為大義者冝也尊賢為大都接續説去一叚看始覺貫穿後因看家語乃是本來只一叚也中庸三十三章其次序甚密古人著述便是不可及此只將别人語言鬬凑成篇本末次第終始緫合如此縝密輯略程子曰生知者只是他生自知禮義不待學而知縱使孔子是生知亦何害於學如問禮於老耼訪官名於郯子何害於孔子禮文官名旣欲知舊物又不可鑿空撰得出須是問他先知者始得又曰生而知之學而知之亦是才問生而知之要學否曰生而知固不待學然聖人必須學張子曰天下之達道五其生民之大經乎經正則道前定事豫立不疑其所行利用安身之要莫先焉又曰知仁勇天下之達道雖本末有差及其所以知之成之則一也蓋仁者以生知以安行此五者知者以學知以利行此五者勇者以困知以勉强行此五者又曰性一也形之分有剛柔昬明者非性也有三人焉皆有目以别乎衆色一居乎密室一居乎帷箔之下一居於廣庭之中三人所見昬明各異豈目有不同乎隨其所居蔽有厚薄耳凡學者所以解蔽去惑故生知學知困知及其知之一也安得不貴於學乎誠即天道也天道自然無勉無思其中其得自然而已聖人誠一於天天即聖人聖人即天由仁義行何思勉之有故從容中道而不迫誠之者以人求天者也思誠而復之故明有未究於善必擇誠有未至所執必固學問思辨所以求之也行所以至之也求之至之非人一已百人十已千不足以化氣質一本云誠者理之實致一而不可易者也大而天下逺而萬古求之人情參之物理皆所同然有一無二雖前聖後聖若合符節理本如是非人私知之所能為此之謂誠誠即天道也天道自然何勉何思莫非性命之理而已故誠者天之道性之者也誠之者人之道反之者也聖人之於天道性之者也賢者之於天道反之者也性之者成性而與天無間也天即聖人聖人即天縱心所欲由仁義行也出於自然從容不迫不待乎思勉而後中也反之者求復乎性而未至雖誠而猶雜之偽雖行而未能無息則善不可不思而擇徳不可不勉而執不如是猶不足以至乎誠故學問思辨皆所以求之也行所以至之也謝氏曰誠是實理不是專一尋常人謂至誠止是專一實理則如惡惡臭如好好色不是安排來問中庸只論誠而論語曾不一及誠何也楊氏曰論語之教人凡言恭敬忠信所以求仁而進徳之事莫非誠也論語示人以入之方中庸言其至也蓋中庸子思傳道之書不正言其至則道不明孔子所罕言孟子常言之亦猶是矣右第二十章此引孔子之言以繼大舜文武周公之緒明其所傳之一致舉而措之亦猶是耳蓋包費隱兼小大以終十二章之意章内語誠始詳而所謂誠者實此篇之樞紐也又案孔子家語亦載此章而其文尤詳成功一也之下有公曰子之言美矣至矣寡人實固不足以成之也故其下復以子曰起荅辭今無此問辭而猶有子曰二字蓋子思删其繁文以附於篇而所刪有不盡者今當為衍文也博學之以下家語無之意彼有闕文抑此或子思所補也歟中庸集編卷中
