body:
  text: 欽定四庫全書孟子集編卷十四宋真德秀撰盡心章句下凡三十八章孟子曰不仁哉梁惠王也仁者以其所愛及其所不愛不仁者以其所不愛及其所愛親親而仁民仁民而愛物所謂以其所愛及其所不愛也公孫丑曰何謂也梁惠王以土地之故糜爛其民而戰之大敗將復之恐不能勝故驅其所愛子弟以殉之是之謂以其所不愛及其所愛也梁惠王以下孟子答辭也糜爛其民使之戰鬭糜爛其血肉也復之復戰也子弟謂太子申也以土地之故及其民以民之故及其子皆以其所不愛及其所愛也此章言仁人之恩自內及外不仁之禍由疏逮親南軒曰此愛者仁之道也而有所不愛者是為私意所隔而愛之理蔽於內也善推其所為則自親以及疏雖各有等差而愛無不加焉至於不仁者則不能推矣不能推故日以陷溺不惟無以及於人且將併與其親愛者亦不之恤此豈仁之道哉人之情孰不愛其所親而梁惠王乃倒置若是者以貪得之心勝故天理熄滅人欲橫流而至於斯極也朱子謂仁人之恩自內及外不仁之禍由疏及親斯言盡之矣嗚呼梁惠王以土地之故驅子弟以殉之故孟子譏其不仁也衍義孟子曰春秋無義戰彼善於此則有之矣春秋每書諸侯戰伐之事必加譏貶以著其擅興之罪無有以為合於義而許之者但就中彼善於此者則有之如召陵之師之類是也征者上伐下也敵國不相征也征所以正人也諸侯有罪則天子討而正之此春秋所以無義戰也孟子曰盡信書則不如無書程子曰載事之辭容有重稱而過其實者學者當識其義而已苟執於辭則時或有害於義不如無書之愈也吾於武成取二三䇿而已矣武成周書篇名武王伐紂歸而記事之書也䇿竹簡也取其二三䇿之言其餘不可盡信也程子曰取其奉天伐暴之意反政施仁之法而已仁人無敵於天下以至仁伐至不仁而何其血之流杵也杵舂杵也或作鹵楯也武成言武王伐紂紂之前徒倒戈攻于後以北血流漂杵孟子言此則其不可信者然書本意乃謂商人自相殺非謂武王殺之也孟子之設是言懼從世之惑且長不仁之心耳孟子曰有人曰我善為陳我善為戰大罪也陳去聲制行伍曰陳交兵曰戰國君好仁天下無敵焉好去聲南面而征北狄怨東面而征西夷怨曰奚為後我此引湯之事以明之解見前篇武王之伐殷也革車三百兩虎賁三千人兩去聲賁音奔又以武王之事明之也兩車數一車兩輪也千書序作百王曰無畏寧爾也非敵百姓也若崩厥角稽首書泰誓文與此小異孟子之意當云王謂商人曰無畏我也我來伐紂本為安寧汝非敵商之百姓也於是商人稽首至地如角之崩也征之為言正也各欲正已也焉用戰焉於虔反民為暴君所虐皆欲仁者來正已之國也南軒曰征之為言正也人望其來正已也而何戰之有哉若不志於仁而徒欲以巧力取勝則天下孰非吾敵勝與負均為殘民而逆天雖然戰陳君子之所不取而大司馬有教戰之法何也先王之制兵亦仁政之大者所以禁暴止亂而救民之生也有兵斯有用兵之法非若後世詭譎之為也蓋明其節制一其號令使之服習而其本則出於仁義是以無敵於天下若弛兵徹禁以召外侮而曰吾好仁而已是烏所謂仁者哉孟子曰梓匠輪輿能與人規矩不能使人巧尹氏曰規矩法度可告者也巧則在其人雖大匠亦末如之何也已蓋下學可以言傳上達必由心悟莊周所論斫輪之意蓋如此案莊子輪扁曰斫輪徐則甘而不固疾則苦而不入不徐不疾得之於手而應之於心口不能言有數存焉臣不能以喻臣之子臣之子不能得之於臣是以行年七十而老於斫輪孟子曰舜之飯糗茹草也若將終身焉及其為天子也被袗衣鼓琴二女果若固有之飯上聲糗去久反茹音汝袗之忍反果説文作婐烏果仄飯食也糗乾糒也茹亦食也袗畫衣也二女堯二女也果女侍也言聖人之心不以貧賤而有慕於外不以富貴而有動於中隨遇而安無預於已所性分定故也南軒曰舜於窮通之際果何有哉所欲不存樂天而安命窮而在下初無一毫之虧達而在上亦無一毫之加故無適而不自得也孟子曰吾今而後知殺人親之重也殺人之父人亦殺其父殺人之兄人亦殺其兄然則非自殺之也一間耳間去聲言吾今然後知者必有所為而感發也一間者我往彼來間一人耳其實與自害其親無異也范氏曰知此則愛敬人之親人亦愛敬其親矣孟子曰古之為關也將以禦暴譏察非常今之為關也將以為暴征稅出入范氏曰古之耕者什一後世或收大半之稅此以賦斂為暴也文王之囿與民同之齊宣王之囿為阱國中此以園囿為暴也後世為暴不止於關若使孟子用於諸侯必行文王之政凡此之類皆不終日而改也孟子曰身不行道不行於妻子使人不以道不能行於妻子身不行道者以行言之不行者道不行也使人不以道者以事言之不能行者令不行也孟子曰周于利者凶年不能殺周于德者邪世不能亂周足也言積之厚則用有餘孟子曰好名之人能讓千乘之國苟非其人簞食豆羮見於色好乘食皆去聲見音現好名之人矯情干譽是以能讓千乘之國然若本非能輕富貴之人則於得失之小者反不覺其真情之發見矣蓋觀人不於其所勉而於其所忽然後可以見其所安之實也東坡所謂人能碎千金之璧而不能不失聲於破釜正此意苟非其人其人指真能讓國者非指好名之人也問曽會得東坡之説否曰如此則能讓千乘之國只是好名至簞食豆羮見於色却是實情也曰然某把此一段對鄉為身死而不受一段蓋此段是好名之心勝大處打得過小處漏綻也動於萬鍾者是小處遮掩得過大處發露也南軒曰孟子此章言人之度量相越有如是其逺者夫均是人也而有讓千乘之國者有與人簞食豆羮而德見於色者何其不侔也蓋其所存有厚薄而所見有廣狹之故耳夫能讓千乘之國亦可謂髙矣而孟子謂之好名之人者何哉蓋未能循天理之實然者則亦未免為徇其名而已如季札之徒是也季子之父兄所以眷眷於季子之立者為其賢也此公理而非私意也而季子三辭焉是未究夫當立之義非為季子之私也就隘俗論之可謂超然獨出矣而揆之以道蓋亦好名而蔽其實故也好名之人雖能讓國未免限於名若夫大賢以上循乎天理雖以舜禹受天下受其所當受而不為泰以泰伯之讓夷齊之讓讓其所當讓而不為好名故孔子稱舜禹則曰有天下而不與焉稱泰伯則曰民無得而稱焉稱夷齊曰求仁而得仁聖人之意蓋可見矣愚案泰伯夷齊之讓與子臧季札之讓其讓則一而所以讓則不同學者所當究見其義或問曰何以言三讓之為固讓也曰古人辭讓以三為節一辭為禮辭再辭為固辭三辭為終辭故古注至是但言三讓而不解其目也今必求其事以實之則亦無所據矣曰何以言其讓於隱微之中也曰泰伯之讓無揖遜授受之迹人但見其逃去不反而已不知其讓也知其讓者見其讓國而已而不知所以使文武有天下者實由於此則是以天下讓也曰其為至德何也曰讓之為德既美矣至於三則其讓誠矣以天下讓則其所讓大矣而又能隱晦其迹使民無得而稱焉則其讓也非有為名之纍矣此其德所以為至極而不可以有加也曰太王有廢長立少之意非禮也泰伯又探其邪志而成之至於父死不赴傷毁髮膚皆非賢者之事就使必於讓國而為之則亦過而不合於中庸之德矣其為至德何也曰大王之欲立賢子孫為其道足以濟天下而非有愛憎之間利欲之私也是以泰伯去之而不以為狷王季受之而不以為貪父死不赴傷毁髮膚而不為不孝蓋處君臣父子之變而不失乎中庸此所以為至德也與魯隱公吳季子之事蓋不同矣曰逃去可矣何必斷髮文身哉曰先儒議論之多矣蘇氏以為讓國盛德之事矣然存其實而取其名者亂之所由起故泰伯為此所以使名實俱亡而亂不作也此以利害言之固不足以得聖賢之心而其弟黃門又曰子貢言泰伯端委以治吳則固未嘗斷髮文身也且漢東海王以天下授顯宗唐宋王成器以天下授玄宗皆兄弟終身無間言何必斷髮文身哉此引子貢之言則其事固有不可考者然以漢唐二事例之則亦未足以盡聖賢之心也蓋使王季之心但如顯宗玄宗則可若有叔齊之義則亦不能以一朝居矣使泰伯而不有以深自絶焉則亦何必致國於王季而安其位哉然顯宗玄宗之心其厚薄又自不同也南軒曰三讓程子曰不立一也逃之二也文身三也夫泰伯之讓誠難知也以君之元子而棄宗國以逃身本中夏而從夷狄之為不亦冒先王之大禁歟而泰伯安然行之非聖人孰能明其為至德也至德謂德之至也泰伯知文王有聖德天之所命當使天下被其澤故致國於王季為文王也故曰以天下讓言其至公之心為天下而讓也變而止乎中非達權樂天者其孰能與於此乎惟其事情深逺故民無得而稱而聖人獨知其為至德也或曰泰伯之心知文王得國則周必有天下乎非然也以是存心則是利夫天下者也泰伯知文王得國則天下必被其澤也至於周之有天下則泰伯豈加毫末於此哉此又不可不知也孟子曰不信仁賢則國空虛空虛言若無人然無禮義則上下亂禮義所以辨上下定民志無政事則財用不足生之無道取之無度用之無節故也尹氏曰三者以仁賢為本無仁賢則禮義政事處之皆不以其道矣孟子曰不仁而得國者有之矣不仁而得天下未之有也言不仁之人騁其私智可以盜千乘之國而不可以得丘民之心鄒氏曰自秦以來不仁而得天下者有矣然皆一再傳而失之猶不得也所謂得天下者必如三代而後可南軒曰不仁而得國亦得其土地而已顧豈得其民人之心哉然則是終可保乎孟子之言所當深味而不可執辭以害意也孟子曰民為貴社稷次之君為輕社土神稷穀神建國則立壇壝以祀之蓋國以民為本社稷亦為民而立而君之尊又係於二者之存亡故其輕重如此君者神人之主君為貴社稷次之而民又次之乃其常也而孟子顧反言之何哉戰國之時視民如草芥不知興廢存亡皆由此出故其言若此使知民之貴甚於社稷其敢以君之貴而慢其民乎衍義是故得乎丘民而為天子得乎天子為諸侯得乎諸侯為大夫丘民田野之民至微賤也然得其心則天下歸之天子至尊貴也而得其心者不過為諸侯耳是民為重也諸侯危社稷則變置諸侯無道將使社稷為人所滅則當更立賢君是君輕於社稷也犧牲既成粢盛既潔祭祀以時然而旱乾水溢則變置社稷盛音成祭祀不失禮而土穀之神不能為民禦災捍患則毁其壇壝而更置之亦年不順成八蠟不通之意是社稷雖重於君而輕於民也孟子曰聖人百世之師也伯夷柳下惠是也故聞伯夷之風者頑夫廉懦夫有立志聞栁下惠之風者薄夫敦鄙夫寬奮乎百世之上句百世之下聞者莫不興起也非聖人而能若是乎而況於親炙之者乎興起感動奮發也親炙親近而熏炙之也餘見前篇孟子曰仁也者人也合而言之道也仁者人之所以為人之理也然仁理也人物也以仁之理合於人之身而言之乃所謂道者也程子曰中庸所謂率性之謂道是也或曰外國本人也之下有義也者冝也禮也者履也智也者知也信也者實也凡二十字今案如此則理極分明然未詳其是否也仁者人也人之所以為人者以其有此而已人之所以得名以其仁也言仁而不言人則不見理之所寓言人而不言仁則人止不過是一塊血肉耳必合而言之方見得道理出來此仁字不是别物即是這人底道理將這仁與人合便是道程子謂此猶率性之謂道也如中庸仁者人也是對義者宜也意又不同人字是以人身言之人自有生意是言仁之生道也中庸説仁字又密上言修身以道修道以仁便説仁者人也是切已言之孟子是統而言之南軒曰仁者人也仁謂人之理人謂人之身仁字本自人身上得名合而言之則人而仁矣是乃人之道也故伊川曰仁固是道道却是總名蓋人之生其愛之理具於性是乃所以為人之道者惟其私意日以蔽隔故其理雖存而人不能合之則仁道亦幾乎息矣惟君子以克已為務己私既克無所蔽隔而天理粹然則人與仁合而為人之道得矣孟子曰孔子之去魯曰遲遲吾行也去父母國之道也去齊接淅而行去他國之道也重出孟子曰君子之厄於陳蔡之間無上下之交也君子孔子也厄與厄同君臣皆惡無所與交也貉稽曰稽大不理於口貉音陌趙氏曰貉姓稽名為衆口所訕理賴也今案漢書無俚方言亦訓賴孟子曰無傷也士憎兹多口趙氏曰為士者益多為衆口所訕案此則憎當從土今本皆從心蓋傳寫之誤詩云憂心悄悄愠于羣小孔子也肆不殄厥愠亦不隕厥問文王也詩邶風柏舟及大雅綿之篇也悄悄憂貌愠怒也本言衛之仁人見怒於羣小孟子以為孔子之事可以當之肆發語辭隕墜也問聲問也本言太王事昆夷雖不能殄絶其愠怒亦不自墜其聲問之美孟子以為文王之事可以當之尹氏曰言人顧自處如何盡其在我者而已孟子曰賢者以其昭昭使人昭昭今以其昏昏使人昭昭昭昭明也昏昏暗也尹氏曰大學之道在自昭明德而施於天下國家其有不順者寡矣孟子謂髙子曰山徑之蹊間句介然用之而成路句為間不用則茅塞之矣今茅塞子之心矣介音戛徑小路也蹊人行處也介然倐然之頃也用由也路大路也為間少頃也茅塞茅草生而塞之也言理義之心不可少有間斷也南軒曰此言學者初聞善道其心不無欣慕而開明猶山徑之有蹊間也由是而體認充廣朝夕於斯則德進而業廣矣猶用之而成路也苟惟若有若亡而不用其力則內為氣習所蔽外為物欲所誘向之開明者幾何不復窒塞邪然則山徑之蹊間在夫用與不用士之於學亦係於思與不思而已思則通不思則塞矣髙子曰禹之聲尚文王之聲尚加尚也豐氏曰言禹之樂過於文王之樂孟子曰何以言之曰以追蠡追音堆蠡音禮豐氏曰追鐘鈕也周禮所謂旋蟲是也蠡者齧木蟲也言禹時鐘在者鐘鈕如蟲齧而欲絶蓋用之者多而文王之鐘不然是以知禹之樂過於文王之樂也曰是奚足哉城門之軌兩馬之力與與平聲豐氏曰奚足言此何足以知之也軌車轍迹也兩馬一車所駕也城中之塗容九軌車可散行故其轍迹淺城門惟容一車車皆由之故其轍迹深蓋日久車多所致非一車兩馬之力能使之然也言禹在文王前千餘年故鐘久而紐絶文王之鐘則未久而紐全不可以此而論優劣也此章文義本不可曉舊説相承如此而豐氏差明白故今存之亦未知其是否也齊飢陳臻曰國人皆以夫子將復為發棠殆不可復復扶又反先時齊國嘗飢孟子勸王發棠邑之倉以賑貧窮至此又飢陳臻問言齊人望孟子復勸王發棠而又自言恐其不可也孟子曰是為馮婦也晉人有馮婦者善搏虎卒為善士則之野有衆逐虎虎負嵎莫之敢攖望見馮婦趨而迎之馮婦攘臂下車衆皆恱之其為士者笑之手執曰搏卒為善士後能改行從善也之適也負依也山曲曰嵎攖觸也笑之笑其不知止也疑此時齊王已不能用孟子而孟子亦將去矣故其言如此孟子曰口之於味也目之於色也耳之於聲也鼻之於臭也四肢之於安佚也性也有命焉君子不謂性也程子曰五者之欲性也然有分不能皆如其願則是命也不可謂我性之所有而求必得之也愚案不能皆如其願不止為貧賤蓋雖富貴之極亦有品節限制則是亦有命也仁之於父子也義之於君臣也禮之於賓主也智之於賢者也聖人之於天道也命也有性焉君子不謂命也程子曰仁義禮智天道在人則賦於命者所稟有厚薄清濁然而性善可學而盡故不謂之命也張氏曰晏嬰智矣而不知仲尼是非命邪愚案所稟者厚而清則其仁之於父子也至義之於君臣也盡禮之於賔主也恭智之於賢否也哲聖人之於天道也無不吻合而純亦不已焉薄而濁則反是是皆所謂命也或曰者當作否人衍字更詳之愚聞之師曰此二條者皆性之所有而命於天者也然世之人以前五者為性雖有不得而必欲求之以後五者為命一有不至則不復致力故孟子各就其重處言之以伸此而抑彼也張子所謂養則付命於天道則責成於已其言約而盡矣問君子不謂性曰這性字不全是就理上説口之欲食目之欲色以至耳鼻四肢之欲固是天理之自然然理附於氣這許多都從血氣軀殼上發出來故君子不當以此為主而以天命之理為主君子不謂命命字有兩説一以所稟言之一以所值言之集注是以所稟言性也有命焉此性字兼氣稟而言命也有性焉此性字専言其理兩性字兩命字都不同上面性字是人心下面性字是道心上面命字是氣論貧富貴賤下面命字是理論智愚賢不肖問君子不謂性命曰此不難解只將自家身看便見且如嗜芻豢而厭藜藿是性如此然芻豢分無可得只得且食藜藿如父子有親然有相愛者有不相愛者有相愛深者有相愛淺者此便是命然在我有薄處便當勉強以致其厚在彼有薄處我當致厚以感他如舜於瞽瞍是也問有命焉之命曰此命字却合理與氣而言蓋五者之欲固是人性然有命分既不可謂我性之所有而必求得之又不可謂我分可以得而必極其欲如貧賤不能如願此固分也富貴之極可以無所不為然亦有限節裁制又當安之於理如紂酒池肉林却是富貴之極而不知限節之意若以其分言之固無不可為但道理却恁地不得今人只説得一邊不知合而言之未嘗不同也命也有性焉此性字却指理而言如舜遇瞽瞍固是氣數然舜惟盡事親之道期於底豫此所謂盡性大凡清濁厚薄之稟皆命也所造之有淺有深所遇之有應有不應皆清濁厚薄之分不同且如聖人之于天道如堯舜則是性之湯武則是身之禹則入聖域而不優此是合下所稟有異但其命雖如此又有性焉但當盡性而已故不謂命孟子此章只要遏人欲存天理故於人説性處便曰有命人説命處却曰有性浩生不害問曰樂正子何人也孟子曰善人也信人也趙氏曰浩生姓不害名齊人也何謂善何謂信不害問也曰可欲之謂善天下之理其善者必可欲其惡者必可惡其為人也可欲而不可惡則可謂善人矣有諸已之謂信凡所謂善皆實有之如惡惡臭如好好色是則可謂信人矣張子曰志仁無惡之謂善誠善於身之謂信充實之謂美力行其善至于充滿而積實則美在其中而無待於外矣充實而有光輝之謂大和順積中而英華發外美在其中而暢於四支發於事業則德業至盛而不可加矣大而化之之謂聖大而能化使其大者泯然無復可見之迹則不思不勉從容中道而非人力之所能為矣張子曰大可為也化不可為也在熟之而已矣聖而不可知之之謂神程子曰聖不可知謂聖之至妙人所不能測非聖人之上又有一等神人也樂正子二之中四之下也蓋在善信之間觀其從于子敖則其有諸已者或未實也張子曰顔淵樂正子皆知好仁矣樂正子志仁無惡而不致于學所以但為善人信人而已顔子好學不倦合仁與智具體聖人獨未至聖人而止耳程子曰士之所難者在有諸已而已能冇諸已則居之安資之深而美且大可以馴致矣徒知可欲之善而若存若亡而已則能不受變于俗者鮮矣尹氏曰自可欲之善至于聖而不可知之神上下一理擴充之至于神則不可得而名矣善人只是一箇渾然好人都是可欲更無些子可嫌處問可欲之善曰為君仁為臣敬為父慈為子孝是也有諸已之謂信謂真箇有此善若不有諸已則不可謂之信有諸已韓文公所謂足乎已無待于外之謂德是也有待于外底如伊川所謂富人多寶貧子借看之喻是也程子曰乾聖人之分也可欲之善屬焉坤賢人之分有諸已之信屬焉一是自然一是做工夫積習而至又曰善信美大聖神是六等人可欲之謂善是説資稟好欲是别人以為可欲有諸已之謂信是説學南軒曰云云人雖本有是善而為氣習所蔽莫之能有惟其存之久而後能實有之未有之如他人之物有諸已而後為已物也自是而不自已焉則進乎充實之地充實者充盛篤實也美者美在其中也美之所積者厚則光輝之所發者充塞而不可掩矣故謂之大然猶有大之可名至於大而化則大不足以名之程子謂未化者如操尺度以量物用之尚未免於有差至于化則已即是尺度尺度即已蓋成乎大者也若夫神則是聖人之妙人不可得而測者不疾而速不行而至是也非聖之外復有所謂神也問大而化之之謂聖橫渠謂大可為也化不可為也在熟之而已矣此則與易之擬議以成其變化同或説大猶有迹化謂使充實光輝者泯然無形迹之可見竊疑與釋氏銷礙入空之説相似不知如何先生答曰孟子説化字與易之變化不同後説得之然非銷礙入空之謂更分别之自可見矣孟子曰逃墨必歸於楊逃楊必歸於儒歸斯受之而已矣墨氏務外而不情楊氏太簡而近實故其反正之漸大略如此歸斯受之者閔其陷溺之久而取其悔悟之新也今之與楊墨辨者如追放豚既入其苙又從而招之放豚放逸之豕豚也苙闌也招罥也羇其足也言彼既來歸而又追咎其既往之失也此章見聖賢之于異端距之甚嚴而于其來歸待之甚恕距之嚴故人知彼説之為邪待之恕故人知此道之可及仁之至義之盡也問逃墨歸楊云云曰楊墨皆是邪説無大輕重但墨氏之説尤出于矯偽不近人情而難行故孟子之言如此非以楊氏為可取也程子曰儒者潛心正道不容有差其始甚微其終則不可救如師也過商也不及于聖人中道師只是過于厚些商只是不及些然而厚則漸至于兼愛不及則便至於為我其過不及同出於儒者其末遂至楊墨至如楊墨亦未至于無父無君孟子推之便至于此蓋其差必至於是也吕氏大事記曰齊宣王喜文學遊説之士鄒衍之徒七十六人皆賜列第為上大夫不治而議論是以齊稷下學士盛者數百千人是時諸子並起秦漢以後所謂六家九流特其略耳孟子荀卿列傳曰騶衍作怪迂之變終始大聖之篇稱引天地剖判以來五德轉移治各有冝其語閎大不經王公大人初見其術懼然顧化淳于髠齊人博聞強記學無所主慎到趙人田駢接子齊人環淵楚人皆學黃老之術騶奭者齊諸騶子亦頗采騶衍之術文具難施公孫龍為堅白同異之辨魏有李悝盡地力之教楚有尸子長盧阿之吁子焉自騶衍與齊之稷下先生淳于髠慎到環淵接子田駢之徒各著書言治亂之事以千世主豈可勝道哉莊子天下篇曰古之人其備乎配神明醇天地育萬物和天下澤及百姓明於本數係于末度六通四闢小大精粗其運無乎不在其明而在度數者舊法世傳之史尚多有之其在詩書禮樂者鄒魯之士縉紳先生多能明之詩以導志書以導事禮以導行樂以導和易以導隂陽春秋以導名分其數散于天下而設於中國者百家之學或稱而道之天下大亂道德不一天下多得一察焉以自好譬如耳目鼻口皆有所明不能相通天下之人各為其所欲焉以自為方悲夫百家往而不反必不合矣後世學者不見天地之純古人之大體道術將為天下裂司馬子長與莊生所談皆當深味也愚案莊生所述諸子墨翟禽滑釐其一也宋鈃尹文其二也彭蒙田駢慎到其三也關尹老聃其四也莊周其五也惠施其六也異端之盛莫甚於此時而孟子獨深辨楊墨者或曰楊墨之禍仁義固也必若何而後為仁義也曰孟子嘗言之矣曰君子親親而仁民仁民而愛物是也蓋自親親而推之於民物是其理之一也明乎理之一則心無不溥而非楊氏之為我矣親親與仁民不同仁民與愛物不同是其分之殊也明乎分之殊則其施有序而非墨氏之兼愛矣聖賢正大之學異端私邪之見真霄壤也學者徒知孟子之闢楊墨而不知此章乃闢楊墨之本所由見焉孟子曰有布縷之征粟米之征力役之征君子用其一緩其二用其二而民有殍用其三而父子離征賦之法嵗有常數然布縷取之於夏粟米取之于秋力役取之于冬當各以其時若并取之則民力有所不堪矣今兩稅三限之法亦此意也尹氏曰言民為邦本取之無度則其國危矣孟子曰諸侯之寶三土地人民政事寶珠玉者殃必及身尹氏曰言寶得其寶者安寶失其寶者危盆成括仕于齊孟子曰死矣盆成括盆成括見殺門人問曰夫子何以知其將見殺曰其為人也小有才未聞君子之大道也則足以殺其軀而已矣盆成姓括名也恃才妄作所以取禍徐氏曰君子道其常而巳括有死之道焉設使幸而獲免孟子之言猶信也南軒曰才如辨給敏捷之頖小有才而未聞大道則必求所以用其才謂聰明智力之可以有為而不知理義之顧若是者極其才而不知所止不至于顛覆則不已故盆成括任于齊而孟子知其必見殺也蓋不聞道則為才所役聞道則有以為用矣所謂道者非他也理義之存乎人心者也于此有聞則其進退語默之際皆有所據則才有所不敢恃矣故夫人之有才本不足以為人害惟其無所本而徒用其才于是才始足以病己甚至于有取死之道反不若魯鈍無才之為愈也夫小有才而未聞道者身且不能保而為國者乃信而用之亡國敗家其何日之有愚案此才與有才而驕吝之才同若所謂天之降才與不善非才之罪也不能盡其才則指其根于性者而言如才子才難之才矣孟子之滕館于上宫有業屨于牖上館人求之弗得館舍也上宫别宫名業屨織之有次業而未成者蓋館人所作置之牖上而失之也或問之曰若是乎從者之廖也曰子以是為竊屨來與曰殆非也夫子之設科也往者不追來者不拒苟以是心至斯受之而已矣從為去聲與平聲夫子如字舊讀為扶余者非或問之者問于孟子也廖匿也言子之從者乃匿人之物如此乎孟子答之而或人自悟其失因言此從者固不為竊屨而來但夫子設置科條以待學者苟以向道之心而來則受之耳雖夫子亦不能保其往也門人取其言有合于聖賢之指故記之孟子曰人皆有所不忍達之於其所忍仁也人皆有所不為達之于其所為義也惻隱羞惡之心人皆有之故莫不有所不忍不為此仁義之端也然以氣質之偏物欲之蔽則於他事或有不能者但推所能達之于所不能則無非仁義矣南軒曰人皆有所不忍皆有所不為此其秉彞之不可殄滅也然有所不忍矣而于他則忍之有所不為矣而于他則為之此豈有異心哉為私欲所蔽而生道息故也若以其所不忍而達之於其所忍豈非仁之方乎以其所不為而達之于所為豈非義之方乎達謂達於用充謂充其所有者也此章始言仁義而末獨言義何也蓋仁義體用相須者也人之不仁以非義害之也不為非義而後仁可得而存故反復再三推而言之使人知所用力也孟子此章教人以善推其所為也夫有所不忍有所不為者此心之正也能即是心而推之雖所忍者亦不忍即仁也雖所為者亦不為即義也如無欲害人此所謂不忍也私欲一動則不忍者有時而忍矣無欲穿窬此所謂不為也私欲一動則不為者有時而為矣惟能即是心而充之害人之事固所不欲其未至於害人者亦皆不欲仁其可勝用乎穿窬之事固所不為其未至於穿窬者亦皆不為義其可勝用乎爾汝人所輕賤之稱知恥者之所不肯受此所謂羞惡之心也能自此充之則無所往而非義也大抵人之本心無不善者由其以利欲汨之而失其本心故侵尋蹉跌遂流於不善如百里之走則恥之而五十里則不以為恥曷若併嵗攘而不為乎知此而後知孟子充之之説衍義人能充無欲害人之心而仁不可勝用也人能充無穿踰之心而義不可勝用也勝平聲充滿也穿穿穴踰踰牆皆為盜之事也能推所不忍以達於所忍則能滿其無欲害人之心而無不仁矣能推其所不為以達於所為則能滿其無穿踰之心而無不義矣人能充無受爾汝之實無所往而不為義也此申説上文充無穿踰之心之意也蓋爾汝人所輕賤之稱人雖或有所貪昧隱忍而甘受之者然其中心必有慚忿而不肯受之之實人能即此而推之使其充滿無所虧缺則無適而非義矣士未可以言而言是以言餂之也可以言而不言是以不言餂之也是皆穿踰之類也餂音忝餂探取之也今人以舌取物曰餂即此意也便佞隱默皆有意探取於人是亦穿踰之類然其事隱微人所易忽故特舉以見例明必推無穿踰之心以達於此而悉去之然後為能充其無穿踰之心也孟子曰言近而指逺者善言也守約而施博者善道也君子之言也不下帶而道存焉施去聲古人視不下於帶則帶之上乃目前常見至近之處也舉目前之近事而至理存焉所以為言近而指逺也君子之守修其身而天下平此所謂守約而拖博也人病舍其田而藝人之田所求於人者重而所以自任者輕舍音捨此言不守約而務博施之病孟子曰堯舜性者也湯武反之也性者得全於天無所汙壞不假修為聖之至也反之者修為以復其性而至於聖人也程子曰性之反之古未有此語蓋自孟子發之吕氏曰無意而安行性也有意利行而至於無意復性者也堯舜不失其性湯武善反其性及其成功則一也動容周旋中禮者盛德之至也哭死而哀非為生者也經德不回非以干祿也言語必信非以正行也中為行並去聲細微曲折無不中禮乃其盛德之至自然而中而非有意於中也經常也回曲也三者亦皆自然而然非有意而為之也皆聖人之事性之之德也君子行法以俟命而已矣法者天理之當然者也君子行之而吉凶禍福有所不計蓋雖未至於自然而已非冇所為而為矣此反之之事董子所謂正其義不謀其利明其道不計其功正此意也程子曰動容周旋中禮者盛德之至行法以俟命者朝聞道夕死可矣之意也吕氏曰法由此立命由此出聖人也行法以俟命君子也聖人性之君子所以復其性也孟子曰説大人則藐之勿視其巍巍然説音稅藐音眇趙氏曰大人當時尊貴者也藐輕之也巍巍富貴髙顯之貌藐焉而不畏之則志意舒展言語得盡也堂髙數仞榱題數尺我得志弗為也食前方丈侍妾數百人我得志弗為也般樂飲酒驅騁田獵後車千乘我得志弗為也在彼者皆我所不為也在我者皆古之制也吾何畏彼哉榱楚危反般音盤樂音洛乘去聲榱桷也題頭也食前方丈饌食列於前者方一丈也此皆其所謂巍巍然者我雖得志有所不為而所守者皆古聖賢之法則彼之巍巍者何足道哉楊氏曰孟子此章以已之長方人之短猶有此等氣象在孔子則無此矣孟子曰養心莫善於寡欲其為人也寡欲雖有不存焉者寡矣其為人也多欲雖有存焉者寡矣欲如口鼻耳目四支之欲雖人之所不能無然多而不節未有不失其本心者學者所當深戒也程子曰所欲不必沈溺只有所向便是欲集義程子曰孟子言養心莫害於寡欲欲寡則心自誠苟子言養心莫善於誠既誠矣又何用養此已不識誠又不知所以養致知在所養養知莫過於寡欲吕氏曰欲者感動於物也治心之道莫善於少欲少欲則耳目之官不蔽於物而心常寧矣心常寧則定而不亂明而不暗道之所由生德之所自成也不存者梏亡之謂也寡欲之人則無梏亡之患矣其為人也多欲則好動而無節妄作而失常善端所由喪而天理虧焉故雖有存焉寡矣是故心者性之用也可以成性可以失性得其養則道進而德長所以成性失其養則反道敗德所以失性云云又曰天下之難持者莫如心天下之易染者莫如欲南軒曰有所向則為欲多欲則百慮紛紜其心外馳尚何所存乎寡欲則思慮淡血氣平其心虛寧而不存者寡矣雖然天資寡欲之人其不存焉者固寡然不知存其存則亦莫之能充也若學者以寡欲為要則當存飬擴充由寡欲以至無欲則其清明髙逺者為無窮矣曽晳嗜羊棗而曽子不忍食羊棗羊棗實小黑而圎又謂之羊矢棗曽子以父嗜之父沒之後食必思親故不忍食也公孫丑問曰膾炙與羊棗孰美孟子曰膾炙哉公孫丑曰然則曽子何為食膾炙而不食羊棗曰膾炙所同也羊棗所獨也諱名不諱姓姓所同也名所獨也肉聶而切之為膾炙炙肉也萬章問曰孔子在陳曰盍歸乎來吾黨之士狂簡進取不忘其初孔子在陳何思魯之狂士盍何不也狂簡謂志大而略於事進取謂求望髙逺不忘其初謂不能改其舊也此語與論語小異孟子曰孔子不得中道而與之必也狂狷乎狂者進取狷者有所不為也孔子豈不欲中道哉不可必得故思其次也狷音絹不得中道至有所不為據論語亦孔子之言然則孔子字下當有曰字論語道作行狷作狷有所不為者知恥自好不為不善之人也孔子豈不欲中道以下孟子言也敢問何如斯可謂狂矣萬章間曰如琴張曽晳牧皮者孔子之所謂狂矣琴張名牢字子張子桑户死琴張臨其喪而歌事見莊子雖未必盡然要必有近似者曽晳見前篇季武子死曽晳倚其門而歌事見檀弓又言志異乎三子者之撰事見論語牧皮未詳何以謂之狂也萬章問曰其志嘐嘐然曰古之人古之人夷考其行而不掩焉者也嘐火交反行去聲嘐嘐志大言大也重言古之人見其動輒稱之不一稱而巳也夷平也掩覆也言平考其行則不能覆其言也程子曰曽晳言志而夫子與之蓋與聖人之志同便是堯舜象也特行有不掩焉耳此所謂狂也狂者又不可得欲得不屑不潔之士而與之是狷也是又其次也此因上文所引遂解所以思得狷者之意狂有志者也狷有守者也有志者能進於道有守者不失其身屑潔也孔子曰過我門而不入我室我不憾焉者其惟鄉原乎鄉原德之賊也曰何如斯可謂之鄉原矣鄉原非有識者原與願同荀子原慤字皆讀作願謂謹願之人也故鄉里所謂願人謂之鄉原孔子以其似德而非德故以為德之賊過門不入而不恨之以其不見親就為幸深惡而痛絶之也萬章又引孔子之言而問也曰何以是嘐嘐也言不顧行行不顧言則曰古之人古之人行何為踽踽涼涼生斯世也為斯世也善斯可矣閹然媚於世也者是鄉原也行去聲踽其禹反閹音奄踽踽獨行不進之貌涼涼薄也不見親厚於人也鄉原譏狂者曰何用如此嘐嘐然行不掩其言而徒每事必稱古人邪又譏狷者曰何必如此踽踽涼涼無所親厚哉人既生於此世則當但為此世之人使當世之人皆以為善則可矣此鄉原之志也閹如奄人之奄閉藏之意也媚求恱於人也孟子言此深自閉藏以求親媚於世是鄉原之行也萬章曰一鄉皆稱原人焉無所往而不為原人孔子以為德之賊何哉原亦謹厚之稱而孔子以為德之賊故萬章疑之曰非之無舉也刺之無刺也同乎流俗合乎汙世居之似忠信行之似廉潔衆皆恱之自以為是而不可與入堯舜之道故曰德之賊也吕侍講曰言此等之人欲非之則無可舉欲刺之則無可刺也流俗者風俗頽靡如水之下流衆莫不然也汙濁也非忠信而似忠信非廉潔而似廉潔孔子曰惡似而非者惡莠恐其亂苗也惡佞恐其亂義也惡利口恐其亂信也惡鄭聲恐其亂樂也惡紫恐其亂朱也惡鄉原恐其亂德也惡去聲莠音有孟子又引孔子之言以明之莠似苗之草也佞才智之稱其言似義而非義也利口多言而不實者也鄭聲淫樂也樂正樂也紫間色朱正色也鄉原不狂不狷人皆以為善有似乎中道而實非也故恐其亂德君子反經而已矣經正則庶民興庶民興斯無邪慝矣反復也經常也萬世不易之常道也興興起於善也邪慝如鄉原之屬是也世衰道微大經不正故人人得為異説以濟其私而邪慝並起不可勝正君子於此亦復其常道而已常道既復則民興於善而是非明白無所回互雖有邪慝不足以惑之矣尹氏曰君子取夫狂狷者蓋以狂者志大而可與進道狷者有所不為而可與有為也所惡於鄉原而欲痛絶之者為其似是而非惑人之深也絶之之術無他焉亦曰反經而已矣孟子曰由堯舜至於湯五百有餘嵗若禹臯陶則見而知之若湯則聞而知之趙氏曰五百嵗而聖人出天道之常然亦有遲速不能正五百年故言有餘也尹氏曰知謂知其道也由湯至於文王五百有餘嵗若伊尹萊朱則見而知之若文王則聞而知之趙氏曰萊朱湯賢臣或曰即仲虺也為湯左相由文王至於孔子五百有餘嵗若太公望散冝生則見而知之若孔子則聞而知之散素亶反散氏冝生名文王賢臣也子貢曰文武之道未墜於地在人賢者識其大者不賢者識其小者莫不有文武之道焉夫子焉不學此所謂聞而知之也由孔子而來至於今百有餘嵗去聖人之世若此其未逺也近聖人之居若此其甚也然而無有乎爾則亦無有乎爾林氏曰孟子言孔子至今時未逺鄒魯相去又近然而已無有見而知之者矣則五百餘嵗之後又豈復有聞而知之者乎愚案此言雖若不敢自謂已得其傳而憂後世遂失其傳然乃所以自見其有不得辭者而又以見夫天理民彝不可泯滅百世之下必將有神會而心得之者耳故於篇終歷序羣聖之統而終之以此所以明其傳之有在而又以俟後聖於無窮也其指深哉有宋元豐八年河南程皓伯淳卒潞公文彥博題其墓曰明道先生而其弟頤正叔序之曰周公沒聖人之道不行孟軻死聖人之學不傳道不行百世無善治學不傳千載無真儒無善治士猶得以明夫善治之道以淑諸人以傳諸後無真儒則天下貿貿焉莫知所之人欲肆而天理滅矣先生生乎千四百年之後得不傳之學於遺經以興起斯文為己任辨異端闢邪説使聖人之道煥然復明於世蓋自孟子之後一人而已然學者於道不知所向則孰知斯人之為功不知所至則孰知斯名之稱情也哉南軒曰道不為古今而有加損聖人先得我心之所同然者耳苟得其所同然則雖越宇宙與親見之何以異哉愚案臯陶伊尹萊朱太公望散冝生皆與斯道之傳命考之臯陶謨伊訓太甲咸有一德諸篇則二人之學至精至粹其得與羣聖之列也宜哉萊朱若誠仲虺則固伊尹之亞也太公望於書無所見惟大戴禮踐阼篇武王問道於太公望公奉丹書以入所陳者敬義仁之道其所以為文武之師者亦豈苟哉後世特以為兵家之祖蓋未然也散宜生之名一見於書而傳道之事則無所考至於獨言文王而不及武王周公則以父子同道舉文王則餘在其中故爾或者遂謂孟子有不取武王之意豈其然邪孟子集編卷十四
