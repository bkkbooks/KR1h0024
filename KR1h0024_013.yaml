body:
  text: 欽定四庫全書論語集編卷八宋真徳秀撰衛靈公第十五凡四十一章衛靈公問陳於孔子孔子對曰俎豆之事則嘗聞之矣軍旅之事未之學也明日遂行陳去聲陳謂軍師行伍之列俎豆禮器尹氏曰衛靈公無道之君也復有志於戰伐之事故答以未學而去之在陳絶糧從者病莫能興從去聲孔子去衛適陳興起也子路愠見曰君子亦有窮乎子曰君子固窮小人窮斯濫矣見賢遍反何氏曰濫溢也言君子固有窮時不若小人窮則放溢為非程子曰固窮者固守其窮亦通愚謂聖人當行而行無所顧慮處困而亨無所怨悔於此可見學者宜深味之案史記楚使人聘孔子陳蔡大夫謀曰孔子用於楚則陳蔡大夫危矣於是乃相與發徒役圍孔子於野不得行絶糧從者病莫能興孔子講誦絃歌不衰子路愠見曰君子亦有窮乎孔子曰君子固窮小人窮斯濫矣孔子之弟子有愠心乃召子路而問曰詩云匪兕匪虎率彼曠野吾道非邪吾何為於此子路曰意者吾未仁邪人之不我信也意者吾未智邪人之不吾行也孔子曰冇是乎由使仁者而必信安有伯夷叔齊使智者而必行安有王子比干子路出子貢入見曰夫子之道至大也故天下莫能容夫子盍少貶焉孔子曰賜良農能稼而不能為穡良工能巧而不能為順君子能修其道綱而紀之條而理之而不能為容今爾不修爾道而求為容賜而志不逺矣子貢出顔淵入見曰夫子之道大故天下莫能容雖然夫子推而行之不容何病不容然後見君子夫道之不修是吾醜也夫道既已大修而不用有國者之醜也不容何病不容然後見君子孔子欣然而笑曰有是哉顔氏之子使爾多財吾為爾宰於是使子貢至楚楚昭王興師迎孔子然後得免或問衛靈公問陳而夫子遽行何也曰為國以禮戰陳之事非人君所宜問也况靈公無道夫子固知之矣特以其禮際之善庶㡬可與言者是以往來於衛為日最乆而所以啓告之者亦已詳矣乃於孔子之言一無所入至是而猶問陳焉則其志可知矣故對以未學而去之然不但曰未學而已猶且以俎豆之事告之則夫子之去葢亦未有必然之意使靈公於此有以發悟於心而改事焉則夫子之行孰謂其不可留哉故史記又云明日與孔子見蜚鴈仰視之色不在孔子孔子遂行則是孔子之行又以禮際之不善而決不専於問陳一事也夫子既行而靈公卒衛國大亂俎豆之對其㫖逺哉南軒曰夫自春秋之時言之諸國以强弱為勝負軍旅之事宜所先而俎豆之事疑若不急者矣曽不知國之所以為國者以夫天叙天秩實維持之也為國者志存乎典禮則孝順和睦之風興恊力一心事君親上其强孰禦焉不然三綱淪廢人有離心國誰與立軍旅雖精果何所用哉子曰賜也女以予為多學而識之者與女音汝識音志與平聲下同子貢之學多而能識矣夫子欲其知所本也故問以發之對曰然非與方信而忽疑葢其積學功至而亦將有得也曰非也予一以貫之説見第四篇然彼以行言此以知言也謝氏曰聖人之道大矣人不能徧觀而盡識宜其以為多學而識之也然聖人豈務博者哉如天之於衆形非物物刻而雕之也故曰予一以貫之徳輶如毛毛猶有倫上天之載無聲無臭至矣尹氏曰孔子之於曽子不待其問而直告之以此曽子復深諭之曰唯若子貢先發其疑而後告之而子貢終亦不能如曽子之唯也二子所學之淺深於此可見愚案夫子之於子貢屢有以發之而他人不與焉則顔曽以下諸子所學之淺深文可見矣説見前曽子忠恕章子曰由知德者鮮矣鮮上聲由呼子路之名而告之也德謂義理之得於心者非已有之不能知其意味之實也自第一章至此疑皆是一時之言此章盖為愠見發也南軒曰知德者鮮以其踐履之未至故不能真知其味夫子以此告子路使之勉進於徳而不以聦明強力為可恃也子曰無為而治者其舜也與夫何為哉恭已正南面而已矣與平聲夫音扶無為而治者聖人德盛而民化不待其有所作為也獨稱舜者紹堯之後而又得人以任衆職故尤不見其有為之迹也恭已者聖人敬德之容既無所為則人之所見如此而已子張問行猶問達之意也子曰言忠信行篤敬雖蠻貊之邦行矣言不忠信行不篤敬雖州里行乎哉行篤行不之行去聲貊亡百反子張意在得行於外故夫子反於身而言之猶荅干禄問達之意也篤厚也蠻南蠻貊北狄二千五百家為州立則見其參於前也在輿則見其倚於衡也夫然行參七南反夫音扶其者指忠信篤敬而言參讀如毋往參焉之參言與我相參也衡軶也言其於忠信篤敬念念不忘隨其所在常若有見雖欲頃刻離之而不可得然後一言一行自然不離於忠信篤敬而蠻貊可行也子張書諸紳紳大帶之垂者書之欲其不忘也程子曰學要鞭辟近裏著已而已博學而篤志切問而近思言忠信行篤敬立則見其參於前在輿則見其倚於衡只此是學質美者明得盡查滓便渾化却與天地同體其次惟莊敬以持養之及其至則一也參前倚衡今人多錯説了故毎流於釋氏先聖言此只是説言必忠信行必篤敬念念不忘到處常若見如此兩事不離心目之閒耳如言見堯於羹牆豈是以我之心還見一心則為一物而在身外邪篤者有重厚深沈之意南軒曰篤敬者敦篤於敬也言忠信則言有物行篤則行有常以是而行何往不可故雖蠻貊亦可行也若夫言不忠信行不篤敬則妄而已故雖州里亦不可行參前徛衡使之常存乎忠信篤敬也存之不素而欲遽保之於將發之時難矣此子張所以書紳而不敢忘也衍義曰子張問行者欲行其道於天下也孔子則曰言茍忠信行茍篤敬雖蠻貊可以行如言不忠信行不篤敬雖郷里亦不可行忠信合而言之即誠也篤敬者誠於敬也盖地無逺近同此一理人無華夏同此一心未有誠信而人不心服者也未有不誠不敬而能使人心服者也故言之與行必誠必敬無一念之舎無一息之違立則見其參於前在輿則見其倚於衡涵養操存之熟心與理一故其形見如此若是將何往而不行乎子曰直哉史魚邦有道如矢邦無道如矢史官名魚衞大夫名鰌如矢言直也史魚自以不能進賢退不肖既死猶以尸諫故夫子稱其直事見家語君子哉蘧伯玉邦有道則仕邦無道則可卷而懷之伯玉出處合於聖人之道故曰君子卷收也懐藏也如於孫林父寗殖放弑之謀不對而出亦其事也楊氏曰史魚之直未盡君子之道若蘧伯玉然後可免亂世若史魚之如矢則雖欲卷而懷之有不可得也或問尸諫之説曰據家語衞靈公不用蘧伯玉而任彌子瑕史魚諫不從將卒命其子曰吾生不能正君死無以成禮冝置尸牗下其子從之靈公弔而問焉子以父言告公曰是寡人之過也遂命殯於客位而進伯玉退子瑕此其説也有以伯玉得其明哲保身之道而史魚所不及者非也伯玉所以如此葢其徳性深厚循理而行自然中節初非規規然務為緘黙而預為可以卷懷之計初非專為明哲保身之計也君子出處一於義而已非有計較利害之心也然一不適節而失於矯訐之道則在已固為未合於義且雖曰愛君而或反陷其君以殺臣之罪其所以不敢過於為直亦非專為保身訐也南軒曰史魚可以謂之直而已然能伸而不能屈未盡君子之道若蘧伯之可卷而懷則能因時而屈伸矣故謂之君子然此於用則行舎則藏者則猶有巻懷之意未及乎潛龍之隠也子曰可與言而不與之言失人不可與言而與之言失言知者不失人亦不失言知去聲子曰志士仁人無求生以害仁有殺身以成仁志士有志之士仁人則成徳之人也理當死而求生則於其心有不安矣是害其心之德也當死而死則心安而德全矣程子曰實理得之於心自别實理者實見得是實見得非也古人有捐軀隕命者若不實見得惡能如此須是實見得生不重於義生不安於死也故有殺身以成仁者只是成就一箇是而已或問殺身成仁之説曰仁者心之德而有理具焉一有不合於理則心不能安而害其仁矣順此理而不違則身雖可殺而此心之全此理之正浩然充塞天地之閒夫孰得而亡之哉曰其謂殺身成仁而不曰義何也曰仁義體一而用殊故君子之於事有以仁決者有以義決者以仁決者此章之言是也以義决者孟子論欲有甚於生惡有甚於死是也盖仁人不以所惡傷所好之禮義士不以所賤易於所貴之宜仁者吾心之正理志士仁人無求生以害仁有殺身以成仁須知道求生害仁雖以無道得生却是抉破了我心中之全理殺身成仁時吾身雖死却得此理全學問只要仁裏見得分明便從上面做去如殺身成仁不是自家計較要仁成方死只是見得生為不安死為安便自殺身旁人見得便説能成仁此旁人之有言非我之心要如此所謂經德不回非以干禄哭死而哀非為生也若有一豪為人之心便不是了南軒曰仁人於理之當然如飢食渴飲也志士謂志於仁者亦能擇而處之矣朱子曰志士仁人所以不求生以害仁者乃其心中自有打不過處不忍就彼以害此且非為恐虧其所以生者而後殺身以成仁也所謂成仁者亦但以遂其良心之所安而已非欲全其所以生而後為之也此弊中常有一種意思不以仁義忠孝為吾心之不能已者而以為畏天命謹天職欲全其所以生者而後為之則是本心之外别有一念計及此等利害重輕而後為之也誠使真能舎生取義亦出於計較之私而無慤實自盡之意矣大率全有似箇等説自他人旁觀者言之以為我能如此則可若挾是已為善則已不妥帖况自言之豈不益可笑乎案朱子此段係荅南軒殺身成仁之義子貢問為仁子曰工欲善其事必先利其器居是邦也事其大夫之賢者友其士之仁者賢以事言仁以德言夫子嘗謂子貢悦不若已者故以是告之欲其有所嚴憚切磋以成其德也程子曰子貢問為仁非問仁也故孔子告之以為仁之資而已事賢友仁便是要琢磨勉厲以至於仁如欲克已而未能克已欲復禮而未能復禮須要相勸勉乃為有益南軒曰器利則事善若所事與所友泛而不知擇則其亡焉者不自知矣顔淵問為邦顔子王佐之才故問治天下之道曰為邦者謙辭子曰行夏之時夏時謂斗柄初昬建寅之月為歳首也天開於子地闢於丑人生於寅故斗柄建此三辰之月皆可以為歳首而三代迭用之夏以寅為人正商以丑為地正周以子為天正也然時以作事則歳月自當以人為紀故孔子嘗曰吾得夏時焉而説者以為謂夏小正之屬葢取其時之正與其令之善而於此又以告顔子也乗殷之輅輅音路亦作路商輅木輅也輅者大車之名古者以木為車而已至商而有輅之名盖始異其制也周人飾以金玉則過侈而易敗不若商輅之樸素渾堅而等成已辨為質而得其中也服周之冕周冕有五祭服之冠也冠上有覆前後有旒黄帝以來葢已有之而制度儀等至周始備然其為物小而加於衆體之上故雖華而不為靡雖費而不及奢夫子取之葢亦以為文而得其中也樂則韶舞取其盡善盡美放鄭聲逺佞人鄭聲淫佞人殆逹去聲放謂禁絶之鄭聲鄭國之音佞人卑諂辨給之人殆危也程子曰問政多矣惟顔淵告之以此葢三代之制皆因時損益及其乆也不能無弊周衰聖人不作故孔子斟酌先王之禮立萬世常行之道發此以為之兆爾由是求之則餘皆可攷也張子曰禮樂治之法也放鄭聲逺佞人法外意也一日不謹則法壞矣虞夏君臣更相飭戒意盖如此又曰法立而能守則德可乆業可大鄭聲佞人能使人喪其所守故放逺之尹氏曰此所謂百王不易之大法孔子之作春秋盖此意也孔顔雖不得行之於時然其為治之法可得而見矣或問商周之改正朔何以不如夏之得其正也曰陽氣雖始於黄鍾而其月為建子然猶潛於地中而未有以見其生物之功也厯丑轉寅三陽始備於是叶風乃至盛德在木而春氣應焉古之聖人以是為生物之始改歳之端盖以人之所共見者言之未有知其所由始也至於商周始以征伐有天下於是更其正朔定為一代之制以新天下之耳目而有三統之説然以言乎統則改歳之義不明而凡四時五行之序皆不得其中正此孔子所以論考三王之制而行夏之時也曰周輅為過侈何也曰夫輅者身之所乘足之所履其為用也賤矣運行振動任重致逺其為物也勞矣且一器而工聚焉則其為費也廣矣賤用而貴飾之則不稱物勞而華飾之刑易壞費廣而又增費之則傷財周輅之所以為過侈歟曰周冕之不為侈奈何曰加之首則體嚴而用約詳其制則等下而分明此周冕所以雖文而不為過也夏商之制雖不可攷然意其必有未備者矣問程子云云非但言凖則也謂以此四者為準則餘可推也屏山劉氏顔氏終日如愚論語所載惟發二問一為仁一為邦夫子荅之皆極天理人事之大者天理謂克已復禮全一性之天也人事謂行夏時乘商輅服周冕樂韶舞也原易之用内焉惟窮理盡性外焉惟開物成務顔子盡之雖無諸子之著撰謂之通易可也此章葢聖人許顔子以王佐之事業又家語魯定公問於顔回曰子亦聞東野畢之善為御乎對曰善則善矣然其焉將必佚三日馬佚公召回曰吾子奚以知之回曰以政知之昔者帝舜巧於使民造父巧於使馬舜不窮其民力造父不窮其馬力是以舜無佚民造父無佚馬今東野畢之御也升馬執轡容體正矣步驟馳騁朝禮畢矣厯險致逺馬力盡矣然猶求馬不已以此知之公曰善吾子之言其義大矣願進乎曰臣聞之鳥窮則啄獸窮則攫人窮則詐馬窮則佚自古及今未有窮其下而無危者也公説以告孔子孔子曰夫其所以為顔回者此之類也豈足多哉業顔回在陋巷而於帝王經世之事無所不講此學者所當法也子曰人無逺慮必有近憂蘇氏曰人之所履者容足之外皆為無用之地而不可廢也故慮不在千里之外則患在几席之下矣子曰巳矣乎吾未見好德如好色者也好去聲巳矣乎歎其終不得而見也子曰臧文仲其竊位者與知柳下惠之賢而不與立也者與之與平聲竊位言不稱其位而有愧於心如盗得而隂據之也柳下惠魯大夫展獲字禽食邑栁下諡曰惠與立謂與之並立於朝范氏曰臧文仲為政於魯若不知賢是不明也知而不舉是蔽賢也不明之罪小蔽賢之罪大故孔子以為不仁又以為竊位案論語所論人物如管仲晏平仲臧文仲令尹子文陳文子季文子寗武子子桑伯子史魚柳下惠各已見篇今不重出而春秋襃貶又當攷焉非此所能盡也學者觀聖人論人之得失皆當反而觀已之得失然後為有補云子曰躬自厚而薄責於人則逺怨矣逺去聲責已厚故身益修責人薄故人易從所以人不得而怨之南軒曰厚者敦篤也躬則自厚而責望於人則薄其所處豈不有餘裕乎然則何怨之有孟子所謂發而不中不怨勝已者反求諸已而已小人不篤之已而責於人者深未嘗須臾得其平也韓子曰古之君子責已重以周待人輕以約葢本於此全篇皆可取今不録程子曰聖人責已感處多責人應處少又曰責上責下而中自恕已豈可任職分張子曰責已者當知無天下國家皆非之理故學至於不尤人學之至也又呉諸葛恪與陸遜書曰自漢末以來中國士大夫如許子將輩所以更相謗訕或至為禍原其本起非為大讎惟坐克已不能盡如禮而責人專以正義夫已不如禮則人不服責人以正義則人不堪内不服其行外不堪其責則不得不相怨相怨一生則小人得容其閒小人得容其閒則三至之言浸潤之譖紛錯交至雖至明至親者處之猶難以自定况已為隙且未能明者乎是故張陳至於血刃蕭朱不終其好本由於此而已恪之為人無足云者而其言不可廢又恪雖能言終以多怨致禍可見知之非艱而行之惟艱皆足為世戒故附於此已上皆言責已又聖賢所論有所謂檢身者成湯檢身若不及是也有所謂反身者易曰威如之吉反身之謂也又曰君子以反身修德中庸曰射有似乎君失諸正鵠反求諸其身孟子曰行有不得則反求諸已又曰有人於此待我以横逆則君子必自反也又曰反身而誠樂莫大焉是也有所謂正身者孔子曰茍正其身矣如正人何有所謂正己者中庸曰正己而不求於人則無怨孟子曰大人正己而物正是也有所謂克己者孔子之告顔子又楚靈王不能自克以及乾谿之難孔子曰克己復禮仁也楊氏曰勝己之私之謂克是也有所謂敬身者曽子曰身也父母之遺體可不敬乎是也又所謂誠身者中庸不明乎善不誠乎身是也此數者其言雖異要其為修身則一子曰不曰如之何如之何者吾末如之何也已矣如之何如之何者熟思而審處之辭也不如是而妄行雖聖人亦無如之何矣子曰羣居終日言不及義好行小慧難矣哉好去聲小慧私智也言不及義則放辟邪侈之心滋好行小慧則行險僥倖之機熟難矣哉者言其無以入德而將有患害也子曰君子義以為質禮以行之孫以出之信以成之君子哉孫去聲義者制事之本故以為質榦而行之必有節文出之必以退孫成之必在誠實乃君子之道也程子曰義以為質如質榦然禮行此孫出此信成此此四句只是一事以義為本又曰敬以直内則義以方外義以為質則禮以行之孫以出之信以成之義以為質是制義先决其當否了其閒節文次第須要皆具是禮以行之然徒知其節文而不能孫以出之信以成之則亦不可且如人知尊卑之分須當讓他然讓之之時辭氣或不婉順便是不能孫以出之信以成之者是終始誠實以成此一事即非是孫以出之之後方信以成之也義只是合宜義有剛決意思然不可直去禮冇節文度數故用禮以行之孫以出之是用和為貴義本不和用禮以行之已自和然禮又嚴故孫以出之便從容不迫信是樸實頭做無信則義禮孫皆是偏問孔子之對陽貨孟子之不與王驩言是全得此理否曰然南軒曰義以方外是義為用也而此章則以義為體葢物則森然具於秉彞之内此義之所以為體也必有是體而後品節生焉彼禮所以行此者也其行之也以遜順則和而不失故孫所以出此者也義為體禮與孫為用而信者又所以成終者也至於信以成之則義行乎事事物物之中而其體無不具矣子曰君子病無能焉不病人之不已知也南軒曰病無能者病夫履行之無其實子曰君子疾没世而名不稱焉范氏曰君子學以為己不求人知然没世而名不稱焉則無為善之實可知矣有其實則有是名名者所以命其實終其身而無實之可名君子疾者非謂求名於人也子曰君子求諸已小人求諸人謝氏曰君子無不反求諸已小人反是此君子小人所以分也楊氏曰君子雖不病人之不已知然亦疾沒世而名不稱也雖疾沒世而名不稱然所以求者亦反諸已而已小人求諸人故違道干譽無所不至三者文不相蒙而義實相足亦記言者之意衍義曰君子自責而不責人故求諸己小人責人而不責已故求諸人子曰君子矜而不爭羣而不黨莊以持已曰矜然無乖戾之心故不爭和以處衆曰羣然無阿比之意故不黨南軒曰矜莊以自持則易以不和而失於爭羣居而相與則易以有比而失於黨君子非與人異也處已嚴而不失其和故矜而不爭君子非與人同也待物平而不失其公故羣而不黨惟敬者為能處此而弗失也子曰君子不以言舉人不以人廢言南軒曰以言舉人則行不踐者進矣此固不可也然而雖使小人言之而善亦不害其為善言也以人廢之則善言棄矣故君子云云公心無蔽也子貢問曰有一言而可以終身行之者乎子曰其恕乎己所不欲勿施於人推己及物其施不窮故可以終身行之尹氏曰學貴於知要子貢之問可謂知要矣孔子告以求仁之方也推而極之雖聖人之無我不出乎此終身行之不亦宜乎問言恕不及忠曰分言忠恕有忠而後恕獨言恕則忠在其中若不能恕則其無忠可知恕是忠之發處若無忠做恕不出子曰吾之於人也誰毁誰譽如有所譽者其有所試矣譽平聲毁者稱人之惡而損其真譽者揚人之善而過其實夫子無是也然或有所譽者則必嘗有以試之而知其將然矣聖人善善之速而無所茍如此若其惡惡則已緩矣是以雖有以前知其惡而終無所毁也斯民也三代之所以直道而行也斯民者今此之人也三代夏商周也直道無私曲也言吾之所以無所毁譽者盖以此民即三代之時所以善其善惡其惡而無所私曲之民故我今亦不得而枉其是非之實也尹氏曰孔子之於人也豈有意於毁譽之哉其所以譽之者葢試而知其善故也斯民也三代之所以直道而行豈得容私於其閒哉子曰吾猶及史之闕文也有馬者借人乘之今亡已夫夫音扶楊氏曰史闕文馬借人此二事孔子猶及見之今亡已夫悼時之益偷也愚謂此必有為而言葢雖細故而時變之大者可知矣胡氏曰此章義疑不可强解子曰巧言亂徳小不忍則亂大謀巧言變亂是非聽之使人喪其所守小不忍如婦人之仁匹夫之勇皆是葢婦人之仁不能忍其愛匹夫之勇不能忍其暴其為不忍一也子曰衆惡之必察焉衆好之必察焉好惡皆去聲楊氏曰惟仁者能好惡人衆好惡之而不察則或蔽於私矣衍義好惡善惡雖人性之本然而違道之譽求全之毁亦世之所有故不可以不察也匡章之不孝人所共稱也而孟子則曰此父子責善之過實非不孝也仲子之廉亦人所共稱也而孟子則加以避兄離母之罪曰此烏能廉哉是是非非之大致若黒白之子然而其似是而非似非而是者則常人之所易惑也不有聖賢原情於疑似之中考實於曖味之際烏能適其當乎子曰人能𢎞道非道𢎞人𢎞廓而大之也人外無道道外無人然人心有覺而道體無為故人能大其道道不能大其人也張子曰心能盡性人能𢎞道也性不知檢其心非道𢎞人也子曰過而不改是謂過矣過而能改則復於無過惟不改則其過遂成而將不及改矣子曰吾甞終日不食終夜不寢以思句無益句不如學也此為思而不學者言之葢勞心以必求不如遜志而自得也李氏曰夫子非思而不學者特埀語以教人爾南軒曰學原於思思固所以為學也然思至於忘寢與食而不以學濟之則亦為無益也以思而不學則無益耳聖人固不為無益之思也即已而言所以教也案論語一書凡教者皆修身治人之道無非學也子曰君子謀道不謀食耕也餒在其中矣學也禄在其中矣君子憂道不憂貧餒奴罪反耕所以謀食而未必得食學所以謀道而禄在其中然其學也憂不得乎道而已非為憂貧之故而欲為是以得禄也尸氏曰君子治其本而不䘏其末豈以在外者為憂樂哉子曰知及之仁不能守之雖得之必失之知去聲知足以知此理而私欲閒之則無以有之於身矣知及之仁能守之不莊以涖之則民不敬涖臨也謂臨民也知此理而無私欲以閒之則所知者在我而不失矣然猶有不莊者葢氣習之偏或有厚於内而不嚴於外者是以民不見其可畏而慢易之下句放此知及之仁能守之莊以涖之動之不以禮未善也動之謂動民也猶曰鼓舞而作興之云爾禮謂義理之節文學至於仁則善有諸已而大本立矣涖之不莊動之不以禮乃其氣稟學問之小疵然亦非盡善之道也故夫子厯言之使知德愈全則責愈備不可以為小節而忽之也問克巳復禮為仁便是極了今卻又有莊以涖之與動之以禮底工夫如何曰人自有此心純粹更不去失而於接物應事時少些莊嚴底意思自不足以使人敬此便是未善處問此是要本末工夫兼備否曰固是但先有知及之仁能守之做箇根本了卻方好去檢㸃其餘便無處無事不善若根本不立又有何可檢㸃處問知及仁守曰此是説講學莊以涖之以後是説為政南軒曰知及乎此而仁不能守此則未能保之於已也仁能守之則在已者實矣又須莊以涖之而後内外相成而無弊而又欲動之以禮然後為盡善動之以禮者以禮教民風動之也此雖言為政之道至此而後善然所以成已亦一而已子曰君子不可小知而可大受也小人不可大受而可小知也此言觀人之法知我知之也受彼所受也盖君子於細事未必可觀而材德足以任重小人雖器量淺狹而未必無一長可取呉氏曰方舜之耕稼時視之猶人也一旦受堯之天下若素有之小人有立談之閒其方可知者至委以國則未不敗南軒曰君子所存者大故不可以小者測知而可以當其大者小人局於狹小其長易見故不可以任大而可以小知之大受如學者之學聖人有為者之當大任也衍義曰君子所有者大故不可以小事測知而可以與大事小人局於狹小而其長易見故不可以任大而可以小知子曰民之於仁也甚於水火水火吾見蹈而死者矣未見蹈仁而死者也民之於水火所賴以生不可一日無其於仁也亦然但水火外物而仁在已無水火不過害人之身而不仁則失其心是仁有甚於水火而尤不可以一日無也况水火或有時而殺人仁則未甞殺人亦何憚而不為哉李氏曰此夫子勉人為仁之語下章放此子曰當仁不讓於師當仁以仁為已任也雖師亦無所遜言當勇往而必為也盖仁者人所自有而自為之非有爭也何遜之有程子曰為仁在已無所與遜若善名在外則不可不遜所謂不遜者猶程子所謂不可將第一等事讓與他人做者其事則謂顔子曰舜何人也有為者亦若是而已大扺此與上章皆勉人為仁之語然上章為凡民都不知仁而憚於為仁者發此章為學者粗知仁之為美而不知勇於有為者發各有所當云子曰君子貞而不諒貞正而固也諒則不擇是非而必於信或問貞諒之别曰處義既精不期固而自固者貞也不擇邪正惟知必信而不易者諒也南軒曰貞者貞於義也諒者執於小信也貞於義則信在其中若但執其小信而於義有蔽則失其正而反害於信矣葢貞於義者公理所存而執小信者私意之守而已子曰事君敬其事而後其食後與後獲之後同食禄也君子之仕也有官守者修其職有言責者盡其忠皆以敬吾之事而已不可先有求禄之心也子曰有教無類人性皆善而其類有善惡之殊者氣習之染也故君子有教則人皆可以復於善而不當復論其類之惡矣子曰道不同不相為謀為去聲不同如善惡邪正之異子曰辭達而已矣辭取達意而止不以富麗為工師冕見及階子曰階也及席子曰席也皆坐子告之曰某在斯某在斯見賢遍反師樂師瞽者冕名再言某在斯厯舉在坐之人以詔之師冕出子張問曰與師言之道與與平聲聖門學者於夫子之一言一動無不存心省察如此子曰然固相師之道也相去聲相助也古者瞽必有相其道如此葢聖人於此非作意而為之但盡其道而已尹氏曰聖人處已為人其心一致無不盡其誠故也有志於學者求聖人之心於斯亦可見矣范氏曰聖人不侮鰥寡不虐無告可見於此推之天下無一物不得其所矣或問卒章之説曰張敬夫推之尤詳曰道無往而不存聖人之動靜語黙無往而非道葢各止於其所而已師冕之見及階則告之階及席則告之席既坐則告之厯以在坐者盖待瞽者之道當然耳子張竊窺而有問馬夫子以為固相師之道辭則近而意無不盡矣事事物物莫不有其道葢所當然者天之所為也夫以一日之閒起居則有起居之道飲食則有飲食之道見是人則有待是人之道遇是事則有處是事之道不可須臾離也一失所宜則廢是道矣是故君子戰兢自持顛沛必於是惟懼其失之也夫惟天下之至誠一以貫之道之所在如影隨形葢無往而非是也謝先生為朱震子發説論語首舉子見齊衰者冕衣裳者與瞽者見之雖少必作過之必趨又舉師冕見及階子曰階也及席子曰席也皆坐子曰某在斯某在斯子張問曰與師言之道與曰固相師之道也夫聖人之道無微顯無内外由灑埽應對進退而上達天德天道本末一以貫之一部論語只恁地看季氏第十六洪氏曰此篇或以為齊論凡十四章季氏將伐顓臾顓音專臾音俞顓臾國名魯附庸也冉有季路見於孔子曰季氏將有事於顓臾見賢遍反案左傳史記二子仕季氏不同時此云爾者疑子路嘗從孔子自衞反魯再仕季氏不乆而復之衞也孔子曰求無乃爾是過與與平聲冉求為季氏聚斂尤用事故夫子獨責之夫顓臾昔者先王以為東蒙主且在邦域之中矣是社稷之臣也何以伐為夫音扶東䝉山名先王封顓臾於此山之下使主其祭在魯地七百里之中社稷猶云公家是時四分魯國季氏取其二孟孫叔豫各有其一獨附庸之國尚為公臣季氏又欲取以自益故孔子言顓臾乃先王封國則不可伐在邦域之中則不必伐是社稷之臣則非季氏所當伐也此事理之至當不易之定體而一言盡其曲折如此非聖人不能也冉有曰夫子欲之吾二臣者皆不欲也夫子指季孫冉商實與謀以孔子非之故歸咎於季氏孔子曰求周任有言曰陳力就列不能者止危而不持顛而不扶則將焉用彼相矣任平聲焉於䖍反相去聲下同周任古之良史陳布也列位也相瞽者之相也言二子不欲則當諌諌而不去則當去也且爾言過矣虎兕出於柙龜玉毁於櫝中是誰之過與兕徐履反柙戸甲反櫝音獨與平聲兕野牛也柙檻也櫝匱也言在柙而逸在櫝而毁典守者不得辭其過明二子居其位而不去則季氏之惡已不得不任其責也冉有曰今夫顓臾固而近於費今不取後世必為子孫憂夫音扶固謂城郭完固費季氏之私邑此則冉求之飾辭然亦可見其實與季氏之謀矣孔子曰求君子疾夫舎曰欲之而必為之辭夫音扶舎上聲欲之謂貪其利丘也聞有國有家者不患寡而患不均不患貧而患不安蓋均無貧和無寡安無傾寡謂民小貧謂財乏均謂各得其分安謂上下相安季氏之欲取顓臾患寡與貧耳然是時季氏據國而魯公無民則不均矣君弱臣强互生嫌隙則不安矣均則不患於貧而和和則不患於寡而安安則不相疑忌而無傾覆之患夫如是故逺人不服則脩文德以來之既來之則安之夫音扶内治脩然後遠人服有不服則脩徳以來之亦不當勤兵於逺今由與求也相夫子逺人不服而不能來也邦分崩離析而不能守也子路雖不與謀而素不能輔之以義亦不得為無罪故并責之逺人謂顓臾分崩離析謂四分公室家臣屢叛而謀動干戈於邦内吾恐季孫之憂不在顓臾而在蕭牆之内也干盾也戈㦸也蕭牆屏也言不均不和内變將作其後哀公果欲以越伐魯而去季氏謝氏曰當是時三家强公室弱冉求又欲伐顓臾以附益之夫子所以深罪之為其瘠魯以肥三家也洪氏曰二子仕於季氏凡季氏所欲為必以告於夫子則因夫子之言而救止者冝亦多矣伐顓臾之事不見於經傳其以夫子之言而止也與或問首章之説曰蘇氏所推兩條攷之尤密蘇氏曰舊説以蕭牆之憂為陽虎之難以吾攷之定公五年陽虎始專季氏囚桓子至九年欲殺桓子不克而出奔齊前此者季氏之所為惟虎之聽非二子之罪也定公五年孔子年四十有七冉有少孔子二十有九歳葢十八而已未能相季也定公十二年子路為季氏宰哀公十一年冉求為季氏宰皆見於春秋則伐顓臾非陽虎出奔之前其在季康子之世歟哀公七年季康子伐邾以召呉宼故曰遠人不服而不能來也十五年公孫宿以成叛故曰邦分崩離析而不能守也公患三桓之侈也而欲以越去之故曰吾恐季孫之憂不在顓臾而在蕭牆之内也但蕭牆之禍亦本泛言非預知哀公以越伐魯之事也曰然則所謂均無貧和無寡安無傾者奈何曰是時季氏據魯之半而公室無尺地一民之勢不均甚矣是時四分魯國季氏取其二而二家各有其一不均則臣疑其君而以貧為憂矣憂貧而求富不己則君疑其臣而至於不和矣不和則臣益自疑而常懼於衆少矣憂寡而求衆愈甚則君益疑之而至於不安矣以臣亢君而不安至此則雖欲長保其祭祀而無傾危之患其可得哉必也痛自貶損以復於諸侯千乗大夫百乘之制則均而不患於貧矣君臣輯睦則和而不患於寡矣子孫長乆世守職業則安而不至於傾矣此在當時葢有難顯言者故夫子微辭以告之語雖略而意則詳也通釋曰三家之罪在於四分公室而私有之此其好名犯分之大惡也若以此而加之罪則不可仕明矣馴習既乆以為當然故孔門亦有仕於其家者仕於其家則不復知有魯矣冉有之言曰固而近於費今不取後世必為子孫憂則但知為季氏之邑而子孫者為季氏子孫謀也豈復知有魯哉其於夫子社稷之臣之語盖懵然莫覺也夫子不均不安之語又專魯以發之其旨切矣以求由之賢蔽於習俗安於豢養尚不復知義理之正况下此者乎此君子所以貴窮理也南軒曰季氏卿也而上僭其君其下觀之亦將不奪不厭是徒以顓臾為子孫憂而不知禍之起於蕭牆盖有理之必然者矣冉有但知為宰者當任其家事而昧於幾微暗於達大如此則為具臣而已矣愚案孔子與門弟子言未有若此之反覆詳悉者亦以其不可故邪案左傳齊師伐魯求以武城人三百為已徒卒逆齊師于郊求用矛以帥衆遂入齊師獲甲首八十齊人宵遁杜氏曰仲尼之徒皆忠於魯國孔子曰天下有道則禮樂征伐自天子出天下無道則禮樂征伐自諸侯出自諸侯出盖十世希不失矣自大夫出五世希不失矣陪臣執國命三世希不失矣先王之制諸侯不得變禮樂專征伐陪臣家臣也逆理愈甚則其失之愈速大約世數不過如此天下有道則政不在大夫言不得專政天下有道則庶人不議上無失政則下無私議非箝其口使不敢言也此章通論天下之勢孔子曰祿之去公室五世矣政逮於大夫四世矣故夫三桓之子孫微矣夫音扶魯自文公薨公子遂殺子赤立宣公而君失其政厯成襄昭定凡五公逮及也自季武子始專國政厯悼平桓子凡四世而為家臣陽虎所執三桓三家皆桓公之後此以前章之説推之而知其當然也此章專論魯事疑與前章皆定公時語蘇氏曰禮樂征伐自諸侯出冝諸侯之強也而魯以失政政逮於大夫宜大夫之强也而三桓以微何也强生於安安生於上下之分定今諸侯大夫皆陵其上則無以令其下矣故皆不乆而失之也衍義曰是時季氏以大夫而專魯國之政陽虎以家臣而專季氏之政孔子之言葢傷之也天無二日國無二王尊無二上天下之事惟天子得專之故天下有道則禮樂征伐自天子出而諸侯不能干焉天下無道則天子不能有其柄而諸侯得以竊之矣諸侯猶不可專况大夫乎大夫猶不可專况家臣乎春秋之世齊晉秦楚迭主夏盟禮樂征伐不出於天子世變至是盖可傷矣未幾而諸侯大夫專權自用禮樂征伐又不出於諸侯既而家臣竊弄而政令復不出於大夫名分陵夷舛逆日甚其可傷益甚焉然非道而得亦以非道而失逆理愈甚則失之愈速故諸侯竊天子之柄少有十世而不失者其餘則或五世或三世少不失者以理言之大槩如此曷若三代盛時天子而下以至家臣各安其分厯數百年而無禍哉既又言天下有道則政不在大夫天下有道則庶人不議葢是時諸侯之政多在大夫如魯之三家晉之六卿齊之田氏皆以人臣專國而國人公議皆所不與故重言之以見政在大夫决非可乆之道也孔子曰益者三友損者三友友直友諒友多聞益矣友便辟友善柔友便佞損矣便平聲辟婢亦反友直則聞其過友諒則進於誠友多聞則進於明便習熟也便辟謂習於威儀而不直善柔謂工於媚悦而不諒便佞謂習於口語而無聞見之實三者損益正相反也尹氏曰自天子至於庶人未有不須友以成者而其損益有如是者可不謹哉南軒曰友者所以輔成已徳也直者有吿必告諒者忠信相與多聞者知識可貴是三者友之則使人常懷進修而不敢自足焉得不日益乎便辟便佞謂便於辟與佞者善柔謂善為柔者辟則容止足恭柔則毎事卑屈佞則巧言為悦是三者友之則使人日趨於驕惰焉得不日損乎自天子以至於庶人皆當謹乎此也愚案集注謂便辟直之反善柔諒之反便佞多聞之反南軒則不然正冝參玩孔子曰益者三樂損者三樂樂節禮樂樂道人之善樂多賢友益矣樂驕樂樂佚遊樂宴樂損矣樂五教反禮樂之樂音岳驕樂宴樂之樂音洛節謂辨其制度聲容之節驕樂則侈肆而不知節佚遊則惰慢而惡聞善宴樂則淫溺而狎小人三者損益亦相反也尹氏曰君子之於好樂可不謹哉孔子曰侍於君子有三愆言未及之而言謂之躁言及之而不言謂之隠未見顔色而言謂之瞽君子有徳位之通稱愆過也瞽無目不能察言觀色尹氏曰時然後言則無三者之過矣孔子曰君子有三戒少之時血氣未定戒之在色及其壯也血氣方剛戒之在鬭及其老也血氣既衰戒之在得血氣形之所恃以生者血隂而氣陽也隨時知戒以理勝之則不為血氣所使也范氏曰聖人同於人者血氣也異於人者志氣也血氣有時而衰志氣則無時而衰也少未定壯而剛老而衰者血氣也戒於色戒於鬭戒於得者志氣也君子養其志氣故不為血氣所動是以年彌髙而德彌郡也孔子曰君子有三畏畏天命畏大人畏聖人之言畏者嚴憚之意也天命者天所賦之正理也知其可畏則其戒謹恐懼自有不能已者而付畀之重可以不失矣大人聖言皆天命所當畏知畏天命則不得不畏之矣小人不知天命而不畏也狎大人侮聖人之言侮戯玩也不知天命故不識義理而無所忌憚如此尹氏曰三畏者修已之誠當然也小人不務修身誠已則何畏之有南軒曰畏天命者奉順而不敢逆也畏大人者尊嚴而弗敢易也畏聖言佩服而唯恐違也然而是三者皆主於畏天命又小是詩有云不敢暴虎不敢馮河人知其一莫知其他戰戰兢兢如臨深淵如履薄氷毛氏曰不敬小人之危殆也左氏昭元年晉樂王鮒曰小旻之卒章吾取之杜氏注曰義取非唯暴虎馮河之可畏不敬小人亦危殆王鮒取此義故不敢譏議公子荀子亦云人不肖而不敬則是狎虎也狎虎則危災及其身以此義參之不獨大人之當敬雖小人亦不可不敬也荀卿乃有愛而敬畏而敬之别其意謂於君子則心敬小人則貎敬豈其然邪書曰盛德不狎侮盖德盛者自不為狎侮非以危殆為可畏也孔子曰君子無小大無衆寡無敢慢深味斯言則荀氏之醇疵可見矣此章專言畏董銖子重問敬冝何訓朱子曰是不得而訓也惟畏庶幾近之勉齋黄氏則云嘗聞之師曰敬之為義惟畏足以盡之盖嘗深思其故則不易之論也敬者人心畏悚之名也故字之從人從敬則曰儆從言從敬則曰警從手從敬則曰擎無非畏悚戒懼之意先儒有以主一無適言者有以常惺惺言者皆足以發明主敬之意而訓義親切使人體而易知則未有易畏之一字也案黄氏説與子重所記不同而朱子所跋薛畏翁畫質亦曰惟畏可以近之實先生親筆則曰近者為當况畏於敬雖最切然其字有二義若所謂祇畏抑畏寅畏皆敬之意也至所謂畏怯畏懦之屬又安得為敬乎是又不容不辨又管仲曰畏威如疾民之上也從懷如流民之下也見懷思威民之中也朱子曰畏威如畏疾病此民之上行從心之欲如水流行此民之下行見可懷而思可畏此民之中行此章列於小學故取焉孔子曰生而知之者上也學而知之者次也困而學之又其次也困而不學民斯為下矣困謂有所不通言人之氣質不同大約有此四等楊氏曰生知學知以至困學雖其質不同然及其知之一也故君子惟學之為貴困而不學然後為下南軒曰困而學如已放而求已失而復者也孔子曰君子有九思視思明聽思聦色思温貎思恭言思忠事思敬疑思問忿思難見得思義難去聲視無所蔽則明無不見聽無所壅則聦無不聞色見於面者貎舉身而言思問則疑不蓄思難則忿必懲思義則得不茍程子曰九思各專其一謝氏曰未至於從容中道無時而不自省察也雖有不存焉者寡矣此之謂思誠或問九思曰公且曰色與貎可以要得他温恭若是視聽如何要得聦明曰這只是誠了自㑹如此曰若如公言又却都没些事聖人教人意思不和此有物必有則一箇物有一箇道理况耳目聦明得之於天本來自合如此只為私意蔽惑而失其理聖人教人不是理㑹一件其餘自㑹好須是逐做工夫内外夾持起來恁地積累成熟便㑹無些子滲漏且道如何視明聽聦只是就視聽上理㑹視逺惟明聽德惟聦如有一件可喜物在眼前便要看他便被他蔽了須是知得此物不當視便是見得遠不蔽於眼前近㡳故曰視逺惟明仁義忠信之言將耳常常聽著不好説話莫教入耳故曰聽德惟聦南軒曰九思當乎此則思乎此天理之所由擴人欲之所由遏也然而是九者要當養之於未發之前而持之於既發之後若但欲深察之於流而收之於暫則多見其紛擾而無力矣孔子曰見善如不及見不善如探湯吾見其人矣吾聞其語矣探吐南反真知善惡而誠好惡之顔曾閔冉之徒盖能之矣語葢古語也隠居以求其志行義以達其道吾聞其語矣未見其人也求其志守其所達之道也達其道行其所求之志也蓋惟伊尹太公之流可以當之當時若顔子亦庶乎此然隠而未見又不幸而蚤死故夫子言然隠居以求其志行義以達其道則其退也所以安其義之所安而其進也所以推其道於天下矣盖其所達之道即其所求之志也此大人之事故曰未見其人齊景公有馬千駟死之日民無德而稱焉伯夷叔齊餓於首陽之下民到于今稱之駟四馬也首陽山名其斯之謂與與平聲胡氏曰程子以為第十二篇錯簡誠不以當亦祇以異當在此章之首今詳文勢似當在此句之上言人之所稱不在於富而在於異也愚謂此説近是而章首當有孔子曰字葢闕文耳大抵此書後十篇多闕誤陳亢問於伯魚曰子亦有異聞乎亢音剛亢以私意窺聖人疑必隂厚其子對曰未也嘗獨立鯉趨而過庭曰學詩乎對曰未也不學詩無以言鯉退而學詩事理通達而心氣和平故能言他日又獨立鯉趨而過庭曰學禮乎對曰未也不學禮無以立鯉退而學禮品節詳明而德性堅定故能立聞斯二者嘗獨立之時所聞不過如此其無異聞可知陳亢退而喜曰問一得三聞詩聞禮又聞君子之逺其子也逺去聲尹氏曰孔子之教其子無異於門人故陳亢以為逺其子邦君之妻君稱之曰夫人夫人自稱曰小童邦人稱之曰君夫人稱諸異邦曰寡小君異邦人稱之亦曰君夫人寡寡德謙辭呉氏曰凡語中所載如此類者不知何謂或古有之或夫子嘗言之不可攷也論語集編卷八
