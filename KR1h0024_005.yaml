body:
  text: 欽定四庫全書中庸集編卷下宋真德秀撰自誠明謂之性自明誠謂之教誠則明矣明則誠矣自由也德無不實而明無不照者聖人之德所性而有者也天道也先明乎善而後能實其善者賢人之學由教而入者也人道也誠别無不明矣明則可以至於誠矣或問誠明之説曰吕氏性教二字得之自誠明謂之性誠實然之理此堯舜以上事學者則自明誠謂之教明此性而求實然之理輯略程子曰君子之學必先明諸心知所養然後力行以求至所謂自明而誠也吕氏曰自誠明性之者也自明誠反之者也性之者成德而言聖人之所性也反之者自志學而言聖人之所教也一本云謂之性者生之所固有以得之謂之教者由學以復之右第二十一章子思承上章夫子天道人道之意而立言也自此以下十二章皆子思之言以反覆推明此章之意唯天下至誠為能盡其性能盡其性則能盡人之性能盡人之性則能盡物之性能盡物之性則可以贊天地之化育可以贊天地之化育則可以與天地參矣天下至誠謂聖人之德之實天下莫能加也盡其性者德無不實故無人欲之私而天命之在我者察之由之巨細精粗無毫髮之不盡也人物之性亦我之性但以所賦形氣不同而有異耳能盡之者謂知之無不明而處之無不當也贊猶助也與天地參謂與天地並立為三也此自誠而明者之事也或問至誠盡性諸説如何曰程子論贊天地之化育而曰不可以贊助言論窮理盡性以至於命而曰只窮理便是至於命則亦若有可疑者蓋嘗竊論之天下之理未嘗不一而語其分則未嘗不殊此自然之勢也蓋人生天地之間稟天地之氣其體即天地之體其心即天地之心以理而言是豈有二物哉故凡天下之事雖若人之所為而其所以為之者莫非天地之所為也又況聖人純於義理而無人欲之私則其所以代天而理物者乃以天地之心而贊天地之化尤不見其有彼此之間也若以其分言之則天之所為固非人之所及而人之所為又有天地之所不及者其事固不同也但分殊之狀人莫不知而理一之致多或未察故程子之言發明理一之意多而及於分殊者少蓋抑揚之勢不得不然然亦不無小失其平矣唯其所謂止是一理而天人所為各自有分乃為全備而不偏而讀者亦莫之省也至於窮理至命盡人盡物之説則程張之論雖有不同然亦以此而推之則其説初亦未嘗甚異也蓋以理言之則精粗本末初無二致固不容有漸次當如程子之論若以其事而言則其親疏近逺深淺先後又不容於無别當如張子之言也吕遊楊説皆善而吕尤確實或曰中庸之盡性即孟子所謂盡心否曰盡心是就知上説盡性是就行上説或曰能盡得真實本然之全體是盡性能盡得虛靈知覺之妙用是盡心曰然盡心就所知上説盡性就事物上説問至誠盡人物之性是曉得盡否答曰非特曉得盡亦是要處之盡其道若凡所以養人教人之政與夫利萬物之政皆是也故下文云贊天地之化育而與天地參矣若只曉得盡如何得與天地參盡人性盡物性性只一般人物氣稟不同人雖稟得氣濁善底只在那裏有可開通之理是以聖人有教化去開通他使復其善底物稟得氣偏了無道理使開通故無用教化盡物性只是所以處之各當其理且隨他所明處使之他所明處亦只是這箇善聖人便是用他善底如馬悍者用鞭䇿亦乘得然物只到得這裏此亦是教化是隨他天理流行發見處使之也如虎狼便只得陷而殺之驅而逺之盡己之性如在君臣則義在父子則親在兄弟則愛之類己無一之不盡盡人之性如黎民時雍各得其所盡物之性如鳥獸草木咸若如此則可以贊天地之化育聖人贊天地之化育有不恰好處被聖人做得都好丹朱不肖堯則以天下與人洪水泛濫舜尋得禹而民得安居桀紂暴虐湯武起而誅之贊天地之化育人在天地中間雖只是一理然天人所為各自有分人做得底却有天做不得底如天能生物而耕種必用人水能潤物而灌溉必用人火能熯物而薪爨必用人財成輔相須是人做非贊助而何輯略程子曰贊天地之化育自人而言之從盡其性至盡物之性然後可以贊天地之化育可以與天地參矣言人盡性所造如是若只是至誠更不須論所謂人者天地之心及天聰明自我民聰明止謂只是一理而天人所為各自有分又曰至誠可以贊化育者可以回造化又曰贊者參贊之義先天而天弗違後天而奉天時之謂也非謂贊助只有一箇誠何助之有張子曰二程解窮理盡性以至於命只窮理便是至於命亦是失於太快此義儘有次序須窮理便能盡得己之性既盡得己之性則推類又盡人之性既盡得人之性須是并萬物之性一齊盡得如此然後至於天道也其間煞有事豈有當下理會了學者須是窮理為先如此則方有學今言知命與至於命儘有逺近豈可以知便謂之至也吕氏曰人受天地之中其生也具有天地之德柔強昏明之質雖異其心之所然者皆同特蔽有淺深故别而為昏明稟有多寡故分而為強柔至於理之所同然雖聖愚有所不異盡己之性則天下之性皆然故能盡人之性蔽有淺深故為昏明蔽有開塞故為人物稟有多寡故為強柔稟有偏正故為人物故物之性與人異者幾希惟塞而不開故知不若人之明偏而不正故才不若人之美然人有近物之性者物有近人之性者亦繫乎此於人之性開塞偏正無所不盡則物之性未有不能盡也己也人也物也莫不盡其性則天地之化幾矣故行其所無事順以養之而已是所謂贊天地之化育者也如堯命羲和欽若昊天至於民之祈因夷隩鳥獸之孳尾希革毛毨氄毛無不與知則所贊可知矣天地之化育猶有所不及必人贊之而後備則天地非人不立故人與天地並立而為三才此之謂與天地參遊氏曰萬物皆備於我矣反身而誠樂莫大焉故惟天下至誠為能盡其性千萬人之性一已之性是也故能盡其性則能盡人之性萬物之性一人之性是也故能盡人之性則能盡物之性同然皆得者各安其常則盡人之性也同然皆生者各得其理則盡物之性也至於盡物之性則和氣充塞故可以贊天地之化育夫如是則天復地載教化各任其職而成位乎其中矣問天下將亂何故賢者便生得不豐厚侯曰氣之所鍾便如此曰有變化之道乎曰在君相斡旋之力耳若舉賢任能使政事治而百姓和則天地之氣和而復淳厚矣此天下所以有資於聖賢有賴於君相也子思曰贊天地之化育正謂是也若曰治亂自有數而任之則何賴於聖賢哉子思所以言贊化育也書亦曰祈天永命如此而已右第二十二章言天道也其次致曲曲能有誠誠則形形則著著則明明則動動則變變則化唯天下至誠為能化其次通大賢以下凡誠有未至者而言也致推致也曲一偏也形者積中而發外著則又加顯矣明則又有光輝發越之盛也動者誠能動物變者物從而變化則有不知其所以然者蓋人之性本無不同而氣則有異故惟聖人能舉其性之全體而盡之其次則必自其善端發見之偏而悉推致之以各造其極也曲無不致則德無不實而形著動變之功自不能已積而至於能化則其至誠之妙亦不異於聖人矣或問致曲之説曰人性雖同而氣稟或異自其性而言之則人自孩提聖人之質悉已完具以其氣而言之則惟聖人為能舉其全體而無所不盡上章所言至誠盡性是也若其次則善端所發隨其所稟之厚薄或仁或義或孝或弟而不能同矣自非各因其發見之偏一一推之以至乎其極使其薄者厚而異者同則不能有以貫通乎全體而復其初即此章所謂致曲而孟子所謂擴充其四端者是也問致曲是就偏曲處致力否曰如程子説或孝或弟或仁或義所偏發處推致之各造其極也曰如此恐將來只就所偏處成就曰不然或仁或義或孝或弟更互而發便就此做致曲工夫又問其次致曲與易中納約自牖之意亦略相類納約自牖是因人之明而導之致曲是因己之明而推之是如此否先生曰正是如此問其次致曲注所謂善端發見之偏如何曰人所稟各有偏善或稟得剛強或稟得和柔各有一偏之善若就他身上更求其他好處又不能如此所以就其善端之偏而推極其全惻隱羞惡是非辭遜四端隨人所稟發出來各有偏重處是一偏之善問前夜與直卿論致曲一假或問中舉孟子四端擴而充之直卿以為未妥既是四端安得謂之曲曰四端先後互發豈不是曲孟子云知皆擴而充之則自可見若曰只有此一曲則是夷惠之偏如何得該遍聖人具全體一齊該了而當用時亦只時發一端問聖人用時雖發一端然其餘只平鋪在要用即用不似以下人有先後間斷之異須待擴而後充曰然又問顔曽以下皆是致曲曰顔子體假已具曽子却是致曲一一推之至答一貫之時則渾合矣曰所以必致曲者只是為氣稟隔必待因事逐旋發見曰然又問程子説致曲先於偏勝處發似未妥如此則專主一偏矣曰此説甚可疑須於事上論不當於人上論問中庸致曲先生曰只為氣質不同故發見有偏如至誠盡性則全體著見次於此者未免為氣質所隔只如人氣質溫厚其發見者必多興仁仁多便侵却那義底分數氣質剛毅其發見者必多興義義多便侵却那仁底分數問其次致曲曰伊川先生説得好將曲專做好處所以云或仁或義或孝或弟就此等處推致其極曲能有誠一句猶言若曲處能盡其誠則誠則形形則著也蓋曲處若不能有其誠則其善端之發見者或存或亡終不能實有諸已故須就此一偏發見處便推致之使有誠則不失也又問明動變化伊川以君子所過者化解動字是和那變化二字都説在裏面否曰動是方感動變化則己改其舊俗然尚有痕迹在化則都消化了無復痕迹矣輯略程子曰其次致曲者學而後知之也而其成也與生而知之者不異焉故君子莫大於學莫害於畫莫病於自足莫罪於自棄學而不止此湯武所以聖也又曰致曲者就其曲而致之也又曰人自孩提聖人之質己完只先於偏勝處發或仁或義或孝或弟去氣偏處發便是致曲又曰曲偏曲之謂非大道也就一事中用志不分亦能有誠如養由基射之類是也誠則形誠後便有物如參前倚衡如有所立卓爾是也形則著又著見也著則明是有光輝之時也明則動誠則動人也君子所過者化豈非動乎或曰變與化何别曰變如物方變而未化化則更無舊迹自然之謂也莊子言變大於化非也右第二十三章言人道也至誠之道可以前知國家將興必有禎祥國家將亡必有妖孽見乎蓍龜動乎四體禍福將至善必先知之不善必先知之故至誠如神見音現禎祥者福之兆妖孽者禍之萌蓍所以筮龜所以卜四體謂動作威儀之間如執玉髙卑其容俯仰之類凡此皆理之先見者也然唯誠之至極而無一毫私偽留於心目之間者乃能有以察其幾焉神謂鬼神或問至誠如神之説曰吕氏得之矣其論動乎四體為威儀之則者尤為確實程子用便近二之論蓋因異教之説如蜀山人董五經之徒亦有能前知者故就之而論其優劣非以其不用而不知者為真可貴而賢於至誠之前知也至誠前知乃因其事理朕兆之己形而得之如所謂不逆詐不億不信而常先覺者非有術數推驗之煩意想測度之私也亦何害其為一哉輯略程子曰人固可以前知然其理須是用則知不用則不知知不如不知之愈蓋用便近二所以釋子謂又不是野狐精也又曰蜀山人不起念十年便能前知吕氏曰誠一於理無所間雜則天地人物古今後世融徹洞達一體而已興亡之兆猶心之有思慮如有萌焉無不前知蓋有方所則有彼此先後之别既無方所彼即我也先即後也未嘗分别隔礙自然達乎神明不特前知而已一本云至誠與天地同德與天地同德則其氣化運行與天地同流矣興亡之兆禍福之來感於吾心動於吾氣如有萌焉無不前知况乎誠心之至求乎蓍龜而蓍龜告察乎四體而四體應所謂莫見乎隱莫顯乎微者也此至誠所以達乎神明而無間故曰至誠如神動乎四體如傳所謂威儀之則以定命者也右第二十四章言天道也誠者自成也而道自道也道也之道音導言誠者物之所以自成而道者人之所當自行也誠以心言本也道以理言用也誠者物之終始不誠無物是故君子誠之為貴天下之物皆實理之所為故必得是理然後有是物所得之理既盡則是物亦盡而無有矣故人之心一有不實則雖有所為亦如無有而君子必以誠為貴也蓋人之心能無不實乃為有以自成而道之在我者亦無不行矣誠者非自成已而已也所以成物也成已仁也成物知也性之德也合外內之道也故時措之冝也知去聲誠雖所以成己然既有以自成則自然及物而道亦行於彼矣仁者體之存智者用之發是皆吾性之固有而無內外之殊既得於己則見於事者以時措之而皆得其冝也或問二十五章之説曰自成自道如程子説乃與下文相應遊楊皆以無待而然論之其説雖髙然於此為無所當且又老莊之遺意也誠者物之終始不誠無物之義亦唯程子之言為至當然其言太略故讀者或不能曉請得而推言之蓋誠之為言實而已矣然此篇之言有以理之實而言者如曰誠不可掩之類是也有以心之實而言者如曰反諸身不誠之類是也讀者各隨其文意之所指而尋之則其義各得矣所謂誠者物之終始不誠無物者以理言之則天地之理至實而無一息之妄故自古至今無一物之不實而一物之中自始至終皆實理之所為也以心言之則聖人之心亦至實而無一息之妄故從生至死無一事之不實而一事之中自始至終皆實心之所為也此所謂誠者物之終始者然也苟未至於聖人而其本心之實者猶未免於間斷則自其實有是心之初以至未有間斷之前所為無不實者及其間斷則自其間斷之後以至未相接續之前凡所云為皆無實之可言雖有其事亦無以異於無有矣如曰三月不違則三月之間所為皆實而三月之後未免於無實蓋不違之終始即其事之終始也日月至焉則至此之時所為皆實而去此之後未免於無實蓋至焉之終始即其物之終始也是則所謂不誠無物者然也以是言之則在天者本無不實之理故凡物之生於理者必有是理方有是物未有無其理而徒有不實之物者也在人者或有不實之心故凡物之出於心者必有是心之實乃有是物之實未有無其心之實而能有其物之實者也程子所謂徹頭徹尾者蓋如此其餘諸説大抵皆知誠之在天為實理而不知其在人為實心是以為説太髙而往往至於交互差錯以失經文之本意正猶知愛之不足以盡仁而凡言仁者遂至於無字之可訓其亦誤矣誠者自成也而道自道也上句是孤立懸空説這一句四旁都無所倚靠蓋有是實理則有是天有是實理則有是地如無是實理則便沒這天也沒這地凡物都是如此故云誠者自成蓋本來自成此物到得道自道便是有這裏人若不自去行便也空了問既説物之所以自成下文又云誠以心言莫是心者物之所存主處否曰誠以心言者是就一物一面説也故凡物必有是心有是心然後有是事下面説誠者物之終始是解誠者自成一句不誠無物己是説著自道句了蓋人則有不誠而理則無不誠者恁地看覺得前後文章相應問誠者自成也而道自道也兩句語勢相似而先生之解不同上句工夫在誠字上下句工夫在行字上先生曰亦微不同自成若只做自道解亦得某因言妄意謂此兩句只是説箇為己不是為人其後却説不獨是自成亦可以成物先生未答久之復曰某舊説誠有病蓋誠與道皆泊在誠之為貴上了後面却便是説箇合內外底道理若如舊説則誠與道成兩物也誠者自成也下文云誠者物之終始不誠無物此二句便解上一句實有此理故有是人實有此理故有是事誠有主事而言者有主理而言者蓋不誠無物是事之實然至於參贊化育則便是實然之理誠者物之終始猶言體物而不可遺誠者物之終始以理而言不誠無物以人而言誠者物之終始來處是誠去處亦是誠誠則有物不誠則無物且如而今對人説話若句句説實皆自心中流出這便是有物若是脫空誑誕不説實話雖有兩人相對説話如無物也且如草木自萌芽發生以至枯死朽腐歸生皆是有此實理方有此物若無此理安得有此物誠者物之終始不誠無物如讀書半版以前心在書上則此半版有終有始半版以後心不在焉則如不讀矣問誠者物之終始不誠無物是實有是理而後有是物否答曰且看他聖人説底正文語脈蓋誠者物之終始却是事物之實理始終無有間斷自開闢以來以至人物消盡只是如此在人之心苟誠實無偽則徹頭徹尾無非此理一有間斷則就問斷處即非誠矣如聖人至誠便是自始生至沒身首尾是誠顔子不違仁便是自三月之初為誠之始三月之末為誠之終三月以後便不能不間斷矣日月至焉只就至焉時便為終始至焉之外即間斷而無誠無誠即無物矣不誠則心不在焉視不見聽不聞是雖謂之無耳目可也誠者物之終始不誠無物做萬物看亦得就事物上看亦得物以誠為體故不誠則無此物終始是徹頭徹尾底意或問中云自其間斷之後雖有其事皆無實之可言何如曰此是説不誠無物如人做事未做得一半便棄了即一半便不成問遊氏云四時之運己即成物之功廢先生曰只為有這些子如無這些子其機關都死了再問為其至誠無息所以四時行百物生更無已時此所以維天之命於穆不已也先生曰然問不誠無物曰誠實也且如人為孝若是不誠恰似不曾誠便是事底骨子不誠無物不誠雖有物猶無物如禘自既灌而往者誠意一散如不祭一般不誠無物人心無形影惟誠時方有這物事今人做事若初間有誠意到半截後意思懶散慢做將去便只是前半截有物後半截無了誠者物之終始指實理而言君子誠之為貴指實心而言誠者非自成己而已此自成字與前面不同蓋怕人只説自成故言非自成已乃所以成物成已便以仁言成物便以知言故成已成物固無內外之殊但必先成已然後能成物此道之所以當自行也成已仁也是體成物知也是用學不厭知也是體教不倦仁也是用問成已仁也成物知也成物如何説知曰須是知運用方成得物問時措之冝是顔稷閉戶纓冠之義否曰亦有此意須是仁知具內外合然後有箇時措之宜又云如平康無事時是一般處置倉卒緩急時又有一樣處置問成己仁也成物知也以某觀之成己却是知成物却是仁曰顔子克己復禮為仁非成己而何智周乎萬物而道濟天下非成物而何輯略程子曰誠者自成如至誠事親則成人子至誠事君則成人臣不誠無物誠者物之終始猶俗語徹頭徹尾不誠更有甚物也又曰聖人言忠信者多矣人道只在忠信不誠則無物出入無時莫知其鄉者人心也若無忠信豈復有物乎又曰學者不可以不誠不誠無以為善不誠無以為君子修學不以誠則學雜為事不以誠則事敗自謀不以誠則是欺其心而自棄其志與人不以誠則是喪其德而增人之怨今小道異端亦必誠而後得而况欲為君子者乎故曰學者不可以不誠雖然誠者在知道本而誠之耳又曰成己須是仁推成己之道成物便是知又曰性之德者言性之所有如卦之德乃卦之緼也又曰性不可以內外言又曰時措之冝言隨時之義若溥博淵泉而時出之吕氏曰誠者實而已矣所謂誠者物之終始不誠無物也故君子必明乎善知至則意誠矣既有惻怛之誠意乃能竭不倦之強力竭不倦之強力然後有可見之成功苟不如是雖博聞多見舉歸於虛而已是誠之所以為貴也誠雖自成也道雖自道也非有我之得私也與天下同之而已故思成己必思所以成物是所謂仁智之道也性之所固有合外內而無間者也天大無外造化發育皆在其間自無內外之别人有是形而為形所梏故有內外內外一生則物自物已自己與天地不相似矣反乎性之德則安有物我之異內外之别哉故具仁與智無已無物誠一以貫之合天地而施化育故能時措之宜也又曰子貢曰學不厭智也教不倦仁也學不厭所以成已此則成已為仁教不倦所以成物比則成物為智何也夫盡性以成已則仁之體也推是以成物則智之事也自成德而言也學不厭所以致吾知教不倦所以廣吾愛自入德而言也此子思子貢之言所以異也右第二十五章言人道也故至誠無息既無虛假自無間斷不息則久久則徴久常於中也徴驗於外也徴則悠逺悠逺則博厚博厚則髙明此皆以其驗於外者言之鄭氏所謂至誠之德著於四方者是也存諸中者既久則驗於外者益悠逺而無窮矣悠逺故其積也廣博而深厚博厚故其發也髙大而光明博厚所以載物也髙明所以覆物也悠久所以成物也悠久即悠逺兼內外而言之也本以悠逺致髙厚而髙厚又悠久也此言聖人與天地同用博厚配地髙明配天悠久無疆此言聖人與天地同體如此者不見而章不動而變無為而成見音現見猶示也不見而章以配地而言也不動而變以配天而言也無為而成以無疆而言也天地之道可一言而盡也其為物不二則其生物不測此以下復以天地明至誠無息之功用天地之道可一言而盡不過曰誠而已不二所以誠也誠故不息而生物之多有莫知其所以然者天地之道博也厚也髙也明也悠也久也言天地之道誠一不二故能各極其盛而有下文生物之功今夫天斯昭昭之多及其無窮也日月星辰繫焉萬物覆焉今夫地一撮土之多及其廣厚載華嶽而不重振河海而不泄萬物載焉今夫山一卷石之多及其廣大草木生之禽獸居之寶藏興焉今夫水一勺之多及其不測黿鼉蛟龍魚鱉生焉貨財殖焉夫音扶華藏並去聲卷平聲勺市若反昭昭猶耿耿小明也此指其一處而言之及其無窮猶十二章及其至也之意蓋舉全體而言也振收也卷區也此四條皆以發明由其不二不息以致盛大而能生物之意然天地山川實非由積纍而後大讀者不以辭害意可也詩云維天之命於穆不已蓋曰天之所以為天也於乎不顯文王之德之純蓋曰文王之所以為文也純亦不已於音烏乎音呼詩周頌維天之命篇於歎辭穆深逺也不顯猶言豈不顯也純純一不雜也引此以明至誠無息之意程子曰天道不已文王純於天道亦不已純則無二無雜不已則無間斷先後或問二十六章之説曰此章之説最為繁雜吕氏所謂不已其命不已其德意雖無爽而語亦有病蓋天道聖人之所以不息皆實理之自然雖欲已之而不可得今曰不已其命不已其德則是有意於不已而非所以明聖人天道之自然矣又以積天之昭昭以至於無窮譬夫人之充其良心以至於與天地合德意則甚善而此章所謂至誠無息以至於博厚髙明乃聖人久於其道而天下化成之事其所積而成者乃其氣象功效之謂若鄭氏所謂至誠之德著於四方者是已非謂在己之德亦待積而後成也故章末引文王之詩以證之夫豈積纍漸次之謂哉若如吕氏之説則是因無息然後至於誠由不己然後純於天道也失其旨矣大抵聖賢之言內外精粗各有攸當而無非極致近世諸儒乃或不察乎此而於其外者皆欲引而納之於內於其粗者皆欲推而致之於精若致曲之明動變化此章之博厚髙明蓋不勝其繁碎穿鑿而於其本指失之愈逺學者不可不察也問至誠無息不息則久久則徴徴是徴驗發見於外否曰除是久然後有徴驗只一日兩日工夫如何有徴驗問悠久博厚髙明曰此是言聖人功業自徴則悠逺至博厚髙明無疆皆是功業著見如此故鄭氏云聖人之德著於四方又致曲章明則動諸説多就性分上理會惟程子云明則動是誠能動人也又説著則明如見面盎背是著若明則人所共見如令聞廣譽施於身之類問悠逺博厚髙明章句中取鄭氏説謂聖人之德著於四方豈以聖人之誠自近而逺自微而著如書稱堯光被四表格于上下者乎曰亦須看他一箇氣象自至誠不息不息則久積之自然如此至誠無息一假鄭氏曰言至誠之德著於四方是也諸家都將做進德次第説只一箇至誠己該了豈復更有許多節次不須説入裏面來古注有不可易處吕氏説有如是廣博則不得不髙有如是深厚則不得不明此兩句甚善章句中雖是用他意然當初只欲辭簡故反不似他説得分曉譬如為臺觀須是大做根基方始上面可以髙大又如萬物精氣蓄於下者深厚則其發越於外者自然光明輯略程子曰維天之命於穆不己此是理自相續不己非是人為之如使可為雖使百萬般安排也須有息時只為無為故不息中庸言不見而章不動而變無為而成天地之道可一言而盡也吕氏曰實理不二則其體無雜其體不雜則其行無間故至誠無息非使之也機自動耳乃乾坤之所以闔闢萬物之所以生育亘萬古而無窮者也如使之則非實非實則有時而息矣久者日新而無敝之謂也徴驗也悠逺長也天地運行而不息故四時變化而無敝日月相從而不己故朔晦生明而無敝此之謂不息則久四時變化而無敝故有生生之驗晦朔生明而無敝故有照臨之驗此之謂久則徴生生也照臨也苟日新而有徴則可以繼繼其長至於無窮矣此之謂徴則悠逺悠逺無窮者其積必多博者能積衆狹厚者能積衆薄此之謂悠逺則博厚有如是廣博則其勢不得不髙有如是深厚則其精不得不明此之謂博厚則髙明博厚則無物不能任也髙明則無物不能冒也悠久則無時而不養也所以載物覆物成物者其能也所以章所以變所以成者其功也能非力之所任功非用而後有其勢自然不得不爾是皆至誠不二而已此天地之道所以一言而盡也天地所以生物不測者至誠不二者也天地所以成者積之無疆者也如使天地為物而二則其行有息其積有限昭昭撮土之微將下同乎衆物又焉有載物覆物成物之功哉雖天之大昭昭之多而已雖地之廣撮土之多而已山之一卷水之一勺亦猶是矣其所以髙明博厚神明不測者積之之多而已今夫人之有良心也莫非受天地之中是為可欲之善不充之則不能與天地相似而至乎大大而不化則不能不勉不思與天地合德而至於聖然所以至於聖者充其良心德盛仁熟而後爾也故曰過此以往未之或知也窮神知化德之盛也如指人之良心而責之與天地合德猶指撮土而求其載華嶽振河海之力指一勺而求其生蛟龍殖貨財之功是亦不思之甚也天之所以為天不已其命而已聖人之所以為聖不已其德而已其為天人德命則異其所以不已則一故聖人之道可以配命者如此而已右第二十六章言天道也大哉聖人之道包下文兩節而言洋洋乎發育萬物峻極于天峻髙大也此言道之極於至大而無外也優優大哉禮儀三百威儀三千優優充足有餘之意禮儀經禮也威儀曲禮也此言道之入於至小而無間也待其人而後行總結上兩節故曰苟不至德至道不凝焉至德謂其人至道指上兩節而言也凝聚也成也故君子尊德性而道問學致廣大而盡精微極髙明而道中庸溫故而知新敦厚以崇禮尊者恭敬奉持之意德性者吾所受於天之正理道由也溫猶燖溫之溫謂故學之矣復時習之也敦加厚也尊德性所以存心而極乎道體之大也道問學所以致知而盡乎道體之細也二者修德凝道之大端也不以一毫私意自蔽不以一毫私欲自纍涵泳乎其所己知敦篤乎其所己能此皆存心之屬也析理則不使有毫釐之差處事則不使有過不及之謬理義則日知其所未知節文則日謹其所未謹此皆致知之屬也蓋非存心無以致知而存心者又不可以不致知故此五句大小相資首尾相應聖賢所示入德之方莫詳於此學者冝盡心焉是故居上不驕為下不倍國有道其言足以興國無道其默足以容詩曰既明且哲以保其身其此之謂與倍與背同與平聲興謂興起在位也詩大雅蒸民之篇或問二十七章之説曰程張備矣張子所論逐句為義一條甚為切於文義故吕氏因之然須更以遊楊二説足之則其義始備爾遊氏分别至道至德為得之唯優優大哉之説為未善而以無方無體離形去智為極髙明之意又以人德地德天德為德性廣大髙明之分則其失愈逺矣楊氏之説亦不可曉蓋道者自然之路德者人之所得故禮者道體之節文必其人之有德然後乃能行之也今乃以禮為德而欲以凝夫道則既誤矣而又曰道非禮則蕩而無止禮非道則梏於儀章器數之末而有所不行則是所謂道者乃為虛無恍惚元無凖則之物所謂德者又不足以凝道而反有所待於道也其諸老氏之言乎誤益甚矣溫故知新敦厚崇禮諸説但以二句相對明其不可偏廢大意固然然細分之則溫故然後有以知新而溫故又不可不知新敦厚然後有以崇禮而敦厚又不可不崇禮此則諸説之所遺也大抵此五句承章首道體大小而言故一句之內皆具大小二意如德性也廣大也髙明也故也厚也道之大也問學也精微也中庸也新也禮也道之小也尊之道之致之盡之極之道之溫之和之敦之崇之所以修是德而凝是道也以其於道之大小無所不體故居上居下在治在亂無所不宜此又一章之通旨也大哉聖人之道此一假大處做大處有細密處做細密處有渾淪處做渾淪處有或問聖人之道發育萬物峻極于天曰即春生夏長秋收冬藏便是聖人之道不成須要聖人使他發育方是聖人之道峻極于天只是充塞天地底意思禮儀三百威儀三千優優大哉皆是天道流行發見為用處優優大哉禮儀三百威儀三千一事不可欠闕才闕一事便是於全體處有虧也佛老之學只説道無不存無適非道只此便了若有一二事著也不妨經禮三百便是儀禮中士冠諸侯冠天子冠禮之類此是大節有三百條如始加再加三加又如其坐如尸立如齊之類皆是其中之小目便有三千條或有變禮亦是小目吕與叔云經便是常行底緯便是變底恐不然經中自有常有變緯中亦自有常有變德性猶言義理之性曰然不尊德性則懈怠弛慢矣學問何從而進聖人將那廣大底收拾向實處來教人從實處做將去老佛之學則説向髙逺處去故都無工夫了聖人雖説本體如此及做時須事事著實如禮樂刑政文為制度觸處都是體用動靜互換無端都無少許空闕處若於此有一毫之差則便於本體有虧欠處也洋洋乎禮儀三百威儀三千洋洋是流動充滿之意廣大似所謂理一精微似所謂分殊致廣大謂心胸開濶無此疆彼界之殊極髙明謂無一毫人欲之私以纍於己才汨於人欲便卑汙矣問致廣大章句謂不以一毫私欲自蔽極髙明是不以一毫私欲自纍豈以上面已説尊德性是所以存心而極乎道體之大故於此略言之歟曰也只得如此説此心本廣大若有一毫私意蔽之便狹小了此心本髙明若以一毫私欲纍之便卑汙了若能不以一毫私意自蔽則其心開濶都無比疆彼界底意思自然能致廣大惟不以一毫私欲自纍則其心峻潔決無汙下昏冥底意思自然能極髙明因舉張子言曰陽明勝則德性用隂濁勝則物欲行溫故而知新溫故有七分工夫知新有三分工夫其實溫故則自然知新上下五句皆然敦厚以崇禮厚是資質恁地朴實敦是愈加他重厚此是培其基本問德性問學廣大精微髙明中庸據或問中所論皆具大小之意如溫故恐做不得大看曰就知新言之便是新來方理會得那枝分節解底舊來已見得大體與他溫尋去亦有大小之意居上不驕為下不倍國有道其言足以興國無道其默足以容舉此數事言大小精粗一齊理會過貫徹了後盛德之效自然如此問尊德性而道問學行意在先擇善而固執之知意又在先如何曰此便是互相為用大哉聖人之道洋洋乎發育萬物峻極于天是言道體之大處禮儀三百威儀三千是言道之細處只章首便分兩節來故下文五句又相因尊德性至敦厚此上一截便是渾淪處道問學至崇禮此下一截便是詳密處道體之大處直是難守細處又難窮究若有上面一截而無下面一截只管道是箇渾淪更不務致知如此則茫然無覺若有下面一截而無上面一截只管要纎息皆知更不去行如此則又空無所寄如有一般人實是敦厚淳朴然或箕踞不以為非便是不崇禮若只去理會禮文而不敦厚則又無以居之所以忠信之人可學禮便是敦厚以崇禮三千三百之儀聖人之道無不充足其中略無些子空闕處此便是語小天下莫能破也因言某舊年讀中庸都心煩看不得且是不知是誰做若以為子思做又却時復有箇子曰字更沒理會處蓋某僻性讀書須先理會得這樣分曉了方去涵泳他義理後來讀得熟後方見得是子思參取夫子之説著為此書自是沈潛反復遂漸得其旨趣定得今章句一篇其擺布得來直恁麼細密輯略程子曰自大哉聖人之道至至道不凝焉皆是一貫又曰中庸言禮儀三百威儀三千方是説優優大哉又却非如異教之説須得如枯木死灰以為得也又曰德性者言性之可貴與言性善其實一也又曰須是合內外之道一天人齊上下下學而上達極髙明而道中庸又曰極髙明而道中庸非是二事中庸天理也天理固髙明不極乎髙明不足以道中庸中庸乃髙明之極也又曰理則極髙明行之只是中庸張子曰天體物而不遺猶仁體事而無不在也禮儀三百威儀三千無一物之非仁也昊天曰明及爾出王昊天曰旦及爾遊衍無一物之不體也又曰不尊德性則問學從而不道不致廣大則精微無所立其誠不極髙明則擇乎中庸失時措之宜矣又曰尊德性而道問學致廣大而盡精微極髙明而道中庸皆逐句為一義上言重下語輕尊德性猶據於德德性須尊之道行也問問得者學行得者猶學問也尊德性須是將前言往行所聞所知以參驗恐行有錯致廣大須盡精微不得鹵莾極髙明須道中庸之道又曰今且將尊德性而道問學為心日自求於問學有所背否於德性有所懈否此義亦是博文約禮下學上達以此警策一年安得不長每日須求多少為益知所亡改得少不善此德性上之益讀書求義理編書須理會有所歸著勿徒寫過又多識前言往行此問學上益也勿使有俄頃間度似此三年庶幾有進又曰致廣大極髙明此則儘逺大所處則直是精約又曰溫故知新多識前言往行以畜德繹舊業而知新益思昔未至而今至之緣舊所見聞而察來皆其義也吕氏曰道之在我者德性而已不先貴乎此則所謂問學者不免乎口耳為人之事而已道之全體者廣大而已不先充乎此則所謂精微者或偏或隘矣道之上達者髙明而已不先止乎此則所謂中庸者同汙合俗矣溫故知新將以進吾知也敦厚崇禮將以實吾行也知崇禮卑至於成性則道義皆從此出矣居上而驕知上而不知下者也為下而倍知下而不知上者也國有道不知言之足興知藏而不知行者也國無道不知默之足容知行而不知藏者也是皆一偏之行不蹈乎時中惟明哲之人知上知下知行知藏此所以卒保其身者也遊氏曰發育萬物峻極于天至道之功也禮儀三百威儀三千至道之具也洋洋乎言上際於天下蟠於地也優優大哉言動容周旋中禮也夫以三百三千之多儀非天下至誠孰能從容而盡中哉故曰待其人而後行蓋盛德之至者人也故曰苟不至德至道不凝焉至德非他至誠而已矣又曰懲忿窒欲間邪存誠此尊德性也非學以聚之問以辨之則擇善不明矣故繼之以道問學尊德性而道問學然後能致廣大尊其所聞行其所知充其德性之體使無不該遍此致廣大也非盡精微則無以極深而研幾也故繼之以盡精微致廣大而盡精微然後能極髙明始也未離乎方今則無方矣始也未離乎體今則無體矣離形去智廓然大通此極髙明也非道中庸則無踐履可據之地不幾於蕩而無執乎故繼之以道中庸髙明者中庸之妙理而中庸者髙明之實德也其實非兩體也楊氏曰道之峻極于天道之至也無禮以範圍之則蕩而無止而天地之化或過矣禮儀三百威儀三千所以體道而範圍之也故曰苟不至德至道不凝焉所謂至德者禮其是乎夫禮天所秩也後世或以為忠信之薄或以為偽皆不知天者也故曰待其人而後行蓋道非禮不止禮非道不行二者常相資也苟非其人而梏於儀章器數之末則愚不肖者之不及也尚何至道之凝哉又曰尊德性而後能致廣大致廣大而後能極髙明道問學而後能盡精微盡精微而後能擇中庸而固執之入德之序也又曰國無道可以卷而懷之然後其默足以容此明哲保身之道非遵養之有素其何能爾不然雖欲卷而懷之其可得乎又曰道止於中而已矣出乎中則過未至則不及故惟中為至夫中也者道之至極故中又謂之極屋極亦謂之極蓋中而髙故也極髙明而不道乎中庸則賢智者過之也道中庸而不極乎髙明則愚不肖者之不及也世儒以髙明中庸析為二致非知中庸也以謂聖人以髙明處已中庸待人則聖人處已常過之待人常不及道終不明不行與愚不肖者無異矣右第二十七章言人道也子曰愚而好自用賤而好自專生乎今之世反古之道如此者災及其身者也好去聲災古災字以上孔子之言子思引之反復也非天子不議禮不制度不考文此以下子思之言禮親疏貴賤相接之體也度品制文書名今天下車同軌書同文行同倫行去聲今子思自謂當時也軌轍迹之度倫次序之體三者皆同言天下一統也雖有其位苟無其德不敢作禮樂焉雖有其德苟無其位亦不敢作禮樂焉鄭氏曰言作禮樂者必聖人在天子之位子曰吾説夏禮杞不足徴也吾學殷禮有宋存焉吾學周禮今用之吾從周此又引孔子之言杞夏之後徴證也宋殷之後三代之禮孔子皆嘗學之而能言其意但夏禮既不可考證殷禮雖存又非當世之法惟周禮乃時王之制今日所用孔子既不得位則從周而已或問子思之時周室衰微禮樂失官制度不行於天下久矣其曰同軌同文何邪曰當是之時周室雖衰而人猶以為天下之共主諸侯雖有不臣之心然方彼此爭雄不能相尚下及六國之未亡猶未有能更姓改物而定天下於一者也則周之文軌孰得而變之哉曰周之車軌書文何以能若是其必同也曰古之有天下者必改正朔易服色殊徽號以新天下之耳目而一其心志若三代之異尚其見於書傳者詳矣軌者車之轍迹也周人尚輿而制作之法領於冬官其輿之廣六尺六寸故其轍迹之在地者相距之間廣狹如一無有逺邇莫不齊同凡為車者必合乎此然後可以行乎方內而無不通不合乎此則不惟有司得以討之而其行於道路自將偏倚卼臲而跬步不前亦不待禁而自不為矣古語所謂閉門造車出門合轍蓋言其法之同而春秋傳所謂同軌畢至者則以言其四海之內政令所及者無不來也文者書之點畫形象也周禮司徒教民道藝而書居其一又有外史掌達書名於四方而大行人之法則又每九嵗而一喻焉其制度之詳如此是以雖其末流海內分裂而猶不得變也必至於秦滅六國而其號令法制有以同於天下然後車以六尺為度書以小篆𨽻書為法而周制始改爾孰謂子思之時而遽然哉楊氏曰愚無德也而好自用賤無位也而好自專居今之世無德無位而反古以有為皆取災之道明哲不為也故繼之曰非天子不議禮不制度不考文蓋禮樂制度書文必自天子出所以定民志一天下之習也變禮易樂則有誅焉况敢妄作乎有其位可以作也然不知禮樂之情則雖作而不足為法於天下矣故有其位無其德亦不敢作也况無其位乎右第二十八章承上章為下不倍而言亦人道也王天下有三重焉其寡過矣乎王去聲吕氏曰三重謂議禮制度考文惟天子得以行之則國不異政家不殊俗而人得寡過矣上焉者雖善無徴無徴不信不信民弗從下焉者雖善不尊不尊不信不信民弗從上焉者謂時王以前如夏商之禮雖善而皆不可考下焉者謂聖人在下如孔子雖善於禮而不在尊位也故君子之道本諸身徴諸庶民考諸三王而不繆建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑此君子指王天下者而言其道即議禮制度考文之事也本諸身有其德也徴諸庶民驗其所信從也建立也立於此而參於彼也天地者道也鬼神者造化之迹也百世以俟聖人而不惑所謂聖人復起不易吾言者也質諸鬼神而無疑知天也百世以俟聖人而不惑知人也知天知人知其理也是故君子動而世為天下道行而世為天下法言而世為天下則逺之則有望近之則不厭動兼言行而言道兼法則而言法法度也則凖則也詩曰在彼無惡在此無射庶幾夙夜以永終譽君子未有不如此而蚤有譽於天下者也惡去聲射音妬詩作斁詩周頌振鷺之篇射厭也所謂此者指本諸身以下六事而言或問二十九章之説曰三重諸説不同雖程子亦因鄭注然於文義皆不通唯吕氏一説為得之耳至於上下焉者則吕氏亦失之惜乎其不因上句以推之而為是矛盾也曰然則上焉者以時言下焉者以位言宜不得為一説且又安知下焉者之不為霸者事邪曰以王天下者而言則位不可以復上矣以霸者之事而言别其善又不足稱也亦何疑哉曰此章文義多近似而若可以相易者其有辨乎曰有三王以迹言者也故曰不謬言與其已行者無所差也天地以道言者也故曰不悖言與其自然者無所拂也鬼神無形而難知故曰無疑謂幽有以驗乎明也後聖未至而難料故曰不惑謂逺有以驗乎近也動舉一身兼行與言而言之也道者人所共由兼法與則而言之也法謂法度人之所當守也則謂凖則人之所取正也逺者恱其德之廣被故企而慕之近者習其行之有常故久而安之也問建諸天地而不悖以上下文例之此天地似乎是形氣之天地蓋建諸天地之間而其道不悖於我也先生曰此天地只是道耳謂吾建於此而與道不相悖也問質諸鬼神而無疑只是龜從筮從與鬼神合其吉凶否曰亦是然不專在此只是合鬼神之理吕氏曰君子之道必無所不合而後已有所不合偽也非誠也故於身於民於古於天地於鬼神於後世無不合是所謂誠也非偽也物我古今天人之所同者也右第二十九章承上章居上不驕而言亦人道也仲尼祖述堯舜憲章文武上律天時下襲水土祖述者逺宗其道憲章者近守其法律天時者法其自然之運襲水土者因其一定之理皆兼內外該本末而言也辟如天地之無不持載無不覆幬辟如四時之錯行如日月之代明辟音譬幬徒報反錯猶迭也此言聖人之德萬物並育而不相害道並行而不相悖小德川流大德敦化此天地之所以為大也悖猶背也天覆地載萬物並育於其間而不相害四時日月錯行代明而不相悖所以不害不悖者小德之川流所以並育並行者大德之敦化小德者全體之分大德者萬殊之本川流者如川之流脈絡分明而往不息也敦化者敦厚其化根本盛大而出無窮也此言天地之道以見上文取辟之意也或問小德大德之説曰以天地言之則髙下散殊者小德之川流於穆不已者大德之敦化以聖人言之則物各付物者小德之川流純亦不已者大德之敦化以此推之可見諸説之得失矣曰子之所謂兼內外該本末而言者何也曰是不可以一事言也姑以夫子已行之迹言之則由其書之有得夏時贊周易也由其行之有不時不食也迅雷風烈必變也以至於仕止久速之皆當其可也而其所以律天時之意可見矣由其書之有序禹貢述職方也由其行之有居魯而逢掖也居宋而章甫也以至於用舍行藏之所遇而安也而其襲水土之意可見矣若因是以推之則古先聖王之所以迎日推策頒朔授民而其大至於禪授放伐各以其時者皆律天時之事也其所以體國經野辨物居方而其廣至於昆蟲草木各遂其性者皆襲水土之事也使夫子而得邦家也則亦何慊於是哉大德是敦那化底小德川流出那敦化底出來這便如忠恕忠便是做那恕底恕便是流出那忠來底如中和中便是大德敦化和便是小德川流自古亘今都只是這一箇道理天髙地下萬物散殊而禮制行矣流而不息合而同化而樂興焉聖人做出許多文章制度禮樂都只是這一箇道理做出來輯略程子曰孔子既知桓魋不能害已又却微服過宋舜既見象之將殺已而又象憂亦憂象喜亦喜國祚長短自有命數人君何用汲汲求治禹稷救飢溺者過門不入非不知飢溺而死者自有命又却救之如此其急數者之事何故如此須思量到道並行而不相悖處可也又曰小德川流大德敦化只是言孔子川流是日用處大德是存主處如俗言敦本之意又曰大德敦化於化育處敦本也小德川流日用處也此言仲尼與天地合德張子曰接物是皆小德統會處便是大德更須大體上求尋也吕氏曰此言仲尼譬天地之大也其博厚足以任天下其高明足以冒天下其化循環而無窮達消息之理也其用照監而不已達晝夜之道也尊賢容衆嘉善而矜不能並育而不相害之理也貴貴尊賢賞功罰罪各當其理並行而不相悖之義也禮儀三百威儀三千此小德所以川流洋洋乎發育萬物峻極于天此大德所以敦化也一本云祖述者推本其意憲章者循守其法川流者如百川𣲖别敦化者如天地一氣又曰五行之氣紛錯於太虛之中並行而不相悖也然一物之感無不具有五行之氣特多寡不常耳一人之身亦無不具有五行之德故百理差殊亦並行而不相悖遊氏曰中庸之道至仲尼而集大成故此書之末以仲尼明之道著於堯舜故祖述焉法詳於文武故憲章焉體元而亨利物而正一喜一怒通於四時夫是之謂律天時修其教不易其俗齊其政不易其宜使五方之民各安其常各成其性夫是之謂襲水土上律天時則天道之至教修下襲水土則地理之異宜全矣故博厚配地無不持載髙明配天無不覆幬變通如四時之錯行照臨如日月之代明小以成小大以成大動者植者皆裕如也是謂並育而不相害或進或止或久或速無可無不可是謂並行而不相悖動以利物者智也故曰小德川流靜以裕物者仁也故曰大德敦化言川流則知敦化者仁之體言敦化則知川流者智之用侯氏曰辟如天地之無不持載無不覆幬萬物所以並育而不相害也辟如四時之錯行如日月之代明道所以並行而不相悖也右第三十章言人道也唯天下至聖為能聰明睿知足以有臨也寬裕溫柔足以有容也發強剛毅足以有執也齊莊中正足以有敬也文理密察足以有别也知去聲齊側皆反别彼列反聰明睿知生知之質臨謂居上而臨下也其下四者乃仁義禮知之德文文章也理條理也密詳細也察明辨也漙博淵泉而時出之溥博周遍而廣濶也淵泉靜深而有本也出發見也言五者之德充積於中而以時發見於外也溥博如天淵泉如淵見而民莫不敬言而民莫不信行而民莫不説見音現説音恱言其充積極其盛而發見當其可也是以聲名洋溢乎中國施及蠻貊舟車所至人力所通天之所覆地之所載日月所照霜露所隊凡有血氣者莫不尊親故曰配天施去聲隊音墜舟車所至以下蓋極言之配天言其德之所及廣大如天也問至誠至聖如何分曰至聖至誠只是以表裏言至聖是其德之發見乎外者故人見之但見其溥博如天淵泉如淵見而民莫不敬言而民莫不信至凡有血氣者莫不尊親此其見於外者如此至誠則是那裏面骨子經綸大經立大本知化育此三句便是骨子那箇聰明睿知却是這裏發出去至誠處非聖人不自知至聖則外人只見得到這處或曰至誠至聖亦可以體用言否曰體用也不相似只是説得表裏問仁義禮智之智與聰明睿知想是兩樣禮智是自然之性能辨是非者睿知是説聖人聰明之德無所不能者先生曰便只是這箇物事禮智是通上下而言睿知是擴充得較大爐中底便是那禮智如睿知則是那照天燭地底睿知聰明足有臨也某初曉那臨字不得後思之大槩是有過人處方能服人且如臨十人須是強得那十人方得至於百人千人萬人皆然若臨天下便須強得天下方得所以道是亶聰明作元后又曰聰明文思又曰聰明時憲便是大故底要那聰明問文理密察先生曰此是聖人於至纎至悉無不詳密且如一物初破作兩片又破作四片若未恰好又破作八片只管詳密文是文章如物之文縷理是條理每事詳密審察故曰足以有别聰察便是知強毅便是勇溥博淵泉溥周遍博宏大淵深沈泉便有箇發達不已底意輯略程子曰溥博淵泉而時出之須是先有溥博淵泉方始能時出自無溥博淵泉豈能以時出之楊氏曰書曰惟天生聰明時乂易曰知臨大君之宜吉則聰明睿知人君之德也故足以有臨臨而不容不足以得衆容而不執不足以有制執而不敬或失於自私敬而無别或無以方外非成德也溥博如天則其大無外淵泉如淵則其流不窮淵泉言有本也而時出之則其流不息矣故民莫不敬信而恱服凡有血氣之類莫不尊親則與天同德矣故曰配天右第三十一章承上章而言小德之川流亦天道也唯天下至誠為能經綸天下之大經立天下之大本知天地之化育夫焉有所倚夫音扶焉於虔反經綸皆治絲之事經者理其緒而分之綸者比其類而合之也經常也大經者五品之人倫大本者所性之全體也唯聖人之德極誠無妄故於人倫各盡其當然之實而皆可以為天下後世法所謂經綸之也其於所性之全體無一毫人欲之偽以雜之而天下之道千變萬化皆由此出所謂立之也其於天地之化育則亦其極誠無妄者有默契焉非但聞見之知而已此皆至誠無妄自然之功用夫豈有所倚著於物而後能哉肫肫其仁淵淵其淵浩浩其天肫之純反肫肫懇至貌以經綸而言也淵淵靜深貌以立本而言也浩浩廣大貌以知化而言也其淵其天則非特如之而已苟不固聰明聖知達天德者其孰能知之聖知之知去聲固猶實也鄭氏曰唯聖人能知聖人也經綸是用立本是體問知天地之化是與天地合否答曰然右第三十二章承上章而言大德之敦化亦天道也前章言至聖之德此章言至誠之道然至誠之道非至聖不能知至聖之德非至誠不能為則亦非二物矣此篇言聖人天道之極致至此而無以加矣詩曰衣錦尚絅惡其文之著也故君子之道暗然而日章小人之道的然而日亡君子之道淡而不厭簡而文溫而理知逺之近知風之自知微之顯可與入德矣衣去聲絅口迥反惡去聲暗於感反前章言聖人之德極其盛矣此復自下學立心之始言之而下文又推之以至其極也詩國風衛碩人鄭之丰皆作衣錦褧衣褧絅同襌衣也尚加也古之學者為已故其立心如此尚絅故暗然衣錦故有日章之實淡簡溫絅之襲於外也不厭而文且理焉錦之美在中也小人反是則暴於外而無實以繼之是以的然而日亡也逺之近見於彼者由於此也風之自著乎外者本乎內也微之顯有諸內者形諸外也有為已之心而又知此三者則知所謹而可入德矣故下文引詩言謹獨之事詩云潛雖伏矣亦孔之昭故君子內省不疚無惡於志君子之所不可及者其唯人之所不見乎惡去聲詩小雅正月之篇承上文言莫見乎隱莫顯乎微也疚病也無惡於志猶言無愧於心此君子謹獨之事也詩云相在爾室尚不愧于屋漏故君子不動而敬不言而信相去聲詩大雅抑之篇相視也屋漏室西北隅也承上文又言君子之戒謹恐懼無時不然不待言動而後敬信則其為已之功益加密矣故下文引詩并言其效詩曰奏假無言時靡有爭是故君子不賞而民勸不怒而民威於鈇鉞假格同鈇音夫詩商頌烈祖之篇奏進也承上文而遂及其效言進而感格於神明之際極其誠敬無有言説而人自化之也威畏也鈇莝斫刀也鉞斧也詩曰不顯惟德百辟其刑之是故君子篤恭而天下平詩周頌烈文之篇不顯説見二十六章此借引以為幽深玄逺之意承上文言天子有不顯之德而諸侯法之則其德愈深而效愈逺矣篤厚也篤恭言不顯其敬也篤恭而天下平乃聖人至德淵微自然之應中庸之極功也詩云豫懷明德不大聲以色子曰聲色之於以化民末也詩曰德輶如毛毛猶有倫上天之載無聲無臭至矣輶由酉二音詩大雅皇矣之篇引之以明上文所謂不顯之德者正以其不大聲與色也又引孔子之言以為聲色乃化民之末務今但言不大之而已則猶有聲色者存是未足以形容不顯之妙不若蒸民之詩所言德輶如毛則庶乎可以形容矣而又自以為謂之毛則猶有可比者是亦未盡其妙不若文王之詩所言上天之事無聲無臭然後乃為不顯之至耳蓋聲臭有氣無形在物最為微妙而猶曰無之故惟此可以形容不顯篤恭之妙非此德之外又别有是三等然後為至也或問卒章之説曰承上三章既言聖人之德而極其盛矣子思懼夫學者求之於髙逺玄妙之域輕自大而反失之也故反於其至近者而言之以示入德之方欲學者先知用必於內不求人知然後可以謹獨誠身而馴致乎其極也君子篤恭而天下平而其所以平者無聲臭之可尋此至誠盛德自然之效而中庸之極功也故以是而終篇焉蓋以一篇而論之則天命之性率性之道修道之教與夫天地之所以位萬物之所以育者於此可見其實德以此章論之則所謂淡而不厭簡而文溫而理知逺之近知風之自知微之顯者於此可見其成功皆非空言也然其所以入乎此者則無他焉亦曰反身以謹獨而已矣故首章已發其意此章又申明而極言之其旨深哉其曰不顯亦充尚絅之心以至其極耳與詩之訓義不同蓋亦假借而言若大學敬止之例也諸説如何曰程子至矣吕氏既失其章旨又不得其綱領條貫而於文義尤多未當如此章承上文聖誠之極致而反之以本乎下學之初心遂推言之以至其極而後已也而以為皆言德成反本之事則既失其章旨矣此章凡八引詩自衣錦尚絅以至不顯惟德凡五條始學成德踈密淺深之序也自不大聲色以至無聲無臭凡三條皆所以贊夫不顯之德也今以不顯惟德通前三義而并言之又以後三條者亦通為進德工夫淺深次第則又失其條理矣至以知風之自為知見聞動作皆由心出以知微之顯為知心之精微明達暴著以不動而敬不言而信為人敬信之以貨色親長達諸天下為篤恭而天下平以德為誠之之事而猶冇聲色至於無聲無臭然後誠一於天則又文義之未當者然也然近世説者乃有深取乎其知風之自之説而以為非大程夫子不能言者蓋習於佛氏作用是性之談而不察乎了翁序文之誤耳學之不講其陋至此亦可憐也遊氏所謂無藏於中無交於物泊然純素獨與神明居所謂離人而立於獨者皆非儒者之言不失足於人不失色於人不失口於人則又審於接物之事而非簡之謂也其論三知未免牽合之病其論德輶如毛以下則其失與吕氏同楊氏知風之自與吕氏舊本之説略同而其取證又皆太逺要當參取吕氏改本去其所謂見聞者而益以言語之得失動作之是非皆知其有所從來而不可不謹則庶乎其可耳以德輶如毛為有德而未化則又吕遊之失也侯氏説多疏濶惟以此章為再序入德成德之序者獨為得之也問衣錦尚絅章首假雖是再序初學入德之要然也只是説箇存養致知底工夫但到此説得來尤密思量來衣錦尚絅之意大假好如今學者不長進都緣不知此理須是暗然而日章曰中庸後面愈説得向裏來凡八引詩一步退似一步都用那般不言不動不顯不大底字直説到無聲臭則至矣問知風之自答曰凡事自有箇來處所以與微之顯厮對著問知微之顯先生曰只是收斂向內工夫漸密便見得近之可逺風之自微之顯君子之道固是不暴著於外然曰惡其文之著亦不是無文也自有文在裏淡則可厭簡則不文溫則不理而今却不厭而文且理只緣有錦在裏中庸末章恐是説只有收斂近裏如此則工夫細密而今人只是不收向裏做時心便粗了然而細密中却自有光明發出來中庸一篇始只是一中間却事事有末後却復歸結於一不大聲以色只是説至德自無聲色今人説恭了便不用刑政不用禮樂豈有此理古人未嘗不用禮樂刑政但自有德以感人不專靠他刑政耳問不顯其德案詩中例是言豈不顯也今借引此詩便真作不顯説如何曰是箇幽深玄逺意是不顯中之顯此假自衣錦尚絅暗然日章漸漸收斂到後面一假密似一假直到聖而不可知處曰無聲無臭至矣因問孔子空空顔子屢空與中庸所謂無聲無臭之理答云以某觀論語之意自是孔子叩鄙夫鄙夫空空非是孔子空空顔子簞瓢屢空自對子貢貨殖而言始自文選中説顔子屢空空心受道故疏論語者亦有此説要之亦不至如今日學者直是懸空説入玄妙處去也中庸無聲無臭本是説天道彼其所引詩詩中自説須是儀刑文王然後萬邦作孚詩人意初不在無聲無臭上也中庸引之結中庸之義嘗細推之蓋其意自言謹獨以修德至詩曰不顯惟德百辟其刑之乃篤恭而天下平也後面節節贊歎其德如此故至豫懷明德以至德輶如毛毛猶有倫上天之載無聲無臭至矣蓋言天德之至而微妙之極難為形容如此今為學之始未知所有而遂欲一蹴至此吾見其倒置而終身迷亂矣輯略程子曰學始於不欺暗室又曰不愧屋漏便是持敬氣象又曰不愧屋漏則心安而體舒又曰云云所謂一者無適之謂一且欲涵泳主一之義一則無二三矣言敬無如易敬以直內義以方外須是直內乃是主一之義至於不敢欺不敢慢尚不愧於屋漏皆是敬之事也又曰聖人修已以安百姓篤恭而天下平惟上下一於恭敬則天地自位萬物自育氣無不和四靈何有不至此體信達順之道聰明睿知皆由是出以此事天饗帝又曰道一本也知不二本便是篤恭而天下平又曰君子之遇事無巨細一於敬而已矣簡細故以自崇非敬也飾私智以為竒非敬也要之無敢慢而已語曰居處恭執事敬雖之夷狄不可棄也然則執事敬者固為仁之端也推是心而成之則篤恭而天下平矣又曰毛猶有倫入毫釐絲忽終不盡又曰聖人之言依本分至大至妙事語之若尋常此所以味長釋氏之説才見得些便驚天動地言語走作却是味短只為乍見如中庸言道只消道無聲無臭四字總括了多少釋氏非黃非白非鹹非苦言語又曰中庸之説其本至於無聲無臭其用至於禮儀三百威儀三千復歸於無聲無臭此言聖人心要處與佛家之言相反儘教説無形迹無色其實不過無聲無臭必竟有甚見處大抵語論間不難見如人論金曰黃色此人必是不識金若是識金者更不言設或言時别自有道理張子厚嘗謂佛如大富貧子橫渠此一事甚當張子曰暗然修於隱也的然著於外也遊氏曰君子內省不疚無惡於志君子所不可及者其惟人所不見乎言慎獨也楊氏曰君子之道充諸內而已故暗然而日章小人務外而不孚其實故的然而日亡此衣錦所以尚絅而惡其文之著也淡疑於可厭簡疑於不文溫疑於不理淡簡溫所謂暗然也淡而不厭簡而文溫而理則暗然而章矣此充養尚絅之至也又曰道不可須臾離也以其無適而非道也故於不聞不睹必恐懼戒慎焉相在爾室尚不愧於屋漏其充此之謂乎又曰上天之載無聲無臭至矣蓋道本乎天而其卒也反乎天兹其所以為至者乎又曰孟子言大人正已而物正物正物自正也大人只知正已而已物自然正此乃篤恭而天下平之意侯氏曰不愧屋漏與慎獨不同又曰自衣錦尚絅至無聲無臭至矣子思再序入德成德之序也又曰子思之書中庸也始於寂然不動中則感而遂通天下之故及其至也退藏於密以神明其德復於天命反其本而已其意義無窮非玩味力索莫能得之右第三十三章子思因前章極致之言反求其本復自下學為已謹獨之事推而言之以馴致乎篤恭而天下平之盛又贊其妙至於無聲無臭而後已焉蓋舉一篇之要而約言之其反覆丁寧示人之意至深切矣學者其可不盡心乎中庸集編卷下欽定四庫全書論語朱子集注序説史記世家曰孔子名丘字仲尼其先宋人父叔梁紇母顔氏以魯襄公二十二年庚戌之歲十一月庚子生孔子於魯昌平鄉陬邑為兒嬉戲常陳爼豆設禮容及長為委吏料量平委吏本作季氏史索隱云一本作委吏與孟子合今從之為司職吏畜蕃息職見周禮牛人讀為樴義與杙同蓋繫養犧牲之所此官即孟子所謂乘田適周問禮於老子既反而弟子益進昭公二十五年甲申孔子年三十五而昭公奔齊魯亂於是適齊為髙昭子家臣以通乎景公有聞韶問政二事公欲封以尼溪之田晏嬰不可公惑之有季孟吾老之語孔子遂行反乎魯定公元年壬辰孔子年四十三而季氏強僭其臣陽虎作亂專政故孔子不仕而退修詩書禮樂弟子彌衆九年庚子孔子年五十一公山不狃以費畔季氏召孔子欲往而卒不行有答子路東周語定公以孔子為中都宰一年四方則之遂為司空又為大司寇十年辛丑相定公會齊侯于夾谷齊人歸魯侵地十二年癸卯使仲由為季氏宰墮三都收其甲兵孟氏不肯墮成圍之不克十四年乙已孔子年五十六攝行相事誅少正卯與聞國政三月魯國大治齊人歸女樂以沮之季桓子受之郊又不致膰爼於大夫孔子行魯世家以此以上皆為十二年事適衛主於子路妻兄顔濁鄒家孟子竹顔讎由適陳過匡匡人以為陽虎而拘之有顔淵後及文王既沒之語既解還衛主蘧伯玉家見南子有矢子路及未見好德之語去適宋司馬桓魋欲殺之有天生德語及微服過宋事又去適陳主司城貞子家居三歲而反于衛靈公不能用有三年有成之語晉趙氏家臣佛肸以中牟畔召孔子孔子欲往亦不果有答子路堅白語及荷蕢過門事將西見趙簡子至河而反又主蘧伯玉家靈公問陳不對而行復如陳據論語則絶糧當在此時季桓子卒遺言謂康子必召孔子其臣止之乃召冉求史記以論語歸與之歎為在此時又以孟子所記歎辭為主司城貞子時語疑不然蓋語孟所記本皆此一時語而記有異同耳孔子如蔡及葉有葉公問答子路不對沮溺耦耕荷蓧丈人等事史記云於是楚昭王使人聘孔子孔子將往拜禮而陳蔡大夫發徒圍之故孔子絶糧於陳蔡之間有愠見及告子貢一貫之語案是時陳蔡臣服於楚若楚王來聘孔子陳蔡大夫安敢圍之且據論語絶糧當在去衛如陳之時楚昭王將以書社地封孔子令尹子西不可乃止史記云書社地七百里恐無此理時則有接輿之歌又反乎衛時靈公已卒衛君輒欲得孔子為政有魯衛兄弟及答子貢夷齊子路正名之語而冉求為季氏將與齊戰有功康子乃召孔子而孔子歸魯實哀公之十一年丁已而孔子年六十八矣冇對哀公及康子語然魯終不能用孔子孔子亦不求仕乃敘書傳禮記有杞宋損益從周等語刪詩正樂有語大師及樂正之語序易彖繫象説卦文言有假我數年之語弟子蓋三千焉身通六藝者七十二人弟子顔回最賢早死後唯曽參得傳孔子之道十四年庚申魯西狩獲麟冇莫我知之歎孔子作春秋有知我罪我等語論語請討陳恆事亦在是年明年辛酉子路死於衛十六年壬戌四月己丑孔子卒年七十三葬魯城北泗上弟子皆服心喪三年而去唯子貢廬於冢上凡六年孔子生鯉字伯魚先卒伯魚生伋字子思作中庸子思學於曽子而孟子受業於子思之門人何氏曰魯論語二十篇齊論語别有問王知道凡二十二篇其二十篇中章句頗多於魯論古論出孔氏壁中分堯曰下章子張問以為一篇有兩子張凡二十一篇篇次不與齊魯論同程子曰論語之書成於有子曽子之門人故其書獨二子以子稱程子曰讀論語有讀了全然無事者有讀了後其中得一兩句喜者有讀了後知好之者有讀了後直有不知手之舞之足之蹈之者程子曰今人不會讀書如讀論語未讀時是此等人讀了後又只是此等人便是不曽讀程子曰頤自十七八讀論語當時已曉文義讀之愈久但覺意味深長
