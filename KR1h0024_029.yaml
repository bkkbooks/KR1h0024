body:
  text: 欽定四庫全書孟子集編卷十三宋真德秀撰盡心章句上凡四十六章孟子曰盡其心者知其性也知其性則知天矣心者人之神明所以具衆理而應萬事者也性則心之所具之理而天又理之所從以出者也人有是心莫非全體然不窮理則有所蔽而無以盡乎此心之量故能極其心之全體而無不盡者必其能窮夫理而無不知者也既知其理則其所從出亦不外是矣以大學之序言之知性則物格之謂盡心則知至之謂也存其心養其性所以事天也存謂操而不舍養謂順而不害事則奉承而不違也夭壽不二修身以俟之所以立命也夭壽命之短長也二疑也不二者知天之至修身以俟死則事天以終身也立命謂全其天之所付不以人為害之程子曰心也性也天也一理也自理而言謂之天自稟受而言謂之性自存諸人而言謂之心張子曰由太虛有天之名由氣化有道之名合虛與氣有性之名合性與知覺有心之名愚謂盡心知性而知天所以造其理也存心養性以事天所以履其事也不知其理固不能履其事然徒造其理而不履其事則亦無以有諸已矣知天而不以夭壽二其心智之盡也事天而能修身以俟死仁之至也智有不盡固不知所以為仁然智而不仁則亦將流蕩不法而不足以為智矣問盡其心者知其性也曰此句文勢與得其民者得其心也相似此心本來無有些子不備無有些子不該須是盡識得許多道理無些子窒礙方是盡心此心本來虛靈萬理具備事事物物皆所當知今人多是氣質偏了又為物欲所蔽故昏而不能盡知此聖賢所以貴乎窮理萬理雖具於吾心須使教他知始得伊川云盡心然後知性此不然盡字大知字零星若未能知性便欲盡心何處下手或以私意脫落無有渣滓為盡心者先生曰若如所論即不知却如何説存心兩字兼既未知性即是於理有所未明如何便到得這田地邪此處一差便入釋氏見解矣況知者有漸之辭盡者無餘之義其意象規模自應有先後也性者吾心之實理若不知得却盡箇甚底問知其性則知天矣曰性以賦於我之分而言天以公共道理而言天便是箇大底人人便是箇小底天吾之仁義禮智即天之元亨利貞凡吾之所有者皆自彼而來也故知吾性則自然知天矣問存心養性以事天曰存之養之便是事心性便是天心性皆天之所以豫我者不能存養而梏亡之則非所以事天也夫心主乎性者敬以存之則性得其養而無所害矣又問云云曰天教爾父子有親便用真箇有親天教爾君臣有義便須真箇有義不然便是違天嘉定史官陳武作楊文靖公傳論曰龜山發明孟子盡心知性之説曰此心明白洞達廣大靜一惟能體會至於了然斯可以言盡盡其心自然知性大抵學者必先知仁知仁則知心知心則知性橫渠西銘蓋欲學者之知仁也先生沒後二三十年諸儒之明道蓋冇為世之所尊者矣其間講之不精者顧以能知性則能盡心彼其不達洪範之言思大學之言知中庸之論明而舛逆心性之説故從之者俱無自得之學著作佐郎李道傳辨之曰史官所斥能知性則能盡心為講之不精者朱先生集注説也孟子曰盡其心者知其性也知性則知天矣舊説謂盡心則知性知性則知天前輩皆從之而先生異焉蓋先生説經獨得聖賢本心故舊説雖善而考之文義有所未協則弗從以為非聖賢當日立言之本意故也孟子此章信如舊説當云盡其心則知其性矣知其性則知天矣而後文義相協今乃不然故先生别案本文更定今説文義既協理致自明史官顧以為講之不精何也且心性天三言者何謂也程子曰自理言之謂之天自稟受言之謂之性自存諸人者言之謂之心三者蓋所從言之異耳要之性即理也理則一而已矣故凡能盡此心者必其知此性者也苟不知之若之何其盡之既知之矣則所謂天者豈外此而他求哉世之學者每有心小性大之蔽意謂必先盡其心而後可以馴致其極以知天性殊不知性與心初無間而知與盡則有序性與心無間則謂知性故能盡心者於義為得知與盡有序則謂盡之為先而知之為後者是失其先後之倫也集注云云於心性天三者之説可謂條理别白指趣分明讀者可以曉然無疑矣而史官顧謂其舛逆心性之説何哉洪範言思與此不類若大學之言知中庸之言明大抵皆以知為先集注先謂必能知而後能盡者正與之合史官顧謂其不達於此何哉又案孟子此章心性二字純指道心德性而言至云動心忍性則心固道心性即指氣稟食色之性矣張思叔詬罵僕夫程子曰何不動心忍性孟子曰莫非命也順受其正人物之生吉凶禍福皆天所命然惟莫之致而至者乃為正命故君子修身以俟之所以順受乎此也是故知命者不立乎巖牆之下命謂正命巖牆牆之將覆者知正命則不處危地以取覆壓之禍盡其道而死者正命也盡其道則所值之吉凶皆莫之致而至者矣桎梏死者非正命也桎梏所以拘罪人者言犯罪而死與立巖牆之下者同皆人所取非天所為也此章與上章蓋一時之言所以發其末句未盡之意孟子曰求則得之舍則失之是求有益於得也求在我者也舍上聲在我者謂仁義禮智凡性之所有者求之有道得之有命是求無益於得也求在外者也有道言不可妄求有命則不可必得在外者謂富貴利達凡外物皆是南軒曰富貴利達衆人謂已有求之之道然不知其有命焉固有求而得之者矣是亦有命而非求之能有益也蓋亦有巧求而不得者多矣以此可見其無益於得也然則亦可以已矣趙氏曰言為仁由已富貴在天如不可求從吾所好孟子曰萬物皆備於我矣此言理之本然也大則君臣父子小則事物細微其當然之理無一不具於性分之內也反身而誠樂莫大焉樂音洛誠實也言反諸身而所備之理皆如惡惡臭好好色之實然則其行之不待勉強而無不利矣其為樂孰大於是強恕而行求仁莫近焉強上聲強勉強也恕推已以及人也反身而誠則仁矣其有未誠則是猶有私意之隔而理未純也故當凡事勉強推己及人庶幾心公理得而仁不逺也此章言萬物之理具於吾身體之而實則道在我而樂有餘行之以恕則私不容而仁可得反身而誠蓋知之已至而自然循理所以樂強恕而行是知之未至且恁地把捉勉強做去少間到純熟處便是仁問反身而誠是大賢以上事強恕求仁是學者身分上事否曰然又曰反身而誠只是箇真知真實知得則滔滔行將去見得萬理與我為一自然其樂無涯所以伊川云異日見卓爾有立於前然後不知手之舞足之蹈正此意也萬物不是萬物之迹只是萬物之理橫渠曰萬物皆備於我矣言萬物皆素定於我也行有不慊於心則餒矣故反身而誠樂莫大焉若不是實做工夫到這裏如何見得恁地誠是有此理檢校自家身分是無欠闕事君真箇忠事親真箇孝是仰不愧於天俯不怍於人其樂孰大於此反身而誠孟子之意主於誠字言反身而實有此理也為父而實有慈為子而實有孝豈不快活若反身不誠是無此理但有恐懼而已豈得樂哉未至於反身而誠處且逐事要推己及人庶幾心公理得更好仔細看這般處不可將恕事低看了求仁莫近於怒恕字甚緊孟子曰行之而不著焉習矣而不察焉終身由之而不知其道者衆也著者知之明察者識之精言方行之而不能明其所當然既習矣而猶不識其所以然所以終身由之而不知其道者多也孟子曰人不可以無恥無恥之恥無恥矣趙氏曰人能恥已之無所恥是能改行從善之人終身無復有恥辱之纍矣孟子曰恥之於人大矣恥者吾所固有羞惡之心也存之則進於聖賢失之則入於禽獸故所繫為甚大為機變之巧者無所用恥焉為機械變詐之巧者所為之事皆人所深恥而彼方且自以為得計故無所用其愧恥之心也不恥不若人何若人有但無恥一事不如人則事事不如人矣或曰不恥其不如人則何能有如人之事其義亦通或問人有恥不能之心如何程子曰恥其不能而為之可也恥其不能而掩藏之不可也孟子曰古之賢王好善而忘勢古之賢士何獨不然樂其道而忘人之勢故王公不致敬盡禮則不得亟見之見且猶不得亟而況得而臣之乎好去聲樂音洛亟去吏反言君當屈已以下賢士不枉道而求利二者勢若相反而實則相成蓋亦各盡其道而已孟子謂宋句踐曰子好遊乎吾語子遊句音鈎好語皆去聲宋姓句踐名遊遊説也人知之亦囂囂人不知亦囂囂趙氏曰囂囂自得無欲之貌曰何如斯可以囂囂矣曰尊德樂義則可以囂囂矣樂音洛德謂所得之善尊之則有以自重而不慕乎人爵之榮義謂所守之正樂之則有以自安而不徇乎外物之誘也故士窮不失義達不離道離力智反言不以貧賤而移不以富貴而淫此尊德樂義見於行事之實也窮不失義故士得已焉達不離道故民不失望焉得已言不失已也民不失望言人素望其興道致治而今果如所望也古之人得志澤加於民不得志修身見於世窮則獨善其身達則兼善天下見音現見謂名實之顯著也此又言士得已民不失望之實此章言內重而外輕則無往而不善南軒曰宋句踐之好遊謂遊於世如歷聘之類意句踐之為人徇名而外求者孟子語之以遊使求之於吾身而已云云道言體義言用互相明耳云云其曰修身見於世者言修其身而其德名自不可掩非君子之修身欲以自見於世孟子曰待文王而後興者凡民也若夫豪傑之士雖無文王猶興夫音扶興者感動奮發之意凡民庸常之人也豪傑有過人之才智者也蓋降衷秉彞人所同得唯上智之材無物欲之蔽為能無待於教而自能感發以有為也孟子曰附之以韓魏之家如其自視欿然則過人逺矣欿音坎附益也韓魏晉卿富家也欿然不自滿之意尹氏曰言有過人之識則不以富貴為事孟子曰以佚道使民雖勞不怨以生道殺民雖死不怨殺者程子曰以佚道使民謂本欲佚之也播穀乘屋之類是也以生道殺民謂本欲生之也除害去惡之類是也蓋不得已而為其所當為則雖咈民之欲而民不怨其不然者反是孟子曰霸者之民歡虞如也王者之民皡皡如也皡胡老反歡虞與歡娛同皡皡廣大自得之貌程子曰歡虞有所造為而然豈能久也耕田鑿井帝力何有於我如天之自然乃王者之政楊氏曰所以致人歡虞必有違道干譽之事若王者則如天亦不令人喜亦不令人怒殺之而不怨利之而不庸民日遷善而不知為之者此所謂皡皡如也庸功也豐氏曰因民之所惡而去之非有心於殺之也何怨之有因民之所利而利之非有心於利之也何庸之有輔其性之自然使自得之故民日遷善而不知誰之所為也夫君子所過者化所存者神上下與天地同流豈曰小補之哉夫音扶君子聖人之通稱也所過者化身所經歷之處即人無不化如舜之耕歷山而田者遜畔陶河濵而器不苦窳也所存者神心所存主處便神妙不測如孔子之立斯立道斯行綏斯來動斯和莫知其所以然而然也是其德業之盛乃與天地之化同運並行舉一世而甄陶之非如霸者但小小補塞其罅漏而已此則王道之所以為大而學者所當盡心也孟子曰仁言不如仁聲之入人深也程子曰仁言謂以仁厚之言加於民仁聲謂仁聞謂有仁之實而為衆所稱道者也此尤見仁德之昭著故其感人尤深也善政不如善教之得民也政謂法度禁令所以制其外也教謂道德齊禮所以格其心也善政民畏之善教民愛之善政得民財善教得民心得民財者百姓足而君無不足也得民心者不遺其親不後其君也孟子曰人之所不學而能者其良能也所不慮而知者其良知也良者本然之善也程子曰良知良能皆無所由乃出於天不係於人孩提之童無不知愛其親也及其長也無不知敬其兄也長上聲下同孩提二三歲之間知孩笑可提抱者也愛親敬長所謂良知良能者也親親仁也敬長義也無他達之天下也言親親敬長雖一人之私然達之天下無不同者所以為仁義也南軒曰良云者有本然之義有善之義蓋其本然者無非善也不學而能不慮而知則無一毫人為加乎其間天之所為而性之所有也孩提知愛其親及長知敬其兄此其知豈待於慮乎其能豈待於學乎此所謂良知良能也然下文獨言知者蓋知常在先也愛敬者良心之大端蓋親親為仁敬長為義人道不越是而已能存是心而達之則仁義之道不可勝窮矣雖然人之良能良知如飢而食如渴而飲手執而足履亦何莫非是乎何孟子獨以愛親敬長為言也蓋飢食渴飲手持足履之類固莫非性之自然形乎氣體者也形乎氣體則有天理有人欲循其自然固莫非天理毫釐之差則人欲亂之矣若愛敬之所發乃仁義之淵源故孟子之所以啓告之者専指夫此揭天理之粹以示人也若異端舉物而遺則天理人欲混淆而莫識其源為弊有不可勝言者矣愚案達之天下二先生之説少異當詳之孟子曰舜之居深山之中與木石居與鹿豕遊其所以異於深山之野人者幾希及其聞一善言見一善行若決江河沛然莫之能禦也行去聲居深山謂耕歷山時也蓋聖人之心至虛至明渾然之中萬理畢具一有感觸則其應甚速而無所不通非孟子造道之深不能形容至此也孟子曰無為其所不為無欲其所不欲如此而已矣李氏曰有所不為不欲人皆有是心也至於私意一萌而不能以禮義制之則為所不為欲所不欲者多矣能反是心則所謂擴充其羞惡之心者而義不可勝用矣故曰如此而已矣孟子曰人之有德慧術知者恆存乎疢疾知去聲疢丑刃反德慧者德之慧術知者術之知疢疾猶災患也言人必有疢疾則能動心忍性增益其所不能也獨孤臣孽子其操心也危其慮患也深故達孤臣逺臣孽子庶子皆不得於君親而常有疢疾者也達謂達於事理即所謂德慧術知也南軒曰疢疾謂憂患也蓋人平居無事之時漠然不省者多矣惟夫疢疾加焉則動心忍性有以感發故德慧術知由此而生以孤臣孽子觀之可見孤臣孽字操心危慮患深危故專一而不敢肆深故精審而不敢忽專精之極故於事理能有所通達也然所謂德慧術知蓋有小大所謂達者亦有淺深要之由憂患而有所發則一也然則處安樂之地者誦斯言可不思夫逸豫之溺人而深求所以戒懼乎當憂患之際者誦斯言可不念其為進德修業之要而自勉勵乎孟子曰有事君人者事是君則為容恱者也阿徇以為容逢迎以為恱此鄙夫之事妾婦之道也有安社稷臣者以安社稷為恱者也言大臣之計安社稷如小人之務恱其君眷眷於此而不忘也有天民者達可行於天下而後行之者也民者無位之稱以其全盡天理乃天之民故謂之天民必其道可行於天下然後行之不然則寧沒世不見知而不悔不肯小用其道以徇於人也張子曰必功覆斯民然後出如伊吕之徒有大人者正已而物正者也大人德盛而上下化之所謂見龍在田天下文明者此章言人品不同略冇四等容恱佞臣不足言安社稷則忠矣然猶一國之士也天民則非一國之士矣然猶有意也無意無必唯其所在而物無不化惟聖者能之南軒曰以事是君為容恱者慕爵祿而從君者也以安社稷為恱者則志存乎功業者也與為容恱者固有間矣然未及乎道義也蓋志存乎功業則苟可就其功業而遂其志則亦所屑為矣古之人惟守道明義而已故雖有蓋世之功業在前可為而在我者有一毫之未安則不敢徇也蓋功業一時之事而良心萬世之彞故也所謂天民者必明見夫達而其道可行於天下而後行之蓋其所主在道而非必於行也謂之天民者言能全夫天生此民之理也天之生民也其理無不具而人之虧欠者多矣故程子謂天民為能踐形者也以其在下而未達故謂之民大人者即天民之得時得位者也若伊尹之在莘野則為天民出而佐商則為大人也正已而物正者已正而物自正也秦漢而下其間號為賢臣者極於以安社稷為恱而已語夫天民之事業則鮮矣孟子曰君子有三樂而王天下不與存焉樂音洛王與皆去聲下並同父母俱存兄弟無故一樂也此人所深願而不可必得者今既得之其樂可知仰不愧於天俯不怍於人二樂也程子曰人能克已則仰不愧俯不怍心廣體胖其樂可知有息則餒矣得天下英才而教育之三樂也盡得一世明睿之才而以所樂乎已者教而養之則斯道之傳得之者衆而天下後世將無不被其澤矣聖人之心所願欲者莫大於此今既得之其樂為如何哉君子有三樂而王天下不與存焉林氏曰此三樂者一係於天一係於人其可以自致者惟不愧不怍而已學者可不勉哉孟子曰廣土衆民君子欲之所樂不存焉樂音洛下同地闢民聚澤可逺施故君子欲之然未足以為樂也中天下而立定四海之民君子樂之所性不存焉其道大行無一夫不被其澤故君子樂之然其所得於天者則不在是也君子所性雖大行不加焉雖窮居不損焉分定故也分去聲分者所得於天之全體故不以窮達而有異君子所性仁義禮智根於心其生色也睟然見於面盎於背施於四體四體不言而喻睟音粹見音現盎烏浪反上言所性之分與所欲所樂不同此乃言其藴也仁義禮智性之四德也根本也生發見也睟然清和潤澤之貌盎豐厚盈溢之意施於四體謂見於動作威儀之間也喻曉也四體不言而喻言四體不待吾言而自能曉吾意也蓋氣稟清明無物欲之纍則性之四德根本於心其積之盛則發而著見於外者不待言而無不順也程子曰睟面盎背皆積盛致然四體不言而喻惟有德者能之又曰言四者本於心而生色也孟子非自及此焉能道到此又曰人必有仁義之心然後仁義之氣睟然達於外故曰不得於心勿求於氣可也此章言君子固欲其道之大行然其所得於天者則不以是而有所加損也行道固君子之所樂但其用其舍於我性分本不相關進而大行退而窮居於我性分之內初無加損問君子所性曰此是説生來承受之性仁義禮智根於心便見得四端著在心上相離不得才有些子私意便剗斷了那根便無生意其色睟然都從那根上發出來性字從心見得先有這心便有許多道理在裏四體不言而喻若曰不待安排而自然中節耳南軒曰四者具於性而根於心猶木之著本水之發源由是而生生不息焉仁義禮智根於心而生色於外充盛著見自不可掩故其睟然之和見於面盎於背施於四體四體不言而喻涵養擴充積久而熟天理融會動容周旋無非此理而內外一也不言而喻言其自然由於此而無待防檢耳孟子曰伯夷辟紂居北海之濵聞文王作興曰盍歸乎來吾聞西伯善養老者大公辟紂居東海之濵聞文王作興曰盍歸乎來吾聞西伯善養老者天下有善養老則仁人以為已歸矣辟去聲下同大他蓋反已歸謂已之所歸餘見前篇五畝之宅樹牆下以桑匹婦蠶之則老者足以衣帛矣五母雞二母彘無失其時老者足以無失肉矣百畝之田匹夫耕之八口之家可以無飢矣衣去聲此文王之政也一家養母雞五母彘二也餘見前篇所謂西伯善養老者制其田里教之樹畜𨗳其妻子使養其老五十非帛不暖七十非肉不飽不暖不飽謂之凍餒文王之民無凍餒之老者此之謂也田謂百畝之田里謂五畝之宅樹謂耕桑畜謂雞彘也趙氏曰善養老者教導之使可以養其老耳非家賜而人益之也孟子曰易其田疇薄其稅斂民可使富也易斂皆去聲易治也疇耕治之田也食之以時用之以禮財不可勝用也勝音升教民節儉則財用足也民非水火不生活昏暮叩人之門户求水火無弗與者至足矣聖人治天下使有菽粟如水火菽粟如水火而民焉有不仁者乎焉於虔反水火民之所急冝自愛之而反不愛者多故也尹氏曰言禮義生於富足民無常産則無常心矣孟子曰孔子登東山而小魯登太山而小天下故觀於海者難為水遊於聖人之門者難為言此言聖人之道大也東山蓋魯城東之髙山而太山則又髙矣此言所處益髙則其視下益小所見既大則其小者不足觀也難為水難為言猶仁不可為衆之意觀水有術必觀其瀾日月有明容光必照焉此言道之有本也瀾水之湍急處也明者光之體光者明之用也觀水之瀾則知其源之有本矣觀日月於容光之隙無不照則知其明之有本矣程子曰日月之明有本故容光必照君子之道有本故無不及也流水之為物也不盈科不行君子之志於道也不成章不達言學當以漸乃能至也成章所積者厚而文章外見也達者足於此而通於彼也此章言聖人之道大而有本學之者必以其漸乃能至也孟子曰雞鳴而起孳孳為善者舜之徒也孳孳勤勉之意言雖未至於聖人亦是聖人之徒也雞鳴而起孳孳為利者跖之徒也跖盜跖也欲知舜與跖之分無他利與善之間也程子曰言間者謂相去不逺所爭毫末耳善與利公私而已矣才出於善便以利言也楊氏曰舜跖之相去逺矣而其分乃在利善之間而已是豈可以不謹然講之不熟見之不明未有不以利為義者又學者所當深察也或問雞鳴而起若未接物如何為善程子曰只主於敬便是為善孟子曰楊子取為我拔一毛而利天下不為也為我之為去聲楊子名朱取者僅足之意取為我者僅足於為我而已不及為人也列子稱其言曰伯成子髙不以一毫利物是也墨子兼愛摩頂放踵利天下為之放上聲墨子名翟兼愛無所不愛也摩頂摩突其頂也放至也子莫執中執中為近之執中無權猶執一也子莫魯之賢人也知楊墨之失中也故度於二者之中而執其中近近道也權稱錘也所以稱物之輕重而取中也執中而無權則膠於一定之中而不知變是亦執一而已矣程子曰中字最難識須是默識心通且試言一廳則中央為中一家則廳非中而堂為中一國則堂非中而國之中為中推此類可見矣又曰中不可執也識得則事事物物皆有自然之中不待安排安排著則不中矣所惡執一者為其賊道也舉一而廢百也惡為皆去聲賊害也為我害仁兼愛害義執中者害於時中皆舉一而廢百者也此章言道之所貴者中中之所貴者權楊氏曰禹稷三過其門而不入苟不當其可則與墨子無異顔子在陋巷不改其樂苟不當其可則與楊氏無異子莫執為我兼愛之中而無權鄉鄰有鬭而不知閉户同室有鬭而不知救之是亦猶執一耳故孟子以為賊道禹稷顔回易地則皆然以其有權也不然則是亦楊墨而已矣又曰三聖相授允執厥中與孟子所論子莫執中者文同而意異蓋精一與道心之微則無適而非中者曰允執則非徒然而執之矣子莫之執中則其為我不敢為楊朱之深兼愛不敢為墨翟之過而於二者之間執其一節以為中耳故由三聖以為中則其中活由子莫以為中則其中死中之活者不待權而無不中中之死者則非學乎聖人之學不能有以權之而常適於中也權言權衡之權言其可以稱物之輕重而遊移前却以適於平蓋所以節量仁義之輕重而時措之非如近世所謂將以濟乎仁義之窮也案孟子曰執中無權猶執一也程子亦曰欲知中庸無如權今以經傳言權之義附於此子曰可與共學未可與適道未可與立未可與權朱子曰可與者言其可與共為此事也程子曰可與共學知所以求之也可與適道知所往也可與立者篤志固執而不變也權稱錘也所以稱物而知輕重者也可與權謂能權輕重使合義也楊氏曰知為已則可與學矣學足以明善然後可以適道信篤然後可與立知時措之宜然後可與權洪氏曰易九卦終於巽以行權權聖人之大用未能立而言權猶人未能立而欲行鮮不仆矣程子曰漢儒以反經合道為權故有權變權術之論皆非也權只是經也自漢以下無人識權字愚案先儒誤以此章連下文偏其反而為一章故有反經合道之説程子非之是矣然以孟子嫂溺援之以手之義推之則權與經亦當有辨黃氏曰程子言權只是經或問云權經亦當有辨何也曰是各有所發明也經常也權變也常者一定之理變者隨時之宜遇事之常則但當守一定之理遇事之變則不得不小有移易以就夫㩲權與經不可無辨或問之説然也然天下之理惟其當然而已當經而經當然也當㩲而權亦當然也則權雖異於經而以其當然則亦只是經此程子之説然也有或問之説則經權之義始明有程子之説則經權之義始正先儒明道之力至是而始備矣南軒曰事事物物莫不有中中者天理當然不可過而不可不及者也毫釐之差則失之矣何以取中而不失乎所以貴於能權也權者權其輕重而適乎此之謂君子所以貴於時中也或者不知權之所以為中乃以為反經合道夫經者道之所謂常也權者所以權其變而求合乎經也既反經矣尚何道之合乎愚案公羊傳桓十一年夏五月癸未鄭伯寤生卒九月宋人執鄭祭仲祭仲者何鄭相也何以不名賢也何賢乎祭仲以為知權也其為知權奈何祭仲往省于留塗出于宋宋人執之謂之曰為我出忽而立突祭仲不從其言則君心死國必亡從其言則君可以生易死國可以存易亡少遼緩之則突可故出而忽可故反古人之有權者祭仲是也權者何權者反於經然後有善者也反經之説始此祭仲身為人臣而廢君立君若舉碁然謂之有善可乎公羊此言蓋聖經之稂莠人心之蟊賊學者不可不察然則董仲舒所謂守經事而不知其權遭變事而不知其冝者何如也曰此為不知春秋而言也蓋春秋王道之權衡處常則用經遭變則用權其用權也乃所以求合乎經也漢儒之論經權惟此為最粹大抵為學必先知經知經而後可以語權不知經而遽語權未有不流於變詐者也故張子以學未至而語變為操術之不正信以夫孟子曰飢者甘食渴者甘飲是未得飲食之正也飢渴害之也豈惟口腹有飢渴之害人心亦皆有害口腹為飢渴所害故於飲食不暇擇而失其正味人心為貧賤所害故於富貴不暇擇而失其正理人心亦皆有害趙氏謂人心為利欲所害此説甚長愚謂飢渴害其知味之性則飲食雖不甘亦以為甘利欲害其仁義之性則所為雖不可亦以為可人能無以飢渴之害為心害則不及人不為憂矣人能不以貧賤之故而動其心則過人逺矣南軒曰人心虗明知覺萬理森然其好惡是非本何適而非正惟夫動於私欲則有所忿懥有所恐懼有所好樂有所憂患而其正理始昧矣人能正其心不使外物害之如飢渴之害於口腹則無適而非天理之所存矣孟子曰柳下惠不以三公易其介介有分辨之意柳下惠進不隱賢必以其道遺佚不怨厄窮不憫直道事人至於三黜是其介也此章言柳下惠和而不流與孔子論夷齊不念舊惡意正相類皆聖賢微顯闡幽之論也孟子曰有為者辟若掘井掘井九軔而不及泉猶為棄井也辟讀作譬軔音刃與仞同八尺曰仞言鑿井雖深然未及泉而止猶為自棄其井也吕侍講曰仁不如堯孝不如舜學不如孔子終未入於聖人之域終未至於天道未免為半塗而廢自棄前功也南軒曰天下之事為之貴乎有成云云今夫士之為仁義固當循循不已以極其至若用力雖勞未有所臻而畫焉則亦不得為成人而已孟子曰堯舜性之也湯武身之也五霸假之也堯舜天性渾全不假修習湯武修身體道以復其性五霸則假借仁義之名以求濟其貪欲之私耳久假而不歸惡知其非有也惡平聲歸還也有實有也言竊其名以終身而不自知其非真有或曰蓋歎世人莫覺其偽者亦通舊説久假不歸即為真有則誤矣尹氏曰性之者與道一也身之者履之也及其成功則一也五霸則假之而已是以功烈如彼其卑也公孫丑曰伊尹曰豫不狎于不順放太甲于桐民大恱太甲賢又反之民大恱豫不狎于不順太甲篇文狎習見也不順言太甲所為不順義理也餘見前篇賢者之為人臣也其君不賢則固可放與與平聲孟子曰有伊尹之志則可無伊尹之志則篡也伊尹之志公天下以為心而無一毫之私者也公孫丑曰詩曰不素餐兮君子之不耕而食何也孟子曰君子居是國也其君用之則安富尊榮其子弟從之則孝弟忠信不素餐兮孰大於是餐七丹反詩魏國風伐檀之篇素空也無功而食祿謂之素餐此與告陳相彭更之意同王子墊問曰士何事墊丁念反墊齊王之子也上則公卿大夫下則農工商賈皆有所事而士居其間獨無所事故王子問之也孟子曰尚志尚髙尚也忘者心之所之也士既未得行公卿大夫之道又不當為農工商賈之業則髙尚其志而已曰何為尚志曰仁義而已矣殺一無罪非仁也非其有而取之非義也居惡在仁是也路惡在義是也居仁由義大人之事備矣惡平聲非仁非義之事雖小不為而所居所由無不在於仁義此士所以尚其志也大人謂公卿大夫言士雖未得大人之位而其志如此則大人之事體用已全若小人之事則固非所當為也又曰志字與父在觀其志之志同蓋未見於所行而方見於所存也南軒曰尚志者以立志為先也主乎仁義所謂志也不主乎仁義則倀倀然何所據乎謂之志不立可也殺一無罪非其有而取之舉二事欲其推類而知仁義之所存也夫殺一無罪而非仁由是而體之則仁之所以能愛者可得而推矣非其有而取之為非義由是而體之則義之所以為宜者亦可得而推矣居仁由義居則不違由則不他也居仁則體立由義則用行大人之事不越此而已矣學者可不以尚志為先乎黃氏曰論語一書未嘗以仁義對言而孟子言仁義者不一而足蓋夫子教人無非仁義之道使人油然入於仁義而不自知也孟子憫斯世之迷惑故開關啓鑰直指人心而明告之也五常百行皆性所有而獨言仁義者何也仁義蓋其總名而五常百行其支派也王子墊者必當時國君之子天子諸侯之子其未命者皆曰士觀其所問與孟子所告則其人必有志者也殺一無罪則非仁非其有而取之則非義方是時天下之戰國七爭地以戰殺人盈野爭城以戰殺人盈城其戮及無罪者衆矣此不仁之甚也侵人土疆奪人寶貨非其有取之者衆矣此不義之甚也然當時之君忍於為此未必知其為不仁不義也故孟子斥而言之使以不仁為戒而所居常在乎仁以不義為戒而所由常在乎義如此則大人之事備矣衍義孟子曰仲子不義與之齊國而弗受人皆信之是舍簞食豆羮之義也人莫大焉亡親戚君臣上下以其小者信其大者奚可哉舍音捨食音嗣仲子陳仲子也言仲子設若非義而與之齊國必不肯受齊人皆信其賢然此但小廉耳其辟兄離母不食君祿無人道之大倫罪莫大焉豈可以小廉信其大節而遂以為賢哉南軒曰簞食豆羮得之則生弗得則死呼爾而與之則不受謂斯人也一旦而遇萬鍾之祿苟惟不義則必不受也可乎蓋人之難知也以其小者信其大者固不可也於陵仲子以兄之祿為不義辟兄離母處於於陵齊人髙之以謂若斯人者不義而與之齊國亦將必不受也孟子以為是舍簞食豆羮之義也蓋孟子以人倫之際察之而知其不可信也人之所以為人者莫大於人倫所謂親戚君臣上下是也今仲子廢親戚君臣上下而欲以潔其身飾小廉而妨大德其不知義固已甚矣又烏能不受不義之齊國乎古之善觀人者必於人倫之際察之而其人之得失淺深可槩見矣四嶽之舉舜則曰克諧以孝而已堯之降舜以二女觀其嬪于虞而已此舜之所以聖也兾缺與其妻相待如賓而臼季知其能治民茅容殺牲先奉其母而郭林宗知其可以成德是亦善觀人者也若仲子廢天倫而徇私意以其小亷信其大節烏乎可哉桃應問曰舜為天子臯陶為士瞽瞍殺人則如之何桃應孟子弟子也其意以為舜雖愛父而不可以私害公皋陶雖執法而不可以刑天子之父故設此問以觀聖賢用心之所極非以為真有此事也孟子曰執之而已矣言臯陶之心知有法而已不知有天子之父也然則舜不禁與與平聲桃應問也曰夫舜惡得而禁之夫有所受之也夫音扶惡平聲言臯陶之法有所傳受非所敢私雖天子之命亦不得而廢之也然則舜如之何桃應問也曰舜視棄天下猶棄敝屣也竊負而逃遵海濱而處終身欣然樂而忘天下屣音徙欣與欣同樂音洛屣草履也遵循也言舜之心知有父而已不知有天下也孟子嘗言舜視天下猶草芥而惟順於父母可以解憂與此意互相發此章言為士者但知有法而不知天子父之為尊為子者但知有父而不知天下之為大蓋其所以為心者莫非天理之極人倫之至學者察此而有得焉則不待較計論量而天下無難處之事矣南軒曰善發明舜之心者其惟孟子乎若以後世利害之見論之則謂天下方歸戴於舜而賴其治舜乃舍而去之得無廢已成之業而孤天下之望乎此不知天理之言也聖人所以為治者循天理而已若汨於利害而失天理之所存則雖舜何以治天下哉或者以舜竊負為狂是未之思也又以為臯陶既執瞽瞍舜烏得而竊之是又未之思也臯陶執瞽瞍於前使舜得以申竊負之義於後乃是天理時中能全夫君臣父子之義者也微孟子孰能推之案程子以應接事物而處其當否為格物致知之一事然處事之方不過本之以義理而參之以時與勢而已湯之以義制事易之義以方外中庸之時中是也各已散見諸篇獨此一章其事乃天下之至難而聖賢處之曲盡其道此即處事之大法也又朱子嘗謂正其誼不謀其利明其道不計其功乃處事之要學者誠能每事以義為的而權其輕重可否之宜不雜以世俗利害之私則庶乎應酬事物有餘裕矣孟子自范之齊望見齊王之子喟然歎曰居移氣養移體大哉居乎夫非盡人之子與夫音扶與平聲范齊邑居謂所處之位養奉養也言人之居處所係甚大王子亦人子耳特以所居不同故所養不同而其氣體有異也孟子曰張鄒皆云羡文也王子宫室車馬衣服多與人同而王子若彼者其居使之然也況居天下之廣居者乎廣居見前篇尹氏曰睟然見於面盎於背居天下之廣居者然也魯君之宋呼於垤澤之門守者曰此非吾君也何其聲之似吾君也此無他居相似也呼去聲垤澤宋城門名也孟子又引此事為證孟子曰食而弗愛豕交之也愛而不敬獸畜之也食音嗣畜許六反交接也畜養也獸謂犬馬之屬恭敬者幣之未將者也將猶奉也詩曰承筐是將程子曰恭敬雖因威儀幣帛而後發見然幣之未將時已有此恭敬之心非因幣帛而後有也恭敬而無實君子不可虛拘此言當時諸侯之待賢者特以幣帛為恭敬而無其實也拘留也南軒曰此章言交際之道若徒食之而愛心不加焉徒愛之而敬心不加焉則與豕交獸畜無以異蓋人道之相與以敬為主夫必有是恭敬而後幣帛以將之蓋恭敬者先存於幣帛未行之前者也若無是恭敬則幣帛何所施乎雖然幣帛者所以將其恭敬者也恭敬存於中而儀物實於外此君子之道所以為內外之宜文質之中也若恭敬之心雖存而無以實之于外君子亦惡夫虛拘也昔夫子解驂以賻舊館人之喪曰吾惡夫涕之無從蓋是意也夫古人於交際之道豈偶然哉故有燕饗之禮焉有贄獻之禮焉有問遺之禮焉此皆其恭敬之所生焉恭敬為之主而其節文品式森然備具而又有貴賤貧富之不同小大多寡之或異是皆天之所為也若昧乎此不陷於豕交獸畜則或失之虛拘皆非君子之道也二先生釋恭敬無實之語不同正當參考孟子曰形色天性也惟聖人然後可以踐形人之有形有色無不各有自然之理所謂天性也踐如踐言之踐蓋衆人有是形而不能盡其理故無以踐其形惟聖人有是形而又能盡其理然後可以踐其形而無歉也程子曰此言聖人盡得人道而能充其形也蓋人得天地之正氣而生與萬物不同既為人須盡得人理然後稱其名衆人有之而不知賢人踐之而未盡能充其形惟聖人也楊氏曰天生蒸民有物有則物者形色也則者性也各盡其則則可以踐形矣南軒曰有是形者皆可以踐形其曰可以者猶言事親若曽子者可也言至於聖人而始得為能踐其形也然則冇是形者皆可以為聖人其不為聖人者以其不能踐之故耳齊宣王欲短喪公孫丑曰為期之喪猶愈於巳乎已猶止也孟子曰是猶或紾其兄之臂子謂之姑徐徐云爾亦教之孝弟而已矣紾之忍反紾戾也教之以孝弟之道則彼當自知兄之不可戾而喪之不可短矣孔子曰子生三年然後免於父母之懷豫也有三年之愛於其父母乎所謂教之以孝弟者如此蓋示之以至情之不能已者非強之也王子有其母死者其傅為之請數月之喪公孫丑曰若此者何如也為去聲陳氏曰王子所生之母死厭於嫡母而不敢終喪其傅為請於王欲使得行數月之喪也時又適有此事丑問如此者是非何如案儀禮公子為其母練冠麻衣縓緣既葬除之疑當時此禮已廢或既葬而未忍即除故請之也曰是欲終之而不可得也雖加一日愈於已謂夫莫之禁而弗為者也夫音扶言王子欲終喪而不可得其傅為請雖止得加一日猶勝不加我前所譏乃謂夫莫之禁而自不為者耳此章言三年通喪天經地義不容私意有所短長示之至情則不肖者有以企而及之矣孟子曰君子之所以教者五下文五者蓋因人品髙下或相去逺近先後之不同有如時雨化之者時雨及時之雨也草木之生播種封殖人力已至而未能自化所少者雨露之滋耳及此時而雨之則其化速矣教人之妙亦由是也若孔子之於顔曽是已有成德者有達財者財與材同此各因其所長而教之者也成德如孔子之於冉閔達財如孔子之於由賜有答問者就所問而答之若孔孟之於樊遲萬章也有私淑艾者艾音乂私竊也淑善也艾治也人或不能及門受業但聞君子之道於人而竊以善治其身是亦君子教誨之所及若孔孟之於陳亢夷之是也孟子亦曰豫未得為孔子徒也豫私淑諸人也此五者君子之所以教也聖賢施教各因其材小以成小大以成大無棄人也南軒曰記曰當其可之謂時所謂冇如時雨化之者也言如時雨之造化萬物也今夫物之萌者欲發甲者欲坼於是時也而雨及之則皆得以遂矣蓋不先不後當其可而適與之會無待於彼之求也君子之教其察之精矣於其告之得之者如物之被時雨焉其於欲達未達之間所賴者深矣龜山楊氏以為如告曽子以吾道一以貫之是也蓋曽子未嘗問而夫子呼以告之當其可也成德者因其有德而成之如顔閔仲弓之徒其德之所存雖存乎其人而成之者聖人也達財者因其材而達之如賜之達由之果求之藝雖其天資所稟而達之使盡其材則教之功也夫成德達材答問固在其中而又有所謂答問者此則専為凡答其問者也雖鄙夫之空空所以答之者亦無非竭兩端之教也又有所謂私淑艾者焉蓋不在於言辭之間躬行於身而觀者化焉凡動容周旋之間無非教也君子之善治其身非為教人也身修而教在其中成已成物之道也其所以教不越是五者然私淑艾者又其本也公孫丑曰道則髙矣美矣冝若登天然似不可及也何不使彼為可幾及而日孳孳也幾音機孟子曰大匠不為拙工改廢繩墨羿不為拙射變其彀率為去聲彀古候反率音律彀率彎弓之限也言教人者皆有不可易之法不容自貶以徇學者之不能也君子引而不發躍如也中道而立能者從之引引弓也發發矢也躍如如踊躍而出也因上文彀率而言君子教人但授以學之之法而不告以得之之妙如射者之引弓而不發矢然其所不告者已如踊躍而見於前矣中者無過不及之謂中道而立言其非難非易能者從之言學者當自勉也此章言道有定體教有成法卑不可抗髙不可貶語不能顯默不能藏引而不發謂漸啓其端而不竟其説躍如謂義理昭著如冇物躍然於心目之間南軒曰公孫丑之意以為孟子之道髙大學者有難進之患欲少抑而就之庶其可以幾及而為之孳孳也夫聖人之道天下之正理不可過也不可不及也自卑者視之以為甚髙而不知其髙之為中也自隘者視之以為甚大而不知其大之為常也徇彼而遷就則非所以為道矣故孟子以大匠之繩墨羿之彀率為譬夫繩墨而可改則非所以為繩墨矣彀率而可變則非所以為彀率矣君子之教人引而不發引之使向方而發則係於彼也躍如者言其自得之如有所興起於中也蓋理義素存乎其心向也陷溺而今焉興起耳道以中為至中道而立其能者固從之其不能者亦莫如之何也已亦猶大匠設繩墨羿為彀率以示人其能與不能則存乎其人耳中道而立能者從之此正大之體而天地之情也雖然學者於聖人之言當以身體之以心驗之循其所謂繩墨彀率者而勿舍焉及其久也將自有得不然而先起求躍之意則是蘄獲助長為害祗甚矣孟子曰天下有道以道殉身天下無道以身殉道殉如殉葬之殉以死隨物之名也身出則道在必行道屈則身在必退以死相從而不離也未聞以道殉乎人者也以道從人妾婦之道公都子曰滕更之在門也若在所禮而不答何也更平聲趙氏曰滕更滕君之弟來學者也孟子曰挾貴而問挾賢而問挾長而問挾有勳勞而問挾故而問皆所不答也滕更有二焉長上聲趙氏曰二謂挾貴挾賢也尹氏曰有所挾則受道之心不専所以不答也此言君子雖誨人不倦又惡夫意之不誠者南軒曰受道者以虛心為本虛則受挾則私意先橫於胸中而可告語乎故空空之鄙夫聖人未嘗不竭兩端之教而滕更之在門若在所禮而不答也使滕更思其所以不答之故於其所挾致力以消弭之其庶幾乎然則孟子之不答是亦誨之而已矣孟子曰於不可已而已者無所不已於所厚者薄無所不薄也已止也不可止謂所不得不為者也所厚所當厚者也此言不及者之弊其進鋭者其退速進鋭者用心太過其氣易衰故退速三者之弊理勢必然雖過不及之不同然卒同歸于廢弛孟子曰君子之於物也愛之而弗仁於民也仁之而弗親親親而仁民仁民而愛物物謂禽獸草木愛謂取之有時用之有節程子曰仁推已及人如老吾老以及人之老於民則可於物則不可統而言之則皆仁分而言之則有序楊氏曰其分不同故所施不能無差等所謂理一而分殊者也尹氏曰何以有是差等一本故也無偽也南軒曰理一而分殊者聖人之道也蓋究其所本則固原於一而循其所推則不得不殊明乎此則知仁義之未嘗不相須矣天下之理一而分則殊凡生於天壤之間者莫非天地之子而吾之同氣者也是之謂理一然親者吾之同體民者吾之同類而物則異類矣是之謂分殊以其理一故仁愛之仁無不遍以其分殊故仁愛之施則有差若以親親之道施于民則親疏無以異矣是乃薄其親以仁民之道施于物則貴賤無以異矣是乃薄其民故于親則親之于民則仁之而于物則愛之合而言之則皆仁分而言之則有序此二帝三王之道所以異於楊墨也衍義孟子曰知者無不知也當務之為急仁者無不愛也急親賢之為務堯舜之知而不遍物急先務也堯舜之仁不遍愛人急親賢也知者之知並去聲知者固無不知然常以所當務者為急則事無不治而其為知也大矣仁者固無不愛然常急於親賢則恩無不洽而其為仁也博矣不能三年之喪而緦小功之察放飯流啜而問無齒決是之謂不知務飯扶晚反啜昌恱反三年之喪服之重者也緦麻三月小功五月服之輕者也察致詳也放飯大飯流啜長啜不敬之大者也齒決齧斷乾肉不敬之小者也問講求之意此章言君子之於道識其全體則心不狹知所先後則事有序豐氏曰智不急於先務雖遍知人之所知遍能人之所能徒弊精神而無益於天下之治矣仁不急於親賢雖有仁民愛物之心小人在位無由下達聰明日蔽於上而惡政日加於下此孟子所謂不知務也先生因是推言學者亦有當務如孟子論今樂古樂則與民同樂乃樂之本學者所當知也若欲明其聲音節奏特樂之一事耳學者須要窮其原本放得大水下來則如海潮之至大船小船莫不浮動如講學既能其大者則小小文義自是該通若只於淺處用功則必不免沈滯之患矣南軒曰自身以至天下皆有當務蓋天下之事未有無先後者傳曰知所先後則近道矣此所以貴乎格物也雖然孟子之所喻特言舍大而徇小者為不知務耳非謂能三年之喪則緦小功有不足察無放飯流啜則齒決有不必問也先後具舉本末畢貫此為學者又不可以不知也孟子集編卷十三
