body:
  text: 欽定四庫全書孟子集編卷二宋真德秀撰梁惠王章句下凡十六章莊暴見孟子曰暴見於王王語暴以好樂暴未有以對也曰好樂何如孟子曰王之好樂甚則齊國其庶幾乎見於之見音現下見於同語去聲下同好去聲篇內並同莊暴齊臣也庶幾近辭也言近於治他日見於王曰王嘗語莊子以好樂有諸王變乎色曰寡人非能好先王之樂也直好世俗之樂耳變包者慚其好之不正也曰王之好樂甚則齊其庶幾乎今之樂猶古之樂也今樂世俗之樂古樂先王之樂曰可得聞與曰獨樂樂與人樂樂孰樂曰不若與人曰與少樂樂與衆樂樂孰樂曰不若與衆聞與之與平聲樂樂下字音洛孰樂亦音洛獨樂不若與人與少不若與衆亦人之常情也臣請為王言樂為去聲此以下皆孟子之言也今王鼓樂於此百姓聞王鐘鼓之聲管籥之音舉疾首蹙額而相告曰吾王之好鼓樂夫何使我至於此極也父子不相見兄弟妻子離散今王田獵於此百姓聞王車馬之音見羽旄之美舉疾首蹙額而相告曰吾王之好田獵夫何使我至於此極也父子不相見兄弟妻子離散此無他不與民同樂也蹙子六反頞音遏夫音扶同樂之樂音洛鐘鼓管籥皆樂器也舉皆也疾首頭痛也蹙聚也頞額也人憂戚則蹙其額極窮也羽旄旌屬不與民同樂謂獨樂其身而不恤其民使之窮困也今王鼓樂於此百姓聞王鐘鼓之聲管籥之音舉欣欣然有喜色而相告曰吾王庶幾無疾病與何以能鼓樂也今王田獵於此百姓聞王車馬之音見羽旄之美舉欣欣然有喜色而相告曰吾王庶幾無疾病與何以能田獵也此無他與民同樂也病與之與平聲同樂之樂音洛與民同樂者推好樂之心以行仁政使民各得其所也今王與百姓同樂則王矣好樂而能與百姓同之則天下之民歸之矣所謂齊其庶幾者如此范氏曰戰國之時民窮財盡人君獨以南面之樂自奉其身孟子切於救民故因齊王之好樂開𨗳其善心深勸其與民同樂而謂今樂猶古樂其實今樂古樂何可同也但與民同樂之意則無古今之異耳若必欲以禮樂治天下當如孔子之言必用韶舞必放鄭聲蓋孔子之宫為邦之正道孟子之言救時之急務所以不同楊氏曰樂以和為主使人聞鐘鼓管弦之音而疾首蹙頞則雖奏以咸英韶濩無補於治也故孟子告齊王以此始正其本而已齊宣王問曰文王之囿方七十里有諸孟子對曰於傳有之囿音又傳直戀反囿者蕃育鳥獸之所古者四時之田皆于農隙以講武事然不欲馳騖于稼穡場圃之中故度間曠之地以為囿然文王七十里之囿其亦三分天下有其二之後也與傳謂古書曰若是其大乎曰民猶以為小也曰寡人之囿方四十里民猶以為大何也曰文王之囿方七十里芻蕘者往焉雉兔者往焉與民同之民以為小不亦冝乎芻音初蕘音饒芻草也蕘薪也臣始至於境問國之大禁然後敢入臣聞郊關之內有囿方四十里殺其麋鹿者如殺人之罪則是方四十里為阱於國中民以為大不亦冝乎阱才性反禮入國而問禁國外百里為郊郊外有關阱坎地以陷獸者言陷民于死也齊宣王問曰交鄰國有道乎孟子對曰有惟仁者為能以大事小是故湯事葛文王事昆夷惟智者為能以小事大是故大王事獯鬻句踐事吳獯音熏鬻音育句音鈎仁人之心寬洪惻怛而無計較大小強弱之私故小國雖或不恭而吾所以字之之心自不能已智者明義理識時勢故大國雖見侵陵而吾所以事之之禮尤不敢廢湯事見後篇文王事見詩大雅大王事見後章所謂狄人即獯鬻也句踐越王名事見國語史記以大事小者樂天者也以小事大者畏天者也樂天者保天下畏天者保其國樂音洛天者理而已矣大之字小小之事大皆理之當然也自然合理故曰樂天不敢違理故曰畏天包含遍覆無不周遍保天下之氣象也制節謹度不敢縱逸保一國之規模也詩云畏天之威于時保之詩周頌我將之篇時是也王曰大哉言矣寡人有疾寡人好勇言以好勇故不能事大而恤小也對曰王請無好小勇夫撫劔疾視曰彼惡敢當我哉此匹夫之勇敵一人者也王請大之夫撫之夫音扶惡平聲疾視怒目而祖也小勇血氣所為大勇義理所發詩云王赫斯怒爰整其旅以遏徂莒以篤周祜以對于天下此文王之勇也文王一怒而安天下之民詩大雅皇矣篇赫赫然怒貌爰于也旅衆也遏詩作按止也徂往也莒詩作旅徂旅謂密人侵阮徂共之衆也篤厚也祜福也對答也以答天下仰望之心也此文王之大勇也書曰天降下民作之君作之師惟曰其助上帝寵之四方有罪無罪惟我在天下曷敢有越厥志一人衡行於天下武王恥之此武王之勇也而武王亦一怒而安天下之民衡與橫同書周書泰誓之萹也然所引與今書文小異今且依此解之寵之四方寵異之于四方也有罪者我得而誅之無罪者我得而安之我既在此則天下何敢有過越其心志而作亂者乎衡行謂作亂也孟子釋書意如此而言武王亦大勇也今王亦一怒而安天下之民民惟恐王之不好勇也王若能如文武之為則天下之民望其一怒以除暴亂而拯已于水火之中惟恐王之不好勇耳此章言人君能懲小忿則能恤小事大以交鄰國能養大勇則能除暴救民以安天下張敬夫曰小勇者血氣之怒也大勇者義理之怒也血氣之怒不可有理義之怒不可無知此則可以見性情之正而識天理人欲之分矣南軒曰勇有大小血氣之勇勇之小者也理義之勇勇之大者也以血氣為勇則其勇不出于血氣之內勢力可勝也利害可詘也理義之勇不以血氣勢力無所加利害無所詘也故曰王請無好小勇欲其擴于義理也夫聖人非無怒也其動不以血氣而以理可怒在彼而理在此聖人何加毫末乎以文武之事觀之則可見矣齊宣王見孟子於雪宮王曰賢者亦有此樂乎孟子對曰有人不得則非其上矣樂音洛下同雪宮離宮名言人君能與民同樂則人皆有此樂不然則下之不得此樂者必有非其君上之心明人君當與民同樂不可使人有不得者非但當與賢者共之而已也不得而非其上者非也為民上而不與民同樂者亦非也下不安分上不恤民皆非理也樂民之樂者民亦樂其樂憂民之憂者民亦憂其憂樂以天下憂以天下然而不王者未之有也樂民之樂而民樂其樂則樂以天下矣憂民之憂而民憂其憂則憂以天下矣昔者齊景公問於晏子曰吾欲觀於轉附朝儛遵海而南放于琅邪吾何修而可以比於先王觀也朝音潮放上聲晏子齊臣名嬰轉附朝儛皆山名也遵循也放至也琅邪齊東南境上邑名觀逰也晏子對曰善哉問也天子適諸侯曰巡狩巡狩者巡所守也諸侯朝於天子曰述職述職者述所職也無非事者春省耕而補不足秋省斂而助不給夏諺曰吾王不逰吾何以休吾王不豫吾何以助一逰一豫為諸侯度狩舒救反省悉井反述陳也省視也斂收穫也給亦足也夏諺夏時之俗語也豫樂也巡所守巡行諸侯所守之土也述所職陳其所受之職也皆無有無事而空行者而又春秋循行郊野察民之所不足而補助之故夏諺以為王者一逰一豫皆有恩惠以及民而諸侯皆取法焉不敢無事慢逰以病其民也今也不然師行而糧食飢者弗食勞者弗息睊睊胥讒民乃作慝方命虐民飲食若流流連荒亡為諸侯憂睊古縣反今謂晏子時也師衆也二千五百人為師春秋傳曰君行師從糧謂糗糒之屬睊睊側目貌胥相也讒謗包慝怨惡也言民不勝其勞而起謗怨也方逆也命王命也若流如水之流無窮極也流連荒亡解見下文諸侯謂附庸之國縣邑之長從流下而忘反謂之流從流上而忘反謂之連從獸無厭謂之荒樂酒無厭謂之亡厭平聲此釋上文之義也從流下謂放舟隨水而下從流工謂挽舟逆水而上從獸田獵也荒廢也樂酒以飲酒為樂也亡猶失也言廢時失事也先王無流連之樂荒亡之行行去聲惟君所行也言先王之法今時之弊二者惟在君所行耳景公説大戒於國出舍於郊於是始興發補不足召太師曰為我作君臣相説之樂蓋徴招角招是也其詩曰畜君何尤畜君者好君也説音恱為去聲樂如字徴陟里反招與韶同畜敕六反戒告命也出舍自責以省民也興發發倉廪也太師樂官也君臣己與晏子也樂有五聲三曰角為民四曰徵為事招舜樂也其詩徴招角招之詩也尤過也言晏子能畜止其君之欲冝為君之所尤然其心則何過哉孟子釋之以為臣能畜止其君之欲乃是愛其君者也尹氏曰君之與民貴賤雖不同然其心未始有異也孟子之言可謂深切矣齊王不能推而用之惜哉景公之本志不過為逰觀計耳而晏子乃迪之以古誼勸之以省民且深陳流連荒亡之戒可謂格其邪心而引之當道也易之大小畜皆以止為義凡止君之欲者乃所以為愛君也然則縱君之欲者其得為愛君乎夫忠臣之心惟恐其君之有欲晏子之于景公是也姦臣之心惟恐其君之無欲趙髙之于二世李林甫之于明皇是也衍義齊宣王問曰人皆謂我毁明堂毁諸已乎趙氏曰明堂泰山明堂周天子東巡守廟諸侯之處漢時遺址尚在人欲毁之者蓋以天子不復巡守諸侯又不當居之也王問當毁之乎且止乎孟子對曰夫明堂者王者之堂也王欲行王政則勿毁之矣夫音扶明堂王者所居以出政令之所也能行王政則亦可以王矣何必毁哉王曰王政可得聞與對曰昔者文王之治岐也耕者九一仕者世祿關市譏而不征澤梁無禁罪人不孥老而無妻曰鰥老而無夫曰寡老而無子曰獨幼而無父曰孤此四者天下之窮民而無告者文王發政施仁必先斯四者詩云哿矣富人哀此煢獨與平聲孥音奴鰥姑頑反哿工可反煢音瓊岐周之舊國也九一者井田之制也方一里為一井其田九百畝中畫井字界為九區一區之中為田百畝中百畝為公田外八百畝為私田八家各受私田百畝而同養公田是九分而稅其一也世祿者先王之世仕者之子孫皆教之教之而成材則官之如不足用亦使之不失其祿蓋其先世嘗有功德于民故報之如此忠厚之至也關謂道路之關市謂都邑之市譏察也征稅也關市之吏察異服異言之人而不征商賈之稅也澤謂瀦水梁謂魚梁與民同利不設禁也孥妻子也惡惡止其身不及妻子也先王養民之政導其妻子使之養其老而恤其幼不幸而有鰥寡孤獨之人無父母妻子之養則尤宜憐恤故必以為先也詩小雅正月之萹哿可也煢困悴貌王曰善哉言乎曰王如善之則何為不行王曰寡人有疾寡人好貨對曰昔者公劉好貨詩云乃積乃倉乃裹餱糧于橐于囊思戢用光弓矢斯張干戈戚揚爰方啓行故居者有積倉行者有裹糧也然後可以爰方啓行王如好貨與百姓同之於王何有餱音侯橐音托戢詩作輯音集王自以為好貨故取民無制而不能行此王政公劉后稷之曾孫也詩大雅公劉之萹積露積也餱乾糧也無底曰橐有底曰囊皆所以盛餱糧也戢安集也言思安集其民人以光大其國家也戚斧也揚鉞也爰于也啓行言往遷于豳也何有言不難也孟子言公劉之民富足如此是公劉好貨而能推己之心以及民也今王好貨亦能如此則其于王天下也何難之有王曰寡人有疾寡人好色對曰昔者大王好色愛厥妃詩云古公亶父來朝走馬率西水滸至于岐下爰及薑女聿來胥宇當是時也內無怨女外無曠夫王如好色與百姓同之於王何有大音泰王又言此者好色則心志蠱惑用度奢侈而不能行王政也大王公劉九世孫詩大雅綿之萹也古公大王之本號後乃追尊為大王也亶父大王名也來朝走馬避狄之難也率循也滸水涯也岐下岐山之下也薑女大王之妃也胥相也宇居也曠空也無怨曠者是大王好色而能推已之心以及民也楊氏曰孟子與人君言皆所以擴充其善心而格其非心不止就事論事若使為人臣者論事每如此豈不能堯舜其君乎愚謂此篇自首章至此大意皆同蓋鐘鼓苑囿逰觀之樂與夫好勇好貨好色之心皆天理之所有而人情之所不能無者然天理人欲同行異情循理而公于天下者聖賢之所以盡其性也縱欲而私于一已者衆人之所以滅其天也二者之間不能以髮而其是非得失之歸相去逺矣故孟子因時君之問而剖析于幾微之際皆所以遏人欲而存天理其法似疏而實密其事似易而實難學者以身體之則有以識其非曲學阿世之言而知所以克己復禮之端矣孟子謂齊宣王曰王之臣有託其妻子於其友而之楚逰者比其反也則凍餒其妻子則如之何王曰棄之比必二反託寄也比及也棄絶也曰士師不能治士則如之何王曰已之士師獄官也其屬有鄉士遂士之官士師皆當治之巳罷去也曰四境之內不治則如之何王顧左右而言他治去聲孟子將問此而先設上二事以發之及此而王不能答也其憚于自責恥于下問如此其不足與有為可知矣趙氏曰言君臣上下各勤其任無墮其職乃安其身孟子見齊宣王曰所謂故國者非謂有喬木之謂也有世臣之謂也王無親臣矣昔者所進今日不知其亡也世臣纍世勳舊之臣與國同休戚者也親臣君所親信之臣與君同休戚者也此言喬木世臣皆故國所冝有然所以為故國者則在此而不在彼也昨日所進用之臣今日有亡去而不知者則無親臣矣况世臣乎王曰吾何以識其不才而舍之舍上聲王意以為此亡去者皆不才之人我初不知而誤用之故今不以其去為意耳因問何以先識其不才而舍之邪曰國君進賢如不得已將使卑踰尊疏踰戚可不慎與與平聲如不得已言謹之至也蓋尊尊親親禮之常也然或尊者親者未必賢則必進疏逺之賢而用之是使卑者踰尊疏者踰戚非禮之常故不可不謹也左右皆曰賢未可也諸大夫皆曰賢未可也國人皆曰賢然後察之見賢焉然後用之左右皆曰不可勿聽諸大夫皆曰不可勿聽國人皆曰不可然後察之見不可焉然後去之去上聲左右近臣其言固未可信諸大夫之言冝可信矣然猶恐其蔽于私也至于國人則其論公矣然猶必察之者蓋人有同俗而為衆所恱者亦有特立而為衆所憎者故必自察之而親見其賢否之實然後從而用舍之則于賢者知之深任之重而不才者不得以幸進矣所謂進賢如不得巳者如此左右皆曰可殺勿聽諸大夫皆曰可殺勿聽國人皆曰可殺然後察之見可殺焉然後殺之故曰國人殺之也此言非獨以此進退人才至于用刑亦以此道蓋所謂天命天討皆非人君之所得私也如此然後可以為民父母傳曰民之所好好之民之所惡惡之此謂民之父母齊宣王問曰湯放桀武王伐紂有諸孟子對曰於傳有之傳直戀反放置也書云成湯放桀于南巢曰臣弒其君可乎桀紂天子湯武諸侯曰賊仁者謂之賊賊義者謂之殘殘賊之人謂之一夫聞誅一夫紂矣未聞弒君也害仁者凶暴淫虐滅絶天理故謂之賦害義者顛倒錯亂傷敗彝倫故謂之殘一夫言衆叛親離不復以為君也王勉曰斯言也惟在下者有湯武之仁而在上者有桀紂之暴則可不然是未免于篡弒之罪也南軒曰夫仁義之在天下彼豈能殘賊之哉實自殘賊于厥躬耳為君如此則上焉斷棄天命下焉不有民物謂之一夫不亦冝乎孟子見齊宣王曰為巨室則必使工師求大木工師得大木則王喜以為能勝其任也匠人斫而小之則王怒以為不勝其任矣夫人幼而學之壯而欲行之王曰姑舍女所學而從我則何如舍上聲女音汝巨室大宮也工師匠人之長匠人衆工人也姑且也言賢人所學者大而王欲小之也今有璞玉於此雖萬鎰必使玉人雕琢之至於治國家則曰姑舍女所學而從我則何以異於教玉人雕琢玉哉鎰音溢璞玉之在石中者鎰二十兩也玉人玉工也不敢自治而付之能者愛之甚也治國家則徇私欲而不任賢是愛國家不如愛玉也范氏曰古之賢者常患人君不能行其所學而世之庸君亦常患賢者不能從其所好是以君臣相遇自古以為難孔孟終身而不遇蓋以此耳齊人伐燕勝之案史記燕王噲讓國于其相子之而國大亂齊因伐之燕士卒不戰城門不閉遂大勝燕宣王問曰或謂寡人勿取或謂寡人取之以萬乘之國伐萬乘之國五旬而舉之人力不至於此不取必有天殃取之何如乘去聲下同以伐燕為宣王事與史記諸書不同己見序説孟子對曰取之而燕民恱則取之古之人有行之者武王是也取之而燕民不恱則勿取古之人有行之者文王是也商紂之世文王三分天下有其二以服事殷至武王十三年乃伐紂而有天下張子曰此事間不容髮一日之間天命未絶則是君臣當日命絶則為獨夫然命之絶否何以知之人情而已諸侯不期而會者八百武王安得而止之哉以萬乘之國伐萬乘之國簞食壷漿以迎王師豈有他哉避水火也如水益深如火益熱亦運而已矣簞竹器食飯也運轉也言齊若更為暴虐則民將轉而望救于他人矣趙氏曰征伐之道當順民心民心恱則天意得矣齊人伐燕取之諸侯將謀救燕宣王曰諸侯多謀伐寡人者何以待之孟子對曰臣聞七十里為政於天下者湯是也未聞以千里畏人者也千里畏人指齊王也書曰湯一征自葛始天下信之東面而征西夷怨南面而征北狄怨曰奚為後我民望之若大旱之望雲霓也歸市者不止耕者不變誅其君而弔其民若時雨降民大恱書曰徯我后后來其蘇兩引書皆商書仲虺之誥文也與今書文亦小異一征初征也天下信之信其志在救民不為暴也奚為後我言湯何為不先來征我之國也霓虹也雲合則雨虹見則止變動也徯待也后君也蘇復生也他國之民皆以湯為我君而待其來使巳得蘇息也此言湯之所以七十里而為政于天下也今燕虐其民王往而征之民以為將拯己於水火之中也簞食壷漿以迎王師若殺其父兄係纍其子弟毁其宗廟遷其重器如之何其可也天下固畏齊之強也今又倍地而不行仁政是動天下之兵也纍力追反拯救也係纍縶縛也重器寶器也畏忌也倍地并燕而增一倍之地也齊之取燕若能如湯之征葛則燕人恱之而齊可以為政于天下矣今乃不行仁政而肆為殘虐則無以慰燕民之望而服諸侯之心是以不免乎以千里而畏人也王速出令反其旄倪止其重器謀於燕衆置君而後去之則猶可及止也旄與耄同倪五稽反反還也旄老人也倪小兒也謂所虜略之老小也猶尚也及止及其未發而止之也范氏曰孟子事齊梁之君論道德則必稱堯舜論征伐則必稱湯武蓋治民不法堯舜則是為暴行師不法湯武則是為亂豈可謂吾君不能而舍所學以徇之哉鄒與魯閧穆公問曰吾有司死者三十三人而民莫之死也誅之則不可勝誅不誅則疾視其長上之死而不救如之何則可也閧鬬聲也穆公鄒君也不可勝誅言人衆不可盡誅也長上謂有司也民怨其上故疾視其死而不救也孟子對曰凶年飢嵗君之民老弱轉乎溝壑壯者散而之四方者幾千人矣而君之倉廩實府庫充有司莫以告是上慢而殘下也曽子曰戒之戒之出乎爾者反乎爾者也夫民今而後得反之也君無尤焉幾上聲夫音扶轉飢餓輾轉而死也充滿也上謂君及有司也尤過也君行仁政斯民親其上死其長矣君不仁而求富是以有司知重斂而不知恤民故君行仁政則有司皆愛其民而民亦愛之矣范氏曰書曰民惟邦本本固邦寧有倉廪府庫所以為民也豐年則斂之凶年則散之恤其飢寒救其疾苦是以民親愛其上有危難則赴救之如子弟之衛父兄手足之捍頭目也穆公不能反已猶欲歸罪于民豈不誤哉滕文公問曰滕小國也間於齊楚事齊乎事楚乎間去聲滕國名孟子對曰是謀非吾所能及也無已則有一焉鑿斯池也築斯城也與民守之效死而民弗去則是可為也無己見前萹一謂一説也效猶致也國君死社稷故致死以守國至于民亦為之死守而不去則非有以深得其心者不能也此章言有國者當守義而愛民不可僥幸而苟免滕文公問曰齊人將築薛吾甚恐如之何則可薛國名近滕齊取其地而城之故文公以其逼已而恐也孟子對曰昔者大王居邠狄人侵之去之岐山之下居焉非擇而取之不得已也邠與豳同邠地名言太王非以岐下為善擇取而居之也詳見下章苟為善後世子孫必有王者矣君子創業垂統為可繼也若夫成功則天也君如彼何哉強為善而已矣夫音扶強上聲創造統緒也言能為善則如太王雖失其地而其後世遂有天下乃天理也然君子造基業于前而垂統緒于後但能不失其正令後世可繼續而行耳若夫成功則豈可必乎彼齊也君之力既無如之何則但強于為善使其可繼而俟命于天耳此章言人君但當竭力于其所當為不可徼幸于其所難必滕文公問曰滕小國也竭力以事大國則不得免焉如之何則可孟子對曰昔者大王居邠狄人侵之事之以皮幣不得免焉事之以犬馬不得免焉事之以珠玉不得免焉乃屬其耆老而告之曰狄人之所欲者吾土地也吾聞之也君子不以其所以養人者害人二三子何患乎無君我將去之去邠踰梁山邑于岐山之下居焉邠人曰仁人也不可失也從之者如歸市屬音燭皮謂虎豹麋鹿之皮也幣帛也屬會集也土地本生物以養人今爭地而殺人是以其所以養人者害人也邑作邑也歸市人衆而爭先也或曰世守也非身之所能為也效死勿去又言或謂土地乃先人所受而世守之者非已所能専但當致死守之不可舍去此國君死社稷之常法傳所謂國滅君死之正也正謂此也君請擇於斯二者能如太王則避之不能則謹守常法蓋遷國以圗存者權也守正而俟死者義也審己量力擇而處之可也楊氏曰孟子之于文公始告之以效死而已禮之正也至其甚恐則以太王之事告之非得已也然無太王之德而去則民或不從而遂至于亡則又不若效死之為愈故又請擇于斯二者又曰孟子所論自世俗觀之則可謂無謀矣然理之可為者不過如此舍此則必為儀秦之為矣凡事求可功求成取必于智謀之末而不循天理之正者非聖賢之道也魯平公將出嬖人臧倉者請曰他日君出則必命有司所之今乘輿已駕矣有司未知所之敢請公曰將見孟子曰何哉君所為輕身以先於匹夫者以為賢乎禮義由賢者出而孟子之後喪踰前喪君無見焉公曰諾乘輿君車也駕駕馬也孟子前喪父後喪母踰過也言其厚母薄父也諾應辭也樂正子入見曰君奚為不見孟軻也曰或告寡人曰孟子之後喪踰前喪是以不往見也曰何哉君所謂踰者前以士後以大夫前以三鼎而後以五鼎與曰否謂棺椁衣衾之美也曰非所謂踰也貧富不同也入見之見音現樂正子孟子弟子也仕于魯三鼎士祭禮五鼎大夫祭禮樂正子見孟子曰克告於君君為來見也嬖人有臧倉者沮君君是以不果來也曰行或使之止或尼之行止非人所能也吾之不遇魯侯天也臧氏之子焉能使豫不遇哉為去聲沮慈吕反尼女乙反焉于虔反克樂正子名沮尼皆止之之意也言人之行必有人使之者其止必有人尼之者然其所以行所以止則固有天命而非此人所能使亦非此人所能尼也然則我之不遇豈臧倉之所能為哉此章言聖賢之出處關時運之盛衰乃天命之所為非人力之可及孟子集編卷二
