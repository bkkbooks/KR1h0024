body:
  text: 欽定四庫全書論語集編卷二宋真德秀撰八佾第三凡二十六章通前篇末二章皆論禮樂之事孔子謂季氏八佾舞於庭是可忍也孰不可忍也佾音逸季氏魯大夫季孫氏也佾舞列也天子八諸侯六大夫四士二每佾人數如其佾數或曰每佾八人未詳孰是季氏以大夫而僭用天子之樂孔子言其此事尚忍為之則何事不可忍為或曰忍容忍也蓋深疾之之辭范氏曰樂舞之數自上而下降殺以兩而已故兩之間不可以毫髮僭差也孔子為政先正禮樂則季氏之罪不容誅矣謝氏曰君子於其所不當為不敢須臾處不忍故也而季氏忍此矣則雖弒父與君亦何所憚而不為乎三家者以雍徹子曰相維辟公天子穆穆奚取於三家之堂徹直列反相去聲三家魯大夫孟孫叔孫季孫之家也雍周頌篇名徹祭畢而收其俎也天子宗廟之祭則歌雍以徹是時三家僭而用之相助也辟公諸侯也穆穆深逺之意天子之容也此雍詩之辭孔子引之言三家之堂非有此事亦何取於此義而歌之乎譏其無知妄作以取僭竊之罪程子曰周公之功固大矣皆臣子之分所當為魯安得獨用天子禮樂哉成王之賜伯禽之受皆非也其因襲之弊遂使季氏僭八佾三家僭雍徹故仲尼譏之子曰人而不仁如禮何人而不仁如樂何遊氏曰人而不仁則人心亡矣其如禮樂何哉言雖欲用之而禮樂不為之用也程子曰仁者天下之正理失正理則無序而不和李氏曰禮樂待人而後行苟非其人則雖玉帛交錯鍾鼓鏗鏘亦將如之何哉然記者序此於八佾雍徹之後疑其為僭禮樂者發也問禮樂不為用是如何曰不仁之人渾是一團私意自不奈禮樂何禮樂須是中和溫厚底人方行得若不仁之人與禮樂不相關安得為之用中心斯須不和不樂則鄙詐之心入之外貌斯須不莊不敬則慢易之心入之既不和樂不莊敬如何行得禮樂問遊氏之説則指在外禮樂言之如玉帛鐘鼓之類程子所謂無序不和則主內者言之如何曰兩説只是一意在我者既無序而不和在外之禮樂亦不為我用問仁者心之德也不仁之人心德既亡方寸之中絶無天理平日運量酬酢盡是非僻邪淫之氣無復本心之正如此等人雖周旋於玉帛鐘鼓之間其如禮樂何先生曰然南軒曰此聖人使人知禮樂之原也不仁之人雖欲為禮樂其如禮樂何蓋是心存而後敬與和生焉禮樂之所由興也林放問禮之本林放魯人見世之為禮者專事繁文而疑其本之不在是也故以為問子曰大哉問孔子以時方逐末而放獨有志於本故大其問蓋得其本則禮之全體無不在其中矣禮與其奢也寧儉喪與其易也寧戚易去聲易治也孟子曰易其田疇在喪禮則節文習熟而無哀痛慘怛之實者也戚則一於哀而文不足耳禮貴得中奢易則過於文儉戚則不及而質二者皆未合禮然凡物之理必先有質而後有文則質乃禮之本也范氏曰夫祭與其敬不足而禮有餘也不若禮不足而敬有餘也喪與其哀不足而禮有餘也不若禮不足而哀有餘也禮失之奢喪失之易皆不能反本而隨其末故也禮奢而備不若儉而不備之愈也喪易而文不若戚而不文之愈也儉者物之質戚者心之誠故為禮之本楊氏曰禮始諸飲食故汙尊而壞飲為之簠簋籩豆罍爵之飾所以文之也則其本儉而已喪不可以徑情而直行為之衰麻哭踊之數所以節之也則其本戚而已周衰世方以文滅質而林放獨能問禮之本故夫子大之而告之以此黃氏曰夫子於禮但言從周未見其從質也今乃以儉與戚為可尚何也聖人因俗之弊感放之意而為是言也然其辭必曰與其奢也寧儉與其易也寧戚則本非以儉戚為可尚特與其流於文弊則寧如此耳其言之抑揚得其中正如此所以為無弊也子曰夷狄之有君不如諸夏之亡也吳氏曰亡古無字通用程氏曰夷狄且有君長不如諸夏之僭亂反無上下之分也尹氏曰孔子傷時之亂而歎之也亡非實亡也雖有之不能盡其道爾季氏旅於泰山子謂冉有曰女弗能救與對曰不能子曰嗚呼曽謂泰山不如林放乎女音汝與平聲旅祭名泰山山名在魯地禮諸侯祭封內山川季氏祭之僭也冉有孔子弟子名求時為季氏宰救謂救其陷於僭竊之罪嗚呼歎辭言神不享非禮欲季氏知其無益而自止又進林放以厲冉有也范氏曰冉有從季氏夫子豈不知其不可告也然而聖人不輕絶人盡已之心安知冉有之不能救季氏之不可諫也既不能正則美林放以明泰山之不可誣是亦教誨之道也子曰君子無所爭必也射乎揖讓而升下而飲其爭也君子飲去聲揖讓而升者大射之禮耦進三揖而後升堂也下而飲謂射畢揖降以俟衆耦皆降勝者乃揖不勝者升取觶立飲也言君子恭遜不與人爭惟於射而後有爭然其爭也雍容揖遜乃如此則其爭也君子而非若小人之爭矣南軒曰爭生於有已君子克已者也是以無所爭惟射疑於可爭而君子之於射於以正已而觀德耳揖遜而升揖遜而下揖遜而飲其雍容辭遜自反而下人之意蓋如此然則君子其爭乎於射而不爭則他可知矣子夏問曰巧笑倩兮美目盼兮素以為絢兮何謂也倩七練反盻普莧反絢呼縣反此逸詩也倩好口輔也盻目黑白分也素粉地畫之質也絢采色畫之飾也言人有此倩盻之美質而又加以華采之飾如有素地而加采色也子夏疑其反謂以素為飾故問之子曰繪事後素繪胡對反繪事繪畫之事也後素後於素也考工記曰繪畫之事後素功謂先以粉地為質而後施五采猶人有美質然後可加文節曰禮後乎子曰起豫者商也始可與言詩已矣禮必以忠信為質猶繪事必以粉素為先起猶發也起豫言能起發我之志意謝氏曰子貢因論學而知詩子夏因論詩而知學故皆可與言詩楊氏曰甘受和白受采忠信之人可以學禮苟無其質理不虗行此繪事後素之説也孔子曰繪事後素而子夏曰禮後乎可謂能繼其志矣非得之言意之表者能之乎商賜可與言詩者以此若夫玩心於章句之末則其為詩也固而已矣所謂起豫則亦相長之義也南軒曰凡禮之生生於質也無其質則禮安從施夫素雖待於絢然素所以有絢也無其素則何絢之有曰繪事後素者謂質為之先而文為後也子夏於此知禮之為後可謂能默會於意言之外矣子曰夏禮吾能言之把不足徴也殷禮吾能言之宋不足徴也文獻不足故也足則吾能徴之矣把夏之後宋商之後徴證也文典籍也獻賢也言二代之禮我能言之而二國不足取以為證以其文獻不足故也文獻若足則我能取之以證吾言矣子曰禘自既灌而往者吾不欲觀之矣禘大計反趙伯循曰禘王者之大祭也王者既立始祖之廟又推始祖所自出之帝祀之於始祖之廟而以始祖配之也成王以周公有大勳勞賜魯重祭故得禘於周公之廟以文王為所出之帝而周公配之然非禮矣灌者方祭之始用鬱鬯之酒灌地以降神也魯之君臣當此之時誠意未散猶有可觀自此以後則浸以懈怠而無足觀矣蓋魯祭非禮孔子本不欲觀至此而失禮之中又失禮焉故發此歎也謝氏曰夫子嘗曰吾欲觀夏道是故之把而不足徴也我欲觀商道是故之宋而不足徴也又曰我觀周道幽厲傷之吾舍魯何適矣魯之郊禘非禮也周公其衰矣考之把宋已如彼考之當今又如此孔子所以深歎也或問禘之説子曰不知也知其説者之於天下也其如示諸斯乎指其掌先王報本追逺之意莫深於禘非仁孝誠敬之至不足以與此非或人之所及也而不王不禘之法又魯之所當諱者故以不知答之示與視同指其掌弟子記夫子言此而自指其掌言其明且易也蓋知禘之説則理無不明誠無不格而治天下不難矣聖人於此豈真有所不知也哉祭如在祭神如神在程子曰祭祭先祖也祭神祭外神也祭先主於孝祭神主於敬朱子曰此門人記孔子祭祀之誠意子曰吾不與祭如不祭與去聲又記孔子之言以明之言已當祭之時或有故不得與而使他人攝之則不得致其如在之誠故雖已祭而此心缺然如未嘗祭也范氏曰君子之祭七日戒三日齊必見所祭者誠之至也是故郊則天神格廟則人鬼享皆由已以致之也有其誠則有其神無其誠則無其神可不謹乎吾不與祭如不祭誠為實禮為虛也王孫賈問曰與其媚於奧寧媚於竈何謂也王孫賈衛大夫媚親順也室西南隅為奧竈者五祀之一夏所祭也凡祭五祀皆先設主而祭於其所然後迎尸而祭於奧略如祭宗廟之儀如祀竈則設主於竈陘祭畢而更設饌於奧以迎尸也故時俗之語因以奧有常尊而非祭之主竈雖卑賤而當時用事喻自結於君不如阿附權臣也賈衛之權臣故以此諷孔子子曰不然獲罪於天無所禱也天即理也其尊無對非奧竈之可比也逆理則獲罪於天矣豈媚於奧竈所能檮而免乎言但當順理非特不當媚竈亦不可媚於奧也謝氏曰聖人之言遜而不迫使王孫賈而知此意不為無益使其不知亦非所以取禍愚謂聖人道大德洪如天地故其發言渾渾乎如元氣之運然於門人弟子則或峻其辭以規警之如曰野哉由也如曰小人哉樊須也如曰豫之不仁也蓋其視門人弟子如子弟其有過但當峻責若一時權臣小人平日未嘗相孚一旦發非理之問聖人之答之也既不可順指以求合又不可忤意而招禍故其言從容巽順若無所觸忤然皆本乎正理而未嘗有一豪之阿徇如答王孫賈曰獲罪於天無所禱也答陽貨曰吾將仕矣皆是此意王孫賈衛之權臣聖人獲罪於天之語警之深矣然他日稱衛靈公之不亡則以其國有人之故而王孫賈治軍旅亦與焉蓋其人雖不善至於治兵則其所長此又憎而知其善之意聖人之心至公如天地此其一事也子曰周監於二代郁郁乎文哉吾從周郁於六反監視也二代夏商也言其視二代之禮而損益之郁郁文盛貌尹氏曰三代之禮至周大備夫子美其文而從之子入大廟每事問或曰孰謂鄹人之子知禮乎入大廟每事問子聞之曰是禮也太音泰鄹則留反大廟魯周公廟此蓋孔子始仕之時入而助祭也鄹魯邑名孔子父叔梁紇嘗為其邑大夫孔子自少以知禮聞故或人因此而譏之孔子言是禮者敬謹之至乃所以為禮也尹氏曰禮者敬而已矣雖知亦問謹之至也其為敬莫大於此謂之不知禮者豈足以知孔子哉子曰射不主皮為力不同科古之道也為去聲射不主皮鄉射禮文為力不同科孔子解禮之意如此也皮革也布侯而棲革於其中以為的所謂鵠也科等也古者射以觀德但主於中而不主於貫革蓋以人之力有強弱不同等也記曰武王克商散軍郊射而貫革之射息正謂此也周衰禮廢列國兵爭復尚貫革故孔子歎之楊氏曰中可以學而能力不可以強而至聖人言古之道所以正今之失子貢欲去告朔之餼羊去起吕反告古篤反餼許氣反告朔之禮古者天子常以季冬頒來歲十二月之朔于諸侯諸侯受而藏之祖廟月朔則以特羊告廟請而行之餼生牲也魯自文公始不視朔而有司猶供此羊故子貢欲去之子曰賜也爾愛其羊我愛其禮愛猶惜也子貢蓋惜其無實而妄費然禮雖廢羊存猶得以識之而可復焉若并去其羊則此禮遂亡矣孔子所以惜之楊氏曰告朔諸侯所以稟命於君親禮之大者魯不視朔矣然羊存則告朔之名未泯而其實因可舉此夫子所以惜之也子曰事君盡禮人以為諂也黃氏曰孔子於事君之禮非有所加也如是而後盡耳時人不能反以為諂故孔子言之以明禮之當然也程子曰聖人事君盡禮當時以為諂若他人言之必曰我事君盡禮小人以為諂而孔子之言止於如此聖人道大德宏此亦可見案鄉黨君在踧踖如也與與如也足躩如也其言似不足者攝齊升堂鞠躬如也屏氣似不息者出降一等逞顔色怡怡如也沒階趨翼如也復其位踧踖如也吉月必朝服而朝君賜食必正席先嘗之侍食於君君祭先飯疾君視之東首加朝服拖紳君命召不俟駕行矣又曰拜下禮也今拜乎上泰也雖違衆吾從下凡此皆所謂事君之禮定公問君使臣臣事君如之何孔子對曰君使臣以禮臣事君以忠定公魯君名宋二者皆禮之當然各欲自盡而已吕氏曰使臣不患其不忠患禮之不至事君不患其無禮患忠之不足尹氏曰君臣以義合者也故君使臣以禮則臣事君以忠南軒曰使臣以禮如所謂敬大臣體羣臣之類是也事君以忠如所謂無以有已有犯無隱之類是也子曰關雎樂而不淫哀而不傷樂音洛關雎周南國風詩之首篇也淫者樂之過而失其正者也傷者哀之過而害於和者也關雎之詩言后妃之德冝配君子求之未得則不能無寤寐反側之憂求而得之則宜其有琴瑟鍾鼓之樂蓋其憂雖深而不害於和其樂雖盛而不失其正故夫子稱之如此欲學者玩其辭審其音而有以識其性情之正也南軒口哀樂情之為也而其理具於性樂而至於淫哀而至於傷則是情之流而性之汩矣樂而不淫哀而不傷發不踰則性情之正也非養之有素者其能然乎關雎之詩樂得淑女以配君子至於琴瑟友之鍾鼓樂之所謂樂而不淫也哀窈窕思賢才至於寤寐思服展轉反側所謂哀而不傷也玩其辭又可不深體於性情之際乎哀公問社於宰我宰我對曰夏后氏以松殷人以柏周人以栗曰使民戰栗宰我孔子弟子名豫三代之社不同者古者立社各樹其土之所冝木以為主也戰栗恐懼貌宰我又言周所以用栗之意如此豈以古者戮人於社故附會其説與子聞之曰成事不説遂事不諫既往不咎遂事謂事雖未成而勢不能已者孔子以宰我所對非立社之本意又啓時君殺伐之心而其言已出不可復救故歷言此以深責之欲使謹其後也尹氏曰古者各以所宜木名其社非取義於木也宰我不知而妄對故夫子責之子曰管仲之器小哉管仲齊大夫名夷吾相桓公霸諸侯器小言其不知聖賢大學之道故局量褊淺規模卑狹不能正身修德以致主於王道或曰管仲儉乎曰管氏有三歸官事不攝焉得儉焉於虔反或人蓋疑器小之為儉三歸臺名事見説苑攝兼也家臣不能具官一人常兼數事管仲不然皆言其侈然則管仲知禮乎曰邦君樹塞門管氏亦樹塞門邦君為兩君之好有反坫管氏亦有反坫管氏而知禮孰不知禮好去聲坫丁念反或人又疑不儉為知禮屏謂之樹塞猶蔽也設屏於門以蔽內外也好謂好會坫在兩楹之間獻酬飲畢則反爵於其上此皆諸侯之禮而管仲僭之不知禮也愚謂孔子譏管仲之器小其旨深矣或人不知而疑其儉故斥其奢以明其非儉或又疑其知禮故又斥其僭以明其不知禮蓋雖不復明言小器之所以然而其所以小者於此亦可見矣故程子曰奢而犯禮其器之小可知蓋器大則自知禮而無此失矣此言當深味也蘇氏曰自修身正家以及於國則其本深其及者逺是謂大器揚雄所謂大器猶規矩準繩先自治而後治人者是也管仲三歸反坫桓公內嬖六人而霸天下其本固已淺矣管仲死桓公薨天下不復宗齊楊氏曰夫子大管仲之功而小其器蓋非王佐之才雖能合諸侯正天下其器不足稱也道學不明而王霸之略混為一途故聞管仲之器小則疑其為儉以不儉告之則又疑其知禮蓋世方以詭遇為功而不知為之範則不悟其小宜矣子語魯大師樂曰樂其可知也始作翕如也從之純如也皎如也繹如也以成語去聲大音泰從音縱語告也大師樂官名時音樂廢缺故孔子教之翕合也從放也純和也皎明也繹相續不絶也成樂之一終也謝氏曰五音六律不具不足以為樂翕如言其合也五音合矣清濁髙下如五味之相濟而後和故曰純如合而和矣欲其無相奪倫故曰皎如然豈宫自宫而商自商乎不相反而相連如貫珠可也故曰繹如也以成儀封人請見曰君子之至於斯也吾未嘗不得見也從者見之出曰二三子何患於喪乎天下之無道也久矣天將以夫子為木鐸請見見之之見賢遍反從喪皆去聲儀衛邑封人掌封疆之官蓋賢而隱於下位者也君子謂當時賢者至此皆得見之自言其平日不見絶於賢者而求以自通也見之謂通使得見喪謂失位去國禮曰喪欲速貧是也木鐸金口木舌施政教時所振以警衆者也言亂極當治天必將使夫子得位設教不久失位也封人一見夫子而遽以是稱之其所得於觀感之間者深矣或曰木鐸所以徇于道路言天使夫子失位周流四方以行其教如木鐸之徇于道路也子謂韶盡美矣又盡善也謂武盡美矣未盡善也韶舜樂武武王樂美者聲容之盛善者美之實也舜紹堯致治武王伐紂救民其功一也故其樂皆盡美然舜之德性之也又以揖遜而有天下武王之德反之也又以征誅而得天下故其實有不同者程子曰成湯放桀惟有慙德武王亦然故未盡善堯舜湯武其揆一也征伐非其所欲所遇之時然爾子曰居上不寬為禮不敬臨喪不哀吾何以觀之哉居上主於愛人故以寬為本為禮以敬為本臨喪以哀為本既無其本則以何者而觀其所行之得失哉里仁第四凡二十六章子曰里仁為美擇不處仁焉得知處上聲焉於虔反知去聲里有仁厚之俗為美擇里而不居於是焉則失其是非之本心而不得為知矣謝氏曰孟子因擇術嘗引此矣故繼之曰夫仁天之尊爵也人之安宅也莫之禦而不仁是不智也今當以此論為證問謝氏之説如何朱子曰聖人本語只是説居必擇鄉遊必擇士之意南軒曰里居也里仁為美言人以居仁為美也人以居仁為美茍不知擇而處焉是不智也擇而處之乃利仁之事然處之之久則將安之矣愚案三先生之説不同正當參繹子曰不仁者不可以久處約不可以長處樂仁者安仁知者利仁樂音洛知去聲約窮困也利猶貪也蓋深知篤好而必欲得之也不仁之人失其本心久約必濫久樂必淫惟仁者則安其仁而無適不然知者則利於仁而不易所守蓋雖深淺之不同然皆非外物所能奪矣謝氏曰仁者心無內外逺近精粗之間非有所存而自不亡非有所理而自不亂如目視而耳聽手持而足行也知者謂之有所見則可謂之有所得則未可有所存斯不亡有所理斯不亂未能無意也安仁則一利仁則二安仁者非顔閔以上去聖人為不逺不知此味也諸子雖有卓越之才謂之見道不惑則可然未免於利之也先生再三誦安仁則一利仁則二之語以為解中未有及此者因歎云此公見識直是髙問利仁莫是南軒所謂有所為而為者否曰有所為而為不是好底與知者利仁不同仁者溫厚篤實義理自然充足不待思而為之而所為皆是義理其心常怡怡地所謂仁也智者即有是非而取正於義理以求其是而去其非所謂智也安仁不知有仁如腰之忘帶足之忘屨利仁者是見得就之則利違之則害非顔閔以上不知此味到顔閔地位知得此味猶未到安處也南軒曰自非上智生知之流則利仁之事正所當用力耳子曰惟仁者能好人能惡人好惡皆去聲惟之為言獨也蓋無私心然後好惡當於理程子所謂得其公正是也遊氏曰好善而惡惡天下之同情然人每失其正者心有所繫而不能自克也惟仁者無私心所以能好惡也公正字相少不得公是心裏公正是好惡當理子曰茍志於仁矣無惡也惡如字苟誠也志者心之所之也其心誠在於仁則必無為惡之事矣楊氏曰苟志於仁未必無過舉也然而為惡則無矣或問或以惡字為去聲為志於仁無所嫉惡如何曰上章適言惟仁者能好人能惡人則仁人曷嘗無所好惡哉今曰無惡然則謂其獨有所好可乎故胡氏力排其説以為貪無惡之美名失仁人之公道非知仁者蓋得之矣然此又有説焉蓋仁固公矣而主於愛故仁者於物之當好者則欣然恱而好之有所不得不惡者則惻然不得已而惡之是亦好惡各當其物而愛之理未嘗不行乎好惡之間也以此而觀則胡氏之言其亦未免於偏歟先生問學者苟志於仁矣無惡也與士志於道而恥惡衣惡食者未足與議也前言志於仁則無惡後言志於道而猶有此病其志則一而其病不同如何諸生言不合先生曰仁是最切身底道理志於仁大段是親切做工夫底所以必無惡志於道則説得來闊凡人有心向學皆志於道也若雖有志而泛泛不切則未必不為外物所動南軒曰志於仁則無不善蓋元者善之長存乎此則何惡之有子曰富與貴是人之所欲也不以其道得之不處也貧與賤是人之所惡也不以其道得之不去也惡去聲不以其道得之謂不當得而得之然於富貴則不處於貧賤則不去君子之審富貴而安貧賤也如此南軒曰於人之所欲而不處於人之所惡而不去蓋其欲惡有大於富貴貧賤者惟道所在而已君子去仁惡乎成名惡平聲言君子所以為君子以其仁也若貪富貴而厭貧賤則是自離其仁而無君子之實矣何所成其名乎君子無終食之間違仁造次必於是顛沛必於是造七到反沛音貝終食者一飯之頃造次急遽苟且之時顛沛傾覆流離之際蓋君子之不去乎仁如此不但冨貴貧賤取舍之間而已也言君子為仁自富貴貧賤取舍之間以至於終食造次顚沛之頃無時無處而不用其力也然取舍之分明然後存養之功密存養之功密則其取舍之分益明矣去仁如孟子去齊之去我原有此仁而自離去之也上聲非富貴貧賤方是就粗處説終食不違以後方説得細密然不先立得粗底根腳後面許多細密工夫更無安頓處須是先能於富貴不處於貧賤不去方可説上至細處去若見利則趨見便則奪更説甚麼正如貧而無諂富而無驕與貧而樂富而好禮相似若未能無諂無驕如何説得樂好禮愚案此章當作三節看處富貴貧賤之間而不苟此一節猶是粗底工夫至終食不違又是一節乃是存心養性細密底工夫然猶是平居暇日之事可以勉而至者至於造次急遽之時患難傾覆之際若非平時存養得已熟至此鮮冇不失其本心者到此而猶不違乃是至細至密工夫其去安仁地位已不逺矣然此三節乃進德之始終若無粗底工夫作根腳基址豈有能進於細密之地者故必以審富貴安貧賤為本然後能進於終食不違之地能終食不違矣然後能進於造次顚沛不違之地用工之序蓋如此正與無諂無驕樂與好禮相似當參考而熟玩也又曰心純是理即是不違仁雜以私欲便是違仁子曰我未見好仁者惡不仁者好仁者無以尚之惡不仁者其為仁矣不使不仁者加乎其身好惡皆去聲夫子自言未見好仁者惡不仁者蓋好仁者真知仁之可好故天下之物無以加之惡不仁者真知不仁之可惡故其所以為仁者必能絶去不仁之事而不使少有及於其身此皆成德之事故難得而見之也有能一日用其力於仁矣乎我未見力不足者言好仁惡不仁者雖不可見然或有人果能一日奮然用力於仁則我又未見其力有不足者蓋為仁由已欲之則是而志之所至氣必至焉故仁雖難能而至之亦易也蓋有之矣我未之見也蓋疑辭有之謂有用力而力不足者蓋人之氣質不同故疑亦容或有此昏弱之甚欲進而不能者但我偶未之見耳蓋不敢終以為易而又歎人之莫肯用力於仁也此章言仁之成德雖難其人然學者苟能實用其力則亦無不可至之理但用力而不至者今亦未見其人焉此夫子所以反覆而歎息之也或問無以尚之之義如何曰李氏曰好仁如好色舉天下之物未有以尚之者有以尚之則其好可移矣曰為仁亦用力乎曰蘇氏言之矣蘇氏曰仁之可好甚於美色不仁之可惡甚於惡臭而人終不知所趨避者物有以蔽塞之也解其蔽達其塞不用力可乎故曰自勝者強又曰克已復禮為仁問好仁者不幾於安乎曰未也好仁惡不仁者利仁之事問有能一日用其力曰此心散謾放肆一聳動時便在這裏雖曰用力却不大故用力問集注云云曰須是立志為先這氣便隨他志如大將指揮一出三軍皆隨若能立志氣皆由我便人之所以萎苶柔弱只是志不立志立氣便生若真個要求仁豈患力不足有引范氏曰惡不仁者不若好仁之為美又援吕氏説以為惡不仁者劣於好仁曰好仁惡不仁不必分優劣聖人謂好仁者無以尚之非以好仁者不可過也謂人之好仁如好好色更無以尚之者此純於好仁者也其曰惡不仁者其為仁矣不使不仁者加乎其身者惡不仁如惡惡臭惟恐惡臭之及吾身此誠於惡不仁者也南軒曰既曰有能一日用其力於仁矣乎我未見力不足者又曰蓋有之矣我未之見也所以待天下與勉學者之意反覆抑揚可謂𢎞大而深切矣愚案南軒之説謂蓋有用力於仁者但我猶未之見耳似得聖人忠厚之意更詳之子曰人之過也各於其黨觀過斯知仁矣黨類也程子曰人之過也各於其類君子常失於厚小人常失於薄君子過於愛小人過於忍尹氏曰於此觀之則人之仁不仁可知矣吳氏曰後漢吳祐謂掾以親故受汙辱之名所謂觀過知仁是也愚案此亦但言人雖有過猶可即此而知其厚薄非謂必俟其有過而後賢否可知也或問觀過之説曰劉氏之説亦善曰周公使管叔監殷而管叔以殷叛魯昭公實不知禮而孔子以為知禮實過也然周公愛其兄孔子厚其君乃所以為仁也所謂君子過於厚與愛者雖然是過然其血脈猶是從仁中來小人之過於薄與忍便是失其本心矣又曰厚與愛畢竟從仁上發來其苗脈可見禮記謂仁者之過易辭仁者之過只是事上差錯故易説不仁之過是有私意故難説此亦觀過知仁意聖人之言寬舒無所偏失如云觀過斯知仁矣猶曰觀人之過足知夫仁之所存也若於此而欲求仁之體則失聖人之本意矣禮記與人聞過之言説得大巧失於迫切問南軒韋齊記以黨為偏其説以為偏者過之所由生也觀者用力之妙也覺吾之偏在是從而觀之則仁可識矣此説如何先生不以為然愚案語説今本與朱子集注略同又答學者問曰後來玩伊川先生之説乃見前説甚有病來説云云大似釋氏講學不可潦草看過須是仔細玩味方見聖人當時立言意思過於厚者謂之仁則不可然心之不逺者可知比夫過於薄甚至於為忮為忍者其相去不亦逺乎請用此意體認乃見仁之所以為仁之意不至渺茫恍惚矣詳此則韋齊記之云非其定論也子曰朝聞道夕死可矣道者事物當然之理苟得聞之則生順死安無復遺恨矣朝夕所以甚言其時之近程子曰言人不可以不知道苟得聞道雖死可也又曰皆實理也人知而信者為難死生亦大矣非誠有所得豈以夕死為可乎或問朝聞夕死得無近於釋氏之説乎曰吾之所謂道者君臣父子夫婦昆弟朋友當然之實理也彼之所謂道則以此為幻為妄而絶滅之以求其所謂清淨寂滅者也人事當然之實理乃人之所以為人而不可以不聞者故朝聞之而夕死亦可以無所憾若彼之所謂清淨寂滅者則初無取效於人生之日用其急於聞者轉懼夫死之將至而欲倚是以敵之耳故程子於此專以實見實理義重於生與人之所以為人者為説其旨亦深切矣南軒曰所謂聞道者蓋涵養體察積習精深而自得於實理非若異端驚怪恍惚超詣直入之論也案集義程子曰聞道知所以為人也夕死可矣是不虗生也又曰苟有聞道夕死可矣之志則不肯一日安於不安何止一日須叟不能如曽子易簀須要如此乃安人不能若此者只為不見實理實理者實見得是實見得非見實理得之於心自别若耳聞也道者心實不見若見得必不肯安於此又曰古人有捐軀隕命者若不實見得則烏能如此須是實見得生不重於義生不安於死也故有殺身成仁者只是成就一箇是而已程子之説如此朱子所取其略也子曰士志於道而恥惡衣惡食者未足與議也心欲求道而以口體之奉不若人為恥其識趣之卑陋甚矣何足與議於道哉程子曰志於道而心役乎外何足與議也愚謂志於道者心存於義理也恥衣食之惡者心存於物欲也理之與欲不能兩立故聖人以此為戒也南軒嘗云天下無間界底道理欲做好人則不可望快活要快活則做不得好人此之謂也南軒之言雖粗然學者必須於此分别得明白然後可以進道不然則亦徒説而已顔子一簞食一瓢飲不改其樂此是不恥惡食子路緼袍與衣狐貉者立而不恥此是不恥惡衣前輩有云咬得菜根何事不可為是亦此意或問恥惡衣惡食其未免於求飽求安之纍者乎曰此固然也然求飽與安猶有適乎口體之實此則非以其不可衣且飽也特以其不美於觀聽而自惡焉若謝氏所謂食前方文則對客泰然蔬食菜羹則不出諸户者其識見卑凡又在求飽與安者之下矣志於道而猶不免乎是焉則其志亦何足道哉子曰君子之於天下也無適也無莫也義之與比適丁歷反比必二反適專主也春秋傳曰吾誰適從是也莫不肯也比從也謝氏曰適可也莫不可也無可無不可苟無道以主之不幾於猖狂自恣乎此佛老之學所以自謂心無所往而能應變而卒得罪於聖人也聖人之學不然於無可無不可之間有義存焉然則君子之心果有所倚乎南軒曰適莫兩端也適則有所必莫則無所主蓋不失之於此則失之於彼鮮不倚於一偏也夫義者人之正路倚於一偏則莫能遵於正路矣惟君子之心無適也而亦無莫也其於天下惟義之親而已蓋天下事事物物皆有義焉存於中而形於外也無適無莫而義之與比非窮理之明克己之至者不能及此若夫異端之學則初欲為無適莫而不知有義存焉故徇其私意以為可否而其無適無莫者乃所以為有適有莫而卒墮於一偏也黃氏曰於天下言天下之事無不然如出處去就以至立政用人之類皆在其中惟義之從而已不可先懷適莫之念也知此則漸進於絶四之地矣子曰君子懷德小人懷土君子懷刑小人懷惠懷思念也懷德謂存其固有之善懷士謂溺其所處之安懷刑謂畏法懷惠謂貪利君子小人趣向不同公私之間而已尹氏曰樂善惡不善所以為君子苟安務得所以為小人或問君子小人安知不以位言邪曰以例求之凡言君子小人而相反者則善惡之謂如周比和同之類是也又問懷刑之説以為惡不善何也曰樂善惡不善猶曰好仁惡不仁也必以刑為言則猶管仲所謂畏威如疾之謂耳南軒曰懷德懷刑好善惡惡之公心也懷土懷惠苟安務得之私意也子曰放於利而行多怨放上聲孔氏曰放依也多怨謂多取怨程子曰欲利於己必害於人故多怨子曰能以禮讓為國乎何有不能以禮讓為國如禮何讓者禮之實也何有言不難也言有禮之實以為國則何難之有不然則其禮文雖具亦且無如之何矣而況於為國乎子曰不患無位患所以立不患莫己知求為可知也所以立謂所以立乎其位者可知謂可以見知之實程子曰君子求其在已者而已矣子曰參乎吾道一以貫之曽子曰唯參所金反唯上聲參乎者呼曽子之名而告之貫通也唯者應之速而無疑者也聖人之心渾然一理而泛應曲當用各不同曽子於其用處蓋已隨事精察而力行之但未知其體之一爾夫子知其真積力久將有所得是以呼而告之曽子果能默契其指即應之速而無疑也子出門人問曰何謂也曽子曰夫子之道忠恕而已矣盡已之謂忠推已之謂恕而已矣者竭盡而無餘之辭也夫子之一理渾然而泛應曲當譬則天地之至誠無息而萬物各得其所也自此之外固無餘法而亦無待於推矣曽子有見於此而難言之故借學者盡已推已之目以著明之欲人之易曉也蓋至誠無息者道之體也萬殊之所以一本也萬物各得其所者道之用也一本之所以萬殊也以此觀之一以貫之之實可見矣或曰中心為忠如心為恕於義亦通程子曰以己及物仁也推己及物恕也違道不逺是也忠恕一以貫之忠者天道恕者人道忠者無妄恕者所以行乎忠也忠者體恕者用大本達道也此與違道不逺異者動以天爾又曰維天之命於穆不已忠也乾道變化各正性命恕也又曰聖人教人各因其才吾道一以貫之唯曽子為能達此孔子所以告之也曽子告門人曰夫子之道忠恕而已矣亦猶夫子之告曽子也中庸所謂忠恕違道不逺斯乃下學上達之義忠是根本恕是枝葉一者忠也以貫之者恕也體一而用殊忠是一箇忠做得百十萬般箇恕出來一以貫之只是萬事一理伊川謂仁義亦得蓋仁是體統義是分别主於內為忠見於外為恕忠是無一毫自欺處恕是稱物平施處忠因恕見恕由忠出天地是無心底忠恕聖人是無為底忠恕學者是求做底忠恕問或云忠恕只是無私心不責人曰自有六經來不曽説不責人是恕若中庸也只是説施諸已而不願亦勿施於人而已何嘗説不責人不成只取我好别人不好更不管他論語只説躬自厚而薄責於人謂之薄者如言不以已之所能必人之如已隨材責任耳何至舉而棄之曽子忠恕本是學者事曽子特借來形容夫子一貫道理忠便是一恕便是貫有這忠了便做出許多恕來聖人極誠無妄便是志曰聖人之忠即是誠否曰是曰聖人之恕即是仁否曰是曰在學者言之則忠近誠恕近仁曽子零碎處盡曉得了夫子便告之曰參乎吾道一以貫之他便應之曰唯貫如散錢一是索子夫子固是一以貫之學者能盡已而又推此以及物亦是以一貫之所以不同者夫子以天學者用力動以天之天只是自然問忠是竭盡中心無一毫不盡恕是推中心之所欲以與人所不欲不以與人曰是如此夫子所以告曽子無他只緣他曉得千條萬目他人連千條萬目尚自曉不得如何識得一貫曽子件件曽做來所以知若不曽躬行踐履如何識得忠是洞然明白無有不盡恕是知得為君推其仁以待下為臣推其敬以事君忠者誠實不欺之名聖人將此放頓在萬物之上故名之曰恕忠恕本末只是一貫緣聖人告以一貫之説故曽子借此二字以明之忠恕是學者事如欲子之孝於我必當先孝於親欲弟之弟於我必當先敬其兄如欲人之不慢於我我須先不慢於人欲人不欺於我須先不欺於人聖人一貫是無作為底忠恕是有作為底將箇有作為底用箇無作為底聖人則動以天賢人則動以人聖人不待推然學者但能盡已以推之於人推之既熟久之自能見聖人不待推之意譬如一泓水聖人是自然流出灌溉萬物其他人須是推出來灌溉學者是這箇忠恕聖人亦只是這箇忠恕但聖人熟學者生聖人自胸中流出學者須是勉強維天之命於穆不已乾道變化各正性命是天之忠恕純亦不已萬物各得其所是聖人之忠恕施諸已而不願亦勿施於人是學者之忠恕忠一本恕萬殊一本是統會處萬殊是流行處在天道言之一本是元氣之於萬物有昆蟲草木之不同而只是一氣之所生萬殊則是昆蟲草木之所得而生一箇自是一箇模樣在人事言之則一理之於萬事萬物有君臣父子兄弟朋友動息灑掃應對之不同而只是此理之所貫萬殊則是君臣父子兄弟朋友所當於道者一箇自是一箇道理其實只是一本問如心為恕曰如比也比自家心推將去仁之與恕只爭些子自然底是仁比而推之便是恕問忠恕程子以推廣得去則天地變化草木蕃推廣不去天地閉賢人隱如何曰亦只推己以及物推得去則物我貫通自有箇生生無窮底意思便有天地草木氣象天地只是這樣道理若推不去物我隔絶欲利於己不利於人欲己之富欲人之貧欲己之夀欲人之夭似這氣象全然閉塞隔絶了便似天地閉賢人隱曽子平日功用得九分九釐都見得了只爭得些子一聞夫子警省之便透徹了也又問未唯之前如何曰未唯之前見一事各是一箇理既唯之後千萬箇理只是一箇理夫子言一貫曽子言忠恕子思言小德川流大德敦化張子言理一分殊只是一箇忠恕則一而在聖人在學者則不能無異正猶孟子言由仁義行與行仁義之别耳曽子専為發明聖人一貫之旨所謂由忠恕行者也子思專為指示學者入德之方所謂行忠恕者也所指既殊不得不以為二然其所以為忠恕則其本體蓋未嘗不同也問程子以忠為天道恕為人道莫是謂忠者聖人之在已與天同運而恕者所以待人之道否曰聖人待己待人亦無二理天人之别但以體用之殊耳問伊川曰忠者天道恕者人道初非以優劣言自其渾然一本言之則謂之天道自其與物接者言之則謂之人道耳曰然此與誠者天之道誠之者人之道語意自不同南軒曰聖人之心於天下之理無所不該雖內外本末隱顯之致各有其分然未嘗不一以貫之也故程子曰如百尺木自根本至毫末皆一貫夫子之告曽子當其可耳曽子蓋默識之故答門人之問獨舉忠恕為言可以見曽子自得之深也夫忠為體恕為用實有是體則實有是用用之周乎物是其體之流行發見而已又孔子之告子貢亦曰豫一以貫之正文見後篇今以先儒注釋之語附此庶互相發云朱子曰一貫説見前篇然彼以行言而此以知言也謝氏曰聖人之道大矣人不能遍觀而盡識冝其以為多學而識之也然聖人豈務博者哉如天之於衆形非物物刻而雕之也故曰豫一以貫之德輶如毛毛猶有倫上天之載無聲無臭至矣尹氏曰孔子之於曽子不待其問而直告之以此曽子復深諭之曰唯若子貢則先發其疑而後告之而子貢終亦不能如曽子之唯也二子所學之淺深於此可見愚案夫子之於子貢屢有以發之而他人不與焉顔曽以下諸子所學之淺深又可見矣或問云云曰聖久生知不待多學子貢以己觀夫子故以為亦多學也夫子以一貫告之此雖聖人之事然因已以告子貢使知夫學者雖不可以不多學然必有所謂一以貫之然後為至耳蓋子貢之學固博矣然意其特於一事一物之中各有以知其理之當然而未能知夫萬理之為一理而廓然無所不通也若是者雖有以知夫衆理之所在而汛然莫為之統其處事接物之間有以處其所嘗學者而於其所未嘗學者則不能有以通也故其聞一則止能知二非以臆度而言則亦不能以屢中聖人以此告之使之知所謂衆理者本一理也以是而貫通之則天下事物之多皆不外乎是而無不通矣問謝氏謂如天於衆形非物物而雕刻之如何曰天只是一氣流行萬物自生自長自形自色豈是逐一粧點得如此聖人只是大本大原裏發出視自然明聼自然聰色自然溫貌自然恭在父子則為仁在君臣則為義從大本中流出便成許多道理只是這箇一便貫將去所主是忠發出去無非是恕又曰曽子是事實上做出子貢是就識見上得看來曽子從實處見一直透上去子貢雖是知得較似滯在知識上曽子是就原頭上面流下來子貢是就下面推上去南軒曰賜之學博矣夫子欲約之也故告以豫一以貫之使極夫體之所該用之所宗不至泛而無統也夫子之告子貢與告曽子理則一而告之之意則異也於參也所以達其至於賜也所以迪其歸二子所造蓋有淺深故所以告之之意不同然在教之當其可則一也問明道曰維天之命於穆不已不其忠乎天地變化草木蕃不其恕乎伊川曰乾道變化各正性命恕也侯子曰伊川説得尤有功天授萬物之謂命春生之冬藏之歲歲如是天未嘗一歲誤萬物也可謂忠矣萬物洪纎髙下長短各得其欲可謂恕矣某謂二先生之言不見有差殊其在萬物得其所以蕃生便是正性命不知侯子何以分輕重兼謂維天之命為天授萬物者恐此天命只是天理伊川所謂在天為命不必須是授之萬物始謂之命故又謂春生冬藏歲歲如是未嘗誤萬物為忠恐此亦只是恕蓋已發者也南軒答曰明道之言意固完具但伊川所舉各正性命之語為更有功忠體也恕用也體之而用未嘗不存其中用之所形體亦未嘗不具也以此愚玩味則見伊川言尤有功處侯子所説忠字恐未為得二先生之意天命且於理上推原未可只去一元之氣上看愚案學者或有以一貫萬為一貫者如此則是以己之一貫彼之萬雖聖人亦未免於有意且裂道與一為二也其可乎學者當味聖人之言曰吾道一以貫之而不曰以一貫之斯得之矣又曰此亦孔門傳授心法與告顔子克已復禮一也子曰君子喻於義小人喻於利喻猶曉也義者天理之所宜利者人情之所欲程子曰君子之於義猶小人之於利也唯其深喻是以篤好楊氏曰君子有舍生而取義者以利言之則人之所欲無甚於生所惡無甚於死孰肯舍生而取義哉其所喻者義而已不知利之為利故也小人反是或問喻字之義曰蓋心解通達則其幾微曲折無不盡矣曰然則君子小人之所喻者各為一事邪將一事之中具此兩端各隨人之所見邪曰是皆有之但君子深通於此而小人酷曉於彼耳曰對義言之則利為不善對害言之則利非不善君子之所為固非欲其不利何獨以喻利為小人乎曰胡氏言之悉矣胡氏曰義固所以為利也易所謂利者義之和者是也然自利言之則反致不奪不饜之害自義言之則蒙就義之利而逺於利之害矣孟子之告梁王意猶是也義利猶首尾然義者宜也君子見得這事合當如此那事合當如彼但裁處其宜為之則何不利之有君子只理會義一截利處更不理會小人只理會利一截義處更不問蓋君子之心虗明洞徹見得義分明小人只管計較雖絲毫底利也自理會得君子只知得當做與不當做當做處便是合當如此小人則只計較利害如此則利如此則害君子則更不顧利害只看天理如何問云云曰這只就眼前看只如做官須是廉勤自君子為之只是道合如此自小人為之只道如此做得人説好可以求知於人君子喻於義小人喻於利只是這一事上君子只見得是義小人只見得是利如伯夷見飴曰可以養老盜跖見之曰可以沃户樞蓋小人於利他見這一物便思量做一物用他計較精密更有非君子所能知者緣他氣質中有許多汙穢惡濁底物所以才見那物事便出來應他君子之於義亦是如此或曰伊川云唯其深喻是以篤好若作唯其篤好是以深喻亦得曰陸子靜説正如此案陸氏白鹿洞講義曰此章以義利判君子小人辭旨明白然讀之者苟不切己觀省亦恐未能有益也竊謂學者於此當辨其志人之所喻由其所習所習由其所志志乎義則所習必在於義所習在義斯喻於義矣志乎利則所習者必在於利所習在利斯喻於利矣學者之志不可不辨也愚案朱子曰義也者無所為而然者也此言蓋可廣前聖之未發而同於性善養氣之功者歟又案朱子曰義利之際固當深明而力辨然伊洛發明未接物時主敬一段工夫更須精進乃佳不爾或無所據以審夫義利之分也此説尤學者所當知子曰見賢思齊焉見不賢而內自省也省悉井反思齊者兾已亦有是善內自省者恐已亦有是惡胡氏曰見人之善惡不同而無不反諸身者則不徒羡人而甘自棄不徒責人而忘自責矣子曰事父母幾諫見志不從又敬不違勞而不怨此章與內則之言相表裏幾微也微諫所謂父母有過下氣怡色柔聲以諫也見志不從又敬不違所謂諫若不入起敬起孝恱則復諫也勞而不怨所謂與其得罪於鄉黨州閭寧熟諫父母怒不恱而撻之流血不敢疾怨起敬起孝也子曰父母在不逺遊遊必有方逺遊則去親逺而為日久定省曠而音問疏不惟己之思親不置亦恐親之念我不忘也遊必有方如已告云之東即不敢更適西欲親必知已之所在而無憂召已則必至而無失也范氏曰子能以父母之心為心則孝矣內則曰親在出不易方復不過時子曰三年無改於父之道可謂孝矣胡氏曰已見首篇此蓋復出而逸其半也子曰父母之年不可不知也一則以喜一則以懼知猶記憶也常知父母之年則既喜其夀又懼其衰而於愛日之誠自有不能已者子曰古者言之不出恥躬之不逮也言古者以見今之不然逮及也行不及言可恥之甚古者所以不出其言為此故也范氏曰君子之於言也不得已而後出之非言之難而行之難也人唯其不行也是以輕言之言之如其所行行之如其所言則出諸其口必不易矣南軒曰君子以行不逮言為恥故言不輕其出言之不輕則勉於躬行者為可知也夫子懼學者務於言而行有弗篤則趨於薄也故言古之學者如此子曰以約失之者鮮矣鮮上聲謝氏曰不侈然以自放之謂約尹氏曰凡事約則鮮失非止謂儉約也子曰君子欲訥於言而敏於行行去聲謝氏曰放言易故欲訥力行難故欲敏胡氏曰自吾道一貫至此十章疑皆曽子門人所記也胡氏曰言而能訥蓄德則固喻人則信謀事則密不訥者反是行而能敏遷善則速改過則勇應務則給不敏者反是夫敏與訥雖若出於天資然可習也言煩以訥矯之行緩以敏勵之由我而已不自變其氣質學豈有功哉子曰德不孤必有鄰鄰猶親也德不孤立必以類應故有德者必有其類從之如居之有鄰也南軒曰德立於己則衆善從之其為不孤蓋理之必然如善言之集良朋之來皆所謂有鄰也語其至則天下歸仁亦是也易敬義立而德不孤又是一義子遊曰事君數斯辱矣朋友數斯疏矣數色角反程子曰數煩數也胡氏曰事君諫不行則當去導友善不納則當止至於煩瀆則言者輕聽者厭矣是以求榮而反辱求親而反疏也范氏曰君臣朋友皆以義合故其事同也論語集編卷二
