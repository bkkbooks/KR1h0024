body:
  text: 欽定四庫全書孟子集編卷五宋真德秀撰滕文公章句上凡五章滕文公為世子將之楚過宋而見孟子世子太子也孟子道性善言必稱堯舜道言也性者人所稟於天以生之理也渾然至善未嘗有惡人與堯舜初無少異但衆人汩於私欲而失之堯舜則無私欲之蔽而能充其性爾故孟子與世子言每道性善而必稱堯舜以實之欲其知仁義不假外求聖人可學而至而不懈於用力也門人不能悉記其辭而撮其大旨如此程子曰性即理也天下之理原其所自未有不善喜怒哀樂未發何嘗不善發而中節即無往而不善發不中節然後為不善故凡言善惡皆先善而後惡言吉凶皆先吉而後凶言是非皆先是而後非世子自楚反復見孟子孟子曰世子疑吾言乎夫道一而已矣復扶又反夫音扶時人不知性之本善而以聖賢為不可企及故世子於孟子之言不能無疑而復來求見蓋恐别有卑近易行之説也孟子知之故但告之如此以明古今聖愚本同一性前言已盡無復有他説也成覸謂齊景公曰彼丈夫也我丈夫也吾何畏彼哉顔淵曰舜何人也豫何人也有為者亦若是公明儀曰文王我師也周公豈欺我哉覸古莧反成覸人姓名彼謂聖賢也有為者亦若是言人能有為則皆如舜也公明姓儀名魯賢人也文王我師也蓋周公之言公明儀亦以文王為必可師故誦周公之言而歎其不我欺也孟子既告世子以道無二致而復引此三言以明之欲世子篤信力行以師聖賢不當復求他説也今滕絶長補短將五十里也猶可以為善國書曰若藥不瞑眩厥疾不瘳瞑莫甸反眩音縣絶猶截也書商書説命篇瞑眩憒亂言滕國雖小猶足為治但恐安於卑近不能自克則不足以去惡而為善也愚案孟子之言性善始見於此而詳具於告子之篇然默識而旁通之則七篇之中無非此理其所以擴前聖之未發而有功於聖人之門程子之言信矣性善之説程朱盡之其曰性即理也乃自昔聖賢之所未言萬世言性之標準也朱謂七篇之中無非此意者如言仁義言四端蓋其大者也至於因齊王之愛牛而勸之以行王政亦因其性善而引之當道也見衍義滕定公薨世子謂然友曰昔者孟子嘗與我言於宋於心終不忘今也不幸至於大故吾欲使子問於孟子然後行事定公文公父也然友世子之傳也大故大喪也事謂喪禮然友之鄒問於孟子孟子曰不亦善乎親喪固所自盡也曽子曰生事之以禮死葬之以禮祭之以禮可謂孝矣諸侯之禮吾未之學也雖然吾嘗聞之矣三年之喪齊疏之服飦粥之食自天子逹於庶人三代共之齊音資疏所居反飦諸延反當時諸侯莫能行古喪禮而文公獨能以此為問故孟子善之又言父母之喪固人子之心所自盡者蓋悲哀之情痛疾之意非自外至冝乎文公于此有所不能自已也但所引曽子之言本孔子告樊遲者豈曽子嘗誦之以告其門人與三年之喪者子生三年然後免于父母之懷故父母之喪必以三年也齊衣下縫也不緝曰斬衰緝之曰齊衰疏粗也粗布也飦麋也喪禮三日始食粥既葬乃疏食此古今貴賤通行之禮也然友反命定為三年之喪父兄百官皆不欲曰吾宗國魯先君莫之行吾先君亦莫之行也至於子之身而反之不可且志曰喪祭從先祖曰吾有所受之也父兄同姓老臣也滕與魯皆文王之後而魯祖周公為長兄弟宗之故滕謂魯為宗國也然謂二國不行三年之喪者乃其後世之失非周公之法本然也志記也引志之言而釋其意以為所以如此者蓋為上世以來有所傳受雖或不同不可考也然志所言本謂先王之世舊俗所傳禮文小異而可以通行者耳不謂後世失禮之甚者也謂然友曰吾他日未嘗學問好馳馬試劔今也父兄百官不我足也恐其不能盡於大事子為我問孟子然友復之鄒問孟子孟子曰然不可以他求者也孔子曰君薨聽於冢宰啜粥面深墨即位而哭百官有司莫敢不哀先之也上有好者下必有甚焉者矣君子之德風也小人之德草也草尚之風必偃是在世子好為皆去聲復扶又反啜川恱反不我足謂不以我滿足其意也然者然其不我足之言不可他求者言當責之于已冢宰六卿之長也啜飲也深墨甚黑色也即就也尚加也論語作上古字通也偃仆也孟子言但在世子自盡其哀而已然友反命世子曰然是誠在我五月居廬未有命戒百官族人可謂曰知及至葬四方來觀之顔色之戚哭泣之哀弔者大恱諸侯五月而葬未葬居倚廬于中門之外居喪不言故未有命令教戒也可謂曰知疑有闕誤或曰皆謂世子之知禮也林氏曰孟子之時喪禮既壞然三年之喪惻隱之心痛疾之意出于人心之所固有者初未嘗亡也惟其溺于流俗之弊是以喪其良心而不自知耳文公見孟子而聞性善堯舜之説則固有以啓發其良心矣是以至此而哀痛之誠心發焉及其父兄百官皆不欲行則亦反躬自責悼其前行之不足以取信而不敢有非其父兄百官之心雖其資質有過人者而學問之力亦不可誣也及其斷然行之而逺近見聞無不恱服則以人心之所同然者自我發之而彼之心恱誠服亦有所不期然而然者人性之善豈不信哉三年之喪自唐虞三代未有改者春秋以來此禮廢矣滕文公用孟子之言欲行其禮則父兄百官譁然爭之及違衆而行又以為知禮何耶蓋以為不可行者蹈常襲故之陋見而以為知禮者秉彛好德之良心也夫欲報之德昊天罔極正雖終身之喪未足以紓無窮之悲其所以三年而止者特聖人立為中制使不可過焉耳而世降教失雖以東魯文獻之邦猶不能行何怪于滕之父兄乎然文公一以身先之則幡然而悟天理之在人心者固不可泯也自漢文帝率意變古始為易月之制然詳其遺詔蓋為吏民設景帝嗣君也乃冒用其文自短三年之制豈非萬世之罪人乎衍義滕文公問為國文公以禮聘孟子故孟子至滕而文公問之孟子曰民事不可緩也詩云晝爾于茅宵爾索綯亟其乘屋其始播百穀民事謂農事詩豳風七月之篇于往取也綯絞也亟急也乘升也播布也言農事至重人君不可以為緩而忽之故引詩言治屋之急如此者蓋以來春將復始播百榖而不暇為此也民之為道也有恆産者有恆心無恆産者無恆心苟無恆心放僻邪侈無不為己及陷乎罪然後從而刑之是罔民也焉有仁人在位罔民而可為也是故賢君必恭儉禮下取於民有制恭則能以禮接下儉則能取民以制陽虎曰為富不仁矣為仁不富矣陽虎陽貨魯季氏家臣也天理人欲不容並立虎之言此恐為仁之害于富也孟子引之恐為富之害于仁也君子小人每相反而已矣夏后氏五十而貢殷人七十而助周人百畝而徹其實皆什一也徹者徹也助者藉也此以下乃言制民常産與其取之之制也夏時一夫授田五十畝而每夫計其五畝之入以為貢商人始為井田之制以六百三十畝之地畫為九區區七十畝中為公田其外八家各授一區但借其力以助耕公田而不復稅其私田周時一夫授田百畝鄉遂用貢法十夫有溝都鄙用助法八家同井耕則通力合作收則計畝而分故謂之徹其實皆什一者貢法固以十分之一為常數惟助法乃是九一而商制不可考周制則公田百畝中以二十畝為廬舍一夫所耕公田實計十畝通私田百畝為十一分而取其一蓋又輕于十一矣竊料商制亦當似此而以十四畝為廬舍一夫實耕公田七畝是亦不過什一也徹通也均也藉借也龍子曰治地莫善於助莫不善於貢貢者校數歲之中以為常樂嵗粒米狼戾多取之而不為虐則寡取之凶年糞其田而不足則必取盈焉為民父母使民盻盻然將終歲勤動不得以養其父母又稱貸而益之使老稚轉乎溝壑惡在其為民父母也樂音洛盻五禮反從目從兮或音普莧反者非養去聲惡平聲龍子古賢人狼戾猶狼藉言多也糞擁也盈滿也盻恨視也勤動勞苦也稱舉也貸借也取物于人而出息以償之也益之以足取盈之數也稚幼子也夫世祿滕固行之矣孟子嘗言文王治岐耕者九一仕者世祿二者王政之本也今世祿滕已行之惟助法未行故取于民者無制耳蓋世祿者授之土田使之食其公田之入實與助法相為表裏所以使君子小人各有定業而上下相安者也故下文遂言助法詩云雨我公田遂及我私惟助為有公田由此觀之雖周亦助也詩小雅大田之篇雨降雨也言願天雨于公田而遂及私田先公而後私也當時助法盡廢典籍不存惟有此詩可見周亦用助故引之也設為庠序學校以教之庠者養也校者教也序者射也夏曰校殷曰序周曰庠學則三代共之皆所以明人倫也人倫明於上小民親於下庠以養老為義校以教民為義序以習射為義皆鄉學也學國學也共之無異名也倫序也父子有親君臣有義夫婦有别長幼有序朋友有信此人之大倫也庠序學校皆以明此而已有王者起必來取法是為王者師也滕國褊小雖行仁政未必能興王業然為王者師則雖不有天下而其澤亦足以及天下矣聖賢至公無我之心于此可見詩云周雖舊邦其命維新文王之謂也子力行之亦以新子之國詩大雅文王之篇言周雖后稷以來舊為諸侯其受天命而有天下則自文王始也子指文公諸侯未踰年之稱也使畢戰問井地孟子曰子之君將行仁政選擇而使子子必勉之夫仁政必自經界始經界不正井地不均穀祿不平是故暴君汙吏必慢其經界經界既正分田制祿可坐而定也畢戰滕臣文公因孟子之言而使畢戰主為井地之事故又使之來問其詳也井地即井田也經界謂治地分田經畫其溝塗封植之界也此法不修則田無定分而豪強得以兼并故井地有不均賦無定法而貪暴得以多取故穀祿有不平此欲行政者之所以必從此始而暴君汙吏則必欲慢而廢之也有以正之則分田制祿可不勞而定矣夫滕壤地褊小將為君子焉將為野人焉無君子莫治野人無野人莫養君子言滕地雖小然其間亦必有為君子而仕者亦必有為野人而耕者是以分田制祿之法不可偏廢也請野九一而助國中什一使自賦此分田制祿之常法所以治野人使養君子也野郊外都鄙之地也九一而助為公田而行助法也國中郊門之內鄉遂之地也田不井授但為溝洫使什而自賦其一蓋用貢法也周所謂徹法者蓋如此以此推之當時非惟助法不行其貢亦不止什一矣卿以下必有圭田圭田五十畝此世祿常制之外又有圭田所以厚君子也圭潔也所以奉祭祀也不言世祿者滕已行之但此未備耳餘夫二十五畝程子曰一夫上父母下妻子以五口八口為率受田百畝如有弟是餘夫也年十六别受田二十五畝俟其壯而有室然後更受百畝之田愚案此百畝常制之外又有餘夫之田所以厚野人也死徙無出鄉鄉田同井出入相友守望相助疾病相扶持則百姓親睦死謂葬也徙謂徙其居也同井者八家也友猶伴也守望防冠盜也方里而井井九百畝其中為公田八家皆私百畝同養公田公事畢然後敢治私事所以别野人也此詳言井田形體之制乃周之助法也公田以為君子之祿而私田野人之所受先公後私所以别君子野人之分也不言君子據野人而言省文耳上言野及國中二法此獨詳于治野者國中貢法當世已行但取之過于什一耳此其大略也若夫潤澤之則在君與子矣井地之法諸侯皆去其籍此特其大略而已潤澤謂因時制宜使合于人情冝于土俗而不失乎先王之意也呂氏曰子張子慨然有意三代之治論治人先務未始不以經界為急講求法制粲然具備要之可以行于今如有用我者舉而措之耳嘗曰仁政必自經界始貧富不均教養無法雖欲言治皆苟而已世之病難行者未始不以亟奪富人之田為辭然兹法之行恱之者衆苟處之有術期以數年不刑一人而可復所病者特上之未行耳乃言曰縱不能行之天下猶可驗之一鄉方與學者議古之法買田一方畫為數井上不失公家之賦役退以其私正經界分宅里立斂法廣儲蓄興學校成禮俗救災恤患厚本抑末足以推先王之遺法明當今之可行有志未就而卒愚案喪禮經界兩章見孟子之學識其大者是以雖當禮法廢壞之後制度節文不可復考而能因略以致詳推舊而為新不屑屑于既往之迹而能合乎先王之意真所謂命世亜聖之才矣有為神農之言者許行自楚之滕踵門而告文公曰逺方之人聞君行仁政願受一廛而為氓文公與之處其徒數十人皆衣褐捆屨織席以為食衣去聲捆音閫神農炎帝神農氏始為耒耜教民稼穡者也為其言者史遷所謂農家者流也許姓行名也踵門足至門也仁政上章所言井地之法也廛民所居也氓野人之稱褐毛布賤者之服也捆扣㧻之欲其堅也以為食賣以供食也程子曰許行所謂神農之言乃後世稱述上古之事失其義理者耳猶隂陽醫方稱黃帝之説也陳良之徒陳相與其弟辛負耒耜而自宋之滕曰聞君行聖人之政是亦聖人也願為聖人氓陳良楚之儒者耜所以起土耒其柄也陳相見許行而大恱盡棄其學而學焉陳相見孟子道許行之言曰滕君則誠賢君也雖然未聞道也賢者與民並耕而食饔飱而治今也滕有倉廩府庫則是厲民而以自養也惡得賢饔音雍飧音孫惡平聲饔飱熟食也朝曰饔夕曰飱言當自炊㸑以為食而兼治民事也厲病也許行此言蓋欲隂壞孟子分别君子野人之法孟子曰許子必種粟而後食乎曰然許子必織布而後衣乎曰否許子衣褐許子冠乎曰冠曰奚冠曰冠素曰自織之與曰否以粟易之曰許子奚為不自織曰害於耕曰許子以釡甑㸑以鐵耕乎曰然自為之與曰否以粟易之衣去聲與平聲釡所以煮甑所以炊㸑然火也鐵耜屬也此語八反皆孟子問而陳相對也以粟易械器者不為厲陶冶陶冶亦以其械器易粟者豈為厲農夫哉且許子何不為陶冶舍皆取諸其宮中而用之何為紛紛然與百工交易何許子之不憚煩曰百工之事固不可耕且為也舍去聲此孟子言而陳相對也械器釡甑之屬也陶為甑者冶為釡鐵者舍止也或讀屬上句舍作陶冶之處也然則治天下獨可耕且為與有大人之事有小人之事且一人之身而百工之所為備如必自為而後用之是率天下而路也故曰或勞心或勞力勞心者治人勞力者治於人治於人者食人治人者食於人天下之通義也與平聲食音嗣此以下皆孟子言也路謂奔走道路無時休息也治于人者見治于人也食人者出賦稅以給公上也食于人者見食于人也此四句皆古語而孟子引之也君子無小人則飢小人無君子則亂正如農夫陶冶以粟與械器相易乃所以相濟而非所以相病也治天下者豈必耕且為哉當堯之時天下猶未平洪水橫流汜濫於天下草木暢茂禽獸繁殖五穀不登禽獸逼人獸蹄鳥迹之道交於中國堯獨憂之舉舜而敷治焉舜使益掌火益烈山澤而焚之禽獸逃匿禹疏九河瀹濟漯而注諸海決汝漢排淮泗而注之江然後中國可得而食也當是時也禹八年於外三過其門而不入雖欲耕得乎瀹音藥濟子禮反漯他合反天下猶未平者洪荒之世生民之害多矣聖人迭興漸次除治至此尚未盡平也洪大也橫流不由其道而散溢妄行也汜濫橫流之貌暢茂長盛也繁殖衆多也五穀稻黍稷麥菽也登成熟也道路也獸蹄鳥迹交于中國言禽獸多也敷布也益舜臣名烈熾也禽獸逃匿然後禹得施治水之功疏通也分也九河曰徒駭曰太史曰馬頰曰覆釡曰胡蘇曰簡曰潔曰鉤盤曰鬲津瀹亦疏通之意濟漯二水名決排皆去其壅塞也汝漢淮泗亦皆水名也據禹貢及今水路惟漢水入江耳汝泗則入淮而淮自入海此謂四水皆入于江記者之誤也后稷教民稼穡樹藝五穀五穀熟而民人育人之有道也飽食暖衣逸居而無教則近於禽獸聖人有憂之使契為司徒教以人倫父子有親君臣有義夫婦有别長幼有序朋友有信舜典帝之咨契曰百姓不親五品不遜女作司徒敬敷五教在寬春秋傳亦曰舜舉八元使布五教于四方父義母慈兄友弟恭子孝孟子所稱即其事也當舜之時既命后稷教民稼穡五穀既熟有以養民之生矣養而不教則民不知義又何以别于禽獸哉人之有道謂其各有秉彛之性也父子之親君臣之義夫婦之别長幼之序朋友之信皆人性所自有舜之命官敷教亦因其有而導之耳非強之以所無也衍義放勳曰勞之來之匡之直之輔之翼之使自得之又從而振德之聖人之憂民如此而暇耕乎契音薛别彼列反長放皆上聲勞來皆去聲言水土平然後得以教稼穡衣食足然後得以施教化后稷官名棄為之然言教民則亦非並耕矣樹亦種也藝殖也契亦舜臣名也司徒官名也人之有道言其皆有秉彛之性也然無教則亦放逸怠惰而失之故聖人設官而教以人倫亦因其固有者而道之耳書曰天敘五典敕我五典五敦哉此之謂也放勳本史臣贊堯之辭孟子因以為堯號也德猶惠也堯言勞者勞之來者來之邪者正之枉者直之輔以立之翼以行之使自得其性矣又從而提撕警覺以加惠焉不使其放逸怠惰而或失之蓋命契之辭也堯以不得舜為己憂舜以不得禹臯陶為己憂夫以百畝之不易為己憂者農夫也易治也堯舜之憂民非事事而憂之也急先務而己所以憂民者其大如此則不惟不暇耕而亦不必耕矣分人以財謂之惠教人以善謂之忠為天下得人者謂之仁是故以天下與人易為天下得人難為易並去聲分人以財小惠而已教人以善雖有愛民之實然其所及亦有限而難久惟若堯之得舜舜之得禹臯陶乃所謂為天下得人者而其恩惠廣大教化無窮矣此其所以為仁也孔子曰大哉堯之為君惟天為大惟堯則之蕩蕩乎民無能名焉君哉舜也巍巍乎有天下而不與焉堯舜之治天下豈無所用其心哉亦不用於耕耳與去聲則法也蕩蕩廣大之貌君哉言盡君道也巍巍髙大之貌不與猶言不相關言其不以位為樂也吾聞用夏變夷者未聞變於夷者也陳良楚産也恱周公仲尼之道北學於中國北方之學者未能或之先也彼所謂豪傑之士也子之兄弟事之數十年師死而遂倍之此以下責陳相倍師而學許行也夏諸夏禮義之教也變夷變化蠻夷之人也變于夷反變化于蠻夷之人也産生也陳良生于楚在中國之南故北逰而學于中國也先過也豪傑才德出衆之稱言其能自拔于流俗也倍與背同言陳良用夏變夷陳相變于夷也昔者孔子沒三年之外門人治任將歸入揖於子貢相嚮而哭皆失聲然後歸子貢反築室於場獨居三年然後歸他日子夏子張子遊以有若似聖人欲以所事孔子事之強曽子曽子曰不可江漢以濯之秋陽以暴之皓皓乎不可尚已任平聲強上聲暴蒲木反皓音杲三年古者為師心喪三年若喪父而無服也任擔也場冡上之壇場也有若似聖人蓋言其言行氣象有似之者如檀弓所記子遊謂有若之言似夫子之類是也所事孔子所以事夫子之禮江漢水多言濯之潔也秋日燥烈言暴之乾也皓皓潔白貌尚加也言夫子道德明著光輝潔白非有若所能倣佛也或曰此三語者孟子贊美曽子之辭也自性與天道而下數章見子貢學力之進如此朱子曰顔子而下穎悟莫如子貢左氏傳邾隱公來朝子貢觀焉見二公執玉之髙卑而知其將死亡曰髙仰驕也卑俯替也驕近亂替近疾君為主其先乎既而皆如其言孔子曰賜不幸而言中是使賜多言也與論語億則屢中合故附此又史記曰子貢利口巧辭孔子嘗黜其辨又載其説齊田常事曰子貢一出存魯亂齊破吳強晉而伯越蘇氏曰此戰國説客設為子貢之辭以自託于孔氏而太史公信之耳孔子有言誦詩三百授之以政不達使于四方不能専對雖多亦奚以為孔門所謂言語者僅止于此至于子貢加之以巧辨可以解紛結救患難而已若如公孫衍張儀騁其詭辨傾覆諸侯以快意一時此則孔門所諱也今也南蠻鵙舌之人非先王之道子倍子之師而學之亦異於曽子矣鵙亦作鵙古役反鵙博勞也惡聲之鳥南蠻之聲似之指許行也吾聞出於幽谷遷於喬木者未聞下喬木而入於幽谷者小雅伐木之詩云伐木丁丁鳥鳴嚶嚶出自幽谷遷于喬木魯頌曰戎狄是膺荆舒是懲周公方且膺之子是之學亦為不善變矣魯頌閟宮之篇也膺擊也荆楚本號也舒國名近楚者也懲艾也案今此詩為僖公之頌而孟子以周公言之亦斷章取義也從許子之道則市賈不二國中無偽雖使五尺之童適市莫之或欺布帛長短同則賈相若麻縷絲絮輕重同則賈相若五穀多寡同則賈相若屨大小同則賈相若賈音價下同陳相又言許子之道如此蓋神農始為市井故許行又托于神農而有是説也五尺之童言幼小無知也許行欲使市中所粥之物皆不論精粗美惡但以長短輕重多寡大小為價也曰夫物之不齊物之情也或相倍蓰或相什伯或相千萬子比而同之是亂天下也巨屨小屨同賈人豈為之哉從許子之道相率而為偽者也惡能治國家夫音扶蓰音師又山綺反比必二反惡平聲倍一倍也蓰五倍也什伯千萬皆倍數也比次也孟子言物之不齊乃其自然之理其有精粗猶其有大小也若大屨小屨同價則人豈肯為其大者哉今不論精粗使之同價是使天下之人皆不肯為其精者而競為濫惡之物以相欺耳南軒曰許行之説初若淺近而乃盛行于時其所以能動人者蓋其人亦清苦髙介之士逺慕古初而燭理不明見世有神農之説不知其為後世傳習之謬則從所祖述之以為農者天下之本善為治者必使斯民盡力于農而人君必力耕以先之不當使民勞而已逸以為是乃以道治天下而非後世所及此其説若髙而有以惑人者也樊遲請學稼微夫子救之蓋亦幾陷于此矣夫帝王之道如長江大逵無往而不達者以其達天之理故耳異端之説如斷港荒蹊卒歸于不可行者以其私意之所為故耳又曰陳相言許行之説以謂使其説行其效可使天下反于淳朴凡天下之物皆可齊也嗟乎豈有此理哉有天地則有萬物其巨細多寡髙下美惡之不齊乃物之情而實天之理也物各付物止于其所吾何加損于其間哉故莊周之齊物強欲以理齊之猶為賊夫道況乎許子遂欲一天下之物而泯其一定之分其蔽豈不甚矣哉孟子曰夫物之不齊物之情也斯兩言也足以發明天下之大不但可以闢許行而莊周之説併可坐見其偏矣故曰從許子之道相率而為偽者也強使巨者細多者寡髙者下美者惡豈非相率而為偽乎墨者夷之因徐辟而求見孟子孟子曰吾固願見今吾尚病病愈吾且往見夷子不來辟音璧又音闢墨者治墨翟之道者夷姓之名徐辟孟子弟子孟子稱疾疑亦託辭以觀其意之誠否他日又求見孟子孟子曰吾今則可以見矣不直則道不見我且直之吾聞夷子墨者墨之治喪也以薄為其道也夷子思以易天下豈以為非是而不貴也然而夷子葬其親厚則是以所賤事親也不見之見音現又求見則其意已誠矣故因徐辟以質之如此直盡言以相正也莊子曰墨子生不歌死無服桐棺三寸而無椁是墨之治喪以薄為道也易天下謂移易天下之風俗也夷子學于墨氏而不從其教其心必有所不安者故孟子因以詰之徐子以告夷子夷子曰儒者之道古之人若保赤子此言何謂也之則以為愛無差等施由親始徐子以告孟子孟子曰夫夷子信以為人之親其兄之子為若親其鄰之赤子乎彼有取爾也赤子匍匐將入井非赤子之罪也且天之生物也使之一本而夷子二本故也夫音扶下同匍音蒲匐蒲北反若保赤子周書康誥篇文此儒者之言也夷子引之蓋欲援儒而入于墨以拒孟子之非己又曰愛無差等施由親始則推墨而附于儒以釋已所以厚葬其親之意皆所謂遁辭也孟子言人之愛其兄子與鄰之子本有差等書之取譬本謂小民無知而犯法如赤子無知而入井耳且人物之生必各本于父母而無二乃自然之理若天使之然也故其愛由此立而推以及人自有差等今如夷子之言則是視其父母本無異于路人但其施之之序姑自此始耳非二本而何哉然其于先後之間猶知所擇則又其本心之明有終不得而息者此其所以卒能受命而自覺其非也蓋上世嘗有不葬其親者其親死則舉而委之於壑他日過之狐狸食之蠅蚋姑嘬之其顙有泚睨而不視夫泚也非為人泚中心達於面目蓋歸反虆梩而掩之掩之誠是也則孝子仁人之掩其親亦必有道矣蚋音汭嘬楚怪反泚七禮反睨音詣為去聲虆力追反梩力知反因夷子厚葬其親而言此以深明一本之意上世謂太古也委棄也壑山水所趨也蚋蚊屬姑語助聲或曰螻蛄也嘬攢共食之也顙額也泚泚然汗出之貌睨邪視也視正視也不能不視而又不忍正視哀痛迫切不能為心之甚也非為人泚言非為他人見之而然也所謂一本者于此見之尤為親切蓋惟至親故如此在他人則雖有不忍之心而其哀痛迫切不至若此之甚矣反覆也虆土籠也梩土舉也于是歸而掩覆其親之尸此葬理之禮所由起也此掩其親者若所當然則孝子仁人所以掩其親者必有其道而不以薄為貴矣徐子以告夷子夷子憮然為間曰命之矣憮音武間如字憮然茫然自失之貌為間者有頃之間也命猶教也言孟子已教我矣蓋因其本心之明以攻其所學之蔽是以吾之言易入而彼之惑易解也南軒曰仁莫大于愛親其達之天下皆是心之所推也故其等差輕重莫不有别焉此仁義之道所以相為體用也若夫愛無差等則是無義也無義則亦害夫仁之體矣以失其所以為本之一故也故孟子于墨氏之説所以深闢之而發二本之論也孟子集編卷五
