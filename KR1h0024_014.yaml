body:
  text: 欽定四庫全書論語集編卷九宋真徳秀撰陽貨第十七凡二十六章陽貨欲見孔子孔子不見歸孔子豚孔子時其亡也而往拜之遇諸塗歸如字一作饋陽貨季氏家臣名虎嘗囚季桓子而專國政欲令孔子來見已而孔子不往貨以禮大夫有賜於士不得受於其家則往拜其門故矙孔子之亡而歸之豚欲令孔子來拜而見之也謂孔子曰來予與爾言曰懷其寳而迷其邦可謂仁乎曰不可好從事而亟失時可謂知乎曰不可日月逝矣嵗不我與孔子曰諾吾將仕矣好亟知並去聲懷寳迷邦謂懷藏道徳不救國之危亂亟數也失時謂不及事㡬之㑹將者且然而未必之辭貨語皆譏孔子而諷使速仕孔子固未嘗如此而亦非不欲仕也但不仕於貨耳故直據理答之不復與辯若不諭其意者陽貨之欲見孔子雖其善意不過欲使助已為亂耳故孔子不見者義也其往拜者禮也必時其亡而往拜者欲其穪也遇諸塗而不避者不終絶也随問而對者理之直也對而不辯者言之孫而亦無所詘也楊氏曰楊雄謂孔子於陽貨也敬所不敬為詘身以信道非知孔子者葢道外無身身外無道身詘矣而可以信道吾未之信也或問首章之説曰觀夫子所以告微生畝與夫告長沮桀溺之語則聖人之自言未響不正其理而明辨之也至於告陽貨則隨其所問應答如響而略無自明之意則亦見陽貨之暴冇不足告而姑孫辭以答之然味其言則亦無非義理之正與其中心之實然者則是初亦未嘗詘也胡張之説善矣胡氏曰楊氏謂孔子於陽貨為詘身以信道維之意葢以身與道為二物也是以其自為也黽勉賢莾之閒而擬論語周易以自附於夫子豈不謬哉南軒曰聖人之待惡人言雖遜而理未嘗枉他人孫言則或至於害理直理則或至於犯害惟聖人則從容酬酢而自然中節也黄氏曰曰月逝矣嵗不我與此陽貨之言集注所謂諷使速仕亦謂是也其語意葢謂夫子既老可以有為日月已過矣嵗運而往其去甚速豈復與我而為我少緩乎是亦諷使速仕也學者於此章固當因是以得聖人待惡人之道又當知聖人之言動從容中節如此者葢道全徳備義精仁熟如化工生物皆自然而然有志於學者不可以不勉也案夫子之見陽貨葢待小人之道也今以易論語孟子數條附此遯象曰天下有山遯君子以逺小人不惡而嚴傳曰天下有山山下趨而乃止天上進而相違是遯避之象也君子觀其象以避逺乎小人逺小人之道若以惡聲厲色適足以致其怨忿唯在乎矜莊威嚴使知敬畏則自然逺矣朱子曰天體無窮山髙有限遯之象也嚴者君子自守之常而小人自不能近睽初九見惡人旡咎傳曰當睽之時雖同徳者相與然小人乖異者衆若棄絶之不㡬盡天下以讎君子乎如此則失含洪之意致凶咎之道也又豈不能化不善而使之合乎故必見惡人則旡咎也古之聖王所以化姦凶為善良革讎敵為臣民者由復絶也朱子曰必見惡人然後可以避咎若孔子之於陽貨也又王孫賈問曰與其媚於奥寧媚於竈何謂也子曰獲罪如天無所禱也朱子曰王孫賈衛大夫媚親順也室西南隅為奥竈者五祀之一夏所祭也凡祭五祀皆設主而祭於其所然後迎尸而祭於奥略祭如宗廟之儀如祀竈則設主於竈陘祭畢而更設饌於奥以迎尸也故時俗之語因以奥有常尊而非祭之主竈雖卑賤而當時用事喻自結於君不如阿附懽臣也故以諷孔子孔子云云葢天即理也其尊無對非奥竈之可比也逆理則獲罪於天矣豈媚於奥竈所能免乎謝氏曰聖人之言遜而不迫使王孫賈而知此意不為無益使其不知亦非所以取禍子見南子子路不悦夫子矢之曰予所否者天厭之天厭之朱子曰南子衞靈公之夫人有淫行孔子至衞南子請見孔子辭謝不得已而見之盖古者仕於其國有見其小君之禮而子路以夫子見此淫亂之人為辱故不悦矢誓也所誓辭也如云所不與崔慶者之類否謂不合於禮不由其道也厭棄絶也聖人道大德全無可不可其見惡人固謂在我有可見之禮則彼之不見我何與焉然此豈子路所能測哉故重言以誓之欲其姑信此而深思以得之也或問夫子之見南子何也曰案史記孔子至衞南子使人謂孔子曰四方之君子不辱欲與寡君為兄弟者必見寡小君寡小君願見孔子辭謝不得已而見之也曰仕於其國而見其小君禮與曰是於禮無所見榖梁子盖以為大夫不見夫人而何休獨有郊迎執贄之説不知其何所攷也然禮家又謂陽侯殺繆侯而竊其夫人故大饗廢夫人之禮而使人攝焉則是大夫雖或有見小君之禮疑亦乆已不行於世而靈公南子特舉之耳曰南子既非正適且以淫亂聞於諸侯而是禮也又非當世之所常行者則夫子曷為而不辭也曰南子之行則醜矣然其願見盖亦有善意焉且衞君既以夫人而已將仕於其國則所謂禮從冝事從俗者其亦有所不得已焉者矣又况聖人道隆德盛雖磨而不磷雖湼而不緇亦何為拘拘翦翦於此而避一見之嫌乎曰子路之不悦也不告以可見之理而誓之何也曰曽氏言之得矣曽氏曰見南子過物之行子路不悦非常談所能暁故誓之如此孟子為卿於齊出弔於滕王使蓋大夫王驩為輔行王驩朝暮見反齊滕之路未嘗與之言行事也公孫丑曰齊卿之位不為小矣齊滕之路不為近矣反之而未嘗與言行事何也曰夫既或治之予何言哉朱子曰王驩齊嬖臣也輔行副使也驩蓋攝卿以行故曰齊卿夫既或治之言有司已治之矣孟子之待小人不惡而嚴如此樂正子從於子敖之齊子敖驩字孟子謂樂正子曰子之從於子敖來徒餔啜也我不意子學古之道而以餔啜也此乃正其罪而切責之言其不擇所從但求食耳公行子有子之喪右師往弔入門有進而與右師言者有就右師之位而與右師言者公行子齊夭夫右師王滕也孟子不輿右師言右師不悦曰諸君子皆與驩言孟子獨不與驩言是簡驩也孟子聞之曰禮朝廷不厯位而相與言不踰階而相揖也我欲行禮子敖以我為簡不亦異乎朱子曰是時齊卿大夫以君命弔各有位次若周禮凡有爵者之喪禮則職喪涖其禁令序其事故云朝廷也云云南軒曰王驩齊之嬖卿也有進而與言者有就位而與言者葢以其嬖於君而諂之也孟子獨不與言者道固然也右師不悦而以為簡已者盖孟子為時之所尊驩雖小人亦幸其少假色是以望之於此而以不我顧為簡也孟子獨舉朝廷之禮以為言何其正大而不廹與盖君子之動無非禮也朝廷不厯位而相與言不踰階而相揖此禮也君子行禮故常履安地而有餘裕他人不由禮則自陷於險艱而已所謂小人不惡而嚴者豈有他哉亦曰禮而已矣禮之所在何有於我哉或者勸伊川先生以加禮貴近先生曰獨不勸以盡禮而勸以加禮乎禮盡處豈容有加此孟子之意也唐王毛仲置酒聞宋璟之名而欲致之明皇勑使璟往至則北望再拜謝恩而稱疾以退璟亦可謂正矣然毛仲君之厮役也往赴其集義何居乎若璟聞命而引義以陳則為盡善矣愚案遯睽之義既殊孔孟之行亦異然徳未至於聖學未可與懽則遯之逺小人孟子之待王驩其正法也昔冇問和靖先生曰子見南子子路不悦何也先生曰聖人所為賢人自不能測又問不知先生見南子否曰不敢見曰何故不見曰待某磨不磷湼不緇雖佛肸召亦往况南子乎由是觀之孟子可謂善學孔子者矣後世惟宋廣平之於楊思勉伊川先生之於張茂則皆庶幾有孟子之風焉士大夫居官立朝不免與近習接者當以此為法不然則未有不陷焉者也又易史九二壯于頄有凶君子史史獨行遇雨若濡有愠无咎夫子以愠矯之於王敦譬之此又别為一義雖非平時待小人之正法然處變而不失其正亦學者所當知其詳見於本義子曰性相近也習相逺也此所謂性兼氣質而言者也氣質之性固有美惡之不同矣然以其初而言則皆不甚相逺也但習於善則善習於惡則惡於是始相逺耳程子曰此言氣質之性非言性之本也若言其本則性即是理理無不善孟子之言性善是也何相近之有哉或問氣質之性何也曰天地之所以生物者理也其生物者氣與質也人物得是氣質以成形而其理之在是者則謂之性然所謂氣質者有偏正純駁昬明厚薄之不齊故性之在是者其為品亦不一所謂氣質之性者告子所謂生之謂性程子所謂生質之性所謂才者皆謂是也然其木然定理則純粹至善而已所謂天地之性者也孟子所謂性善程子所謂性之本所謂探本窮原之性皆謂此也若夫子此章論性而以相近而言則固指夫氣質而言之矣子曰惟上知與下愚不移知去聲人之氣質相近之中又有美惡一定而非習之所能移者程子曰人性本善有不可移者何也語其性則皆善也語其才則有下愚之不移所謂下愚有二焉自暴自棄也人茍以善自治則無不可移雖昬愚之至皆可漸磨而進也惟自暴者拒之以不信自棄者絶之以不為雖聖人與居不能化而入也仲尼之所謂下愚也然其質非必昬且愚也往往彊戾而才力有過人者商辛是也聖人以其自絶於善謂之下愚然考其歸則誠愚也或問云云然則終不可移他邪曰以聖人之言觀之則曰不移而已不曰不可移也以程子之言攷之則曰以其不肯移而後不可移耳蘇氏説但泛言人材之短長瑕瑜未曽言狂恫之可移也如柴參亦不當以下愚例論葢不移二字是承上知下愚兩端而言不當專以下愚論之盖上知者知之上非尋常之知下愚者亦非尋常之愚也知之上者固不可移而之惡矣愚之下者雖有可移之理而無肯移之心則亦終於不可移而已故曰攷其歸則誠愚也子之武城聞弦歌之聲弦琴瑟也時子游為武城宰以禮樂為教故邑人皆弦歌也夫子莞爾而笑曰割雞焉用牛刀莞華版反焉於䖍反莞爾小笑貎盖喜之也因言其治小邑何必用此大道也子游對曰昔者偃也聞諸夫子曰君子學道則愛人小人學道則易使也易去聲君子小人以位言之子游所稱盖夫子之常言言君子小人皆不可以不學故武城雖小亦必教以禮樂子曰二三子偃之言是也前言戲之耳嘉子游之篤信又以解門人之惑也治有大小而其治之必用禮樂則其為道一也但衆人多不能用而子游獨行之故夫子驟聞而深喜之因反其言以戲之而子游以正對故復是其言而自實其戯也公山弗擾以費畔召子欲往弗擾季氏宰與陽虎共執桓子據邑以叛子路不説曰末之也已何必公山氏之之也説音悦末無也言道既不行無所往矣何必公山氏之往乎子曰夫召我者而豈徒哉如有用我者吾其為東周乎夫音扶豈徒哉言必用我也為東周言興道於東方程子曰聖人以天下無不可冇為之人亦無不可改過之人故欲往然而終不往者知其必有不能改故也或問云云曰蘇氏得之蘇氏曰孔子不助畔人天下所知畔而召孔子其志必不在於惡矣故孔子因其有善心而收之不自絶而已弗擾之不能為東周亦明矣然而用孔子則有可以為東周之道故子欲往者以其有是道也卒不往者知其必不能也南軒曰弗擾不稟命於君而叛其大夫逆也欲以是克亂是以亂易亂而又加甚耳後世亂臣賊子所以借虚名為篡奪之計者多出於此夫子豈以是而欲往邪子張問仁於孔子孔子曰能行五者於天下為仁矣請問之曰恭寛信敏惠恭則不侮寛則得衆信則人任焉敏則有功惠則足以使人行是五者則心存而理得矣於天下言無適而不然猶所謂雖之夷狄不可棄者五者之目盖因子張所不足而言耳任倚杖也又言其效如此張敬夫曰能行此五者於天下則其心公平而周徧可知矣然恭其本與佛肸召子欲往佛音弼肸許宻反佛肸晉大夫趙氏之中牟宰也子路曰昔者由也聞諸夫子曰親於其身為不善者君子不入也佛肸以中牟畔子之往也如之何子路恐佛肸之浼夫子故問此以止夫子之行親猶自也不入不入其黨也子曰然有是言也不曰堅乎磨而不磷不曰白乎湼而不緇磷力刃反湼乃結反磷薄也湼染皁物言人之不善不能浼已楊氏曰磨不磷湼不緇而後無可無不可堅白不足而欲自試於磨湼其不磷緇也者幾希吾豈匏𤓰也哉焉能繫而不食焉於䖍反匏瓠也匏𤓰繫於一處而不能飲食人則不如是也南軒曰子路昔者之所聞君子守身之常法夫子今日之所言聖人體道之大權也然夫子於公山佛肸之召皆欲往者以天下無不可變之人無不可為之事也其卒不往者知其人之終不可變而事之終不可為耳一則生物之仁一則知人之智也或問云云曰張敬夫明楊氏之説其意亦善曰子路盖不悦公山之召矣及此而後有言者則以中心所疑雖聞聖人之言而自反終不能安故問以辨之而不敢釋亦可謂善學矣然其不悦者葢以觀聖人而未知以聖人觀聖人耳黄氏曰匏𤓰繫而不食盖言匏𤓰蠢然一物繫則不能動不食則無所知吾乃人類在天地閒能動作有思慮自當見之於用而有益於人豈微物之比哉世之奔走以餬其口於四方者往往借是言以自况失聖人之㫖矣子曰由也女聞六言六蔽矣乎對曰未也女音汝下同蔽遮掩也居吾語女語去聲禮君子問更端則起而對故孔子諭子路使還坐而告之好仁不好學其蔽也愚好知不好學其蔽也蕩好信不好學其蔽也賊好直不好學其蔽也絞好勇不好學其蔽也亂好剛不好學其蔽也狂好知並去聲六言皆美德然徒好之而不學以明其理則各有所蔽愚若可陷可罔之類蕩謂窮髙極廣而無所止賊謂傷害於物勇者剛之發剛者勇之體狂躁率也范氏曰子路勇於為善其失之者未能好學以明之也故告之以此曰勇曰剛曰信曰直又皆所以救其偏也南軒曰學所以明善也不知學則徒慕其名而莫知善之所以為善矣好仁不好學則徒欲博愛而不知所施之先後故其蔽愚好知不好學則用其聦明而不知約言所在故其蔽蕩好信不好學則守其小諒而不知義之所存故其蔽賊好直不好學則務徑情而不知含蓄故其蔽絞絞者訐而已好勇不好學則犯難而不知止故其蔽亂好剛不好學則務勝而不知反故其蔽狂是六者本為達德善行然而不好學則非所以為德行而反以自蔽學如行大道四闢而通不學如守暗室終窒而蔽矣子曰小子何莫學夫詩夫音扶小子弟子也詩可以興感發志意可以觀考見得失可以羣和而不流可以怨怨而不怒邇之事父逺之事君人倫之道詩無不備二者舉重而言多識於鳥獸草木之名其緒餘又足以資多識學詩之法此章盡之讀是經者所宜盡心也謝氏曰詩吟詠情性善感發人使人易直子諒之心易以生故可以興得性情之正無所固滯則閲理自明故可以觀心平氣和於物無競故可以羣優游不迫雖怨而不怒也無鄙倍心故可以怨黄氏曰可以觀謂可以攷見已之得失也子謂伯魚曰女為周南召南矣乎人而不為周南召南其猶正牆面而立也與女音汝與平聲為猶學也周南召南詩首篇名所言皆修身齊家之事正牆面而立言即其至近之地而一物無所見一步不可行或問二南何以為詩之首篇也曰周南之詩言文王后妃閹門之化召南之詩言諸侯之國夫人大夫妻被文王后妃之化而成德之事盖文王治政而化行於江漢之域自北而南故其樂章以南名之用之鄉人用之邦國以教天下後世誠意正心修身齊家之道葢詩之正風也子曰禮云禮云玉帛云乎哉樂云樂云鍾鼓云乎哉敬而將之以玉帛則為禮和而發之以鐘鼔則為樂遺其本而專事其末則豈禮樂之謂哉程子曰禮只是一箇序樂只是一箇和只此兩字含蓄多少義理天下無一物無禮樂且如置此兩椅一不正便是無序無序便乖乖便不和又如盗賊至為不道然亦有禮樂葢必有緫屬必相聽順乃能為盗不然則叛亂無統不能一日相聚而為盗也禮樂無處無之學者須要識得黄氏曰程子朱子言樂則同主於和至於言禮則朱子主於敬程子主於序二説不同何也曰不但敬與序之不同雖言和則同而所以為和亦不同也集注之敬與和主人心而言也程子之序與和主事理而言也然有人心之敬與和則見於事理者始有序而和矣子曰色厲而内荏譬諸小人其猶穿窬之盜也與荏而審反與平聲厲威嚴也荏柔弱也小人細民也穿穿壁窬踰牆言其無實盗名而常畏人知也子曰鄉原德之賊也鄉者鄙俗之意原與愿同荀子原慤注讀作愿是也鄉原鄉人之愿者也盖其同流合汙以媚於世故在鄉人之中獨以愿稱夫子以其似德非德而反亂乎德故以為德之賊而深惡之詳見孟子末篇子曰道聽而塗説德之棄也雖聞善言不為己有是自棄其德也王氏曰君子多識前言往行以畜其徳道聽而塗説則棄之矣南軒曰聞善者行而體之則其德蓄聚若徒以資助語説而已則於德何有是棄之也子曰鄙夫可與事君也與哉與平聲鄙夫庸惡陋劣之稱其未得之也患得之既得之患失之何氏曰患得之謂患不能得之茍患失之無所不至矣小則吮癰䑛痔大則弑父與君皆生於患失而已胡氏曰許昌靳裁之有言曰士之品大㮣有三志於道徳者功名不足以累其心志於功名者富貴不足以累其心志於富貴而已者則亦無所不至矣志於富貴即孔子所謂鄙夫也南軒曰患得患失者以得失為事也患得者患無以得之也惟其有是心故既得則患失矣其患失之心乃患得之心也若是則凡可以勿失者皆在所必為而亦何所不至哉自古亂臣賊子其初亦豈敢遽有篡弑之萌惟其患失之心蹉跌至此故夫未得則患得既得則患失患失則無所不至履霜堅冰馴致其道也然則患得失之萌是乃弑父與君之原也聖人謂為鄙夫者葢區區惟已私之徇不亦鄙乎案眉山蘇氏曰李斯憂蒙恬之奪其權則亡二世以亡秦盧杞懼李懷光之數其惡則誤德宗以再亂其心本生於患失其禍乃至於喪邦乃知聖人之言良不為過亦名辭也子曰古者民有三疾今也或是之亡也氣失其平則為疾故氣稟之偏者亦謂之疾昔所謂疾今亦無之傷俗之益衰也古之狂也肆今之狂也蕩古之矜也廉今之矜也忿戾古之愚也直今之愚也詐而已矣狂者志願太髙肆謂不拘小節蕩則踰大闊矣矜者持守太嚴廉謂稜角陗厲忿戾則至於爭矣愚者暗昧不明直謂徑行自遂詐則挾私妄作矣范氏曰末世滋偽豈惟賢者不如古哉民性之蔽亦與古人異矣子曰巧言令色鮮矣仁重出子曰惡紫之奪朱也惡鄭聲之亂雅樂也惡利口之覆邦家者惡去聲覆芳服反朱正色紫閒色雅者正也利口捷給覆傾敗也范氏曰天下之理正而勝者常少不正而勝者常多聖人所以惡之也利口之人以是為非以非為是以賢為不肖以不肖為賢人君茍悦而信之則國家之覆也不難矣子曰予欲無言學者多以語言觀聖人而不察其天理流行之實有不待言而著者是以徒得其言而不得其所以言故夫子發此以警之子貢曰子如不言則小子何述焉子貢正以言語觀聖人者故疑而問之子曰天何言哉四時行焉百物生焉天何言哉四時行百物生莫非天理發見流行之實不待言而可見聖人一動一靜莫非妙道精義之發亦天而已豈待言而顯哉此亦開示子貢之切惜乎其終不喻也程子曰孔子之道譬如日星之明猶患門人未能盡曉故曰予欲無言若顔子則便黙識其他則未免疑問故曰小子何述又曰天何言哉四時行焉百物生焉則可謂至明白矣愚案此與前篇無隠之意相發學者詳之孺悲欲見孔子孔子辭以疾將命者出戸取瑟而歌使之聞之孺悲魯人嘗學士喪禮於孔子當是時必有以得罪者故辭以疾而又使知其非疾以警教之也程子曰此孟子所謂不屑之教誨所以深教之也南軒曰孺悲之不見宜在棄絶之域取瑟而歌使將命者聞之是亦敢誨之而終不棄也聖人之仁天地生物之心歟宰我問三年之喪期已乆矣期音基下同期周年也君子三年不為禮禮必壞三年不為樂樂必崩恐居喪不習而崩壞也舊榖既沒新榖既升鑽燧改火期可已矣鑽祖官反沒盡也升登也燧取火之木也改火春取榆柳之火夏取棗杏之火夏季取桑柘之火秋取柞楢之火冬取槐檀之火亦一年而周也已止也言朞年則天運一周時物皆變喪至此可止也尹氏曰短喪之説下愚且恥言之宰我親學聖人之門而以是為問者有所疑於心而不敢強焉耳子曰食夫稻衣夫錦於女安乎曰安夫音拱下同衣去聲女音汝下同禮父母之喪既殯食粥麤衰既葬𬞞食水飲受以成布朞而小祥始食菜果練冠縓縁要絰不除無食稻衣錦之理夫子欲宰我反求諸心自得其所以不忍者故問之以此而宰我不察也女安則為之夫君子之居喪食旨不廿聞樂不樂居處不安故不為也今女安則為之樂上如字下音洛此夫子之言也㫖亦甘也初言女安則為之絶之之辭又發其不忍之端以警其不察而再言女安則為之以深責之宰我出子曰予之不仁也子生三年然後免於父母之懷夫三年之喪天下之通喪也予也有三年之愛於其父母乎宰我既出夫子懼其真以為可安而遂行之故深探其本而斥之言由其不仁故愛親之薄如此也懷抱也又言君子所以不忍於親而喪必三年之故使之聞之或能反求而終得其本心也范氏曰喪雖止於三年然賢者之情則無窮也特以聖人為之中制而不敢過故必俯而就之非以三年之喪為足以報其親也所謂三年而後免於父母之懷特以責宰我之無恩欲其有以跂而及之爾子曰飽食終日無所用心難矣哉不有博奕者乎為之猶賢乎已博局戲也奕圍碁也已止也李氏曰聖人非教人博奕也所以甚言無所用心之不可爾子路曰君子尚勇乎子曰君子義以為上君子有勇而無義為亂小人有勇而無義為盗尚上之也君子為亂小人為盗皆以位而言者也尹氏曰義以為尚則其為勇也大矣子路好勇故夫子以此救其失也胡氏曰疑此子路初見孔子時問荅也案史記子路性鄙好勇力志伉直冠雄雞佩猳豚陵暴孔子孔子設禮稍誘子路子路後儒服委質因門人請為弟子子貢曰君子亦有惡乎子曰有惡惡稱人之惡者惡居下流而訕上者惡勇而無禮者惡果敢而窒者惡去聲下同唯惡者之惡如字訕所諌反訕謗毁也窒不通也稱人惡則無仁厚之意下訕上則無忠敬之心勇無禮則為亂果而窒則妄作故夫子惡之曰賜也亦有惡乎惡徼以為知者惡不孫以為勇者惡訐以為直者徼古堯反知孫並去聲訐居謁反惡徼以下子貢之言也徼伺察也訐謂攻發人之隂私楊氏曰仁者無不愛則君子宜若無惡矣子貢之有是心也故問焉以質其是非侯氏曰聖賢之所惡如此所謂唯仁者能惡人也子曰唯女子與小人為難養也近之則不孫逺之則怨近孫逺皆去聲此小人亦謂僕隷下人也君子之於臣妾莊以涖之慈以畜之則無二者之患矣子曰年四十而見惡焉其終也矣惡去聲四十成德之時見惡於人則止於此而已勉人及時遷善改過也蘇氏曰此亦有為而言不知其為誰也南軒曰見惡者有不善而見惡於人也此又甚於無聞者方其壯時不能用力以矯厲則終於淪棄可知矣此警懼學者使之激昻自進於蚤也微子第十八此篇多記聖賢之出處凡十一章微子去之箕子為之奴比干諫而死微箕二國名子爵也微子紂庶兄箕子比干紂諸父微子見紂無道去之以存宗祀箕子比干皆諫紂殺比干囚箕子以為奴箕子因佯狂而受辱孔子曰殷有三仁焉三人之行不同而同出於至誠惻怛之意故不咈乎愛之理而有以全其心之徳也楊氏曰此三人者各得其本心故同謂之仁或問三子之心同出於至誠惻怛斯可見矣抑何以知其所處之各適其可邪曰案史記此事先後皆不同惟殷紀以為微子先去比干乃諌而死然後箕子佯狂為奴為紂所囚者近是葢微子帝乚元子當以先王宗祀為重義當蚤去又决知紂之不可諫也故遂去之而不以為嫌也比干少師義當力諌雖知其不可諌而不可已也故遂以諌死而不以為悔箕子見比干之死則知已之不可諌且不忍復死以累其上也見微子之去則知已之不必去且不忍復去以背其君也故佯狂為奴而不以為辱此可以見三仁之所當為易地皆然矣或以為箕子以天畀九疇未傳而不敢死則其為説迂矣司謂之仁者以其皆無私而各當理他無私故得心之體而無違當理故得心之用而不失此其所以各全心之德而謂之仁與曰然則史記三子之事與夫子言先後不同何也曰史所載者事之實此所記者以事之難易為先後耳或問言仁與集注不同集注者改本也然則或問之説為未當乎黄氏曰非也先師言仁之義則固以心之德愛之理為主矣言人之所以至於仁則以為無私心而皆當理也仁之為義固該體用而與惻隠對言則仁主於體而未及於用也故曰心之德愛之理則於仁之義為最切也然仁固愛之理愛亦仁之用仁固心之德而一動一靜亦無非此德之流行也或問之言指三子之所以至於仁而言也集注之言正指仁之義而言也然其曰不咈乎愛之理而有以全其心之徳曰全曰不咈則或問之意亦在其中矣讀者識之可也南軒曰三人者皆當其時當其位處之盡其道者也其立紂之朝所以維持宗社之心至矣而有不得已焉則各自靖以獻于先王詳味微子一篇則可見三子之所謂深切至到者矣孔子皆稱其為仁以其忠誠惻怛克盡其道故也柳下惠為士師三黜人曰子未可以去乎曰直道而事人焉往而不三黜枉道而事人何必去父母之邦三去聲焉於䖍反士師獄官黜退也柳下惠三黜不去而其辭氣雍容如此可謂和矣然其不能枉道之意則有確乎其不可抜者是則所謂必以其道而不自失焉者也胡氏曰此必有孔子斷之之言而亡之矣或問柳下惠仕而屢黜黜而復仕至於三黜而又不去焉何也曰進不隠賢必以其道不以三公易其介所以屢黜而至於三也降志辱身援而止之而止雖袒裼裸裎於我側不以為凂所以黜而復仕既三黜而不去也或曰惠知直道之必黜而不去然則其將枉道以事人乎曰不然也惠之意若曰我但能直道事人則固不必去魯而適他國矣若能枉道而事人亦不必去魯而適他國也其言泛然若無所指盖和者之氣象如此而其道則固自信其不能枉道以事人矣是以三黜之後雖不屑去然亦意其遂不復仕故孔子得以列之於逸民之目齊景公待孔子曰若季氏則吾不能以季孟之閒待之曰吾老矣不能用也孔子行魯三卿季氏最貴孟氏為下卿孔子去之事見世家然此言必非面語孔子葢自以告其臣而孔子聞之爾程子曰季氏強臣君待之之禮極隆然非所以待孔子也以季孟之閒待之則禮亦至矣然復曰吾老矣不能用也故孔子去之盖不繫待之輕重特以不用而去爾齊人歸女樂季桓子受之三日不朝孔子行歸如字或作饋朝音潮季桓子魯大夫名斯案史記定公十四年孔子為魯司冦攝行相事齊人懼歸女樂以沮之尹氏曰受女樂而怠於政事如此其簡賢棄禮不足與有為可知矣夫子所以行也所謂見幾而作不俟終日者與范氏曰此篇記仁賢之出處而折中以聖人之行所以明中庸之道也或問史記載孔子之去魯也有彼婦之舌可以出走之歌今尹氏直以為知魯之君相無敬賢之心而去何邪曰齊人之謀固欲以是沮孔子矣葢欲以女子為閒於魯之君相使之先有以熒惑其耳目感移其心志遂乘閒而進説以沮敗其所為甚則或遂中以不測之禍而不慮孔子之覺之蚤去之速也然孔子之覺之也直以其無敬賢之心知其不足與有為耳而其禍之將至者則固亦不外乎此也尹氏之言不及其他其有得於孔子之初心與南軒曰去讒逺色賤貨而貴德所以勸尊賢也今好色而忘敬賢之心則道之不行可見矣是以去之楚狂接輿歌而過孔子曰鳳兮鳳兮何德之衰往者不可諌來者猶可追已而已而今之從政者殆而接輿楚人佯狂避世夫子時將適楚故接輿歌而過其車前也鳳有道則見無道則隠接輿以比孔子而譏其不能隠為德衰也來者可追言及今尚可隠去已止也而語助辭殆危也接輿葢知尊孔子而趨不同者也孔子下欲與之言趨而辟之不得與之言辟去聲孔子下車葢欲告之以出處之意接輿自以為是故不欲聞而辟之也長沮桀溺耦而耕孔子過之使子路問津焉沮七余反溺乃厯反二人隠者耦並耕也時孔子自楚反平蔡津濟渡處長沮曰夫執輿者為誰子路曰為孔丘曰是魯孔丘與曰是也曰是知津矣夫音扶與平聲執輿執轡在車也盖本子路御而執轡今下問津故夫子代之也知津言數周流自知津處問於桀溺桀溺曰子為誰曰為仲由曰是魯孔丘之徒與對曰然曰滔滔者天下皆是也而誰以易之且而與其從辟人之士也豈若從辟世之士哉耰而不輟徒與之與平聲滔土刀反辟去聲耰音憂滔滔流而不反之意以猶與也言天下皆亂將誰與變易之而汝也辟人謂孔子辟世桀溺自謂耰覆種也亦不告以津處子路行以告夫子憮然曰鳥獸不可與同羣吾非斯人之徒與而誰與天下有道丘不與易也憮音武與如字憮然猶悵然惜其不喻已意也言所當與同羣者斯人而已豈可絶人逃世以為潔哉天下若已平治則我無用變易之正為天下無道故欲以道易之耳程子曰聖人不敢有忘天下之心故其言如此也張子曰聖人之心不以無道必天下而棄之也子路從而後遇丈人以杖荷蓧子路問曰子見夫子乎丈人曰四體不勤五榖不分孰為夫子植其杖而芸蓧徒弔反植音值丈人亦隠者蓧竹器分辨也五穀不分猶言不辨菽麥爾責其不事農業而從師逺遊也植立之也芸去草也子路拱而立知其隠者敬之也止子路宿殺雞為黍而食之見其二子焉食音嗣見賢遍反明日子路行以告子曰隠者也使子路反見之至則行矣孔子使子路反見之葢欲告之以君臣之義而丈人意子路必將復來故先去之以滅其跡亦接輿之意也子路曰不仕無義長幼之節不可廢也君臣之義如之何其廢之欲潔其身而亂大倫君子之仕也行其義也道之不行已知之矣長上聲子路述夫子之意如此盖丈人之接子路甚倨而子路益恭丈人因見其二子焉則於長幼之節固知其不可廢矣故因其所明以曉之倫序也人之大倫有五父子有親君臣有義夫婦有别長幼有序朋友有信是也仕所以行君臣之義故雖知道之不行而不可廢然謂之義則事之可否身之去就亦自有不可茍者是以雖不潔身以亂倫亦非忘義以徇祿也福州有國初時寫本路下有反子二字以此為子路反而夫子言之也未知是否范氏曰隠者為髙故往而不反仕者為通故溺而不止不與鳥獸同羣則决性命之情以饕富貴此二者皆惑也是以依乎中庸者為難惟聖人不廢君臣之義而必以其正所以或出或處而終不離於道也或問知道之不行而徒仕可乎曰仕所以行義也義則有可有不可矣義合而從則道固不患於不行不合而去則道雖不行而義亦未嘗廢也是以君子雖知道之不行而未嘗不仕然亦未嘗懷私徇祿而苟一日之安也由此觀之道義之未嘗相離也亦可見矣黄氏曰列接輿以下三章於孔子行之後以明夫子雖不合而去然亦未嘗恝然忘斯世也此所以為聖人之出處也與然即三章而讀之見夫接輿沮溺荷蓧丈人此四子者若律以聖人之中道則誠不為無病然味其言觀其容止以思見其為人其清風髙節猶使人起敬起慕恨不得識其面而端拜之彼於聖人猶有所不滿於心如此則其視世之貪利慕祿而不知止者真不啻若犬彘求欲為之奴𨽻而不可得也是亦豈非當世之賢而特立者與以子路之行行而拱立於丈人之側若子弟然豈非其真可敬也與故嘗謂若四人惟夫子然後可以議其不合於聖人之道未至於夫子者皆未可以妄議也貪利慕祿之徒求以自便其私亦借四子而譏之欲以見其不可以不仕多見其不知量也逸民伯夷叔齊虞仲夷逸朱張柳下惠少連少去聲下同逸遺逸民者無位之稱虞仲即仲雍與太伯同竄荆蠻者夷逸朱張不見經傳少連東夷人子曰不降其志不辱其身伯夷叔齊與與平聲謂柳下惠少連降志辱身矣言中倫行中慮其斯而已矣中去聲下同柳下惠事見上倫義理之次第也慮思慮也中慮言有意義合人心少連事不可攷然記稱其善居喪三日不怠三月不解朞悲哀三年憂則行之中慮亦可見矣謂虞仲夷逸隠居放言身中清廢中權仲雍居呉斷髪文身裸以為飾隠居獨善合乎道之清放言自廢合乎道之權我則異於是無可無不可孟子曰孔子可以仕則仕可以止則止可以乆則乆可以速則速所謂無可無不可也謝氏曰七人隠遯不汗則同其立心造行則異伯夷叔齊天子不得臣諸侯不得友盖已遯世離羣矣下聖人一等此其最髙與柳下惠少連雖降志而不枉已雖辱身而不求合其心有不屑也故言能中倫行能中慮虞仲夷逸隠居放言則言不合先王之法者多矣然清而不汙也權而適宜也與方外之士害義傷教而亂大倫者殊科是以均謂之逸民尹氏曰七人各守其一節孔子則無可無不可此所以常適其可而異於逸民之徒也掦雄曰觀乎聖人則見賢人是以孟子語夷惠亦必以孔子㫁之南軒曰無可者不以可為主也無不可者不以不可為主也其曰無者言其不有於中也然則夫子之心果如何哉當可則可當不可則不可故仕止乆速無不得其可其惟天乎其惟聖人乎若夷齊之心則未免有不可若柳下惠少連則未免有可故孟子所欲學孔子而已大師摯適齊大音泰大師魯樂官之長摯其名也亞飯干適楚三飯繚適蔡四飯缺適秦飯扶晚反繚音了亞飯以下以樂侑食之官干繚缺皆名也鼓方叔入於河鼔擊鼓者方叔名河河内播鼗武入於漢鼗徒刀反播搖也鼗小鼓兩旁有耳持其柄而搖之則旁耳還自擊武名也漢漢中少師陽擊磬襄入於海少去聲少師樂官之佐陽襄二人名襄即孔子所從學琴者海海島也此記賢人之隠遁以附前章然未必夫子之言也末章放此張子曰周衰樂廢夫子自衞反魯一嘗治之其後伶人賤工識樂之正及魯益衰三桓僭妄自大師以下皆散之四方逾河蹈海以去亂聖人俄頃之助功化如此如有用我朞月而可豈虛語哉或問何以知亞飯為侑食之官也曰白虎通曰王者平旦食晝食晡食莫食凡四飯諸侯三飯大夫再飯故魯之樂官自亞飯以下葢三飯也黄氏曰列此於逸民之後以歎魯之末世决不可以復仕也周公謂魯公曰君子不施其親不使大臣怨乎不以故舊無大過則不棄也無求備於一人施陸氏本作弛詩紙反福本同魯公周公子伯禽也弛遺棄也以用也大臣非其人則去之在其位則不可不用大故謂惡逆李氏曰四者皆君子之事忠厚之至也胡氏曰此伯禽受封之國周公訓戒之辭魯人傳誦乆而不忘也其或夫子嘗與門弟子言之歟周有八士伯達伯适仲突仲忽叔夜叔夏季隨季騧騧烏𤓰反或曰成王時人或曰宣王時人葢一母四乳而生八子也然不可攷矣張子曰記善人之多也愚案此篇孔子於三仁逸民師摯八士既皆稱贊而品列之於接輿沮溺丈人又每有惓惓接引之意皆衰世之志也其所感者深矣在陳之歎盖亦如此三仁則無閒然矣其餘數君子者亦皆一世之髙士若使得聞聖人之道以裁其所過而勉其所不及則其所立豈止於此而已哉楊氏曰八人盡為士之道也論語集編卷九
