body:
  text: 欽定四庫全書孟子集編卷十宋真德秀撰萬章章句下凡九章孟子曰伯夷目不視惡色耳不聽惡聲非其君不事非其民不使治則進亂則退橫政之所出橫民之所止不忍居也思與鄉人處如以朝衣朝冠坐於塗炭也當紂之時居北海之濵以待天下之清也故聞伯夷之風者頑夫廉懦夫有立志治去聲下同橫去聲朝音潮橫謂不循法度頑者無知覺廉者冇分辨懦柔弱也餘並見前篇伊尹曰何事非君何使非民治亦進亂亦進曰天之生斯民也使先知覺後知使先覺覺後覺豫天民之先覺者也豫將以此道覺此民也思天下之民匹夫匹婦有不與被堯舜之澤者若已推而內之溝中其自任以天下之重也與音預何事非君言所事即君何使非民言所使即民無不可事之君無不可使之民也餘見前篇栁下惠不羞汙君不辭小官進不隱賢必以其道遺佚而不怨厄窮而不憫與鄉人處由由然不忍去也爾為爾我為我雖袒裼裸裎於我側爾焉能浼我哉故聞栁下惠之風者鄙夫寬薄夫敦鄙狹陋也敦厚也餘見前篇孔子之去齊接淅而行去魯曰遲遲吾行也去父母國之道也可以速而速可以久而久可以處而處可以仕而仕孔子也淅先歷反接猶承也淅漬米水也漬米將炊而欲去之速故以手承水取米而行不及炊也舉此一端以見其久速仕止各當其可也或曰孔子去魯不稅冕而行豈得為遲楊氏曰孔子欲去之意久矣不欲苟去故遲遲其行也膰肉不至則得以微罪行矣故不稅冕而行非速也孟子曰伯夷聖之清者也伊尹聖之任者也栁下惠聖之和者也孔子聖之時者也張子曰無所雜者清之極無所異者和之極勉而清非聖人之清勉而和非聖人之和所謂聖者不勉不思而至焉者也孔氏曰任者以天下為已責也愚謂孔子仕止久速各當其可蓋兼三子之所以聖者而時出之非如三子之可以一德名也或疑伊尹出處合乎孔子而不得為聖之時何也程子曰終是任底意思往孔子之謂集大成集大成也者金聲而玉振之也金聲也者始條理也玉振之也者終條理也始條理者智之事也終條理者聖之事也此言孔子集三聖之事而為一大聖之事猶作樂者集衆音之小成而為一大成也成者樂之一終書所謂簫韶九成是也金鍾屬聲宣也如聲罪致討之聲玉磬也振收也如振河海而不泄之振始始之也終終之也條理猶言脈絡指衆音而言也智者知之所及聖者德之所就也蓋樂有八音金石絲竹匏土革木若獨奏一音則其一音自為始終而為一小成猶三子之所知偏於一而其所就亦偏於一也八音之中金石為重故特為衆音之綱紀又金始震而玉終詘然也故並奏八音則於其未作而先擊鎛鍾以宣其聲俟其既闋而後擊特磬以收其韻宣以始之收以終之二者之間脈絡貫通無所不備則合衆小成而為一大成猶孔子之知無不盡而德無不全也金聲玉振始終條理疑古樂經之言故倪寬云惟天子建中和之極兼總條貫金聲而玉振之亦此意也智譬則巧也聖譬則力也由射於百步之外也其至爾力也其中非爾力也中去聲此復以射之巧力發明智聖二字之義見孔子巧力俱全而聖智兼備三子則力有餘而巧不足是以一節雖至於聖而智不足以及乎時中也此章言三子之行各極其一偏孔子之道兼全於衆理所以偏者由其蔽於始是以缺於終所以全者由其知之至是以行之盡三子猶春夏秋冬之各一其時孔子則太和元氣之流行於四時也北宫錡問曰周室班爵祿也如之何錡魚綺反北宫姓錡名衛人班列也孟子曰其詳不可得聞也諸侯惡其害已也而皆去其籍然而軻也嘗聞其略也惡去聲去上聲當時諸侯兼并僭竊故惡周制妨害已之所為也天子一位公一位侯一位伯一位子男同一位凡五等也君一位卿一位大夫一位上士一位中士一位下士一位凡六等此班爵之制也五等通於天下六等施於國中天子之制地方千里公侯皆方百里伯七十里子男五十里凡四等不能五十里不達於天子附於諸侯曰附庸此以下班祿之制也不能猶不足也小國之地不足五十里者不能自達於天子因大國以姓名通謂之附庸若春秋邾儀父之類是也天子之卿受地視侯大夫受地視伯元士受地視子男視比也徐氏曰王畿之內亦制都鄙受地也元士上士也大國地方百里君十卿祿卿祿四大夫大夫倍上士上士倍中士中士倍下士下士與庶人在官者同祿祿足以代其耕也十十倍之也四四倍之也倍加一倍也徐氏曰大國君田三萬二千畝其入可食二千八百八十人卿田三千二百畝可食二百八十八人大夫田八百畝可食七十二人上士田四百畝可食三十六人中士田二百畝可食十八人下士與庶人在官者田百畝可食九人至五人庶人在官府史胥徒也愚案君以下所食之祿皆助法之公田藉農夫之力以耕而收其租士之無田與庶人在官者則但受祿於官如田之入而已次國地方七十里君十卿祿卿祿三大夫大夫倍上士上士倍中士中士倍下士下士與庶人在官者同祿祿足以代其耕也三謂三倍之也徐氏曰次國君田二萬四千畝可食二千一百六十人卿田二千四百畝可食二百十六人小國地方五十里君十卿祿卿祿二大夫大夫倍上士上士倍中士中士倍下士下士與庶人在官者同祿祿足以代其耕也二即倍也徐氏曰小國君田一萬六千畝可食千四百四十人卿田一千六百畝可食百四十四人耕者之所獲一夫百畝百畝之糞上農夫食九人上次食八人中食七人中次食六人下食五人庶人在官者其祿以是為差食音嗣獲得也一夫一婦佃田百畝加之以糞糞多而力勤者為上農其所收可供九人其次用力不齊故有此五等庶人在官者其受祿不同亦有此五等也愚案此章之説與周禮王制不同蓋不可考闕之可也程子曰孟子之時去先王未逺載籍未經秦火然而班爵祿之制已不聞其詳今之禮書皆掇拾於煨燼之餘而多出於漢儒一時之傅會奈何欲盡信而句為之解乎然則其事故不可一二追復矣萬章問曰敢問友孟子曰不挾長不挾貴不挾兄弟而友友也者友其德也不可以有挾也挾者兼有而恃之之稱孟獻子百乘之家也有友五人焉樂正裘牧仲其三人則豫忘之矣獻子之與此五人者友也無獻子之家者也此五人者亦有獻子之家則不與之友矣乘去聲下同孟獻子魯之賢大夫仲孫蔑也張子曰獻子忘其勢五人者忘人之勢不資其勢而利其有然後能忘人之勢若五人者有獻子之家則反為獻子之所賤矣非惟百乘之家為然也雖小國之君亦有之費惠公曰吾於子思則師之矣吾於顔般則友之矣王順長息則事我者也費音祕般音班惠公費邑之君也師所尊也友所敬也事我者所使也非惟小國之君為然也雖大國之君亦有之晉平公之於亥唐也入云則入坐云則坐食云則食雖疏食菜羮未嘗不飽蓋不敢不飽也然終於此而已矣弗與共天位也弗與治天職也弗與食天祿也士之尊賢者也非王公之尊賢也疏食之食音嗣平公王公下諸本多無之字疑闕文也亥唐晉賢人也平公造之唐言入公乃入言坐乃坐言食乃食也疏食糲飯也不敢不飽敬賢者之命也范氏曰位曰天位職曰天職祿曰天祿言天所以待賢人使治天民非人君所得專者也舜尚見帝帝館甥于二室亦饗舜迭為賔主是天子而友匹夫也尚上也舜上而見於帝堯也館舍也禮妻父曰外舅謂我舅者吾謂之甥堯以女妻舜故謂之甥二室副宫也堯舍舜於副宫而就饗其食用下敬上謂之貴貴用上敬下謂之尊賢貴貴尊賢其義一也貴貴尊賢皆事之宜者然當時但知貴貴而不知尊賢故孟子曰其義一也此言朋友人倫之一所以輔仁故以天子友匹夫而不為詘以匹夫友天子而不為僭此堯舜所以為人倫之至而孟子言必稱之也孟子謂自天子至大夫皆有友賢之義然知友賢而未知用賢則猶未也蓋位者天位所以處賢者也職者天職所以命賢者也祿者天祿所以養賢者也三者皆天所以待賢人使治天民者也而晉平公之於亥唐特虗尊之而已未嘗處之以位命之以職食之以祿也此豈王公尊賢之道哉必如堯之於舜然後為盡友賢之道矣夫貴貴尊賢其理本一然戰國之世人但知貴貴而不復知尊賢故孟子歷敘友賢之事而終欲以堯舜為法也衍義萬章問曰敢問交際何心也孟子曰恭也際接也交際謂人以禮儀幣帛相交接也曰郤之郤之為不恭何哉曰尊者賜之曰其所取之者義乎不義乎而後受之以是為不恭故弗郤也郤不受而還之也再言之未詳萬章疑交際之間有所郤者人便以為不恭何哉孟子言尊者之賜而心竊計其所以得此物者未知合義與否必其合義然後可受不然則郤之矣所以郤之為不恭也曰請無以辭郤之以心郤之曰其取諸民之不義也而以他辭無受不可乎曰其交也以道其接也以禮斯孔子受之矣萬章以為彼既得之不義則其餽不可受但無以言語間而郤之直以心度其不義而託於他辭以郤之如此可否邪交以道如餽贐聞戒周其飢餓之類接以禮謂辭命恭敬之節孔子受之如受陽貨蒸豚之類也萬章曰今有禦人於國門之外者其交也以道其餽也以禮斯可受禦與曰不可康誥曰殺越人于貨閔不畏死凡民罔不憝是不待教而誅者也殷受夏周受殷所不辭也於今為烈如之何其受之與平聲憝書作憝徒對反禦止也止人而殺之且奪其貨也國門之外無人之處也萬章以為苟不問其物之所從來而但觀其交接之禮則設冇禦人者用其禦得之貨以禮餽我則可受之乎康誥周書篇名越顛越也今書閔作愍無凡民二字憝怨也言殺人而顚越之因取其貨閔然不知畏死凡民無不怨之孟子言此乃不待教戒而當即誅者也如何而可受之乎殷受至為烈十四字語意不倫李氏以為此必有斷簡或闕文者近之而愚意其直為衍字耳然不可考姑闕之可也曰今之諸侯取之於民也猶禦也苟善其禮際矣斯君子受之敢問何説也曰子以為有王者作將比今之諸侯而誅之乎其教之不改而後誅之乎夫謂非其有而取之者盜也充類至義之盡也孔子之仕於魯也魯人獵較孔子亦獵較獵較猶可而況受其賜乎比去聲夫音扶較音角比連也言今諸侯之取於民固多不義然有王者起必不連合而盡誅之必教之不改而後誅之則其與禦人之盜不待教而誅者不同矣夫禦人於國門之外與非其有而取之二者固皆不義之類然必禦人乃為真盜其謂非有而取為盜者乃推其類至於義之至精至密之處而極言之耳非便以為真盜也然則今之諸侯雖曰取非其有而豈可遽以同於禦人之盜也哉又引孔子之事以明世俗所尚猶或可從況受其賜何為不可乎獵較未詳趙氏以為田獵相較奪禽獸以祭孔子不違所以小同於俗也張氏以為獵而較所獲之多少也二説未知孰是曰然則孔氏之仕也非事道與曰事道也事道奚獵較也曰孔子先簿正祭器不以四方之食供簿正曰奚不去也曰為之兆也兆足以行矣而不行而後去是以未嘗有所終三年淹也與平聲此因孔子事而反覆辨論也事道者以行道為事也事道奚獵較也萬章問也先簿正祭器未詳徐氏曰先以簿書正其祭器使有定數不以四方難繼之物實之夫器冇常數實有常品則其本正矣彼獵較者將久而自廢矣未知是否也兆猶卜之兆蓋事之端也孔子所以不去者亦欲小試行道之端以示於人使知吾道之果可行也若其端既可行而人不能遂行之然後不得已而必去之蓋其去雖不輕而亦未嘗不決是以未嘗終三年留於一國也孔子有見行可之仕有際可之仕有公養之仕於季桓子見行可之仕也於衛靈公際可之仕也於衛孝公公養之仕也見行可見其道之可行也際可接遇以禮也公養國君養賢之禮也季桓子魯卿季孫斯也衛靈公衛侯元也孝公春秋史記皆無之疑出公輒也因孔子仕魯而言其仕有此三者故於魯則兆足以行矣而不行然後去而於衛之事則又受其交際問餽而不郤之一驗也尹氏曰不聞孟子之義則自好者為於陵仲子而已聖賢辭受進退惟義所在愚案此章文義多不可曉不必強為之説南軒曰讀孟子此章所以答萬章者反復曲折可謂義之精矣問交際何心則曰恭蓋交際之道主乎恭也問郤之何以為不恭則以謂尊者有賜若念其取之義與不義而後受則非所以敬事乎其尊者也吾知不虗其賜我之意而已豈暇問其所自哉若夫萬章之説以心郤之而以他辭無受則是乃不恭之心而辭何為乎然而其受也必交以道而接以禮使交之不以道而接之不以禮則固有所不受矣於齊餽兼金百鎰而不受是亦尊者之賜也然未有辭則是貨我而已其交也固非道其接也固非禮此所為不受也蓋亦非為其取之不義之故初亦無害乎交際之恭也萬章於此有疑焉謂有人於此禦人以兵而得貨然交以道餽以禮則君子固亦受與孟子謂禦人而奪貨者此所謂大憝有國者之所必禁不待教令而誅者三代之法同不必設辭而可知者居今之世其法為甚著奈何而可受其餽乎萬章謂既以為不可則今之諸侯以非道取民與此何異而君子以善其禮際而受之可乎孟子謂事固有輕重若以為有王者作將不待教而盡誅今之諸侯乎抑亦教而不改而後誅之也以理論之則必待教而不改然後誅之明矣然則其可與不待教而誅者同日而語乎夫謂非其有而取之為盜者蓋充夫非其有而取之之類以極義之所在而比之為盜則可若便以為與禦人奪貨之盜同罪則豈可哉大抵聖賢因汙隆而起變化辭受取與皆天下正理過與不及為失其正理則均也魯之習俗必獵較而後以祭孔子仕於魯亦不違也而況於受其賜乎萬章聞是言則又疑孔子之仕所事者道而何獵較為也孟子以為孔子於宗廟之祭先簿正其祭器立之彝典不以四方之食供簿正蓋四方之食非簿正之常典也然於獵較而供祭之事猶有所未廢蓋由簿正之事而正之其施設則有次第矣而萬章以為既不能遂盡正之則曷為不遂去孟子謂為之兆也為之兆者正本開端而為可繼也聖人之為如天地之化不疾不徐雖曰為之兆而化育之大體已具矣在他人緩則失時速則反害蓋非溥博淵泉而時出之是以無序而不和也兆足以行而不行者蓋以其兆固可繼此以行而有所不得行焉則命也夫然後去之故亦未嘗有三年之淹焉其先後遲速皆天理也此所謂聖之時者歟於是遂論孔子之仕有三焉行可之仕謂其兆可以行者也際可之仕謂遇聖人以禮者也公養之仕謂養聖人以道者也遇以禮而養以道者聖人亦豈得而絶之乎讀是章者涵泳而精思之亦可以窺聖賢之用而知辭受取與之方也孟子曰仕非為貧也而有時乎為貧娶妻非為養也而有時乎為養為養並去聲下同仕本為行道而亦有家貧親老或道與時違而但為祿仕者如娶妻本為繼嗣而亦有為不能親操井臼而欲資其餽養者為貧者辭尊居卑辭富居貧貧富謂祿之厚薄蓋仕不為道已非出處之正故其所處但當如此辭尊居卑辭富居貧惡乎冝乎抱關擊柝惡平聲柝音託柝行夜所擊木也蓋為貧者雖不主於行道而亦不可以苟祿故惟抱關擊柝之吏位卑祿薄其職易稱為所冝居也李氏曰道不行矣為貧而仕者此其律令也若不能然則是貪位慕祿而已矣孔子嘗為委吏矣曰會計當而已矣嘗為乘田矣曰牛羊茁壯長而已矣委烏偽反會工外反當丁浪反乘去聲茁阻刮反長上聲此孔子之為貧而仕者也委吏主委積之吏也乘田主苑囿芻牧之吏也茁肥貌言以孔子大聖而嘗為賤官不以為辱者所以為貧而仕官卑祿薄而職易稱也位卑而言髙罪也立乎人之本朝而道不行恥也朝音潮以出位為罪則無行道之責以廢道為恥則非竊祿之官此為貧者之所以必辭尊富而寧處貧賤也尹氏曰言為貧者不可以居尊居尊者必欲以行道南軒曰此章言為貧而仕之義夫仕者豈為貧乎哉蓋將以行道也而亦有為貧而仕者焉是猶娶妻本為繼嗣非為養也而亦有為養而娶者焉然則為貧而仕與為養而娶是亦皆義也雖然既曰為貧矣則不當處夫尊與富居於卑與貧者可也若處其尊與富則是名為為貧而其實竊位也處其尊與富則當任其責此豈為貧之地哉是則非義矣故抱關擊柝亦以為冝者本為貧故也孔子嘗為委吏嘗為乘田矣聖人篤誠雖居下位必敬其事曰會計當而已矣曰牛羊茁壯長而已矣以其職在乎是而不越也蓋位卑者言責不加焉言髙則罪矣故可以姑守其職此為貧而仕之法也若夫立人之本朝則當以行道為任道不行而竊其位君子之所恥也然則髙位厚祿非所以養貧也後世不明此義假為貧之名安享寵利而恬然曽不以為愧此可勝罪哉必不得已為貧而仕其以抱關擊柝之為冝則可矣嗟夫觀夫子為委吏而曰會計當而已矣為乘田而曰牛羊茁壯長而已矣則夫子得政於天下其所當為者如何哉事有小大而心則一也亦曰止其所而已矣萬章曰士之不託諸侯何也孟子曰不敢也諸侯失國而後託於諸侯禮也士之託於諸侯非禮也託寄也謂不仕而食其祿也古者諸侯出奔他國食其廪餼謂之寄公士無爵土不得比諸侯不仕而食祿則非禮也萬章曰君餽之粟則受之乎曰受之受之何義也曰君之於氓也固周之周救也視其空乏則周恤之無常數君待民之禮也曰周之則受賜之則不受何也曰不敢也曰敢問其不敢何也曰抱關擊柝者皆有常職以食於上無常職而賜於上者以為不恭也賜謂豫之祿有常數君所以待臣之禮也曰君餽之則受之不識可常繼乎曰繆公之於子思也亟問亟餽鼎肉子思不恱於卒也摽使者出諸大門之外北面稽首再拜而不受曰今而後知君之犬馬畜伋蓋自是臺無餽也恱賢不能舉又不能養也可謂恱賢乎亟去聲下同摽音杓使去聲亟數也鼎肉熟肉也卒末也摽麾也數以君命來餽當拜受之非養賢之禮故不恱而於其末後復來餽時麾使者出拜而辭之犬馬畜伋言不以人禮待已也臺賤官主使令者蓋繆公愧悟不復令臺來致餽也舉用也能養者未必能用況又不能養乎曰敢問國君欲養君子如何斯可謂養矣曰以君命將之再拜稽首而受其後廩人繼粟庖人繼肉不以君命將之子思以為鼎肉使已僕僕爾亟拜也非養君子之道也初以君命來餽則當拜受其後有司各以其職繼續所無不以君命來餽不使賢者冇亟拜之勞也僕僕煩猥貌堯之於舜也使其子九男事之二女女焉百官牛羊倉廩備以養舜於畎畝之中後舉而加諸上位故曰王公之尊賢者也女下字去聲能養能舉恱賢之至也惟堯舜為能盡之而後世之所當法也南軒曰萬章所謂託於諸侯蓋以為士雖不得行其道而託祿於諸侯以自養冝若可也而孟子以為非禮以其無是理故也然周之則可以受周之與賜所以異者蓋居其國則為其民君以其飢餓而餽焉受斯可也若欲以自託而虗享其祿賜則於義何居乎名不正則失其序而不和故孔子論之至於禮樂不興而民無所措手足君子之於禮樂不斯須去身者其動未嘗不當名正而言順故也曰不敢者以其無常職而受賜陷於不恭故不敢也雖然此士之所以自處者當然也在國君之待士則有養賢之禮焉故舉子思之事以告之夫子思受繆公之餽者周之而受之之義也至於餽之之久而僕僕然亟拜則是徒為餽而已徒為餽則與養犬馬之道何異烏有君子而受其犬馬之畜者乎故及其久也則再拜稽首而不受蓋繆公雖有恱賢之名不能舉而用又不能以禮養之也賢者其肯處乎其以禮養者繼肉是也蓋不敢以是而數厪之故使繼之而已雖然此及乎養之之禮而未及乎舉之之道也若堯之於舜則尊賢之極而養道之盡也事之以九男女之以二女百官牛羊倉廩備而養之於畎畝之中惟恐不得當其意一旦舉而加諸上位如是而後可以謂之王公之尊賢也孟子每以堯舜之事為言者語道者必稽諸聖人所以示萬世之凖的蓋聖人人倫之至故也嗟乎為士者於辭受之際可不思夫名正而言順者乎為君者之待士又何可不深思所以養之之道乎萬章曰敢問不見諸侯何義也孟子曰在國曰市井之臣在野曰草莽之臣皆謂庶人庶人不傳質為臣不敢見於諸侯禮也質與贄同傳通也質者士執雉庶人執鶩相見以自通者也國內莫非君臣但未仕者與執贄在位之臣不同故不敢見也萬章曰庶人召之役則往役君欲見之召之則不往見之何也曰往役義也往見不義也往役者庶人之職不往見者士之禮且君之欲見之也何為也哉曰為其多聞也為其賢也曰為其多聞也則天子不召師而況諸侯乎為其賢也則吾未聞欲見賢而召之也為並去聲繆公亟見於子思曰古千乘之國以友士何如子思不恱曰古之人有言曰事之云乎豈曰友之云乎子思之不恱也豈不曰以位則子君也我臣也何敢與君友也以德則子事我者也奚可以與我友千乘之君求與之友而不可得也而況可召與亟乘皆去聲召與之與平聲孟子引子思之言而釋之以明不可召之意齊景公田招虞人以旌不至將殺之志士不忘在溝壑勇士不忘喪其元孔子奚取焉取非其招不往也喪息浪反説見前篇曰敢問招虞人何以曰以皮冠庶人以旃士以旗大夫以旌皮冠田獵之冠也事見春秋傳然則皮冠者虞人之所有事也故以是招之庶人未仕之臣通帛曰旃士謂已仕者交龍為旗析羽而注於旗干之首曰旌以大夫之招招虞人虞人死不敢往以士之招招庶人庶人豈敢往哉況乎以不賢人之招招賢人乎欲見而召之是不賢人之招也以士之招招庶人則不敢往以不賢人之招招賢人則不可往矣欲見賢人而不以其道猶欲其入而閉之門也夫義路也禮門也惟君子能由是路出入是門也詩云周道如底其直如矢君子所履小人所視夫音扶底詩作砥之履反詩小雅大東之篇底與砥同礪石也言其平也矢言其直也視視以為法也引此以證上文能由是路之義南軒曰禮義人性之所有譬之路與門有足者皆可以由可以出入也而君子獨能之者衆人迷於物欲君子存其良心故也萬章曰孔子君命召不俟駕而行然則孔子非與曰孔子當仕有官職而以其官召之也與平聲孔子方仕而任職君以其官名召之故不俟駕而行徐氏曰孔子孟子易地則皆然此章言不見諸侯之義最為詳悉更合陳代公孫丑所問者而觀之其説乃盡孟子謂萬章曰一鄉之善士斯友一鄉之善士一國之善士斯友一國之善士天下之善士斯友天下之善士言已之善蓋於一鄉然後能盡友一鄉之善士推而至於一國天下皆然隨其髙下以為廣狹也以友天下之善士為未足又尚論古之人頌其詩讀其書不知其人可乎是以論其世也是尚友也尚上同言進而上也頌誦通論其世論其當世行事之迹也言既觀其言則不可以不知其為人之實是以又考其行也夫能友天下之善士其所友衆矣猶以為未足又進而取於古人是能進其取友之道而非止為一世之士矣齊宣王問卿孟子曰王何卿之問也王曰卿不同乎曰不同有貴戚之卿有異姓之卿王曰請問貴戚之卿曰君有大過則諫反覆之而不聽則易位大過謂足以亡其國者易位易君之位更立親戚之賢者蓋與君有親親之恩無可去之義以宗廟為重不忍坐視其亡故不得已而至於此也王勃然變乎色勃然變色貌曰王勿異也王問臣臣不敢不以正對孟子言也王色定然後請問異姓之卿曰君有過則諫反覆之而不聽則去君臣義合不合則去此章言大臣之義親疏不同守經行權各有其分貴戚之卿小過非不諫也但必大過而不聼乃可易位異姓之卿大過非不諫也雖小過而不聽已可去矣然三仁貴戚不能行之於紂而霍光異姓乃能行之於昌邑此又委任權力之不同不可以執一論也曰大過謂足以亡其國者易位易君之位更立親戚之賢者蓋與君有親親之恩無可去之義以宗廟為重不忍坐視其亡故不得已而至於此若異姓不合則可去蓋君臣以義合故也愚案貴戚易位之説非後世所得行君有大過惟當反覆極言如屈平劉向之為爾平諫懷王不聽雖放流眷顧楚國繫心懷王不忘欲反兾幸君之一悟俗之一改也其存君興國而欲反覆之一篇之中三致意焉至亡可奈何而後已可謂忠矣然忿而沈淵則過也致堂胡氏嘗論之曰世謂屈原劉向皆同姓之臣忠言著於當時文采表於後世未易以優劣判以愚觀之向蓋優於原也向歷事三帝前經恭顯擅朝後值王鳯專政殺戮忠諫之時上則正言譏刺懇懇納忠下則官雖不遷禍亦不及豈非德信有孚周身無闕故邪原則𥚹介悻直揭揭然衆邪之中上忤君心下取衆疾昧於不可則止之道忽刺強聒無所容身懷沙赴流智斯下矣胡氏之論向甚當然於平則貶之太過必如朱子曰原之為人其志行雖或過於中庸而不可以為法然皆出於忠君愛國之誠心然後為當其實爾又同姓之卿雖無可去之義若其君有大惡而不可諫易位之事又不得行宗社將危豈容坐待則微子去之亦有明義存焉其惡雖未如紂然非可事之君義不當食其祿則魯之叔肸可以為法春秋宣十有七年公弟叔肸卒榖梁傳曰叔肸賢之也其賢之何也宣弒而非之也非之則胡為不去也曰兄弟也何去而之與之財則曰我足矣織屨而食終身不食宣公之食春秋貴之因時制義初無定在也又案孟子反覆二字最宜深體前世人臣固冇見君之過失姑一言以塞責者曰吾亦嘗諫之云爾諫而不從非吾責也此其用心既欲苟全爵位又欲厭塞公言張華之所以見屈於張林而不能自免也必反覆而諫諫而不從則去此人臣之正法孟子之言胡可易哉孟子集編卷十
