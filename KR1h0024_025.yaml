body:
  text: 欽定四庫全書孟子集編卷九宋真德秀撰萬章章句上凡九章萬章問曰舜往于田號泣于旻天何為其號泣也孟子曰怨慕也號平聲舜往于田耕歷山時也仁覆閔下謂之旻天號泣于旻天呼天而泣也事見虞書大禹謨篇怒慕怨已之不得於親而思慕也萬章曰父母愛之喜而不忘父母惡之勞而不怨然則舜怨乎曰長息問於公明髙曰舜往于田則吾既得聞命矣號泣于旻天于父母則吾不知也公明髙曰是非爾所知也夫公明髙以孝子之心為不若是恝我竭力耕田共為子職而已矣父母之不我愛於我何哉惡去聲夫音扶恝苦八反共平聲長息公明髙弟子公明髙曽子弟子于父母亦書辭言呼父母而泣也恝無愁之貌於我何哉自責不知已有何罪耳非怨父母也楊氏曰非孟子深知舜之心不能為此言蓋舜惟恐不順於父母未嘗自以為孝也若自以為孝則非孝矣帝使其子九男二女百官牛羊倉廩備以養舜於畎畝之中天下之士多就之者帝將胥天下而遷之焉為不順於父母如窮人無所歸為去聲帝堯也史記云二女妻之以觀其內九男事之以觀其外又言一年所居成聚二年成邑三年成都是天下之士就之也胥相視也遷之移以與之也如窮人之無所歸言其怨慕迫切之甚也天下之士恱之人之所欲也而不足以解憂好色人之所欲妻帝之二女而不足以解憂富人之所欲富有天下而不足以解憂貴人之所欲貴為天子而不足以解憂人恱之好色富貴無足以解憂者惟順於父母可以解憂孟子推舜之心如此以解上文之意極天下之欲不足以解憂而惟順於父母可以解憂孟子真知舜之心哉人少則慕父母知好色則慕少艾有妻子則慕妻子仕則慕君不得於君則熱中大孝終身慕父母五十而慕者豫於大舜見之矣少好皆去聲言常人之情因物而遷惟聖人為能不失其本心也艾美好也楚辭戰國䇿所謂幼艾義與此同不得失意也熱中躁急心熱也言五十者舜攝政時年五十也五十而慕則其終身慕可知矣此章言舜不以得衆人之所欲為已樂而以不順乎親之心為已憂非聖人之盡性其孰能之孟子可謂知舜之心矣蓋窮天下之可欲皆外物也聖人視之如浮雲然得喪去來不以介意惟不順於父母則以為已之大罪而不敢自恕人知舜怨之為怨獨孟子知其怨乃所以為慕慕之為言愛之深思之切也五十始衰禮所謂不致毁之時也大舜於此猶慕焉聖人純孝之心不以老而衰也揚雄亦曰事父母自知不足者其舜乎蓋舜雖已順其親而其心常若不足此其所以為終身之慕衍義萬章問曰詩云娶妻如之何必告父母信斯言也冝莫如舜舜之不告而娶何也孟子曰告則不得娶男女居室人之大倫也如告則廢人之大倫以懟父母是以不告也懟直類反詩齊國風南山之篇也信誠也誠如此詩之言也懟讎怨也舜父頑母嚚常欲害舜告則不聽其娶是廢人之大倫以讎怨於父母也萬章曰舜之不告而娶則吾既得聞命矣帝之妻舜而不告何也曰帝亦知告焉則不得妻也妻去聲以女為人妻曰妻程子曰堯妻舜而不告者以君治之而已如今之官府治民之私者亦多萬章曰父母使舜完廩捐階瞽瞍焚廩使浚井出從而掩之象曰謨蓋都君咸我績牛羊父母倉廩父母干戈朕琴朕弤朕二嫂使治朕棲象往入舜宫舜在牀琴象曰鬱陶思君爾忸怩舜曰惟茲臣庶汝其于豫治不識舜不知象之將殺已與曰奚而不知也象憂亦憂象喜亦喜弤都禮反忸女六反怩音尼與平聲完治也捐去也階梯也掩蓋也案史記曰使舜上塗廪瞽瞍從下縱火焚廪舜乃以兩笠自捍而下去得不死後又使舜穿井舜穿井為匿空旁出舜既入深瞽瞍與象共下土實井舜從匿空出去即其事也象舜異母弟也謨謀也蓋蓋井也舜所居三年成都故謂之都君咸皆也績功也舜既入井象不知舜已出欲以殺舜為已功也干盾也戈戟也琴舜所彈五弦琴也弤雕弓也象欲以舜之牛羊倉廩與父母而自取此物也二嫂堯二女也棲牀也象欲使為己妻也象往舜宫欲分取所有見舜生在牀彈琴蓋既出即潛歸其宫也鬱陶思之甚而氣不得伸也象言已思君之甚故來見爾忸怩慙色也臣庶謂其百官也象素憎舜不至其宫故舜見其來而喜使之治其臣庶也孟子言舜非不知其將殺已但見其憂則憂見其喜則喜兄弟之情自冇所不能已耳萬章所言其有無不可知然舜之心則孟子有以知之矣他亦不足辨也程子曰象憂亦憂象喜亦喜人情天理於是為至曰然則舜偽喜者與曰否昔者有饋生魚於鄭子産子産使校人畜之池校人烹之反命曰始舍之圉圉焉少則洋洋焉攸然而逝子産曰得其所哉得其所哉校人出曰孰謂子産智豫既烹而食之曰得其所哉得其所哉故君子可欺以其方難罔以非其道彼以愛兄之道來故誠信而喜之奚偽焉與平聲校音效又音教畜許六反校人主池沼小吏也圉圉困而未舒之貌洋洋則稍縱矣攸然而逝者自得而逺去也方亦道也罔蒙蔽也欺以其方謂誑之以理之所有罔以非其道謂昧之以理之所無象以愛兄之道來所謂欺之以其方也舜本不知其偽故實喜之何偽之有此章又言舜遭人倫之變而不失天理之常也象欲殺舜之迹甚明在舜豈不知之然見其憂則憂見其喜則喜略無一毫芥蒂於其中後世骨肉之間小有疑隙則猜防萬端惟恐發之不蚤除之不亟至此然後知聖人之心與天同量也世儒以帝堯在上二女嬪虞象無殺舜之理故以孟子為疑不知孟子特論大舜之心使其有是處之不過如此豈必真有是哉衍義萬章問曰象日以殺舜為事立為天子則放之何也孟子曰封之也或曰放焉放猶置也置之於此使不得去也萬章疑舜何不誅之孟子言舜實封之而或者誤以為放也萬章曰舜流共工于幽州放歡兜于崇山殺三苗于三危殛鯀于羽山四罪而天下咸服誅不仁也象至不仁封之有庳有庳之人奚罪焉仁人固如是乎在他人則誅之在弟則封之曰仁人之於弟也不藏怒焉不宿怨焉親愛之而已矣親之欲其貴也愛之欲其富也封之有庳富貴之也身為天子弟為匹夫可謂親愛之乎庳音鼻流徙也共工官名歡兜人名二人比周相與為黨三苗國名負固不服殺殺其君也殛誅也鯀禹父名方命圯族治水無功皆不仁之人也幽州崇山三危羽山有庳皆地名也或曰今道州鼻亭即有庳之地也未知是否萬章疑舜不當封象使彼有庳之民無罪而遭象之虐非仁人之心也藏怒謂藏匿其怒宿怨謂留蓄其怨敢問或曰放者何謂也曰象不得有為於其國天子使吏治其國而納其貢稅焉故謂之放豈得暴彼民哉雖然欲常常而見之故源源而來不及貢以政接于有庳此之謂也孟子言象雖封為有庳之君然不得治其國天子使吏代之治而納其所收之貢稅於象有似於放故或者以為放也蓋象至不仁處之如此則既不失我親愛之心而彼亦不得虐有庳之民也源源若水之相繼也來謂來朝覲也不及貢以政接于有庳謂不待及諸侯朝貢之期而以政事接見有庳之君蓋古書之辭而孟子引以證源源而來之意見其親愛之無已如此也吳氏曰言聖人不以公義廢私恩亦不以私恩害公義舜之於象仁之至義之盡也聖人不以公義廢私恩故不以象之惡而不與之以富貴亦不以私恩廢公義故使之不得有為於其國以暴其民舜之於象仁之至義之盡也衍義咸丘蒙問曰語云盛德之士君不得而臣父不得而子舜南面而立堯帥諸侯北面而朝之瞽瞍亦北面而朝之舜見瞽瞍其容有蹙孔子曰於斯時也天下殆哉岌岌乎不識此語誠然乎哉孟子曰否此非君子之言齊東野人之語也堯老而舜攝也堯典曰二十有八載放勳乃徂落百姓如喪考妣三年四海遏密八音孔子曰天無二日民無二王舜既為天子矣又帥天下諸侯以為堯三年喪是二天子矣朝音潮岌魚及反咸丘蒙孟子弟子語者古語也蹙顰蹙不自安也岌岌不安貌也言人倫乖亂天下將危也齊東齊國之東鄙也孟子言堯但老不治事而舜攝天子之事耳堯在時舜未嘗即天子位堯何由北面而朝乎又引書及孔子之言以明之堯典虞書篇名今此文乃見於舜典蓋古書二篇或合為一耳言舜攝位二十八年而堯死也徂升也落降也人死則魂升而魄降故古者謂死為徂落遏止也密靜也八音金石絲竹匏土革木樂器之音也咸丘蒙曰舜之不臣堯則吾既得聞命矣詩云普天之下莫非王土率土之濵莫非王臣而舜既為天子矣敢問瞽瞍之非臣如何曰是詩也非是之謂也勞於王事而不得養父母也曰此莫非王事我獨賢勞也故説詩者不以文害辭不以辭害志以意逆志是為得之如以辭而已矣雲漢之詩曰周餘黎民靡有孑遺信斯言也是周無遺民也不臣堯不以堯為臣使北面而朝也詩小雅北山之篇也普遍也率循也此詩今毛氏序云役使不均已勞於王事而不得養其父母焉其詩下文亦云大夫不均我從事獨賢乃作詩者自言天下皆王臣何為獨使我以賢才而勞苦乎非謂天子可臣其父也文字也辭語也逆迎也雲漢大雅篇名也孑獨立之貌遺脫也言説詩之法不可以一字而害一句之義不可以一句而害設辭之志當以已意迎取作者之志乃為得之若但以其辭而已則如雲漢所言是周之民真無遺種矣惟以意逆之則知作詩者之志在於憂旱而非真無遺民也孝子之至莫大乎尊親尊親之至莫大乎以天下養為天子父尊之至也以天下養養之至也詩曰永言孝思孝思維則此之謂也養去聲言瞽瞍既為天子之父則當享天下之養此舜之所以為尊親養親之至也豈有使之北面而朝之理乎詩大雅下武之篇言人能長言孝思而不忘則可以為天下法則也書曰祗載見瞽瞍夔夔齊栗瞽瞍亦允若是為父不得而子也見音現齊側皆反書大禹謨篇也祗敬也載事也夔夔齊栗敬謹恐懼之貌允信也若順也言舜敬事瞽瞍往而見之敬謹如此瞽瞍亦信而順之也孟子引此而言瞽瞍不能以不善及其子而反見化於其子則是所謂父不得子者而非如咸丘蒙之説也萬章曰堯以天下與舜有諸孟子曰否天子不能以天下與人天下者天下之天下非一人之私有故也然則舜有天下也孰與之曰天與之萬章問而孟子答也天與之者諄諄然命之乎諄之淳反萬章問也諄諄詳語之貌曰否天不言以行與事示之而已矣行去聲下同行之於身謂之行措諸天下謂之事言但因舜之行事而示以與之之意耳曰以行與事示之者如之何曰天子能薦人於天不能使天與之天下諸侯能薦人於天子不能使天子與之諸侯大夫能薦人於諸侯不能使諸侯與之大夫昔者堯薦舜於天而天受之暴之於民而民受之故曰天不言以行與事示之而已矣暴步卜反下同暴顯也言下能薦人於上不能令上必用之舜為天人所受是因舜之行與事而示之以與之之意也曰敢問薦之於天而天受之暴之於民而民受之如何曰使之主祭而百神享之是天受之使之主事而事治百姓安之是民受之也天與之人與之故曰天子不能以天下與人治去聲舜相堯二十有八載非人之所能為也天也堯崩三年之喪畢舜避堯之子於南河之南天下諸侯朝覲者不之堯之子而之舜訟獄者不之堯之子而之舜謳歌者不謳歌堯之子而謳歌舜故曰天也夫然後之中國踐天子位焉而居堯之宫逼堯之子是篡也非天與也相去聲朝音潮夫音扶南河在冀州之南其南即豫州也訟獄謂獄不決而訟之也太誓曰天視自我民視天聽自我民聽此之謂也自從也天無形其視聽皆從於民之視聽民之歸舜如此則天與之可知矣萬章問曰人有言至於禹而德衰不傳於賢而傳於子有諸孟子曰否不然也天與賢則與賢天與子則與子昔者舜薦禹於天十有七年舜崩三年之喪畢禹避舜之子於陽城天下之民從之若堯崩之後不從堯之子而從舜也禹薦益於天七年禹崩三年之喪畢益避禹之子於箕山之隂朝覲訟獄者不之益而之啓曰吾君之子也謳歌者不謳歌益而謳歌啓曰吾君之子也朝音潮陽城箕山之隂皆嵩山下深谷中可藏處也啓禹之子也楊氏曰此語孟子必有所受然不可考矣但云天與賢則與賢天與子則與子可以見堯舜禹之心皆無一毫私意也丹朱之不肖舜之子亦不肖舜之相堯禹之相舜也歷年多施澤於民久啓賢能敬承繼禹之道益之相禹也歷年少施澤於民未久舜禹益相去久逺其子之賢不肖皆天也非人之所能為也莫之為而為者天也莫之致而至者命也之相之相去聲相去之相如字堯舜之子皆不肖而舜禹之為相久此堯舜之子所以不有天下而舜禹有天下也禹之子賢而益相不久此啓所以有天下而益不有天下也然此皆非人力所為而自為非人力所致而自至者蓋以理言之謂之天自人言之謂之命其實則一而已匹夫而有天下者德必若舜禹而又有天子薦之者故仲尼不有天下孟子因禹益之事歷舉此下兩條以推明之言仲尼之德雖無愧於舜禹而無天子薦之者故不有天下繼世以有天下天之所廢必若桀紂者也故益伊尹周公不有天下繼世而有天下者其先世皆有大功德於民故必有大惡如桀紂則天乃廢之如啓及太甲成王雖不及益伊尹周公之賢聖但能嗣守先業則天亦不廢之故益伊尹周公雖有舜禹之德而亦不有天下伊尹相湯以王於天下湯崩太丁未立外丙二年仲壬四年太甲顛覆湯之典刑伊尹放之於桐三年太甲悔過自怨自艾於桐處仁遷義三年以聽伊尹之訓已也復歸于亳相王皆去聲艾音乂此承上文言伊尹不有天下之事趙氏曰太丁湯之太子未立而死外丙立二年仲壬立四年皆太丁弟也太甲太丁子也程氏曰古人謂歲為年湯崩時外丙方二歲仲壬方四歲惟太甲差長故立之也二説未知孰是顚覆壞亂也典刑常法也桐湯墓所在艾治也説文云芟草也蓋斬絶自新之意亳商所都也周公之不有天下猶益之於夏伊尹之於殷也此復言周公所以不有天下之意孔子曰唐虞禪夏后殷周繼其義一也禪音擅禪授也或禪或繼皆天命也聖人豈有私意於其間哉尹氏曰孔子曰唐虞禪夏后殷周繼其義一也孟子曰天與賢則與賢天與子則與子知前聖之心者無如孔子繼孔子者孟子而已矣萬章問曰人有言伊尹以割烹要湯有諸要平聲下同要求也案史記伊尹欲行道以致君而無由乃為有莘氏之媵臣負鼎俎以滋味説湯致於王道蓋戰國時有為此説者孟子曰否不然伊尹耕於有莘之野而樂堯舜之道焉非其義也非其道也祿之以天下弗顧也繫馬千駟弗視也非其義也非其道也一介不以與人一介不以取諸人樂音洛莘國名樂堯舜之道者誦其詩讀其書而欣慕愛樂之也駟四匹也介與草芥之芥同言其辭受取與無大無細一以道義而不苟也湯使人以幣聘之囂囂然曰我何以湯之聘幣為哉我豈若處畎畝之中由是以樂堯舜之道哉囂五髙反又户驕反囂囂無欲自得之貌湯三使往聘之既而幡然改曰與我處畎畝之中由是以樂堯舜之道吾豈若使是君為堯舜之君哉吾豈若使是民為堯舜之民哉吾豈若於吾身親見之哉幡然變動之貌於吾身親見之言於我之身親見其道之行不徒誦説向慕之而已也天之生此民也使先知覺後知使先覺覺後覺也豫天民之先覺者也豫將以斯道覺斯民也非豫覺之而誰也此亦伊尹之言世知謂識其事之當然覺謂悟其理之所以然覺後知後覺如呼寐者而使之寤也言天使者天理當然若使之也程子曰豫天民之先覺謂我乃天生此民中盡得民道而先覺者也既為先覺之民豈可不覺其未覺者及彼之覺亦非分我所有以豫之也皆彼自有此理我但能覺之而已思天下之民匹夫匹婦有不被堯舜之澤者若已推而內之溝中其自任以天下之重如此故就湯而説之以伐夏救民推吐回反內音納説音稅書曰昔先正保衡作我先王曰豫弗克俾厥后為堯舜其心愧恥若撻于市一夫不獲則曰時豫之辜孟子之言蓋取諸此是時夏桀無道暴虐其民故欲使湯伐夏以救之徐氏曰伊尹樂堯舜之道堯舜揖遜而伊尹説湯以伐夏者時之不同義則一也吾未聞枉已而正人者也況辱已以正天下者乎聖人之行不同也或逺或近或去或不去歸潔其身而已矣行去聲辱已甚於枉已正天下難於正人若伊尹以割烹要湯辱已甚矣何以正天下乎逺謂隱遁也近謂仕近君也言聖人之行雖不必同然其要歸在潔其身而已伊尹豈肯以割烹要湯哉吾聞其以堯舜之道要湯未聞以割烹也林氏曰以堯舜之道要湯者非實以是要之也道在此而湯之聘自來耳猶子貢言夫子之求之異乎人之求之也愚謂此語亦猶前章所論父不得而子之意問集注中説曽點有樂此終身之語如何曰觀舜居深山之中伊尹耕於有莘之野豈不是樂以終身後來事業亦偶然耳若先有一毫安排等待之心便成病痛矣伊訓曰天誅造攻自牧宫朕載自亳伊訓商書篇名孟子引以證伐夏救民之事也今書牧宫作鳴條造載皆始也伊尹言始攻桀無道由我始其事於亳也萬章問曰或謂孔子於衛主癰疽於齊主侍人瘠環有諸乎孟子曰否不然也好事者為之也癰於容反疽七余反好去聲主謂舍於其家以之為主人也癰疽瘍醫也侍人奄人也瘠姓環名皆時君所近狎之人也好事謂喜造言生事之人也於衛主顔讎由彌子之妻與子路之妻兄弟也彌子謂子路曰孔子主我衛卿可得也子路以告孔子曰有命孔子進以禮退以義得之不得曰有命而主癰疽與侍人瘠環是無義無命也讎如字又音犫顔讎由衛之賢大夫也史記作顔濁鄒彌子衛靈公幸臣彌子瑖也徐氏曰禮主於辭遜故進以禮義主於斷制故退以義難進而易退者也在我者有禮義而已得之不得則有命存焉孔子不恱於魯衛遭宋桓司馬將要而殺之微服而過宋是時孔子當厄主司城貞子為陳侯周臣要平聲不恱不樂居其國也桓司馬宋大夫向魋也司城貞子亦宋大夫之賢者也陳侯名周案史記孔子為魯司寇齊人饋女樂以間之孔子遂行適衛月餘去衛適宋司馬魋欲殺孔子孔子去至陳主於司城貞子孟子言孔子雖當厄難然猶擇所主況在齊衛無事之時豈有主癰疽侍人之事乎吾聞觀近臣以其所為主觀逺臣以其所主若孔子主癰疽與侍人瘠環何以為孔子近臣在朝之臣逺臣逺方來仕者君子小人各從其類故觀其所為主與其所主者而其人可知南軒曰孔子進以禮退以義非聖人擇禮義而為進退聖人進退無非禮義禮義之所在固命之所存也君子小人各從其類故近臣而賢必能舉逺臣之賢者逺臣而賢亦必有近臣之賢者以舉之故觀其所舉之賢否則近臣之為人可知觀舉者之賢否則逺臣之為人可知衍義萬章問曰或曰百里奚自鬻於秦養牲者五羊之皮食牛以要秦穆公信乎孟子曰否不然好事者為之也食音嗣好去聲下同百里奚虞之賢臣人言其自賣於秦養牲者之家得五羊之皮而為之食牛因以干秦穆公也百里奚虞人也晉人以垂棘之璧與屈産之乘假道於虞以伐虢宫之竒諫百里奚不諫屈求勿反乘去聲虞虢皆國名垂棘之璧埀棘之地所出之璧也屈産之乘屈地所生之良馬也乘四匹也晉欲伐虢道經於虞故以此物借道其實欲并取虞宫之竒亦虞之賢臣諫虞公令勿許虞公不用遂為晉所滅百里奚知其不可諫故不諫而去之知虞公之不可諫而去之秦年已七十矣曽不知以食牛干秦穆公之為汙也可謂智乎不可諫而不諫可謂不智乎知虞公之將亡而先去之不可謂不智也時舉於秦知穆公之可與有行也而相之可謂不智乎相秦而顯其君於天下可傳於後世不賢而能之乎自鬻以成其君鄉黨自好者不為而謂賢者為之乎相去聲自好自愛其身之人也孟子言百里奚之智如此必知食牛以干主之為汙其賢又如此必不肯自鬻以成其君也然此事當孟子時已無所據孟子直以事理反覆推之而知其必不然耳范氏曰古之聖賢未遇之時鄙賤之事不恥為之如百里奚為人養牛無足怪也惟是人君不致敬盡禮則不可得而見豈有先自汙辱以要其君哉莊周曰百里奚爵祿不入於心故飯牛而牛肥使穆公忘其賤而與之政亦可謂知百里奚矣伊尹百里奚之事皆聖賢出處之大節故孟子不得不辨尹氏曰當時好事者之論大率類此蓋以其不正之心度聖賢也孟子集編卷九
