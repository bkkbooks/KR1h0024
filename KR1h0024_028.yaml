body:
  text: 欽定四庫全書孟子集編卷十二宋真德秀撰告子章句下凡十六章任人有問屋廬子曰禮與食孰重曰禮重任平聲任國名屋廬子名連孟子弟子也色與禮孰重任人復問也曰禮重曰以禮食則飢而死不以禮食則得食必以禮乎親迎則不得妻不親迎則得妻必親迎乎迎去聲屋廬子不能對明日之鄒以告孟子孟子曰於答是也何有於如字何有不難也不揣其本而齊其末方寸之木可使髙於岑樓揣初委反本謂下末謂上方寸之木至卑喻食色岑樓樓之髙鋭似山者至髙喻禮若不取其下之平而升寸木於岑樓之上則寸木反髙岑樓反卑矣金重於羽者豈謂一鉤金與一輿羽之謂哉鉤帶鉤也金本重而帶鉤小故輕喻禮有輕於食色者羽本輕而一輿多故重喻食色有重於禮者取食之重者與禮之輕者而比之奚翅食重取色之重者與禮之輕者而比之奚翅色重翅與啻同古字通用施智反禮食親迎禮之輕者也飢而死以滅其性不得妻而廢人倫食色之重者也奚翅猶言何但言其相去懸絶不但有輕重之差而已往應之曰紾兄之臂而奪之食則得食不紾則不得食則將紛之乎踰東家牆而摟其處子則得妻不摟則不得妻則將摟之乎紾音軫摟音婁紾戾也摟牽也處子處女也此二者禮與食色皆其重者而以之相較則禮為尤重也此章言義理事物其輕重固有大分然於其中又各自有輕重之别聖賢於此錯綜斟酌毫髮不差固不肯枉尺而直尋亦未嘗膠柱而調瑟所以斷之一視於理之當然而已矣曹交問曰人皆可以為堯舜有諸孟子曰然趙氏曰曹交曹君之弟也人皆可以為堯舜疑古語或孟子所嘗言也交聞文王十尺湯九尺今交九尺四寸以長句食粟而已如何則可曹交問也食粟而已言無他材能也曰奚有於是亦為之而已矣有人於此力不能勝一匹雛則為無力人矣今曰舉百鈞則為有力人矣然則舉烏獲之任是亦為烏獲而已矣夫人豈以不勝為患哉弗為耳勝平聲匹字本作鴄鴨也從省作匹禮記説匹為鶩是也烏獲古之有力人也能舉移干釣徐行後長者謂之弟疾行先長者謂之不弟夫徐行者豈人所不能哉所不為也堯舜之道孝弟而已矣後去聲長上聲先去聲夫音扶陳氏曰孝弟者人之良知良能自然之性也堯舜人倫之至亦率是性而已豈能加毫末於是哉楊氏曰堯舜之道大矣而所以為之乃在夫行止疾徐之間非有甚髙難行之事也百姓蓋日用而不知耳子服堯之服誦堯之言行堯之行是堯而已矣子服桀之服誦桀之言行桀之行是桀而已矣之行並去聲言為善為惡皆在我而已詳曹交之問淺陋粗率必其進見之時禮貌衣冠言動之間多不循禮故孟子告之如此兩節云曰交得見於鄒君可以假館願留而受業於門見音現假館而後受業又可見其求道之不篤曰夫道若大路然豈難知哉人病不求耳子歸而求之有餘師夫音扶言道不難知若歸而求之事親敬長之間則性分之內萬理皆備隨處發見無不可師不必留此而受業也曹交事長之禮既不至求道之心又不篤故孟子教之以孝弟而不容其受業蓋孔子餘力學文之意亦不屑之教誨也問云云曰楊氏之説有曰佛者龐藴有神通并妙用運水及搬柴此乃自得之言最為達理但其言周遮便更通徹亦須把來做一件事若孟子之言則無適不然矣愚竊惑之夫釋氏之言偶與聖賢相似者多矣但其本不同則雖相似而實相反也蓋如此章孟子之言均是行也而一疾一徐其間便有堯桀之異是乃物則民彞自然之實理而豈人之所能為哉若釋氏之言則但能運水搬柴則雖倒行逆施亦無適而不可矣何必徐行而後可以為堯哉蓋其學以空為真以理為障而以縱橫作用為竒特故與吾儒之論正相南北至於如此今不察焉而以達理自得稱之至語其病則以為特在於周遮著意而已如此則是凡為物者去此二病而遂與吾學不殊也程子有言以吾觀於釋氏句句同事事合然以其本之不正是以卒無一事之同正謂此爾或問於胡文定曰禪者以拈槌豎拂為妙用如何公曰以此為用用而不妙須是動容周旋中禮始是妙用處求之楊氏之言其得失可見矣公孫丑問曰髙子曰小辨小人之詩也孟子曰何以言之曰怨辨音盤髙子齊人也小辨小雅篇名周幽王娶申后生太子宜臼又得褒姒生伯服而黜申后廢冝臼於是冝臼之傅為作此詩以敘其哀痛迫切之情也曰固哉髙叟之為詩也有人於此越人關弓而射之則已談笑而道之無他疏之也其兄關弓而射之則已垂涕泣而道之無他戚之也小辨之怨親親也親親仁也固矣夫髙叟之為詩也關與彎同射食亦反夫音扶固謂執滯不通也為猶治也越蠻夷國名道語也親親之心仁之發也曰凱風何以不怨凱風弼風篇名衛有七子之母不能安其室七子作詩以自責也曰凱風親之過小者也小辨親之過大者也親之過大而不怨是愈疏也親之過小而怨是不可磯也愈疏不孝也不可磯亦不孝也磯音機磯水激石也不可磯言微激之而遽怒也孔子曰舜其至孝矣五十而慕言舜猶怨慕小辨之怨不為不孝也趙氏曰生之膝下一體而分喘息呼吸氣通於親當親而疏怨慕號天是以小辨之怨未足為愆也或問五十而慕何必舜武夷胡氏曰所謂慕者不變其初心也初心者赤子之心也為舜父母日欲殺舜與他人父母不同故獨言舜耳此一節又當與前章參玩云又晉獻公將廢太子申生里克諫不聽太子曰吾其廢乎里克曰子懼不孝不懼不得立修已而不責人則免於難君子曰善處父子之間季武子立其愛子悼子而以長子公鉏為馬正公鉏愠而不出閔子馬見之曰子無然禍福無門惟人所召為人子者患不孝不患無所敬共父命何常之有若能孝敬富倍季氏可也姦回不軌禍倍下民可也公鉏然之敬共朝夕恪居官次季孫果喜而厚之為人子者不幸而處愛憎興廢之間則於里克閔子馬之言可不念之哉宋牼將之楚孟子遇於石丘牼口莖反宋姓牼名石丘地名曰先生將何之趙氏曰學士年長者故謂之先生曰吾聞秦楚構兵我將見楚王説而罷之楚王不恱我將見秦王説而罷之二王我將有所遇焉説音稅時宋牼方欲見楚王恐其不恱則將見秦王也遇合也案莊子書有宋鈃者禁攻寢兵救世之戰上説下教強聒不舍疏云齊宣王時人以事考之疑即此人也曰軻也請無問其詳願聞其指説之將何如曰我將言其不利也曰先生之志則大矣先生之號則不可徐氏曰能於戰國擾攘之中而以罷兵息民為説其志可謂大矣然以利為名則不可也先生以利説秦楚之王秦楚之王恱於利以罷三軍之師是三軍之士樂罷而恱於利也為人臣者懷利以事其君為人子者懷利以事其父為人弟者懷利以事其兄是君臣父子兄弟終去仁義懷利以相接然而不亡者未之有也樂音洛下同先生以仁義説秦楚之王秦楚之王恱於仁義而罷三軍之師是三軍之士樂罷而恱於仁義也為人臣者懷仁義以事其君為人子者懷仁義以事其父為人弟者懷仁義以事其兄是君臣父子兄弟去利懷仁義以相接也然而不王者未之有也何必曰利王去聲此章言休兵息民為事則一然其心有義利之殊而其效有興亡之異學者所當深察而明辨之也南軒曰事一也而情有異則所感與其所應皆不同是以古之謀國者以義理不以利害此天理人欲之所以分而治忽之所由係蓋不可不謹於其源也夫説二君而使之罷兵非不善也然由宋牼之説而説之以利使其能從亦利心耳罷兵雖息一時之事而徇利實傷萬世之彞自衆人論之惟欲其説之行而不睹其害於後在君子則寧説之不行不忍失正理而啓禍源也故使二君恱於利而聽從則三軍之士樂罷而恱於利以至於觀聽之間亦莫不動焉上下憧憧徒知利之為利則凡私已而自便者無不為也人欲肆行君臣父子兄弟之大倫亦且不暇恤矣則豈非危亡之道乎由孟子之説而説以仁義使二君幸而聽則是其心復於正道三軍之士樂罷而恱於仁義則皆知仁義至重將於君臣父子兄弟之際無非以是心相與人心正而治道興矣三代之所以王者用此道也然則其説則同所以説者異毫釐之差霄壤之分可不謹哉學者有見於此則知五伯之在春秋為功之首而罪之魁也又知曽西之所以卑管晏而尊子路者也則庶乎知入德之門矣戰國交兵之禍烈矣宋牼一言而罷之豈非生民之福而仁人之所甚願者哉顧利端一開君臣父子兄弟將惟利是趨春秋弒君三十六大抵皆見利而動其禍又有甚於交兵者是以聖賢不得不嚴其防也衍義孟子居鄒季任為任處守以幣交受之而不報處於平陸儲子為相以幣交受之而不報任平聲相去聲下同趙氏曰季任任君之弟任君朝會於鄰國季任為之居守其國也儲子齊相也不報者來見則當報之但以幣交則不必報也他日由鄒之任見季子由平陸之齊不見儲子屋廬子喜曰連得間矣屋廬子知孟子之處此必有義理故喜得其間隙而問之問曰夫子之任見季子之齊不見儲子為其為相與為其之為去聲下同與平聲言儲子但為齊相不若季子攝守君位故輕之邪曰非也書曰享多儀儀不及物曰不享惟不役志于享書周書洛誥之篇享奉上也儀禮也物幣也役用也言雖享而禮意不及其幣則是不享矣以其不用志于享故也為其不成享也孟子釋書意如此屋廬子恱或問之屋廬子曰季子不得之鄒儲子得之平陸徐氏曰季子為君居守不得往他國以見孟子則以幣交而禮意已備儲子為齊相可以至齊之境內而不來見則雖以幣交而禮意不及其物也淳于髠曰先名實者為人也後名實者自為也夫子在三卿之中名實未加於上下而去之仁者固如此乎先後為皆去聲名聲譽也實事功也言以名實為先而為之者是有志於救民也以名實為後而不為者是欲獨善其身者也名實未加於上下言上未能正其君下未能濟其民也孟子曰居下位不以賢事不肖者伯夷也五就湯五就桀者伊尹也不惡汙君不辭小官者栁下惠也三子者不同道其趨一也一者何也曰仁也君子亦仁而已矣何必同惡趨並去聲仁者無私心而合天理之謂楊氏曰伊尹之就湯以三聘之勤也其就桀也湯進之也湯豈有伐桀之意哉其進伊尹以事之也欲其悔過遷善而已伊尹既就湯則以湯之心為心矣及其終也人歸之天命之不得已而伐之耳若湯初求伊尹即有伐桀之心而伊尹遂相之以伐桀是以取天下為心也以取天下為心豈聖人之心哉南軒曰淳于髠以孟子為卿於齊未久而遽去疑其為自為而非仁者之所為蓋髠徒知以為人為仁而不知仁之理存乎性者也故伯夷之不以賢事不肖伊尹之五就柳下惠之不惡不辭而皆為趨於仁以其皆本於天理之正故爾若徇夫為人之名以為仁而咈其性之理則所謂愛之本先亡而其所以為愛者特其情之流耳豈不反害於仁乎曰魯繆公之時公儀子為政子栁子思為臣魯之削也滋甚若是乎賢者之無益於國也公儀子名休為魯相子柳泄柳也削地見侵奪也髠譏孟子雖不去亦未必能有為也曰虞不用百里奚而亡秦穆公用之而霸不用賢則亡削何可得與與平聲百里奚事見前篇曰昔者王豹處於淇而河西善謳綿駒處於髙唐而齊右善歌華周把梁之妻善哭其夫而變國俗有諸內必形諸外為其事而無其功者髠未嘗睹之也是故無賢者也有則髠必識之華去聲王豹衛人善謳淇水名綿駒齊人善歌髙唐齊西邑華周把梁二人皆齊臣戰死於莒其妻哭之哀國俗化之皆善哭髠以此譏孟子仕齊無功未足為賢也曰孔子為魯司寇不用從而祭燔肉不至不稅冕而行不知者以為為肉也其知者以為為無禮也乃孔子則欲以微罪行不欲為苟去君子之所為衆人固不識也稅音脫為肉為無之為去聲案史記孔子為魯司寇攝行相事齊人聞而懼於是以女樂遺魯君季桓子與魯君往觀之怠於政事子路曰夫子可以行矣孔子曰魯今且郊如致膰于大夫則吾猶可以止桓子卒受齊女樂郊又不致膰爼于大夫孔子遂行孟子言以為為肉者固不足道以為為無禮則亦未為深知孔子者蓋聖人於父母之國不欲顯其君相之失又不欲為無故而苟去故不以女樂去而以膰肉行其見幾明決而用意忠厚固非衆人所能識也然則孟子之所為豈髠之所能識哉尹氏曰淳于髠未嘗知仁而未嘗識賢也冝乎其言若是孟子曰五霸者三王之罪人也今之諸侯五霸之罪人也今之大夫令之諸侯之罪人也趙氏曰五霸齊桓晉文秦穆宋襄楚莊也三王夏禹商湯周文武也丁氏曰夏昆吾商大彭豕韋周齊桓晉文謂之五霸天子適諸侯曰巡狩諸侯朝於天子曰述職春省耕而補不足秋省斂而助不給入其疆土地辟田野治養老尊賢俊傑在位則有慶慶以地入其疆土地荒蕪遺老失賢掊克在位則有讓一不朝則貶其爵再不朝則削其地三不朝則六師移之是故天子討而不伐諸侯伐而不討五霸者摟諸侯以伐諸侯者也故曰五霸者三王之罪人也朝音潮辟與闢同治平聲慶賞也益其地以賞之也掊克聚斂也讓責也移之者誅其罪而變置之也討者出命以討其罪而使方伯連帥帥諸侯以伐之也伐者奉天子之命聲其罪而伐之也摟牽也五霸牽諸侯以伐諸侯不用天子之命也自入其疆至則冇讓言巡狩之事自一不朝至六師移之言述職之事五霸桓公為盛葵丘之會諸侯束牲載書而不歃血初命曰誅不孝無易樹子無以妾為妻再命曰尊賢育才以彰有德三命曰敬老慈幼無忘賔旅四命曰士無世官官事無攝取士必得無專殺大夫五命曰無曲防無遏糴無有封而不告曰凡我同盟之人既盟之後言歸于好今之諸侯皆犯此五禁故曰今之諸侯五霸之罪人也歃所洽反糴音狄好去聲案春秋傳僖公九年葵丘之會陳牲而不殺讀書加於牲上一明天子之禁樹立也已立世子不得擅易初命三事所以修身正家之要也賔賔客也旅行旅也皆當有以待之不可忽忘也士世祿而不世官恐其未必賢也官事無攝當廣求賢才以充之不可以闕人廢事也取士必得必得其人也無專殺大夫有罪則請命於天子而後殺之也無曲防不得曲為隄防壅泉激水以專小利病鄰國也無遏糴鄰國凶荒不得閉糴也無有封而不告者不得專封國邑而不告天子也長君之惡其罪小逄君之惡其罪大今之大夫皆逢君之惡故曰今之大夫今之諸侯之罪人也長上聲君冇過不能諫又順之者長君之惡也君之過未萌而先意導之者逢君之惡也林氏曰邵子有言治春秋者不先治五霸之功罪則事無統理而不得聖人之心春秋之間有功者未有大於五霸有過者亦未有大於五霸故五霸者功之首罪之魁也孟子此章之義其亦若此也與然五霸得罪於三王今之諸侯得罪於五霸皆出於異世故得以逃其罪至於今之大夫其得罪於今之諸侯則同時矣而諸侯非惟莫之罪也乃反以為良臣而厚禮之不以為罪而反以為功何其謬哉魯欲使愼子為將軍愼子魯臣孟子曰不教民而用之謂之殃民殃民者不容於堯舜之世教民者教之禮義使知入事父兄出事長上也用之使之戰也一戰勝齊遂有南陽然且不可是時魯蓋欲使愼子伐齊取南陽也故孟子言就使愼子善戰有功如此且猶不可愼子勃然不恱曰此則滑釐所不識也滑音骨滑釐愼子名曰吾明告子天子之地方千里不千里不足以待諸侯諸侯之地方百里不百里不足以守宗廟之典籍待諸侯謂待其朝覲聘問之禮宗廟典籍祭祀會同之常制也周公之封於魯為方百里也地非不足而儉於百里太公之封於齊也亦為方百里也地非不足也而儉於百里二公有大勳勞於天下而其封國不過百里儉止而不過之意也今魯方百里者五子以為有王者作則魯在所損乎在所益乎魯地之大皆并吞小國而得之有王者作則必在所損矣徒取諸彼以與此然且仁者不為況於殺人以求之乎徒空也言不殺人而取之也君子之事君也務引其君以當道志於仁而已當道謂事合於理志仁謂心在於仁南軒曰孟子下章云云大抵於此章意同戰國之臣所以事君者徒以富國強兵為急其君亦固以此為臣之忠於我而孟子以為民賊何哉蓋君不鄉道不志於仁而但為之為富強之計則君益驕肆民益憔悴是上成君之惡而下絶民之命也當時諸侯以民賊為良臣豈不痛哉孟子之言曰由今之道無變今之俗雖與之天下不能一朝居此聖賢拔本塞源之意今之道功利之道也今之俗功利之俗也由是道不變其俗本源既差縱使其間節目之善亦終無以相逺也故必以不由其道為先不由其道則由仁義之道矣由仁義之道變而為仁義之俗然後名正言順而事可成也所謂不能一朝居者功利既勝人紀隳喪雖得天下何以維持主守之乎故功愈就而害愈深利愈大而禍愈速富國強兵之説至於秦可謂獲其利矣然自始皇初并天下固已在絶滅之中人心內離豈復為秦之臣哉孟子謂雖與天下不能一朝居者寧不信乎知此義而後可以謀人之國矣孟子曰今之事君者曰我能為君辟土地充府庫今之所謂良臣古之所謂民賊也君不鄉道不志於仁而求富之是富桀也為去聲辟與闢同鄉與向同下皆同辟開墾也我能為君約與國戰必克今之所謂良臣古之所謂民賊也君不鄉道不志於仁而求為之強戰是輔桀也約要結也與國和好相與之國也由今之道無變今之俗雖與之天下不能一朝居也言必爭奪而至於危亡也白圭曰吾欲二十而取一何如白圭名丹周人也欲更稅法二十分而取其一分林氏曰案史記白圭能薄飲食忍耆欲與童僕同苦樂樂觀時變人棄我取人取我與以此居積致富其為此論蓋欲以其術施之國家也孟子曰子之道貉道也貉音陌貉北方夷狄之國名也萬室之國一人陶則可乎曰不可器不足用也孟子設喻以詰圭而圭亦知其不可也曰夫貉五穀不生惟黍生之無城郭宫室宗廟祭祀之禮無諸侯幣帛饔飧無百官有司故二十取一而足也夫音扶北方地寒不生五榖黍蚤熟故生之饔飧以飲食饋客之禮也今居中國去人倫無君子如之何其可也無君臣祭祀交際之禮是去人倫無百官有司是無君子陶以寡且不可以為國況無君子乎因其辭以折之欲輕之於堯舜之道者大貉小貉也欲重之於堯舜之道者大桀小桀也什一而稅堯舜之道也多則桀寡則貉今欲輕重之則是小貉小桀而已白圭曰丹之治水也愈於禹趙氏曰當時諸侯有小水白圭為之築隄壅而注之他國孟子曰子過矣禹之治水水之道也順水之性也是故禹以四海為壑今吾子以鄰國為壑壑受水處也水逆行謂之洚水洚水者洪水也仁人之所惡也吾子過矣惡去聲水逆行者下流壅塞故水逆流今乃壅水以害人則與洪水之災無異矣孟子曰君子不亮惡乎執惡平聲亮信也與諒同惡乎執言凡事苟且無所執持也魯欲使樂正子為政孟子曰吾聞之喜而不寐喜其道之得行公孫丑曰樂正子強乎曰否有知慮乎曰否多聞識乎曰否知去聲此三者皆當世之所尚而樂正子之所短故丑疑而歷問之然則奚為喜而不寐丑問也曰其為人也好善好去聲下同好善足乎丑問也曰好善優於天下而況魯國乎優有餘裕也言雖治天下尚有餘力也夫苟好善則四海之內皆將輕千里而來告之以善夫音扶下同輕易也言不以千里為難也夫苟不好善則人將曰訑訑豫既已知之矣訑訑之聲音顔色距人於千里之外士止於千里之外則讒諂面諛之人至矣與讒諂面諛之人居國欲治可得乎訑音移治去聲訑訑自足其智不嗜善言之貌君子小人迭為消長直諒多聞之士逺則讒諂面諛之人至理勢然也此章言為政不在於用一已之長而貴於有以來天下之善陳子曰古之君子何如則仕孟子曰所就三所去三其目在下迎之致敬以有禮言將行其言也則就之禮貌未衰言弗行也則去之所謂見行可之仕若孔子於季桓子是也受女樂而不朝則去之矣其次雖未行其言也迎之致敬以有禮則就之禮貌衰則去之所謂際可之仕若孔子於衛靈公是也故與公遊於囿公仰視蜚鴈而後去之其下朝不食夕不食飢餓不能出門户君聞之曰吾大者不能行其道又不能從其言也使飢餓於我土地吾恥之周之亦可受也免死而已矣所謂公養之仕也君之於民固有周之之義況此又有悔過之言所以可受然未至於飢餓不能出門户則猶不受也其曰免死而已則其所受亦有節矣南軒曰此三者足以盡君子去就之分舍是三者則皆為以利動而非義之所存矣孟子曰舜發於畎畝之中傅説舉於版築之間膠鬲舉於魚鹽之中管夷吾舉於士孫叔敖舉於海百里奚舉於市説音恱舜耕歷山三十登庸説築傅巖武丁舉之膠鬲遭亂鬻販魚鹽文王舉之管仲囚於士官桓公舉以相國孫叔敖隱處海濵楚莊王舉之為令尹百里奚事見前篇故天將降大任於是人也必先苦其心志勞其筋骨餓其體膚空乏其身行拂亂其所為所以動心忍性曽益其所不能曽與增同降大任使之任大事也若舜以下是也空窮也乏絶也拂戾也言使之所為不遂多背戾也動心忍性謂竦動其心堅忍其性也然所為性亦指氣稟食色而言耳程子曰若要熟也須從這裏過人恆過然後能改困於心衡於慮而後作徵於色發於聲而後喻衡與橫同恆常也猶言大率也橫不順也作奮起也徴驗也喻曉也此又言中人之性常必有過然後能改蓋不能謹於平日故必事勢窮蹙以至困於心橫於慮然後能奮發而興起不能燭於幾微故必事理暴著以至驗於人之色發於人之聲然後能警悟而通曉也入則無法家拂士出則無敵國外患者國恆亡拂與弼同此言國亦然也法家法度之世臣也拂士輔拂之賢士也然後知生於憂患而死於安樂也樂音洛以上文觀之則知人之生全出於憂患而死亡由於安樂矣尹氏曰言困窮拂鬱能堅人之志而熟人之仁以安樂失之者多矣南軒曰天將以大任降於後而憂患先之以成其德此豈人之所為哉所謂莫之為而為者天也其所遭若彼而所成就若是乃天也此六人者雖有聖賢淺深之異然始焉經履之艱而卒焉能勝其任則一也以舜之生知非有待於處憂患以成其德也舉舜之起於畎畝以見聖人亦由側微而興耳若在他人因憂患以成德則如下所云是已夫苦其心志勞其筋骨餓其體膚空乏其身行拂亂其所欲為是使之動心忍性而已動心言其心有所感動也忍性言忍其性之偏也動心則善端日萌而良心可存忍性則氣稟日化而天性可復此所謂增益其所不能也人恆過然後能改言凡人常見其有過而後能改過使其漠然不察其有過則過將日深何改之有知用力則懼吾過之多而改之惟恐不暇矣困於心謂有所攖拂於心衡於慮謂有所鬱塞於慮必如是而後有作作者油然有所興起於中也徵於色發於聲謂憂患憤悱發見於聲色必如是而後喻喻者言盎然默識其理之所在也作也喻也身親乃能知之非言語所可盡也則又推而言之以謂為國者亦然入則無法家拂士出則無敵國外患者國恆亡蓋泰然自以為是自以為莫豫毒則驕怠日長至於滅亡而不悟矣大抵治亂興亡常分於敬肆之間使在內而每聞逆耳之規在外而每有窺窬之患則戒懼之心存是心存則國可為也然後知生於憂患而死於安樂生言生之道也在身而身泰施之於天下國家無往而不為福也死言死之道天命絶于其躬而敗于其家凶于乃國者也然繼體之君公侯之裔生而處安樂之地無憂患之可歷則將如之何必也念安樂之可畏思天命之無常戒謹恐懼不敢有其安樂是乃困心衡慮之方生之道也然則所謂死於安樂者非安樂之能死之也以其溺於安樂而自絶焉耳故在君子則雖處安樂而生理未嘗不遂在小人則雖處憂患而亦未嘗不死於憂患所謂小人窮斯濫矣是也孟子曰教亦多術矣豫不屑之教誨也者是亦教誨之而已矣多術言非一端屑潔也不以其人為潔而拒絶之所謂不屑之教誨也其人若能感此退自修省則是亦我教誨之也尹氏曰言或抑或揚或與或不與各因其才而篤之無非教也南軒曰屑與不屑就不屑去之屑同訓教人之道不一而足聖賢之教人固不倦也然冇時而不輕其教誨者非拒之也是亦所以教誨之也然就不屑誨之中亦有數端焉或引而不發而使之自喻或懼其躐等而告之有序聖賢之書若是者多矣又有以其信之未篤則不留於門使自求之如孟子之於曹交以其行之未善則拒之不見而使之知之如孔子之於孺悲凡此亦皆為不輕其教誨而乃所以教誨之也蓋聖賢言動無非教也在學者領略之何如耳天之於物亦然傳曰天有四時雨露雷風無非教也孟子集編卷十二
