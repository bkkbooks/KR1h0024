body:
  text: 欽定四庫全書論語集編卷五宋真徳秀撰子罕第九凡三十章子罕言利與命與仁罕少也程子曰計利則害義命之理微仁之道大皆夫子所罕言也黄氏曰夫子與門人言仁多矣而曰罕言何也曰夫子與門人答問其言不勝其多而言仁猶其切要者故門人備記之而所記止於此則亦可謂之罕言矣况所言之仁亦不過汎及為仁之事至於仁之本體則未嘗直指以告人也仁者心之徳也然必忠信篤敬克已復禮然後能至若多言仁則學者凴虚躐等而反害於仁矣罕言仁者恐人輕易看了不知切已上做工夫南軒曰所謂命與仁者凡夫子之所言何莫非此理而何隠乎爾也在學者潛心如何耳然夫子未嘗指言也謂之罕亦可矣逹巷黨人曰大哉孔子博學而無所成名逹巷黨名其人姓名不傳博學無所成名葢美其學之博而惜其不成一藝之名也子聞之謂門弟子曰吾何執執御乎執射乎吾執御矣執專執也射御皆一藝而御為人僕所執尤卑言欲使我何所執以成名乎然則吾將執御矣聞人譽已承之以謙也尹氏曰聖人道全而徳備不可以偏長目之也逹巷黨人見孔子之大意其所學者博而惜其不以一善得名於世葢慕聖人而不知者也故孔子曰欲使我何執而得為名乎然則吾將執御矣南軒曰逹巷黨人大孔子之博學而疑其不能以偏成也夫豈知本末精粗一以貫之之道哉故夫子但舉一爇自居而又於藝中復居其次者以見夫道之無所不在善觀聖人則於此亦可以得之不然則愈失之也其言則謙而不居其意則完備矣子曰麻冕禮也今也純儉吾從衆麻冕緇布冠也純絲也儉謂省約緇布冠以三十升布為之升八十縷則其經二千四縷矣細宻難成不如用絲之省約拜下禮也今拜乎上泰也雖違衆吾從下臣與君行禮當拜於堂下君辭之乃升成拜泰驕慢也程子曰君子處世事之無害於義者從俗可也害於羲則不可從也子絶四毋意毋必毋固毋我絶無之盡者毋史記作無是也意私意也必期必也固執滯也我私已也四者相為終始起於意遂於必留於固而成於我也葢意必常在事前固我常在事後至於我又生意則物欲牽引循環不窮矣程子曰此毋字非禁止之辭聖人絶此四者何用禁止張子曰四者有一焉則與天地不相似楊氏曰非智足以知聖人詳視而默識之不足以記此或問聖人從容中道而有所絶有所無何也曰絶非屏絶之絶葢曰無之盡云爾毋無古通用故論語作毋而史記作無然經詩多以無為有無之稱毋為禁止之辭則當以史記為正曰四者之説其詳奈何曰無意者渾然天理不任私意無必者隨事順理不必期必也無固者過而不留無所凝滯也無我者大用於物不私一身也問云云先生曰湏知四者之相因凡人作事必先起意不問理之是非必欲其成而後已事既成又復執滯不化是之謂固三者只成就得一箇我及至我之根源愈大少閒三者又從這裏生出我生意意又生必必又生固又歸宿於我正如元亨利貞元了亨亨了又利利了又貞循環不已但有善不善之分耳問意必固我何以發發而當者理也發而不當者私意也此語是否曰不是如此所謂毋意者是不任已意只看道理如何見道理當如此便順理做將去自家無些子私心所以謂之無意若才有些安排布置底心便是任私意縦使發而偶然當理也只是私意未説到當理在伊川之語想是被門人錯記了不可知南軒曰夫子之於四者非待有所禁止蓋自無有耳絶云者所以見其無之甚也至於在學者而言於是四者必用工以克去之四者亡而後天理得子畏於匡畏者有戒心之謂匡地名史記云陽虎曾暴於匡夫子貌似陽虎故匡人圍之曰文王旣没文不在兹乎道之顯者謂之文若禮樂制度之謂不曰道而曰文亦謙辭也兹此也孔子自謂天之將喪斯文也後死者不得與於斯文也天之未喪斯文也匡人其如予何喪與皆去聲馬氏曰文王旣没故孔子自謂後死者言天若欲喪此文則必不使我得與於此文今我旣得與於此文則是天未欲喪此文也天旣未欲喪此文則匡人其奈我何言必不能違天害已也南軒曰文王旣没文不在兹聖人以斯文為已任也已之在與亡斯文之喪與未喪係焉是豈人之所能為哉天也不曰喪已而曰喪斯文蓋己之身即斯文之所在也大宰問於子貢曰夫子聖者與何其多能也大音泰與平聲孔氏曰大宰官名或呉或宋未可知也與疑辭大宰蓋以多能爲聖也子貢曰固天縱之將聖又多能也縦猶肆也言不為限量也將殆也謙若不敢知之辭聖無不通多能乃其餘事故言又以兼之子聞之曰大宰知我乎吾少也賤故多能鄙事君子多乎哉不多也言由少賤故多能而所能者鄙事爾非以聖而無不通也且多能非所以率人故又言君子不必多能以曉之牢曰子云吾不試故藝牢孔子弟子姓琴字子開一字子張試用也言由不為世用故得以習於藝而通之吳氏曰弟子記夫子此言之時子牢因言昔之所聞有如此者其意相近故井記之子曰吾有知乎哉無知也有鄙夫問於我空空如也我叩其兩端而竭焉叩音口孔子謙言己無知識但其告人雖於至愚不敢不盡耳叩發動也兩端猶言兩頭言終始本末上下精粗無所不盡程子曰聖人之敎人俯就之若此猶恐衆人以為高逺而不親也聖人之道必降而自卑不如此則人不親賢人之言則引而自高不如此則道不尊觀於孔子孟子則可見矣尹氏曰聖人之言上下兼盡極其近衆人皆可與知極其至則雖聖人亦無以加焉是之謂兩端如荅樊遲之問仁智兩端竭盡無餘藴矣若夫語上而移下語理而遺物則豈聖人之言哉南軒曰兩端者語近而逺者未嘗不具語卑而高者未嘗不存形而上曰道形而下曰器道與器非異體也聖人有隱乎爾哉在學者體之如何耳子曰鳯鳥不至河不出圖吾已矣乎夫音扶鳯靈鳥舜時來儀文王時鳴于岐山河圖河中龍馬負圖伏羲時出皆聖人之瑞也已止也張子曰鳯至圖出文明之祥伏羲舜文之瑞不至則夫子之文章知其已矣子見齊衰者冕衣裳者與瞽者見之雖少必作過之必趨齊音咨衰七雷反少去聲齊衰喪服冕冠也衣上服裳下服冕而衣裳貴者之盛服也瞽無目者作起也趨疾行也或曰少當作坐范氏曰聖人之心哀有喪尊有爵矜不成人其作與趨蓋有不期然而然者尹氏曰此聖人之誠心内外一者也南軒曰愛敬生於中而形於外惟聖人為能有常而無失齊衰哀有喪也於冕衣裳貴達尊也於瞽者矜困窮也推之則帝王所以治天下之綱要亦在是也顔淵喟然嘆曰仰之彌高鑽之彌堅瞻之在前忽焉在後喟苦位反鑽祖官反喟嘆聲仰彌高不可及鑚彌堅不可入在前在後恍惚不可為象此顏淵深知夫子之道無窮盡無方體而嘆之也夫子循循然善誘人博我以文約我以禮循循有次序貌誘引進也博文約禮敎之序也言夫子道雖高妙而敎人有序也侯氏曰博我以文致知格物也約我以禮克已復禮也程子曰此顔子稱聖人最切當處聖人教人唯此二事而已欲罷不能旣竭吾才如有所立卓爾雖欲從之末由也已卓立貌末無也此顏子自言其學之所至也蓋恱之深而力之盡所見益親而又無所用其力也吳氏曰所謂卓爾亦在乎日用行事之間非所謂窈冥昬黙者程子曰到此地位功夫尤難直是峻絶又大段著力不得楊氏曰自可欲之謂善充而至於大力行之積也大而化之則非力行所及矣此顏子所以未逹一間也程子曰此顏子所以為深知孔子而善學之者也胡氏曰無上事而喟然嘆此顏子學旣有得故述其先難之故後得之由而歸功於聖人也高堅前後語道體也仰鑽瞻忽未領其要也惟夫子循循善誘先博我以文使我知古今達事變然後約我以禮使我尊所閒行所知如行者之赴家食者之求飽是以欲罷而不能盡心盡力不少休廢然後見夫子所立之卓然雖欲從之末由也已是蓋不怠所從必欲至乎卓立之地也抑斯嘆也其在請事斯語之後三月不違之時乎夫子敎顏子只是博文約禮兩事自堯舜以來便如此說惟精便是博文惟一便是約禮博我以文是要四方八面都見得周匝無遺至於約之以禮又要逼向身已上來無一豪之下盡瞻仰鑽忽見得猶未親切在如有所立卓爾方始親切雖欲從之末由也已只是脚歩未到蓋不能得似聖人從容中道也或問云云曰此是顔子當初尋討不著時節仰之煞高一層之上又有一層鑽之又堅透一重又有一重瞻之又似在前及到著力趕上又却在後然夫子敎人又却循循善誘旣博之以文又約之以禮只如此敎我去下工夫久而後見道體卓爾立在這裏此見得親切處然雖欲從之却又末由也己此是顏子未逹一閒時説已當初捉摸不著時事顏子初見聖人之道廣大如此欲向前求之轉覺無下手處退而求之則見聖人所以循循善誘人者不過博文約禮於是就此處竭力求之而而所見始親切的當如有所立卓爾在前而嘆其峻絶著力不得也顔子仰鑽瞻忽初是捉摸不著夫子不就此啓發顔子只博之以文約之以禮令有用功處顏子做這工夫漸見得分曉至於欲罷不能己是住不得了及夫旣竭吾才如此精專方見夫子動容周旋無不中處皆是天理之流行卓然如此分曉到這裏只有一箇生熟顔子生些少未能渾化如夫子故曰雖欲從之末由也已問云云曰未到這裏須着力到這處自是用力不得如孔子六十而耳順七十而從心這處如何用力得只熟了自然恁地去横渠曰大可為也化不可為也在熟之而已所謂瞻之在前忽然在後只是箇中庸不可能蓋聖人之道是箇恰好底道理所以不可及自家才著意去做不知不覺又蹉過了且如恭而安固是聖人不可及處到得自家才著意去學時便恭而不安了此其所以不可能只是難得到那恰好處不著意又失之才著意又過了所以難横渠曰高明不可窮博厚不可極則中道不可識蓋顔子之歎也雖説得拘然亦自説得好或曰伊川過不及之説亦是此意否曰然南軒曰誦味此章則顔子學聖人終始之功孔子敎人先後之序與夫聖人之道之至皆可得而研求矣黄氏曰此章高堅前後之嘆所立卓爾之言固非後學所可窺測然以其不可窺測也故言之者徃徃流於恍惚無所據依之地敢於為言者反借佛老之説以議聖人其不敢者以委之於虚無不可測識之域故此章最為難曉惟呉氏以為亦在日用常行之間者最為切實今竊以其意推之夫聖人之道固高明廣大不可幾及然亦不過性情之間動容之際飲食起居交際應酬之務君臣父子兄弟夫婦之常出處去就辭受取舍以至於政事施設之閒無非道之所寓其所謂高堅前後者他人於此或未能無織豪之私或未能達義理之正或未能通權變之冝或未能極從容之妙故仰之但見其高鑽之但見其堅或前或後而無定所也顔子用力亦不過於博文約禮之閒而竭其力見益精行益熟而於聖人情性動容以至政事施設之類皆有以也以上三章乃孔顔傳心要指愚案胡氏之説以問仁為首不違仁次之此章又次之子疾病子路使門人爲臣夫子時已去位無家臣子路欲以家臣治其喪其意實尊聖人而未知所以尊也病閒曰乆矣哉由之行詐也無臣而爲有臣吾誰欺欺天乎閒如字病閒少差也病時不知旣差乃知其事故言我之不當有家臣人皆知之不可欺也而為有臣則是欺天而已人而欺天莫大之罪引以自歸其責子路深矣且予與其死於臣之手也無寧死於二三子之手乎且予縱不得大葬予死於道路乎無寧寧也大葬謂君臣禮葬死於道路謂棄而不葬又曉之以不必然之故范氏曰曽子將死起而易簀曰吾得正而斃焉斯已矣子路欲尊夫子而不知無臣之不可為有臣是以陷於行詐罪至歎天君子之於言動雖微不可不謹夫子深懲子路所以警學者也楊氏曰非知至而意誠則用智自私不知行其所無事徃徃自陷於行詐欺天而莫之知也其子路之謂乎或問云云曰胡氏云此必夫子失司宼之後未致其事之前也若夢奠則子路死於衞乆矣孔子初未嘗知為臣之事而曰吾誰欺者引咎歸已以深責乎子路也或曰如使夫子疾病不問非禮之臣遂以奉終豈不仰累聖德乎曰夫子儻至大故耳目所接有異必將正之矣聖人病則不能無若其方寸决不以病而懵也南軒曰所謂天者理而已理不應有而強使之有故曰欺天子路孔門之高弟而所見若是之偏蓋有豪釐之差則流於欺詐而不自覺此君子之所以戰兢自持而毎懼其或偏也子貢曰有美玉於斯韞匵而藏諸求善賈而沽諸子曰沽之哉沽之哉我待賈者也韞紆粉反匵徒木反賈音嫁韞藏也匵匱也沽賣也子貢以孔子有道不仕故設此二端以問也孔子言固當賣之但當待賈而不當求之范氏曰君子未嘗不欲仕也又惡不由其道士之待禮猶玉之待賈也若伊尹之耕於野伯夷太公之居於海濵世無成湯文王則終焉而已必不枉道以從人衒玉而求售也子欲居九夷東方之夷有九種欲居之者亦乗桴浮海之意或曰陋如之何子曰君子居之何陋之有君子所居則化何陋之有子曰吾自衞反魯然後樂正雅頌各得其所魯哀公十一年冬孔子自衞反魯是時周禮在魯然詩樂亦頗殘闕失次孔子周流四方參互考訂以知其説晚知道終不行故歸而正之子曰出則事公卿入則事父兄喪事不敢不勉不爲酒困何有於我哉説見第七篇然此則其事愈卑而意愈切矣子在川上曰逝者如斯夫不舎晝夜夫音扶舎上聲言天地之化徃者過來者續無一息之停乃道體之木然也然其可指而易見者莫如川流故於此發以示人欲學者時時省察而無豪髮之間斷也程子曰此道體也天運而不已日徃則月來寒徃則暑來水流而不息物生而不窮皆與道爲體運乎晝夜未嘗已也是以君子法之自強不息及其至也純亦不已焉又曰自漢以來儒者皆不識此義此見聖人之心純亦不已也純亦不已乃天德也有天德便可語王道其要只在謹獨問集注云此道體之本然也後又曰皆與道為體向見先生説道無形體却是這物事盛載那道出來故可見與道為體言與之為體也這體字較粗如此則與本然之體微不同曰也便在這裏面只是前面體字説得來較闊連本末精粗都包在裏面後面與道為體之體又説出那道之親切底骨子恐人説物自物道自道所以指物以見道其實這許多物事凑合來便都是道之體道體便在這多物事上只是水上較親切易見問張思叔説此是無窮程子曰一箇無窮如何便了得何也曰固是無窮須看因甚恁地無窮須見得所以無窮處始得問有天德便可語王道曰有天德則便是天理便做得王道無天德則私意計較所以做王道不成因云舊曾作觀瀾閣詞有曰因常流之不息悟有本之無窮又曰天理流行之妙若有私欲以閒之便如水被塞不得滔滔地去問程子曰其要只在謹獨如何曰能謹獨則無閒斷而其理不窮若不謹獨便有人欲來參入裏面便閒斷了如何㑹如川流底意問程子云自漢諸儒皆不識此義如何曰此事除了孔孟却猶是佛老見得些模樣後來儒者於此全無相著如何敎他不做大只爲佛老從心上起工夫其學雖不然却有本儒者只從言語文字上做有知此事是合理會者亦只做一塲説話過了所以輸與他先生曰彼所謂心上工夫本不是然却勝似今儒者多矣此説却是范氏説與道為體四字甚精蓋物生水流非道之體乃與道爲體南軒曰此不息之體也自天地日月以至于草木之微其生道莫不然體無乎而不具也君子之自強不息所以體之也聖人之心純亦不已則與之非二體矣川流蓋其著見易察者故因以明之子曰吾未見好德如好色者也好去聲謝氏曰好好色惡惡臭誠也好德如好色斯誠好德矣然民鮮能之史記孔子居衛靈公與夫人同車使孔子爲次乗招搖市過之孔子醜之故有是言子曰譬如爲山未成一簣止吾止也譬如平地雖覆一簣進吾徃也簣求位反覆芳服反簣土籠也書曰爲山九仞功虧一簣夫子之言蓋出於此言山成而但少一簣其止者吾自止耳平地而方覆一簣其進者吾自徃耳蓋學者自疆不息則積少成多中道而止則前功盡棄其止其徃皆在我而不在人也子曰語之而不惰者其回也與語去聲與平聲惰懈怠也范氏曰顏子聞夫子之言而心解力行造次顚沛未嘗違之如萬物得時雨之潤發榮滋長何有於惰此羣弟子所不及也子謂顔淵曰惜乎吾見其進也未見其止也顏子旣死而孔子惜之言其方進而未巳也或問云云曰惟胡氏為盡善胡氏曰顔淵曰舜何人也予何人也有為者亦若是此吾徃者也冉求曰非不説子之道力不足也此吾止者也其進其止皆非他人此君子所以自強不息也南軒曰此顔子旣没之後夫子稱之之辭蓋其日進無疆於聖為幾矣然未進於聖則猶有所進焉至於聖則止矣所謂止者大而化之止於中而成乎天也此顏子所以有雖欲從之末由也已之歎歟子曰苗而不秀者有矣夫秀而不實者有矣夫夫音扶穀之始生曰苗吐華曰秀成穀曰實蓋學而不至於成有如此者是以君子貴自勉也南軒曰養苗者不失其耘耔無逆其生理雨露之滋日夜之養有始有卒而後可以臻厥成或舎而弗耘或揠而助長以至於一暴十寒則苖而不秀秀而不實矣學何以異於是有其質而不學苗而不秀者也學而不能有諸已秀而不實者也夫仁亦在乎熟之矣子曰後生可畏焉知來者之不如今也四十五十而無聞焉斯亦不足畏也已焉知之焉於䖍反孔子言後生年富力強足以積學而有待其勢可畏安知其將來不如我之今日乎然或不能自勉至於老而無聞則不足畏矣言此以警人使及時勉學也曾子曰五十而不以善聞則不聞矣蓋述此意尹氏曰少而不勉老而無聞則亦已矣自少而進者安知其不至於極乎是可畏也南軒曰後生可畏以其進之不可量也然苟至於四十五十於道無所聞則其不能激昂自進可知因循至是則無足畏者矣辭氣抑楊之閒學者所冝深味也雖然有至於四十五十而知好學如中庸所謂困知勉行者聖人猶有望焉若後生雖有美質而悠悠歳月則夫所謂四十五十者將轉盼而至可不懼哉子曰法語之言能無從乎改之爲貴巽與之言能無説乎繹之爲貴説而不繹從而不改吾末如之何也已矣法語者正言之也巽言者婉而導之也繹尋其緒也法言人所敬憚故必從然不改則面從而已巽言無所乖忤故必恱然不繹則又不足以知其微意之所在也楊氏曰法言若孟子論行王政之類是也巽言若其論好貨好色之類是也語之而未違拒之而不受猶之可也其或喻焉則尚庻幾其能改繹矣從且恱矣而不改繹焉則是終不改繹也已雖聖人其如之何哉子曰主忠信毋友不如已者過則勿憚改重出而逸其半子曰三軍可奪帥也匹夫不可奪志也侯氏曰三軍之勇在人匹夫之志在已故帥可奪而志不可奪如可奪則亦不足謂之志矣子曰衣敝緼袍與衣狐貉者立而不恥者其由也與衣去聲緼紆粉反貉胡各反與平聲敝壤也緼采著也袍衣有著者也蓋衣之賤者狐發以狐貉之皮為裘衣之貴者子路之志如此則能不以貧富動其心而可以進於道矣故夫子稱之不忮不求何用不臧忮之豉反忮害也求貪也臧善也言能不忮不求則何為不善乎此衞風雄雉之篇夫子引之以美子路也呂氏曰貧與富交强者必忮弱者必求子路終身誦之子曰是道也何足以臧終身誦之則自喜其能而不復求進於道矣故夫子復言此以警之謝氏曰恥惡衣惡食學者之大病善心不存蓋由於此子路之志如此其過人逺矣然以衆人而能此則可以為善矣子路之賢冝不止此而終身誦之則非所以進於日新也故激而進之南軒曰衣敝緼袍與衣狐貉者立而不恥此不可作細事看惟不忽於卑近而實用力於斯者乃知其未易耳此非不忮不求者不能然也蓋人惟有已而有物有物故有忮有已故有求不忮不求則私欲不行而善道可進將何用而不善子路聞夫子之言以爲道如是足矣遂有終身誦之之意夫不忮不求非不善也而終身誦之則不足以為善矣學之無窮自不忮不求而勉焉以至於聖不可知其等級固自有次第也苟終身誦之不忮不求而已則亦不過於利仁者之事而有所止也聖人先後抑揚所以成德達材之道可謂至矣子曰歲寒然後知松柏之後彫也范氏曰小人之在治世或與君子無異惟臨利害遇事變然後君子之所守可見也謝氏曰士窮見節義世亂識忠臣欲學者必周于德子曰知者不惑仁者不憂勇者不懼明足以燭理故不惑理足以勝私故不憂氣足以配道義故不懼此學之序也問知是格物致知仁是存養勇是克治否先生曰是勇謂持守堅固問中庸力行近乎仁又似勇者不懼意思曰交互説都是知者直是見得分曉故不惑問知不惑一叚能明理便能無私否曰亦有人明理不能去私欲然去私欲必先明理惟聖人自誠而明可以先言仁後言知至於敎人當以知爲先問子罕知仁勇章與憲問仁智勇章何以次序不同曰成德以仁爲先進學以知爲先此誠而明明而誠也中庸言三德之序如何曰此亦爲學者言又問何以勇皆序在後曰末後做工夫不退轉此方是勇問仁者不憂曰仁者心與理一心純是道理看甚麽事不問大小改頭換面來自家此心各有一箇道理應付去不待事來方始安排所以自不煩惱今人有這事却無這道理便處置不去所以憂又曰仁者理即是心心即是理有一事來便有一理以應之所以無憂問無憂似未是仁先生曰今人學問百種只是要克己復禮若能克去私意純是天理自無所憂如何不是仁仁者天下之公私欲不萌而天下之公在我何憂之有孟子説配義與道無是餒也今有見得道分明而反懾怯者氣不足也南軒曰不惑者見理明也不憂者其樂深也不懼者其守固也子曰可與共學未可與適道可與適道未可與立可與立未可與權可與者言其可與共爲此事也程子曰可與共學知所以求之也可與適道知所徃也可與立者篤志固執而不變也權稱錘也所以稱物而知輕重者也可與權謂能權輕重使合義也楊氏曰知爲已則可與共學矣學足以明善然後可與適道信道篤然後可與立知時措之冝然後可與權洪氏曰易九卦終於巽以行權權者聖人之大用未能立而言權猶人未能立而欲行鮮不仆矣程子曰漢儒以反經合道為權故有權變權術之論皆非也權只是經也自漢以下無人識權字愚案先儒誤以此章連下文偏其反而爲一章故有反經合道之説程子非之是矣然以孟子嫂溺援之以手之義推之則權與經亦當有辨唐棣之華偏其反而豈不爾思室是遠而棣大計反唐棣郁李也偏晉書作翩然則反亦當與翻同言華之搖動也而語助也此逸詩也於六義屬興上兩句無意義但以起下兩句之辭耳其所謂爾亦不知其何所指也子曰未之思也夫何遠之有夫音扶夫子借其言而反之蓋前篇仁遠乎哉之意程子曰聖人未嘗言易以驕人之志亦未嘗言難以阻人之進但曰未之思也夫何遠之有此言極有涵蓄意思深逺南軒曰此夫子所刪去之詩以詩語之未安也故刪而不取詳味夫子斯言辭則抑揚意蓋無窮也夫道以為易知乎則精微之際未易擇也以爲難知乎則其天然之理本自不隱也曰易則學者將忽而不之䆒曰難則學者將怠而不之進曰未之思也夫何遠之有而顯微之義循求之序亦涵蓄而備盡矣鄉黨第十程子曰鄉黨形容聖人動容注措甚好使學者宛然如見聖人楊氏曰聖人之所謂道者不離乎日用之閒也故夫子之平日一動一静門人皆審視而詳記之尹氏曰甚矣孔門諸子之嗜學也於聖人之容色言動無不謹書而備錄之以貽後世今讀其書即其事宛然如聖人之在目也雖然聖人豈拘拘而為之者哉蓋盛徳之至動容周旋自中乎禮耳學者欲潛心於聖人冝於此求焉凡一章分為十七節孔子於鄉黨恂恂如也似不能言者恂相倫反恂恂信實之貌似不能言者謙卑遜順不以賢知先人也郷黨父兄宗族之所在故孔子居之其容貌辭氣如此南軒曰此篇所記夫子言語容貌衣服飲食之際可謂察之精矣門人亦善學聖人哉蓋聖人之道如是其高深也茫然測度懼夫泛而無入徳之地也故即其顯見之實而盡心焉存而味之則而象之於此有得則内外並進體用不離而其高深者可以馴致矣其在宗廟朝廷便便言唯謹爾朝直遙反下同便旁連反便便辯也宗廟禮法之所在朝廷政事之所出言不可以不明辨故必詳問而極言之但謹而不放爾此一節記孔子在鄉黨宗廟朝廷言貌之不同朝與下大夫言侃侃如也與上大夫言誾誾如也侃苦但反誾魚巾反此君未視朝時也王制諸侯上大夫卿下大夫五人許氏説文侃侃剛直也誾誾和恱而諍也君在踧踖如也與與如也踧子六反踖子亦反與平聲或如字君在視朝也踧踖恭敬不寜之貌與與威儀中適之貌張子曰與與不忘向君也亦通此一節記孔子在朝廷事上接下之不同也君召使擯色勃如也足躩如也擯必刃反躩驅苦反擯主國之君所使出接賓者勃變色貌躩盤辟貌皆敬君命故也揖所與立左右手衣前後襜如也襜赤占反所與立謂同爲擯者也擯用命數之半如上公九命則用五人以次傳命揖左人則左其手揖右人則右其手襜整貌趨進翼如也疾趨而進張拱端好如鳥舒翼賔退必復命曰賔不顧矣紓君敬也此一節記孔子為君擯相之容黄氏曰色勃足躩被命之初也揖也趨進也行禮之際也賔退禮畢之後也皆天理之節文所當然也至於揖之左右衣之前後手之翼如皆禮文之至末者聖人於此動容周旋無不中禮盛德之至從心所欲不踰矩也門人弟子亦必審觀而詳記之可謂善學者矣入公門鞠躬如也如不容鞠躬曲身也公門高大而若不容敬之至也立不中門行不履閾閾于逼反中門中於門也謂當棖闑之閒君出入處也閾門限也禮士大夫出入君門由闑右不踐閾謝氏曰立中門則當尊行履閾則不恪過位色勃如也足躩如也其言似不足者位君之虚位謂門屏之閒人君宁立之處所謂宁也君雖不在過之必敬不敢以虚位而慢之也言似不足不敢肆也南軒曰君不在焉而莊敬也如此則其事君之誠可知矣攝齊升堂鞠躬如也屏氣似不息者齊音咨攝摳也齊衣下縫也禮將升堂兩手摳衣使去地尺恐躡之而傾跌失容也屏藏也息鼻息出入者也近至尊氣容肅也出降一等逞顔色怡怡如也没階趨進翼如也復其位踧踖如也等階之級也逞放也漸逺所尊舒氣解顔怡怡和悅也没階下盡階也趨走就位也復位踧踖敬之餘也此一節記孔子在朝之容執圭鞠躬如也如不勝上如揖下如授勃如戰色足蹜蹜如有循勝平聲蹜色六反圭諸侯命圭聘問鄰國則使大夫執以通信如不勝執主器執輕如不克敬謹之至也上如揖下如授謂執圭平衡手與心齊高不過揖卑不過授也戰色戰而色懼也蹜蹜舉足促狹也如有循記所謂舉前曵踵言行不離地如縁物也享禮有容色享獻也既聘而享用圭璧有庭實有容色和也儀禮曰發氣滿容私覿愉愉如也私覿以私禮見也愉愉則又和矣此一節記孔子爲君聘於鄰國之禮也君子不以紺緅飾紺古暗反緅側由反君子謂孔子紺深青揚赤色齊服也緅絳色三年之喪以飾練服也飾領緣也紅紫不以爲䙝服紅紫閒色不正且近於婦人女子之服也䙝服私居服也言此則不以爲朝祭之服可知當暑袗絺綌必表而出之袗單也葛之精者曰絺粗者曰綌表而出之謂先著裏衣表絺綌而出之於外欲其不見體也詩所謂蒙彼縐絺是也緇衣羔裘素衣麑裘黄衣狐裘麑研奚反緇黒色羔裘用黒羊皮麑鹿子色白狐色黄衣以裼裘欲其相稱䙝裘長短右袂長欲其温短右袂所以便作事必有寢衣長一身有半長去聲齊主于敬不可觧衣而寢又不可著明衣而寢故别有寢衣其半蓋以覆足狐貉之厚以居狐貉毛深温厚私居取其適體去喪無所不佩去上聲君子無故玉不去身觽礪之屬亦皆佩也非帷裳必殺之殺去聲朝祭之服裳用正幅如帷要有襞積而旁無殺縫其餘若深衣要半下齊倍要則無襞積而有殺縫矣羔裘𤣥冠不以弔喪主素吉主𤣥弔必變服所以哀死吉月必朝服而朝吉月月朔也孔子在魯致仕時如此此一節記孔子衣服之制蘇氏曰此孔氏遺書雜記曲禮非特孔子事也齊必有明衣布齊側皆反齊必沐浴浴竟即著明衣所以明潔其體也以布爲之此下脫前章寢衣一簡程子曰此錯簡當在齊必有明衣布之下愚謂如此則此條與明衣變食旣得以類相從而䙝裘狐貉亦得以類相從矣齊必變食居必遷坐變食謂不飲酒不茹葷遷坐易常處也此一節記孔子謹齊之事楊氏曰齊所以交神故致潔變常以盡敬食不厭精膾不厭細食音嗣食飯也精鑿也牛羊與魚之腥聶而切之爲膾食精則能養人膾麤則能害人不厭言以是爲善非謂必欲如是也食饐而餲魚餒而肉敗不食色惡不食臭惡不食失飪不食不時不食食饐之食音嗣饐於兾反餲烏邁反飪而甚反饐飯傷熱濕也餲味變也魚爛曰餒肉腐曰敗色惡臭惡味敗而色臭變也飪烹調生熟之節也不時五穀不成果實未熟之類此數者皆足以傷人故不食割不正不食不得其醬不食割肉不方正者不食造次不離於正也漢陸續之毋切肉未嘗不方斷葱以寸爲度蓋其質美與此暗合也食肉用醬各有所冝不得則不食惡其不備也此二者無害於人但不以嗜味而苟食耳肉雖多不使勝食氣惟酒無量不及亂食音嗣量去聲食以穀為主故不使肉勝食氣酒以為人合歡故不為量但以醉為節而不及亂耳程子曰不及亂者非惟不使亂志雖血氣亦不可使亂但浹洽而已可也沽酒市脯不食沽市皆買也恐不精潔或傷人也與不嘗康子之藥同意不撤薑食薑通神明去穢惡故不撤不多食適可而正無貧心也祭於公不宿肉祭肉不出三日出三日不食之矣助祭於公所得胙肉歸即頒賜不俟經宿者不留神惠也家之祭肉則不過三日皆以分賜蓋過三日則肉必敗而人不食之是䙝鬼神之餘也但比君所賜胙可少緩耳食不語寢不言荅述曰語自言曰言范氏曰聖人存心不他當食而食當寢而寢言語非其時也楊氏曰肺爲氣主而聲出焉寢食則氣窒而不通語言恐傷之也亦通雖䟽食菜羹𤓰祭必齊如也食音嗣陸氏曰魯論𤓰作必古人飲食毎種各出少許置之豆閒之地以祭先代始爲飲食之人不忘本也齊嚴敬貌孔子雖薄物必祭其祭必敬聖人之誠也此一節記孔子飲食之節謝氏曰聖人飲食如此非極口腹之欲蓋養氣體不以傷生當如此然聖人之所不食窮口腹者或反食之欲心勝而不暇擇也胡氏曰亂者内昬其心志外喪其威儀甚則所謂淫亂之原皆在於酒是也聖人飲無定量亦無亂態蓋從心所欲而不踰矩是以如此學者未能然則如晉元帝可也帝初鎮江東以酒廢事王導以爲言帝命酌飲觴覆之於此遂絶黄氏曰飲食以養生故欲其情然亦能傷生故惡其敗至於失節逆禮縱欲敗德無不致其謹焉聖人一念之微莫非天理學者不可不戒也席不正不坐謝氏曰聖人心安於正故於位之不正者雖小不處鄉人飲酒杖者出斯出矣杖者老人也六十杖於鄉未出不敢先既出不敢後鄉人儺朝服而立於阼階儺乃多反儺所以逐疫周禮方相氏掌之阼階東階也儺雖古禮而近於戯亦必朝服而臨之者無所不用其誠敬也或曰恐其驚先祖五祀之神欲其依已而安也此一節記孔子居鄉之事問人於他邦再拜而送之拜送使者如親見之敬也康子饋藥拜而受之曰丘未達不敢嘗楊氏曰大夫有賜拜而受之禮也未達不敢嘗謹疾也必告之直也此一節記孔子與人交之誠意廏焚子退朝曰傷人乎不問馬非不愛馬然恐傷人之意多故未暇問蓋貴人賤畜理當如此君賜食必正席先嘗之君賜腥必熟而薦之君賜生必畜之食恐或飯餘故不以薦正席先嘗如對君也言先嘗則餘當以頒賜矣腥生肉熟而薦之祖考榮君賜也畜之者仁君之惠無故不敢殺也侍食於君君祭先飯飯扶晚反周禮王日一舉膳夫授祭品嘗食王乃食故侍食者君祭則已不祭而先飯若爲君嘗食然不敢當客禮也疾君視之東首加朝服拖紳首去聲拖徒我反東首以受生氣也病臥不能著衣束帶又不可以䙝服見君故加朝服於身又引大帶於上也君命召不俟駕行矣急趨君命行出而駕車隨之此一節記孔子事君之禮入大廟毎事問重出朋友死無所歸曰於我殯朋友以義合死無所歸不得不殯朋友之饋雖車馬非祭肉不拜朋友有通財之義故雖車馬之重不拜祭肉則拜者敬其祖考同於已親也此一節記孔子交朋友之義寢不尸居不容尸謂偃臥似死人也居居家容容儀范氏曰寢不尸非惡其類於死也惰慢之氣不設於身體雖舒布其四體而亦未嘗肆耳居不容非惰也但不若奉祭祀見賔客而已申申夭夭是也見齊衰者雖狎必變見冕者與瞽者雖䙝必以貌狎謂素親狎䙝謂燕見貌謂禮貌餘見前篇凶服者式之式負版者式車前横木有所敬則俯而憑之負版持邦國圖籍者式此二者哀有喪重民數也人惟萬物之靈而王者之所敬也故周禮獻民數於王王拜受之况其下者敢不敬乎有盛饌必變色而作敬主人之禮非以其饌也迅雷風烈必變迅疾也烈猛也必變者所以敬天之怒記曰若有疾風迅雷甚雨則必變雖夜必興衣服冠而坐此一節記孔子容貌之變升車必正立執綏綏挽以上車之索也范氏曰正立執綏則心體無不正而誠意肅恭矣蓋君子莊敬無所不在升車則見於此也車中不内顧不疾言不親指内顧回視也禮曰顧不過轂三者皆失容且惑人此一節記孔子升車之容色斯舉矣翔而後集言鳥見人之顔色不善則飛去回翔審視而後下止人之見幾而作審擇所處亦當如此然此上下必有闕文矣愚案賈誼賦云鳯皇翔於千仞兮覽德輝而下之顧細德之險微兮遂矰繳而去之其語蓋本諸此曰山梁雌雉時哉時哉子路共之三嗅而作共九用反又居勇反嗅許又反邢氏曰梁橋也時哉言雉之飲啄得其時子路不達以爲時物而共具之孔子不食三嗅其氣而起晁氏曰石經嗅作戞謂雉鳴也劉聘君云嗅當作臭古閴反張兩翅也見爾雅愚案如後兩説則共字當爲拱執之義然此必有闕文不可強爲之説姑記所聞以俟知者論語集編巻五
