body:
  text: 欽定四庫全書孟子集編卷十一宋真德秀撰告子章句上凡二十章告子曰性猶把柳也義猶桮棬也以人性為仁義猶以把柳為桮棬桮音杯棬丘園反性者人生所稟之天理也把柳柜柳桮棬屈木所為若巵匜之屬告子言人性本無仁義必待矯揉而後成如荀子性惡之說也孟子曰子能順把柳之性而以為桮棬乎將戕賊把柳而後以為桮棬也如將戕賊把柳而以為桮棬則亦將戕賊人以為仁義與率天下之人而禍仁義者必子之言夫戕音牆與平聲夫音扶言如此則天下之人皆以仁義為害性而不肯為是因子之言而為仁義之禍也南軒曰有太極則有兩儀故立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義仁義者性之所有而萬善之宗也人之有仁義乃其性之本然自親親而推之至於仁不可勝用自長長而推之至於義不可勝用皆順其所素有而非外取之也若逆乎仁義則為失其性矣而告子乃以把柳為喻其言曰以人性為仁義則失之甚矣蓋仁義性也而曰以人性為仁義則性别為一物以人為矯揉而為仁義其失豈不甚乎或謂把栁之可為桮棬亦性也朱子曰把柳之性固可以為桮棬然須斬伐裁截矯揉而後可成故孟子曰戕賊把柳而後可以為桮棬若把柳可為而楩楠不可為又是第一重義理不當引以為說愚案程子曰服牛乗馬皆因其性而為之胡不乗牛而服馬理不可也或人之說蓋本於此然把柳之為桮棬尚須人力仁義之性本於自然不待著力此朱子所以不取之也其義精矣衍義曰告子之說蓋謂人性本無仁義必用力而强為若把柳本非桮棬必矯揉而後就也吁何其昧於理之甚邪夫仁義即性也告子乃曰以人性為仁義如此則性自性仁義自仁義也其可乎夫以把栁為桮棬必斬伐之屈折之乃克有成若人之為仁義乃其性之固有孩提之童皆知愛親即所謂仁及其長也皆知敬兄即所謂義何勉强矯拂之有使告子之言行世之人必曰仁義乃戕賊人之物將畏憚而不肯為是率天下而害仁義其禍將不可勝計矣告子曰性猶湍水也決諸東方則東流決諸西方則西流人性之無分於善不善也猶水之無分於東西也湍他端反湍波流瀠廻之貎也告子因前說而小變之近於揚子善惡混之說孟子曰水信無分於東西無分於上下乎人性之善也猶水之就下也人無有不善水無有不下言水誠不分東西矣然豈不分上下乎性即天理未有不善者也今夫水搏而躍之可使過顙激而行之可使在山是豈水之性哉其勢則然也人之可使為不善其性亦猶是也夫音扶搏補各反搏擊也躍跳也顙額也水之過額在山皆不就下也然其本性未嘗不就下但為搏激所使而逆其性耳此章言性本善故順之而無不善本無惡故反之而後為惡非本無定體而可以無所不為也或問告子揚子之說如何曰告子以為性無善惡揚子以為性有善惡其言雖同而所以言則亦不無少異也告子把栁之喻旣為孟子所闢則又小變其說而取喻於湍水蓋前說專指人性為惡至是又謂可以為善可以為惡而借水以明之不知水之性未嘗不就下雖搏之過顙激之在山可暫違其本性而終不能使不復其本性也人之為不善者固有之矣然其所以然者往往有物欲所誘利害所移而非其本然之性也故雖甚愚無知之人詈之以惡逆斥之以盜賊鮮不變色者至於見赤子之入井則莫不怵惕而救之朱子以為性本善故順之而無不善本無惡故反之而後為惡非本無定體而可以無所不為也斯言盡之矣衍義告子曰生之謂性生指人物之所以知覺運動者而言告子論性前後四章語雖不同然其大指不外乎此與近世佛氏所謂作用是性者略相似孟子曰生之謂性也猶白之謂白與曰然白羽之白也猶白雪之白白雪之白猶白玉之白與曰然與平聲下同白之謂白猶言凡物之白者同謂之白更無差别也白羽以下孟子再問而告子曰然則是謂凡有生者同是一性矣然則犬之性猶牛之性牛之性猶人之性與孟子又言若果如此則犬牛與人皆有知覺皆能運動其性皆無以異矣於是告子自知其說之非而不能對也愚案性者人之所得於天之理也生者人之所得於天之氣也性形而上者也氣形而下者也人物之生莫不有是性亦莫不有是氣然以氣言之則知覺運動人與物若不異也以理言之則仁義禮智之稟豈物之所得而全哉此人之性所以無不善而為萬物之靈也告子不知性之為理而以所謂氣者當之是以有把栁湍水之喻食色無善無不善之說縱橫繆戾紛紜舛錯而此章之誤乃其本根所以然者蓋徒知知覺運動之蠢然者人與物同而不知仁義禮智之粹然者人與物異也孟子以是折之其義精矣人物之生天賦之以此理未嘗不同但人物之稟受自有異爾如一江水杓取只得一杓碗取只得一碗至於一桶一缸各隨器量不同故理亦隨以異物亦具有五行只是得五行之偏者耳論萬物之一原則理同而氣異觀萬物之異體則氣猶相近而理絶不同氣相近如知寒暖識飢飽好生惡死趨利避害人與物都一般理不同如蜂蟻之君臣只是義上有一㸃子明虎狼之父子只是仁上有一㸃子明其他更推不去問人物皆禀天地之理以為性皆受天地之氣以為形若人稟之不同固是氣有昬明厚薄之異若在物言之不知是所禀之理便有不全邪亦是縁氣稟之昬蔽故如此邪曰惟其所受之氣只有許多故其理亦只有許多如犬馬形氣如此故只㑹得如此事又問物物具一太極則是理無不全也曰以理言之則無不全以氣言之則不能無偏性如日光人物所受之不同如隙竅之受光有大小也人與物都一般者理也所以不同者心也人心虗靈包得許多道理過故無不通雖有氣質昬底亦可克治使明萬物之心便包許多道理不過以本論之其理則一纔稟於氣便有不同問動物有知植物無知何也曰動物有血氣故能知植物雖不可言知然一般生意亦可見若戕賊之便枯瘁不恱懌亦似有知者問理是人物同得於天者如物之無情者亦冇理否曰固是有理如舟只可行之於水車只可行之於陸孟子言人之所以異於禽獸者幾希庶民去之君子存之不知人何故與禽獸異又言犬之性猶牛之性牛之性猶人之性與不知人何故與牛犬異此兩處似欠一轉語須著說是形氣不同故性亦少異始得故孟子見得人性同處直是分曉直截却於此似未甚察問氣有清濁而理則同如何曰理如寶珠在聖賢則如置在清水中其光輝自然發見在愚不肖則如置在濁水中須是澄去泥沙則光輝方可見至如萬物亦有此理只為氣昬塞如置寳珠於濁泥中不復可見生之謂氣生之理謂性孟子以理言性告子以氣言性問告子云云曰合下便是錯了他只是說生來精神魂魄凡動用處是性正如禪家說作用是性只說得箇形而下者故孟子闢之釋氏曰作用是性在目曰見在耳曰聞在鼻齅香在口談論在手執捉在足運奔即告子生之謂性之說也且如手執捉若執刀妄亂殺人亦可謂性乎龜山舉龎居士云神通妙用運水搬柴以此徐行後長不知徐行後長方謂之弟疾行先長則為不弟如曰運水搬柴即是妙用則徐行疾行皆可謂之弟邪告子說生之謂性二程都說他說得是只下面接得不是若如此說却如釋氏言作用是性乃是說氣質之性非性善之性案程子曰告子云生之謂性凡天地所生之物須是謂性皆謂之性則可於中却分别牛之性馬之性是他便只道一般如釋氏說蠢動含靈皆有佛性如此則不可蓋不以生之謂性為非故朱子云云其義益精矣告子曰食色性也仁内也非外也義外也非内也告子以人之知覺運動者為性故言人之甘食恱色者即其性故仁愛之心生於内而事物之宜由乎外學者但當用力於仁而不必求合於義也孟子曰何以謂仁内義外也曰彼長而我長之非有長於我也猶彼白而我白之從其白於外也故謂之外也長上聲下同我長之我以彼為長也我白之我以彼為白也曰異於白馬之白也無以異於白人之白也不識長馬之長也無以異於長人之長與且謂長者義乎長之者義乎與平聲下同張氏曰上異於二字冝衍李氏曰或有闕文焉愚案白馬白人所謂彼白而我白之也長馬長人所謂彼長而我長之也白馬白人不異而長馬長人不同是乃所謂義也義不在彼之長而在我長之之心則義之非外明矣曰吾弟則愛之秦人之弟則不愛也是以我為恱者也故謂之内長楚人之長亦長吾之長是以長為恱者也故謂之外也言愛主於我故仁在内敬主於長故義在外曰耆秦人之炙無以異於耆吾炙夫物則亦有然者也然則耆炙亦有外與耆與嗜同夫音扶言長之耆之皆出於心也林氏曰告子以食色為性故因其所明者而通之自篇首至此四章告子之辯屢屈而屢變其說以求勝卒不聞其能自反而有所疑也此正其所謂不得於言勿求於心者所以卒於鹵莽而不得其正也飲食男女固出於性然告子以生為性則以性為止於是矣因此又生仁内義外之說正與佛者之言以作用為性義理為障者相類然孟子不攻其食色之云者使誠知義之非外則性之不止於食色其有以察之矣告子不知理之為性乃即人之身而指其能知覺運動者以當之所謂生者是也始而見其但能知覺運動非敎不成故有把柳之譬旣屈於孟子之言而病其說之偏於惡也則又繼而為湍水之喻以見其但能知覺運動而非有善惡之分又以孟子為未喻已之意也則又於生之謂性章極其立論之本意而索言之至於孟子折之則其說又窮而終莫悟其非也其以食色為言蓋猶生之云爾而公都子之所引又湍水之餘論也以是考之凡告子之論性其不外乎生之一字明矣但前此未有深究其弊者往往隨其所向各為一說以與之辯而不察其所以失之端獨在於此是以其說雖多而迄無一定之論也告子只知有人心不知有道心故有食色性也及義外之問南軒曰食色固出於性然莫不有則焉今告子乃舉物而遺其則是固出於性無分於善不善之論也其說行則天理不明而人欲莫之遏矣至於仁内義外之說其失又甚焉彼以為長之在人如白之在彼曽不知白之為色一定而不變而長之所宜則隨事而不同也若一槩而論則馬之長將亦無以異於人之長而可乎長雖在彼而長之者在我蓋長之之理素具於此非因彼而有也有是性則具是理其輕重親疎小大逺近之冝固森然於秉彞之中而不可亂事物至於前者雖萬有不同而有物必有則泛應曲酬各得其當皆吾素有之義而非外取之此天所命也惟夫昧於天命而以天下之公理為有我之得私而始有義外之說孟子告之曰且謂長者義乎長之者義乎使知夫長之之為義則知義之非外矣而告子猶惑焉謂愛吾弟而不愛秦人之弟是以我為恱故曰仁内也長吾長而亦長楚人之長是以長為恱故曰義外也曽不知所以長之者非在我而何出哉故孟子復以耆炙喻之同為炙也而所以耆之則在我然則以其在彼之同而謂耆炙之為外可乎雖然長我之長義也長楚人之長亦義也長則同而待吾兄與待楚人固有間矣其分之殊豈人之所能為哉觀告子義外之說固為不知義矣則其所謂仁内者亦烏知仁之所以為仁者哉彼徒以愛為仁而不知愛之施有差等固義之所存也徒以長為義而不知所以長之者固仁之體也不知仁義而以論性冝乎莫適其指歸也孟季子問公都子曰何以謂義内也孟季子疑孟仲子之弟也蓋聞孟子之言而未達故私論之曰行吾敬故謂之内也所敬之人雖在外然其知當敬而行吾心之敬以敬之則不在外也鄉人長於伯兄一歳則誰敬曰敬兄酌則誰先曰先酌鄉人所敬在此所長在彼果在外非由内也長上聲伯長也酌酌酒也此皆季子問公都子荅而季子又言如此則敬長之心果不由中出也公都子不能荅以告孟子孟子曰敬叔父乎敬弟乎彼將曰敬叔父曰弟為尸則誰敬彼將曰敬弟子曰惡在其敬叔父也彼將曰在位故也子亦曰在位故也庸敬在兄斯須之敬在鄉人惡平聲尸祭祀所主以象神雖子弟為之然敬之當如祖考也在位弟在尸位鄉人在賔客之位也庸常也斯須暫時也言因時制冝皆由中出也季子聞之曰敬叔父則敬敬弟則敬果在外非由内也公都子曰冬日則飲湯夏日則飲水然則飲食亦在外也此亦上章耆炙之意范氏曰二章問荅大指畧同皆反覆譬喻以曉當世使明仁義之在内則知人之性善而皆可以為堯舜矣南軒曰季子不知性故於義内之說有疑焉公都子荅以行吾敬故謂之内亦未為失也蓋敬之所施各有攸當是乃義也然公都子未能本於性而論故聞季子先酌鄉人之論則無以對之蓋庸敬於兄義也以鄉人之長酌而先之亦義也可敬雖在彼而敬之者在我故孟子以弟為尸為比夫兄之當敬鄉人之酌當先與夫為尸者之當敬皆其理之素定而不易者也然則其為在内也明矣而季子猶惑焉蓋以叔父與弟為在外而不知其義之存於内内外之本一也公都子蓋有發於孟子之言故以冬日飲湯夏日飲水譬之蓋冬之飲必湯夏之飲必水是乃義也而豈外乎哉公都子曰告子曰性無善無不善也此亦生之謂性食色性也之意近世蘇氏胡氏之說蓋如此或曰性可以為善可以為不善是故文武興則民好善幽厲興則民好暴好去聲此即湍水之說也或曰有性善有性不善是故以堯為君而有象以瞽瞍為父而有舜以紂為兄之子且以為君而有微子啓王子比干韓子性有三品之說蓋始此案此文則微子比干皆紂之叔父而書稱微子為商王元子疑此或有誤字今曰性善然則彼皆非與與平聲孟子曰乃若其情則可以為善矣乃所謂善也乃若發語辭情者性之動也人之情本但可以為善而不可以為惡則性之本善可知矣若夫為不善非才之罪也夫音扶才猶材質人之能也人冇是性則有是才性旣善則才亦善人之為不善乃物欲䧟溺而然非其才之罪也惻隠之心人皆有之羞惡之心人皆有之恭敬之心人皆有之是非之心人皆有之惻隱之心仁也羞惡之心義也恭敬之心禮也是非之心智也仁義禮智非由外鑠我也我固有之也弗思耳矣故曰求則得之舍則失之或相倍蓰而無算者不能盡其才者也惡去聲舍上聲蓰音師恭者敬之發於外者也敬者恭之主於中者也鑠以火銷金之名自外以至内也算數也言四者之心人所固有但人自不思而求之耳所以善惡相去之逺由不思不求而不能擴充以盡其才也前篇言是四者為仁義禮智之端而此不言端者彼欲其擴而充之此直因用以著其本體故言有不同耳詩曰天生蒸民有物有則民之秉夷好是懿徳孔子曰為此詩者其知道乎故有物必有則民之秉夷也故好是懿徳好去聲詩大雅蒸民之篇蒸詩作烝衆也物事也則法也夷詩作彞常也懿美也有物必有法如有耳目則有聦明之徳有父子則有慈孝之心是民所秉執之常性也故人之情無不好此懿徳者以此觀之則人性之善可見而公都子所問之三說皆不辯而自明矣程子曰性即理也理則堯舜至於塗人一也才稟於氣氣有清濁稟有清者為賢稟有濁者為愚學而知之則氣無清濁皆可至於善而復性之本湯武身之是也孔子所言下愚不移者則自暴自棄之人也又曰論性不論氣不備論氣不論性不明二之則不是張子曰形而後有氣質之性善反之則天地之性存焉故氣質之性君子有弗性者焉愚案程子此說才字與孟子本文小異蓋孟子專指其發於性者言之故以為才無不善程子兼指其稟於氣者言之則人之才固有昬明强弱之不同矣張子所謂氣質之性是也二說雖殊各有所當然以事理攷之程子為密蓋氣質所稟雖有不善而不害性之本善性雖本善而不可以無省察矯揉之功學者所當深玩也告子曰性無善無不善非惟無不善并善亦無之謂性中無惡則可謂無善則性果何物性旣善才亦可為善今乃至於為不善非是才如是乃是我使才如此故曰非才之罪問孟子言情才皆善如何曰情本自善其發也未有染汙何嘗不善才只是資質亦無不善譬物之白者未染時只是白也人皆有許多才聖人却做許多事我不能做得些子出故孟子謂或倍蓰而無算者不能盡其才者也不能盡其才謂發得略好便自阻隔了不順他道理做去論情可謂善因曰李翺論復性則是滅情以復性則非情如何可滅此乃釋氏之說䧟於其中不自知理醇而氣雜理精一故醇氣粗故雜胡氏說性不可以善言本然之性其尊無對纔說善時便與惡對非本然之性矣孟子道性善非是說性之善只是賛歎之辭某嘗辯之本然之性固渾然至善無惡可對此天之賦予然也然行之在人則有善有惡行得善者即本然之性豈可謂善者非本然之性乎若如其言有本然之性又有善惡相對之性則是有兩性矣其得於天者此性也行得善者亦此性也只是纔有箇行得善底便有箇不善底所以善惡須著對說不是元有箇惡在裏與之為對只是行得錯底便流入於惡爾然文定之說又得於龜山龜山得之東林揔老揔極聦明龜山嘗問孟子道性善是否揔曰是又問性豈可以善惡言揔曰本然之性不與惡對揔之言本未有病蓋本然之性是本無惡及至文定父子遂分成兩截說善底不是性若善底非本然之性却那處得這善來旣以善為賛歎之辭便是性本善矣若非性善何賛歎之有二蘇論性亦是如此嘗言孟子道性善猶云火之能熟物也荀卿言性惡猶云火之能焚物也龜山反其說而辨之曰火之所以能熟物者以其能焚故耳若火不能焚物何能熟蘇氏論性自堯舜至孔子不得已而命之且繼之曰中曰一未嘗分善惡言也自孟子道性善而一與中始支矣更不看道理只認說得行底便是諸胡之說亦然知言之論性曰不可以善惡辨不可以是非分旣無善惡又無是非則是告子湍水之說爾問知言萬事萬物性之質也如何曰此未有害最是好惡性也大錯五峯言天命不囿於善不可以人欲對天理固無對然有人欲則天理便不得不與人欲相為消長善亦本無對然旣有惡則善便不得不與惡相為盛衰且謂天命不囿於物可也謂其不囿於善則不知天之所以為天矣謂惡不足以言性可也謂善不足以言性則不知善之所從來矣好善而惡惡人之性也為有善惡故有好惡君子順其性小人拂其性五峯言好惡性也君子好惡以道小人好惡以欲是好人之所惡惡人之所好亦是性也而可乎或問天理人欲同體異用同行異情之說如何先生曰當然之理人合恁地底便是體故仁義禮智為體如五峯之說則仁與不仁義與不義禮與無禮智與無智皆是性非小失也性中只有天理無人欲謂之同體可乎若如此則是性可以為善亦可以為惡矣同行異情蓋亦有之如口之於味目之於色耳之於聲鼻之於臭四肢之於安佚聖人與常人皆如此是同行也然聖人之情不溺於此所以與常人異耳龜山云天命之謂性人欲非性也胡氏不取其說是以人欲為性矣此其甚差者也又白雲郭氏言性善之善非善惡之善先生謂極本窮源之善與善惡末流之善非有二也但以其發與未發言之有不同耳蓋未發之前只冇此善而其發為善惡之善者亦此善也旣發之後乃冇不善以雜焉而其所謂善者即極本窮源之發耳南軒張氏曰善者性也能為善者才也公都子學於告子者也故以性善為非而設三者之說以闢孟子孟子不與之辯猶以性之發見者言之蓋所謂性者仁義禮智而已然未發之前無朕兆之可見惟感物而動為惻隱為羞惡為恭敬為是非然後性之本可識蓋四者情也而其本則性也由其性之善故發而為情亦善因情之善而性之善可知矣夫善者性也而能為善者才也性以體言才以用言才本可以為善而不可以為惡今乃至於為不善者是豈才之罪哉䧟溺使然也夫四者之心所以人人皆有者由其具仁義禮智之性故也鑠者以火銷金之名火之銷金由外以至内也性則我所固有非自外來獨患夫人之弗思弗求耳衍義孟子曰富歳子弟多賴凶歳子弟多暴非天之降才爾殊也其所以䧟溺其心者然也富歳豐年也頼藉也豐年衣食饒足故有所賴藉而為善凶年衣食不足故有以䧟溺其心而為暴今夫麰麥播種而耰之其地同樹之時又同浡然而生至於日至之時皆熟矣雖有不同則地有肥磽雨露之養人事之不齊也夫音扶麰音牟耰音憂磽苦交反麰大麥也耰覆種也日至之時謂當成熟之期也磽瘠薄也故凡同類者舉相似也何獨至於人而疑之聖人與我同類者聖人亦人耳其性之善無不同也故龍子曰不知足而為屨我知其不為蕢也屨之相似天下之足同也蕢音匱蕢草噐也不知人足之大小而為之屨雖未必適中然必似足形不至成蕢也口之於味有同耆也易牙先得我口之所耆者也如使口之於味也其性與人殊若犬馬之與我不同類也則天下何耆皆從易牙之於味也至於味天下期於易牙是天下之口相似也耆與嗜同下同易牙古之知味者言易牙所調之味則天下皆以為美也惟耳亦然至於聲天下期於師曠是天下之耳相似也師曠能審音者也言師曠所和之音則天下皆以為美也惟目亦然至於子都天下莫不知其姣也不知子都之姣者無目者也姣古卯反子都古之美人也姣好也故曰口之於味也有同耆焉耳之於聲也有同聽焉目之於色也有同美焉至於心獨無所同然乎心之所同然者何也謂理也義也聖人先得我心之所同然耳故理義之恱我心猶芻豢之恱我口然猶可也草食曰芻牛羊是也穀食曰豢犬豕是也程子曰在物為理處物為義體用之謂也孟子言人心無不恱理義者但聖人則先知先覺乎此耳非有以異於人也程子又曰理義之恱我心猶芻豢之恱我口此語親切有味須實體察得禮義之恱心眞猶芻豢之恱口始得集義吕氏曰我心同然即天理天徳孟子言同然者恐人有私意蔽之苟無私意我心即天心謝氏曰嘗問伊川先生養心莫善於寡欲此一句如何先生曰此一句淺不如理義之恱心猶芻豢之恱口最親切有滋味云云見前又云理只是事物當然底道理義是事之合冝處孟子曰牛山之木嘗美矣以其郊於大國也斧斤伐之可以為美乎是其日夜之所息雨露之所潤非無萌蘖之生焉牛羊又從而牧之是以若彼濯濯也人見其濯濯也以為未嘗有材焉此豈山之性也哉蘗五割反牛山齊之東南山也邑外謂之郊言牛山之木前此固嘗美矣今為大國之郊伐之者衆故失其美耳息生長也日夜之所息謂氣化流行未嘗間斷故日夜之間凡物皆有所生長也萌芽也蘖芽之旁出者也濯濯光潔之貎材材木也言山木雖伐猶有萌蘖而牛羊又從而害之是以至於光潔而無草木也雖存乎人者豈無仁義之心哉其所以放其良心者亦猶斧斤之於木也旦旦而伐之可以為美乎其日夜之所息平旦之氣其好惡與人相近也者幾希則其旦晝之所為有梏亡之矣梏之反覆則其夜氣不足以存夜氣不足以存則其違禽獸不逺矣人見其禽獸也而以為未嘗有才焉者是豈人之情也哉好惡並去聲良心者本然之善心即所謂仁義之心也平旦之氣謂未與物接之時清明之氣也好惡與人相近言得人心之所同然也幾希不多也梏械也反覆展轉也言人之良心雖已放失然其日夜之間亦必有所生長故平旦未與物接其氣清明之際良心猶必有發見者但其發見至微而旦晝所為之不善又已隨而梏亡之如山木旣伐猶有萌蘖而牛羊又牧之也晝之所為旣有以害其夜之所息夜之所息又不能勝其晝之所為是以展轉相害至於夜氣之生日以寖薄而不足以存其仁義之良心則平旦之氣亦不能清而所好惡遂與人逺矣故苟得其養無物不長苟失其養無物不消長上聲山木人心其理一也孔子曰操則存舍則亡出入無時莫知其鄉惟心之謂與舍音捨與平聲孔子言心操之則在此舍之則失去其出入無定時亦無定處如此孟子引之以明心之神明不測得失之易而保守之難不可頃刻失其養學者當無時而不用其力使神清氣定常如平旦之時則此心常存無適而非仁義也程子曰心豈有出入亦以操舍而言耳操之之道敬以直内而已愚聞之師曰人理義之心未嘗無惟持守之即在爾若於旦晝之間不至梏亡則夜氣愈清夜氣清則平旦未與物接之時湛然虗明氣象自可見矣孟子發此夜氣之說於學者極有力冝熟玩而深省之也問旦晝不梏亡則是養得這夜氣清明曰不是靠氣為主蓋要此氣養仁義之心如水之養魚水多則魚鮮水涸則魚病養得這氣盛則仁義之心亦完氣少則仁義之心亦微矣孟子此段首尾正為良心設人多將夜氣便做良心說非也蓋言夜氣至清足以存得此良心耳平旦之氣亦清亦以存吾良心故其好惡之公猶與人相近但此心存得不多時至旦晝所為則梏亡之矣所謂梏者人多謂梏亡其夜氣亦非也謂旦晝之為能梏亡其良心也問平旦之氣先生云氣清則能存固有之良心如旦晝之所為有以汨亂其氣則良心為之不存矣然暮夜止息稍不紛擾則良心又復生長譬如一井水終日擾動便渾了至夜稍息則便有清水出所謂夜氣不足以存者便是攪動得太甚則雖有止息時亦不能清矣氣與理本相依旦晝所為不害於理則夜氣之所養益厚夜之所息旣有助於理則旦晝之所為益無不當矣日間梏亡者寡則夜氣自然清明虗靜至平旦亦然旦晝應事接物亦莫不然梏如被他禁械在那裏更不容他動心一放時便是斧斤之戕牛羊之牧一收斂在此便是日夜之息雨露之潤問夜氣曰前輩皆無明說某因將孟子反覆熟讀方看得出後看程子却說夜氣之所存者良知良能也與臆見合以此知觀書不可苟熟讀深思道理自見惟其神明不測所以有出入惟其能出入所以神明不測范純夫之女謂心豈有出入程先生聞之曰此女雖不識孟子却能識心是否曰此一段說正要人看孟子舉孔子之言曰出入無時莫知其鄉此别有說伊川言純夫女却能識心心却易識只是不識孟子之意問操則存曰心不是死物須把做活看不爾則是釋氏入定坐禪操存者只是於應事接物之時事事中理便是存若處事不是當便心不在只是兀然守在這裏忽有事至吾前操底便散了却是舍則亡也問未應接時如何曰只是戒謹恐懼而已又曰只要提他醒便是操求放操存皆兼動靜而言非塊然黙守之謂存亡出入一章乃是正說心之體以其妙不測如此非獨能安靜純一亦能周流變化學者須是著力照管豈專為其已放者而言邪今専指其安靜純一者為良心則於其體用有不周矣又曰自寂然不動以至感而遂通天下之故無非此心之妙南軒曰日夜之所息者蓋人雖終日汩汩於物慾然亦有休息之時也程子曰息有二義訓休息亦訓生息息所以生也心非有出入因操舍而言也操則在此舍則不存焉矣以其在此則謂之入可也以其不存焉則謂之出可也又曰涪川譙定從伊川學以其所見作牧牛圖如非禮勿視則牛眼白非禮勿聽則牛耳白非禮勿言則口白非禮勿動然後身白藉溪得其圖以寄猶子大原張於書室一日母翁夫人見之指心曰只這裏轉了後那得許多事案此可與范太史女論心一段參觀孟子之言以旦晝為主而朱子推衍其義謂當無時而不用力則旦也晝也夜也皆兢業自持之時其功益精宻矣愚嘗推衍朱子之說為夜氣之箴有曰盍觀夫冬之為氣乎木歸其根蟄坯其封凝然寂然不見兆朕而造化發育之妙實胚胎乎其中蓋闔者闢之基正者元之本而艮所以為物之始終夫一晝一夜者三百六旬之積故冬為四時之夜而夜乃一日之冬天壤之間羣物俱閴窈乎如未判之鴻濛維人之身嚮晦宴息亦當以造物而為宗必齊其心必肅其躬不敢弛然自放於牀第之上使慢易非僻得以賊吾之𠂻雖終日乾乾靡容一息之間斷而昬冥易忽之際尤當致戒謹之功蓋安其身所以為朝聽晝訪之地而夜氣深厚則仁義之心亦浩乎其不窮本旣立矣而又致察於事物周旋之頃敬義夾持動靜交養則人欲無隙之可入天理皦乎其昭融愚謂物欲之害夜為最甚故其說以夜為本若異於孟子朱子者然亦未嘗不互相發也衍義孟子曰無或乎王之不智也或與惑同疑怪也王疑指齊王雖有天下易生之物也一日暴之十日寒之未有能生者也吾見亦罕矣吾退而寒之者至矣吾如有萌焉何哉易去聲暴歩卜反見音現暴温之也我見王之時少猶一日暴之也我退則諂諛雜進之日多是十日寒之也雖有萌蘖之生我亦安能如之何哉今夫奕之為數小數也不專心致志則不得也奕秋通國之善奕者也使奕秋誨二人奕其一人專心致志惟奕秋之為聽一人雖聽之一心以為有鴻鵠將至思援弓繳而射之雖與之俱學弗若之矣為是其智弗若與曰非然也夫音扶繳音灼射食亦反為是之為去聲若與之與平聲奕圍棋也數技也致極也奕秋善奕者名秋也繳以繩繫矢而射也程子為講官言於上曰人主一日之間接賢士大夫之時多親宦官宫妾之時少則可以涵養氣質而薫陶徳性時不能用識者恨之范氏曰人君之心惟在所養君子養之以善則智小人養之以惡則愚然賢人易踈小人易親是以寡不能勝衆正不能勝邪自古國家治日常少而亂日常多蓋以此也孟子曰魚我所欲也熊掌亦我所欲也二者不可得兼舍魚而取熊掌者也生亦我所欲也義亦我所欲也二者不可得兼舍生而取義者也舍上聲魚與熊掌皆美味而熊掌尤美也生亦我所欲所欲有甚於生者故不為苟得也死亦我所惡所惡有甚於死者故患有所不辟也惡辟皆去聲下同釋所以舍生取義之意得得生也欲生惡死者雖衆人利害之常情而欲惡冇甚於生死者乃秉彞義理之良心是以欲生而不為苟得惡死而有所不避也如使人之所欲莫甚於生則凡可以得生者何不用也使人之所惡莫甚於死者則凡可以辟患者何不為也設使人無秉彞之良心而但有利害之私情則凡可以偷生免死者皆將不顧禮義而為之矣由是則生而有不用也由是則可以辟患而有不為也由其必有秉彝之良心是以其能舍生取義如此是故所欲有甚於生者所惡有甚於死者非獨賢者有是心也人皆有之賢者能勿喪耳喪去聲羞惡之心人皆有之但衆人汩於利欲而忘之惟賢者能存之而不喪耳一簞食一豆羮得之則生弗得則死嘑爾而與之行道之人弗受蹴爾而與之乞人不屑也食音嗣嘑呼故反蹴子六反豆木噐也嘑咄啐之貎行道之人路中凡人也蹴踐踏也乞人丐乞之人也不屑不以為潔也言雖欲食之急而猶惡無禮有寧死而不食者是其羞惡之本心欲惡有甚於生死者人皆有之也萬鍾則不辨禮義而受之萬鍾於我何加焉為宫室之美妻妾之奉所識窮乏者得我與為去聲與平聲萬鍾於我何加言於我身無所増益也所識窮乏者得我謂所知識之窮乏者感我之惠也上言人皆有羞惡之心此言衆人所以喪之由此三者蓋理義之心雖曰固有而物欲之蔽亦人所易昬也鄉為身死而不受今為宫室之美為之鄉為身死而不受今為妻妾之奉為之鄉為身死而不受今為所識窮乏者得我而為之是亦不可以已乎此之謂失其本心鄉為並去聲為之之為並如字言三者身外之物其得失比生死為甚輕鄉為身死猶不肯受嘑蹴之食今乃為此三者而受無禮義之萬鍾是豈不可以止乎本心謂羞惡之心此章言羞惡之心人所固有或能決死生於危迫之際而不免計豐約於宴安之時是以君子不可頃刻而不省察於斯焉南軒曰二者不可得兼言權其輕重而取舍之也夫樂生而惡死人之常情賢者亦豈與人異哉而有至於舍生而取義者非眞知義之重於生其能然乎其舍生取義猶飢之食渴之飲亦為其所當然而已故曰所欲有甚於生者所惡有甚於死者所欲謂禮義所惡謂非禮義也所惡如是乃為得性情之正若但知樂生惡死而已則凡可以求生可以辟患者無所不為天理滅而流於人欲之歸矣又曰嘑爾而不受蹴爾而不屑此其羞惡之心也人之困窮其欲未肆故其端尚在至於為萬鍾所動則有不復顧者矣曰萬鍾於我何加焉人能深味斯言而得其㫖則亦可見外物之無足慕矣又曰學者須是求仁所謂求仁者不放此心聖人只敎人求仁蓋仁義禮智四者仁足以包之若存得仁自然頭頭做著不用逐事安排故曰苟志於仁矣無惡也看大學亦要識此意所謂顧天命無他求其放心而已又曰仁是無形迹事孟子恐人理㑹不得便說道只人心便是却不是把仁來形容人心乃是把人心來指示仁所謂放其心而不知求蓋存得此心便是仁若此心放了又理㑹甚仁今人之心靜時昬動時擾皆是放了又曰仁是本心之徳存得此心便無不仁如說克己復禮亦只是要得私欲去後本心常存耳孟子曰仁人心也義人路也仁者心之徳程子所謂心如穀種仁則其生之性是也然但謂之仁則人不知其切於己故反而名之曰人心則可以見其為此身酬酢萬變之主而不可須臾失矣義者行事之宜謂之人路則可以見其為出入往來必由之道而不可須臾舍矣舍其路而弗由放其心而不知求哀哉舍上聲哀哉二字最冝詳味令人惕然有深省處人有雞犬放則知求之有放心而不知求程子曰心至重雞犬至輕雞犬放則知求之心放則不知求豈愛其至輕而忘其至重哉弗思而已矣愚謂上兼言仁義而此下專論求放心者能求放心則不違於仁而義在其中矣學問之道無他求其放心而已矣學問之事固非一端然其道則在於求其放心而已蓋能如是則志氣清明義理昭著而可以上達不然則昬昧放逸雖曰從事於學而終不能有所發明矣故程子曰聖賢千言萬語只是欲人將已放之心約之使反復入身來自能尋向上去下學而上達也此乃孟子開示要切之言程子又發明之曲盡其指學者冝服膺而勿失也仁者心之徳也而孟子直以為人心者蓋有此心即有此仁心而不仁則非人矣孔門之言仁多矣皆指其用功處言此則徑舉全體使人知心即仁仁即心而不可以二視之也義者人所當行之路跬歩而不由乎此則陷於邪僻之徑矣世之人乃冇舍其路而弗由放其心而不知求者正猶病風喪心之人猖狂妄行而不知反也豈不可哀也哉雞犬至輕也放則知求之人心至重也放而不知求借至輕而喻至重所以使人知警也然則人心之放何也欲汩之則放利誘之則放心旣放則其行必差故孟子始以人心人路並言而終獨諄諄於放心之知求能求放心則中有主而行不失矣故曰學問之道無他求其放心而已矣衍義孟子曰今有無名之指屈而不信非疾痛害事也如有能信之者則不逺秦楚之路為指之不若人也信與伸同為去聲無名指手之第四指也指不若人則知惡之心不若人則不知惡此之謂不知類也惡去聲不知類言其不知輕重之等也愚案程子曰人於外物奉身者事事要好只有自家一箇身與心却不要好苟得外物好時却不知道自家身與心却已先不好了也又永嘉鄭氏曰覽鏡而面目有汙則必滌之振衣而領䄂有垢則必濯之居室而几案牎壁有塵則必拂之不知是則不能安焉至於方寸之中神明之舍汙穢垢塵日積焉而不知滌濯振拂之察小而遺大察外而遺内其為不能充其類不亦甚乎程子鄭氏之言皆足以警學者故附見焉孟子曰拱把之桐梓人苟欲生之皆知所以養之者至於身而不知所以養之者豈愛身不若桐梓哉弗思甚也拱兩手所圍也把一手所握也桐梓二木名南軒曰愛其身必思所以養之然所以養之者則有道矣古之人理義以養其心以至於動作起居聲氣容貎之間莫不有養之之法焉所以尊徳性而道問學以成其身也於桐梓而知所以養則自拱把至於合抱可以馴致於身而知所以養則為賢為聖亦循循可進耳曰弗思甚也蓋思之則知身之為貴而不可以失其養弗思則待其身曽一草一木之不若矣孟子曰人之於身也兼所愛兼所愛則兼所養也無尺寸之膚不愛焉則無尺寸之膚不養也所以考其善不善者豈有他哉於已取之而已矣人於一身固當兼養然欲考其所養之善否者惟在反之於身以審其輕重而已矣體有貴賤有小大無以小害大無以賤害貴養其小者為小人養其大者為大人賤而小者口腹也貴而大者心志也今有場師舍其梧檟養其樲棘則為賤場師焉舍上聲檟音賈樲音貳場師治場圃也梧桐也檟梓也皆美材也樲棘小棗非美材也養其一指而失其肩背而不知也則為狼疾人也狼善顧疾則不能故以為失肩背之喻飲食之人則人賤之矣為其養小以失大也為去聲飲食之人專養口腹者也飲食之人無有失也則口腹豈適為尺寸之膚哉此言若使專養口腹而能不失其大體則口腹之養軀命所關不但為尺寸之膚而已但養小之人無不失其大者故口腹雖所當養而終不可以小害大賤害貴也飢渴飲食是亦理也人所為賤之者為其但知口腹之養而失其大者耳如使飲食之人而不失其大者則口腹豈但為養其尺寸之膚固亦理義之所存也故失其大者則役於血氣而為人欲先立乎其大者則本諸天命而皆至理人欲流則口腹之須何有窮極此人之所以違禽獸不逺也天理明則一飲一食之間亦莫不有則焉此人之所以成身而通乎天地也公都子問曰鈞是人也或為大人或為小人何也孟子曰從其大體為大人從其小體為小人鈞同也從隨也大體心也小體耳目之類也曰鈞是人也或從其大體或從其小體何也曰耳目之官不思而蔽於物物交物則引之而已矣心之官則思思則得之不思則不得也此天之所與我者先立乎其大者則其小者弗能奪也此為大人而已矣官之為言司也耳司聽目司視各有所職而不能思是以蔽於外物旣不能思而蔽於外物則亦一物而已又以外物交於此物其引之而去不難矣心則能思而以思為職凡事物之來心得其職則得其理而物不能蔽失其職則不得其理而物來蔽之此三者皆天之所以與我者而心為大若能有以立之則事無不思而耳目之欲不能奪之矣此所以為大人也然此天之此舊本多作比而趙注亦以比方釋之今本旣多作此而注亦作此乃未詳孰是但作比方於義為短故且從今本云范浚心箴曰茫茫堪輿俯仰無垠人於其間眇然有身是身之微太倉稊米參為三才曰惟心耳往古來今孰無此心心為形役乃獸乃禽惟口耳目手足動靜投間抵隙為厥心病一心之微衆欲攻之其與存者嗚呼幾希君子存誠克念克敬天君泰然百體從令孟子曰有天爵者有人爵者仁義忠信樂善不倦此天爵也公卿大夫此人爵也樂音洛天爵者徳義可尊自然之貴也古之人脩其天爵而人爵從之脩其天爵以為吾分之所當然者耳人爵從之蓋不待求之而自至也今之人脩其天爵以要人爵旣得人爵而棄其天爵則惑之甚者也終亦必亡而已矣要音邀要求也脩天爵以要人爵其心固已惑矣得人爵而棄天爵則其惑又甚焉終必并其所得之人爵而亡之也南軒曰古之人脩其天爵而已非有所為而為之人爵從之者言其理則然也今之人脩其天爵以要人爵夫有一毫要人爵之心則有害於天爵其脩之也亦慕其名而已孟子曰欲貴者人之同心也人人有貴於已者弗思耳貴於已者謂天爵也人之所貴者非良貴也趙孟之所貴趙孟能賤之人之所貴謂人以爵位加已而後貴也良者本然之善也趙孟晉卿也能以爵禄與人而使之貴則亦能奪之而使之賤矣若良貴則人安得而賤之哉詩云旣醉以酒旣飽以徳言飽乎仁義也所以不願人之膏粱之味也令聞廣譽施於身所以不願人之文繡也聞去聲詩大雅旣醉之篇鮑充足也願欲也膏肥肉粱美穀令善也聞亦譽也文繡衣之美者也仁義充足而聞譽彰著皆所謂良貴也尹氏曰言在我者重則外物輕孟子曰仁之勝不仁也猶水勝火今之為仁者猶以一杯水救一車薪之火也不熄則謂之水不勝火此又與於不仁之甚者也與猶助也仁之能勝不仁必然之理也但為之不力則無以勝不仁而人遂以為眞不能勝是我之所為有以深助於不仁者也以正勝邪須做得十分工夫方勝得他正如人身正氣稍不足邪便得以干之矣終亦必亡而已矣言此人之心亦且自怠於為仁終必并與其所為而亡之趙氏曰言為仁不至而不反諸已也南軒曰此為有志於仁而未力者言也仁與不仁特係乎操舍之間而天理人欲分焉天理存則人欲消固不兩立也故以水勝火喻之然用力於仁貴於乆而勿舍若一暴而十寒倐得而復失則暫存之天理豈能勝無窮之人欲哉學者觀於此其可斯須而不存是心乎天理寖明則人欲寖消矣及其至也純是天理以水勝火不其然乎孟子曰五穀者種之美者也苟為不熟不如荑稗夫仁亦在乎熟之而已矣荑音蹄稗蒲賣反夫音扶荑稗草之似穀者其實亦可食然不能如五穀之美也但五穀不熟則反不如荑稗之熟猶為仁而不熟則反不如為他道之有成是以為仁必貴乎熟而不可徒恃其種之美又不可以仁之難熟而甘為他道之有成也尹氏曰日新而不已則熟南軒曰此勉學者為仁貴乎有成也仁者人之所以為人也然為之而不至則未可謂成人況於乍明乍暗若存若亡無篤實悠乆之功則終亦必亡而已矣云云未至於顔子之地皆未可語夫熟孟子曰羿之敎人射必志於彀學者亦必志於彀彀古候反羿善射者也志猶期也彀弓滿也滿而後發射之法也學謂學射大匠誨人必以規矩學者亦必以規矩大匠工師也規矩匠之法也此章言事必有法然後可成師舍是則無以教弟子舍是則無以學曲藝且然況聖人之道乎南軒曰彀者弩張向的處也射者期於中鵠也然羿之敎人使志於彀鵠在彼而彀在此心存乎此雖不中不逺矣學者學為聖賢也聖賢曷為而可至哉求之吾身而已求之吾身其則蓋不逺心之所同然者人所固有也學者亦存此而已存乎此則聖賢之門牆可漸而入也規矩所以為方貟也大匠誨人使之用規矩而已至於巧則非大匠之所能誨存乎其人焉然巧固不外乎規矩也學者之於道其為有漸其進有序自洒埽應對至於禮儀之三百威儀之三千猶木之有規矩也亦循乎此而已至於形而上者之事則在其人所得何如形而上者固不外乎洒埽應對之間也舍是以求道是猶舍規矩以求巧也此章所舉二端敎人者與受敎於人者皆不可以不知孟子集編卷十一
