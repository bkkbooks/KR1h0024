body:
  text: 欽定四庫全書論語集編卷六宋真徳秀撰先進第十一此篇多評弟子賢否凡二十五章胡氏曰此篇記閔子騫言行者四而其一直稱閔子疑閔氏門人所記也子曰先進於禮樂野人也後進於禮樂君子也先進後進猶言前輩後輩野人謂郊外之民君子謂賢士大夫也程子曰先進於禮樂文質得宜今反謂之質樸而以為野人後進之於禮樂文過其質今反謂之彬彬而以為君子葢周末文勝故時人之言如此不自知其過於文也如用之則吾從先進用之謂用禮樂孔子既述時人之言又自言其如此葢欲損過以就中也聖人窮而在下禮樂固是從周若達而在上湏臾損益南軒曰文勝而過質則於禮樂之實反有害故聖人思反本而有從先進之言程子曰若用於時救文之弊則吾從先進小過之義也或曰然則從周之説奈何葢文莫備於周大體固當從周而其末流文勝之弊則不可以不正也從先進與從周故各有義耳子曰從我於陳蔡者皆不及門也從去聲孔子嘗厄於陳蔡之間弟子多從之者此時皆不在門故孔子思之葢不忘其相從於患難之中也徳行顔淵閔子騫冉伯牛仲弓言語宰我子貢政事冉有季路文學子游子夏行去聲弟子因孔子之言記此十人而并目其所長分為四科孔子教人各因其材於此可見程子曰四科乃從夫子於陳蔡者爾門人之賢者固不止此曾子傳道而不與焉故知十哲世俗論也又曰孔子教人各因其材有以言論入者有以徳行入者或問四科之目何也曰徳行濳心體道黙契於為國治民之事者也文學者學於詩書禮樂之文而能言其意者也葢夫子教人使各因其所長以入於道然其序則必以徳行為先誠以躬行云云其卒莫之能反者則以其自暴自棄而已子曰囘也非助我者也於吾言無所不説説音悦助我若子夏之起予因疑問而有以相長也顔子於聖人之言默識心通無所疑問故夫子云然其辭若有憾焉其實乃深喜之胡氏曰夫子之於囘豈真以助我朢之葢聖人之謙徳又以深賛顔氏云爾子曰孝哉閔子騫人不閒於其父母昆弟之言閒去聲胡氏曰父母兄弟穪其孝友人皆信之無異辭者葢孝友之實有以積於中而著於外故夫子歎而美之韓詩外傳子騫蚤喪母父娶後妻生三子疾惡子騫以蘆花衣之父察知之欲逐後母子騫啓曰母在一子寒母去三子單父善之而止母悔改之後至均平遂成慈母以上言事難事之親曽閔以孝並穪於聖門曽子之父晳亦幾難事者也鋤爪誤傷而撻以大杖葢可見矣而曽子援琴而鼔惟恐傷親之心也斯其所以為孝歟然孔子小杖則受大杖則走之言尤人子所當知也伯奇亦類此韓文公履霜操曰兒罪當笞逐兒何為葢得伯奇之心者張子西銘曰勇於從而順令者伯奇也其指尤深為人子者不幸而事難事之親則於大舜曽閔伯奇之事可不勉而師之乎南容三復白圭孔子以其兄之子妻之三妻並去聲詩大雅抑之篇曰白圭之玷尚可磨也斯言之玷不可為也南容一曰三復此言事見家語葢深有意於謹言也此邦有道所以不廢邦無道可以免禍故孔子以兄子妻之范氏曰言者行之表行者言之實未有易其言而能謹於行者南容欲謹其言如此則必能謹其行矣季康子問弟子孰爲好學孔子對曰有顔回者好學不幸短命死矣今也則亡好去聲范氏曰哀公康子問同而對有詳略者臣之告君不可不盡若康子者必待其能問乃告之此教誨之道也顔淵死顔路請子之車以為之椁顔路淵之父名無繇少孔子六歲孔子始教而受學焉椁外棺也請為椁欲賣車以買椁也子曰才不才亦各言其子也鯉也死有棺而無椁吾不徒行以為之椁以吾從大夫之後不可徒行也鯉孔子之子伯魚也先孔子卒言鯉之才雖不及顔淵然已與顔路以父視之則皆子也孔子時已致仕尚從大夫之列言後謙辭胡氏曰孔子遇舊館人之喪嘗脫驂以賻之矣今乃不許顔路之請何邪葬可以無椁驂可以脱而復求大夫不可以徒行命車不可以與人而鬻諸市也且為所識窮乏者得我而勉強以副其意豈誠心與直道哉或者以為君子行禮視吾之有無而己夫君子之用財視義之可否豈獨視有無而己哉顔淵死子曰噫天喪予天喪予喪去聲噫傷痛聲悼道無傳若天喪已也顔淵死子哭之慟從者曰子慟矣從去聲慟哀過也曰有慟乎哀傷之至不自知也非夫人之為慟而誰為夫音扶為去聲夫人謂顔淵言其死可惜哭之宜慟非他人之比也胡氏曰痛惜之至施當其可皆情性之正也史記回年二十九髪盡白蚤死孔子哭之曰自我有回門人益親顔淵死門人欲厚葬之子曰不可喪具稱家之有無貧而厚葬不循禮也故夫子止之門人厚葬之葢顔路聽之子曰回也視予猶父也予不得視猶子也非我也夫二三子也歎不得如葬鯉之得宜以責門人也季路問事鬼神子曰未能事人焉能事鬼敢問死曰未知生焉知死焉於䖍反問事鬼神葢求所以奉祭祀之意而死者人之所必有不可不知皆切問也然非誠敬足以事人則必不能事神非原始而知所以生則必不能反終而知所以死葢幽明始終初無二理但學之有序不可躐等故夫子告之如此程子曰晝夜者死生之道也知生之道則知死之道盡事人之道則盡事鬼之道死生人鬼一而二二而一者也或言夫子不告子路不知此乃所以深告之也朱子又曰事君親盡誠敬之心即移此心以事鬼神則祭如在祭神如神在人受天所賦自然完具無欠闕須是得這道理無欠闕到那死時乃是生理已盡亦安於分而無愧文曰事人事鬼以心言知生知死以理言又曰事人須是誠敬事鬼亦要如此事人如出則事公卿入則事父兄事其所當事者事鬼亦然苟非其鬼而事之則諂矣問云云曰若曰氣聚則生氣散則死纔説破人便都理㑹得然須知道人生有多少道理自稟五常之性以來所以父子有親君臣有義須至一一盡得這生底道理則死底道理皆可知矣張子所謂存吾順事沒吾寧也又曰鬼神自是難理㑹底且就日用緊切處做工夫將來自有見處閔子侍側誾誾如也子路行行如也冉有子貢侃侃如也子樂誾侃音義見前篇行胡浪反樂音洛行行剛強之貎子樂者樂得英材而教育之若由也不得其死然尹氏曰子路剛強有不得其死之理故因以戒之其後子路卒死於衞孔悝之難洪氏曰漢書引此句上有曰字或云上文樂字即曰字之誤或問誾誾侃侃於前篇之訓其已通乎曰誾誾者外和内剛德氣深厚所謂和悦而諍者也侃侃則和順不足而剛直稍外見矣前篇之訓樂故侃侃直而果故行行有諸中形於外莫掩也案鄉黨注引許氏説文侃侃剛直也誾誾和悦而諍或問二字之訓不同説文為得何也曰太史公稱魯道之衰洙泗之間斷斷如也亦作誾誾説者以為諍讓之意而昔人亦有侃侃正色之語葢以音義求之亦宜如此説文之訓所以為得也誾誾之為中正亦有未盡衎衎而樂自作衎不作侃也後漢書云誾誾衎衎得禮之容寢黙抑心非朝廷福其意亦以爭辨剛直為是而有此言也侃字誤作衎爾朱張二先生誾侃之訓不同更當詳玩南軒曰孔悝被刧子路死之誠不可以不死謂之不得其死不可也然其從孔悝則有為之死之理始擇之不善也則不幾不得其死乎若比干則可謂得其死者矣然則求生以害仁者謂之不得其生可也子路雖不得其死而與是類固不可以同日而語矣案史記仲由傳初衞靈公有寵姬曰南子靈公太子蒯聵得遇南子懼誅出奔及靈公卒而欲立公子郢郢不肯曰亡人太子之子輒在於是衞立輒為君是為出公出公立十二年其父蒯聵不得入子路為衞大夫孔悝之邑宰蒯聵乃與孔悝作亂謀入孔悝家遂與其徒襲攻出公奔魯而蒯聵入立是為莊公方孔悝作亂子路在外聞之而馳往遇子羔出衞城門謂子路曰出公去矣而門已閉子可還矣毋輕受其禍子路曰食其食者不避其難子羔卒去有使者入城城門開子路隨而入造蒯聵蒯聵與孔悝登臺子路曰君焉用孔悝請得而殺之蒯聵弗聽於是子路欲燔臺蒯聵懼乃下石乞壺黶攻子路撃㫁子路之纓子路曰君子死而冠不免遂結纓而死孔子聞衞亂曰嗟乎由死矣己而果死問由之死疑其甚不明於大義豈有子之拒父如是之逆而可以仕之乎朱子曰然仲由之死誠未為至當然其誤不在致死之時乃在於委質之始又曰子路只見下一截不見上一截孔悝之事他知是食焉不避其難而不知食出公之食為不當也東坡嘗論及此問是初仕衞時便不是否曰然問子路之死是否曰非是輒如何主豈可仕也孔悝亦自是箇不好底人子路但見得可仕於大夫而不知輒之國非可仕之國問孔門弟子多仕於列國大夫是何如曰當時仕進只有此一門舍此無從可仕所以顔閔寧不仕耳孔悝之難未為不是只是當時仕孔悝時錯了至此不得其死衛君不正冉冇子貢便能疑而問知有思量便不去仕他若子路粗率全不信聖人説話必也正名亦是教子路不要仕衞他便説夫子之迂云云魯人為長府長府藏名藏貨財曰府為葢改作之閔子騫曰仍舊貫如之何何必改作仍因也貫事也王氏曰改作勞民傷財在於得已則不如仍舊貫之善子曰夫人不言言必有中夫音扶中去聲言不妄發發必當理唯有徳者能之南軒曰貨財之府無故改為得無示人以崇利聚斂之意乎案閔子言行見於論語惟四章合而觀之凡其躬至孝之行辭不義之禄氣和而正言謹而確此其所以亞於顔淵與曾子並稱也歟子曰由之瑟奚為於丘之門程子曰言其聲之不和與已不同也家語云子路鼓瑟有北鄙殺伐之聲葢其氣質剛勇而不足於中和故其發於聲者如此門人不敬子路子曰由也升堂矣未入於室也門人以夫子之言遂不敬子路故夫子以升堂入室喻入道之次第言子路之學已造乎正大髙明之域特未深入精微之奥耳未可以一事之失而遽忽之也南軒曰以瑟為言葢瑟之聲音象其中之所存也子路之氣稟偏於剛雖其學之所至氣質不為不變然於其所偏終有化之未能盡者在聖人之門為有未和也斯言所以警子路而進之門人聞此遂有不敬子路之意蓋未知子路之所至與夫聖人發言之意也故復從而聞曉之夫自得其門而入以至於升堂其為次序淺深亦已多矣其於用力亦可謂至矣獨未極夫閫奥之地耳由室而言在堂者則為未至所當勉以進也由宫牆之外而望其升堂者則不亦有閒乎聖人斯言非特以發明子路亦所以使門人知學之有序也子貢問師與商也孰賢子曰師也過商也不及子張才髙意廣而好為苟難故常過中子夏篤信謹守而規模狹隘故常不及曰然則師愈與與平聲愈猶勝也子曰過猶不及道以中庸為至賢智之過雖若勝於愚不肖之不及然其失中則一也尹氏曰中庸之為徳也其至矣乎夫過與不及均也差之豪釐繆以千里故聖人之教抑其過引其不及歸於中道而已或問楊墨之學出於師商信乎曰胡氏論之當矣其言曰楊朱即莊周所謂楊子居者與老聃同時墨翟又在楊朱之前宗師大禹而晏嬰學之者也以為出於二子者則其攷之不詳甚矣愚案賢者之過愚不肖之不及夫子蓋泛言之非指子夏而言也南軒曰子張髙明故常開擴子夏敦篤故常收斂開擴則未免有過收斂則未免有不及然二子之過不及甚微特未得其中而已夫子謂猶不及過與不及未得其中則均也今以論語所載二子言行觀之其所為過與不及亦可得而見矣案下章求退故進之由兼人故退之朱子以為一進一退所以約之於義理之中而使無過不及之患亦是季氏富於周公而求也為之聚斂而附益之為去聲周公以王室至親有大功位冢宰其富宜矣季氏以諸侯之卿而富過之非攘奪其君刻剥其民何以得此冉有為季氏宰又為之急賦稅以益其富子曰非吾徒也小子鳴鼓而攻之可也非吾徒絶之也小子鳴鼓而攻之使門人聲其罪以責之也聖人之惡黨惡而害民也如此然師嚴而友親故己絶之而猶使門人正之又見其愛人之無已也范氏曰冉有以政事之才施於季氏故為不善至於如此由其心術不明不能反求諸身而以仕為急故也或問冉求學於夫子於門弟中亦可謂明達者今乃為季氏聚斂何邪曰冉求之失不待於聚斂而後見自其仕於季氏則已失之矣蓋當是之時達官重任皆為公族之世官其下則尺地一民皆非國君之有士惟不仕則已仕則未有不仕於大夫者也冉求豈亦習於衰世之風而不自知其為非與然使之仕於季氏而能勸之黜其強僭而忠於公室則庶乎小貞之吉矣今乃反為之聚斂使權臣愈強而公室愈不振故孔子云云葢不自知其學之未至而從仕為士之常職是以漸靡而至於此耳曰然則夫子曷為不於其仕季氏焉責之也曰聖人以不仕為無義而猶望之為小貞之吉也南軒曰此哀公十年用田賦之事也冉有時為季氏宰攷左氏之國語葢嘗以此事訪於夫子而卒莫之救私門益以封殖則公室益以削弱此求之所以得罪於聖門為深也原求所以至此葢不能如閔子見幾而作因循陵遲而不自知也有志於學者亦鑒諸柴也愚柴孔子弟子姓髙字子羔愚者知不足而厚有餘家語記其足不履影啓蟄不殺方長不折執親之喪泣血三年未嘗見齒避難而行不徑不竇可以見其為人矣檀弓記其二事一曰季子臯葬其妻犯人之禾申詳以告曰請庚之子羔曰孟氏不以是罪子朋友不以是棄予以我為邑長於斯也買道而葬後難繼也鄭氏曰恃寵虐民非也其二曰成人有其兄死而不為衰者聞子臯將為成宰遂為衰由前則未可謂知為政之理由後則有言之化焉豈其學力之進有月異而歳不同者邪參也魯魯鈍也程子曰參也竟以魯得之又曰曾子之學誠篤而已聖門學者聦明才辨不為不多而卒傳其道乃質魯之人爾故學以誠實為貴也尹氏曰曽子之才魯故其學也確所以能深造乎道也師也辟辟婢亦反辟便辟也謂習於容止少誠實也由也喭喭五旦反喭粗俗也傳穪喭者謂俗論也楊氏曰四者性之偏語之使知自勵也呉氏曰此章之首脱子曰二字或疑下章子曰當在此章之首而通為一章尹氏曰曽子在孔門當時以為魯學道宜難於他人然子思之中庸聖學所賴以傳者也攷其淵源乃自曽子由此觀之聦明才智未必不害道而剛毅木訥信乎於仁為近矣南軒曰曾子之魯其為學篤實故卒能深造於道此章乃聖人目曽子之辭然必在曰唯之前無疑也子曰回也其庶乎屢空庶近也言近道也屢空數至空匱也不以貧窶動心而求富故屢至於空匱也言其近道又能安貧也賜不受命而貨殖焉億則屢中中去聲命謂天命貨殖貨財生殖也億意度也言子貢不如顔子之安貧樂道然其才識之明亦能料事而多中也程子曰子貢之貨殖非若後人之豐財但此心未忘耳然此亦子貢少時事至聞性與天道則不為此矣范氏曰屢空者簞食瓢飲屢絶而不改其樂也天下之物豈有可動其中者哉貧富在天而子貢以貨殖為心則不能安受天命矣其言而多中者億而己非窮理樂天者也夫子嘗曰賜不幸言而中是使賜多言也聖人之不貴言也如是或問屢空之説曰空為匱今其説舊矣何晏始以為虚中受道蓋出老莊之説非聖人本意也胡氏亦論之曰以屢空為虚中受道聖人之言未嘗如是之僻而晦也屢而有閒是頻復矣方其不空之時與庸人亦奚逺哉此得之矣且下文以子貢貨殖方之尤見舊説之不易也子張問善人之道子曰不踐迹亦不入於室善人質美而未學者也程子曰踐迹如言循途守轍善人雖不必踐舊迹而自不為惡然亦不能入聖人之室也張子曰善人欲仁而未志於學者也欲仁故雖不踐成法亦不蹈於惡有諸已也由不學故無自而入聖人之室也或謂善人者未能有諸已乎南軒曰不能有之則安得善然所謂有諸已者蓋亦有淺深善人謂其不能有諸已則不可然謂其盡夫有諸己之道則亦未也子曰論篤是與君子者乎色莊者乎與如字言但以其言論篤實而與之則未知其為君子者乎為色莊者乎言不可以言貌取人也子路問聞斯行諸子曰有父兄在如之何其聞斯行之冉有問聞斯行諸子曰聞斯行之公西華曰由也問聞斯行諸子曰有父兄在求也問聞斯行諸子曰聞斯行之赤也惑敢問子曰求也退故進之由也兼人故退之兼人謂勝人也張敬夫曰聞義固當勇為然有父兄在則有不可得而專者若不稟命而行則反傷於義矣子路有聞未之能行唯恐有聞則於所當為不患其不能為矣特恐為之之意或過而於所當稟命者有闕耳若冉求之資稟失之弱不患其不稟命也患其於所當為者逡巡畏縮而為之不勇耳聖人一進之一退之所以約之於義理之中而使之無過不及之患也子畏於匡顔淵後子曰吾以女為死矣曰子在回何敢死女音汝後謂相失在後何敢死謂不赴鬬而必死也胡氏曰先王之制民生於三事之如一惟其所在則致死焉況顔淵之於孔子恩義兼盡又非他人之為師弟子者而已即孔子不幸而遇難回必捐生以赴之矣捐生以赴之幸而不死則必上告天子下告方伯請討以復讎不但已也夫子而在則回何為而不愛其死以犯匡人之鋒乎或問顔回親在不得為夫子死者如何曰胡氏曰程子嘗言之矣閭巷之人辭親逺適則同患難有相死之理況朋友乎況弟子之於師乎當預行而先斷不可臨事而始謀也季子然問仲由冉求可謂大臣與與平聲子然季氏子弟自多其家得臣二子故問之子曰吾以子為異之問曽由與求之問異非常也曾猶乃也輕二子以抑季然也所謂大臣者以道事君不可則止以道事君者不從君之欲不可則止者必行已之志南軒曰大臣不枉道以徇人其不合則有去而已由求為季氏之臣坐觀其失而不能去直尸禄備數而己故曰具臣然則從之者與季子意其不能止則當無不從也方是時季氏無君之心已著矣謂弑父與君亦不從者非惟言由求所長抑可使之聞而懼也或曰此何必由求而後能之曾不知順從之臣其始也惟利害之是徇而已履霜堅冰之不戒馴習蹉跌以至於從人而弑君父者多矣如荀彧劉穆之之徒其始從曹操劉裕之時亦豈遽欲弑父與君哉惟其漸浸順長而勢卒至此耳衍義曰道者正理也大臣以正理事君君之所行有不合正理者必規之拂之不茍從也道有不合則去之不苟留也或謂不合則去毋乃非事君之意乎曰此所以為愛君也君臣之交以道合非利之也道不合不去則有苟焉徇利之志是使君輕視其臣謂可以利籠絡之也君而輕視其臣何所不至惟大臣者能以道為去就則足以起其君畏敬之心敬畏之心存而後能適道愚故謂不合而去乃所以為愛君也今由與求也可謂具臣矣具臣謂備臣數而已曰然則從之者與與平聲意二子既非大臣則從季氏之所為而已子曰弑父與君亦不從也言二子雖不足於大臣之道然君臣之義則聞之熟矣弑逆大故必不從之蓋深許二子以死難不可奪之節而又以隂折季氏不臣之心也尹氏曰季氏專權僭竊二子仕其家而不能正也知其不可而不能止也可謂具臣矣是時季氏己有無君之心故自多其得人意其可使從己也故曰弑父與君亦不從也其庶乎二子可免矣子路使子羔為費宰子路為季氏宰而舉之也子曰賊夫人之子夫音扶下同賊害也言子羔質美而未學遽使治民適以害之子路曰有民人焉有社稷焉何必讀書然後為學言治民事神皆所以為學子曰是故惡夫佞者惡去擊治民事神固學者事然必學之已成然後可仕以行其學若初未嘗學而使之即仕以為學其不至於慢神而虐民者幾希矣子路之言非其本意但理屈辭窮而取辦於口以禦人耳故夫子不斥其非而特惡其佞也范氏曰古者學而後入政未聞以政學者也葢道之本在於修身而後及於治人其說具於方冊讀而知之然後能行何可以不讀書也子路乃欲使子羔以政為學失先後本末之序矣不知其過而以口給禦人故夫子惡其佞也南軒曰子羔學未充而遽使為宰其本不立而置於事物酬酢之地將反戕賊其心矣夫民人社稷固無非學而學固不獨在書籍之閒然學必貴於讀書者以夫多識前言往行古之人所以蓄徳者實有賴乎是德立於已而後可以言無適而非學也至於上聖生知之流冝莫待乎讀書矣而夫子毎以好古為言葢聖雖生知而亦必由是以成之也如子路之言將使學者以聦明為可恃而無復敦篤濳泳之功其甚至於廢古而任意為弊有不可勝言者故夫子責之之深也案范氏引學而後入政云云出左氏傳鄭子皮欲使尹何為邑子産曰少未知可否子皮曰使夫往而學焉子産曰不可子有美錦不使人學製焉大官大邑身之所庇也而使學者製焉其為美錦不亦多乎僑聞學而後入政未聞以政學也若果行此必有所害譬如田獵射御貫則能獲禽若未能登車射御則敗績壓覆是懼何暇思獲子皮曰善哉子産之言與此章頗類故附焉子路曽晳冉有公西華侍坐坐財臥反皙曽參父名㸃子曰以吾一日長乎爾毋吾以也長上聲言我雖年少長於女然女勿以我長而難言蓋誘之盡言以觀其志而聖人和氣謙德於此亦可見矣居則曰不吾知也如或知爾則何以哉言女平居則言人不知我如或有人知女則女將何以為用也子路率爾而對曰千乗之國攝乎大國之閒加之以師旅因之以饑饉由也為之比及三年可使有勇且知方也夫子哂之乗去聲饑音機饉音僅比必二反下同哂詩忍反率爾輕遽之貎方向也謂向義也民向義則能親其上死其長矣哂微笑也求爾何如對曰方六七十如五六十求也為之比及三年可使足民如其禮樂以俟君子赤爾何如對曰非曰能之願學焉宗廟之事如㑹同端章甫願為小相焉相去聲宗廟之事謂祭祀諸侯時見曰㑹衆類曰同端𤣥端服章甫禮冠相贊君之禮者㸃爾何如鼓瑟希鏗爾舎瑟而作對曰異乎三子者之撰子曰何傷乎亦各言其志也曰莫春者春服既成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸夫子喟然歎曰吾與㸃也鏗苦耕反舍上聲撰士免反莫冠並去聲沂魚依反雩音于曽㸃之學葢有以見夫人欲盡處天理流行隨處充滿無少欠闕故其動靜之際從容如此而其言志則又不過即其所居之位樂其日用之常初無舍已為人之意而其胷悠然直與天地萬物上下同流各得其所之妙隱然自見於言外視三子之規規於事為之末者其氣象不侔矣故夫子歎息而深許之三子者出曽皙後曽皙曰夫三子者之言何如子曰亦各言其志也己矣夫音扶曰夫子何哂由也曰為國以禮其言不讓是故哂之唯求則非邦也與安見方六七十如五六十而非邦也者唯赤則非邦也與宗廟㑹同非諸侯而何赤也為之小孰能為之大程子曰古之學者優柔厭飫有先後之序如子路冉有公西赤言志如此夫子許之亦以此自是實事後之學者好髙如人游心千里之外然自身却只在此又曰孔子與㸃蓋與聖人之志同便是堯舜氣象也誠異三子者之撰特行有不掩焉爾此所謂狂也子路等所見者小子路只為不達為國以禮道理是以哂之若達却便是這氣象也又曰三子皆欲得國而治之故孔子不取曽㸃狂者也未必能為聖人之事而能知夫子之志故曰浴乎沂風乎舞雩詠而歸言樂而得其所也孔子之志在於老者安之朋友信之少者懐之使萬物莫不遂其性曾㸃知之故夫子喟然歎曰吾與㸃也又曰曽㸃漆雕開已見大意集義謝氏論佛學之失曰為他不窮天理只將拈匙把筯日用底便承當做大事任意縱横將來作用便是差處便是私處問作用何故是私曰把來作用做弄便是做兩般看當了是將此事横在肚裏一如子路冉有相似便被他曽㸃將冷眼看他只管獨對春風吟詠肚裏渾没些能解豈不快活又問堯舜湯武做底事業豈不是作用曰他做底事業只是與天理合一幾曽做作横在肚裏他見做出許多掀天動地葢世底功業如太空中一㸃露相似他做把甚麽又引呂氏詩云函丈從容問且酬展才無不志諸侯可憐曾㸃惟鳴瑟獨對春風詠不休謝氏之説集注不取今附此或問夫子何以與㸃也曰方三子之競言所志也㸃獨鼓瑟於其閒漠然若無所聞者及夫子問之然後瑟音少閒乃徐舎瑟而起對焉而悠然遜避若終不肯見所為者及夫子慰而安之然後不得已而發其言焉而其志之所存又未嘗少出其位葢澹然若將終身焉者此夫子所以與之也曰何以言其與天地萬物各得其所也曰夫莫春之日生物暢茂之時也春服既成人體和適之候也冠者五六人童子六七人長少有序而和也沂上舞雩魯國之勝處也既浴而夙又詠而歸樂而得其所也夫以所居之位而言其樂止於一身然以其心論之則固藹然天地生萬物之心聖人對時育物之事也夫又安有物我内外之閒哉程子以為與聖人之志同便是堯舜氣象正謂此耳或曰曽晳胷中無一豪能事列子御風之事近之其説然乎曰聖賢之心所以異於佛老者正以無意必固我之累而所謂天地生物之心對時育物之事者未始一息而停也若但曰曠然無所倚著而不察乎此則亦何以異於虚無寂滅之學而豈聖人之事哉曾㸃之志如鳳皇翔於千仞之上故曰異乎三子者之撰只看他鼓瑟希鏗爾舎瑟而作從容優裕悠然自得處無不是這箇道理人之一身便是天地只縁人欲隔了自看此理意思不見曽㸃却超然看破這意思曽㸃於道見其逺者大者而視其近與小者皆不足為故其言超然無一豪作為之意惟欲樂其所樂以終身焉耳先生令門人說曾㸃之志門人以為只是樂其性分而已日用閒見得天理流行纔著一豪私意去安排便不得曰不是不要著私意去安排這道理自是天生自然私意自著不得更待誰去安排與聖人安老懐少信友朋底意思相似惟曽㸃見得到這裏聖人便做得到這裏人只見說曾㸃狂看夫子時與云云之意須是大段髙縁他資質明敏洞然自得見斯道之體看天下甚麽事能動得他他大綱如莊子明道先生亦稱莊子云有大底意思又云莊生形容道體儘有好處曾㸃見得大意然裏面工夫却踈略明道亦云莊子無禮無本問曾㸃浴沂氣象與顔子樂底意思相近否曰顔子恬靜無許多事曽㸃是自恁地説顔子是孔子稱他樂他不曾自說樂問吾與㸃處程子謂便是堯舜氣象如何曰曾㸃却只是見得未必能做堯舜事看其見到處直有堯舜氣象如莊子亦見得堯舜分曉或問天王之用心何如便說得天徳而出寧日月照而四時行若晝夜之有經雲行而兩施以是知他見得堯舜氣象出曾晳見識儘高見得此理洞然只是未曾下得工夫㸃參父子正相反以㸃如此髙明參却魯鈍一向低頭推將去直到一貫方始透徹是時見識方到曾㸃地位然而規模氣象又别此一段唯上蔡見分曉三子只就事上見得此道理曾㸃只去自己心性上見得箇本原道理使曾㸃做三子事未必做得然曾㸃見處雖堯舜事業亦不過如此為之而己諸子皆有安排期必之意曾㸃只以平日所樂處言之曾㸃見得道理大所以堯舜事業優為之視三子規規於事為之末固有聞矣是他見得聖人氣象如此雖超然事物之外而實不離乎事物之中是箇無事無為底道理却做有事有為底事業此所謂大本所謂忠所謂一者是也㸃操得柄欛據著原頭諸子則從支流上做工夫諸子底小他底大曾㸃言志云云蓋其見道分明無所係累從容和樂欲與萬物各得其所之意莫不藹然見於辭氣之閒明道謂與聖人之志同便是堯舜氣象者直指此而言之也嚴時亨問曽㸃一章夫子既語以居則曰不吾知也如或知爾則何以哉正是使之盡言一旦進用何以自見及三子自𫐠其才之所能堪志之所欲為夫子皆不許之而獨與曾㸃看來三子所言皆是實事曾㸃雖荅言志之問實未嘗言其志之所欲為有似逍遥物外不屑當世之務者而聖人與此不與彼何也嘗因是而思之學與為治本來只是一統事他日之所用不外乎今日之所存三子却分作兩截看如治軍旅治財賦治禮樂與凡天下之事皆學者所當理㑹無一件是少得底然須先理㑹自家身心使自得無欲常常神清氣定涵養直到清明在躬志氣如神則天下無不可為之事程子所謂不得以天下事物撓已已立然後自能了當得天下事物者是矣夫子嘗因孟武伯之問而言由可使治賦求可使為宰赤可與賔客言固已深知其才之所能辦而獨不許其仁夫仁者體無不具用無不該豈但止於一才一藝而已使三子不自安於所已能孜孜惟求仁是務而好之樂之則何暇規規於事為之末縁他有這能縱横在胷中常恐無以自見故必欲得國而治之一旦夫子之問有以觸其機即各述所能凡聖門平日所與講切自身受用處全不之及將為學為治作兩截看了所以氣象不宏事業不能到得至處如曾㸃浴沂風雩自得其樂却與夫子飯䟽食飲水樂在其中顔子陋巷簞瓢不改其樂襟懷相似大扺士之未用須知舉天下之物不足以易吾天理自然之安方是本分學者曾㸃言志乃是素其位而行不願乎其外無入而不自得者故程子以為樂而得其所也孟子謂廣土衆民君子欲之所樂不存焉中天下而立定四海之民君子樂之所性不存焉君子所性雖大行不加焉雖窮居不損焉分定故也孟子所謂所性即孔子顔子曾㸃之所樂顔子惟所樂如此故夫子以四代禮樂許之浴沂風雩識者所以知堯舜事業曾㸃優為之也如子路食於孔悝求也為季氏聚斂後來成就止於如此只為他不知平日所養便是建功立業之本未到無入不自得處夫子之不與其有以知之矣所見如此不背馳否朱子荅曰此段說得極有本末學者立志要當如此然其用力却有次第已為希遜言之矣案先生荅歐陽希遜云學者當循下學上達之序若一向求曽皙見解未有不流於釋老者也南軒曰三子之對非偶然而言葢體察其力之所至而言其實也言三年而可使如此者其先後條貫素定於胷中而知其然也向使用力不素驟聞聖人之問非茫乎無所措則泛然肆其說矣至於曾皙則又異乎是其鼓瑟舎瑟之閒已可見其從容不迫之意矣言莫春之時與數子浴沂風雩吟詠而歸葢其中心和樂無所係累油然欲與萬物各得其所玩味辭氣温乎如春陽之無不被也故程子以為此即是堯舜氣象而亦夫子老安少懐之意也皙之志若此非其見道之明涵泳有素其能然乎然而未免於行有不掩焉則以其於顔氏工夫有所未盡耳黄氏曰觀夫子逝如斯之言欲無言之意是亦歎曽㸃之意也又曰夫子以是與㸃矣獨不以是教人何也曰夫子未嘗不以是教門人也誨之以務内語之以求仁無非使之存此心之天理也又曰皙之不免為狂何也曰天下之理固根於人心亦未嘗不形見於事物為學之方固當存養其德性而亦不可不省察乎實行夫是以精粗不遺而表裏相應内外交養而動靜如一然後可以為聖學之極功㸃之質甚髙志甚大然深厚沈潛醇實中正之意有未足則見髙而遺卑見大而略小此所以不及乎顔曽也顔淵第十二凡二十四章顔淵問仁子曰克己復禮為仁一日克已復禮天下歸仁焉為仁由已而由人乎哉仁者本心之全德克勝也已謂身之私欲也復反也禮者天理之節文也為仁者所以全其心之德也葢心之全德莫非天理而亦不能不壞於人欲故為仁者必有以勝私欲而復於禮則事皆天理而本心之德復全於我矣歸猶與也又言一日克已復禮則天下之人皆與其仁極言其效之甚速而至大也又言為仁由已而非他人所能預又見其機之在我而無難也日日克之不以為難則私欲淨盡天理流行而仁不可勝用矣程子曰非禮處便是私意既是私意如何得仁須是克盡已私皆歸於禮方始是仁又曰克已復禮則事事皆仁故曰天下歸仁謝氏曰克已須從性偏難克處克將去顔淵曰請問其目子曰非禮勿視非禮勿聽非禮勿言非禮勿動顔淵曰回雖不敏請事斯語矣目條件也顔淵聞夫子之言則於天理人欲之際已判然矣故不復有所疑問而直請其條目也非禮者已之私也勿者禁止之辭是人心之所以為主而勝私復禮之機也私勝則動容周旋無不中禮而日用之閒莫非天理之流行矣事如事事之事請事斯語顔子黙識其理又自知其力有以勝之故直以為已任而不疑也程子曰顔淵問克已復禮之目子曰非禮勿視非禮勿聽非禮勿言非禮勿動四者身之用也由乎中而應乎外制於外所以養其中也顔淵事斯語所以進於聖人後之學聖人者冝服膺而勿失也因箴以自警其視箴曰心兮本虚應物無迹操之有要視為之則蔽交於前其中則遷制之於外以安其内克己復禮乆而誠矣其聽箴曰人有秉彝本乎天性知誘物化遂亡其正卓彼先覺知止有定閑邪存誡非禮勿聽其言箴曰人心之動因言以宣發禁躁妄内斯靜專矧是樞機興戎出好吉凶榮辱惟其所召傷易則誕傷煩則支已肆物忤出悖來違非法不道欽哉訓辭其動箴曰哲人知幾誠之於思志士勵行守之於為順理則裕從欲惟危造次克念戰兢自持習與性成聖賢同歸愚案此章問荅乃傳授心法切要之言非至明不能察其幾非至健不能致其決故惟顔子得聞之而凡學者亦不可不勉也程子之箴發明親切學者尤冝深玩或問顔淵問仁而夫子告之以此何也曰人受天地之中以生而仁義禮智之性具於其心仁雖專主於愛而實為心體之全德禮則專主於敬而實天理之節文也然人有是身則耳目口體之聞不能無私欲之累以違於禮而害夫仁則自其一身莫適為主而事物之閒顛倒錯繆葢無所不至矣此聖門之學所以汲汲於求仁而顔子之問夫子特以克己復禮告之葢欲其克去有已之私欲而復於天理之本然則夫本心之全德將不離乎此而無不盡也然人特患於不為耳誠能一旦用力於此則本心之全德在我而天理之至善無不由是而出天下雖大亦孰有不求其仁者乎然己者人欲之私也禮者天理之公也一心之中二者不容並立而其相去之閒不能以豪髪出乎此則入乎彼出乎彼則入乎此矣是其克與不克復與不復如手反復如臂屈仲誠欲為之其機固亦在我而已夫豈他人之所得與哉顔子之質幾於聖人故其問仁夫子告之獨為要切而詳盡耳曰然則顔子請問其目而夫子告以四勿之云何也曰顔子聞夫子克已復禮之言蓋已洞然黙識仁之為體矣然夫子所謂克已復禮者必有條目而後可以從事於其閒也故復問以審之而夫子以此告之也蓋禮為天理之節文而其用無所不在以身而言則視聽言動四者足以該之矣四者之閒由粗而精由小而大所當為者皆禮也所不當為者皆非禮也禮即天之理也非禮則已之私也於是四者謹而察之知其非禮而勿以止焉則是克己之私而復於禮矣且非禮而勿視聽者防其自外入而動於内者也非禮而勿言動者謹其自内出而接於外者也内外交進為仁之功不遺餘力矣顔子於是請事斯語而力行之所以三月不違而卒進於聖人之域也然熟味聖言以求顔子之所用力其機特在勿與不勿之閒而已自是而反則為天理自是而流則為人欲自是而克念則為聖自是而罔念則為狂特豪忽之閒耳學者可不謹其所擇哉顔子平生只是受用克己復禮四箇字顔子克己如紅爐上一㸃雪克己如誓不與賊俱生克伐怨欲不行如薄伐玁狁至于太原逐出境而已或曰克己是勝己之私之謂克否曰然或問克己之私有三氣稟物欲人我是也不知那箇是夫子所指者曰三者皆在裏然非禮而視聽言動則耳目口體之欲較多又問克者勝也不如以克訓治較穏先生曰治字緩只減得一二分也是治聖人所以下箇克字譬如相殺相似定要克勝了方住禮是自家本有底所以說箇復不是待克了已方去復禮克得那一分人欲去便復得這一分天理來克那二分己私去便復得二分禮來問克己復禮疑要克己後便已是仁不知其禮還又是一事工夫否曰已與禮對立克去已後必復於禮然後為仁若克去己私便無一事則克之後須落空去也如坐當如尸立如齋此禮也坐如箕踞立如跛倚此已私也克去己私則不容箕踞而跛倚然必如尸如齋方合禮問克齋記云克己者所以復禮非克己之外别有所謂復禮之功如何先生曰便是當初説得太快了明道先生謂克己則私心去自能復禮便是實了問一日克己復禮如何天下便歸仁曰若眞能一日克己復禮則天下有歸仁之理這處亦如在家無怨在邦無怨意思在家無怨一家歸其仁在邦無怨一邦歸其仁吿仲弓者止於邦家顔子則以其極者告之問所以謂之禮而不謂之理者莫是禮便有凖則有著實處否先生曰只說理恐虚了這箇禮是那天理節文教人有準則處又曰惟其使此禮字便有檢束之意若只説天理便泛了又曰所以頓著這禮字時便有規矩凖繩可見故非禮勿視説文似旗脚此旗一麾三軍盡退工夫只在勿上才見非禮來則以勿字禁止之才禁止便克去才克去便能復禮問非禮勿視聽言動看來都在視上先生曰所以不可行者却無復禮一段事既克己若不復禮如何得問聖人言仁處如克己復禮一句最是得仁之全體何嘗見有半體仁但克己復禮一句猶親切問集注謂天下皆與其仁後却載伊川語謂事事皆仁恰似兩般如何曰惟其事事皆仁所以天下歸仁問事事皆仁曰人能克己則日閒所行事皆無私意而合天理耳問謝氏說克己須從性偏難克處克將去此性是氣質之性否曰然然亦無難易凡氣質之徧處皆須從頭克去問程子謂制之於外以安其内却似與克伐怨欲不行底相似先生曰克己工夫其初如何便㑹自然也須禁制始得到養得熟後便私意漸漸消磨去今人須要簡易處做却不知若不自難處入如何到得易處問視聽之閒或明知其不當視而自接乎目明知其不當聽而自接乎耳奈何曰視與見不同聽與聞不同如非禮之色自過目自家不可有要視之之心非禮之聲自過耳自家不可有要聽之之心然這處是難古人於此亦有以禦之如云姦聲亂色不留聦明淫樂慝禮不接心術動箴云云曰思是動於内為是動於外葢思於内不可不誠為於外不可不守然專誠於思而不守於為不可專守於為而不誠於思亦不可思是動之微為是動之著克己復禮為仁是做得這工夫到這地位便是仁上蔡却説知仁識仁終有病問或問中論克己銘之非如何曰克已之克未是對人物言吕與叔遂謂已既不立物相並觀則雖天下之大莫不在吾仁之中説得來恁地大故人皆喜其快殊不知未是如此曰克己復禮與下文克己之目全不干涉此只似自修之事未道是外面在先生曰須是恁地思之且道視聽言動干人甚事問天下歸仁先生曰克己復禮則事事皆是天下之人聞之見之莫不皆與其為仁也又曰有幾處被前輩說得來大今收拾不得謂如君子所過者化本只言君子所居而人自化所存者神本只言所存主處便神妙横渠却云性性為能存神物物為能過化上蔡便道惟其所存者神是以所過者化此等言語人皆爛熟以為必須如此説才不如此説便不快意矣游定夫以克己復禮與佛理一般只存想此道理而已若只想像言克復則與下載非禮勿視四句有何干涉克齋記曰性情之德無所不備而一言足以盡其妙曰仁而已所以求仁者蓋亦多術而一言足以舉其要曰克己復禮而已盖仁也者天地生物之心而人之所得以為心者也惟其得夫天地生物之心以為心是以未發之前四德具焉曰仁義禮智而仁無不統已發之際四端著焉曰惻隱羞惡辭讓是非而惻隠之心無所不通此仁之體用所以涵育渾全周流貫徹專一心之妙而為衆善之長也然人有是身則耳目鼻口四肢之欲或不能無害夫仁而不仁者則其所以滅天理窮人欲者將無所不至此君子之學所以汲汲於求仁而求仁之要亦曰務其去所以害仁者而已葢非禮而視人欲之害仁也非禮而聽人欲之害仁也非禮而言且動焉人欲之害仁也知人欲之所以害仁者在是於是乎有以抜其本塞其原克之克之而又克之以至於一旦豁然欲盡而理純則其胷中之所存者豈不粹然天地生物之心而藹乎其若春陽之温哉黙而成之固無一理之不具而無一物之不該也感而通焉則無事不得於理而無物之不被其愛矣又曰克復之云雖若各為一事其實天理人欲相為消長故克己者乃所以復禮而非克己之外别有復禮之功也南軒曰克盡己私一由於禮斯為仁矣禮者天則之不可踰也其本在於篤敬而發於三千三百之目皆禮也克己復禮者此言克己之至也天下歸仁者無一物之不體無一事之不該也愚案集注以天下歸仁為天下之人皆與其仁學者葢多疑之若克齋記所云黙而成之固無一理之不具而無一物之不該感而通焉則無事之不得於理而無物之不被其愛為得體用之全克之又克之一句亦不若一旦豁然之云為得聖言之本指更詳之仲弓問仁子曰出門如見大賔使民如承大祭已所不欲勿施於人在邦無怨在家無怨仲弓曰雍雖不敏請事斯語矣敬以持己恕以及物則私意無所容而心德全矣内外無怨亦以其效言之使以自攷也程子曰孔子言仁只説出門如見大賔使民如承大祭看其氣象便須心廣體胖動容周旋中禮唯謹獨便是守之之法或問出門使民之時如此可也未出門使民之時如之何曰此儼若思時也有諸中而後見於外觀其出門使民之時其敬如此則前乎此者敬可知矣非因出門使民然後有此敬也愚案克已復禮乾道也主敬行恕坤道也顔冉之學其髙下淺深於此可見然學者誠能從事於敬恕之閒而有得焉亦將無已之可克矣集義曰大賔大祭只是敬也才不敬便私慾萬端害於仁游氏曰出門如見大賔則無時而不敬使民如承大祭則無事而不敬朱子敬恕齋銘曰出門如賔承事如祭以是存心其敢失墜己所不欲勿施於人以是行之與物為春胡世之人恣已窮物惟己所便謂彼奚卹孰能反是斂焉厥躬于羮于牆仲尼子弓内順于家外同于邦無小無大罔時怨恫為仁之功曰此其極敬哉恕哉永永無斁南軒曰出門云云葢平日之涵養一於敬故其出門使民之際皆是心也已所云云恕者為仁之方也凡人有欲不得則怨若夫平易公正欲不存焉則已無所怨於人和平之效人亦何所怨於己哉故曰云云案無怨之義二先生所指不同朱説前見南軒謂人已俱無所怨其味猶長此章兼言敬恕孔門論敬具前數條外其他所論如道千乘之國必曰敬事而信為禮不敬則與臨喪不哀並言之稱子産曰其行已也恭其事上也敬至若不言敬而實於敬者又不與焉故朱子曰敬乃聖門之綱領詎不信夫司馬牛問仁司馬牛孔子弟子名犂向魋之弟子曰仁者其言也訒訒音刃訒忍也難也仁者心存而不放故其言若有所忍而不易發蓋其德之一端也夫子以牛多言而躁故告之以此使其於此而謹之則所以為仁之方不外是矣曰其言也訒斯謂之仁矣乎子曰為之難言之得無訒乎牛意仁道至大不但如夫子之所言故夫子又告之以此盖心常存故事不苟事不苟故其言自有不得而易者非強閉之而不出也楊氏曰觀此及下章再問之語牛之易其言可知程子曰雖為司馬牛多言故及此然聖人之言亦止此為是愚謂牛之為人如此若不告之以其病之所切而泛以為仁之大槩語之則以彼之躁必不能深思以去其病而終無自以入德矣故其告之如此葢聖人之言雖有髙下大小之不同然其切於學者之身而皆為入德之要則又初不異也讀者其致思焉只看説話容易底人便是心放了不仁者不識痛痒得説便説如人夢寐中語謹言語不妄發即求仁之端仁者之言自然訒學仁者當謹言語以操持此心南軒曰人之易其言也以其未知用力也知用力則言敢易乎哉故仁者之言必訒司馬牛問君子子曰君子不憂不懼向魋作亂牛常憂懼故夫子告之以此曰不憂不懼斯謂之君子矣乎子曰内省不疚夫何憂何懼夫音扶牛之再問猶前章之意故復告之以此疚病也言由其平日所為無愧於心故能内省不疚而自無憂懼未可遽以為易而忽之也晁氏曰不憂不懼由乎德全而無疵故無入而不自得非實有憂懼而強揖遣之也南軒曰聖人之所謂不憂不懼者以其内自省察無所愧病故得其樂而物莫之攖也能進於是非君子乎曾子之守約蓋此也使司馬牛而知所從事則勉之於己不然徒膠擾於憂懼之域何益哉司馬牛憂曰人皆有兄弟我獨亡牛有兄弟而云然者憂其為亂而將死也子夏曰商聞之矣葢聞之夫子死生有命富貴在天命稟於有生之初非今所能移天莫之為而為非我所能必但當順受而已富貴在天非我所與如有為之主宰然南軒曰知死生之有命則當受其正而已知富貴之在天則當行吾義而已集義張子曰論死生則曰有命以言其氣也語富貴則曰在天以言其理也君子敬而無失與人恭而有禮四海之内皆兄弟也君子何患乎無兄弟也既安於命又當修其在已者故又言苟能持己以教而不閒斷接人以恭而有節文則天下之人皆愛敬之如兄弟矣盖子夏欲以寛牛之憂故為是不得已之辭讀者不以辭害意可也胡氏曰子夏四海皆兄弟之言特以廣司馬牛之意意圓而語滯者也惟聖人則無此病矣且子夏知此而以哭子喪明則以蔽於愛而昧於理是以不能踐其言爾程子曰敬是持己恭是接人與人恭而有禮言接人當如此也近世淺薄以相驩狎為相與以無圭角為相親愛如此者安能乆須是恭敬君臣朋友皆當以敬為主也案朱子曰敬者恭之主乎中者也恭者敬之發於外者也自學者言則恭不如敬之力自成德言則敬不若恭之安敬字硬恭字軟愚謂敬字有堅強意恭字有柔巽意因言恭敬二字如忠信或云敬主於中恭發於外先生曰凡言發於外比似主於中者較大盖必充積盛滿而後發於外然主於中者却是本不可不知也子張問明子曰浸潤之譖膚受之愬不行焉可謂明也已矣浸潤之譖膚受之愬不行焉可謂逺也已矣諧莊蔭反愬蘇路反浸潤如水之浸灌滋潤漸漬而不驟也譖毁人之行也膚受謂肌膚所受利害切身如易所謂剥牀以膚切近災者也愬愬已之寃也毁人者漸漬而不驟則聽者不覺其入而信之深矣愬寃者急迫而切身則聽者不及致詳而發之暴矣二者難察而能察之則可見其心之明而不蔽於近矣此亦必因子張之失而告之故其辭繁而不殺以致丁寜之意云楊氏曰驟而語之與利害不切於身者不行焉有不待明者能之也故浸潤之譛膚受之愬不行然後謂之明而又謂之逺逺則明之至也書曰視逺惟明子貢問政子曰足食足兵民信之矣言倉廩實而武備修然後教化行而民信於我不離叛也子貢曰必不得已而去於斯三者何先曰去兵去上聲下同言食足而信孚則無兵而守固矣子貢曰必不得已而去於斯二者何先曰去食自古皆有死民無信不立民無食必死然死者人之所必不免無信則雖生而無以自立不若死之為安故寧死而不失信於民使民亦寜死而不失信於我也程子曰孔門弟子善問直窮到底如此章者非子貢不能問非聖人不能荅也愚謂以人情而言則兵食足而後吾之信可以孚於民以民德而言則信本人之所固有非兵食所得而先也是以為政者當身率其民而以死守之不以危急而可棄也棘子成曰君子質而已矣何以文為棘子成衛大夫疾時人文勝故為此言子貢曰惜乎夫子之說君子也駟不及舌言子成之言乃君子之意然言出於舌則駟馬不能追之又惜其失言也文猶質也質猶文也虎豹之鞟猶犬羊之鞟鞟其郭反鞟皮去毛者也言文質等耳不可相無若必盡去其文而獨存其質則君子小人無以辨矣夫棘子成矯當時之弊固失之過而子貢矯子成之弊又無本末輕重之差胥失之矣或問棘子成之言與夫子荅林放之問何異而子貢非之若是邪曰夫子之言權衡審宻而辭氣和平盖未始以文為盡非也若子成則辭氣矯激而取舍過中矣其流之弊將至於棄禮蔑德如西晉君子之為者故子貢惜其言而力正之也曰何以言子貢之言有病也曰子成之説偏矣而子貢於文質之閒又一視之而無本末輕重緩急之差焉則子貢矯子成之失而遇中者也立言之難如此非聖人孰能無所偏倚而常適其平也哉哀公問於有若曰年饑用不足如之何稱有若者君臣之辭用謂國用公意盖欲加賦以足用也有若對曰盍徹乎徹通也均也周制一夫受田百畝而與同溝共井之人通力合作計畝均收大率民得其九公取其一故謂之徹魯自宣公稅畝又逐畝什取其一則為什而取二矣故有若請但專行徹法欲公節用以厚民也曰二吾猶不足如之何其徹也二即所謂什二也公以有若不諭其旨故言此以示加賦之意對曰百姓足君孰與不足百姓不足君孰與足民富則君不至獨貧民貧則君不能獨富有若深言君民一體之意以止公之厚斂為人上者所冝深念也楊氏曰仁政必自經界始經界正而後井地均榖禄平而軍國之須皆量是以為出焉故一徹而百度舉矣上下寧憂不足乎以二猶不足而教之疑若迂矣然什一天下之中正多則桀寡則貉不可改也後世不究其本而惟末之圖故征斂無藝費出無經而上下困矣又惡知盍徹之當務而不為迂乎子張問崇德辨惑子曰主忠信徙義崇德也主忠信則本立徙義則日新愛之欲其生惡之欲其死既欲其生又欲其死是惑也惡去聲愛惡人之常情也然人之生死有命非可得而欲也以愛惡而欲其生死則惑矣既欲其生又欲其死則惑之甚也誠不以富亦祇以異此詩小雅我行其野之辭也舊説夫子引之以明欲其生死者不能使之生死如此詩所言不足以致富而適足以取異也程子曰此錯簡當在第十六篇齊景公有馬千駟之上因此下文亦有齊景公字而誤也楊氏曰堂堂乎張也難與並為仁矣則非誠善補過不蔽於私者故告之如此或問崇德辨惑何以有是目而子張樊遲皆以為問曰胡氏以為或古有是言或當世有是名聖人標而出之使諸弟子隨其所欲知思其所未達以為入道之門戸也其説得之矣曰主忠信徙義之所以為崇徳何也曰主忠信則其徙義也有本而可據能徙義則其主忠信也有用而日新内外本末交相培養此德之所以日積而益髙也曰愛之欲其生惡之欲其死既欲其生又欲其死所以為惑者何也曰溺於愛惡之私而以彼之生死定分為可以隨己之所欲又不能自定而一生一死交戰於胷中虚用其力於所不能為之地而實無所損益於彼也可不謂之惑乎南軒曰崇德辨惑修身之切務也以忠信為主而見義則徙焉則本立而日新徳之所以崇也不主忠信則無徙義之實不能徙義則所主亦有時而失其理矣二者盖相須也愚案欲生欲死必有所為而言所以箴子張之失也齊景公問政於孔子齊景公名杵臼魯昭公末年孔子適齊孔子對曰君君臣臣父父子子此人道之大經政事之根本也是時景公失政而大夫陳氏厚施於國景公又多内嬖而不立太子其君臣父子之閒皆失其道故夫子告之以此公曰善哉信如君不君臣不臣父不父子不子雖有粟吾得而食諸景公善孔子之言而不能用其後果以繼嗣不定啓陳氏弑君篡國之禍楊氏曰君之所以君臣之所以臣父之所以父子之所以子是必有道矣景公知善夫子之言而不知反求其所以然葢悦而不繹者齊之所以卒於亂也子曰片言可以折獄者其由也與折之舌反與平聲片言半言折斷也子路忠信明決故言出而人信服之不待其辭之畢也子路無宿諾宿留也猶宿怨之宿急於踐言不留其諾也記者因夫子之言而記此以見子路之所以取信於人者由其養之有素也尹氏曰小邾射以句繹奔魯曰使季路要我吾無盟矣千乗之國不信其盟而信子路之一言其見信於人可知矣一言而折獄者信在言前人自信之故也不留諾所以全其信也子曰聽訟吾猶人也必也使無訟乎范氏曰聽訟者治其末塞其流也正其本清其源則無訟矣楊氏曰子路片言可以折獄而不知以禮遜為國則未能使民無訟者也故又記孔子之言以見聖人不以聽訟為難而以使民無訟為貴子張問政子曰居之無倦行之以忠居謂存諸心無倦則始終如一行謂發於事以忠則表裏如一程子曰子張少仁無誠心愛民則必倦而不盡心故告之以此子曰博學於文約之以禮亦可以弗畔矣夫重出子曰君子成人之美不成人之惡小人反是成者誘掖奬勸以成其事也君子小人所存既有厚薄之殊而其所好又有善恶之異故其用心不同如此南軒曰君子充其忠愛之心於人之美其樂之如在己也從而扶持之又從而勸相之惟欲其美之成也於人之惡則從而正救之正救之不可則哀矜之惟恐其惡之成也若小人則以刻薄為心幸人之有過而疾人之勝己非徒坐視其入於惡又從而擠之非徒欲其美之不成又從而毁之君子小人之操存未嘗不相反也季康子問政於孔子孔子對曰政者正也子帥以正孰敢不正范氏曰未有己不正而能正人者胡氏曰魯自中葉政由大夫家臣效尤據邑背畔不正甚矣故孔子以是告之欲康子以正自克而改三家之政惜乎康子之溺於利欲而不能也季康子患盜問於孔子孔子對曰苟子之不欲雖賞之不竊言子不貪欲則雖賞民使之為盗民亦知恥而不竊胡氏曰季氏竊柄康子奪嫡民之為盗固其所也盍亦反其本邪孔子以不欲啓之其旨深矣奪嫡事見春秋傳季康子問政於孔子曰如殺無道以就有道何如孔子對曰子為政焉用殺子欲善而民善矣君子之德風小人之德草草上之風必偃焉於䖍反為政者民所視傚何以殺為欲善則民善矣上一作尚加也偃仆也尹氏曰殺之為言豈為人上之語哉以身教者從以言教者訟而况於殺乎子張問士何如斯可謂之達矣達者徳孚於人而行無不得之謂子曰何哉爾所謂達者子張務外夫子葢已知其發問之意故反詰之將以發其病而藥之也子張對曰在邦必聞在家必聞言名譽著聞也子曰是聞也非達也聞與達相似而不同乃誠偽之所以分學者不可不審也故夫子既明辨之下文又詳言之夫達也者質直而好義察言而觀色慮以下人在邦必達在家必達夫音扶下同好下皆去聲内主忠信而所行合宜審於接物而卑以自牧皆自修於内不求人知之事然德修於己而人信之則所行自無窒礙矣夫聞也者色取仁而行違居之不疑在邦必聞在家必聞行去聲善其顔色以取於仁而行實背之又自以為是而無所忌憚此不務實而專務求名者故虚譽雖隆而實德則病矣程子曰學者須是務實不要近名有意近名大本已失更學何事為名而學則是偽也今之學者大抵為名為名與為利雖清濁不同然其利心則一也尹氏曰子張之學病在乎不務實故孔子告之皆篤實之事充乎内而發乎外者也聞只是求聞於人達却有實有實方能達色取仁而行違正是指子張病痛處問察言而觀色曰此是實要做工夫察人之言觀人之色乃是要驗吾之言是與不是今有人自任己意説將去更不看人之意是信受他是不信受他如此則只是自髙更不能謙下於人實去做工夫大抵人之為學須自低下做將去才自髙了便不濟事這一項都是詳細收斂工夫如色取仁居之不疑只是粗謾將去此章大意一箇是名一箇是實吕氏謂德孚於人者必達矯行求名者必聞此説却好質與直是兩件質是檏實直是無偏曲南軒曰聖人論達葢為已篤實工夫若有求聞之意則其心外馳矣色取仁者其色則有取於仁其行則違如内交要譽惡其聲之類一豪萌於中皆所謂行違也雖然使其有所不安於心則庶乎可使之反者惟其居之不疑則終為不仁而已矣又曰聞與達異聞謂人知之達謂道行於家邦也樊遲從遊於舞雩之下曰敢問崇德脩慝辨惑慝吐得反胡氏曰慝之字從心從匿葢惡之匿於心者脩者治而去之子曰善哉問善其切於為已先事後得非崇德與攻其惡無攻人之惡非脩慝與一朝之忿忘其身以及其親非惑與與平聲先事後得猶言先難後獲也為所當為而不計其功則德日積而不自知矣專於治已而不責人則已之惡無所匿矣知一朝之忿為甚㣲而禍及其親為甚大則有以辨惑而懲其忿矣樊遲麤鄙近利故告之以此三者皆所以救其失也范氏曰先事後得上義而下利也人惟有利欲之心故徳不崇惟不自省已過而知人之過故慝不脩感物而易動者莫如忿忘其身以及其親惑之甚者也惑之甚者必起於細微能辨之於早則不至於大惑矣故懲忿所以辨惑也南軒曰先其所事而不計其得此徳所以崇也若先有求得之心反傷於徳矣愚案范氏以利欲為得與先難後獲異而集注兼取之葢並存兩説也樊遲問仁子曰愛人問知子曰知人上知字去聲下同愛人仁之施知人知之務樊遲未達曾氏曰遲之意葢以愛欲其周而知有所擇故疑二者之相悖爾子曰舉直錯諸枉能使枉者直舉直錯枉者知也使枉者直則仁矣如此則二者不惟不相悖而反相為用矣樊遲退見子夏曰鄉也吾見於夫子而問知子曰舉直錯諸枉能使枉者直何謂也鄉去聲見賢遍反遲以夫子之言專為知者之事又未達所以能使枉者直之理子夏曰富哉言乎歎其所包者廣不止言知舜有天下選於衆舉臯陶不仁者逺矣湯有天下選於衆舉伊尹不仁者逺矣選息戀反陶音遥逺如字伊尹湯之相也不仁者逺言人皆化而為仁不見有不仁者若其逺去爾所謂使枉者直也子夏葢有以知夫子之兼仁知而言矣程子曰聖人之語因人而變化雖若有淺近者而其包含無所不盡觀於此章可見矣非若他人之言語近則遺逺語逺則不知近也尹氏曰學者之問也不獨欲聞其説又必欲知其方不獨欲知其方又必欲為其事如樊遲之問仁知也夫子告之盡矣樊遲未達故又問焉而猶未知其何以為之也及退而問諸子夏然後有以知之使其未喻則必將復問矣既問於師又辨諸友當時學者之務實也如是愛人知人自相為用若不論枉與直一例去愛他便不得大抵為先知了方能愛其所當愛只此兩句自包上下此所以為聖人之言愛人知人是仁智之用聖人何故但以仁知之用告樊遲却不告之以仁知之體盖尋這用便可以知其體葢用即是體中流出也問云云曰尋常説仁智一箇是慈愛一箇是辨别各自向一路惟是舉直錯諸枉能使枉者直方見得仁智合一處仁裏面有智智裏面有仁南軒曰原人之性其愛之理乃仁也知之理乃智他仁者視萬物猶一體而况人與我同類乎故仁者必愛人然則愛人果可以盡仁乎以愛人而可以盡仁則不可而其所以愛人者乃仁之所存也至於問知而諭以知人者亦猶是爾子貢問友子曰忠告而善道之不可則止無自辱焉告工毒反道去聲友所以輔仁故盡其心以告之善其説以道之然以義合者也故不可則止若以數而見䟽則自辱矣或問云云曰善道云者心平氣和理明意盡或從容深厚或親切簡當使聞者不期而樂於聽從之謂也曽子曰君子以文㑹友以友輔仁講學以會友則道益明取善以輔仁則德日進南軒曰朋友講習與夫懾以威儀莫非文也為仁固由己而亦資朋友輔成之輔之者左右翼助之意葢非惟切磋之益其從容浹洽相觀而善所輔多矣論語集編卷六
