body:
  text: 欽定四庫全書孟子集編卷七宋眞徳秀撰離婁章句上凡二十八章孟子曰離婁之明公輸子之巧不以規矩不能成方貟師曠之聦不以六律不能正五音堯舜之道不以仁政不能平治天下離婁古之明目者公輸子名班魯之巧人也規所以為貟之器也矩所以為方之噐也師曠晉之樂師知音者也六律截竹為筩隂陽各六以節五音之上下黄鍾太蔟姑洗蕤賔夷則無射為陽大吕夾鍾仲吕林鍾南吕應鍾為隂也五音宫商角徴羽也范氏曰此言治天下不可無法度仁政者治天下之法度也今有仁心仁聞而民不被其澤不可法於後世者不行先王之道也聞去聲仁心愛人之心也仁聞者有愛人之聲聞於人也先王之道仁政是也范氏曰齊宣王不忍一牛之死以羊易之可謂有仁心梁武帝終日一食蔬素宗廟以麫為犧牲斷死刑必為之涕泣天下知其慈仁可謂有仁聞然而宣王之時齊國不治武帝之末江南大亂其故何哉有仁心仁聞而不行先王之道故也故曰徒善不足以為政徒法不能以自行有其心無其政是為徒善有其政無其心是為徒法詩云不愆不忘率由舊章遵先王之法而過者未之有也聖人旣竭目力焉繼之以規矩準繩以為方貟平直不可勝用也旣竭耳力焉繼之以六律正五音不可勝用也旣竭心思焉繼之以不忍人之政而仁覆天下矣此言古之聖人旣竭耳目心思之力然猶以為未足以徧天下及後世故制為法度以繼續之則其用不窮而仁之所被者廣矣故曰為髙必因丘陵為下必因川澤為政不因先王之道可謂智乎丘陵本髙川澤本下為髙下者因之則用力少而成功多矣鄒氏曰自章首至此論以仁心仁聞行先王之道是以惟仁者冝在髙位不仁而在髙位是播其惡於衆也仁者有仁心仁聞而能擴而充之以行先王之道者也播惡於衆謂貽患於下也上無道揆也下無法守也朝不信道工不信度君子犯義小人犯刑國之所存者幸也朝音潮此言不仁而在髙位之禍也故曰城郭不完兵甲不多非國之災也田野不辟貨財不聚非國之害也上無禮下無學賊民興喪無日矣上不知禮則無以敎民下不知學則易與為亂鄒氏曰自是以惟仁者至此所以責其君詩曰天之方蹶無然泄泄蹶居衞反泄弋制反泄泄猶沓沓也沓沓即泄泄之意蓋孟子時人語如此事君無義進退無禮言則非先王之道者猶沓沓也故曰責難於君謂之恭陳善閉邪謂之敬吾君不能謂之賊范氏曰人臣以難事責於君使其君為堯舜之君者尊君之大也開陳善道以禁閉君之邪心唯恐其君或䧟於有過之地者敬君之至也謂其君不能行善道而不以告者賊害其君之甚也鄒氏曰自詩云天之方蹶至此所以責其臣鄒氏曰此章言為治者當有仁心仁聞以行先王之政而君臣又當各任其責也南軒曰責難於君者以先王事業望其君不敢以君為難也孟子曰規矩方貟之至也聖人人倫之至也規矩盡所以為方貟之理猶聖人盡所以為人之道欲為君盡君道欲為臣盡臣道二者皆法堯舜而已矣不以舜之所以事堯事君不敬其君者也不以堯之所以治民治民賊其民者也孔子曰道二仁與不仁而已矣法堯舜則盡君臣之道而仁矣不法堯舜則慢君賊民而不仁矣二端之外更無他道出乎此則入乎彼矣可不謹哉暴其民甚則身弑國亡不甚則身危國削名之曰幽厲雖孝子慈孫百世不能改也言不仁之禍必至於此可懼之甚也詩云殷鑒不逺在夏后之世此之謂也孟子曰三代之得天下也以仁其失天下也以不仁三代謂夏商周也禹湯文武以仁得之桀紂幽厲以不仁失之國之所以廢興存亡者亦然天子不仁不保四海諸侯不仁不保社稷卿大夫不仁不保宗廟士庶人不仁不保四體今惡死亡而樂不仁是猶惡醉而强酒惡去聲强上聲南軒曰仁者人之道人道旣廢則雖有四體其能保諸是不仁者乃趨死亡之道也云云雖然此特未能眞知不仁者之可以死亡耳使其眞知不仁者之可以死亡則如蹈水火之不敢為也孟子此章明白峻厲自天子以至庶人皆當佩服以自警也然所謂不仁者非他縱人欲以滅天理而已人欲縱而天理滅其禍至於如此可不畏哉衍義孟子曰愛人不親反其仁治人不治反其智禮人不荅反其敬治人之治平聲不治之治去聲我愛人而人不親我則反求諸已恐我之仁未至也智敬放此行有不得者皆反求諸已其身正而天下歸之不得謂不得其所欲如不親不治不荅是也反求諸已謂反其仁反其智反其敬也如此則其自治益詳而身無不正矣天下歸之極言其效也詩云永言配命自求多福解見前篇亦承上章而言孟子曰人有恒言皆曰天下國家天下之本在國國之本在家家之本在身恒胡登反恒常也雖常言之而未必知其言之有序也故推言之而又以家本乎身也此亦承上章而言之大學所謂自天子以至於庶人壹是皆以修身為本為是故也孟子謂天下國家乃世人常常稱道之言而不知國乃天下之本家乃國之本身又家之本其言蓋有序也本猶木之根本根固而後枝葉盛為治本末亦猶是也然大學言心而此不言心者蓋誠意正心皆修身之事言身則心在中矣衍義孟子曰為政不難不得罪於巨室巨室之所慕一國慕之一國之所慕天下慕之故沛然徳敎溢乎四海巨室世臣大家也得罪謂身不正而取怨怒也麥丘邑人祝齊桓公曰願主君無得罪於羣臣百姓意蓋如此慕向也心恱誠服之謂也沛然盛大流行之貎溢充滿也蓋巨室之心難以力服而國人素所取信今旣恱服則國人皆服而吾徳敎之所施可以無逺而不至矣此亦承上章而言蓋君子不患人心之不服而患吾身之不修吾身旣修則人心之難服者先服而無一人之不服矣林氏曰戰國之世諸侯失徳巨室擅權為患甚矣然或者不修其本而遽欲勝之則未必能勝而適以取禍故孟子推本而言惟務修徳以服其心彼旣恱服則吾之徳敎無所留礙可以及乎天下矣裴度所謂韓𢎞輿􅔂討賊承宗斂手削地非朝廷之力能制其死命特以處置得冝能服其心故爾正此類也孟子曰天下有道小徳役大徳小賢役大賢天下無道小役大弱役强斯二者天也順天者存逆天者亡有道之世人皆修徳而位必稱其徳之大小天下無道人不修徳則但以力相役而已天者理勢之當然也齊景公曰旣不能令又不受命是絶物也涕出而女於呉女去聲引此以言小役大弱役强之事也令出令以使人也受命聼命於人也物猶人也女以女與人也呉蠻夷之國也景公羞與為㛰而畏其强故涕泣而以女與之今也小國師大國而恥受命焉是獨弟子而恥受命於先師也言小國不修徳以自强其般樂怠敖皆若效大國之所為者而獨恥受其敎命不可得也如恥之莫若師文王師文王大國五年小國七年必為政於天下矣此因其愧恥之心而勉以修徳也文王之政布在方䇿舉而行之所謂師文王也五年七年以其所乘之勢不同為差蓋天下雖無道然修徳之至則道自我行而大國反為吾役矣程子曰五年七年聖人度其時則可矣然凡此類學者皆當思其作為如何乃冇益耳詩云商之孫子其麗不億上帝旣命侯于周服侯服于周天命靡常殷士膚敏祼將于京孔子曰仁不可為衆也夫國君好仁天下無敵孔子因讀此詩而言有仁者則雖有十萬之衆不能當之故國君好仁則必無敵於天下也今也欲無敵於天下而不以仁是猶執熱而不以濯也詩云誰能執熱逝不以濯此章言不能自強則聽天所命修徳行仁則天命在我此大雅文王之詩也以商之孫子而為周之諸侯以殷之美士而奔走周廟之祭天命何常之有哉成湯惟其仁也故天命歸於商紂惟其不仁故天命轉而歸周商之子孫其數以十萬計可謂衆矣而不能存商者以周之仁雖衆無所用也孟子舉此以明國君好仁則天下無能敵者歎當時之不然也前後三章而三取喻曰惡濕而居下也惡醉而强酒也執熱而不以濯也其警世主也深矣衍義孟子曰不仁者可與言哉安其危而利其菑樂其所以亡者不仁而可與言則何亡國敗家之有菑與災同樂音洛安其危利其災者不知其為危菑而反以為安利也所以亡者謂荒淫暴虐所以致亡之道也不仁之人私欲固蔽失其本心故其顚倒錯亂至於如此所以不可告以忠言而卒至於敗亡也自昔危亂之世未嘗無忠言祖伊嘗諫紂矣召穆公嘗諫厲王矣李斯嘗諫二世矣而三主之不聽者蓋其心旣不仁故顚倒迷謬以危為安以菑為利以取亡之道為可樂也夫人君孰不欲安存而惡危亡而其反易至此者私欲蔽障而失其本心故耳衍義有孺子歌曰滄浪之水清兮可以濯我纓滄浪之水濁兮可以濯我足浪音郎孔子曰小子聽之清斯濯纓濁斯濯足矣自取之也言水之清濁有以自取之也聖人聲入心通無非至理於此可見愚案聲入心通四字朱子嘗以解耳順之義矣今復用於此蓋聖人之心表裏澄徹故所聞之言雖淺而所悟之理甚精亦猶見至顯之象而識至微之理也夫人必自侮然後人侮之家必自毁而後人毁之國必自伐而後人伐之太甲曰天作孽猶可違自作孽不可活此之謂也孟子曰桀紂之失天下也失其民也失其民者失其心也得天下有道得其民斯得天下矣得其民有道得其心斯得民矣得其心有道所欲與之聚之所惡勿施爾也民之歸仁也猶水之就下獸之走壙也走音奏壙廣野也言民之所以歸乎此以其所欲之在乎此也故為淵敺魚者獺也為叢敺爵者鸇也為湯武敺民者桀與紂也為去聲敺與驅同今天下之君有好仁者則諸侯皆為之敺矣雖欲無王不可得已好為王皆去聲南軒曰孟子所謂諸侯皆為之敺者非利乎他人之為己敺也特言其理之當然者耳循夫天理而無利天下之心而天下歸之此三王之所以王也假是道而亦得天下者漢唐是也故秦為漢敺者也隋為唐敺者也此章之要在乎所欲與聚所惡勿施之二言大學曰民之所好好之民之所惡惡之此之謂民之父母父母於子心誠求之所欲者無不與所惡者無不去君之於民何獨不然當戰國時禽獸其民往往施之以所惡故孟子激切而言之夫仁者豈有心於天下歸己哉水就下獸走壙理之自然非有為而為之也南軒有言循天理而無利天下之心而天下歸之者三王之所以王也假是道亦以得天下者漢唐是也衍義今之欲王者猶七年之病求三年之艾也苟為不畜終身不得苟不志於仁終身憂辱以䧟於死亡詩云其何能淑載胥及溺此之謂也孟子曰自暴者不可與有言也自棄者不可與有為也言非禮義謂之自暴也吾身不能居仁由義謂之自棄也暴猶害也非猶毁也自害其身者不知禮義之為美而非毁之雖與之言必不見信也自棄其身者猶知仁義之為美但溺於怠惰自謂必不能行與之有為必不能勉也程子曰人苟以善自治則無不可移者雖昬愚之至皆可漸磨而進也惟自暴者拒之以不信自棄者絶之以不為雖聖人與居不能化而入也此所謂下愚之不移也仁人之安宅也義人之正路也仁宅已見前篇義者冝也乃天理之當行無人欲之邪曲故曰正路曠安宅而弗居舍正路而不由哀哉舍上聲曠空也由行也此章言道本固有而人自絶之是可哀也此聖賢之深戒學者所當猛省也仁者心之德心存於仁則安反是則危義者心之制身由於義則正反是則邪二者皆吾所自有而甘心於自棄焉是虚至安之宅而託曠蕩之野背至正之路而趨荆棘之塗此聖賢之所深哀也衍義孟子曰道在爾而求諸逺事在易而求諸難人人親其親長其長而天下平爾邇古字通用易去聲長上聲親長在人為甚邇親之長之在人為甚易而道初不外是也舍此而他求則逺且難而反失之但人人各親其親各長其長而天下自平矣戰國之時學道者不求之近而求之逺不知堯舜之道不離於徐行後長之際而仁義之實止在乎尊親敬長之間圗事者不求之易而求之難不知闢土地朝秦楚有甚於縁木求魚而老吾老幼吾幼則天下可運之掌故孟子切切以告時君欲其反求之吾身而不責效於天下蓋人君能親其親而人亦莫不親其親能長其長則人亦莫不長其長舉天下之人而各親其親各長其長則和順輯睦之風行而乖爭陵犯之俗息天下其有不平者乎見衍義孟子曰居下位而不獲於上民不可得而治也獲於上有道不信於友弗獲於上矣信於友有道事親弗恱弗信於友矣恱親有道反身不誠不恱於親矣誠身有道不明乎善不誠其身矣獲於上得其上之信任也誠實也反身不誠反求諸身而其所以為善之心有不實也不明乎善不能即事以窮理無以眞知善之所在也游氏曰欲誠其意先致其知不明乎善不誠其身矣學至於誠身則安徃而不致其極哉以内則順乎親以外則信乎友以上則可以得君以下則可以得民矣是故誠者天之道也思誠者人之道也誠者理之在我者皆實而無偽天道之本然也思誠者欲此理之在我者皆實而無偽人道之當然也至誠而不動者未之有也不誠未有能動者也至極也楊氏曰動便是驗處若獲乎上信乎友恱於親之類是也此章述中庸孔子之言見思誠為修身之本而明善又為思誠之本乃子思所聞於曽子而孟子所受乎子思者亦與大學相表裏學者冝濳心焉南軒曰誠者天之道言其實然之理天之所為也聖人則全此體身誠而善無不明也思誠者人之道則是以人之所為求合於天焉學者明善誠身之功是也孟子曰伯夷辟紂居北海之濵聞文王作興曰盍歸乎來吾聞西伯善養老者太公辟紂居東海之濵聞文王作興曰盍歸乎來吾聞西伯善養老者辟去聲作興皆起也盍何不也西伯即文王也紂命為西方諸侯之長得專征伐故稱西伯太公姜姓吕氏名尚文王發政必先鰥寡孤獨庶人之老皆無凍綏故伯夷太公來就其養非求仕也二老者天下之大老也而歸之是天下之父歸之也天下之父歸之其子焉往焉於虔反二老伯夷太公也大老言非常人之老者天下之父言齒徳皆尊如衆父然旣得其心則天下之心不能外矣蕭何所謂養民致賢以圗天下者暗與此合但其意則有公私之辨學者又不可以不察也諸侯有行文王之政者七年之内必為政於天下矣七年以小國而言也大國五年在其中矣孟子曰求也為季氏宰無能改於其徳而賦粟倍他日孔子曰求非我徒也小子鳴鼓而攻之可也求孔子弟子冉求季氏魯卿宰家臣賦猶取也取民之粟倍於他日也小子弟子也鳴鼔而攻之聲其罪而責之也由此觀之君不行仁政而富之皆棄於孔子者也況於為之强戰爭地以戰殺人盈野爭城以戰殺人盈城此所謂率土地而食人肉罪不容於死為去聲林氏曰富其君者奪民之財耳而夫子猶惡之況為土地之故而殺人使其肝腦塗地則是率土地而食人之肉其罪之大雖至於死猶不足以容之也故善戰者服上刑連諸侯者次之辟草萊任土地者次之辟與闢同善戰如孫臏呉起之徒連結諸侯如蘇秦張儀之類辟開墾也任土地謂分土授民使任耕稼之責如李悝盡地力商鞅開阡陌之類也孟子曰存乎人者莫良於眸子眸子不能掩其惡胷中正則眸子瞭焉胷中不正則眸子眊焉眸音牟瞭音了眊音耄良善也眸子目瞳子也瞭明也眊者蒙蒙目不明之貎蓋人與物接之時其神在目故胷中正則神精而明不正則神散而昬聽其言也觀其眸子人焉廋哉焉於虔反廋音搜廋匿也言亦心之所發故併此以觀則人之邪正不可匿矣然言猶可以偽為眸子則有不容偽者目者精神之所發而言者心術之所形故審其言之邪正驗其目之明昧而其人之賢否不可掩焉此觀人之一法也衍義孟子曰恭者不侮人儉者不奪人侮奪人之君惟恐不順焉惡得為恭儉恭儉豈可以聲音笑貎為哉惡平聲惟恐不順言恐人之不順已聲音笑貎偽為於外也淳于髠曰男女授受不親禮與孟子曰禮也曰嫂溺則援之以手乎曰嫂溺不援是豺狼也男女授受不親禮也嫂溺援之以手者權也與平聲援音爰淳于姓髠名齊之辯士授與也受取也古禮男女不親授受以逺别也援救之也權稱錘也稱物輕重而往來以取中者也權而得中是乃禮也曰今天下溺矣夫子之不援何也言今天下大亂民遭䧟溺亦當從權以援之不可守先王之正道也曰天下溺援之以道嫂溺援之以手子欲手援天下乎言天下溺惟道可以救之非若嫂溺可手援也今子欲援天下乃欲使我枉道求合則先失其所以援之之具矣是欲使我以手援天下乎此章言直已守道所以濟時枉道徇人徒為失已公孫丑曰君子之不敎子何也不親敎也孟子曰勢不行也敎者必以正以正不行繼之以怒繼之以怒則反夷矣夫子敎我以正夫子未出於正也則是父子相夷也父子相夷則惡矣夷傷也敎子者本為愛其子也繼之以怒則反傷其子矣父旣傷其子子之心又責其父曰夫子敎我以正道而夫子之身未必自行正道則是子又傷其父也古者易子而敎之易子而敎所以全父子之恩而亦不失其為敎父子之間不責善責善則離離則不祥莫大焉責善朋友之道也王氏曰父有爭子何也所謂爭者非責善也當不義則爭之而已矣父之於子者如何曰當不義則亦戒之而已矣孟子曰事孰為大事親為大守孰為大守身為大不失其身而能事其親者吾聞之矣失其身而能事其親者吾未之聞也守身持守其身使不陷於不義也一失其身則虧體辱親雖日用三牲之養猶不足以為孝矣孰不為事事親事之本也孰不為守守身守之本也事親孝則忠可移於君順可移於長身正則家齊國治而天下平曽子養曽晳必有酒肉將徹必請所與問有餘必曰有曽晳死曽元養曽子必有酒肉將徹不請所與問有餘曰亡矣將以復進也此所謂養口體者也若曽子則可謂養志也養去聲復扶又反此承上文事親言之曽晳名㸃曽子父也曽元曽子子也曽子養其父每食必有酒肉食畢將徹去必請於父曰此餘者與誰或父問此物尚有餘否必曰有恐親意更欲與人也曽元不請所與雖有言無其意將以復進於親不欲其與人也此但能養父母之口體而已曽子則能承順父母之志而不忍傷之也事親若曽子者可也言當如曽子之養志不可如曽元但養口體程子曰子之身所能為者皆所當為無過分之事也故事親若曽子可謂至矣而孟子止曰可也豈以曽子之孝為有餘哉孟子曰人不足與適也政不足閒也惟大人為能格君心之非君仁莫不仁君義莫不義君正莫不正一正君而國定矣適音謫閒去聲趙氏曰適過也閒非也格正也徐氏曰格者物之所取正也書曰格其非心愚謂閒字上亦當有與字言人君用人之非不足過謫行事之失不足非閒惟有大人之徳則能格其君心之不正以歸於正而國無不治矣大人者大徳之人正己而物正者也程子曰天下之治亂繫乎人君之仁與不仁耳心之非即害於政不待乎發之於外也昔者孟子三見齊王而不言事門人疑之孟子曰我先攻其邪心心旣正而後天下之事可從而理也夫政事之失用人之非知者能更之直者能諫之然非心存焉則事事而更之後復有其事將不勝其更矣人人而去之後復用其人將不勝其去矣是以輔相之職必在乎格君心之非然後無所不正而欲格君心之非者非有大人之徳則亦莫之能也南軒曰格之為言感通至到也書曰格于上帝蓋君心之非不可以氣力勝必也感通至到而使之自消磨焉所謂格也蓋積其誠意一動静一語黙無非格之之道也心非未格則雖責其人材更其政事幸見其聽而肯改易他日之所欲所行亦未必是也何者其源不正不可勝救也心非既格則人材政事皆將源源而日新矣然其格君心之業非大人則不能若在己之非猶有未之能克者而將何以盡夫感通之道哉後世道學不明論治者不過及於人材政事而已孰知其本在於君心而格君之本乃在於吾心乎孟子曰有不虞之譽有求全之毁虞度也吕氏曰行不足以致譽而偶得譽是謂不虞之譽求免於毁而反致毁是謂求全之毁言毁譽之言未必皆實修已者不可以是遽為憂喜觀人者不可以是輕為進退孟子曰人之易其言也無責耳矣易去聲人之所以輕易其言者以其未遭失言之責故耳蓋常人之情無所懲於前則無所警於後非以為君子之學必俟有責而後不敢易其言也然此亦豈有為而言之與孟子曰人之患在好為人師好去聲王勉曰學問有餘人資於已不得已而應之可也若好為人師則自足而不復有進矣此人之大患也南軒曰學莫病於自足古之所謂師者學明行修人從而師之而非有欲人師已之心也人師乎已從而以已之善善之其答問論辯之際亦有互相發者故斆學相長也若冇好為人師之意則是乃矜已自大之私萌乎中欲以益於人而不知其先損於己此其所以可懼也樂正子從於子敖之齊子敖王驩字樂正子見孟子孟子曰子亦來見我乎曰先生何為出此言也曰子來幾日矣曰昔者曰昔者則我出此言也不亦冝乎曰舍館未定曰子聞之也舍館定然後求見長者乎長上聲昔者前日也館客舍也王驩孟子所不與言者則其人可知矣樂正子乃從之行其失身之罪大矣又不蚤見長者則其罪又有甚者焉故孟子姑以此責之曰克有罪陳氏曰樂正子固不能無罪矣然其勇於受責如此非好善而篤信之其能若是乎世有强辯飾非聞諫愈甚者又樂正子之罪人也孟子謂樂正子曰子之從於子敖來徒餔啜也我不意子學古之道而以餔啜也餔博孤反啜昌恱反徒但也餔食也啜飲也言其不擇所從但求食耳此乃正其罪而切責之孟子曰不孝有三無後為大趙氏曰於禮有不孝者三事謂阿意曲從䧟親不義一也家貧親老不為禄仕二也不娶無子絶先祖祀三也三者之中無後為大舜不告而娶為無後也君子以為猶告也為無之為去聲舜告焉則不得娶而終於無後矣告者禮也不告者權也猶告言與告同也蓋權而得中則不離於正矣范氏曰天下之道有正有權正者萬世之常權者一時之用常道人皆可守權非體道者不能用也蓋權出於不得已者也若父非瞽瞍子非大舜而欲不告而娶則天下之罪人也孟子曰仁之實事親是也義之實從兄是也仁主於愛而愛莫切於事親義主於敬而敬莫先於從兄故仁義之道其用至廣而其實不越於事親從兄之間蓋良心之發最為切近而精實者有子以孝弟為為仁之本其意亦猶此也智之實知斯二者弗去是也禮之實節文斯二者是也樂之實樂斯二者樂則生矣生則惡可已也惡可已則不知足之蹈之手之舞之樂斯樂則之樂音洛惡平聲斯二者指事親從兄而言知而弗去則見之明而守之固矣節文謂品節文章樂則生矣謂和順從容無所勉强事親從兄之意油然自生如草木之有生意也旣有生意則其暢茂條達自有不可遏者所謂惡可已也其又盛則至於手舞足蹈而不自知矣此章言事親從兄良心眞切天下之道皆原於此然必知之明而守之固然後節之密而樂之深也南軒曰仁義具於人之性而其實見於事親從兄之間蓋仁故能愛愛莫大於愛親義者冝也冝之所施莫冝於從兄也擴而充之仁義蓋不可勝用而實事親從兄之心也故知者知此而弗去者也禮者節文此者也樂者樂此者也豈有外此者哉知必云弗去者蓋曰知之而有時乎去之非眞知者也知之至則弗肯去之矣有其禮斯有其節有其實斯有其文凡三千三百皆所以節文乎此者也冇以節文則内外進矣至於樂則非自得之深涵養之熟者無此味也樂則生矣生者心之道蓋其中心油然有不自知其然也生則惡可已言其自不可已則手之所舞足之所蹈莫非是矣至此則仁義之心粹然於内而周流乎事事物物之間矣此孟子指言仁義知禮樂之實使人知所以用力之地也仁義之道大矣而其切實處止在於事親從兄蓋二者人之良知良能天性之眞於焉發見欲為仁義者惟致力乎此而已否則悠悠焉泛泛然非可據之實地矣眞知斯二者守之而不去則智之實節文斯二者適隆殺之冝則禮之實於斯二者行之而樂有從容安適之意無勉强矯拂之為則樂之實蓋天下之善未有出於事親從兄之外者苟至於樂則方寸之間油然自有生意敷暢條達自不可已足之所蹈手之所舞亦將有不知其然而然者矣非深玩而實體之其能知此味乎衍義孟子曰天下大恱而將歸已視天下恱而歸已猶草芥也惟舜為然不得乎親不可以為人不順乎親不可以為子言舜視天下之歸已如草芥而惟欲得其親而順之也得者曲為承順以得其心之恱而已順則有以諭之於道心與之一而未始有違尤人所難也為人蓋泛言之為子則愈密矣舜盡事親之道而瞽瞍厎豫瞽瞍厎豫而天下化瞽瞍厎豫而天下之為父子者定此之謂大孝厎之爾反瞽瞍舜父名厎致也豫恱樂也瞽瞍至頑嘗欲殺舜至是而厎豫焉書所謂不格姦亦允若是也蓋舜至此而有以順乎親矣是以天下之為子者知天下無不可事之親顧吾所以事之者未若舜耳於是莫不勉而為孝至於其親亦厎豫焉則天下之為父者亦莫不慈所謂化也子孝父慈各止其所而無不安其位之意所謂定也為法於天下可傳於後世非止一身一家之孝而已此所以為大孝也李氏曰舜之所以能使瞽瞍厎豫者盡事親之道共為子職不見父母之非而已舜之所值者至難事之親也然積誠感動猶能使之厎豫況其不如瞽瞍者乎故瞽瞍厎豫而天下之為人子者皆知無不可事之親而各勉於為孝此所謂天下化也昔羅豫章論此曰只為天下無不是底父母陳了翁聞而善之曰惟如此而後天下之為父子者定彼臣弑君子弑父者常始於見其有不是處耳嗚呼罪已而不非其親者仁人孝子之心也怨親而不反諸已者亂臣賊子之志也後之事難事之親者其必以舜為法衍義孟子集編卷七
