body:
  text: 欽定四庫全書孟子集編卷四宋真德秀撰公孫丑章句下凡十四章自第二章以下記孟子出處行實為詳孟子曰天時不如地利地利不如人和天時謂時日支干孤虛王相之屬也地利險阻城池之固也人和得民心之安也三里之城七里之郭環而攻之而不勝夫環而攻之必有得天時者矣然而不勝者是天時不如地利也三里七里城郭之小者郭外城環圍也言四面攻圍曠曰持久必有值天時之善者城非不髙也池非不深也兵革非不堅利也米粟非不多也委而去之是地利不如人和也革甲也粟穀也委棄也言不得民心民不為守也故曰域民不以封疆之界固國不以山溪之險威天下不以兵革之利得道者多助失道者寡助寡助之至親戚畔之多助之至天下順之域界限也以天下之所順攻親戚之所畔故君子有不戰戰必勝矣言不戰則已戰則必勝尹氏言曰得天下者凡以得民心而已孟子將朝王王使人來曰寡人如就見者也有寒疾不可以風朝將視朝不識可使寡人得見乎對曰不幸而有疾不能造朝章內朝並音潮唯朝將之朝如字造七到反下同王齊王也孟子本將朝王王不知而託病以召孟子故孟子亦以疾辭也明日出弔於東郭氏公孫丑曰昔者辭以病今日弔或者不可乎曰昔者疾今日愈如之何不弔東郭氏齊大夫家也昔者昨日也或者疑辭辭疾而出弔與孔子不見孺悲取瑟而歌同意王使人問疾醫來孟仲子對曰昔者有王命有采薪之憂不能造朝今病小愈趨造於朝我不識能至否乎使數人要於路曰請必無歸而造於朝要平聲孟仲子趙氏以為孟子之從昆弟學於孟子者也采薪之憂言病不能采薪謙辭也仲子權辭以對又使人要孟子令勿歸而造朝以實己言不得已而之景丑氏宿焉景子曰內則父子外則君臣人之大倫也父子主恩君臣主敬丑見王之敬子也未見所以敬王也曰惡是何言也齊人無以仁義與王言者豈以仁義為不美也其心曰是何足與言仁義也云爾則不敬莫大乎是我非堯舜之道不敢以陳於王前故齊人莫如我敬王也惡平聲下同景丑氏齊大夫家也景子景丑也惡歎辭也景丑所言敬之小者也孟子所言敬之大者也孟子是時在賓師之位故其君有就見之禮宣王託疾而要其朝敬賢之心不篤故孟子亦託疾而不往也景子但知聞命奔走為敬其君不知以堯舜之道告其君者乃敬之大者也僕隸之臣唯唯承命外若敬其君然心實薄之曰是何足與言仁義此不敬之大者也齊人之敬君以貌孟子之敬君以心故曰齊人莫如我敬王也衍義景子曰否非此之謂也禮曰父召無諾君命召不俟駕固將朝也聞王命而遂不果冝與夫禮若不相似然禮曰父命呼唯而不諾又曰君命召在官不俟屨在外不俟車言孟子本欲朝王而聞命中止似與此禮之意不同也曰豈謂是與曽子曰晉楚之富不可及也彼以其富我以吾仁彼以其爵我以吾義吾何慊乎哉夫豈不義而曽子言之是或一道也天下有達尊三爵一齒一德一朝廷莫如爵鄉黨莫如齒輔世長民莫如德惡得有其一以慢其二哉與平聲慊口簟反長上聲慊恨也少也或作嗛字書以為口銜物也然則慊亦但為心有所銜之義其為快為足為恨為少則因其事而所銜有不同耳孟子言我之意非如景子之所言者因引曽子之言而云夫此豈是不義而曽子肯以為言是或别有一種道理也達通也蓋通天下之所尊有此三者曽子之説蓋以德言之也今齊王但有爵耳安得以此慢于齒德乎故將大有為之君必有所不召之臣欲有謀焉則就之其尊德樂道不如是不足與有為也樂音洛大有為之君大有作為非常之君也程子曰古之人所以必待人君致敬盡禮而後往者非欲自為尊大也為是故耳故湯之於伊尹學焉而後臣之故不勞而王桓公之於管仲學焉而後臣之故不勞而霸先從受學師之也後以為臣任之也今天下地醜德齊莫能相尚無他好臣其所教而不好臣其所受教醜類也尚過也所教謂聽從于己可役使者也所受教謂己之所從學者也湯之於伊尹桓公之於管仲則不敢召管仲且猶不可召而況不為管仲者乎不為管仲孟子自謂也范氏曰孟子之于齊處賔師之位非當仕有官職者故其言如此此章見賔師不以趨走承順為恭而以責難陳善為敬人君不以崇髙富貴為重而以貴德尊士為賢則上下交而德業成矣陳臻問曰前日於齊王餽兼金一百而不受於宋餽七十鎰而受於薛餽五十鎰而受前日之不受是則今日之受非也今日之受是則前日之不受非也夫子必居一於此矣陳臻孟子弟子兼金好金也其價兼倍于常者一百百鎰也孟子曰皆是也當在宋也豫將有逺行行者必以贐辭曰餽贐豫何為不受贐送行者之禮也當在薛也豫有戒心辭曰聞戒故為兵餽之豫何為不受為兵之為去聲時人有欲害孟子者孟子設兵以戒備之薛君以金餽孟子為兵備辭曰聞子之有戒心也若於齊則未有處也無處而餽之是貨之也焉有君子而可以貨取乎焉於虔反無逺行戒心之事是未有所處也取猶致也尹氏曰言君子之辭受取豫唯當于理而已南軒曰凡人所以遲回于辭受之際者以為外物所動故也蓋於其所不當受而受其動于物固也若于所當受而不受是亦為物所動而已矣何則以其蔽于理而見物之大也若夫聖賢從容不迫惟義之安而外物何有乎故以舜受堯之天下而不為泰亦曰義當然耳若于義也無居則簞食豆羮不可取也簞食豆羮之與天下其大小固有間矣物則有大小而義之所在則一也孟子之平陸謂其大夫曰子之持戟之士一日而三失伍則去之否乎曰不待三平陸齊下邑也大夫邑宰也戟有枝兵也士戰士也伍行列也去之殺之也然則子之失伍也亦多矣凶年飢歲子之民老羸轉於溝壑壯者散而之四方者幾千人矣曰此非距心之所得為也子之失伍言其失職猶士之失伍也距心大夫名對言此乃王之失政使然非我所得専為也曰今有受人之牛羊而為之牧之者則必為之求牧與芻矣求牧與芻而不得則反諸其人乎抑亦立而視其死與曰此則距心之罪也為去聲死與之與平聲牧之養之也牧牧地也芻草也孟子言若不得自専何不致其事而去他日見於王曰王之為都者臣知五人焉知其罪者惟孔距心為王誦之王曰此則寡人之罪也為都治邑也邑有先君之廟曰都孔大夫姓也為王誦其語欲以諷曉王也陳氏曰孟子一言而齊之君臣舉知其罪固足以興邦矣然而齊卒不得為善國者豈非説而不繹從而不改故耶孟子謂蚳蛙曰子之辭靈丘而請士師似也為其可以言也今既數月矣未可以言與蚳音遲蛙鳥花反為去聲蚳蛙齊大夫也靈丘齊下邑似也言所為近似有理可以言謂士師近王得以諫刑罰之不中者蚳蛙諫於王而不用致為臣而去致猶還也齊人曰所以為蚳蛙則善矣所以自為則吾不知也譏孟子道不行而不能去也公都子以告公都子孟子弟子也曰吾聞之也有官守者不得其職則去有言責者不得其言則去我無官守我無言責也則吾進退豈不綽綽然有餘裕哉官守以官為守者言責以言為責者綽綽寬貌裕寬意也孟子居賔師之位未嘗受祿故其進退之際寬裕如此尹氏曰進退久速當于理而已南軒曰所居之時雖同而所處之地有異則其進退語默各有攸當不可得而齊也蚳蛙之在靈丘其職未可以言也而請士師庶幾乎欲有補于君也士師掌國之刑罰而立于朝王有失德朝有闕政士師所當言也故孟子以數月為淹久而欲其言蚳蛙于是諫于王言不用而去之庶幾得為臣之義矣齊人以為孟子所以為蚳蛙者固善而孟子久于齊曷不諫乎若諌而不聽曷不遂去之乎蓋齊人未知義之所在也夫有官守者其守在官不得其職則當去有言責者其責在言不得其言可不去乎若孟子則異乎此矣居賔師之位無官守言責之拘故得以從容不迫陳善閉邪以俟其改故曰則吾進退豈不綽綽然有餘裕哉言可以徐處乎進退之冝也然卒致為臣而歸何也蓋其誠意備至啓告曲盡而王終莫之悟也則有不得已焉者而三宿出晝猶望之改之亦可謂從容矣蓋進退久速無非義之所存也孟子為卿於齊出弔於滕王使蓋大夫王歡為輔行王歡朝暮見反齊滕之路未嘗與之言行事也蓋古盍反見音現蓋齊下邑也王歡王嬖臣也輔行副使也反往而還也行事使事也公孫丑曰齊卿之位不為小矣齊滕之路不為近矣反之而未嘗與言行事何也曰夫既或治之豫何言哉夫音扶王歡蓋攝卿以行故曰齊卿夫既或治之言有司已治之矣孟子之待小人不惡而嚴如此孟子自齊葬於魯反於齊止於嬴充虞請曰前日不知虞之不肖使虞敦匠事嚴虞不敢請今願竊有請也木若以美然孟子仕于齊喪母歸葬于魯嬴齊南邑充虞孟子弟子曰古者棺椁無度中古棺七寸椁稱之自天子達於庶人非直為觀美也然後盡於人心度厚薄尺寸也中古周公制禮時也椁稱之與棺相稱也欲其堅厚久逺非特為人觀視之美而已不得不可以為恱無財不可以為恱得之為有財古之人皆用之吾何為獨不然且比化者無使土侵膚於人心獨無恔乎比必二反恔音效比猶為也化者死者也恔快也言為死者不使土近其肌膚于人子之心豈不快然無所恨乎吾聞之也君子不以天下儉其親送終之禮所當得為而不自盡是為天下愛惜此物而薄于吾親也又魯平公將見孟子嬖人臧倉曰禮義由賢者出孟子之後喪踰前喪君無見焉公曰諾樂正子入見曰君奚為不見孟軻也曰或告寡人曰孟子之後喪踰前喪是以不往見也曰何哉君所謂踰者前以士後以大夫前以三鼎而後以五鼎與曰否謂其棺椁衣衾之美也曰非所謂踰也貧富不同也今案子思必誠必信以下數章及孟子此章之所指則聖賢之于其親心無不盡而其禮則以貧富有無為則學者觀此知所取法矣案司馬氏論葬曰孝經云卜其宅兆而安厝之謂卜地決其吉凶耳非若今隂陽家相其山岡風水也國子髙曰葬者藏也死則擇不食之地而葬我焉明無地不可葬也古者天子七月諸侯五月大夫三月士踰月而葬蓋舉其中制而言之案春秋己丑葬敬嬴雨不克葬庚寅日中而克葬丁巳葬定公雨不克葬壬午日下吳乃葬何嘗擇年月日時也葬于北方北首何嘗擇地也今世俗信葬師之説以為子孫貧富貴賤賢愚夀夭盡係于此議論紛紜不決至有終身不葬纍世不葬者使殯葬實能致人禍福為子孫者豈忍暴露其親而自求利耶悖禮傷義無過于此然孝子之心慮患深逺恐淺則為人所掘深則濕潤速朽故必擇土厚水深之地而葬之所擇必數處者以備卜之不吉故也或曰世人久未葬者非盡以隂陽拘忌之故亦以貧故也豫曰孔子有云斂手足形還葬而無椁稱其財之謂禮及子遊問喪具孔子云云昔廉范千里負喪郭平原自賣營墓豈獨豐富然後葬哉在禮未葬不變服食粥居倚廬寢苫枕塊蓋閔親之未有所歸故寢食不安奈何舍之出仕食稻衣錦不知其何以為心哉而程子則曰卜其宅兆卜其地之美惡也地美則神靈安其子孫盛然則曷謂地之美者其土色之光潤草木之茂盛乃其驗也而拘忌者或以擇地之方位決日之吉凶甚者不以奉先為計而専以利後為慮尤非孝子安厝之用心也惟五患者不可不謹須使異日不為道路不為城郭不為溝池不為貴勢所奪不為耕犂所及本謂五患者溝渠道路僻村路逺井窑合二先生之言觀之以安親為心則地不可以不擇其擇也不可以太拘擇焉而不至于太拘則葬不患其不時矣然世人多遷延不葬者以昆若弟各懷自利之心而野師俗巫又從而誑惑之甚至遍納其賂而紿之以私己愚而無知者安受其欺而弗悟也夫某山強則某支富某山弱則某支貧非惟義理所不當問雖近世隂陽家書亦有深排其説者惟野師俗巫則張皇煽惑以為取利之資擇地者必破此謬説而後無太拘之患為人子者所當深察也南史何子平以兵飢未葬其母者八年晝夜號泣常如袒括之日書在小學書當考沈同以其私問曰燕可伐與孟子曰可子噲不得與人燕子之不得受燕於子噲有仕於此而子恱之不告於王而私與之吾子之祿爵夫士也亦無王命而私受之於子則可乎何以異於是伐與之與平聲下伐與殺與同夫音扶沈同齊臣以私問非王命也子噲子之事見前篇諸侯土地人民受之天子傳之先君私以與人則與者受者皆有罪也仕為官也士即從仕之人也齊人伐燕或問曰勸齊伐燕有諸曰未也沈同問燕可伐與吾應之曰可彼然而伐之也彼如曰孰可以伐之則將應之曰為天吏則可以伐之今有殺人者或問之曰人可殺與則將應之曰可彼如曰孰可以殺之則將應之曰為士師則可以殺之今以燕伐燕何為勸之哉天吏解見上篇言齊無道與燕無異如以燕伐燕也史記亦謂孟子勸齊伐燕蓋傳聞此説之誤楊氏曰燕固可伐矣故孟子曰可使齊王能誅其君弔其民何不可之有乃殺其父兄虜其子弟而後燕人畔之乃以是歸咎孟子之言則誤矣燕人畔王曰吾甚慙於孟子齊破燕後二年燕人共立太子平為王陳賈曰王無患焉王自以為與周公孰仁且智王曰惡是何言也曰周公使管叔監殷管叔以殷畔知而使之是不仁也不知而使之是不智也仁智周公未之盡也而況於王乎賈請見而解之陳賈齊大夫也管叔名鮮武王弟周公兄也武王勝商殺紂立紂子武庚而使管叔與弟蔡叔霍叔監其國武王崩成王立周公攝政管叔與武庚畔周公討而誅之見孟子問曰周公何人也曰古聖人也曰使管叔監殷管叔以殷畔也有諸曰然曰周公知其將畔而使之與曰不知也然則聖人且有過與曰周公弟也管叔兄也周公之過不亦冝乎言周公乃管叔之弟管叔乃周公之兄然則周公不知管叔之將畔而使之其過有所不免矣或曰周公之處管叔不如舜之處象何也遊氏曰象之惡已著而其志不過富貴而已故舜得以是而全之若管叔之惡則未著而其志其才皆非象比也周公詎忍逆探其兄之惡而棄之耶周公愛兄冝無不盡者管叔之事聖人之不幸也舜誠信而喜象周公誠信而任管叔此天理人倫之至其用心一也且古之君子過則改之今之君子過則順之古之君子其過也如日月之食民皆見之及其更也民皆仰之今之君子豈徒順之又從為之辭順猶遂也更改也辭辨也更之則無損于明故民仰之順而為之辭則其過愈深矣責賈不能勉其君以遷善改過而教之以遂非文過也林氏曰齊王慙于孟子蓋羞惡之心有不能自已者使其臣有能因是心而將順之則義不可勝用矣而陳賈鄙人方且為之曲為辨説而沮其遷善改過之美長其飾非拒諫之惡故孟子深責之然此書記事散出而無先後之次故其説必參考而後通若以第二篇十章十一章置于前章之後此章之前則孟子之意不待論説而自明矣孟子致為臣而歸王就見孟子曰前日願見而不可得得侍同朝甚喜今又棄寡人而歸不識可以繼此而得見乎對曰不敢請耳固所願也朝音潮他日王謂時子曰我欲中國而授孟子室養弟子以萬鍾使諸大夫國人皆有所矜式子盍為我言之為去聲時子齊臣也中國當國之中也萬鍾穀祿之數也鍾量名受六斛四斗矜敬也式法也盍何不也時子因陳子而以告孟子陳子以時子之言告孟子陳子即陳臻也孟子曰然夫時子惡知其不可也如使豫欲富辭十萬而受萬是為欲富乎夫音扶惡平聲孟子既以道不行而去則其義不可以復留而時子不知則又有難顯言者故但言設使我欲富則我前日為卿嘗辭十萬之祿今乃受此萬鍾之饋是我雖欲富亦不為此也季孫曰異哉子叔疑使己為政不用則亦已矣又使其子弟為卿人亦孰不欲富貴而獨於富貴之中有私龍斷焉龍音壟此孟子引季孫之語也季孫子叔疑不知何時人龍斷岡壟之斷而髙也義見下文蓋子叔疑者嘗不用而使其子弟為卿季孫訊其既不得于此而又欲求得于彼如下文賤丈夫登龍斷者之所為也孟子引此以明道既不行復受其祿則無以異此矣古之為市者以其所有易其所無者有司者治之耳有賤丈夫焉必求龍斷而登之以左右望而罔市利人皆以為賤故從而征之征商自此賤丈夫始矣孟子釋龍斷之説如此治之謂治其爭訟左右望者欲得此而又取彼也罔謂罔羅取之也從而征之謂人惡其専利故就征其稅後世緣此遂征商人也程子曰齊王所以處孟子者未為不可孟子亦非不肯為國人矜式者但齊王實非欲尊孟子乃欲以利誘之故孟子拒而不受南軒曰孟子以為不用己則已矣而又欲養子弟以卿之祿則言王之處己也以利而非為道之故吾之受之亦利之而己苟以利則何異于龍斷之夫乎人孰不欲富貴此言人情之常也謂賢者獨不欲則豈人情哉聖賢固欲道之行也而動必以義義所不安則處貧賤而終身可也其可以利誘乎嗟夫義利之幾君子之所深謹而去就之所由分也後世為人臣者不明斯義故為之君者謂利祿果可以得士而士之所以求于我者亦不過乎此于是而有輕士自驕之心正猶征商之徒因龍斷之夫而立耳夫惟君子守義而不苟利所以明為人臣之義也孟子去齊宿於晝晝如字或曰當作畫音獲下同畫齊西南近邑也有欲為王留行者坐而言不應隱几而卧為去聲下同隱于靳反隱慿也客坐而言孟子不應而卧也客不恱曰弟子齊宿而後敢言夫子卧而不聽請勿復敢見矣曰坐我明語子昔者魯繆公無人乎子思之側則不能安子思泄栁申詳無人乎繆公之側則不能安其身齊側皆反復扶又反語去聲齊宿齊戒越宿也繆公尊禮子思常使人候伺道達誠意于其側乃能安而留之也泄栁魯人申詳子張之子也繆公尊之不如子思然二子義不苟容非有賢者在其君之左右維持調護之則亦不能安其身矣子為長者慮而不及子思子絶長者乎長者絶子乎長者孟子自稱也言齊王不使子來而子自欲為王留我是所以為我謀者不及繆公留子思之事而先絶我也我之卧而不應豈為先絶子乎南軒曰孟子與子思之所以自處者其道一也孟子去齊尹士語人曰不識王之不可以為湯武則是不明也識其不可然且至則是干澤也千里而見王不遇故去三宿而後出晝是何濡滯也士則兹不恱語去聲尹士齊人也千求也澤恩澤也濡滯遲留也髙子以告髙子亦齊人孟子弟子也曰夫尹士惡知豫哉千里而見王是豫所欲也不遇故去豈豫所欲哉豫不得已也夫音扶下同惡平聲見王欲以行道也今道不行故不得已而去非本欲如此也豫三宿而出晝於豫心猶以為速王庶幾改之王如改諸則必反豫所改必指一事而言然今不可考矣夫出晝而王不豫追也豫然後浩然有歸志豫雖然豈舍王哉王由足用為善王如用豫則豈徒齊民安天下之民舉安王庶幾改之豫日望之浩然如水之流不可止也楊氏曰齊王天資朴實如好勇好貨好色好世俗之樂皆以直告而不隱于孟子故足以為善若乃其心不然而謬為大言以欺人是人終不可與入堯舜之道矣何善之能為豫豈若是小丈夫然哉諫於其君而不受則怒悻悻然見於其面去則窮日之力而後宿哉悻形頂反見音現悻悻怒意也窮盡也尹士聞之曰士誠小人也此章見聖賢行道濟時汲汲之本心愛君澤民惓惓之餘意李氏曰於此見君子憂則違之之情而荷蕢者所以為果也南軒曰詳味孟子答髙子之辭何其溫厚而不迫也云云厯考宣王之為人猶為不敢自恃者故其不能領孟子之意也則曰吾惛不能進于是問以好樂則變乎色曰寡人非能好先王之樂好貨好勇好色自以為疾言之而不諱故孟子有望以為王如用豫則豈徒齊民安將天下之民舉安蓋其安天下之道已素定乎胸中施設次第固有條理而其本則在格君心故惓惓有望于王之改之也王一改悟而孟子之道可行齊民可安齊民安則天下之民將舉安矣其序固爾也又曰豫日望之孟子非不知道之行否有命而惓惓不已者吉凶與民同患之心也學者所冝反覆詳味之若夫諌而不用則怒悻悻然見于面去則窮日之力則是私意之所發其諌也固無法言之憾而其去也豈復有忠厚之氣哉孟子去齊充虞路問曰夫子若有不豫色然前日虞聞諸夫子曰君子不怨天不尤人路問于路中問也豫恱也尤過也此二句實孔子之言蓋孟子嘗稱之以教人耳曰彼一時此一時也彼前日此今日五百年必有王者興其間必有名世者自堯舜至湯自湯至文武皆五百餘年而聖人出名世謂其人德業聞望可名于一世者為之輔佐若臯陶稷契伊尹萊朱太公望散冝生之屬由周而來七百有餘歲矣以其數則過矣以其時考之則可矣周謂文武之間數謂五百年之期時謂亂極思治可以有為之日于是而不得一有所為此孟子所以不能無不豫也夫天未欲平治天下也如欲平治天下當今之世舍我其誰也吾何為不豫哉言當此之時而使我不遇于齊是天未欲平治天下也然天意未可知而其具又在我我何為不豫哉然則孟子雖若有不豫然者而實未嘗不豫也蓋聖賢憂世之志樂天之誠有並行而不悖者于此見矣南軒曰充虞蓋亦察孟子顔色之間若有不豫之意而淺心所量遂有不怨天不尤人之問也而不知孟子之心蓋疑王道之久曠憂生民之不被其澤是以若有不豫色然也曰彼一時此一時也蓋疑辭也謂彼亦一時此亦一時何彼時王者之數興其尤闕者不過五百年而名世間出者亦有之矣而乃今七百有餘嵗王政不行焉言不應若是之久曠也此孟子所以疑所以憂而未能釋也若夫在孟子之進退去就則何疑何憂之有哉天未欲平治天下故我之道未可行使天而欲平治天下則舍我孰為之者則何不豫之有由前所言在君子不得不疑不得不憂由後所言在君子夫何憂夫何疑故王通謂樂天知命吾何憂窮理盡性吾何疑又曰天下皆憂吾不得不憂天下皆疑吾不得不疑蓋近此意而心迹之論則非也雖然孔子所謂天之未喪斯文也匡人其如豫何與孟子如天未欲平治天下之語反覆玩味之則亦可見聖賢之分矣孟子去齊居休公孫丑問曰仕而不受祿古之道乎休地名曰非也於崇吾得見王退而有去志不欲變故不受也崇亦地名孟子始見齊王必有所不合故有去志變謂變其去志繼而有師命不可以請久於齊非我志也師命師旅之命也國既被兵難請去也孔氏曰仕而受祿禮也不受齊祿義也義之所在禮有時而變公孫丑欲以一端裁之不亦誤乎南軒曰孟子雖庶幾宣王之可與有為吾道之可以行而其可去之幾未嘗不先覺兹聖賢之所以為志也又曰一見而有去志則察王之神必有不能受者然其庶幾足用為善則又以其質朴有可取也孟子集編卷四
