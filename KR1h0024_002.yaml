body:
  text: 欽定四庫全書大學集編卷下宋真徳秀撰此謂知本程子曰衍文也此謂知之至也此句之上别有闕文此特其結語耳右傳之五章蓋釋格物致知之義而今亡矣此章舊本通下章誤在經文之下間嘗竊取程子之意以補之曰所謂致知在格物者言欲致吾之知在即物而窮其理也蓋人心之靈莫不有知而天下之物莫不有理惟於理有未窮故其知有不盡也是以大學始教必使學者即凡天下之物莫不因其已知之理而益窮之以求至乎其極至於用力之乆而一旦豁然貫通焉則衆物之表裏精粗無不到而吾心之全體大用無不明矣此謂物格此謂知之至也問此經之序自誠意以下其義明而傳悉矣獨其所謂格物致知者字義不明而傳復闕焉且為最初用力之地而無復上文語緒之可尋也子乃自謂取程子之意以補之則程子之言何以見其必舍於經意而子之言又似不盡出於程子何邪曰或問於程子曰學何為而可以有覺也程子曰學莫先於致知能致其知則思日益明至於乆而後有覺爾書所謂思曰睿睿作聖董子所謂勉強學問則聞見博而智益明正謂此也學而無覺則亦何以學為也哉或問忠信則可勉矣而致知為難柰何程子曰誠敬固不可以不勉然天下之理不先知之亦未有能勉以行之者也故大學之序先致知而後誠意其等有不可躐者苟無聖人之聦明睿智而徒欲勉焉以踐其行事之迹則亦安能如彼之動容周旋無不中禮也哉惟其燭理之明乃能不待勉強而自樂循理爾夫人之性本無不善循理而行宜無難者惟其知之不至而但欲以力為之是以苦其難而不知其樂耳知之而至則循理為樂不循理為不樂何苦而不循理以害吾樂邪昔甞見有談虎傷人者衆莫不聞而其間一人神色獨變問其所以乃甞傷於虎者也夫虎能傷人人孰不知然聞之有懼有不懼者知之有真有不真也學者之知道必如此人之知虎然後為至耳若曰知不善之不可為而猶或為之則亦未甞真知而已矣此兩條者皆言格物致知所以當先而不可後之意也又有問進修之術何先者程子曰莫先於正心誠意然欲誠意必先致知而欲致知又在格物致盡也格至也凡有一物必有一理窮而至之所謂格物者也然而格物亦非一端如或讀書講明道義或論古今人物而别其是非或應接事物而處其當否皆窮理也曰格物者必物物而格之邪將止格一物而萬理皆通邪曰一物格而萬理通雖顔子亦未至此惟今日而格一物焉明日又格一物焉積習既多然後脱然有貫通處耳又曰自一身之中以至萬物之理理會得多自當豁然有箇覺處又曰窮理者非謂必盡窮天下之理又非謂止窮得一理便到但積累多後自當脱然有悟處又曰格物非欲盡窮天下之物但於一事上窮盡其他可以類推至於言孝則當求其所以為孝者如何若一事上窮不得且别窮一事或先其易者或先其難者各隨人淺深譬如千蹊萬徑皆可以適國但得一道而入則可以類推而通其餘矣蓋萬物各具一理而萬理同出一原此所以可推而無不通也又曰物必有理皆所當窮若天地之所以髙深鬼神之所以幽顯是也若曰天吾知其髙而已矣地吾知其深而已矣鬼神吾知其幽且顯而已矣則是已然之辭又何理之可窮哉又曰如欲為孝則當知所以為孝之道如何而為奉養之宜如何而為温清之節莫不窮究然後能之非獨守夫孝之一字而可得也或問觀物察己者豈因見物而反求諸己乎曰不必然也物我一理纔明彼即曉此此合内外之道也語其大天地之所以髙厚語其小至一物之所以然皆學者所宜致思也曰然則先求之四端可乎曰求之性情固切於身然一草一木亦皆有理不可不察又曰致知之要當知至善之所在如父止於慈子止於孝之類若不務此而徒欲汎然以觀萬物之理則吾恐其如大軍之遊騎出大逺而無所歸也又曰格物莫若察之於身其得之尤切此十條者皆言格物致知所當用力之地與其次第工程也又曰格物窮理但立誠意以格之其遲速則在乎人之明暗耳又曰入道莫如敬未有能致知而不在敬者又曰涵養須用敬進學則在致知又曰致知在乎所養養知莫過於寡欲又曰格物者適道之始思欲格物則固己近道矣是何也以収其心而不放也此五條者又言涵養本原之功所以為格物致知之本者也凡程子之為説者不過如此其於格物致知之傳詳矣今也尋其義理既無可疑考其字義亦皆有據至以他書論之則文言所謂學聚問辨中庸所謂明善擇善孟子所謂知性知天又皆在乎固守力行之先而可以驗夫大學始教之功為有在乎此也愚甞反覆考之而有以信其必然是以竊取其意以補傳文之闕不然則又安敢犯不韙之罪為無證之言以自託於聖經賢傳之間乎曰然則吾子之意亦可得而悉聞之乎曰吾聞之也天道流行造化發育凡有聲色貌象而盈於天地之間者皆物也既有是物則其所以為是物者莫不各有當然之則而自不容已是皆得於天之所賦而非人之所能為也今且以其至􆃒而近者言之則心之為物實主於身其體則有仁義禮智之性其用則有惻隱羞惡恭敬是非之情渾然在中隨感而應各有攸主而不可亂也次而及於身之所具則有口鼻耳目四肢之用又次而及於身之所接則有君臣父子夫婦長㓜朋友之常是皆必有當然之則而自不容己所謂理也外而至於人則人之理不異於己也逺而至於物則物之理不異於人也極其大則天地之運古今之變不能外也盡於小則一塵之微一息之頃不能遺也是乃上帝所降之衷烝民所秉之彛劉子所謂天地之中夫子所謂性與天道子思所謂天命之性孟子所謂仁義之心程子所謂天然自有之中張子所謂萬物之一原邵子所謂道之形體者但其氣質有清濁偏正之殊物欲有淺深厚薄之異是以人之與物賢之與愚相與懸絶而不能同耳以其理之同故以一人之心而於天下萬物之理無不能知以其稟之異故於其理或有所不能窮也理有未窮故其知有不盡知有不盡則其心之所發必不能純於義理而或雜乎物欲之私此其所以意有不誠心有不正身有不修而天下國家不可得而治也昔者聖人蓋有憂之是以於其始教為之小學而使之習於誠敬則所以収其放心養其徳性者已無所不用其至矣及其進乎大學則又使之即夫事物之中因其所知之理推而究之以各到乎其極則吾之知識亦得以周遍精切而無不盡也若其用力之方則或考之事為之著或察之念慮之微或求之文字之中或索之講論之際使於身心性情之徳人倫日用之常以至天地鬼神之變鳥獸草木之冝自有一物之中莫不有以見其所當然而不容己與其所以然而不可易者必其表裏精粗無所不盡而又益推其類以通之至於一日脱然而貫通焉則於天下之物皆有以究其義理精微之所極而吾之聦明睿智亦皆有以極其心之本體而無不盡矣此愚之所以補乎本傳闕文之意雖不能盡用程子之言然其指趣要歸則不合者鮮矣讀者其亦深考而實識之哉曰然則子之為學不求諸心而求諸迹不求之内而求之外吾恐聖賢之學不如是之淺近而支離也曰人之所以為學心與理而已矣心雖主乎一身而其體之虚靈足以管乎天下之理理雖散在萬物而其用之微妙實不外乎一人之心初不可以内外精粗而論也然或不知此心之靈而無以存之則昬昧雜擾而無以窮衆理之妙不知衆理之妙而無以窮之則偏狹固滯而無以盡此心之全此其理勢之相須蓋亦有必然者是以聖人設教使人黙識此心之靈而存之於端莊靜一之中以為窮理之本使人知有衆理之妙而窮之於學問思辨之際以致盡心之功巨細相涵動靜交養初未甞有内外精粗之擇及其真積力乆而豁然貫通焉則亦有以知其渾然一致而果無内外精粗之可言矣今必以是為淺近支離而欲藏形匿景别為一種幽深恍惚艱難阻絶之論務使學者莽然措其心於文字言語之外而曰求道必如此然後可以得之則是近世佛學詖淫邪遁之尤者而欲移之以亂古人明徳新民之實學其亦誤矣曰近世大儒有為格物致知之説者曰格猶扞也禦也能扞禦外物而後能知至道也又有推其説者曰人生而靜其性本無不善而有為不善者外物誘之也所謂格物以致其知者亦曰扞去外物之誘而本然之善自明耳是其為説不亦善乎曰天生蒸民有物有則則物之與道固未始相離也今曰禦外物而後可以知至道則是絶父子而後可以知孝慈離君臣然後可以知仁敬也是安有此理哉若曰所謂外物者不善之誘耳非指君臣父子而言也則夫外物之誘人莫甚於飲食男女之欲然推其本則固亦莫非人心所當有而不能無者也但於其間自有天理人欲之辨而不可以毫釐差耳惟其徒有是物而不能察於吾之所以行乎其間者孰為天理孰為人欲是以無以致其克復之功而物之誘於外者得以奪乎天理之本然也今不即物以窮其原而徒惡物之誘乎己乃欲一切扞而去之則是必閉口枵腹然後可以得飲食之正絶滅種類然後可以全夫婦之别也是雖裔戎無君無父之教有不能充其説者況乎聖人大中至正之道而得以此亂之哉曰自程子以格物為窮理而其學者傳之見於文字多矣是亦有以發其師説而有助於後學者邪曰程子之説切於己而不遺於物本於行事之實而不廢文字之功極其大而不略其小究其精而不忽其粗學者循是而用力焉則既不務博而陷於支離亦不徑約而流於狂妄既不舍其積累之漸而其所謂豁然貫通者又非見聞思慮之可及也是於說經之意入徳之方其亦可謂反復詳備而無俟於發明矣若其門人雖曰祖其師説然以愚考之則恐其皆未足以及此也蓋有以必窮萬物之理同出於一為格物知萬物同出乎一理為知至如合内外之道則天人物我為一通晝夜之道則死生幽明為一逹哀樂好惡之情則人與鳥獸魚鼈為一求屈伸消長之變則天地山川草木為一者似矣然其欲必窮萬物之理而專指外物則於理之在已者有不明矣但求衆物比類之同而不究一物性情之異則於理之精微者有不察矣不欲其異而不免乎四説之異必欲其同而未極乎一原之同則徒有牽合之勞而不睹貫通之妙矣其於程子之説何如哉又有以為窮理只是尋箇是處然必以恕為本而又先其大者則一處理通而觸處皆通者其曰尋箇是處者則得矣而曰以恕為本則是求仁之方而非窮理之務也又曰先其大者則不若先其近者之切也又曰一處通而一切通則又顔子之所不能及程子之所不敢言非若類推積累之可以循序而必至也又有以為天下之物不可勝窮然皆備於我而非從外得也所謂格物亦曰反身而誠則天下之物無不在我者是亦似矣然反身而誠乃為物格知至以後之事言其窮理之至無所不盡故凡天下之理反求諸身皆有以見其如目視耳聽手持足行之畢具於此而無毫髪之不實耳固非以是方為格物之事亦不謂但務反求諸身而天下之理自然無不誠也中庸之言明善即物格知至之事其言誠身即意誠心正之功故不明乎善則有反諸身而不誠者其功夫地位固有序而不可誣矣今為格物之説又安得遽以是而為言哉又有以今日格一物明日格一物為非程子之言者則諸家所記程子之言此類非一不容皆誤且其為説正中庸學問思辨弗得弗措之事無所咈於理者不知何所病而疑之也豈其習於持敬之約而厭夫觀理之煩邪抑直以已所未聞而不信他人之所聞也夫持敬觀理不可偏廢程子固己言之若以己偶未聞而遂不之信則以有子之似聖人而速貧速朽之論猶不能無待於子游而後定今又安得遽以一人之所未聞而盡廢衆人之所共聞者哉又有以為物物致察而宛轉歸己如察天行以自強察地勢以厚徳者亦似矣然其曰物物致察則是不察程子所謂不必盡窮天下之物也又曰宛轉歸已則是不察程子所謂物我一理纔明彼即曉此之意又曰察天行以自強察地勢以厚徳則是但欲因其已定之名擬其已著之迹而未甞如程子所謂求其所以然與其所以為者之妙也獨有所謂即事即物不厭不弃而身親格之以精其知者為得致字向裏之意而其曰格之之道必立志以定其本居敬以持其志志立乎事物之表敬行乎事物之内而知乃可精者又有以合乎所謂未有致知而不在敬者之指但其語意頗傷急廹既不能盡其全體規摹之大又無以見其從容潛玩積乆貫通之功耳嗚呼程子之言其荅問反復之詳且明也如彼而其門人之所以為説者乃如此雖或僅有一二之合焉而不免於猶有所未盡也是亦不待七十子喪而大義已乖矣尚何望其能有所發而有助於後學哉間獨惟念昔聞延平先生之教以為為學之初且當常存此心勿為他事所勝凡遇一事即當且就此事反復推尋以究其理待此一事融釋脱落然後循序少進而别窮一事如此既乆積累之多胷中自當有洒然處非文字言語之所及也詳味此言雖其規摹之大條理之密若不逮於程子然其功夫之漸次意味之深切則有非他説所能及者惟甞實用力於此者為能有以識之未易以口舌爭也曰然則所謂格物致知之學與世之所謂博物洽聞者奚以異曰此以反身窮理為主而必究其本末是非之極致彼以徇外誇多為務而不覈其表裏真妄之實然必究其極是以知愈博而理愈明不覈其實是以識愈多而心愈窒此正為己為人之所以分不可不察也問格物工夫未到得貫通亦未害否先生云學者所以學便須是到聖賢地位不到不肯休方是但用工做向前去莫問程途少間自能到如何先立一箇不解到得便休底規摹放這裏了如何做事問全體大用曰體用元不相離如人行坐坐則此身全坐便是體行則此體全行便是用學而無覺則亦何以學為也哉此程子曉人至切處今日格一件明日又格一件積習既多然後脱然有箇貫通處此一項尤有意味向非其人善問則亦何以得之又曰自一身之中以至萬物之理理㑹得多自當豁然有箇覺處先生曰此一段尤其要切學者所當深究道夫曰自一身以至萬物之理則所謂由中而外自近而逺秩然有序而不迫切者先生曰然到得豁然處是非人力勉強而至者也又曰窮理者非謂必盡窮天下之理又非謂止窮得一理便到但積累多後自當脱然有悟處先生曰程先生言語氣象自活與衆人不同又問物必有理皆所當窮云云先生曰此處是緊切學者須當知夫天如何而能髙地如何而能厚鬼神如何而能幽顯山岳如何而能融結這方是格物又曰致知之要當知至善之所在云云先生曰天下之理富塞充滿耳之所聞目之所見無非物也若之何而窮之哉須當察之於心使此心之理既明然後於物之所在從而察之則不至於汎濫矣又曰格物莫若察之於一身其得之為尤切先生曰前既説當察物理不可專在性情至此又言莫若得之於身為尤切皆是互相發處又曰格物窮理但立誠意以格之云云先生曰立誠意只是樸實下工夫與經文誠意之説不同又曰入道莫如敬未有致知而不在敬者先生曰敬則此心惺惺又曰涵養須用敬進學則在致知先生曰二者偏廢不得致知須用涵養涵養必用致知知便要知得極致知是推致到極處窮究徹底真見得決如此程子説虎傷人之譬甚好這如一箇物四陲四角皆知得盡前頭更無去處外面更無去處方始是格到那物問固有人明得此理而涵養未到却為私意所奪先生云只為明得不盡若明得盡私意自然留不得若半青半黃未能透徹便是尚有查滓非所謂真知也問須是涵養到心體無不盡處方善不然知之雖至行之終恐不盡也先生云只為知不至今人行到五分便是他只知得五分見識只識到那地位譬諸穿窬稍是箇人便不肯做蓋真知穿窬之不善也問一理通則萬理通其説如何曰伊川甞云雖顔子亦未到此天下豈有一理通解萬理皆通也須積累将去如顔子髙明不過聞一以知十亦是大段聰明了學問却有漸無急迫之理有人甞説曰問只用窮究一箇大處則其他皆通如某正不敢如此説湏是逐旋做将去不成只用窮究一箇其他更不用管便都理㑹得豈有此理問正心誠意莫須操存否曰也須見得後方始操得不然只恁空手終不濟事蓋謹守則在此一合眼則便走了須是格物蓋格物則理明理明則誠一而心自正矣不然則戢戢而生如何守得他住曰格物最是難事如何便盡格得曰程子謂今日格一件明日又格一件積習既多然後脱然有貫通處某甞謂他此語便是真實做工夫來他也不説格一件後便㑹通也不説盡格得天下物理後方始通只云積習既多然後脱然有箇貫通處又曰今却不用慮其他只是箇知至而后意誠這一轉較難今日格一件明日格一件積習既多自當脱然有貫通處乃是零零碎碎湊合将來不知不覺自然醒悟其始固須用力及其得之也又却不假用力此箇事不可欲速欲速則不逹問伊川説今日格一件明日格一件工夫如何曰如讀書今日看一段明日看一段又如今日理㑹一事明日理會一事積習多後自然貫通人之良知本所固有然不能窮理者只是足於己知己逹而不能窮其未知未逹故見得一截不曽又見得一截此其所以於理未精問無事時見得是如此臨事又做錯了如何曰只是斷置不分明所以格物便要閒時理會不是要臨時理㑹聞時看得道理分曉則事來時斷置自易格物只是理㑹未理會得底不是從頭都要理會如水火人自是知其不可蹈何曽有錯去蹈水火格物只是理會當蹈水火與不當蹈水火臨事時斷置教分曉且如看文字聖賢説話粹無可疑者若後世諸儒之言唤做都不是也不得有好底有不好底好底裏面也有不好處不好底裏面也有好處有這一事説得是那一件説得不是有這一句説得是那一句説得不是都要恁地分别如臨事亦要如此理會那箇是那箇不是若道理明時自分曉有一般説漢唐來都是有一般説漢唐來都不是恁地也不得且如董仲舒賈誼説話何曽有都不是底何曽有都是底須是要見得他那箇議論是不是如此方喚做格物如今將一箇物事來是與不是見得不定便是自家這裏道理不通透若道理明則這様處自通透又問天地之所以髙深鬼神之所以幽顯曰公且説天是如何後髙蓋天只是氣非獨是髙只今人在地上便只見如此髙要之他連那地下亦是天天只管轉來旋去天大了故旋得許多查滓在中間世閒無一箇物事恁地大地只是氣之查滓故厚而深鬼神之幽顯自今觀之他是以鬼為幽以神為顯鬼者隂也神者陽也氣之屈者謂之鬼氣之只管恁地來者謂之神洋洋然如在其上焄蒿悽愴此百物之精也神之著也這便是那發生之精神神者是生底以至長大故見其顯便是氣之伸者今人謂人之死謂鬼是死後収斂無形無迹不可理㑹便是那氣之屈底道夫問横渠所謂二氣之良能良能便是那㑹屈伸底否曰然問程子言格物非謂盡窮天下之理但於一事上窮盡其他可以類推二説如何曰既是教類推不是窮盡一事便了且如孝盡得箇孝底道理故忠可移於君又須去盡得忠以至於兄弟夫婦朋友從此推之無不盡窮始得格物不可只理會文義須便實下工夫格將去始得今人務博者却要盡窮天下之理務約者又要反身而誠則天下之物無不在我者皆不是如一百件事理㑹得五六十件了這三四十件雖未理會也大槩是如此問程子格物之説曰須合而觀之所謂不必盡窮天下之物者如十事已窮得八九則其一二雖未窮得将來湊會都自見得又如四旁已窮得中央雖未窮得畢竟是在中間了将來貫通自能見得程子謂但積累多後自當脱然有悟處此語最好問程子論致知處云若一事上窮不得且别窮一事竊謂致之為言推而至之以至於盡也於窮不得處正當努力豈可遷延逃避别窮一事邪至於所謂但得一道而入則可以類推而通其餘矣夫專心致志猶慮其未能盡知況敢望以其易而通其難者乎曰這是言隨人之量非曰遷延逃避也蓋於此處既理會不得若專一守在這裏却轉昬了須著别窮一事又或可以因此而明彼也問伊川説若一事窮不得須别窮一事與延平李先生説如何曰這説自有一項難窮底事如造化禮樂度數等事是卒急難曉只得且放住且如所説春秋書元年春王正月這如何要窮曉得李先生説是窮理之要若平常遇事這一件理㑹未透又理會第二件第二件理會未得又理會第三件恁地終身不長進問或問中千蹊萬徑皆可適國國恐是譬理之一源處不知從一事上便可窮得到一源處否曰也未解便如此只要以類而推理固是一理然其間曲折甚多須是把這箇做樣却從這裏推去始得且如事親固當盡其事之之道若得於親時是如何不得於親時又當如何以此而推之於事君則知得於君時是如何不得於君時又當如何推以事長亦是如此自此推去莫不皆然問萬物各具一理而萬理同出一源此所以可推而無不通也曰近而一身之中逺而八荒之外微而一草一木之衆莫不各具此理如此四人在坐各有這箇道理某不用假借於公公不用求於某然雖各自有這一箇理又却同出於一箇理爾如排數器水相似這盂也是這様水那盂也是這様水各各滿足不待求假於外然打破放裏却也只是箇水此所以可推推而無不通也所以謂格得多後自此貫通者只謂是一理釋氏云一月普現一切水一切水月一月攝這是那釋氏也窺見得他這些道理濂溪通書只是説這一事問萬物各具一理而萬理同出一原曰萬物皆有此理理皆同出一原但所居之位不同則其理之用不一如為君須仁為臣須敬為子須孝為父須慈物物各具此理而物物各異其用然莫非一理之流行也聖人所以窮理盡性而至於命凡世間所有之物莫不窮極其理所以處置得物物各得其所無一事一物不得其冝除是無此物方無此理既有此物聖人無有不盡其理者也問或問觀物察己還因見物反求諸己此説亦是程子非之何也曰這理是天下公共之理人人都一般初無物我之分不可道我是一般道理人又是一般道理將來相比如赤子入井皆有怵惕知得人有這箇更知自家亦有這箇更不消比並自知格物致知彼我相對而言耳格物所以致知於這一物上窮得一分之理即我之知亦知得一分於物之理窮二分即我之知亦知得二分於物之理窮得愈多則我之知愈廣其實只是一理才明彼即曉此所以大學説致知在格物又不説欲致其知者在格其物蓋致知便在格物中非格之外别有致處也又曰格物之理所以致我之知問或問致知章引程子所謂汎然徒欲以觀萬物之理譬如大軍之遊騎出太逺而無所歸莫只是要切己看否曰只要從近去且窮實理令有切己功夫若只汎窮天下萬物之理不務切己即是遺書所謂遊騎無所歸矣問程子謂一草一木皆所當窮又謂恐如大軍遊騎出太逺而無所歸何也曰便是此等語説得好平正不向一邊去問知至而后意誠而程子又云格物窮理立誠意以格之何也曰此誠字説較淺未説到深處只是確定其志樸實去做工夫如胡氏立志以定其本便是此意敬則心存心存則理具於此而得失可驗故曰未有致知而不在敬者問程子云未有致知而不在敬者蓋敬則胷次虚明然後能格物而判其是非曰雖是如此然亦須格物不使一毫私欲得以為之蔽然後胷次方得明只一箇持敬也易得做病若只持敬不時時提撕著亦易以昬困須是提撕才見有私欲底意思來便屏去且謹守著到得復來又屏去時時提撕私意當自去也問格物敬為主如何曰敬者徹上徹下工夫世間之物無不有理皆須格過古人自㓜便識其具且如事親事君之禮鍾鼓鏗鏘之節進退揖遜之儀皆目熟其事躬親其禮及其長也不過只是窮此理因而漸及於天地鬼神日月隂陽鳥獸草木之理所以用工也易今人皆無此等禮數可以講習只靠先聖遺經自去推究所以要人格物主敬便将此心去體會古人道理備而行之如事親孝自家既知所以孝便将此孝心依古禮而行之事君敬便将此敬心依聖經所説之禮而行之一一須要窮過自然浹洽貫通問或問涵養又在致知之先曰涵養是合下在先古人從少以敬涵養父兄漸漸教之讀書識義理今若説待涵養了方去理㑹致知也無期限須是兩下用工也著涵養也著致知伊川多説敬敬則此心不放事事皆從此做去問養知莫過於寡欲是既知後便如此養否曰此不分先後未知之前若不養之此知如何發得既知之後若不養則又差了不可道未知之前便不必如此致知一章此是大學最初下手處若理會得透徹後面便容易故程子此處説得節目甚多皆是因人之資質了説雖若不同其實一也見人之敏者太去理會外事則教之使去父慈子孝處理會曰若不務此而徒欲汎然以觀物之理則吾恐其如大軍之遊騎出太逺而無所歸若是人專只去裏面理㑹則教之以求之性情固切於身然一草一木亦皆有理要之内事外事皆是自已合當理會底但須是六七分去裏面理㑹三四分去外面理會方可若是工夫中半時亦自不可況在外工夫多在内工夫少邪此尤不可也誠敬涵養為格物致知之本問或問載程子致知格物之説不同曰當時荅問各就其人而言之今須是合就許多不同處來看作一意為佳問由中而外自近而逺曰某之意只是説欲致其知者須先存得此心此心既存却看這箇道理是如何又推之於身又推之於物只管一層展開一層又見得許多道理又曰如足容重手容恭目容端口容止聲容静頭容直氣容肅立容徳色容莊這便是一身之則所當然者曲禮三百威儀三千皆是人所合當做而不得不然者非是聖人安排這物事約束人如洪範亦曰貌曰恭言曰從視曰明聽曰聦思曰睿以至於睿作聖夫子亦謂君子有九思此皆人之所不可已者問降衷之衷與受中之中二字義如何曰左氏云始終而衷舉之又曰衷甲以見看此衷字義本是衷甲以見之義為其在裏而當中也然中字大槩因過不及而立名後人云衷善也却説得未親切問天道流行發育萬物人物之生莫不得其所以生者以為一身之主是此性隨所生處便在否曰一物各具一太極問或問詩所謂秉彞書所謂降衷一段其名雖異要之皆是一理曰誠是一理豈可無分别且如何謂之降衷曰衷是善也曰若然何不言降善而言降衷衷字看來只是箇無過不及之中是箇恰好底道理天之生人物箇箇有這一副當恰好無過不及底道理降與你與程子所謂天然自有之中劉子所謂民受天地之中相似與詩所謂秉彞張子所謂萬物之一原又不同須各曉其名字訓義之所以異方見其所謂同衷只是中今人言折衷折衷者以中為準則而取正也天生蒸民有物有則則字却似衷字天之生此物必有箇當然之則故民執之以為常道所以無不好此懿徳物物有則蓋君有君之則臣有臣之則為人君止於仁君之則也為人臣止於敬臣之則也如耳有耳之則目有目之則視逺惟明目之則也聽徳惟聦耳之則也從作又言之則恭作肅貌之則也四支百骸萬物萬事莫不各有當然之則子細推之皆可見又曰凡看道理須是細心看他名義分位之不同通天下故同此一理然聖賢所説有許多般様須是一一通曉分别得出始得若只儱侗説了盡不見他裏面好處如降衷于下民這緊要字却在降字上故自天而言則謂之降衷自人受此衷而言則謂之性如云天所賦為命物所受為性命便是那降字至物所受則謂之性而不謂之衷所以不同縁各㨿他來處所受處而言也惟皇上帝降衷于下民此據天之所與物者而言若有常性是據民之所受者而言克綏厥猷猷即道道者性之發用處能安其道者惟后也如天命之謂性率性之謂道脩道之謂教三句亦是如此古人説得道理如此縝密處處皆合今人心粗如何看得出用之説衷是道理之心這話恁地説不得心性固只一理然自有合言處又有析而言處須知其所以析又知其所以合乃可然謂性便是心則不可謂心便是性亦不可孟子曰盡其心知其性又曰存其心養其性聖賢説話自有分别何甞如此儱侗不分曉固有儱侗一統説時然名義各自不同心性之别如以碗盛水水須碗乃能盛然謂碗便是水則不可後來横渠説得極精云心統性情者也如降衷之衷同是此理然此字但可施於天之所降而言而不可施於人之所受而言也問劉子所謂天地之中即周子所謂太極否曰只一般但名不同中只是恰好處書惟皇上帝降衷于下民亦只是恰好處極不是中極之為物只是在中問民受天地之中以生與程子天然自有之中還是一意否曰只是一意蓋指大本之中也問或問云天地鬼神之變鳥獸草木之宜莫不有以見其所當然而不容己此處所謂不容己者是何曰春生了便秋殺他住不得隂極了便陽生如人在背後只管來相趲如何住得問或問中莫不有以見其所當然而不容己者然又當求其所以然而不可易者先生問毎常如何看廣云所以然而不可易者是指理而言所當然而不容己者是指人心而言曰下句只是指事而言凡事固有所當然而不容己者然又當求其所以然者何故其所以然理也理如此故不可易又如人見赤子入井皆有怵惕惻隱之心此其事所當然而不容己者也然其所以者是何故必有箇道理之不可易者今之學者但止見其一邊只據眼前理㑹得箇皮膚便休都不曽㑹得那徹心徹髓處以至於天地間造化固是陽長則生隂消則死然其所以然者是如何又如天下萬事一事各有一理須是一一理㑹交徹不成只説道天吾知其髙而已地吾知其深而已萬物萬事吾知其為萬物萬事而已明道詩云道通天地有形外思入風雲變態中觀他此語須知有極至之理非冊子之上所能載者廣云大至於隂陽造化皆是所當然而不容己者所謂太極則是所以然而不可易者曰固是人須是自向裏入深去理會此箇道理才理㑹到深處又易得似禪須是理㑹到深處又却不與禪相似方是因舉五峯之言曰身親格之以精其知雖於致字得向裏之意然却恐遺了外面許多事如某便不敢如此説須是内外本末隱顯精粗一一周遍方始是儒者之學或問理之不容己者如何曰理之所當為者自不容己孟子最發明此理處如曰孩提之童無不知愛其親及其長也無不知敬其兄自是有住不得處上蔡説窮理只尋箇是處以恕為本窮理自是我不曉這道理所以要窮如何説得恕字窮理蓋是合下工夫恕則在窮理之後胡文定載顯道語云恕則窮理之要某理㑹安頓此語不得謝子尋箇是處之説甚好龜山説只反身而誠便天地萬物之理在我胡文定却言物物致竂宛轉歸已見雲雷知經綸見山下出泉知果行之類惟伊川言不可只窮一理亦不能徧窮天下萬物之理某謂須有先後緩急乆之亦要窮盡如正蒙是盡窮萬物之理問物物致察與物物而格何别曰文定所謂物物致察只求之於外如所謂察天行以自強察地勢以厚徳祇因其物之如是而求之耳初不知天如何而健地如何而順也道夫曰所謂宛轉歸己此等言語似失之巧曰若宛轉之説則是理本非己有乃強委曲牽合使他入來爾許多説只有上蔡所謂窮理只是尋箇是處為得之道夫曰龜山反身而誠之説只是摹空説了曰都無一箇著實處道夫曰却似甚快曰若果如此則聖賢都易做了又問他既如此説其下工夫時亦須有箇窒礙曰也無做處如龜山於天下事極明得如言治道與官府政事至纎至細處亦曉得到這裏却恁説次第他把來做兩截看了五峯説格物立志以定其本居敬以持其志志立乎事物之表敬行乎事物之内而知乃可精者這段語本説得極精然却有病者只説得向裏來不曽説得外面所以語意頗傷急迫蓋致知本是廣大須用説得表裏内外周徧兼該方得其曰志立乎事物之表敬行乎事物之内此語極好而曰而知乃可精便有局蹙氣象他便要就這裏便精其知殊不知致知之道不如此急迫須是寛其程限大其度量乆乆自然通貫他言語只説得裏面一邊極精遺了外面一邊所以其規摹之大不如程子且看程子所説今日格一件明日格一件積乆自然貫通此言該内外寛緩不迫有涵泳從容之意所謂語小天下莫能破語大天下莫能載也諸公致知格物之説皆失了伊川意此正是入門款於此既差則他可知矣所謂誠其意者毋自欺也如惡惡臭如好好色此之謂自謙故君子必慎其獨也好惡上字皆去聲謙讀為慊苦劫反誠其意者自脩之首也毋者禁止之辭自欺云者知為善以去惡而心之所發有未實也慊快也足也獨者人所不知而已所獨知之地也言欲自修者知為善以去其惡則當實用其力而禁止其自欺使其惡惡則如惡惡臭好善則如好好色皆務決去而求必得之以自快足於己不可徒苟且以狥外而為人也然其實與不實蓋有他人所不及知而已獨知之者故必謹之於此以審其幾焉小人閒居為不善無所不至見君子而后厭然揜其不善而著其善人之視己如見其肺肝然則何益矣此謂誠於中形於外故君子必慎其獨也間音閑厭鄭氏讀為黶間居獨處也厭然消沮閉藏之貌此言小人隂為不善而陽欲揜之則是非不知善之當為與惡之當去也但不能實用其力以至此耳然欲揜其惡而卒不可揜欲詐為善而卒不可詐則亦何益之有哉此君子所以重以為戒而必謹其獨也曾子曰十目所視十手所指其嚴乎引此以明上文之意言雖幽獨之中而其善惡之不可揜如此可畏之甚也富潤屋徳潤身心廣體胖故君子必誠其意胖歩丹反胖安舒也言富則能潤屋矣徳則能潤身矣故心無愧作則廣大寛平而體常舒泰徳之潤身者然也蓋善之實於中而形於外者如此故又言此以結之或問六章之指其詳猶有可得而言者邪曰天下之道二善與惡而已矣然揆厥所元而循其次第則善者天命所賦之本然惡者物欲所生之邪穢也是以人之常性莫不有善而無惡其本心莫不好善而惡惡然既有是形體之累而又為氣禀之拘是以物欲之私得以蔽之而天命之本然者不得而著其於事物之理故有瞢然不知其善惡之所在者亦有僅識其粗而不能真知其可好可惡之極者夫不知善之真可好則其好善也雖曰好之而未能無不好者以拒之於内不知惡之真可惡則其惡惡也雖曰惡之而未能無不惡者以挽之於中是以不免於苟焉以自欺而意之所發有不誠者夫好善而不誠則非惟不足以為善而反有以賊乎其善惡惡而不誠則非惟不足以去惡而適所以長乎其惡是則其為害也徒有甚焉而何益之有哉聖人於此蓋有憂之故為大學之教而必首之以格物致知之目以開明其心術使既有以識夫善惡之所在與其可好可惡之必然矣至此而復進之以必誠其意之説焉則又欲其謹之於幽獨隱微之奥以禁止其苟且自欺之萌而凡其心之所發如曰好善則必由中及外無一豪之不好也如曰惡惡則必由中及外無一毫之不惡也夫好善而中無不好則是其好之也如好好色之真欲以快乎己之目初非為人而好之也惡惡而中無不惡則是其惡之也如惡惡臭之真欲以足乎己之鼻初非為人而惡之也所發之實既如此矣而須臾之頃纎芥之微念念相承又無敢少有間斷焉則庶乎内外昭融表裏澄徹而心無不正身無不修矣若彼小人幽隱之間實為不善而猶欲外託於善以自蓋則亦不可謂其全然不知善惡之所在但以不知其真可好惡而又不能謹之於獨以禁止其苟且自欺之萌是以淪陷至於如此而不自知耳此章之説其詳如此是固宜為自修之先務矣然非有以開其知識之真則不能有以致其好惡之實故必曰欲誠其意者先致其知又曰知至而后意誠然猶不敢恃其知之已至而聼其所自為也故又曰必誠其意必謹其獨而毋自欺焉則大學功夫次第相承首尾為一而不假他術以雜乎其閒亦可見矣彼此皆然今不復重出也曰然則慊之為義或以為少又以為恨與此不同何也曰慊之為字有作嗛者而字書以為口銜物也然則慊亦但為心有所銜之義而其為快為足為恨為少則以所銜之異而别之耳孟子所謂慊於心樂毅所謂慊於志則以銜其快與足之意而言者也孟子所謂吾何慊漢書所謂嗛栗姬則以銜其恨與少之意而言者也讀者各隨所指而觀之則既並行而不悖矣字書又以其訓快與足者讀與惬同則義愈明而音又異尤不患於無别也問格物知至了如何到誠意又説毋自欺也毋者禁止之辭曰物既格知既至到這裏方可著手下工夫不是物格知至了下面許多一齊掃了若如此却不消説下面許多看下面許多篩篩有工夫問劉棟看大學自欺之説如何曰不知義理却道我知義理是自欺先生曰自欺是箇半知半不知底人知道善我所當為却又不十分去為善知道惡不可作却又是自家所愛舍他不得這便是自欺不知不識只喚做不知不識却不喚做自欺或問誠其意者毋自欺先生曰譬如一塊物外面是銀裏面是鐵便是自欺須是表裏如一便是不自欺然所以不自欺須是見得分曉譬如今人見鳥喙之不可食知水火之不可蹈則自不食不蹈如寒之欲衣飢之欲食則自是不能己今人果見得分曉如鳥喙之不可食水火之不可蹈見善如飢之欲食寒之欲衣則此意自是實矣自欺非是心有所慊蓋外面雖為善事其中却是不然乃自欺也而今説自欺未説到與人説時方謂之自欺只是自家知得善好要為善然心中却覺得微有些没緊要㡳意思便是自欺便是虚偽不實矣正如金已是真金了只是鍜鍊得微不熟微有些查滓去不盡顔色或白或青或黄便不是十分精金問自慊先生云人之為善須是十分真實為善方是自慊若有六七分為善又有兩三分為惡底意思在裏面相牽便是不自慊須是如惡惡臭好好色方是自慊之慊大意與孟子行有不慊相類細思亦㣲有不同孟子慊訓滿足意多大學訓快意多横渠云自慊不足以合天心初看亦只一般然横渠亦是訓足底意思多字有同一義而二用者慊字訓足也我何慊乎哉彼心中不以彼之富貴而懐不足也行有不慊於心謂義須充足於中不然則餒也如忍之一字自容忍而為善者言之則為忍去忿慾之氣自殘忍而為惡者言之則為忍去了惻隱之心慊字一從口如胡孫兩嗛皆本虚著懐藏何物於内耳如銜字或為銜恨或為銜恩亦同此義誠意十分為善有一分不好底意思潛發以間於其間此意一發便由斜徑以長這箇却是實前面善意却是虚矣如見孺子入井救之是好意其間便有些要譽底意思以雜之如薦好人是善意便有些要人徳之之意隨後生來治惡人是好意便有狠疾之意隨後來前面好意都成虚了如姤卦上五文皆陽下面只是一隂生五陽便立不住誠與不誠自慊與自欺只爭這些子毫髪之閒耳又曰自慊則一自欺則二自慊者外面如此中心也是如此表裏一般自欺者外面如此做中心其實有些子不願外面且要人道好只此便是二心誠偽之所由分也知之不至則不能謹獨亦不肯謹獨知至者見得實是實非灼然如此而必戰懼以終之此所謂能謹獨也如顔子請事斯語曽子戰戰兢兢終身而後己彼豈知之不至必如此方意誠蓋無故心底聖賢惟聖罔念作狂一毫少不謹懼則已墮於意欲之私矣此聖人教人徹上徹下不出一敬字也蓋知至而後意誠則知至之後意已誠矣猶恐隱微之閒有所不實又必提掇而謹之使無毫髪妄馳則表裏隱顯無一不實而自快慊也知至而後意誠已有八分恐有照管不到故曰謹獨誠意章上云必慎其獨者欲其自慊也下云必慎其獨者防其自欺也致知者誠意之本也慎獨者誠意之助也致知則意已誠七八分了只是猶恐隱微幽獨處尚有些子未誠實故其要在謹獨大學看來雖只恁地滔滔地説去然段段致戒如一下水船相似也要舵也要楫誠意只是表裏如一若外面白裏面黒便非誠意凡惡惡之不實為善之不勇外然而中實不然或有所為而為之或始勤而終怠或九分為善内有一分苟且之心皆不實而自欺之患也所謂誠其意者表裏内外徹底皆如此無纎毫絲髪苟且為人之弊如飢之必欲食渴之必欲飲皆自以求飽足於己而已非為他人而食飲也又如一盆水徹底皆清瑩無一毫砂石之雜如此則其好善也必誠好之惡惡也必誠惡之而無一毫勉強自欺之雜所以説自慊但自滿足而已豈有待於外哉是故君子謹其獨非特顯明之處是如此雖至微至隱人所不知之地亦常謹之小處如此大處亦如此顯明處如此隱微處亦如此表裏内外精粗隱顯無不謹之方謂之誠其意謂誠意者須是隱微顯明小大表裏都一致方得誠於中形於外那箇形色氣貌之見於外者自别決不能欺人祗自欺而已這樣底永無縁做得好人為其無為善之地也外面一副當雖好然裏面却踏空永不足以為善敬子問所謂誠其意者毋自欺也注云外為善而中實未能免於不善之雜某意欲改作外為善而中實容其不善之雜如何蓋所謂不善之雜非是不知是知得了又容著在這裏是不柰他何了不能不自欺曰公合下認錯了只管説箇容字不是如此容字又是第二節縁不柰何所以容在這裏荀子曰心卧則夢偷則自行使之則謀蓋偷心是不知不覺自走去底不由自家使㡳倒要自家去捉他使之則謀這却是好底心由自家使底又引中庸論誠處而曰一則誠雜則偽只是一箇心便是誠纔有兩箇心便是自欺好善如好好色惡惡如惡惡臭它徹底只是這一箇心所以謂之自慊若纔有些子間雜便是兩箇心便是自欺如自家欲為善後面又有箇心在這裏拗你莫去為善欲惡惡又似有箇人在這裏拗你莫要惡惡此便是自欺如人説十句話九句實一句脱空那九句實底被這一句脱空底都壊了如十分金徹底好方謂之真金若有一分銀便和那九分底也壊了又曰佛家看此亦甚精被他分折得項數多如云有十二因縁只是一心之發便被他推尋得許多察得來極精微又有所謂流注想他最伯這箇所以溈山禪師云某參禪幾年了至今不曽斷得這流注想此即荀子所謂偷則自行之心也次早又曰昨夜思量敬子之言自是但傷雜耳某之言却即説得那箇自欺之根自欺却是敬子容字之意容字却説得是蓋知其為不善之雜而又蓋庇以為之此方是自欺看來如好好色如惡惡臭一段便是連那毋自欺也説言人之毋自欺時便要如好好色如惡惡臭樣方得若好善不如好好色惡惡不如惡惡臭此便是自欺毋自欺者謂如為善若有此自欺時便當斬根去之真箇是如惡惡臭始得如小人閒居為不善底一段便是自欺底只是反説閒居為不善便是惡惡不如惡惡臭見君子而後厭然揜其不善而著其善便是好善不如好好色若只如此看此一篇文義都貼實平易坦然無許多屈曲心廣體胖心本是闊大底物事只是因愧作了便卑狹便披他隔礙了只見得一邊所以體不能得舒泰問誠意章曽子曰十目所視正心廣體胖處先生曰十目所視十手所指不是怕人見蓋人雖不知而我已自知自是甚可惶恐了其與十目十手所視所指何以異哉意誠便全然在天理上行意未誠以前尚汩在人欲裏知至意誠是萬善之根右傳之六章釋誠意經曰欲誠其意者先致其知又曰知至而后意誠蓋心體之明有所未盡則其所發必有不能實用其力而苟焉以自欺者然或已明而不謹乎此則其所明又非已有而無以為進徳之基故此章之指必承上章而通考之然後有以見其用力之始終其序不可亂而功不可闕如此云所謂脩身在正其心者身有所忿懥則不得其正有所恐懼則不得其正有所好樂則不得其正有所憂患則不得其正程子曰身有之身當作心忿弗粉反懥敕值反好樂並去聲忿懥怒也蓋是四者皆心之用而人所不能無者然一有之而不能察則欲動情勝而其用之所行或不能不失其正矣心不在焉視而不見聽而不聞食而不知其味心有不存則無以撿其身是以君子必察乎此而敬以直之然後此心常存而身無不脩也此謂脩身在正其心或問人之有心本以應物而此章之傳以為有所喜怒憂懼便為不得其正然則其為心也必如槁木之不復生死灰之不復然乃為得其正邪曰人之一心湛然虚明如鑑之空如衡之平以為一身之主者固其真體之本然而喜怒憂懼隨感而應妍蚩俯仰因物賦形者亦其用之所不能無者也故其未感之時至虚至靜所謂鑑空衡平之體雖鬼神有不得窺其際者固無得失之可議及其感物之際而所應者又皆中節則其鑑空衡平之用流行不滯正大光明是乃所以為天下之逹道亦何不得其正之有哉惟其事物之來有所不察應之既或不能無失且又不能不與俱住則其喜怒憂懼必有動乎中者而此心之用始有不得其正者耳傳者之意固非以心之應物便為不得其正而必如枯木死灰然後乃為得其正也惟是此心之靈既曰一身之主苟得其正而無不在是則耳目鼻口四肢百骸莫不有所聽命以供其事而其動靜語黙出入起居惟吾所使而無不合於理如其不然則身在於此而心馳於彼血肉之軀無所管攝其不為仰面貪看鳥回頭錯應人者幾希矣孔子所謂操則存舍則亡孟子所謂求其放心從其大體者蓋皆謂此學者可不深念而屢省之哉到得正心時節已是煞好了只是就好裏面又有許多偏要緊最是誠意時節正是分别善惡最要著力所以重複説道必謹其獨若打得這關過已是煞好了到正心又怕於好上要偏去如水相似那時節已是淘去了濁十分清了又怕於清裏面有波浪動蕩處問忿懥恐懼憂患好樂皆不可有否曰四者豈得皆無但要得其正耳如中庸所謂喜怒哀樂發而中節者也問忿懥章先生云這心之正却如稱一般未有物時稱無不平纔把一物在上面便不平了鏡中先有一人在裏面了别一箇來便照不得這心未有物之時先有箇主張説道我要如何處事纔遇著事便以是心處之便是不正且如今人説是我做官要抑強扶弱及遇著當強底事也去抑他這便是不正問正心章云人心要當不容一物曰這説便是難纔説不容一物却又似一向全無相似只是這許多好樂恐懼忿懥憂患只要從無處發出不可先有在心下人心如一箇鏡先未有一箇影象有事物來方始照見妍醜若先有一箇影象在裏如何照得人心本是湛然虚明事物之來隨感而應自然見得髙下輕重事過便當依前恁地虚方得若事未來先有一箇忿懥好樂恐懼憂患之心在這裏及忿懥好樂恐懼憂患之事到來又以這心相與衮合便失其正事了又只管留在這裏如何得正大學七章看有所二字有所憂患憂患是合當有若因此一事而在胷中便是有有所忿懥因人之有罪而撻之才撻了其心便平是不有若此心常又不平便是有恐懼好樂亦然問伊川云忿懥恐懼好樂憂患人所不能無者但不以動其心既謂之忿懥憂患如何不牽動他心曰事有當怒當憂者但過了則休不可常留在心顔子未常不怒但不遷耳四者人不能無只是不要他留而不去如所謂有所則是被他為主於内心反為他動也心不可有一物外面酬酢萬變都只是隨其分限應去都不關自家心事纔係於物心便為其所動其所以係於物者有三或是事未來而自家先有這箇期待底心或事已應過去了又却長留在胷中不能忘或正應事之時意有偏重便只見那邊重這都是為物所係縛既為物所繫縛便是有這箇物事及别事來到面前應之便差了這如何會得其正聖人之心瑩然虚明無纎毫形迹一看事物之來若小若大四方八面莫不隨物隨應此心元不曽有這箇物事或問忿懥恐懼好樂憂患四者人之所不能無何以謂心不得其正曰四者心之所有但不可使之有所私爾纔有所私便不能化梗在胷中且如忿懥恐懼有當然者若定要他無直是用死方得但不可先有此心耳今人多是纔忿懥雖有可喜之事亦所不喜纔喜雖有當怒之事亦不復怒便是蹉過事理了便是視而不見聽而不聞食而不知其味了蓋這物事纔私便不去只管在胷中推盪終不消釋設使此心如太虚然則應接萬務各止其所而我無所與則便視而見聽而聞食而真知其味矣看此一段只是要人不可先有此心耳譬如衡之為器本所以平物也今若先有一物在上則又如何稱或問公私之别曰今小譬之譬如一事若係公衆便心下不大段管若係私己便只管横在胷中念念不忘只此便是公私之辨問七章謂喜怒憂懼人心所不能無如忿懥乃戾氣豈可有曰忿又重於怒然此處須看文勢大意但此心先有忿懥時這下面便不得其正如鏡有人形在裏面第二人來便照不得如稱子釘盤星上加一錢則稱一錢物便成兩錢重了心若先有怒時更有當怒底事便成兩分怒了有當喜底事來又減却半分喜了但先有好樂也如此先有憂患也如此若把忿懥做可疑則下面憂患好樂等皆可疑或問大學或問意既誠矣而心猶有動焉然後可以責其不正而復乎正是如何曰若是意未誠時只是一箇虚偽無實之人更問甚心之正與不正惟是意巳誠實然後方可見得忿懥恐懼好樂憂患有偏重處即便隨而正之也右傳之七章釋正心脩身此亦承上章以起下章蓋意誠則真無惡而實有善矣所以能存是心以檢其身然或但知誠意而不能密察此心之存否則又無以直内而脩身也自此以下並以舊文為正所謂齊其家在脩其身者人之其所親愛而辟焉之其所賤惡而辟焉之其所畏敬而辟焉之其所哀矜而辟焉之其所敖惰而辟焉故好而知其惡惡而知其美者天下鮮矣辟讀為僻惡而之惡敖好並去聲鮮上聲人謂衆人之猶於也辟猶偏也五者在人本有當然之則然常人之情惟其所向而不加審焉則必陷於一偏而身不脩矣故諺有之曰人莫知其子之惡莫知其苗之碩諺音彦碩叶韻時若反諺俗語也溺愛者不明貪得者無厭是則偏之為害而家之所以不齊也此謂身不脩不可以齊其家或問八章之辟舊讀為譬而今讀為僻何也曰舊音舊説以上章例之而不合也以下文逆之而不通也是以閒者竊以類例文意求之而得其説如此蓋曰人之常情於此五者一有所向則失其好惡之平而陷於一偏是以身有不脩不能齊其家耳蓋偏於愛則溺焉而不知其惡矣偏於惡則阻焉而不知其善矣是其身之所接好惡取舍之間将無一當於理者而況於閨門之内恩常掩義亦何以勝其情愛暱比之私而能有以齊之哉曰凡星五者皆身與物接所不能無而亦既有當然之則矣今曰一有所向便為偏倚而身不修則是必其接物之際此心漠然都無親踈之等尊賤之别然後得免於偏也且心既正矣則冝其身之無不修今乃猶有若是之偏何哉曰不然也此章之義實承上章其立文命意大抵相似蓋以為身與事接而後或有所偏非以為一與事接而必有所偏所謂心正而后身修亦曰心得其正乃能修身非謂此心一正則身不待檢而自修也曰親愛賤惡畏敬哀矜固人心之所宜有若夫敖惰則凶徳也曽謂本心而有如是之則哉曰敖之為凶徳也正以其先有是心不度所施而無所不敖爾若因人之可敖而敖之則是常情所宜有而事理之當然也今有人焉其親且舊未至於可親而愛也其位與徳未至於可畏而敬也其窮未至於可哀而其惡未至於可賤也其言無足去取而其行無足是非也則視之泛然如塗之人而已爾又其下者則夫子之取瑟而歌孟子之隱几而卧蓋亦因其有以自取而非吾故有敖之之意亦安得而遽謂之凶徳哉又況此章之指乃為慮其因有所重而陷於一偏者發其言雖曰有所敖惰而其意則正欲人之於此更加詳審雖曰所當敖惰而猶不敢肆其敖惰之心也亦何病哉或問正心章説忿懥恐懼好樂憂患與夫修身章説親愛賤惡畏敬哀矜敖惰如何曰是心卓然立乎此數者之外則平正而不偏辟自外來者必不能以動其中自内出者必不至於溺於彼或問畏敬如何曰如家人有嚴君焉吾之所當畏敬者也然當不義則爭之若過於畏敬而從其令則陷於偏矣若夫賤惡者固當賤惡然或有長處亦當知之下文所謂好而知其惡惡而知其美者天下鮮矣此是指㸃人偏處最切當問正心章既説忿懥四者而修身章又説之其所親愛之類是如何曰忿懥等是心與物接時事親愛等是身與物接時事親愛賤惡畏敬哀矜敖惰各自有當然之則只不可偏如人飢而食食纔過些子便是偏渇而飲飲纔過些子便是偏如愛其人之善若愛之過則不知其惡便是因其所重而陷於所偏惡惡亦然下面説人莫知其子之惡莫知其苗之碩上面許多偏病不除必至於此人之其所親愛而辟焉如父子是當主於愛然父有不義子不可以不爭如為人父雖是止於慈若一向辟將去則子有不肖亦不知責而教焉不可人之其所賤惡而辟焉人固自有一種可厭者然猶未至於可賤惡處或尚可教若一向辟將去便賤惡他也不得人之其所畏敬而辟焉如事君固是畏敬他然説大人則藐之又不甚畏敬也孟子此語雖稍麤然古人正救其惡與陳善閉邪責難於君也只管畏敬不得或問之其所親愛哀矜畏敬而辟焉莫是君子用心過於厚否先生曰此可将來觀過知仁處説不可将來此説蓋不必論近厚近薄大抵一切事只是才過便不得觀過知仁乃是因此見其用心之厚故可知其仁然過則終亦未是也大凡讀書須要先識認他本文是説箇甚麽須全做不曽識他相似虚心認他字字分明復更看數過自然會熟見得分明問齊家段辟作僻曰人情自有偏處所親愛莫如父母至於父母有當幾諫處豈可以親愛而忘正救所敬畏莫如君父至於所當直言正諫豈可専持敬畏而不敢言問敖惰惡徳也豈君子冝有曰讀書不可泥且當看其大意問人之其所親愛賤惡畏敬哀矜敖惰而辟焉章句曰人於五者本有當然之則竊謂則之為言法也性之所固有事之所當然而不可易者也然敖之與惰則氣習之所為實為惡徳非性之所有若比之四者而言則是性有善惡至若哀矜之形正良心苗裔偏於哀矜不失為仁徳之厚又何以為身不修而不可以齊其家者乎先生曰敖惰謂如孔子之不見孺悲孟子不與王驩言哀矜謂如有一般大姦大惡方欲治之被他哀鳴懇告却更恕之道夫曰這只是言流為姑息之意曰這便是哀矜之不得其正處問之其所敖惰而辟焉君子亦有敖惰於人者乎曰人自有苟賤可厭弃者問大學釋修身齊家章不言修身何也荅曰好而不知其惡惡而不知其美是以好為惡以曲為直可謂之修身乎問正心修身章後注云此亦當通上章推之蓋意或不誠則無能實用其力以正其心者竊謂意既能誠則復何所待於用力先生曰大學所以有許多節次正欲學者逐節用工非如一無節之竹使人才能格物則便到平天下也夫人蓋有意誠而心未正者故於忿懥恐懼等事誠不可不隨事而排遣也蓋有心正而身未修者故於好惡之間誠不可不隨人而節制也至於齊家以下皆是教人節節省察用功故經序但言心正者必自誠意而來修身者必自正心而來非謂意既誠而心無事乎正心既正而身無事乎修也大學如正心意已説盡了至修身章又從頭説起至齊家治國章又依前説教他何也蓋要節節去照管不成却説自家在這裏心正身修了便都只聽其自治右傳之八章釋脩身齊家所謂治國必先齊其家者其家不可教而能教人者無之故君子不出家而成教於國孝者所以事君也弟者所以事長也慈者所以使衆也弟去聲長上聲身脩則家可教矣孝弟慈所以脩身而教於家者也然而國之所以事君事長使衆之道不外乎此此所以家齊於上而教成於下也康誥曰如保赤子心誠求之雖不中不逺矣未有學養子而后嫁者也中去聲此引書而釋之又明立教之本不假強為在識其端而推廣之耳一家仁一國興仁一家讓一國興讓一人貪戾一國作亂其機如此此謂一言僨事一人定國僨音奮一人謂君也機發動所由也僨覆敗也此言教成於國之效堯舜帥天下以仁而民從之桀紂帥天下以暴而民從之其所令反其所好而民不從是故君子有諸己而后求諸人無諸己而后非諸人所藏乎身不恕而能喻諸人者未之有也好去聲此又承上文一人定國而言有善於己然後可以責人之善無惡於己然後可以正人之惡皆推己以及人所謂恕也不如是則所令反其所好而民不從矣喻曉也故治國在齊其家通結上文詩云桃之夭夭其葉蓁蓁之子于歸冝其家人冝其家人而后可以教國人夭平聲蓁音臻詩周南桃夭之篇夭夭少好貌蓁蓁美盛貌興也之子猶言是子此指女子之嫁者而言也婦人謂嫁曰歸冝猶善也詩云冝兄冝弟冝兄冝弟而后可以教國人詩小雅蓼蕭篇詩云其儀不忒正是四國其為父子兄弟足法而后民法之也詩曹風鳲鳩篇忒差也此謂治國在齊其家此三引詩皆以詠歎上文之事而又結之如此其味深長最冝潛玩孝者所以事君弟者所以事長慈者所以使衆此道理皆是我家裏做成了天下人看著自能如此不是我推之於國心誠求之者求赤子之所欲也於民亦當求其有不能自逹此是推其慈㓜之心以使衆也問有諸己而后求諸人先生云只從頭讀來便見得分曉這箇只是躬自厚而薄責於人攻其惡無攻人之惡或問有諸己而後求諸人無諸己而後非諸人先生曰此是退一歩説猶言温故知新而可以為人師以明未能如此則不可如此非謂温故知新便要求為人師也然此意正為治國者言必先治國禁人為惡而欲人為善便是求諸人非諸人然須是在已有善無惡方可求人非人也或問范忠宣以恕己之心恕人此語固有病但上文先言以責人之心責己則連下句亦未害先生曰上句自好下句自不好蓋纔説恕己便己不是若横渠云以愛己之心愛人則盡仁以責人之心責己則盡道語便不同蓋恕己與愛己字不同大凡知道君子發言自别近觀聖賢言語與後世人言語自不同此學者所以貴於知道也問所藏乎身不恕處恕字還只就接物上説如何曰是就接物上見得忠只是實心直是真實不偽到應接事物也只是推這箇心去直是忠方能恕若不忠便無本領了更把甚麽去及物程先生説道維天之命於穆不已忠也便是實理流行乾道變化各正性命恕也便是實理及物問恁地説又與夫子之道忠恕而已矣之忠恕相似曰只是一箇忠恕豈有二樣聖人與常人忠恕也不甚相逺治國章乃責人之恕平天下章乃愛人之恕因講禮讓為國曰一家仁一國興仁一家讓一國興讓自家禮讓有以感之故民亦如此興起自家好爭利却責民間禮讓如何得他應東坡䇿别敦教化中一段説得也好雖説得麤道理却是如此看道理不要𤣥妙只就麤處説得出便是如今官司不㑹制民之産民自去買田又取他牙稅錢古者羣飲者段今置官誘民飲酒惟恐其不來如何得民興於善問齊家治國之道斷然是父子兄弟足法而後人法之然堯舜不能化其子而周公則上見疑於君下不能和其兄弟是如何曰聖人是論其常堯舜是處其變看他烝烝又不格姦至於瞽瞍底豫便是他有以處那變處或問先吏部説有諸己而后求諸人無諸己而後非諸人曰這便是説尋常人若自家有諸己又何必求責於人攻其惡毋攻人之惡至於大學之説是有天下國家者勢不可以不責他然又須自家有諸己然後可以求人之善無諸己然後可以非人之惡范忠宣公恕己之心恕人這一句自好只是聖賢説恕不曽如是倒説了不若横渠説以責人之心責己愛己之心愛人則是見他人不善我亦當無是不善我有是善亦要他人有是善推此計度之心此乃恕也於己不當下恕字右傳之九章釋齊家治國所謂平天下在治其國者上老老而民興孝上長長而民興弟上恤孤而民不倍是以君子有絜矩之道也長上聲弟去聲倍與背同絜胡結反老老所謂老吾老也興謂有所感發而興起也孤者㓜而無父之稱絜度也矩所以為方也言此三者上行下效捷於影響所謂家齊而國治也亦可以見人心之所同而不可使有一夫之不獲矣是以君子必當因其所同推以度物使彼我之間各得分願則上下四旁均齊方正而天下平矣所惡於上毋以使下所惡於下毋以事上所惡於前毋以先後所惡於後毋以從前所惡於右毋以交於左所惡於左毋以交於右此之謂絜矩之道惡先並去聲此覆解上文絜短二字之義如不欲上之無禮於我則必以此度下之心而亦不敢以此無禮使之不欲下之不忠於我則必以此度上之心而亦不敢以此不忠事之至於前後左右無不皆然則身之所處上下四旁長短廣狹彼此如一而無不方矣彼同有是心而興起焉者又豈有一夫之不獲哉所操者約而所及者廣此平天下之要道也故章内之意皆自此而推之詩云樂只君子民之父母民之所好好之民之所惡惡之此之謂民之父母樂音洛只音紙好惡並去聲下並同詩小雅南山有臺之篇只語助辭言能絜矩而以民心為己心則是愛民如子而民愛之如父母矣詩云節彼南山維石巖巖赫赫師尹民具爾瞻有國者不可以不慎辟則為天下僇矣節讀為截辟讀為僻僇與戮同詩小雅節南山之篇節截然髙大貌師尹周大師尹氏也具俱也辟偏也言在上者人所瞻仰不可不謹若不能絜矩而好惡狥於一己之偏則身弑國亡為天下之大戮矣詩云殷之未喪師克配上帝儀監于殷峻命不易道得衆則得國失衆則失國喪去聲儀詩作冝峻詩作駿易去聲詩文王篇師衆也配對也配上帝言其為天下君而對乎上帝也監視也峻大也不易言難保也道言也引詩而言此以結上文兩節之意有天下者能存此心而不失則所以絜矩而與民同欲者自不能已矣是故君子先慎乎徳有徳此有人有人此有土有土此有財有財此有用先謹乎徳承上文不可不謹而言徳即所謂明徳有人謂得衆有土謂得國有國則不患無財用矣徳者本也財者末也本上文而言外本内末爭民施奪人君以徳為外以財為内則是爭鬬其民而施之以刼奪之教也蓋財者人之所同欲不能絜矩而欲專之則民亦起而爭奪矣是故財聚則民散財散則民聚外本内末故財聚爭民施奪故民散反是則有徳而有人矣是故言悖而出者亦悖而入貨悖而入者亦悖而出悖布内反悖逆也此以言之出入明貨之出入也自先謹乎徳以下至此又因財貨以明能絜矩與不能者之得失也康誥曰惟命不于常道善則得之不善則失之矣道言也因上文引文王詩之意而申言之其丁寜反覆之意益深切矣楚書曰楚國無以為寳惟善以為寳楚書楚語言不寳金玉而寳善人也舅犯曰亡人無以為寳仁親以為寳舅犯晉文公舅狐偃字子犯亡人文公時為公子出亡在外也仁愛也事見檀弓此兩節又明不外本而内末之意秦誓曰若有一个臣斷斷兮無他技其心休休焉其如有容焉人之有技若己有之人之彦聖其心好之不啻若自其口出寔能容之以能保我子孫黎民尚亦有利哉人之有技媢疾以惡之人之彦聖而違之俾不通寔不能容以不能保我子孫黎民亦曰殆哉个古賀反書作介斷丁亂反媢音冒秦誓周書斷斷誠一之貌彦美士也聖通明也尚庶幾也媢忌也違拂戾也殆危也唯仁人放流之迸諸四夷不與同中國此謂唯仁人為能愛人能惡人迸讀為屏古字通用迸猶逐也言有此媢疾之人妨賢而病國則仁人必深惡而痛絶之以其至公無私故能得好惡之正如此也見賢而不能舉舉而不能先命也見不善而不能退退而不能逺過也命鄭氏云當作慢程子云當作怠未詳孰是逺去聲若此者知所愛惡矣而未能盡愛惡之道蓋君子而未仁者也好人之所惡惡人之所好是謂拂人之性菑必逮夫身菑古灾字夫音扶拂逆也好善而惡惡人之性也至於拂人之性則不仁之甚者也自秦誓至此又皆以申言好惡公私之極以明上文所引南山有臺節南山之意是故君子有大道必忠信以得之驕泰以失之君子以位言之道謂居其位而修己治人之術發已自盡為忠循物無違謂信驕者矜髙泰者侈肆此因上所引文王康誥之意而言章内三言得失而語益加切蓋至此而天理存亡之幾決矣生財有大道生之者衆食之者寡為之者疾用之者舒則財恒足矣恒胡登反吕氏曰國無遊民則生者衆矣朝無倖位則食者寡矣不奪農時則為之疾矣量入為出則用之舒矣愚按此因有土有財而言以明足國之道在乎務本而節用非必外本内末而後財可聚也自此以至終篇皆一意也仁者以財發身不仁者以身發財發猶起也仁者散財以得民不仁者亡身以殖貨未有上好仁而下不好義者也未有好義其事不終者也未有府庫財非其財者也上好仁以愛其下則下好義以忠其上所以事必有終而府庫之財無悖出之患也孟獻子曰畜馬乗不察於雞豚伐冰之家不畜牛羊百乘之家不畜聚斂之臣與其有聚斂之臣寜有盗臣此謂國不以利為利以義為利也畜許六反乘斂並去聲孟獻子魯之賢大夫仲孫蔑也畜馬乘士切試為大夫者也伐冰之家卿大夫以上喪祭用冰者也百乘之家有采地者也君子寜亡己之財而不忍傷民之力故寜有盜臣而不畜聚斂之臣此謂以下釋獻子之言也長國家而務財用者必自小人矣彼為善之小人之使為國家菑害並至雖有善者亦無如之何矣此謂國不以利為利以義為利也長上聲彼為善之此句上下疑有闕文誤字自由也言由小人導之也此一節深明以利為利之害而重言以結之其丁寜之意切矣問平天下在治其國章曰此三節見上行下效理之必然又以見人心之所同是以君子有絜矩之道所以以己之心度人之心使皆得以自盡其興起之善心若不絜矩則雖躬行於上使彼有是興起之善心而不可得遂亦徒然也又曰因何恁地上行下效蓋人心之同然所以絜矩之道我要恁地也使彼有是心者亦得恁地全章大意只反覆説絜矩如專利於上急征横斂民不得以自養我這裏雖能興起其善心濟甚事若此類皆是不能絜矩問上老老而民興孝下面便接是以君子有絜矩之道也似不相續知何曰這箇便是相續絜矩是四面均平底道理教他各得老其老各得長其長各得㓜其㓜不成自家老其老教他不得老其老長其長教他不得長其長㓜其㓜教他不得㓜其㓜便不得上面説人心之所同者既如此是以君子見人之心與已之心同故必以己心度人之心使皆得其平下面方説所以絜矩問絜矩曰上之人老老長長恤孤則下之人興孝興弟不倍此是説上行下效到絜矩處是就政事上言若但興起其善心而不有以使之得遂其心則雖能興起終亦徒然如政煩賦重不得以養其父母又安得以遂其善心須是推己之心以及於彼使之仰足以事父母俯足以畜妻子方得如詩裏説大夫行役無期度不得以養其父母到得使下也須教他外無怨始得為國絜矩之大者又在於財用所以後面只管説財問前後左右何指先生曰譬如交代官相似前官之待我者既不善吾毋以前官之所以待我者待後政也左右如東鄰西鄰以鄰國為壑是所惡於左而以交於右也俗語所謂将心比心如此則各得其平矣問章句中所謂絜矩之道是使之各得盡其心而無不平也如何曰此是推本上老老而民興孝上長長而民興弟上恤孤而民不倍須是留那地位使人各得自盡其孝弟不倍之心如八十者其家不從政廢疾非人不養者一子不從政是使其各得自盡也又如生聚蕃息無令父子兄弟離散之類所謂絜矩者如以諸侯言之上有天子下有大夫天子擾我使我不得行其孝悌我亦當察此不可有以擾其大夫使大夫不得行其孝悌且如自家有一丈地左家有一丈地右家有一丈地左家侵著我五尺地是不矩我必去説他取我五尺我若侵著右家五尺地亦是不矩合當還右家只是上也方下也方左也方右也方前也方後也方不相侵越亞夫曰務使上下四方一齊方不侵過他人地歩曰然問論平天下而言財利者何也荅曰天下之所以不平者皆因此也問絜矩之道是廣其仁之用否先生曰此乃求仁工夫此處正要著力若仁者則是舉而措之不待絜矩而自無不平者矣問盡得絜矩是仁之道恕之道曰未可説到那裏且理㑹絜矩是如何曰此是我不欲人之加諸我吾亦欲無加諸人意否曰此是兩人須把三人看便見人莫不有在我之上者莫不有在我之下者如親在我之上子孫在我之下我欲子孫孝於我而我却不能孝於親我欲親慈於我而我却不能慈於子孫便是一畔長一畔短不是絜矩君子先慎乎徳一條徳便是明徳之徳自家若意誠心正身修家齊了則天下之人安得不歸於我如湯武之東征西怨則自然有人有土斷斷者是絜矩媢疾者是不能唯仁人放流之是大能絜矩底人見賢而不能舉舉而不能先是稍能絜矩好人之所惡者是大不能絜矩問仁者以財發身曰不是特地散財以取名買數人來奉己只是不私其有則人自歸之而身自尊只是言其散財之效如此問未有上好仁而下不好義如何上仁而下便義曰這只是一箇在上便喚做仁在下便喚做義在父便謂之慈在子便謂之孝真卿曰也只如孝慈則忠曰然如食禄之家又畜雞豚牛羊却是與民爭利便是不絜矩所以道以義為利者義以方外也問絜矩以好惡財用媢疾彦聖為言何也荅曰如桑𢎞羊聚許多財以奉武帝之好若是絜矩底人必思許多財物必是侵過著民底滿得我好民必惡言財用者蓋如自家在一郷之閒却專其利便是侵過著他底便是不絜矩言媢疾彦聖者蓋有善人則合當舉之使之各得其所今則不舉他便失其所是侵善人之分便是不絜矩此特言其好惡財用之類當絜矩事事亦當絜矩問自致知至於平天下其道至備其節目至詳且悉而反覆於終篇者乃在於財利之説得非義利之辨其事尤難而至善之止於此尤不可不謹歟曰此章大㮣是專從絜矩上來蓋財者人之所同好也而我欲專其利則民有不得其所好者矣大扺有國有家所以生起禍亂皆是從這裏來道夫云古注絜音户結反云結也曰作結字解亦自得蓋荀子莊子注云絜圍束也是将一物圍束以為之則也又曰某十二三歲時見范文正所言如此他甚自喜以為先儒所未甞到也右傳之十章釋治國平天下此章之義務在與民同好惡而不專其利皆推廣絜矩之意也能如是則親賢樂利各得其所而天下平矣凡傳十章前四童統論綱領指趣後六章細論條目功夫其第五章乃明善之要第六章乃誠身之本在初學尤為當務之急讀者不可以其近而忽之也大學集編卷下欽定四庫全書中庸章句序宋真德秀撰中庸何為而作也子思子憂道學之失其傳而作也蓋自上古聖神繼天立極而道統之傳有自來矣其見於經則允執厥中者堯之所以授舜也人心惟危道心惟微惟精惟一允執厥中者舜之所以授禹也堯之一言至矣盡矣而舜復益之以三言者則所以明夫堯之一言必如是而後可庶㡬也蓋嘗論之心之虛靈知覺一而已矣而以為有人心道心之異者則以其或生於形氣之私或原於性命之正而所以為知覺者不同是以或危殆而不安或微妙而難見耳然人莫不有是形故雖上智不能無人心亦莫不有是性故雖下愚不能無道心二者雜於方寸之間而不知所以治之則危者愈危微者愈微而天理之公卒無以勝夫人欲之私矣精則察夫二者之間而不雜也一則守其本心之正而不離也從事於斯無少間斷必使道心常為一身之主而人心每聽命焉則危者安微者著而動靜云為自無過不及之差矣夫堯舜禹天下之大聖也以天下相傳天下之大事也以天下之大聖行天下之大事而其授受之際丁寧告戒不過如此則天下之理豈有以加於此哉自是以來聖聖相承若成湯文武之為君臯陶伊傅周召之為臣既皆以此而接夫道統之傳若吾夫子則雖不得其位而所以繼徃聖開來學其功反有賢於堯舜者當是時見而知之者惟顔氏曽氏之傳得其宗及曽氏之再傳而復得夫子之孫子思則去聖逺而異端起矣子思懼夫愈乆而愈失其真也於是推本堯舜以來相傳之意質以平日所聞父師之言更互演繹作為此書以詔後之學者蓋其憂之也深故其言之也切其慮之也逺故其説之也詳其曰天命率性則道心之謂也其曰擇善固執則精一之謂也其曰君子時中則執中之謂也世之相後千有餘年而其言之不異如合符節歴選前聖之書所以提挈綱維開示藴奥未有若是其明且盡者也自是而又再傳以得孟氏為能推明是書以承先聖之統及其沒而遂失其傳焉則吾道之所寄不越乎言語文字之間而異端之説日新月盛以至於老佛之徒出則彌近理而大亂真矣然而尚幸此書之不泯故程夫子兄弟者出得有所考以續夫千載不傳之緒得有所據以斥夫二家似是之非蓋子思之功於是為大而微程夫子則亦莫能因其語而得其心也惜乎其所以為説者不傳而凡石氏之所輯録僅出於其門人之所記是以大義雖明而微言未析至其門人所自為説則雖頗詳盡而多所發明然倍其師説而淫於老佛者亦有之矣熹自早嵗即嘗受讀而竊疑之沈潛反復蓋亦有年一旦恍然似有以得其要領者然後乃敢會衆説而折其中既為定著章句一篇以竢後之君子而一二同志復取石氏書刪其繁亂名以輯略且記所嘗論辨取舎之意别為或問以附其後然後此書之㫖支分節解脉絡貫通詳略相因巨細畢舉而凡諸説之同異得失亦得以曲暢旁通而各極其趣雖於道統之傳不敢妄議然初學之士或有取焉則亦庶乎行逺升髙之一助云爾淳熙已酉春三月戊申新安朱熹序中庸章句序
