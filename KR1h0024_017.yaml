body:
  text: 欽定四庫全書孟子集編卷一宋真徳秀撰梁惠王章句下凡七章孟子見梁惠王梁惠王魏侯罃也都大梁僣稱王諡曰惠史記惠王三十五年卑禮厚幣以招賢者而孟軻至梁王曰叟不逺千里而來亦將有以利吾國乎孟子對曰王何必曰利亦有仁義而已矣仁者心之徳愛之理義者心之制事之宜也王曰何以利吾國大夫曰何以利吾家士庶人曰何以利吾身上下交征利而國危矣萬乘之國弑其君者必千乘之家千乘之國弑其君者必百乘之家萬取千焉千取百焉不為不多矣苟為後義而先利不奪不饜乘去聲饜於豔反此言求利之害以明上文何必曰利之意也征取也上取乎下下取乎上故曰交征國危謂將有弑奪之禍乘車數也萬乘之國者天子畿内地方千里出車萬乘千乘之家者天子之公卿采地方百里出車千乘也千乘之國諸侯之國百乘之家諸侯之大夫也弑下殺上也饜足也言臣之於君每十分而取其一分亦已多矣若有以義為後而以利為先則不弑其君而盡奪之其心未肯以為足也未有仁而遺其親者也未有義而後其君者也此言仁義未嘗不利以明上文亦有仁義而已之意也遺猶棄也後不急也言仁者必愛其親義者必急其君故人君躬行仁義而無求利之心則其下化之自親戴於已也王亦曰仁義而已矣何必曰利重言之以結上文兩節之意此章言仁義根於人心之固有天理之公也利心生於物我之相形人欲之私也循天理則不求利而自無不利循人欲則求利未得而害已隨之所謂豪釐之差千里之繆此孟子之書所以造端託始之深意學者所宜精察而明辨也或問人之所以為性者五而獨舉仁義何也曰天地之所以生物者不過乎陰陽五行實一陰陽也故人之所以為性者雖有仁義禮智信之殊然曰仁義則其大端已舉矣曰然則其或主於愛或主於宜而所施亦有君親之不同何也曰仁者人也其發則專主於愛而愛莫切於愛親故人仁則必不遺其親矣義者宜也其發則事皆得其宜而所宜者莫大於尊君故人義則必不後其君矣曰子謂仁義未嘗不利則是所謂仁義者乃所以為求利之資乎曰不然也仁義天理之自然也居仁由義循天理而不得不然也然仁義得於此則君臣父子之間以至於天下之事自然無一物之不得其所者而初非有求利之心也易所謂利者義之和者正謂此爾曰然則孟子何不以是為言也曰仁義固無不利矣然以是為言則人之為仁義也不免有求利之心焉一有求利之心則利不可得而害至矣此孟子所以拔本塞源而救其弊地心之制亦是就義之全體處説事之宜是千條萬緒各有所宜處説事之宜非是就在外之事説看甚麽事來這裏而便有箇宜處這便是義問心之徳愛之理俱以體言心之制事之宜俱以用言否曰心之徳是渾淪説愛之理方説到親切處心之制却是説義之體程子所謂處物為義是也揚雄言義以宜之韓愈言行而宜之之謂義若以義為宜則義有在外意思湏知程子言處物為義者在心而非外也事之宜雖若在外然所以制其宜則在心也所謂事之宜方是指那事物當然之理未說到處置合冝處聖賢之言所以要辨别敎分明但要向義邊一直去更不通商量第二著纔說義乃所以為利固是義有大利存焉若行義時便說道有利則是心便傾邪向那邊去故孟子云云董仲舒亦分明說不謀其利不計其功孟子七篇以仁義為首此造端託始之深意也伊川有曰孔子言仁未嘗兼義獨扵易曰立人之道曰仁與義而孟子言仁必以義配可謂有功扵聖門矣又曰孟子初見梁恵王恵王首以利國為問盖自春秋至扵戰國先王之道不明人心陷溺惟知有利而已孟子將以攻其邪心故直告之曰王何必曰利亦有仁義而已矣仁者本心之全徳義者當然之正理為國者當躬行仁義扵上不可以利為心若王欲自利其國則大夫亦欲利其家士庶人亦欲利其身上下爭相求利國安得不危盖以仁義為本是導民扵理也以利為尚是導民扵欲也理明則尊卑上下之分定不然凡有血氣者皆思自足其欲非盡攘上之所有不已也扵是簒弑之事興其害有不勝計者吁可畏哉故重言之曰王何必曰利亦有仁義而已矣大學末章論天下之平曰國以義為利而不以利為利推言求利之弊至菑害並至雖有善者亦末如之何也矣衍義孟子見梁恵王王立於沼上顧鴻鴈麋鹿曰賢者亦樂此乎樂音洛篇内同沼池也鴻雁之大者麋鹿之大者孟子對曰賢者而後樂此不賢者雖有此不樂也此一章之大指詩云經始靈臺經之營之庶民攻之不日成之經始勿亟庶民子来王在靈囿麀鹿攸伏麀鹿濯濯白鳥鶴鶴王在靈沼於牣魚躍文王以民力為臺為沼而民歡樂之謂其臺曰靈臺謂其沼曰靈沼樂其有麋鹿魚鼈古之人與民偕樂故能樂也亟音棘麀音憂鶴詩作翯户角反於音烏此引詩而釋之以明賢者而後樂此之意詩大雅靈䑓之篇經量度也靈䑓文王臺名也營謀為也攻治也不日不終日也亟速也言文王戒以勿亟也子来如子来趋父事也靈囿靈沼臺下有囿囿中有沼也麀牝鹿也伏安其所不驚動也濯濯肥澤貌鶴鶴潔白貎於歎美辭牣滿也孟子言文王雖用民力而民反歡樂之既加以美名而又樂其所有盖由文王能愛其民故民樂其樂而文王亦得以享其樂也湯誓曰時日害喪予及女偕亡民欲與之偕亡雖有臺池鳥獸豈能獨樂哉害音曷䘮去聲女音汝此引書而釋之以明不賢者雖有此不樂之意也湯誓商書篇名時是也日指夏桀害何也桀嘗自言吾有天下如天之有日日亡吾乃亡耳民怨其虐故因其自言而目之曰此日何時亡乎若亡則我寕與之俱亡盖欲其亡之甚也孟子引此以明君獨樂而不恤其民則民怨之而不能保其樂也梁恵王曰寡人之於國也盡心焉耳矣河内凶則移其民於河東移其粟於河内河東凶亦然察鄰國之政無如寡人之用心者鄰國之民不加少寡人之民不加多何也寡人諸侯自稱言寡徳之人也河内河東皆魏地凶嵗不熟也移民以就食移粟以給其老稚之不能移者孟子對曰王好戰請以戰喻填然鼔之兵刃既接棄甲曳兵而走或百步而後止或五十步而後止以五十步笑百步則何如曰不可直不百步耳是亦走也曰王如知此則無望民之多於鄰國也好去聲填音田填鼔音也兵以鼓進以金退直猶但也言此以譬鄰國不恤其民恵王能行小恵然皆不能行王道以養其民不可以此而笑彼也楊氏曰移民移粟荒政之所不廢也然不能行先王之道而徒以是為盡心焉則末矣不違農時穀不可勝食也數罟不入洿池魚鼈不可勝食也斧斤以時入山林材木不可勝用也穀與魚鼈不可勝食材木不可勝用是使民養生䘮死無憾也養生喪死無憾王道之始也勝音升數音促罟音古洿音烏農時謂春耕夏耘秋收之時凡有興作不違此時至冬乃役之也不可勝食言多也數宻也罟網也洿窊下之地水所聚也古者網罟必用四寸之目魚不滿尺市不得鬻人不得食山林川澤與民共之而有厲禁草木零落然後斧斤入焉此皆為治之初法制未備且因天地自然之利而撙節愛養之事也然飲食宮室所以養生祭祀棺槨所以送死皆民所急而不可無者今皆有以資之則人無所恨矣王道以得民心為本故以此為王道之始五畝之宅樹之以桑五十者可以衣帛矣雞豚狗彘之畜無失其時七十者可以食肉矣百畝之田勿奪其時數口之家可以無飢矣謹庠序之教申之以孝悌之義頒白者不負戴於道路矣七十者衣帛食肉黎民不飢不寒然而不王者未之有也衣去聲畜勑六反數去聲王去聲凡有天下者人稱之曰王則平聲據其身臨天下而言曰王則去聲後皆放此五畝之宅一夫所受二畝半在田二畝半在邑田中不得有木恐妨五穀故扵牆下植桑以供蠶事五十始衰非帛不暖未五十者不得衣也畜養也時謂孕字之時如孟春犧牲毋用牝之類也七十非肉不飽未七十者不得食也百畝之田亦一夫所受至此則經界正井地均無不受田之家矣庠序皆學名也申重也丁寕反覆之意善事父母為孝善事兄長為悌頒與斑同老人頭半白黒者也負任在背戴任在首夫民衣食不足則不暇治禮義而飽暖無教則又近扵禽獸故既富而教以孝悌則人知愛親敬長而代其勞不使之負戴扵道路矣衣帛食肉但言七十舉重以見輕也黎黒也黎民黒髮之人猶秦言黔首也少壯之人雖不得衣帛食肉然亦不至扵飢寒也此言盡法制品節之詳極財成輔相之道以左右民是王道之成也狗彘食人食而不知檢塗有餓莩而不知𤼵人死則曰非我也歳也是何異於刺人而殺之曰非我也兵也王無罪歳斯天下之民至焉莩平表反刺七亦反檢制也莩餓死人也𤼵𤼵倉廪以賑貸也歳謂嵗之豐凶也恵王不能制民之産又使狗彘得以食人之食則與先王制度品節之意異矣至扵民飢而死猶不知𤼵則其所移特民間之粟而已乃以民不加多歸罪扵歳凶是知刄之殺人而不知操刄者之殺人也不罪嵗則必能自反而益修其政天下之民至焉則不但多扵鄰國而已程子曰孟子之論王道不過如此可謂實矣又曰孔子之時周室雖微天下猶知尊周之為義故春秋以尊周為本至孟子時七國爭雄天下不復知冇周而生民之塗炭已極當是時諸侯能行王道則可以王矣此孟子所以勸齊梁之君也盖王者天下之義主也聖賢亦何心哉觀天命之改與未改耳梁恵王曰寡人願安承教承上章言願安意以受教孟子對曰殺人以梃與刄有以異乎曰無以異也梃徒頂反梃杖也以刄與政有以異乎曰無以異也孟子又問而王荅也曰庖有肥肉廏有肥馬民有飢色野有餓莩此率獸而食人也厚斂扵民以養禽獸而使民飢以死則無異扵驅獸以食人矣獸相食且人惡之為民父母行政不免於率獸而食人惡在其為民父母也惡之之惡去聲惡在之惡平聲君者民之父母也惡在猶言何在也仲尼曰始作俑者其無後乎為其象人而用之也如之何其使斯民飢而死也俑音勇為去聲俑從葬木偶人也古之葬者束草為人以為從衞謂之芻靈畧似人形而已中古易之以俑則冇靣目機𤼵而太似人矣故孔子悪其不仁而言其必無後也孟子言此作俑者但用象人以葬孔子猶悪之况實使民飢而死乎李氏曰為人君者固未嘗有率獸食人之心然徇一已之欲而不恤其民則其流必至扵此故以為民父母告之夫父母之扵子為之就利避害未嘗頃刻而忘扵懐何至視之不如犬馬乎梁恵王曰晉國天下莫強焉叟之所知也及寡人之身東敗於齊長子死焉西喪地於秦七百里南辱於楚寡人恥之願比死者一洒之如之何則可長上聲䘮去聲比必二反洒與洗同魏本晉大夫魏斯與韓氏趙氏共分晉地號曰三晉故恵王猶自謂晉國恵王三十年齊擊魏破其軍擄太子申十七年秦取魏少梁後魏又數獻地扵秦又與楚將昭陽戰敗亡其七邑比猶為也言欲為死者雪其恥也孟子對曰地方百里而可以王百里小國也然能行仁政則天下之民歸之矣王如施仁政於民省刑罰薄稅斂深耕易耨壯者以暇日脩其孝悌忠信入以事其父兄出以事其長上可使制梃以撻秦楚之堅甲利兵矣省所梗反斂易皆去聲耨奴豆反長上聲省刑罰薄稅斂此二者仁政之大目也易治也耨耘也盡已之謂忠以實之謂信君行仁政則民得盡力扵農畝而又有暇日以修禮義是以尊君親上而樂扵效死也彼奪其民時使不得耕耨以養其父母父母凍餓兄弟妻子離散養去聲彼謂敵國也彼陷溺其民王往而征之夫誰與王敵夫音扶陷陷扵阱溺溺扵水暴虐之意征正也以彼暴虐其民而率吾尊君親上之民往正其罪彼民方怨其上而樂歸扵我則誰與我為敵哉故曰仁者無敵王請勿疑仁者無敵盖古語也百里可王以此而已恐王疑其迂濶故勉使勿疑也孔氏曰恵王之志在扵報怨孟子之論在扵救民所謂唯天吏則可以伐之盖孟子之本意孟子見梁襄王㐮王恵王子名赫出語人曰望之不似人君就之而不見所畏焉卒然問曰天下惡乎定吾對曰定于一語去聲卒七沒反悪平聲語告也不似人君不見可畏言其無威儀也卒然急遽之貌盖容貌辭氣乃徳之符其外如此則其中之所存者可知王問列國分爭天下當何所定孟子對以必合于一然後定也孰能一之王問也對曰不嗜殺人者能一之嗜甘也孰能與之王復問也與猶歸也對曰天下莫不與也王知夫苗乎七八月之間旱則苗槁矣天油然作雲沛然下雨則苗浡然興之矣其如是孰能禦之今夫天下之人牧未有不嗜殺人者也如有不嗜殺人者則天下之民皆引領而望之矣誠如是也民歸之由水之就下沛然誰能禦之夫音扶浡音勃由當作猶古字借用後多放此周七八月夏五六月也油然雲盛貌沛然雨盛貌浡然興起貌禦禁止也人牧謂牧民之君也領頸也盖好生悪死人心所同故人君不嗜殺人則天下恱而歸之蘇氏曰孟子之言非苟為大而已然不深原其意而詳究其實未有不以為迂者矣予觀孟子以来自漢髙祖及光武及唐太宗及宋太祖皇帝能一天下者四君皆以不嗜殺人致之其餘殺人愈多而天下愈亂秦晉及隋力能合之而好殺不已故或合而復分或遂以亾國孟子之言豈偶然而已哉齊宣王問曰齊桓晉文之事可得聞乎齊宣王姓田氏名辟疆諸侯僣稱王也齊桓公晉文公皆霸諸侯者孟子對曰仲尼之徒無道桓文之事者是以後世無傳焉臣未之聞也無以則王乎道言也董子曰仲尼之門五尺童子羞稱五伯為其先詐力而後仁義也亦此意也以巳通用無已必欲言之而不止也王謂王天下之道曰徳何如則可以王矣曰保民而王莫之能禦也保愛䕶也曰若寡人者可以保民乎哉曰可曰何由知吾可也曰臣聞之胡齕曰王坐於堂上有牽牛而過堂下者王見之曰牛何之對曰將以釁鐘王曰舎之吾不忍其觳觫若無罪而就死地對曰然則廢釁鐘與曰何可廢也以羊易之不識有諸齕音核舎上聲觳音斛觫音速與平聲胡齕齊臣也釁鐘新鑄鐘成而殺牲取血以塗其釁㕁也觳觫恐懼貌孟子述所聞胡齕之語而問王不知果有此事否曰有之曰是心足以王矣百姓皆以王為愛也臣固知王之不忍也王見牛之觳觫而不忍殺即所謂惻隠之心仁之端也擴而充之則可以保四海矣故孟子指而言之欲王察識扵此而擴充之也愛猶吝也王曰然誠有百姓者齊國雖褊小吾何愛一牛即不忍其觳觫若無罪而就死地故以羊易之也言以羊易牛其迹似吝實有如百姓所譏者然我之心不如是也曰王無異於百姓之以王為愛也以小易大彼惡知之王若隱其無罪而就死地則牛羊何擇焉王笑曰是誠何心哉我非愛其財而易之以羊也冝乎百姓之謂我愛也惡平聲異􅏜也隠痛也擇猶分也言牛羊皆無罪而死何所分别而以羊易牛乎孟子故設此難欲王反求而得其本心王不能然故卒無以自解扵百姓之言也曰無傷也是乃仁術也見牛未見羊也君子之於禽獸也見其生不忍見其死聞其聲不忍食其肉是以君子逺庖厨也逺去聲術謂法之巧者盖殺牛既所不忍釁鐘又不可廢扵此無以處之則此心雖𤼵而終不得施矣然見牛則此心已𤼵而不可遏未見羊則其理未形而無所妨故以羊易牛則二者得以兩全而無害此所以為仁之術也聲謂將死而哀鳴也盖人之于禽獸同生而異類故用之以禮而不忍之心施扵見聞之所及其所以必逺庖厨者亦以預養是心而廣為仁之術也王說曰詩云他人有心予忖度之夫子之謂也夫我乃行之反而求之不得吾心夫子言之於我心有戚戚焉此心之所以合於王者何也說音恱忖七本反度待洛反戚戚心動貌王因孟子之言而前日之心復萌乃知此心不從外得然猶未知所以反其本而推之也曰有復於王者曰吾力足以舉百鈞而不足以舉一羽明足以察秋毫之末而不見輿薪則王許之乎曰否今恩足以及禽獸而功不至於百姓者獨何與然則一羽之不舉為不用力焉輿薪之不見為不用明焉百姓之不見保為不用恩焉故王之不王不為也非不能也與平聲為不之為去聲復白也鈞三十斤百鈞至重難舉也羽鳥羽一羽至輕易舉也秋毫之末毛至秋而末銳小而難見也輿薪以車載薪大而易見也許猶可也今恩以下又孟子之言也盖天地之性人為貴故人之與人又為同類而相親是以惻隠之𤼵則扵民切而扵物緩推廣仁術則仁民易而愛物難今王此心能及物矣則其保民而王非不能也但自不肯為耳曰不為者與不能者之形何以異曰挾泰山以超北海語人曰我不能是誠不能也為長者折枝語人曰我不能是不為也非不能也故王之不王非挾泰山以超北海之類也王之不王是折枝之類也語去聲為長之為去聲長上聲折之舌反形狀也挾以腋持物也超躍而過也為長者折枝以長者之命折草木之枝言不難也是心固有不待外求擴而充之在我而已何難之有老吾老以及人之老幼吾幼以及人之幼天下可運於掌詩云刑于寡妻至于兄弟以御于家邦言舉斯心加諸彼而已故推恩足以保四海不推恩無以保妻子古之人所以大過人者無他焉善推其所為而已矣今恩足以及禽獸而功不至於百姓者獨何與與平聲老以老事之也吾老謂我之父兄人之老謂人之父兄幼以幼畜之也吾幼謂我之子弟人之幼謂人之子弟運扵掌言易也詩大雅思齊之篇刑法也寡妻寡徳之妻謙辭也御治也不能推恩則衆叛親離故無以保妻子盖骨肉之親本同一氣又非但若人之同類而已故古人必由親親推之然後及扵仁民又推其餘然後及扵愛物皆由近以及逺自易以及難今王反之則必有故矣故復推本而再問之權然後知輕重度然後知長短物皆然心為甚王請度之度之之度待洛反權稱錘也度丈尺也度之謂稱量之也言物之輕重長短人所難齊必以權度度之而後可見若心之應物則其輕重長短之難齊而不可不度以本然之權度又有甚扵物者今王恩及禽獸而功不至扵百姓是其愛物之心重且長而仁民之心輕且短失其當然之序而不自知也故上文既𤼵其端而扵此請王度之也抑王興甲兵危士臣構怨於諸侯然後快於心與與平聲抑𤼵語辭士戰士也構結也孟子以王愛民之心所以輕且短者必其以是三者為快也然三事實非人心之所快有甚扵殺觳觫之牛者故指以問王欲其以此而度之也王曰否吾何快於是將以求吾所大欲也不快扵此者心之正也而必為此者欲誘之也欲之所誘者獨在扵是是以其心尚明扵他而獨暗扵此此其愛民之心所以輕短而功不至扵百姓也曰王之所大欲可得聞與王笑而不言曰為肥甘不足於口與輕煖不足於體與抑為采色不足視於目與聲音不足聴於耳與便嬖不足使令於前與王之諸臣皆足以供之而王豈為是哉曰否吾不為是也曰然則王之所大欲可知已欲辟土地朝秦楚涖中國而撫四夷也以若所為求若所欲猶縁木而求魚也與平聲為肥抑為豈為不為之為皆去聲便令皆平聲辟與闢同朝音潮便嬖近習嬖幸之人也已語助辭辟開廣也朝致其来朝也秦楚皆大國涖臨也若如此也所為指興兵結怨之事縁木求魚言必不可得王曰若是其甚與曰殆有甚焉縁木求魚雖不得魚無後災以若所為求若所欲盡心力而為之後必有災曰可得聞與曰鄒人與楚人戰則王以為孰勝曰楚人勝曰然則小固不可以敵大寡固不可以敵衆弱固不可以敵彊海内之地方千里者九齊集有其一以一服八何以異於鄒敵楚哉蓋亦反其本矣甚與聞與之與平聲殆盖皆發語辭鄒小國楚大國齊集有其一言合集齊地其方千里是有天下九分之一也以一服八必不能勝所謂後災也反本說見下文今王𤼵政施仁使天下仕者皆欲立於王之朝耕者皆欲耕於王之野商賈皆欲藏於王之市行旅皆欲出於王之塗天下之欲疾其君者皆欲赴愬於王其如是孰能禦之朝音潮賈音古愬與訴同行貨曰商居貨曰賈𤼵政施仁所以王天下之本也近者恱逺者来則大小强弱非所論矣盖力求所欲則所欲者反不可得能反其本則所欲者不求而至與首章同意王曰吾惽不能進於是矣願夫子輔吾志明以教我我雖不敏請嘗試之惽與昬同曰無恒産而有恒心者惟士為能若民則無恒産因無恒心茍無恒心放辟邪侈無不為已及陷於罪然後從而刑之是㒺民也焉有仁人在位㒺民而可為也恒胡登反辟與僻同焉扵䖍反恒常也産生業也恒産可常生之業也恒心人所常有之善心也士嘗學問知禮義故雖無常産而有常心民則不能然矣㒺猶羅網欺其不見而取之也是故明君制民之産必使仰足以事父母俯足以畜妻子樂嵗終身飽凶年免於死亡然後驅而之善故民之從之也輕畜許六反下同輕猶易也此言民有常産而有常心也今也制民之産仰不足以事父母俯不足以畜妻子樂嵗終身苦凶年不免於死亡此惟救死而恐不贍奚暇治禮義哉治平聲凡治字為理物之義者平聲為己理之義者去聲後皆放此贍足也此所謂無常産而無常心者也王欲行之則盍反其本矣盍何不也使民有常産者又𤼵政施仁之本也說見下文五畝之宅樹之以桑五十者可以衣帛矣雞豚狗彘之畜無失其時七十者可以食肉矣百畝之田勿奪其時八口之家可以無飢矣謹庠序之教申之以孝悌之義頒白者不負戴於道路矣老者衣帛食肉黎民不飢不寒然而不王者未之有也音見前篇此言制民之産之法也趙氏曰八口之家次上農夫也此王政之本養生之道故孟子為齊梁之君各陳之也楊氏曰為天下者舉斯心加諸彼而已然雖冇仁心仁聞而民不被其澤者不行先王之道故也故以制民之産告之此章言人君當黜霸功行王道而王道之要不過推其不忍之心以行不忍之政而已齊王非無此心而奪扵功利之私不能擴充以行仁政雖以孟子反覆曉告精切如此而蔽固已深終不能悟是可歎也或問仁術字當何訓曰術猶方便也又曰術字本非不好底只縁後人把做變詐看了便道是不好却不知天下事有難處處須著有箇巧底道理始得以羊易之是用術處有此術則自家仁心方得流行南軒曰保民云者若保赤子之保也宣王自視歉然懼力之不足而不知保民之道雖甚大其端則不逺患不能體察擴充之耳故孟子引見牛之事以告使知不忍之心已實有之反而推之也宣王坐堂上牽牛過堂下而不忍之心形扵此盖不出扵計較作為而其端因物𤼵見也曰是心足以王矣言不忍之心王所固有是足以王也方見牛而不忍者無以蔽之而其愛物之端𤼵見也而不能加恩扵民者有以蔽之而仁民之理不著也然即夫愛物之端可以知夫仁民之理素具反而循其不忍之實其所謂仁民者固可得也老吾老以及人之老幼吾幼以及人之幼所謂由一本而推之也文王之刑于寡妻至于兄弟以御于家邦言舉斯心以加諸彼而已盖無非此心之所存也聖人雖無事乎推然其自身以及家自家以及國亦固有序矣推恩足以保四海者愛無所不被也不推恩無以保妻子忘其所以為愛之理也夫行王政者其心非欲傾他國以自利也惟其以生民困苦為已任行吾之所當為而天下歸心焉耳夫欲辟土地朝秦楚自世俗之務功名者言之則以為有志而自聖賢觀之則特出扵忮求矜伐之私耳宣王惟汲汲扵濟其私故顛沛錯亂非惟不能無濟而禍患從之蹈乎欲者固危殆之道也若由孟子所言以𤼵政施仁為事則是為天理之所存可大之業自爾馴致此天理人欲之分也孟子集編卷一
