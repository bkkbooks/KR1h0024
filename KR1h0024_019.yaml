body:
  text: 欽定四庫全書孟子集編卷三宋真德秀撰公孫丑章句上凡九章公孫丑問曰夫子當路於齊管仲晏子之功可復許乎復扶又反公孫丑孟子弟子齊人也當路居要地也管仲齊大夫名夷吾相威公霸諸侯許猶期也孟子未嘗得政丑蓋設辭以問也孟子曰子誠齊人也知管仲晏子而已矣齊人但知其國有二子而已不復知有聖賢之事或問乎曽西曰吾子與子路孰賢曽西蹴然曰吾先子之所畏也曰然則吾子與管仲孰賢曽西艴然不悅曰爾何曽比豫於管仲管仲得君如彼其專也行乎國政如彼其久也功烈如彼其卑也爾何曾比子於是蹴子六反艴音拂又音勃曽音增孟子引曽西與或人問答如此曽西曽子之孫蹴不安貌先子曽子也艴怒色也曽之言則也烈猶光也威公獨任管仲四十餘年是專且久也管仲不知王道而行霸術故言功烈之卑也楊氏曰孔子言子路之才曰千乘之國可使治其賦也使其見於施為如是而已其於九合諸侯一正天下固有所不逮也然則曽西推尊子路如此而羞比管仲者何哉譬之御者子路則範我馳驅而不獲者也管仲之功詭過而穫禽耳曽西仲尼之徒也故不道管仲之事曰管仲曽西之所不為也而子為我願之乎子為之為去聲曰孟子言也願望也曰管仲以其君霸晏子以其君顯管仲晏子猶不足為與顯顯名也曰以齊王由反手也王去聲由猶通反手言易也齊宣王既慕威文而公孫丑復慕管晏蓋伯者功利之説深入人心為日已久故不惟時君慕之而學者亦慕之孟子引曽西之言以折之蓋子路雖不及有為而其所學固聖賢之大學也若管仲之已試則威公專任之四十餘年其所成就不過國富兵強而已此孔門所羞稱者故雖曽西不屑為之况孟子以承三聖自任其肯為之匹乎楊龜山有曰孔子言子路之才曰千乘之國可使治其賦也使其見於施為如是而已其於九合諸侯一正天下固有所不逮也然則曽西推尊子路而羞比管仲者何哉譬之御者子路則範我馳驅而不獲者也管仲之功詭遇以獲禽爾斯言盡之使孟子當路於齊則必行王者之道其以齊王信猶反手之易也或謂晏子於齊固無功烈之足言若管仲者孔子嘗以如其仁稱之孟子學於孔子者也何其言之異邪曰孔子之稱稱其攘夷狄而尊中夏也孟子所譏譏其舍王道而用伯術也所指固不同矣然孔子雖稱其功而器小之譏不知禮之譏未嘗略也衍義曰若是則弟子之惑滋甚且以文王之德百年而後崩猶未洽於天下武王周公繼之然後大行今言王若易然則文王不足法與易去聲滋益也文王九十七而崩言百年舉成數也文王三分天下才有其二武王克商乃有天下周公相成王制禮作樂然後教化大行曰文王何可當也由湯至於武丁賢聖之君六七作天下歸殷久矣久則難變也武丁朝諸侯有天下猶運之掌也紂之去武丁未久也其故家遺俗流風善政猶有存者又有微子微仲王子比干箕子膠鬲皆賢人也相與輔相之故久而後失之也尺地莫非其有也一民莫非其臣也然而文王猶方百里起是以難也當猶敵也商自成湯至于武丁中間太甲太戊祖乙盤庚皆賢聖之君作起也自武丁至紂凡七世故家舊臣之家也齊人有言曰雖有智慧不如乘勢雖有鎡基不如待時今時則易然也鎡基田器也時謂耕種之時夏后殷周之盛地未有過千里者也而齊有其地矣雞鳴狗吠相聞而達乎四境而齊有其民矣地不改辟矣民不改聚矣行仁政而王莫之能禦也辟與闢同此言其勢之易也三代盛時王畿不過千里今齊已有之異于文王之百里又雞犬之聲相聞自國都以至于四境言民居稠密也且王者之不作未有疏於此時者也民之憔悴於虐政未有甚於此時者也飢者易為食渴者易為飲此言其時之易也自文武至此七百餘年異于商之賢聖繼作民苦虐政之甚異于紂之猶有善政易為飲食言飢渴之甚不待甘美也孔子曰德之流行速於置郵而傳命置驛也郵馹也所以傳命也孟子引孔子之言如此當今之時萬乘之國行仁政民之恱之猶解倒懸也故事半古之人功必倍之惟此時為然倒懸喻困苦也所施之事半于古人而功倍于古人由時勢易而德行速也公孫丑問曰夫子加齊之卿相得行道焉雖由此霸王不異矣如此則動心否乎孟子曰否我四十不動心丑蓋設問孟子若得位而行道則雖由此而成伯王之業亦不足怪任大責重如此亦有所恐懼疑惑而動其心乎四十強仕君子道明德立之時孔子四十而不惑亦不動心之謂也曰若是則夫子過孟賁逺矣曰是不難告子先我不動心孟賁勇士告子名不害孟賁血氣之勇丑蓋借之以贊孟子不動心之難孟子言告子未為知道乃能先我不動心則此亦未足為難也曰不動心有道乎曰有北宮黝之養勇也不膚撓不目逃思以一豪挫於人若撻之于朝市不受于褐寬博亦不受于萬乘之君視刺萬乘之君若刺褐夫無嚴諸侯惡聲至必反之黝蓋刺客之流以必勝為主而能不動也孟施舍之所養勇也曰視不勝猶勝也量敵而後進慮勝而後會是畏三軍者也舍豈能為必勝哉能無懼而已矣舍蓋力戰之士以無懼為主而能不動也孟施舍似曽子北宮黝似子夏夫二子之勇未知其孰賢然而孟施舍守約也黝務敵人舍専守已子夏篤信聖人曽子反求諸已故二子之與曽子子夏雖非等倫然論其氣象則各有所似賢猶勝也約要也言論二子之勇則未知誰勝論其所守則舍比于黝為得其要也昔者曽子謂子襄曰子好勇乎吾嘗聞大勇于夫子矣自反而不縮雖褐寬博吾不惴焉自反而縮雖千萬人吾往矣此言曽子之勇也子襄曽子弟子也夫子孔子也縮直也檀弓曰古者冠縮縫今也衡縫又曰棺束縮二衡三惴恐懼之也往往而敵之也孟施舍之守氣又不如曽子之守約也言孟施舍雖似曽子然其所守乃一身之氣又不如曽子之反身循理所守尤得其要也孟子之不動心其原蓋出于此守約云者言其所守之得其要耳非以約為一物而可守也蓋黝舍皆守氣以養之者然以黝比舍則舍之守為得其要至以舍而比曽子則曽子所守尤得其要也曰敢問夫子之不動心與告子之不動心可得聞與告子曰不得于言勿求于心不得于心勿求于氣不得于心勿求于氣可不得于言勿求於心不可夫志氣之帥也氣體之充也夫志至焉氣次焉故曰持其志無暴其氣此一節公孫丑之問孟子誦告子之言又斷以己意而告之也告子謂于言有所不達則當舍置其言而不必反求其理于心于心有所不安則當力制其心而不必更求其助于氣此所以固守其心而不動之速也孟子既誦其言而斷之曰彼所謂不得于心而勿求諸氣者急于本而緩其末猶之可也謂不得于言而不求諸心則既失于外而遂遺其內其不可也必矣然凡曰可者亦僅可而有所未盡之辭耳若論其極則志固心之所之而為氣之將帥然氣亦人之所以充滿于身而為志之卒徒者也故志固為至極而氣即次之人固當敬守其志然亦不可不致養其氣蓋其內外本末交相培養此則孟子之心所以未嘗必其不動而自然不動之大略也言雖發于口實出于心內有蔽陷離窮之病則外有詖淫邪遁之失不得于言而每求于心則其察日益精矣孟子以知言養氣為不動心之本者用此道也而告子反之是徒見言之發于外而不知其出于中亦義外之意也其害理深矣故孟子斷然以為不可既曰志至焉氣次焉又曰持其志無暴其氣者何也曰志一則動氣氣一則動志也今夫蹶者趨者是氣也而反動其心公孫丑見孟子言志至而氣次故問如此則専持其志可矣又言無暴其氣何也一専一也蹶顛躓也趨走也孟子言志之所向専一則氣固從之然氣之所在専一則志亦反為之動如人顛躓趨走則氣専在是而反動其心焉所以既持其志而又必無暴其氣也程子曰志動氣者什九氣動志者什一集義程子曰持其志無暴其氣內外交相養也又曰氣一則動志非獨蹶趨藥也酒也亦是然志動氣多氣動志少雖氣亦能動志然亦在持其志而已敢問夫子惡乎長曰我知言我善養吾浩然之氣知言者盡心知性于凡天下之言無不有以究極其理而識其是非得失之所以然也浩然盛大流行之貌氣即所謂體之充者本自浩然失養故餒惟孟子為善養之以復其初也蓋惟知言則有以明夫道義而于天下之事無所疑養氣則有以配夫道義而于天下之事無所懼此其所以當大任而不動心也敢問何謂浩然之氣曰難言也程子曰觀此一言則孟子之實有是氣可知矣其為氣也至大至剛以直養而無害則塞于天地之間至大初無限量至剛不可屈撓蓋天地之正氣而人得以生者其體段本如是也惟其自反而縮則得其所養而又無所作為以害之則其本體不虧而充塞無間矣程子曰天人一也更不分别浩然之氣乃吾氣也養而無害則塞乎天地一為私意所蔽則欿然而餒知其小也謝氏曰浩然之氣須于心得其正時識取又曰浩然是無虧欠時集義程子曰內直則其氣浩然養之至則為大人又曰石曼卿詩云樂意相關禽對語生香不斷樹交花此語形容得浩然之氣又曰主一無適敬以直內便有浩然之氣其為氣也配義與道無是餒也配者合而有助之意義者人心之裁制道者天理之自然餒飢乏而氣不充體也言人能養成此氣則其氣合乎道義而為之助使其行之勇決無所疑憚若無此氣則其一時所為雖未必不出于道義然其體有所不充則亦不免于疑懼而不足以有為矣是集義所生者非義襲而取之也行有不慊于心則餒矣我故曰告子未嘗知義以其外之也集義猶言積善蓋欲事事皆合于義也襲掩取也如齊侯襲莒之襲言氣雖可以配乎道義而其養之之始乃由事皆合義自反常直是以無所愧怍而此氣自然發生于中非由只行一事偶合于義便可掩襲于外而得之也慊快也足也言所行一有不合于義而自反不直則不足于心而其體冇所不充矣然則義豈在外哉告子不知此理乃曰仁內義外而不復以義為事則必不能集義以生浩然之氣矣上文不得于言勿求于心即外義之意必有事焉而勿正心勿忘勿助長也無若宋人然宋人有閔其苗之不長而揠之者芒芒然歸謂其人曰今日病矣豫助苗長矣其子趨而往視之苖則稿矣天下之不助苗長者寡矣以為無益而舍之者不耘苗者也助之長者揠苗者也非徒無益而又害之必有事焉而勿正趙氏程子以七字為句近世或并下文心字讀之者亦通必有事焉有所事也如有事于顓臾之有事正預期也春秋傳曰戰不正勝是也如作正心義亦同此與大學之所謂正心者語意自不同也此言養氣者必以集義為事而勿預期其效其或未充則但當勿忘其所有事而不可作為以助其長乃集義養氣之節度也閔憂也揠拔也芒芒無知之貌其人家人也病疲倦也舍之而不耘者忘其所有事揠而助之長者正之不得而妄有作為者也然不耘則失養而已揠則及以害之無是二者則氣得其養而無所害矣如告子不能集義而欲強制其心則必不能免于正助之病其于所謂浩然者蓋不惟不善養而又反害之矣孟子是義精理明天下之物不足以動其心不是把持得定北宮黝孟施舍所以不動者皆強制于外不是存養之致故又舉曽子之言云自反縮與不縮所以不動與動只在方寸之間若仰不愧俯不怍看如何大利害皆不足以易之若有一豪不直則此心便索告子不動心是硬把定問氣體之充與下面浩然之氣兩箇氣字大意似同而精微密察處略似有異前面氣字若専主形諸外者而言後面氣字若専主發于內者而言先生曰氣無二義但浩然之氣乃指其本來體段而言謂體之充者泛言之耳然亦非外此而别有浩然之氣也持其志無暴其氣是兩邊做工夫古人在車則聞鸞和行則珮玉凡此皆所以無暴其氣今人既無此不知如何而為無暴曰凡人多動作多語笑做力所不及底事皆是暴其氣學者要須事事節約莫教過當此便是養氣之道問遺書曰志一動則動氣氣一動則動志外書曰志専一則動氣氣専一則動志二説孰是曰此必一日之語學者同聽之而所記有淺深志一動則動氣氣一動則動志此言志動氣動又添入一動字了故不若從後説得其本旨蓋曰志専一則固可以動氣而氣専一亦可以動其志也知言養氣雖是兩事其實相關正如致知格物正心誠意之類知言便是窮理不先窮理見得是非如何養得氣浩然之氣清明不足以言之才説浩然便有箇廣大剛果意思如長江大河浩浩然而來也富貴貧賤威武不能移屈之類皆低不可以語此問浩然之氣即是人所受于天地之正氣否先生曰然又問與血氣如何曰只是一氣義理附于其中則為浩然之氣若不由義而發則只是血氣養成浩然之氣則與天地為一更無限量天下莫強于道義當然是義總名是道以道義為主有此浩然之氣去助他方始勇敢果決以進如君有過臣諌之是義也然有冒死而不顧者便是有浩然之氣去助此義如合説此話却恧縮不敢言便是氣餒便是欿然之氣問合而有助助字之訓如何先生曰道義是虛底物本自孤單得這氣貼起來便自張主無所不達李先生曰配是襯貼起來李復潏水集有一段説浩然之氣只是要仰不愧俯不怍便自然無怯懼其言雖粗却盡此章之意又曰浩然之氣孔子有兩句説盡了曰內省不疚夫何憂何懼所謂以直養而無害乃自反而縮之意集義只是事事皆直俯仰不愧便是浩然之氣只將自家心體看到那無私曲處自然有此氣象所以上蔡説于心得其正時識取伊川將至大至剛以直與坤卦直方大同説不必如此且只將孟子自看便見孟子説得粗易却説得細至大至剛者乃氣之本體如此但人不能養之而反害之故其大者小剛者弱耳志動氣是源頭濁下流亦濁氣動志却是下流壅而不泄反濁了上面至大至剛以直趙臺卿亦如此解直養之説伊川嫌其以一物養一物故欲從趙注舊章用之後來反復推究却是至大至剛作一句以直養而無害作一句者為得孟子之意蓋聖賢立言首尾必相應如云自反而縮便冇直養意思李端伯所記明道語未必不親切但伊川又自主張得别故有此議論今欲從明道之説集義是嵗月之功襲取是一朝一夕之事從而掩取終非已有至大至剛氣之本體以直養而無害是用功處寒乎天地乃其效也天地之氣無處不到無處不透雖金石不能遏人便是稟得這箇氣無欠闕所以程子曰天人一也更不分别浩然之氣乃吾氣也云云古人臨之以死生禍福而不變敢去罵賊敢去殉國是他養得這氣大了故無所懼人之氣當于平時存養有素故遇事之際以氣助其道義而行之若于氣上存養有所不足遇事之際便有十分道理亦畏怯而不敢為如朝廷欲去一小人我道理既直有甚怕他不敢動著知其為小人而不敢去只是這氣衰其氣如此便是合下無工夫氣只是一箇氣但從理義中出來者即浩然之氣從血肉身中出來者即為血氣之氣耳道則是物我公其自然之理義則吾心之能斷制者所謂以處此理者也世有理直而不能自明者正為無氣耳譬如利物可以斬割須有力者乃能用之若自無力利物何為孟子許多論氣處只在集義所生一句上或問集義曰只是無事不求箇是而已集義只是件件事要合宜自然積得多有人不因集義合下來便恁地剛勇如何曰此是粗氣便是北宮黝孟施舍之勇底亦終有餒時問一之看浩然之氣處如何曰見集義意思是要得安穩如講究書中道理便也要見得安穩曰此又是窮理不是集義集義是行底工夫窮理是做知言工夫能窮理然後能知言配義與道者大抵以坤配乾必以乾為主以妻配夫必以夫為主以氣配道義必竟以道義為主而氣隨之是氣常隨著道義必有事焉而勿正却以鳶飛魚躍言之此莫是順天理自然之意否曰孟子之説只是養氣上説程子説得又髙須是看孟子了又看程説便見得孟子只説勿忘勿助長程先生之言于其中自有一箇自然底氣象或問必有事焉而勿正曰正是等待之意如一邊集義一邊在此等待那氣生今日等不見明日又等明日又等不見等來等去便却去助長侯師聖説而勿正心伊川舉禪語為説曰事則不無擬心則差是如何言須擬之而後言行須擬之而後動方可中節不成不擬不議只恁地去此語似禪某不敢取有事有事于集義也勿正謂勿預期等待他聽其自充也集義如藥頭必有事勿正心勿忘勿助長如製度必有事焉勿正心勿忘勿助長是集義中小節不要等待不要催促何謂知言曰詖辭知其所蔽淫辭知其所陷邪辭知其所離遁辭知其所窮生於其心害於其政發於其政害於其事聖人復起必從吾言矣詖彼寄反復扶又反此公孫丑復問而孟子答之也詖偏陂也淫放蕩也邪邪辟也遁逃避也四者相因言之病也蔽遮隔也陷沈溺也離叛去也窮困屈也四者亦相因則心之失也人之有言皆本于心其心明乎正理而無蔽然後其言平正通達而無病苟為不然則必有是四者之病矣即其言之病而知其心之失又知其害于政事之決然而不可易者如此非心通于道而無疑于天下之理其孰能之彼告子者不得于言而不肯求之于心至為義外之説則自不免于四者之病其何以知天下之言而無所疑哉程子曰心通乎道然後能辨是非如持權衡以較輕重孟子所謂知言是也又曰孟子知言正如人在堂上方能辨堂下人曲直若猶未免親于堂下衆人之中則不能辨決矣集注四十強仕君子道明德立之時孔子四十而不惑亦不動心之謂李貫之曰愚謂明則不疑立則不懼然未有不明而能立者故知言養氣雖二者並進而其序必以知言為先孔子不惑亦不疑之謂不惑則自不動矣又程子曰天人一也浩然之氣即吾氣也集注曰至大云云蓋天地之正氣而人得以生者體段本如此李貫之謂程子又嘗云氣有不善性則無不善今諸先生之説止言人之稟氣莫非天地之正氣而不復言夫昏明強弱之不齊豈其説猶有未備邪黃勉齋答以為有天地之性有氣質之性形而後有氣質之性然天地之性亦未嘗不存孟子言養性于氣質之中養天地之性孟子言養氣于氣質之中養天地之氣孟子言養吾浩然之氣則是本來完足其曰集義所生亦猶火始然泉始達擴而充之耳非昔也惡而今也善昔也無而今也有云云公晦答則謂孟子言性止謂天地之性而不及氣質之性孟子言氣止謂天地之氣而不及氣質之氣蓋極本窮源之論也自本原而論之性無有不善氣無有不正能明乎是能養乎是而又力行以求至乎是則吾性即天地之性而氣質之性有不善者亦化而為善矣吾氣即天地之氣而氣質之氣雖未正者亦轉而為正矣此孟子之本指也又貫之問石曼卿詩云云公晦答謂此與濂溪忩前草不除云與自家意思一般者非程子體道之深不能及此極可玩也又程子曰敬以直內便有浩然之氣張子曰惟直內則浩然之氣當處生李貫之疑其太快以為欠却集義工夫公晦答曰程張二説皆未及集義然苟能一日用力于此則心廣體胖氣象自别試自驗之可見但孟子之意却主集義而言耳前一事合義亦當處便生如此積纍以至于成集字可細味也貫之又疑謝氏曰浩然之氣須于心得其正時識取人于朝夕之間豈無心得其正之時然使其未有集義之功則充塞天地之氣象豈可想像而識公晦答曰謝氏云云非謂衆人昏荒放肆之中為能識而得之也學者自存其心一旦靜定義理昭著從此體認見得分明遂持養而充廣之則盛大流行之體可馴致矣以上數條頗有發明今附此程子曰詖辭偏蔽淫辭陷溺邪辭信其説至于耽惑遁辭生于不正窮著便遁此四者楊墨皆有愚案此亦闢異端之辭宰我子貢善為説辭冉牛閔子顔淵善言德行孔子兼之曰我于辭命則不能也然則夫子既聖矣乎此一節林氏以為皆公孫丑之問是也説辭言語也德行得于心而見于行事者也三子善言德行者身有之故言之親切而有味也公孫丑言數子各有所長而孔子兼之然猶自謂不能于辭命今孟子乃自謂我能知言又善養氣則是兼言語德行而有之然則豈不既聖矣乎此夫子指孟子也程子曰孔子自謂不能于辭命者欲使學者務本而已曰惡是何言也昔者子貢問於孔子曰夫子聖矣乎孔子曰聖則吾不能我學不厭而教不倦也子貢曰學不厭知也教不倦仁也仁且智夫子既聖矣夫聖孔子不居是何言也惡驚歎辭也昔者以下孟子不敢當丑之言而引孔子子貢問答之辭以告之也夫子指孔子也學不厭者智之所以自明教不倦者仁之所以及物再言是何言也以深拒之昔者竊聞之子夏子遊子張皆有聖人之一體冉牛閔子顔淵則具體而微敢問所安此一節林氏亦以為皆公孫丑之問是也一體猶一肢也具體而微謂有其全體但未廣大耳安處也公孫丑復問孟子既不敢比孔子則于此數子欲何所處也曰姑舍是孟子言且置是者不欲以數子所至者自處也曰伯夷伊尹何如曰不同道非其君不事非其民不使治則進亂則退伯夷也何事非君何使非民治亦進亂亦進伊尹也可以仕則仕可以止則止可以久則久可以速則速孔子也皆古聖人也吾未能有行焉乃所願則學孔子也治去聲伯夷孤竹君之長子兄弟遜國避紂隱居聞文王之德而歸之及武王伐紂去而餓死伊尹有莘之處士湯聘而用之使之就桀桀不能用復歸于湯如是者五乃相湯而伐桀也三聖人事詳見此萹之末及萬章下篇伯夷伊尹於孔子若是班乎曰否自有生民以來未有孔子也南軒曰公孫丑舉伯夷伊尹以問孟子謂其道不同云云二子所為若是蓋其氣稟所明者在是終身從事乎此而有以極其至也至于孔子則天也可仕可止可久可速非謂度其可而為之也蓋無不當其可也伯夷伊尹就其所至而成聖者故皆以古聖人稱之然吾于伯夷伊尹雖未能及而所願則學孔子耳蓋二子雖聖于清聖于任然其所循而入者終未免乎有毫髮之偏從而學焉則其偏將愈甚譬如射者必志于正鵠舍正鵠而他求則其差將不可勝言者矣曰然則有同與曰有得百里之地而君之皆能以朝諸侯有天下行一不義殺一不辜而得天下皆不為也是則同有言有同也以百里而王天下德之盛也行一不義殺一不辜而得天下有所不為心之正也聖人之所以為聖人其本根節目之大者惟在於此于此不同則亦不足以為聖人矣曰敢問其所以異曰宰我子貢有若智足以知聖人汙不至阿其所好汙音蛙好去聲汙下也三子智足以知夫子之道假使汙下必不阿私所好而空譽之明其言之可信也宰我曰以豫觀於夫子賢於堯舜逺矣程子曰語聖則不異事功則有異夫子賢于堯舜語事㓛也蓋堯舜治天下夫子又推其道以垂教萬世堯舜之道非得夫子則後世亦何所據哉又問三代以前只是説中説極至孔門答問説者便是仁何也朱子曰説中説極今人多錯會了文義今未暇詳説但至孔門仁字則是列聖相傳到此方漸次説到親切處耳夫子之所以賢于堯舜亦其一端也史記曰宰我問五帝之德子曰豫非其人也又宰我為臨淄大夫與田常作亂夷其族孔子恥之蘇氏古史曰太史公云云余以為宰我之賢列于四科其師友淵源所從來逺矣雖為不善不至于從叛逆弒君父也不幸平居有晝寢短喪之過儒者因遂信之蓋田常之亂本與闞止爭闞止亦子我也田常殺闞止而宰我蒙其惡名豈不哀哉且使宰我信與田常之亂常既殺闞止殺簡公則尚誰族宰我者事必不然矣又李斯曰田常隂取齊國殺宰我于庭因殺簡公信如此説則宰我乃田常之仇為齊攻田常者非與常作亂矣要知闞止亦曰子我故戰國諸子誤以為宰我皆不足信也子貢曰見其禮而知其政聞其樂而知其德由百世之後等百世之王莫之能違也自生民以來未有夫子也言大凡見人之禮則可以知其政聞人之樂則可以知其德是以我從百世之後差等百世之王無冇能遁其情者而見其皆莫若夫子之盛也有若曰豈惟民哉麒麟之于走獸鳳凰之於飛鳥太山之於丘垤河海之於行潦類也聖人之於民亦類也出於其類拔乎其萃自生民以來未有盛於孔子也麒麟毛蟲之長鳯凰羽蟲之長垤蟻封也行潦道上無源之水也出髙出也拔特起也萃聚也言自古聖人固皆異于衆人然未有如孔子之尤盛者也程子曰孟子此章擴前聖所未發學者所冝潛心而玩索也孟子曰以力假仁者霸霸必有大國以德行仁者王王不待大湯以七十里文王以百里假仁者本無是心而借其事以為功者也以德行仁則自吾之得于心者推之無適而非仁也以力假仁力與仁二以德行仁德便是仁南軒曰以德行仁至誠惻怛本于其心而形于事為如木之有本水之有源也以力服人者非心服也力不贍也以德服人者中心恱而誠服也如七十子之服孔子也詩云自西自東自南自北無思不服此之謂也王霸之心誠偽不同故人所以應之者其不同亦如此鄒氏曰以力服人者有意于服人而人不敢不服以德服人者無意于服人而人不能不服從古以來論王霸者多矣未有若此章之深切而著明也先儒謂自古之論王霸者多矣未有若此章之深切而著明也蓋王霸之辨曰德與力而已力者國富兵強之謂初無心于為仁而借其名以集事也德者躬行心得之謂其仁素具于中而推之以及物也霸者以力故必大國乃能為之王者以德不以力何待于大乎以力服人者有意于服人而人不敢不服以德服人者無意于服人而人不能不服此天理人欲之分而王霸之所以異也夫孔子以匹夫不得位而七十子終身從之是孰使之然哉所謂心恱而誠服也王者之服人亦猶是也衍義孟子曰仁則榮不仁則辱今惡辱而居不仁是猶惡濕而居下也此只是為下等人言若是上等人豈以榮辱之故而後行仁哉南軒曰仁者非有意于榮仁者固榮也在身則心和而氣平德性尊而暴慢逺在家則父子親而兄弟睦夫婦義長幼序推之于國而國治施之于天下而天下平無往而不榮也若夫不仁之人咈理而徇欲一身將不能以自保而况于其他乎夫人之情孰不惟辱之惡而自處于不仁則以不仁蔽之而昧夫榮辱之幾如惡之莫如貴德而尊士賢者在位能者在職國家間暇及是時明其政刑雖大國必畏之矣間音間此因其惡辱之情而進之以強仁之事也貴德猶尚德也士則指其人而言之賢有德者使之在位則足以正君而善俗能有才者使之在職則足以修政而立事國家間暇可以有為之時也詳味及字則惟日不足之意可見矣詩云逮天之未隂雨徹彼桑土綢繆牖户今此下民或敢侮豫孔子曰為此詩者其知道乎能治其國家誰敢侮之徹直列反土音杜綢音稠繆武彪反詩豳風鴟梟之篇周公之所作也逮及也徹取也桑土桑根之皮也綢繆纒綿補葺也牖户巢之通氣出入處也豫鳥自謂也言我之備患詳密如此今此在下之民或敢有侮豫者乎周公以鳥之為巢如此比君之為國亦當思患而預防之孔子讀而贊之以為知道也今國家間暇及是時般樂怠敖是自求禍也般音盤樂音洛敖音傲言其縱欲偷安亦惟日不足也禍福無不自已求之者結上文之意詩云永言配命自求多福太甲曰天作孽猶可違自作孽不可活此之謂也詩大雅文王之篇永長也言猶念也配合也命天命也此言福之自已求者太甲商書篇名孽禍也違避也活生也書作逭逭猶緩也此言禍之自已求者孟子曰尊賢使能俊傑在位則天下之士皆恱而願立於其朝矣俊傑才德之異于衆者市廛而不征法而不廛則天下之商皆恱而願藏於其市矣廛市宅也張子曰或賦其市地之廛而不征其貨或治之以市官之法而不賦其廛蓋逐末者多則廛以抑之少則不必廛也關譏而不征則天下之旅皆恱而願出於其路矣解見前篇耕者助而不稅則天下之農皆恱而願耕於其野矣但使出力以助耕公田而不稅其私田也廛無夫里之布則天下之民皆恱而願為之氓矣周禮宅不毛者有里布民無職事者出夫家之征鄭氏謂宅不種桑麻者罰之出使出一里二十五家之布民無常業者罰之使出一夫百畝之稅一家力役之征也今戰國時一切取之市宅之民已賦其廛又令出此夫里之布非先王之法也氓民也信能行此五者則鄰國之民仰之若父母矣率其子弟攻其父母自生民以來未有能濟者也如此則無敵於天下無敵於天下者天吏也然而不王者未之有也呂氏曰奉行天命謂之天吏廢興存亡惟天所命不敢不從若湯武是也此章言能行王政則寇戎為父子不行王政則赤子為仇讎孟子曰人皆有不忍人之心天地以生物為心而所生之物因各得夫天地生物之心以為心所以人皆有不忍人之心也先王有不忍人之心斯有不忍人之政矣以不忍人之心行不忍人之政治天下可運之掌上言衆人雖有不忍人之心然物欲害之存焉者寡故不能察識而推之政事之間惟聖人全體此心隨感而應故其所行無非不忍人之政也所以謂人皆有不忍人之心者今人乍見孺子將入於井皆有怵惕惻隱之心非所以內交于孺子之父母也非所以要譽於鄉黨朋友也非惡其聲而然也怵音黜內讀為納要平聲惡去聲下同乍猶忽也怵惕驚動貌惻傷之切也隱痛之深也此即所謂不忍人之心也內結要求聲名也言乍見之時便有此心隨見而發非由此三者而然也程子曰滿腔子是惻隱之心謝氏曰人須是識其真心方乍見孺子入井之時其心怵惕乃真心也非思而得非勉而中天理之自然也內交要譽惡其聲而然即人欲之私矣由是觀之無惻隱之心非人也無羞惡之心非人也無辭讓之心非人也無是非之心非人也羞恥己之不善也惡憎人之不善也辭解使去己也讓推以與人也是知其善而以為是也非知其惡而以為非也人之所以為心不外乎是四者故因論惻隱而悉數之言人若無此則不得謂之人所以明其必有也惻隱之心仁之端也羞惡之心義之端也辭讓之心禮之端也是非之心智之端也惻隱羞惡辭讓是非情也仁義禮智性也心統性情者也端緒也因其情之發而性之本然可得而見猶有物在中而緒見于外也人之有是四端也猶其有四體也有是四端而自謂不能者自賊者也謂其君不能者賊其君者也四體四支人之所必有者也自謂不能者物欲蔽之耳凡有四端於我者知皆擴而充之矣若火之始然泉之始達苟能充之足以保四海苟不充之不足以事父母擴推廣之意充滿也四端在我隨處發見知皆即此推廣而充滿其本然之量則其日新又新將有不能自已者矣能由此而遂充之則四海雖逺亦吾度內無難保者不能充之則雖事之至近而不能矣此章所論人之性情心之體用本然全具而各有條理如此學者于此反求默識而擴充之則天之所以與我者可以無不盡矣程子曰人皆有是心惟君子為能擴而充之不能然者皆自棄也然其充與不充亦在我而已矣又曰四端不言信者既有誠心為四端則信在其中矣愚案四端之信猶五行之土無定位無成名無専氣而水火金木無不待是以生者故土于五行無不在于四時則寄王焉其理亦猶是也天地生人物須是和氣方生人自和氣中出所以有不忍人之心問滿腔子是惻隱之心曰只是滿這軀殼都是惻隱之心才觸著便是這箇出來大感則大應小感則小應仁是根惻隱是萌芽親親仁民愛物便是推廣到枝葉處玉山講義天之生物各賦一性性非有物只是一箇道理之在我者耳故性之所以為體只是仁義禮智信五字天下道理無不出于此韓文公云人之所以為性者五其説最得之却為後世之言性者多雜佛老而言所以將性字作知覺心意看了非聖賢説性字本指也五者之中所謂信者是箇真實無妄底道理如仁義禮智皆真實而無妄者也故信自更不須説只仁義禮智四字于中各有分别不可不辨蓋仁則是溫和慈愛底道理義則是箇斷制裁割底道理禮則是箇恭敬撙節底道理智則是箇分别是非底道理凡此四者具于人心乃是性之本體方其未發漠然無形象之可見及其發而為用則仁者為惻隱義者為羞惡禮者為辭讓智者為是非隨事發見各有苗脈不相淆亂所謂情也故孟子曰惻隱之心仁之端也羞惡之心義之端也恭敬之心禮之端也是非之心智之端也謂之端者猶有物在中而不可見必因其端緒發見于外然後可得而尋也蓋一心之中仁義禮智各有界限而其性情體用又自各有分别然後就此四者之中又見得仁義兩字是箇大界限如天地造化四序流行而其實不過一隂一陽而己于此見得分明然後就此又見得仁字是箇生底意思通貫周流于四者之中仁固仁之本體也義則仁之斷制也禮則仁之節文也智則仁之分别也正如春之生氣貫徹四時春則生之生也夏則生之長也秋則生之收也冬則生之藏也故程子謂四德之元猶五常之仁偏言則一事専言則包四者正謂此也孔子只言仁以其専言者言之也故但言仁而義禮智皆在其中孟子兼言義以其偏言者言之也然亦不是于孔子所言之外添入一箇義字但于一理之中分别出來耳其又兼言禮智亦是如此蓋禮是仁之著智是義之藏而仁之一字未嘗不流行乎四者之中也若論體用亦有兩説蓋以仁存于中而義形于外言之則曰仁人心也義正路也而以仁義相為體用若以仁對惻隱義對羞惡而言則就一理之中又以未發巳發相為體用若認得熟看得透則玲瓏穿穴縱橫顛倒無處不通而日用之間行著習察無不是著工夫處矣四端説曰性是太極渾然之體本不可以名字言但其中含具萬理而綱領之大者有四故命之曰仁義禮智孔門未嘗備言至孟子而始終備言之者蓋孔子之時性善之理素明雖不詳其條而説自具至孟子之時異説蜂起往往以性為不善孟子懼是理之不明而思有以明之苟但曰渾然全體則恐其為無星之稱無寸之尺而終不足以曉天下于是别而言之界為四破而四端之説于是乎立蓋四端之未發也性雖寂然不動而其中自有條理自有間架不是儱侗都無一物所以外邊才感中間便應如赤子入井之事感則仁之理便應而惻隱之心于是乎形如過廟過朝之事感則禮之理便應而恭敬之心于是乎形蓋由其發各有面貌之不同是以孟子析而為四以示學者使知渾然全體之中而燦然有條如此則性之善可知矣然四端之未發也所謂渾然全體之理無聲臭之可言無形象之可見何以知其燦然有條若此蓋是理可驗乃就他發處驗得凡物必有本根而後有枝葉見其枝葉而知其必有本根性之理雖無形而端緒之發則可驗故由其惻隱所以必知其有仁由其羞惡所以必知其有義由其恭敬所以必知其有禮由其是非所以必知其有智使其本無是理于內則何以有是端于外所以有是端于外必知有是理在內而不可誣也故孟子言乃若其情則可以為善矣乃所謂善也是則孟子之言性善蓋亦遡其情而逆知之耳仁義禮智既見得他界限分明又須知四者之中仁義是一箇對立底關鍵蓋仁仁也而禮者則仁之著義義也而智者則義之藏猶春夏秋冬各有四時而春夏皆陽之屬也秋冬皆隂之屬也故曰立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義是知天地之道不兩則不能以立故端之有四而立者有兩耳仁義雖對立而成兩然仁實貫通乎四者之中蓋偏言則一事専言則包四者故仁者仁之本體禮者仁之節文義者仁之斷制智者仁之分别猶春夏秋冬雖不同而同出於春春則春之生也夏則春之長也秋則春之收也冬則春之藏也自四而兩自兩而一則統之有宗會之有元矣故曰五行一隂陽隂陽一大極是天地之理固然也仁包四端而智居四端之末者蓋冬者藏也所以始萬物而終萬物者也智有藏之義焉有始終之義焉且惻隱羞惡恭敬是三者皆有可為智但分别其為是非耳是以謂之藏也又惻隱羞惡恭敬皆是一面底道理而是非則有兩面既别其所是又别其所非是終始萬物之象也故仁義為四端之首而智則能成終成始猶元雖四德之長然元不生于元而生于貞蓋天地之化不翕聚則不能發散理固然也仁智交際之間乃萬化之機軸此理循環不窮吻合無間程子所謂動靜無端隂陽無始者此也問仁兼四端意思曰上蔡見明道舉史書成誦明道謂其玩物喪志上蔡汗流浹背面發赤色明道云此便是惻隱之心且道上蔡聞道慚惶自是羞惡之心如何却説惻隱惟是有惻隱方會動動了始有羞惡有恭敬有是非動處便是惻隱若不會動却不成人天地生生之理這些意思未嘗止息惻隱之心首末皆惻隱三者則首是惻隱末是羞恧辭讓是非性不可言所以言性善者只看他四端之善則可以見性之善如見水之清則知其源頭必清矣四端情也性即理也發者情也其本則性也如見影知形之意仁義禮智本體自無形影要捉摸不著只得將發動處看程子曰因其惻隱知其有仁説得最分明親切也不道惻隱便是仁也不道舍了惻隱别有一箇仁譬如草木因萌芽知得下面有根也不道萌芽便是根又不道舍了萌芽别取一箇根説仁義便如隂陽説四端便如四時説四端八字便如八節問心中湛然清明與天地相流通此是仁否先生云湛然清明時是仁義禮智統會處今人説仁都把做空洞底看却不知當此時仁義禮智之苗脈已在裏許只是未發動又有箇親愛底事來便發出惻隱之心有箇可厭惡事來便發羞惡之心禮智亦然四端固是良心苟不加存養發不中節便是私心或問未發之際不知如何曰未發之際便是中便是敬以直內便是心之本體又問未發之際欲加識别使四者各有著落如何曰如何識别只存得這道理在這裏便恁地涵養將去既熟則其發見自不差又曰未發之時此心之體寂然不動無可分别只得混沌養將去若必欲求其所謂四者之端則既思便是已發矣問仁何以能包四者曰人只是這一箇心就這裏面分為四者且以惻隱論之本只是這惻隱底心遇當辭遜則為辭遜不安處便為羞惡分别處便為是非若無一箇動底醒底在裏面便也不知羞惡不知是非譬如天地只是一箇春氣是發生之心春氣長得過便是夏收斂便是秋消縮盡便為冬明年又從春處起渾然只是一箇發生之氣問四端之端集注以為端緒或問端乃尾如何曰以體用言之有體而後有用故端亦可謂之尾若以終始言之則四端是始發處故亦可以端緒言之二説各有所指自不相礙四端乃孔子所未發人只道孟子有闢楊墨之功不知他就人心上發明大功如此闢楊墨是扞邊境之功發明四端乃安社稷之功四者皆我所固有其初發也豪毛如也及推廣將去充滿其量則廣大無窮問人心陷溺之久四端蔽于利欲之私初用工亦未免間斷曰固是然義理之心才勝則利欲之念便消如惻隱之心勝則殘虐之意自消羞惡之心勝則貪冒無恥之意自消恭敬之心勝則驕惰之意自消是非之心勝則含糊苟且頑冥昏謬之意自消孟子言四端處極好思量玩味只反身而自驗其明昧深淺如何朱子四端之説蓋先儒所未發至論不忍人之心則曰天地以生物為心而所生之物因各得天地生物之心以為心所以謂人皆有不忍人之心也至哉言矣蓋天地造物無他作為惟以生物為事觀夫春夏秋冬往古來今生意周流何嘗一息間斷天地之心于此可見萬物之生既從天地生意中出故物物皆具此理何况人為至靈冝乎皆有不忍人之心也然人有是心而私欲間斷故不能達之于用惟聖人全體本心私欲不雜故有此仁心便有此仁政自然流出更無壅遏天下雖大運以此心而有餘矣孟子恐人未能自信也故指發見之真切者以覺悟之夫孺子未有所知而將入于井乍見之者無問賢愚皆有惻怛傷痛之心方其此心驟發之時非欲以此納交非欲以此干譽又非以避不仁之名也倉卒之間無安排無矯飾而天機自動此所謂真心也賦形為人孰無此心苟無此心則非人矣然所謂無有豈其固然哉私欲蔽塞而失其真耳孟子始言惻隱之心至此則兼羞惡辭遜是非而言者蓋仁為衆善之長有惻隱則三者從之矣惻隱不存則三者亦何有哉夫四肢人所必有四端亦然而昧者不察自謂不能是賊其身又謂吾君不能是賊其君賊猶賊仁賊義之賊言為禍害之深也然仁義禮智其分量甚大而端緒甚微苟不推廣其端則何以充滿其量必也因其發見之微隨加展拓使人欲無所障礙而天理得以流行猶始然之火引之而煌煌始達之泉疏之而浩浩仁義禮智庶幾充滿其本然之量而不可勝用矣苟惟不然天理方萌人欲隨窒是乍然者遽息而方達者隨堙欲愈蔽而端愈微雖有不忍人之心必無不忍人之政矣夫四端在人一也充之則足以保四海不充則不足以事父母是以帝王之治光宅天下丕冒海隅而後之人主或以天下之大而不能恱其親之心或以邇聲色信讒邪而至于黜其配殺其子同此四端也充與不充而已耳出衍義孟子曰矢人豈不仁於函人哉矢人惟恐不傷人函人惟恐傷人巫匠亦然故術不可不慎也函甲也惻隱之心人皆有之是矢人之心本非不如函人之仁也巫者為人祈祝利人之生匠者作為棺椁利人之死孔子曰里仁為美擇不處仁焉得智夫仁天之尊爵也人之安宅也莫之禦而不仁是不智也里有仁厚之俗者猶以為美人擇所以自處而不于仁安得為智乎此孔子之言也仁義禮智皆天所與之良貴而仁者天地生物之心得之最先而兼統四者所謂元者善之長也故曰尊爵在人則為本心全體之德有天理自然之安無人欲陷溺之危人當常在其中而不可須臾離者也故曰安宅此又孟子釋孔子之意以為仁道之大如此而自不為之豈非不智之甚乎仁者吾所自有苟欲為之誰能止之者乃甘心于不仁豈非不智乎故仁智二字常相須焉不仁斯不智矣不智斯不仁矣出衍義不仁不智無禮無義人役也人役而恥為役由弓人而恥為弓矢人而恥為矢也以不仁故不智不智故不知禮義之所在如恥之莫如為仁此亦因人愧恥之心而引之使志于仁也不言智禮義者仁該全體能為仁則三者在其中矣仁者如射射者正已而後發發而不中不怨勝已者反求諸已而已矣中去聲為仁由已而由人乎哉南軒曰矢人與函人巫與匠俱人也而其所欲之異者以其操術然也故夫人自處于不仁為忌忮為殘忍至于嗜殺人而不顧者夫豈獨異于人哉惟其所處向在乎人欲之中安習滋長以至于此其性本同而其習霄壤之異可不畏與孟子曰子路人告之以有過則喜喜其得聞而改之其勇于自修如此周子曰仲由喜聞過令名無窮焉今人有過不喜人規如諱疾而忌醫寧滅其身而無悟也噫程子曰子路人告之以有過則喜亦可謂百世之師矣禹聞善言則拜書曰禹拜昌言蓋不待有過而能屈己以受天下之善也大舜有大焉善與人同舍己從人樂取於人以為善言舜之所為又有大于禹與子路者善與人同公天下之善而不為私也己未善則無所繫吝而舍己從人人有善則不待勉強而取之于己此善與人同之目也自耕稼陶漁以至為帝無非取於人者舜之側微耕于厯山陶于河濵漁于雷澤取諸人以為善是與人為善者也故君子莫大乎與人為善與猶許也助也取彼之善而為之于我則彼益勸于為善矣是我助其為善也能使天下之人皆勸于為善君子之善孰大于此此章言聖賢樂善之誠初無彼此之間故其在人者有以裕于已在已者有以及于人孟子曰伯夷非其君不事非其友不友不立於惡人之朝不與惡人言立於惡人之朝與惡人言如以朝衣朝冠坐於塗炭推惡惡之心思與鄉人立其冠不正望望然去之若將浼焉是故諸侯雖有善其辭命而至者不受也不受也者是亦不屑就已栁下惠不羞汙君不卑小官進不隱賢必以其道遺迭而不怨厄窮而不憫故曰爾為爾我為我雖袒裼裸裎於我側爾焉能浼我哉故由由然與之偕而不自失焉援而止之而止援而止之而止者是亦不屑去已孟子曰伯夷隘栁下惠不恭隘與不恭君子不由也隘狹窄也不恭簡慢也夷惠之行固皆造乎至極之地然既有所偏則不能無弊故不可由也南軒曰不屑就謂不輕就也然而伯夷非不就也特不輕就耳下惠非不去也特不輕去耳伯夷聞文王作則興曰盍歸乎來下惠為士師蓋嘗三黜是則伯夷果長往而不來者乎下惠果苟容而户者乎此其就清和中處之而盡其道然而于是二端終有所未化故其意味有所偏重而未免于流弊也故夫思與鄉人處其衣冠不正望望然去若將浼焉此其流弊得無有入于隘者乎曰爾為爾我為我雖袒裼裸裎而不以為浼此其流弊得無有入于不恭者乎其端豪釐之間從而由之則其弊有甚者矣故其所為隘與不恭者君子所不由而所願則學孔子也孟子集編卷三
